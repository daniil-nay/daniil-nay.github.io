    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            return `${number} ${unitWord} ${timeUnits[lang].ago}`;
        }

        if (!['ru', 'en'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.28128', 'title': 'PhysisForcing: Physics Reinforced World Simulator for Robotic Manipulation', 'url': 'https://huggingface.co/papers/2606.28128', 'abstract': 'Abstract PhysisForcing enhances embodied video generation by enforcing physical consistency through pixel-level trajectory alignment and semantic-level relational alignment losses in a DiT-based framework.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Video generation models have emerged as a promising paradigm for embodied world simulation. However, both general-domain video generators and robot-specific data fine-tuned models can still produce physically implausible manipulations, including discontinuous motion trajectories and inconsistent robot-object interactions, which limits their reliability as world simulators. Through extensive experiments, we find that such physical instability mainly arises from two factors: deformation of moving objects and implausible spatio-temporal correlations among interacting entities, particularly during contact. Building on this observation, we propose PhysisForcing, a scalable training framework that strengthens physical consistency by focusing supervision on physics-informative regions through joint optimization of pixel-level and semantic-level features. The framework consists of a pixel-level trajectory alignment loss, which supervises DiT features using reference point trajectories, and a semantic-level relational alignment loss, which aligns DiT features with inter-region relations extracted from a frozen video understanding encoder. Extensive experiments on R-Bench, PAI-Bench, and EZS-Bench show that PhysisForcing consistently improves embodied video generation over strong baselines, improving the Wan2.2-I2V-A14B and Cosmos3-Nano base models on R-Bench by 22.3\\% and 9.2\\% (7.1\\% and 3.7\\% over vanilla finetuning), with the Cosmos3-Nano variant attaining the best overall score. Beyond generation, as a world model under the WorldArena action-planner protocol it raises the closed-loop success rate from 16.0\\% to 24.0\\% and further improves downstream policy success, indicating that physically aligned video models yield stronger representations for robotic manipulation.', 'score': 39, 'issue_id': 2742, 'pub_date': '2026-06-26', 'pub_date_card': {'ru': '26 июня', 'en': 'June 26', 'zh': '6月26日'}, 'hash': '7b2c8a6e0318d8c1', 'github_url': '', 'github_stars': 0, 'authors': ['Peiwen Zhang', 'Yufan Deng', 'Shangkun Sun', 'Juncheng Ma', 'Duomin Wang', 'Jonas Du', 'Zilin Pan', 'Ye Huang', 'Hao Liang', 'Songyan Huang', 'Ruihua Zhang', 'Enze Xie', 'Ming-Yu Liu', 'Daquan Zhou'], 'affiliations': ['NVIDIA', 'Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2606.28128.jpg', 'data': {'categories': ['#optimization', '#agents', '#games', '#training', '#3d'], 'emoji': '🤖', 'ru': {'title': 'Физическая консистентность для генерации видео', 'desc': 'Статья представляет метод PhysisForcing для улучшения генерации видео с учетом физических законов. Этот метод использует потерю выравнивания на уровне пикселей и семантики для обеспечения физической консистентности в моделях видео. В результате экспериментов показано, что PhysisForcing значительно повышает качество воссоздания движений и взаимодействий объектов. Это может привести к лучшим результатам в робототехнике и симуляции мира.'}, 'en': {'title': 'Enhancing Video Generation with Physical Consistency', 'desc': 'PhysisForcing is a novel framework that enhances video generation by ensuring physical consistency in the generated content. It achieves this through two main techniques: pixel-level trajectory alignment and semantic-level relational alignment, which help to correct unrealistic movements and interactions in the videos. The framework was tested extensively and showed significant improvements in embodied video generation, outperforming existing models on various benchmarks. Additionally, it demonstrated better performance in robotic manipulation tasks, indicating that physically aligned video models can provide stronger representations for real-world applications.'}}}, {'id': 'https://huggingface.co/papers/2606.28133', 'title': 'Translation as a Bridging Action: Transferring Manipulation Skills from Humans to Robots', 'url': 'https://huggingface.co/papers/2606.28133', 'abstract': 'Abstract Human manipulation skills are transferred to robots more effectively by using a bridging action representation based on relative wrist translation in the initial head-camera frame, combined with a vision-language-action model that handles embodiment differences through interleaved action tokens and attention masking.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We study whether we can learn novel manipulation skills from human actions to a bi-manual robot with parallel grippers. Human action data is cheap, abundant, and diverse, making it one of the most promising resources for scaling up robot learning. Yet transferring skills from humans to robots remains hard: most prior work treats humans as just another bi-manual 6DoF embodiment, where hand-pose estimates are noisy and the contact patterns of human fingers differ fundamentally from those of a parallel gripper. We argue that learning rotation-inclusive action signals from human data is therefore sub-optimal, and instead propose a bridging action representation: the relative wrist translation within the initial head-camera frame, an action space shared by humans and robots. To handle the potential absence of certain action components in different embodiments, we build a π_0-like vision-language-action model with interleaved action tokens and attention masking. On a suite of novel bi-manual manipulation tasks, our bridging action transfers human manipulation knowledge to robots far more effectively than noisy 6DoF human actions and scales with the amount of human data.', 'score': 32, 'issue_id': 2743, 'pub_date': '2026-06-26', 'pub_date_card': {'ru': '26 июня', 'en': 'June 26', 'zh': '6月26日'}, 'hash': '302a4c0fc49f73d2', 'github_url': '', 'github_stars': 0, 'authors': ['Sijin Chen', 'Kaixuan Jiang', 'Haixin Shi', 'Yanhui Wang', 'Weiheng Zhong', 'Haosheng Li', 'Bo Jiang', 'Yuxiao Liu', 'Xihui Liu'], 'affiliations': ['ByteDance', 'HKU-MMLab'], 'pdf_title_img': 'assets/pdf/title_img/2606.28133.jpg', 'data': {'categories': ['#optimization', '#transfer_learning', '#robotics', '#agents'], 'emoji': '🤖', 'ru': {'title': 'Эффективная передача навыков манипуляции от человека к роботу', 'desc': 'В данной статье рассматривается, как передавать навыки манипуляции от человека к роботам с помощью нового метода представления действий. Мы предлагаем использовать относительный перевод запястья в начальной рамке камеры, чтобы облегчить передачу знаний. Это позволяет лучше справляться с различиями в телесных формах и облегчает обучение новых манипуляционных навыков. Тесты показывают, что наш подход значительно эффективнее, чем традиционные методы, использующие только данные о движениях рук человека.'}, 'en': {'title': 'Bridging Human Skills to Robots: A New Action Representation', 'desc': 'This paper presents a method for transferring human manipulation skills to robots using a new action representation based on relative wrist translation. It highlights the challenges of using traditional 6DoF human action data due to noise and differences in finger contact patterns. The authors propose a vision-language-action model that incorporates interleaved action tokens and attention masking to address these embodiment differences. Their approach shows improved effectiveness in teaching robots novel manipulation tasks by leveraging abundant human action data.'}}}, {'id': 'https://huggingface.co/papers/2606.27608', 'title': 'Qwen-Image-2.0-RL Technical Report', 'url': 'https://huggingface.co/papers/2606.27608', 'abstract': 'Abstract A reinforcement learning and on-policy distillation approach enhances the visual quality and instruction-following capabilities of a diffusion model for image generation and editing tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present Qwen-Image-2.0-RL, a post-training pipeline that applies reinforcement learning from human feedback (RLHF) and on-policy distillation (OPD) to improve both the visual quality and instruction-following capability of the Qwen-Image-2.0 diffusion model. To provide reliable reward signals, we construct task-specific composite reward models by fine-tuning vision-language models with a pointwise scoring paradigm and chain-of-thought reasoning. For text-to-image generation, the reward models cover alignment, aesthetics, and portrait fidelity dimensions. For image editing tasks, the reward system addresses instruction-following accuracy and face identity preservation. Building on this reward system, we develop a scalable GRPO-based RL training framework, incorporating a hybrid classifier-free guidance (CFG) strategy to preserve pre-trained knowledge, prompt curation via intra-group reward range filtering, and per-category reward weight calibration. To merge the task-specialized RL policies for T2I and editing, we propose on-policy distillation as the final training stage, which consolidates multiple teachers into a single student model through trajectory-level velocity matching. Extensive evaluation shows that Qwen-Image-2.0-RL achieves 57.84 overall score on Qwen-Image-Bench (+2.61 over the base model), Elo ratings of 1193 in text-to-image arena (+78) and 1349 in image edit arena (+93), demonstrating consistent gains in aesthetic quality, prompt adherence, and editing accuracy.', 'score': 26, 'issue_id': 2742, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '87f35e31f4427bf6', 'github_url': '', 'github_stars': 0, 'authors': ['Yixian Xu', 'Kaiyuan Gao', 'Yuxiang Chen', 'Yilei Chen', 'Zecheng Tang', 'Zihao Liu', 'Zikai Zhou', 'Deqing Li', 'Hao Meng', 'Kuan Cao', 'Jiahao Li', 'Jie Zhang', 'Liang Peng', 'Lihan Jiang', 'Ningyuan Tang', 'Shengming Yin', 'Tianhe Wu', 'Xiaoyue Chen', 'Yan Shu', 'Yanran Zhang', 'Yi Wang', 'Yu Wu', 'Yujia Wu', 'Zekai Zhang', 'Zhendong Wang', 'Xiao Xu', 'Kun Yan', 'Chenfei Wu'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.27608.jpg', 'data': {'categories': ['#reinforcement_learning', '#diffusion', '#benchmark', '#training', '#rlhf', '#alignment'], 'emoji': '🎨', 'ru': {'title': 'Улучшение визуального качества и следования инструкциям с помощью RL!', 'desc': 'В статье представлена новая методика улучшения визуального качества и способности следования инструкциям модели диффузии для генерации и редактирования изображений. Используя обучение с подкреплением от обратной связи человека (RLHF) и дистилляцию на основе политики, авторы разработали модель Qwen-Image-2.0-RL, которая демонстрирует лучшие результаты по сравнению с предыдущими версиями. Для создания надежных сигналов награды были использованы специальные модели награды, учитывающие различные аспекты качества изображений. Эксперименты показали значительные улучшения в эстетике, точности следования инструкциям и сохранении идентичности лиц в редактируемых изображениях.'}, 'en': {'title': 'Enhancing Image Generation with Reinforcement Learning', 'desc': 'This paper presents Qwen-Image-2.0-RL, a method that uses reinforcement learning from human feedback (RLHF) and on-policy distillation (OPD) to enhance a diffusion model for generating and editing images. The approach improves visual quality and the ability to follow instructions by creating task-specific reward models that evaluate alignment, aesthetics, and fidelity. A scalable training framework is developed, incorporating techniques like classifier-free guidance and reward calibration to maintain pre-trained knowledge. The results show significant improvements in performance metrics, indicating better aesthetic quality and adherence to prompts in both text-to-image generation and image editing tasks.'}}}, {'id': 'https://huggingface.co/papers/2606.27378', 'title': 'Formalizing Latent Thoughts: Four Axioms of Thought Representation in LLMs', 'url': 'https://huggingface.co/papers/2606.27378', 'abstract': 'Abstract An axiomatic evaluation framework reveals systematic failures in latent thought representations of LLMs across multiple reasoning tasks, demonstrating that current representations fail to satisfy fundamental functional axioms consistently across different model architectures.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce an axiomatic evaluation framework for latent thought representations in LLMs, comprising metrics that are independent of downstream benchmark scores and reveal representational failures that benchmark accuracy masks. Existing evaluations conflate representation quality with model capacity. Therefore, failures cannot be attributed to the representation rather than to the model that processes it. We formalize four functional axioms (Causality, Minimality, Separability, and Stability) and define a quantitative measure for each, computed directly on the representation independently of downstream accuracy. We audit open-weight LLMs across 23 reasoning tasks (e.g., Spatial Reasoning, Factual QA). We find that no candidate satisfies all four axioms simultaneously, that the representations distinguish task type reliably but cannot distinguish between two questions within the same task, and that the representations encode little information beyond what is already present in the input embedding. The failure is consistent across dense, reasoning-distilled, and RL-trained model families, indicating that the gap is structural rather than a property of model size or training procedure.', 'score': 24, 'issue_id': 2742, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '9c6271426211040d', 'github_url': '', 'github_stars': 0, 'authors': ['Fahd Seddik', 'Fatemeh Fard'], 'affiliations': ['Department of Computer Science University of British Columbia Kelowna, BC, Canada'], 'pdf_title_img': 'assets/pdf/title_img/2606.27378.jpg', 'data': {'categories': ['#architecture', '#benchmark', '#training', '#interpretability', '#reasoning'], 'emoji': '🤖', 'ru': {'title': 'Проблемы скрытых представлений в LLM: структура важнее размера', 'desc': 'В данной работе представлена аксиоматическая оценочная структура для анализа скрытых представлений в LLM, которая демонстрирует систематические недостатки в их работе при решении различных задач. Авторы формализуют четыре функциональных аксиомы (Причинность, Минимальность, Разделимость и Стабильность) и предлагают количественные метрики для их оценки. Исследование показывает, что ни одна из моделей не удовлетворяет всем аксиомам одновременно, а представления не способны эффективно различать вопросы в рамках одной задачи. Эти недостатки остаются актуальными для различных архитектур моделей, что указывает на структурную природу проблемы, а не на размер модели или метод обучения.'}, 'en': {'title': 'Unveiling Structural Flaws in LLM Representations', 'desc': 'This paper introduces a new framework to evaluate the latent thought representations in large language models (LLMs) using four key functional axioms: Causality, Minimality, Separability, and Stability. The authors demonstrate that current LLM representations often fail to meet these axioms across various reasoning tasks, revealing issues that standard benchmark scores do not capture. By analyzing 23 reasoning tasks, they find that no model satisfies all four axioms at once, indicating a structural problem in how these models represent information. The study highlights that existing evaluations mix representation quality with model capacity, leading to misleading conclusions about model performance.'}}}, {'id': 'https://huggingface.co/papers/2606.28057', 'title': 'MultiHashFormer: Hash-based Generative Language Models', 'url': 'https://huggingface.co/papers/2606.28057', 'abstract': 'Abstract MultiHashFormer enables hash-based autoregression in language models by representing tokens as hash signatures processed through a Hash Encoder and Hash Decoder within a Transformer framework.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Language models (LMs) represent tokens using embedding matrices that scale linearly with the vocabulary size. To constrain the parameter footprint, prior work proposes hashing many tokens into a single vector within encoder-only models. While this offers parameter efficiency, many-to-one collisions prevent its use in causal LMs. In this paper, we propose MultiHashFormer, a new framework that allows hash-based autoregression. Each token is represented as a unique hash signature, a short sequence of discrete hash IDs, generated by multiple independent hash functions. A Hash Encoder compresses this signature into a single latent vector for processing by a Transformer decoder. Then, a Hash Decoder generates the hash signature of the next token, which is then mapped back to text. We evaluate our approach at the 100M, 1B and 3B parameter scales, demonstrating that MultiHashFormer consistently outperforms standard Transformer LMs across multiple benchmarks. Furthermore, we show that our model handles multilingual vocabulary expansion with a constant parameter footprint without any modifications.', 'score': 16, 'issue_id': 2744, 'pub_date': '2026-06-26', 'pub_date_card': {'ru': '26 июня', 'en': 'June 26', 'zh': '6月26日'}, 'hash': 'b62dd671d9113052', 'github_url': '', 'github_stars': 0, 'authors': ['Huiyin Xue', 'Atsuki Yamaguchi', 'Nikolaos Aletras'], 'affiliations': ['School of Computer Science, University of Sheffield, United Kingdom'], 'pdf_title_img': 'assets/pdf/title_img/2606.28057.jpg', 'data': {'categories': ['#multilingual', '#optimization', '#architecture', '#benchmark', '#compression'], 'emoji': '🗣️', 'ru': {'title': 'Эффективная автогрессия с MultiHashFormer', 'desc': 'MultiHashFormer представляет новую архитектуру для языковых моделей, позволяющую использовать хеширование для автогрессии. Каждый токен представлен уникальной хеш-подписью, которая обрабатывается через хеш-энкодер и хеш-декодер в рамках трансформера. Это позволяет снизить количество параметров модели, сохраняя при этом точность и эффективность работы. Мы показали, что MultiHashFormer превосходит стандартные трансформеры на различных benchmarks, демонстрируя возможность работы с многоязычными расширениями словаря без увеличения параметров.'}, 'en': {'title': 'Efficient Hash-Based Autoregression in Language Models', 'desc': 'MultiHashFormer introduces a novel approach to autoregression in language models by using hash signatures to represent tokens. This method employs a Hash Encoder and Hash Decoder within a Transformer architecture, allowing for efficient processing of token representations. By generating unique hash signatures through multiple independent hash functions, the model reduces the parameter footprint while maintaining performance. Our evaluations show that MultiHashFormer outperforms traditional Transformer models across various benchmarks, even accommodating multilingual vocabulary without increasing parameters.'}}}, {'id': 'https://huggingface.co/papers/2606.22873', 'title': 'SingGuard: A Policy-Adaptive Multimodal LLM Guardrail with Dynamic Reasoning', 'url': 'https://huggingface.co/papers/2606.22873', 'abstract': 'Abstract SingGuard is a policy-adaptive multimodal guardrail system that evaluates safety in real-time conversations by dynamically applying natural-language rules through fast-to-slow reasoning modes.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Vision-language models (VLMs) are increasingly deployed in consumer, medical, financial, and enterprise applications. This broad deployment expands the safety surface: risks can arise from multimodal question answering, assistant responses, and cross-modal composition, while moderation policies may vary across products, regions, and deployment stages. Most existing guardrails either rely on fixed taxonomies or target only a narrow set of interaction settings, which limits their adaptability when safety rules change at deployment time. We present SingGuard, a policy-adaptive multimodal guardrail model family for safety assessment in multimodal conversations. SingGuard treats the active policy as a runtime input: given natural-language rules, it checks the target content against the active policy rule by rule and predicts both the safety label and the triggered rule. To balance efficiency and interpretability, SingGuard supports fast, hybrid, and slow inference regimes along a fast-to-slow reasoning spectrum, ranging from direct safety judgments to policy-grounded deliberation. We further optimize this behavior with fast--slow decoupled reinforcement learning. We also introduce SingGuard-Bench, a multimodal guardrail benchmark with 56{,}340 examples spanning 80+ fine-grained risk types across multimodal QA, adversarial attack, and dynamic-rule evaluation settings, including cross-modal joint-risk cases where each modality is harmless in isolation but their composition implies unsafe intent. Across six benchmark families (35 datasets), SingGuard achieves state-of-the-art average F1 in every family. Dynamic-rule evaluation further shows improved policy-following accuracy from 0.6465 to 0.7415 under runtime policy shifts. Our code is available at https://github.com/inclusionAI/Sing-Guard.', 'score': 11, 'issue_id': 2742, 'pub_date': '2026-06-22', 'pub_date_card': {'ru': '22 июня', 'en': 'June 22', 'zh': '6月22日'}, 'hash': '24e898de0c5add80', 'github_url': '', 'github_stars': 0, 'authors': ['SingGuard Team'], 'affiliations': ['AI Security Lab, Ant Group'], 'pdf_title_img': 'assets/pdf/title_img/2606.22873.jpg', 'data': {'categories': ['#optimization', '#benchmark', '#interpretability', '#multimodal', '#agent_memory', '#rl', '#security'], 'emoji': '🛡️', 'ru': {'title': 'Безопасность в многомодальных разговорах с SingGuard', 'desc': 'SingGuard — это адаптивная многомодальная система защиты, которая в реальном времени оценивает безопасность в разговорах, динамически применяя правила на естественном языке. Она использует правила безопасности для проверки контента и предсказания метки безопасности в зависимости от активной политики. Система балансирует между эффективностью и интерпретацией, поддерживая различные режимы вывода, от быстрого до медленного. SingGuard также включает новый бенчмарк для оценки безопасности с множеством примеров, обхватывающих разные типы рисков в многомодальных взаимодействиях.'}, 'en': {'title': 'Dynamic Safety for Multimodal Conversations', 'desc': 'SingGuard is a multimodal guardrail system designed to ensure safety during real-time conversations by adapting to changing policies. It utilizes natural-language rules and operates on a fast-to-slow reasoning spectrum, allowing for both quick safety assessments and more thorough deliberations. The system evaluates content against active safety policies, predicting safety labels and identifying triggered rules. With the introduction of SingGuard-Bench, it demonstrates superior performance across various risk types and achieves state-of-the-art results in safety assessments.'}}}, {'id': 'https://huggingface.co/papers/2606.26015', 'title': 'The Tatoxa System for Text Detoxification in Low-Resource Languages: The Case of Tatar', 'url': 'https://huggingface.co/papers/2606.26015', 'abstract': 'Abstract Tatoxa is a state-of-the-art text detoxification system for the Tatar language that demonstrates superior performance over existing LLMs and highlights the challenges of cross-lingual transfer in low-resource settings.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Text detoxification, the automated detection and mitigation of abusive and harmful content, is essential for ensuring the safety of online communities and protecting users. However, low resource languages such as Tatar have received little research attention. In this paper we present Tatoxa, a novel state-of-the-art system for text detoxification in the Tatar language. Comparative experiments show that the proposed approach outperforms existing open source and proprietary commercial LLMs on key quality metrics. We also introduce a new dataset for text detoxification in Tatar, designed for fine tuning and evaluation in low resource settings. Finally, cross lingual transfer experiments indicate that transfer from other languages, including the culturally close Russian, performs significantly worse than training on native Tatar data even when a large Russian corpus is available.', 'score': 8, 'issue_id': 2744, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '01eb5f860a3703bc', 'github_url': '', 'github_stars': 0, 'authors': ['Ilseyar Alimova', 'Bogdan Monogov', 'Artyom Mazur', 'Daniil Antonov', 'Vsevolod Karimov', 'Vitaliy Egorov', 'Bulat Khakimov', 'Alexander Panchenko'], 'affiliations': ['AIRI', 'HSE', 'ITMO', 'Institute of Applied Semiotics Tatarstan Academy of Sciences', 'Kazan Federal University', 'Skoltech'], 'pdf_title_img': 'assets/pdf/title_img/2606.26015.jpg', 'data': {'categories': ['#multilingual', '#open_source', '#low_resource', '#transfer_learning', '#dataset'], 'emoji': '🛡️', 'ru': {'title': 'Tatoxa: Детоксикация текста для татарского языка', 'desc': 'В статье представлена система текстовой детоксикации Tatoxa для татарского языка, которая демонстрирует выдающиеся результаты по сравнению с существующими LLM. Работа подчеркивает сложности межъязыкового переноса в условиях недостатка ресурсов. Tatoxa обеспечивает автоматическое обнаружение и смягчение оскорбительного и вредного контента, что важно для безопасности онлайн-сообществ. Также в статье представлен новый датасет для текстовой детоксикации на татарском языке, который предназначен для тонкой настройки и оценки моделей в условиях ограниченных ресурсов.'}, 'en': {'title': 'Empowering Tatar: Advanced Text Detoxification with Tatoxa', 'desc': 'Tatoxa is an advanced text detoxification system specifically designed for the Tatar language, showcasing its effectiveness compared to existing large language models (LLMs). It addresses the critical need for automated detection and reduction of harmful content to ensure safer online environments. The paper highlights the challenges faced in low-resource languages like Tatar, which have been largely overlooked in research. Through comparative experiments, Tatoxa demonstrates superior performance and introduces a new dataset tailored for fine-tuning and evaluation in these settings.'}}}, {'id': 'https://huggingface.co/papers/2606.28187', 'title': 'GBC: Gradient-Based Connections for Optimizing Multi-Agent Systems', 'url': 'https://huggingface.co/papers/2606.28187', 'abstract': "Abstract Gradient-Based Connections enables fine-grained attribution and optimization in multi-agent systems by modeling agent interactions as a computational graph and using gradient-based weights to identify error sources at the token level.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multi-agent systems (MAS) built on large language models (LLMs) provide a promising framework for solving complex tasks through role specialization and structured interaction. However, their performance is often limited by miscoordination and, more fundamentally, the lack of fine-grained credit assignment across agents. Existing approaches typically rely on coarse-grained feedback, making it difficult to identify which agents or interaction steps are responsible for errors. We propose Gradient-Based Connections (GBC), an approach for fine-grained attribution and optimization of multi-agent systems. GBC models a MAS as a computational graph and introduces gradient-based connection weights to quantify the influence of each agent's output on downstream agents at the token level. By constructing an attribution graph and propagating task-specific loss signals backward, our method enables precise identification of error sources and targeted prompt optimization. We further develop AgentChord, an efficient implementation that leverages prefix-based gradient computation. Experiments on MultiWOZ and τ-bench show that GBC improves multi-agent performance and outperforms strong single-agent and multi-agent baselines, and higher attribution quality is associated with greater optimization effectiveness. Code is available at: https://github.com/yxc-cyber/AgentChord.", 'score': 7, 'issue_id': 2743, 'pub_date': '2026-06-26', 'pub_date_card': {'ru': '26 июня', 'en': 'June 26', 'zh': '6月26日'}, 'hash': 'f912eef57b18e851', 'github_url': '', 'github_stars': 0, 'authors': ['Xiaocheng Yang', 'Abdulrahman Alrabah', 'Dilek Hakkani-Tür', 'Gokhan Tur'], 'affiliations': ['University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2606.28187.jpg', 'data': {'categories': ['#games', '#optimization', '#training', '#graphs', '#agents'], 'emoji': '🔗', 'ru': {'title': 'Новая эра в оптимизации многоагентных систем', 'desc': 'Статья предлагает метод Gradient-Based Connections (GBC), который позволяет более точно определять источники ошибок и оптимизировать взаимодействия в многоагентных системах, используя графы вычислений. GBC моделирует систему как граф и применяет градиентные веса для оценки влияния выходов агентов на других агентов на уровне токенов. Это позволяет точно выявлять ошибки и улучшатьPrompt-оптимизацию. Эксперименты показывают, что GBC значительно повышает производительность многоагентных систем по сравнению с традиционными подходами.'}, 'en': {'title': 'Enhancing Multi-Agent Systems with Fine-Grained Attribution', 'desc': 'This paper introduces Gradient-Based Connections (GBC), a method for improving multi-agent systems (MAS) by providing fine-grained attribution and optimization. GBC models agent interactions as a computational graph, allowing for precise identification of error sources at the token level through gradient-based weights. By constructing an attribution graph and propagating loss signals, GBC enhances the performance of MAS by enabling targeted prompt optimization. Experiments demonstrate that GBC outperforms existing methods, leading to better coordination and effectiveness in complex tasks.'}}}, {'id': 'https://huggingface.co/papers/2606.27974', 'title': 'ProMSA:Progressive Multimodal Search Agents for Knowledge-Based Visual Question Answering', 'url': 'https://huggingface.co/papers/2606.27974', 'abstract': 'Abstract A progressive multimodal search agent for knowledge-based visual question answering that adaptively selects search strategies and optimizes through sequence-level reinforcement learning.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Knowledge-based Visual Question Answering (KB-VQA) requires models to combine image understanding with external knowledge. Most prior methods use a fixed retrieve-then-generate pipeline with a pre-selected retriever and a static top-k setting, which is not adaptive during reasoning. We propose ProMSA, a progressive multimodal search agent for KB-VQA. Given an image-question pair, the agent iteratively chooses image search, text search, or stop, under explicit tool-call budgets and with deduplication to avoid redundant retrieval. For training, we first use rejection-sampling SFT to learn valid tool-use formats, then optimize the agent with TN-GSPO, a sequence-level RL objective that normalizes updates by both generation length and tool-interaction depth. Experiments on E-VQA and InfoSeek show consistent gains over strong RAG and agent baselines, and improved retrieval and end-to-end accuracy. The code is available at https://github.com/DingWu1021/Promsa.', 'score': 7, 'issue_id': 2742, 'pub_date': '2026-06-26', 'pub_date_card': {'ru': '26 июня', 'en': 'June 26', 'zh': '6月26日'}, 'hash': '4200b1d9f20c725f', 'github_url': '', 'github_stars': 0, 'authors': ['ZhengXian Wu', 'Hangrui Xu', 'Kai Shi', 'Zhuohong Chen', 'Yunyao Yu', 'Chuanrui Zhang', 'Zirui Liao', 'Jun Yang', 'Zhenyu Yang', 'Haonan Lu', 'Haoqian Wang'], 'affiliations': ['Nanyang Technological University, Singapore', 'OPPO AI Center, OPPO Inc. China', 'The Shenzhen International Graduate School, Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.27974.jpg', 'data': {'categories': ['#retrieval', '#optimization', '#agents', '#games', '#rag', '#multimodal', '#rl', '#tool_use'], 'emoji': '🔍', 'ru': {'title': 'Адаптивный поиск для вопросов на основе изображений', 'desc': 'В данной работе представлен прогрессивный мультимодальный поисковый агент ProMSA для знания-основанного визуального вопросно-ответного взаимодействия (KB-VQA). Он адаптивно выбирает стратегии поиска и использует обучение с подкреплением на уровне последовательности для оптимизации. В отличие от традиционных методов, которые используют фиксированные схемы, данный агент итеративно выбирает между поиском по изображению, текстом или завершением процесса, избегая избыточного извлечения. Эксперименты показали значительные улучшения в точности извлечения и конечного ответа по сравнению с существующими моделями.'}, 'en': {'title': 'Adaptive Search for Smarter Visual Question Answering', 'desc': 'This paper introduces ProMSA, a progressive multimodal search agent designed for knowledge-based visual question answering (KB-VQA). Unlike traditional methods that rely on a fixed pipeline, ProMSA adaptively selects between image search, text search, or stopping based on the context of the question and image. The agent is trained using a combination of rejection-sampling supervised fine-tuning and sequence-level reinforcement learning to optimize its search strategies. Experiments demonstrate that ProMSA outperforms existing retrieval-augmented generation models in both retrieval and overall accuracy.'}}}, {'id': 'https://huggingface.co/papers/2606.28276', 'title': 'SimFoundry: Modular and Automated Scene Generation for Policy Learning and Evaluation', 'url': 'https://huggingface.co/papers/2606.28276', 'abstract': 'Abstract SimFoundry enables zero-shot real-world robot policy training through automated simulation construction and diverse scene variations that improve generalization and performance prediction.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Training and evaluating robot policies in the real world is costly and difficult to scale. We introduce SimFoundry, a modular and automated system for zero-shot real-to-sim scene construction from a video. SimFoundry generates sim-ready digital twins and supports object, scene, and task editing, enabling the automated generation of diverse digital cousins: affordance-preserving variations of reconstructed real-world scenes. Policies trained on SimFoundry data transfer zero-shot to challenging real tasks involving multi-step manipulation, articulated object interaction, and bimanual interaction, and its digital cousins (variations of the original scene, objects, and tasks) facilitate generalization to new real-world conditions. Across 7 manipulation tasks and 5 policy architectures, SimFoundry simulation evaluations strongly predict real-world performance, with mean Pearson correlation 0.911 and mean maximum ranking violation 0.018. When evaluating sim-trained policies zero-shot in the real world, policies trained with object, scene, and task cousins in simulation show average task success rate improvements of 17%, 21%, and 40%, respectively. Additional details at https://research.nvidia.com/labs/gear/simfoundry/ .', 'score': 6, 'issue_id': 2742, 'pub_date': '2026-06-26', 'pub_date_card': {'ru': '26 июня', 'en': 'June 26', 'zh': '6月26日'}, 'hash': 'bdb23848f5981002', 'github_url': '', 'github_stars': 0, 'authors': ['Nadun Ranawaka', 'Josiah Wong', 'Wei-Lin Pai', 'Wei-Teng Chu', 'Tianyuan Dai', 'Masoud Moghani', 'Hang Yin', 'Yunfan Jiang', 'Wesley Durbano', 'Brandon Huynh', 'Yu Fang', 'Linxi Fan', 'Danfei Xu', 'Ruohan Zhang', 'Li Fei-Fei', 'Bowen Wen', 'Ajay Mandlekar', 'Yuke Zhu'], 'affiliations': ['Georgia Institute of Technology', 'NVIDIA', 'Stanford University', 'The University of Texas at Austin', 'University of Toronto'], 'pdf_title_img': 'assets/pdf/title_img/2606.28276.jpg', 'data': {'categories': ['#optimization', '#transfer_learning', '#agents', '#training', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Автоматизация обучения роботов в реальных условиях', 'desc': 'SimFoundry — это система для автоматической генерации симуляций, которая позволяет обучать политики роботов без необходимости в реальных данных. Она создаёт цифровые двойники реальных сцен и поддерживает редактирование объектов и задач, что улучшает обобщение и предсказание производительности. Политики, обученные с использованием данных SimFoundry, успешно применяются в сложных реальных задачах с многошаговыми манипуляциями и взаимодействием с объектами. Исследование показывает, что использование цифровых вариаций сцен улучшает результаты выполнения задач в реальном мире.'}, 'en': {'title': 'Train Robots in Simulation, Succeed in Reality', 'desc': "SimFoundry is a system that allows robots to learn how to perform tasks in the real world without needing extensive real-world training. It creates digital versions of real scenes from videos, which helps in training robot policies in a simulated environment. By generating variations of these scenes, SimFoundry improves the robots' ability to adapt to new situations. The system has shown strong predictions of real-world performance, with significant improvements in task success rates for robots trained using its simulations."}}}, {'id': 'https://huggingface.co/papers/2606.27978', 'title': 'Parallel Rollout Approximation for Pixel-Space Autoregressive Image Generation', 'url': 'https://huggingface.co/papers/2606.27978', 'abstract': 'Abstract Parallel Rollout Approximation (PRA) addresses limitations in pixel-space autoregressive image generation by using low-dimensional intermediate states and parallel training to improve quality and efficiency.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Pixel-space continuous-token autoregressive (AR) generation directly models images as sequences of raw pixel patches, avoiding discrete tokenization or a separately pretrained tokenizer. However, it faces coupled challenges: high-dimensional patch generation causes large single-step errors, and teacher-forced training creates a train--inference gap that makes these errors accumulate across AR steps. Existing fixes such as x-prediction and input noise injection only partially mitigate these issues. Exact rollout training better matches inference-time conditions, but is impractical due to prohibitively slow sequential sampling. We propose Parallel Rollout Approximation (PRA), a scalable framework that addresses both challenges jointly. PRA generates low-dimensional intermediate states instead of high-dimensional pixel patches, then maps them back to pixel-space tokens with a pixel decoder, preserving a pixel-in, pixel-out AR interface. It also constructs inference-like pixel inputs through the same intermediate-state-to-pixel path used at inference, independently across positions, approximating the pixel-feedback interface encountered during inference-time rollout while retaining parallel teacher-forced training. On class-conditional ImageNet-1K generation at 256times256 resolution, PRA-S with 135M parameters achieves an FID of 2.58, surpassing the previous billion-scale pixel-space AR result of 3.60. Scaling to PRA-L with 511M parameters further improves FID to 1.94, establishing a new state of the art among pixel-space AR models. Beyond generation, PRA achieves higher ImageNet classification probing accuracy than other AR and diffusion baselines, suggesting its potential for unified pixel-space image generation and understanding.', 'score': 4, 'issue_id': 2744, 'pub_date': '2026-06-26', 'pub_date_card': {'ru': '26 июня', 'en': 'June 26', 'zh': '6月26日'}, 'hash': 'd72cf0e0894ff92e', 'github_url': '', 'github_stars': 0, 'authors': ['Jiayi Xu', 'Di He', 'Guolin Ke'], 'affiliations': ['DP Technology', 'Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2606.27978.jpg', 'data': {'categories': ['#optimization', '#training', '#architecture', '#games'], 'emoji': '🖼️', 'ru': {'title': 'Новые горизонты в генерации изображений с PRA', 'desc': 'В работе представлено решение проблемы генерации изображений в пиксельном пространстве с использованием метода под названием Parallel Rollout Approximation (PRA). Он сочетает в себе низкоразмерные промежуточные состояния и параллельное обучение, что улучшает качество и эффективность генерации. PRA позволяет избежать ошибок, связанных с высоким размером патчей, и сокращает разрыв между обучением и инференсом. Результаты показывают, что PRA достигает новых рекордов в генерации изображений и классификации на наборе данных ImageNet.'}, 'en': {'title': 'Revolutionizing Image Generation with Parallel Rollout Approximation', 'desc': 'The paper introduces Parallel Rollout Approximation (PRA), a method that enhances pixel-space autoregressive image generation by using low-dimensional intermediate states and enabling parallel training. This approach addresses the issues of high-dimensional patch generation and the train-inference gap that leads to error accumulation. PRA generates intermediate states that are then converted back to pixel-space tokens, allowing for efficient training while mimicking inference conditions. The results show that PRA significantly improves image generation quality, achieving state-of-the-art performance on ImageNet-1K and demonstrating its potential for both image generation and classification tasks.'}}}, {'id': 'https://huggingface.co/papers/2606.27163', 'title': 'Learning to Fold: prizewinning solution at LeHome Challenge 2026 (1st place online, 2nd offline)', 'url': 'https://huggingface.co/papers/2606.27163', 'abstract': 'Abstract A vision-language-action policy improved with reinforcement learning uses shared network predictions for success estimation and advantage calculation in bimanual garment folding, employing established RL techniques with novel optimization and deployment strategies.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct I describe my solution to the LeHome Challenge 2026, an ICRA 2026 competition on bimanual garment folding. The system placed 1st of 62 teams in the online (simulation) round and 2nd in the real-world final. It improves a vision-language-action (VLA) policy with a reinforcement-learning loop. The policy is its own value function: the same network that predicts actions also predicts success, progress, and a few task-relevant future quantities, and those predictions drive advantage estimation, live failure detection, and candidate selection. The work mostly recombines existing RL ideas with engineering and optimization contributions that can be used together as one recipe or individually: AWR + RECAP combined for flow-matching VLA; an asynchronous distributed training / rollout pipeline through HuggingFace Hub; inference-time hyperparameters optimization via Thompson sampling; a sim-to-real recipe with camera-alignment tooling, heavy augmentation and DAgger-like HIL data collection.', 'score': 4, 'issue_id': 2743, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '6cd28597250c47d0', 'github_url': '', 'github_stars': 0, 'authors': ['Ilia Larchenko'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.27163.jpg', 'data': {'categories': ['#inference', '#rl', '#games', '#optimization', '#training', '#agents'], 'emoji': '👗', 'ru': {'title': 'Эффективное складывание одежды с помощью ИИ', 'desc': 'В данной статье представлена улучшенная политика взаимодействия между зрением и языком с использованием методов обучения с подкреплением для складывания одежды двумя руками. Система использует общие предсказания сети для оценки успеха и расчета преимущества. Она продемонстрировала высокие результаты, заняв 1-е место среди 62 команд в онлайн-раунде и 2-е место в финале. Основная идея заключается в том, что политика является функцией стоимости, где одна и та же сеть предсказывает действия и успех выполнения задачи.'}, 'en': {'title': 'Reinforcement Learning for Smart Garment Folding', 'desc': 'This paper presents a vision-language-action (VLA) policy enhanced by reinforcement learning (RL) for bimanual garment folding. The approach utilizes a shared network that predicts both actions and success metrics, allowing for effective advantage estimation and real-time failure detection. The system achieved top rankings in a competitive challenge, demonstrating the effectiveness of combining established RL techniques with innovative optimization strategies. Key contributions include a unique training pipeline and methods for optimizing inference parameters, making the solution adaptable and efficient.'}}}, {'id': 'https://huggingface.co/papers/2606.27595', 'title': 'Ko-WideSearch: A Korean Breadth-Search Benchmark for Exhaustive Set Enumeration by Web Agents', 'url': 'https://huggingface.co/papers/2606.27595', 'abstract': "Abstract A Korean web-agent benchmark evaluates breadth of search capabilities by requiring complete enumeration of entity memberships with attribute tables, revealing consistent failures in row recovery despite accurate set identification.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Web-agent benchmarks overwhelmingly measure depth -- pinning one obscure answer behind a chain of constraints -- while breadth, exhaustively enumerating a closed set and filling each item's attributes, is barely evaluated, especially outside English. Breadth is also hard to build: certifying that a gold set is complete and every cell correct is far costlier than checking a single answer. I introduce Ko-WideSearch, a Korean breadth-search benchmark built by an automated synthesize-and-verify pipeline. Each task names a set-parent entity -- a TV season, a dynasty, a league, an administrative region, an election -- and asks for its full membership plus a per-item attribute table, graded by Item-, Column-, and Row-F1. It spans 228 tables over 190 entities and sixteen categories across three difficulty tiers, set by two structural knobs I dial independently -- table width and a 2-D composite key -- so cross-product membership climbs from 0\\% to 100\\% across the tiers. A single normalization-aware comparator is shared between gold construction and grading, so stable date and count columns are not over-dropped on formatting alone. Across twenty web agents, the failure is consistent: agents recover the set but not the rows (e.g.\\ Item-F1 92.8 against Row-F1 53.7), accuracy falls steadily as the knobs harden, and neither more search nor more spend closes the gap. Broken down by cell, the hard part is finding the right value, not formatting it: open-ended free-text cells fail most, while cells with a standard answer such as a date or a name usually come out right.", 'score': 4, 'issue_id': 2742, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '61ae367191bc64c7', 'github_url': '', 'github_stars': 0, 'authors': ['Minbyul Jeong'], 'affiliations': ['Upstage AI'], 'pdf_title_img': 'assets/pdf/title_img/2606.27595.jpg', 'data': {'categories': ['#agents', '#survey', '#benchmark', '#low_resource', '#multilingual'], 'emoji': '📊', 'ru': {'title': 'Проблемы с насыщенностью в поиске данных веб-агентами', 'desc': 'В статье рассматривается новая задача для проверки возможностей веб-агентов в поиске, называемая Ko-WideSearch. Эта задача требует полного перечисления атрибутов различных сущностей, что выявляет проблемы с восстановлением строк, несмотря на правильное определение наборов. Авторы разработали автоматизированный процесс синтеза и проверки для создания этого бенчмарка, охватывающего 228 таблиц по 190 сущностям и 16 категориям. Результаты показывают, что веб-агенты успешно находят наборы, но не могут восстановить строки, что подчеркивает проблемы с качеством данных.'}, 'en': {'title': 'Enhancing Breadth Search in Korean Web Agents', 'desc': 'This paper introduces Ko-WideSearch, a benchmark designed to evaluate the breadth of search capabilities in web agents, particularly in the Korean language. It highlights the challenges of accurately recovering row data in entity membership tables, despite achieving high accuracy in identifying sets. The benchmark consists of 228 tables across various entities and categories, assessing performance using Item-, Column-, and Row-F1 metrics. The findings reveal that while web agents can identify sets effectively, they struggle significantly with row recovery, especially as task complexity increases.'}}}, {'id': 'https://huggingface.co/papers/2511.07397', 'title': 'Thinking While Speaking: Inference-Time Knowledge Transfer for Responsive and Intelligent Conversational Voice Agents', 'url': 'https://huggingface.co/papers/2511.07397', 'abstract': 'Abstract Conversational infill enables small real-time models to maintain responsiveness while integrating delayed reasoning outputs, bridging the gap between latency and capability in voice agents.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Voice agents face a fundamental tension: the reasoning, retrieval, and tool use that make foundation models capable are iterative and slow, while conversational interaction demands responses on a millisecond timescale. Smaller, real-time models meet the latency bar but cannot match foundation models on complex tasks, leaving current voice agents to trade away either responsiveness or capability. We introduce conversational infill, where a small talker model both immediately generates contextually grounded responses to hide the latency of an external reasoner model and fluently integrates streamed reasoner knowledge into its responses during inference. We curate a 290,571-example synthetic dataset spanning six domains and demonstrate that this task is learnable across seven widely used small language models ranging from 135M to 1.7B parameters. Our system implementation, ConvFill, sustains millisecond-level time-to-first-response while closing the accuracy gap to within 6.3% of the corresponding frontier reasoner performance. In a live user study (n=18) with talker deployments running on an Apple M2 SoC, participants rank ConvFill on par with frontier models overall, prefer it for retrieval-heavy tasks, and rate it significantly more responsive. These results show that conversational infill unlocks a new point on the latency-capability Pareto frontier, offering a practical path toward voice agents that are both responsive and highly capable. Code, models, and datasets are available at https://github.com/vysri/conversational-infill.', 'score': 4, 'issue_id': 2743, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': '4c61b536c15c1368', 'github_url': '', 'github_stars': 0, 'authors': ['Vidya Srinivas', 'Zachary Englhardt', 'Shwetak Patel', 'Vikram Iyer'], 'affiliations': ['Paul G. Allen School of Computer Science & Engineering'], 'pdf_title_img': 'assets/pdf/title_img/2511.07397.jpg', 'data': {'categories': ['#games', '#small_models', '#training', '#tool_use', '#dataset', '#agents', '#synthetic'], 'emoji': '🗣️', 'ru': {'title': 'Разговорный инфилл: быстрые и умные голосовые агенты', 'desc': 'Статья описывает метод, называемый conversational infill, который позволяет небольшим моделям в реальном времени сохранять скорость отклика, интегрируя результаты более сложных моделей с задержкой. Это решает проблему, когда традиционные модели медленны в расчетах, но требуют мгновенных ответов в диалогах. В работе представлены результаты, показывающие, что метод обучаем и может значительно улучшить отклики голосовых агентов. Используя созданный синтетический датасет и семь малых языковых моделей, авторы демонстрируют, что нововведение позволяет уменьшить разрыв по точности при высокой скорости отклика.'}, 'en': {'title': 'Bridging Responsiveness and Capability in Voice Agents', 'desc': 'This paper introduces conversational infill, a technique that allows small real-time models to provide quick responses while incorporating delayed reasoning outputs from larger models. It addresses the challenge of balancing responsiveness and capability in voice agents, which often struggle with slow reasoning processes. The authors demonstrate that their approach, implemented in a system called ConvFill, can maintain fast response times while achieving accuracy close to that of larger models. A user study shows that participants find ConvFill both responsive and effective, particularly for tasks requiring information retrieval.'}}}, {'id': 'https://huggingface.co/papers/2606.27771', 'title': 'NormGuard: Reward-Preserving Norm Constraints in Flow-Matching Reinforcement Learning', 'url': 'https://huggingface.co/papers/2606.27771', 'abstract': 'Abstract Reinforcement learning post-training degrades perceptual quality in flow-based generators through velocity norm inflation, which requires training-time intervention rather than inference-time corrections to maintain both reward alignment and image quality.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reinforcement learning (RL) post-training improves the reward alignment of flow-based generators, but often degrades perceptual quality in ways that are not captured by the reward proxy. We identify a simple structural signature of this drift: across three post-training methods (NFT, AWM, DPO), RL fine-tuning inflates the per-step velocity norm |v_θ| by 5% to 15% relative to the reference. A form of norm inflation has been studied in classifier-free guidance (CFG), where rescaling the velocity back to a reference norm at inference time can mitigate the resulting artifacts. However, this inference-time correction does not transfer cleanly to RL: rescaling v_θ to match |v_{ref}| at inference time neither improves reward nor fixes the quality degradation, because the inflation is co-adapted into the model weights. Furthermore, an adjoint sensitivity analysis shows that velocity magnitude rescaling carries no coherent first-order reward signal at the batch level, indicating that suppressing norm inflation is unlikely to remove a consistently reward-carrying component. Since inference-time renormalization fails while norm suppression carries no reward cost, training-time intervention is the appropriate strategy. Together, these findings motivate \\methodname, a hinge penalty that activates only when |v_θ| exceeds |v_{ref}| and composes additively with any velocity-local base loss. Across two base models, three post-training methods, and two reward proxies, \\methodname consistently improves MLLM-judged image quality and forensic realism while preserving reward, with gains that amplify under few-step inference and are not explained by early stopping.', 'score': 3, 'issue_id': 2742, 'pub_date': '2026-06-26', 'pub_date_card': {'ru': '26 июня', 'en': 'June 26', 'zh': '6月26日'}, 'hash': '594812cf5e61271a', 'github_url': '', 'github_stars': 0, 'authors': ['Tianlin Pan', 'Lianyu Pang', 'Cheng Da', 'Huan Yang', 'Changqian Yu', 'Kun Gai', 'Wenhan Luo'], 'affiliations': ['Kuaishou Technology', 'The Hong Kong University of Science and Technology', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2606.27771.jpg', 'data': {'categories': ['#rl', '#training', '#optimization', '#rlhf'], 'emoji': '📉', 'ru': {'title': 'Улучшение качества изображений при обучении с подкреплением', 'desc': 'В данной статье рассматривается влияние обучения с подкреплением на качество изображений, сгенерированных потоковыми генераторами. Пост-тренировочное обучение часто ухудшает восприятие изображений, в то время как выравнивание вознаграждения улучшается. Авторы выявили, что нормы скорости в процессе обучения увеличиваются, что приводит к деградации качества. Предлагается метод, который активируется только в случае превышения норм скорости и улучшает качество изображений без потери вознаграждения.'}, 'en': {'title': '', 'desc': ''}}}, {'id': 'https://huggingface.co/papers/2606.28277', 'title': "Towards Automating Scientific Review with Google's Paper Assistant Tool", 'url': 'https://huggingface.co/papers/2606.28277', 'abstract': 'Abstract AI-assisted scientific review systems like PAT use advanced inference scaling to identify mathematical errors and improve research quality while maintaining human oversight.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Artificial intelligence is driving a revolution in scientific discovery, accelerating everything from hypothesis generation to mathematical theorem proving. However, this rapid acceleration is creating a systemic challenge: traditional human peer review cannot scale to match the influx of AI-assisted science. Ultimately, to resolve this tension, we must also deploy AI to accelerate the verification and review process itself. To frame the discussion around this transition, we propose a taxonomy consisting of four progressive levels of AI-human collaboration in scientific evaluation, and discuss various trade-offs involved with each.   As a step toward this future, we introduce the Paper Assistant Tool (PAT), an agentic AI framework built for deep scientific review and verification. PAT ingests full scientific manuscripts and produces a comprehensive evaluation, checking theoretical results, validating experiments, suggesting improvements, and identifying potential flaws. By utilizing inference scaling techniques, PAT is able to identify deeper issues than a single model call alone, achieving a 34% improvement over zero-shot recall on mathematical errors in the SPOT benchmark. Pilot deployments of PAT as a pre-submission tool for authors at two major Computer Science conferences -- STOC and ICML -- demonstrate its ability to identify critical errors and suggest substantive improvements to research papers. By catching errors early, PAT eases the cognitive burden placed on referees, while preserving their control over the outcomes of the review process.', 'score': 3, 'issue_id': 2742, 'pub_date': '2026-06-26', 'pub_date_card': {'ru': '26 июня', 'en': 'June 26', 'zh': '6月26日'}, 'hash': '113a6fbf447efd17', 'github_url': '', 'github_stars': 0, 'authors': ['Rajesh Jayaram', 'Drew Tyler', 'David Woodruff', 'Corinna Cortes', 'Yossi Matias', 'Vahab Mirrokni', 'Vincent Cohen-Addad'], 'affiliations': ['Carnegie Mellon University, USA', 'Google Research, USA'], 'pdf_title_img': 'assets/pdf/title_img/2606.28277.jpg', 'data': {'categories': ['#inference', '#agents', '#benchmark', '#training', '#agent_memory', '#science', '#math'], 'emoji': '📊', 'ru': {'title': 'AI в науке: улучшение рецензирования и проверки', 'desc': 'Статья описывает систему AI-помощника для научных рецензий под названием Paper Assistant Tool (PAT), которая помогает выявлять математические ошибки и улучшать качество исследований при сохранении контроля со стороны человека. PAT анализирует полные научные манускрипты и предлагает рекомендации по теоретическим результатам, валидирует эксперименты и находит возможные ошибки. Также предлагается таксономия уровней сотрудничества AI и человека в научной оценки, подчеркивающая компромиссы между каждым из уровней. Используя методы масштабирования вывода, PAT демонстрирует значительное улучшение в обнаружении математических ошибок.'}, 'en': {'title': 'Revolutionizing Scientific Review with AI: Introducing PAT', 'desc': 'This paper introduces the Paper Assistant Tool (PAT), an AI framework designed to enhance the scientific review process by identifying mathematical errors and improving research quality. PAT utilizes advanced inference scaling techniques to provide comprehensive evaluations of scientific manuscripts, checking theoretical results and validating experiments. The authors propose a taxonomy of AI-human collaboration levels in scientific evaluation, addressing the challenges posed by the rapid growth of AI-assisted research. Pilot tests at major conferences show that PAT significantly improves error detection and reduces the cognitive load on human referees while maintaining their oversight.'}}}, {'id': 'https://huggingface.co/papers/2606.18953', 'title': 'Object-Centric Residual RL for Zero-Shot Sim-to-Real VLA Enhancement', 'url': 'https://huggingface.co/papers/2606.18953', 'abstract': 'Abstract An object-centric residual reinforcement learning framework improves real-world vision-language-action model robustness through simulation-trained corrective policies that transfer zero-shot despite sim-to-real challenges.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Vision-Language-Action (VLA) models can generalize across diverse manipulation tasks, but their imitation-learning-based policies remain brittle in precise physical interactions due to compounding execution errors; Can a reinforcement learning policy trained purely in simulation improve the robustness of real-world VLAs zero-shot? Residual RL, which learns a corrective policy on top of a frozen VLA, offers a natural framework, but existing approaches face a fundamental sim-to-real dilemma: privileged-state methods require lossy distillation for deployment; image-based methods suffer from the visual domain gap; and real-world RL is costly and unsafe. We propose an object-centric residual RL framework that refines VLA actions using object poses, enabling a compact observation space that transfers consistently between simulation and reality. To align the two domains, we additionally replay the same teleoperation demonstrations in simulation to train a sim counterpart of the real-world VLA. The residual RL policy is trained only in simulation with pose noise injection and dropout, and transfers zero-shot to the real robot. Across five manipulation tasks on a real Franka Research 3 (FR3) robot, our method improves the success rate from 42% to 76% zero-shot, and the improved rollouts can be further reused to retrain the base VLA for self-improvement without additional teleoperation. Project page: https://www.microsoft.com/en-us/research/articles/object-centric-residual-rl/', 'score': 3, 'issue_id': 2743, 'pub_date': '2026-06-17', 'pub_date_card': {'ru': '17 июня', 'en': 'June 17', 'zh': '6月17日'}, 'hash': 'c1c0901945df8997', 'github_url': '', 'github_stars': 0, 'authors': ['Kinam Kim', 'Namiko Saito', 'Heecheol Kim', 'Katsushi Ikeuchi', 'Jaegul Choo', 'Yasuyuki Matsushita'], 'affiliations': ['KAIST, South Korea', 'Microsoft Research Asia - Tokyo, Japan', 'The University of Tokyo, Japan'], 'pdf_title_img': 'assets/pdf/title_img/2606.18953.jpg', 'data': {'categories': ['#rl', '#optimization', '#training', '#transfer_learning', '#agents'], 'emoji': '🤖', 'ru': {'title': 'Устойчивость моделей VLA через объектно-центрированное обучение', 'desc': 'В данной статье представлен объектно-центрированный подход к обучению с подкреплением, который улучшает устойчивость моделей на стыке зрения, языка и действий (VLA) в реальных условиях. Метод использует корректирующую политику, обученную в симуляции, для повышения точности взаимодействий в реальном мире. Это достигается за счет использования поз объектов, что позволяет создать компактное пространство наблюдений, обеспечивающее стабильный перенос между симуляцией и реальностью. Проведенные эксперименты на роботе Franka Research 3 показывают значительное увеличение успешности выполнения задач с 42% до 76% без дополнительного обучения на реальных данных.'}, 'en': {'title': 'Boosting VLA Robustness with Residual RL', 'desc': 'This paper presents an object-centric residual reinforcement learning (RL) framework that enhances the robustness of vision-language-action (VLA) models in real-world scenarios. By training a corrective policy in simulation, the framework addresses the challenges of transferring learned behaviors from simulation to reality, known as the sim-to-real problem. The proposed method improves the action predictions of VLA models by using object poses, which creates a more compact observation space that works well in both domains. The results show a significant increase in success rates for manipulation tasks on a real robot, demonstrating the effectiveness of the approach in zero-shot scenarios.'}}}, {'id': 'https://huggingface.co/papers/2606.27457', 'title': 'Cluster, Route, Escalate: Cascaded Framework for Cost-Aware LLM Serving', 'url': 'https://huggingface.co/papers/2606.27457', 'abstract': "Abstract A cascaded approach for deploying large language models that balances accuracy and cost by routing queries to appropriate models based on clustering and quality estimation.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Efficient deployment of large language models (LLMs) in production forces a trade-off between accuracy and cost. Operators often default to a single model that is either expensive for easy queries or insufficient for hard ones. To address this challenge, we propose a two-stage cascaded solution. Stage 1 clusters incoming queries and assigns each cluster to its most cost-effective model. The cost budget for this routing process is set by an interpretable hyperparameter, tuned offline. Stage 2 adds a quality estimation (QE) cascade; when an output from Stage 1 is judged low-quality, the query is escalated to a stronger model. This ensures only hard or low-confidence cases reach the expensive models. On the test datasets, the cascaded system retains 97-99% of the strongest model's accuracy while reducing Time Per Output Token (TPOT). It requires only task-correctness labels and adapts to changes in the model pool without manual reconfiguration.", 'score': 2, 'issue_id': 2744, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '3fb491ec446e3e8b', 'github_url': '', 'github_stars': 0, 'authors': ['Yasmin Moslem', 'Magdalena Kacmajor', 'Vasudevan Nedumpozhimana', 'Ammar Abbas', 'Solmaz Panahi', 'David Lynch', 'Zhuangzhuang Nie', 'Alexandros Agapitos', 'Aleksandar Milenovic', 'Hongmeng Song', 'Yucheng Shi', 'Yue Pan', 'Patricia Buffini', 'John D. Kelleher'], 'affiliations': ['ADAPT Centre, Trinity College Dublin', 'Huawei Research'], 'pdf_title_img': 'assets/pdf/title_img/2606.27457.jpg', 'data': {'categories': ['#optimization', '#training', '#inference'], 'emoji': '🔄', 'ru': {'title': 'Сбалансированное развертывание LLM для экономии и точности', 'desc': 'В данной статье представлено каскадное решение для развертывания больших языковых моделей (LLM), которое équilibre между точностью и стоимостью. Это достигается путем группировки входящих запросов и назначения каждой группе наиболее экономичной модели. Также внедрена каскадная оценка качества, которая позволяет направлять трудные или неуверенные запросы к более мощным моделям. Такой подход позволяет сохранять высокую точность и уменьшать затраты на обработку запросов.'}, 'en': {'title': 'Cascaded Deployment: Balancing Accuracy and Cost in LLMs', 'desc': 'This paper presents a cascaded approach for deploying large language models (LLMs) that optimizes the balance between accuracy and cost. It introduces a two-stage system where the first stage clusters incoming queries and assigns them to the most cost-effective model based on their characteristics. The second stage incorporates a quality estimation mechanism that escalates low-quality outputs to more powerful models, ensuring that only challenging queries utilize the expensive resources. The proposed method maintains high accuracy while significantly reducing the time taken per output token, adapting efficiently to changes in the model pool.'}}}, {'id': 'https://huggingface.co/papers/2606.17846', 'title': 'Qwen-RobotManip Technical Report: Alignment Unlocks Scale for Robotic Manipulation Foundation Models', 'url': 'https://huggingface.co/papers/2606.17846', 'abstract': 'Abstract A Vision-Language-Action foundation model for robotic manipulation achieves generalization through unified alignment across representation, motion, and behavior dimensions, enabling large-scale training on diverse data sources.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Foundation models in language and multimodality achieve strong generalization by aligning heterogeneous data under a unified formulation and training at scale. In this report, we investigate whether this scaling recipe can be applied to robotic manipulation to achieve genuine generalization. This is challenging because, unlike text, manipulation data is heterogeneous by nature, expensive to collect, and narrow in diversity, making alignment and scale simultaneously difficult. We present Qwen-RobotManip, a generalizable Vision-Language-Action foundation model built on Qwen-VL. Qwen-RobotManip introduces a unified alignment framework across the representation, motion, and behavioral dimensions of manipulation, making large-scale multi-source training coherent rather than conflicting. This alignment capability in turn enables Qwen-RobotManip to absorb manipulation data at a scale that prior training regimes could not sustain. A human-to-robot synthesis pipeline converts egocentric hand demonstrations into robot trajectories across 15 platforms, and a rigorous curation pipeline harmonizes heterogeneous datasets. Using only open-source datasets and human videos without proprietary data collection, Qwen-RobotManip constructs a ~38,100-hour pretraining corpus and exhibits emergent generalization capabilities, including zero-shot instruction following, robustness to perturbations, reactive error recovery, and cross-embodiment transfer. We find that standard benchmarks fail to capture pretraining quality and instead adopt OOD settings including RoboCasa365, LIBERO-Plus, EBench, RoboTwin-Clean2Rand, RoboTwin-IF, and RoboTwin-XE. Qwen-RobotManip substantially outperforms prior state-of-the-art models, including π0.5, across all OOD settings, ranks 1st in RoboChallenge with a 20% relative improvement, and is validated on real-robot platforms including AgileX ALOHA, Franka, UR, and ARX.', 'score': 2, 'issue_id': 2745, 'pub_date': '2026-06-17', 'pub_date_card': {'ru': '17 июня', 'en': 'June 17', 'zh': '6月17日'}, 'hash': 'abb64b3f51381440', 'github_url': '', 'github_stars': 0, 'authors': ['Haoqi Yuan', 'Zhixuan Liang', 'Anzhe Chen', 'Ye Wang', 'Haoyang Li', 'Pei Lin', 'Yiyang Huang', 'Zixing Lei', 'Tong Zhang', 'Jiazhao Zhang', 'Jie Zhang', 'Jingyang Fan', 'Gengze Zhou', 'Qihang Peng', 'Chenxu Lv', 'Xiaoyue Chen', 'An Yang', 'Fei Huang', 'Junyang Lin', 'Dayiheng Liu', 'Jingren Zhou', 'Chenfei Wu', 'Xiong-Hui Chen'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.17846.jpg', 'data': {'categories': ['#training', '#agi', '#open_source', '#robotics', '#dataset', '#benchmark', '#alignment', '#multimodal', '#agents'], 'emoji': '🤖', 'ru': {'title': 'Единая модель для управления роботами: от видео до действий', 'desc': 'В статье представлен модель Vision-Language-Action под названием Qwen-RobotManip, которая достигает высокой обобщаемости в роботизированных манипуляциях. Модель объединяет представления, движения и поведение для обучения на разнообразных данных. Авторы исследуют возможность применения большого объема данных для улучшения качества манипуляций, преодолевая сложности, связанные с гетерогенностью данных. Qwen-RobotManip демонстрирует выдающиеся результаты, обгоняя предыдущие модели на различных тестах.'}, 'en': {'title': 'Unified Alignment for Enhanced Robotic Manipulation', 'desc': 'This paper presents Qwen-RobotManip, a Vision-Language-Action foundation model designed for robotic manipulation. It achieves generalization by aligning representation, motion, and behavior dimensions, allowing for effective training on diverse data sources. The model utilizes a human-to-robot synthesis pipeline to convert hand demonstrations into robot trajectories, enabling it to learn from a large corpus of open-source data. Qwen-RobotManip outperforms existing models in various benchmarks, demonstrating capabilities like zero-shot instruction following and robust error recovery.'}}}, {'id': 'https://huggingface.co/papers/2606.24893', 'title': 'AgentOdyssey: Open-Ended Long-Horizon Text Game Generation for Test-Time Continual Learning Agents', 'url': 'https://huggingface.co/papers/2606.24893', 'abstract': "Abstract AgentOdyssey evaluates test-time continual learning agents through procedurally generated text games, measuring learning, memory, exploration, and planning capabilities in continuous, long-horizon settings.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct For agents to learn continuously from interaction with the world at test time, they must be able to explore effectively, acquire new world knowledge and skills, retain relevant episodic experiences, and plan over long horizons. To evaluate these key abilities of test-time continual learning agents, we introduce AgentOdyssey, a novel evaluation framework that procedurally generates open-ended text games with rich entities, world dynamics, and long-horizon tasks. Critically, AgentOdyssey goes beyond the conventional machine learning assumption that learning does not occur at test time by placing agents in a continuous, long-horizon setting that interleaves learning and inference throughout deployment. We further propose a multifaceted evaluation methodology that measures not only game progress but also offers diagnostic tests on world knowledge acquisition, episodic memory, object and action exploration, action diversity, and model cost. We evaluate diverse agent paradigms in the generated games. Our experimental results reveal critical limits in agents' key abilities, as well as factors that influence their meaningful horizon. Although performance scales with stronger base models, even the top agent remains far below human performance, leaving substantial headroom for improveme
