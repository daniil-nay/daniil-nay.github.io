nt. Among agent mechanisms, we find that short-term memory benefits multiple agent paradigms and is an important component of agent test-time training.", 'score': 2, 'issue_id': 2745, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '60d3801bb3b4fa54', 'github_url': '', 'github_stars': 0, 'authors': ['Zheyuan Zhang', 'Zehao Wen', 'Alvin Zhang', 'Andrew Wang', 'Jianwen Xie', 'Daniel Khashabi', 'Tianmin Shu'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.24893.jpg', 'data': {'categories': ['#games', '#training', '#memory', '#continual_learning', '#benchmark', '#agents'], 'emoji': '🎮', 'ru': {'title': 'Непрерывное обучение для агентов в текстовых играх', 'desc': 'Статья описывает фреймворк AgentOdyssey, который оценивает способности агентов к непрерывному обучению во время тестирования через процедурно генерируемые текстовые игры. Этот подход позволяет агентам эффективно исследовать мир, приобретать новую информацию, сохранять эпизодические воспоминания и планировать действия на длительный срок. Исследование показывает, что даже самые продвинутые модели далеки от человеческого уровня, указывая на необходимость улучшений в их обучении. Ключевыми аспектами оценки являются память, исследование объектов и действий, а также разнообразие действий.'}, 'en': {'title': 'Revolutionizing Test-Time Learning in Agents', 'desc': 'AgentOdyssey is a framework designed to evaluate continual learning agents during test time using procedurally generated text games. It focuses on key abilities such as exploration, memory retention, and long-term planning in dynamic environments. The framework challenges the traditional view that learning only happens during training by allowing agents to learn while they play. Results show that while stronger models perform better, they still lag behind human capabilities, highlighting areas for future improvement.'}}}, {'id': 'https://huggingface.co/papers/2606.27537', 'title': 'MemoBench: Benchmarking World Modeling in Dynamically Changing Environments', 'url': 'https://huggingface.co/papers/2606.27537', 'abstract': "Abstract MemoBench presents a diagnostic benchmark for evaluating video generation models' memory consistency in dynamically changing environments where objects disappear and reappear in updated states.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Video generation models aspire to simulate dynamic environments, and several benchmarks now evaluate memory consistency across frames. However, most assess consistency only while the target remains in view, and the few that force objects out of view evaluate static scenes where nothing changes during occlusion. To bridge this gap, we introduce MemoBench, a diagnostic benchmark built around the disappear-and-reappear paradigm in dynamically changing environments: a target object undergoes a physical process, disappears from view, and must be correctly recovered in its updated state upon reappearance. We curate 360 ground-truth clips spanning synthetic and real-world scenes, and design an evaluation suite combining automated metrics with VQA-based assessment across four diagnostic pillars. Evaluation of eight state-of-the-art models reveals key insights and open challenges regarding memory consistency under the disappear-and-reappear paradigm.", 'score': 1, 'issue_id': 2745, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '98b43ef2c0fbb45c', 'github_url': '', 'github_stars': 0, 'authors': ['Haoyu Chen', 'Kaichen Zhou', 'Hang Hua', 'Kaile Zhang', 'Jingwen Qian', 'Wufei Ma', 'Haonan Chen', 'Chunjiang Liu', 'Yizhou Zhao', 'Xiaoyuan Wang', 'Weiyue Li', 'Alan Yuille', 'Paul Pu Liang', 'Yilun Du'], 'affiliations': ['Boston University', 'CMU', 'Google', 'Harvard University', 'JHU', 'Kempner Institute', 'MIT', 'MIT-IBM Watson AI Lab'], 'pdf_title_img': 'assets/pdf/title_img/2606.27537.jpg', 'data': {'categories': ['#benchmark', '#diffusion', '#memory', '#dataset'], 'emoji': '🌀', 'ru': {'title': 'Оценка памяти в динамических видео: новая эпоха!', 'desc': 'Статья представляет новую диагностическую оценку под названием MemoBench, предназначенную для оценки моделей генерации видео на предмет их способности сохранять память в динамически меняющихся средах. В отличие от существующих методов, которые исследуют консистентность памяти только в статичных сценах, MemoBench рассматривает ситуации, когда объекты исчезают и вновь появляются. Это позволяет более точно оценить, как модели справляются с изменениями и восстановлением объектов. Исследование включает 360 реальных и синтетических видеоклипов и оценивает восемь моделей с использованием различных метрик и подходов.'}, 'en': {'title': 'Evaluating Memory Consistency in Dynamic Video Generation', 'desc': 'MemoBench is a new benchmark designed to test how well video generation models maintain memory consistency in environments where objects can disappear and reappear. Unlike previous benchmarks that only check consistency when objects are visible, MemoBench focuses on scenarios where objects are occluded and must be accurately reconstructed when they return. The benchmark includes 360 clips from both synthetic and real-world scenes and uses a combination of automated metrics and visual question answering to evaluate performance. By assessing eight leading models, the study highlights important insights and challenges in achieving memory consistency in dynamic settings.'}}}, {'id': 'https://huggingface.co/papers/2606.26978', 'title': 'To Run or Not to Run: Analyzing the Cost-Effectiveness of Code Execution in LLM-Based Program Repair', 'url': 'https://huggingface.co/papers/2606.26978', 'abstract': 'Abstract LLM-based program repair agents frequently use execution-based testing but show inconsistent efficiency, with execution costs outweighing benefits in many cases.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct LLM-based agents for program repair are increasingly built on a "generate-run-revise" paradigm, iteratively executing tests to evaluate and refine patches. This execution-based approach has become standard practice in state-of-the-art systems. However, executions can be time-consuming and expensive, yet their impact on these agents remains underexplored. In this paper, we conduct a two-stage empirical study over execution behavior in LLM-based program repair. To characterize execution behavior at scale, we first analyze 7,745 agent traces from SWE-bench leaderboard submissions. Second, we evaluate 3,000 end-to-end repair attempts across 200 SWE-bench instances and three agents (Claude Code, Codex, and the open-source OpenCode) under four execution paradigms, which allows for a fine-grained comparison of performance and cost. Our analysis reveals three key observations: (1) Code execution is used across all agents and models analyzed, with an average of 8.8 test runs per task. Execution behavior varies substantially across agents and models, with frequency ranging from 2 to 19 per task, and late-stage executions consistently achieve higher success rates than early-stage ones. (2) Execution restrictions have little effect on repair success: on commercial agents with SOTA models the resolve-rate gap between Prohibited and Unrestricted is only 1.25 percentage points and not statistically significant, while Prohibited saves substantial token and wall-clock cost. (3) Execution benefit is concentrated rather than uniform. These patterns suggest that current agents apply execution indiscriminately, paying its cost on instances where it provides little benefit. Execution, therefore, should be treated as a resource with an explicit cost-benefit tradeoff, not a default capability.', 'score': 1, 'issue_id': 2745, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': 'df2e32760fc3bf5f', 'github_url': '', 'github_stars': 0, 'authors': ['Zhihao Lin', 'Junhua Zhu', 'Mingyi Zhou', 'Xin Wang', 'Zhensu Sun', 'Renyu Yang', 'David Lo', 'Li Li'], 'affiliations': ['Beihang University, China', 'Singapore Management University, Singapore', 'Wuhan University, China'], 'pdf_title_img': 'assets/pdf/title_img/2606.26978.jpg', 'data': {'categories': ['#training', '#agent_memory', '#dataset', '#optimization', '#agents'], 'emoji': '🔧', 'ru': {'title': 'Использование выполнения: ресурсы и выгоды в исправлении кода', 'desc': "В статье рассмотрены программы исправления кода на основе LLM и их использование тестирования на основе выполнения. Авторы выявили, что такие агенты часто применяют подход 'генерация-исполнение-исправление', однако эффективность этого метода нестабильна. Исследование показало, что выполнение кода может быть затратным, и его влияние на успех исправления не всегда очевидно. В результате, выполнение должно рассматриваться как ресурс с явным соотношением затрат и выгод, а не как стандартная функция."}, 'en': {'title': 'Optimizing Execution in LLM-Based Program Repair', 'desc': "This paper investigates the efficiency of LLM-based program repair agents that utilize execution-based testing within a 'generate-run-revise' framework. The authors analyze a large dataset of agent traces and repair attempts to understand the execution behavior of different models. They find that while code execution is common, its effectiveness varies significantly, with late-stage executions yielding better success rates. The study concludes that execution should be viewed as a resource with a clear cost-benefit tradeoff, rather than a standard practice, as indiscriminate execution can lead to unnecessary costs without proportional benefits."}}}, {'id': 'https://huggingface.co/papers/2606.25610', 'title': "The Galaxy's Guide to the Tokenizer: A Benchmark for Scientific Foundation Models", 'url': 'https://huggingface.co/papers/2606.25610', 'abstract': 'Abstract Four tokenization methods for astronomical images show distinct strengths in reconstruction quality, physical property prediction, and morphological preservation, with no single approach excelling across all tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Tokenization is central to adapting scientific data for transformer-based foundation models, yet its impact on learned representations remains poorly understood. We compare four tokenization strategies, Affine, AIM, JetFormer, and VQ-VAE, within a unified transformer framework for astronomical imaging. Using 640,000 galaxy images from the DESI Legacy Survey and a shared AstroPT backbone, we evaluate each method on reconstruction fidelity and prediction of physical properties. Our results reveal trade-offs across approaches. The flow-based JetFormer achieves higher reconstruction quality, while VQ-VAE yields strong probe performance for galaxy physical properties. Affine and AIM better preserve localized morphological information. We find that reconstruction and representation quality are decoupled, and no single method consistently performs best across the tasks considered here. By grounding our evaluation in independently measured physical quantities, we hope this study serves to highlight the potential of scientific data as a basis for constructing interpretable benchmarks for foundation models.', 'score': 1, 'issue_id': 2745, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': 'fd93d9dcdb3b3530', 'github_url': '', 'github_stars': 0, 'authors': ['Sogol Sanjaripour', 'Michael J. Smith', 'Manuel Pérez-Carrasco', 'Juan Rafael Martínez-Galarza', 'Bahram Mobasher', 'Gabriela Canalizo'], 'affiliations': ['AstroAI', 'Center for Astrophysics Harvard & Smithsonian', 'UniverseTBD', 'University of California, Riverside'], 'pdf_title_img': 'assets/pdf/title_img/2606.25610.jpg', 'data': {'categories': ['#interpretability', '#benchmark', '#science', '#dataset'], 'emoji': '🌌', 'ru': {'title': 'Методы токенизации для астрономических изображений: компромиссы и сильные стороны', 'desc': 'В статье рассматриваются четыре метода токенизации астрономических изображений, каждый из которых демонстрирует свои сильные стороны в качестве восстановления, предсказании физических свойств и сохранении морфологии. Сравниваются стратегии Affine, AIM, JetFormer и VQ-VAE в рамках единой трансформерной архитектуры. Результаты показывают, что JetFormer обеспечивает высокое качество восстановления, тогда как VQ-VAE лучше справляется с предсказанием физических свойств галактик. Подходы Affine и AIM лучше сохраняют локальную морфологическую информацию, выявляя, что качество восстановления и представления могут быть независимыми.'}, 'en': {'title': 'Exploring Tokenization Trade-offs in Astronomical Imaging', 'desc': 'This paper explores four different tokenization methods for processing astronomical images, specifically focusing on Affine, AIM, JetFormer, and VQ-VAE. Each method has unique strengths in areas like reconstruction quality, prediction of physical properties, and preservation of morphological details. The study uses a large dataset of galaxy images to evaluate these methods within a transformer framework, revealing that no single method excels in all tasks. The findings emphasize the importance of understanding the trade-offs between reconstruction fidelity and representation quality in scientific data applications.'}}}, {'id': 'https://huggingface.co/papers/2606.18112', 'title': 'Qwen-RobotNav Technical Report: A Scalable Navigation Model Designed for an Agentic Navigation System', 'url': 'https://huggingface.co/papers/2606.18112', 'abstract': "Abstract Qwen-RobotNav is a scalable navigation model with a parameterized interface enabling dynamic task modes and observation parameters, achieving state-of-the-art performance through multi-task training and zero-shot generalization to real-world robotics.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Agentic navigation systems require a base navigation model whose observation strategy can be externally reconfigured at inference time, because instruction following, object search, target tracking, and autonomous driving share the same perception-planning backbone yet demand fundamentally different strategies for consuming the visual stream. We present Qwen-RobotNav, a scalable navigation model built on Qwen-RobotNav that addresses it through a parameterised interface with two complementary dimensions: multiple task modes that select the navigation behaviour, and controllable observation parameters (e.g., token budget, per-camera weights) that govern how visual history is encoded. With training-time randomization over all parameters, Qwen-RobotNav is robust to any inference-time configuration requiring zero architectural modification to the Qwen-RobotNav backbone. We train Qwen-RobotNav on 15.6M samples; co-training with vision-language data prevents the collapse into reactive action-sequence mappers observed in trajectory-only training. The parameterised interface also makes Qwen-RobotNav a natural building block for agentic systems: for long-horizon scenarios, an upper-level planner decomposes goals into sub-tasks and dynamically switches Qwen-RobotNav's task mode and context strategy mid-episode, composing complex behaviours from repeated calls to the same model. Extensive experiments show that Qwen-RobotNav sets new state-of-the-art results across major navigation benchmarks. The model exhibits favourable scaling from 2B to 8B parameters, with joint multi-task training developing a shared spatial-planning substrate that transfers across task families, and demonstrates strong zero-shot generalisation to real-world robots across diverse environments.", 'score': 1, 'issue_id': 2745, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': '173dc08f6ce19d36', 'github_url': '', 'github_stars': 0, 'authors': ['Jiazhao Zhang', 'Gengze Zhou', 'Hale Yin', 'Yiyang Huang', 'Zixing Lei', 'Qihang Peng', 'Haoqi Yuan', 'Jie Zhang', 'Xudong Guo', 'Xiaoyue Chen', 'An Yang', 'Fei Huang', 'Zhibo Yang', 'Junyang Lin', 'Dayiheng Liu', 'Jingren Zhou', 'Zhuoyuan Yu', 'Jingyang Fan', 'Zhixuan Liang', 'Pei Lin', 'Ye Wang', 'Anzhe Chen', 'Kun Yan', 'Xiao Xu', 'Jiahao Li', 'Lulu Hu', 'Minying Zhang', 'Shurui Li', 'Wenhu Xiao', 'Shuai Bai', 'Xuancheng Ren', 'Chenxu Lv', 'Chenfei Wu', 'Xiong-Hui Chen'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.18112.jpg', 'data': {'categories': ['#agi', '#training', '#robotics', '#transfer_learning', '#benchmark', '#optimization', '#agents'], 'emoji': '🤖', 'ru': {'title': 'Умная навигация для роботов', 'desc': 'Qwen-RobotNav — это масштабируемая модель навигации с параметризованным интерфейсом, позволяющая динамически изменять режимы задач и параметры наблюдения. Она достигает выдающихся результатов благодаря многозадачному обучению и нулевой обобщаемости на реальные роботы. Модель может адаптироваться к различным стратегиям восприятия и планирования, что делает её универсальной в условиях различных задач. Благодаря тренировке на большом количестве данных, Qwen-RobotNav демонстрирует сильную обобщаемость и отличные результаты на крупнейших тестах навигации.'}, 'en': {'title': 'Dynamic Navigation for Real-World Robotics', 'desc': 'Qwen-RobotNav is a versatile navigation model designed for robotics, allowing for dynamic adjustments in task modes and observation parameters. It utilizes multi-task training and can generalize to real-world scenarios without needing architectural changes. The model features a parameterized interface that enables it to adapt its navigation behavior and visual processing strategies based on the task at hand. Extensive training on a large dataset ensures robust performance across various navigation benchmarks, achieving state-of-the-art results.'}}}, {'id': 'https://huggingface.co/papers/2606.26979', 'title': 'How Much Static Structure Do Code Agents Need? A Study of Deterministic Anchoring', 'url': 'https://huggingface.co/papers/2606.26979', 'abstract': 'Abstract Static analysis annotations improve code agent navigation by providing deterministic structural anchors that enhance predictability and reduce variability in software exploration.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct LLM-based code agents navigate repositories through keyword search but miss the structural relationships, such as call graphs, inheritance hierarchies, and configuration dependencies, that define how software actually works. This makes agent navigation stochastic and difficult to reproduce across runs. We investigate whether lightweight static analysis can provide deterministic anchors for these agents: stable structural facts injected as plain-text comments that constrain probabilistic exploration and make navigation more predictable. Starting from a strong baseline, Codex from OpenAI, we systematically inject varying granularities of structural annotations and measure their effects on localization, trajectory behavior, and run-to-run stability. Our study identifies what we call the deterministic anchoring effect: static structure helps less by making agents "smarter" and more by making their navigation disciplined and reproducible. Three observations support this finding: (1) Anchoring works: lightweight call/inheritance topology improves function-level localization (+2.2pp Func@5) and shortens trajectories (-1.6 interaction rounds); (2) Anchoring is scale-sensitive: the optimal granularity and directionality depend on repository characteristics, where denser semantics show diminishing returns and hub-heavy projects benefit from inverse-only links that expose "who-calls-me" without forward edges; (3) Anchoring stabilizes: tags raise link-following rate from 0.15-0.18 to 0.21-0.24, roughly halve run-to-run variance, and improve single-run reliability (Pass@1 +3.4 pp) on medium-scale repositories, at the cost of roughly 10% more input tokens. These observations suggest practical guidelines: default to lightweight topology on medium projects, prune forward edges in large repositories, and reserve dense tags for implicit-dependency cases.', 'score': 0, 'issue_id': 2745, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': 'c9c4e1cefb28ed0a', 'github_url': '', 'github_stars': 0, 'authors': ['Zhihao Lin', 'Mingyi Zhou', 'Yizhuo Yang', 'Li Li'], 'affiliations': ['Beihang University, China'], 'pdf_title_img': 'assets/pdf/title_img/2606.26979.jpg', 'data': {'categories': ['#games', '#training', '#agent_memory', '#data', '#optimization', '#agents'], 'emoji': '🔍', 'ru': {'title': 'Статический анализ для предсказуемой навигации в коде', 'desc': 'Статический анализ аннотаций улучшает навигацию кодовых агентов, обеспечивая детерминированные структурные якоря для повышения предсказуемости. Кодовые агенты, основанные на LLM, пропускают структурные связи, такие как графы вызовов и иерархии наследования, что делает навигацию вероятностной и сложной для воспроизведения. Наша работа показывает, что легкий статический анализ может предоставить детерминированные якоря, улучшая стабильность навигации за счет ввода структурных аннотаций. Исследования подтверждают, что статическая структура делает навигацию более дисциплинированной и воспроизводимой.'}, 'en': {'title': 'Enhancing Code Navigation with Static Analysis Anchors', 'desc': 'This paper explores how static analysis annotations can enhance the navigation of code agents by providing stable structural references. These annotations help agents understand the relationships within the code, such as call graphs and inheritance hierarchies, which reduces randomness in their exploration. The study finds that these annotations lead to more predictable and reproducible navigation outcomes. It also offers practical guidelines for implementing these annotations based on the characteristics of the code repository.'}}}, {'id': 'https://huggingface.co/papers/2606.26519', 'title': 'Boundary-Aware Context Grounding for A Low-Channel EEG Agent', 'url': 'https://huggingface.co/papers/2606.26519', 'abstract': 'Abstract NeuraDock Agent combines a deterministic EEG processing engine with a language model interface to ensure accurate, hardware-aware analysis while maintaining local data security.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language models (LLMs) can make scientific software easier to use. However, a general model does not automatically know which measurements a particular sensor can support, which algorithms are implemented in the current software, or which conclusions are justified by a computed result. These distinctions are especially important for low-channel electroencephalography (EEG), where sparse spatial coverage and variable signal quality make plausible but unsupported interpretations easy to produce. We present NeuraDock Agent, an open-source architecture that separates a deterministic local EEG engine from a hardware-aware language layer. The numerical engine parses recordings, performs quality control, executes reviewed spectral workflows, and writes machine-readable artifacts. The LLM receives only a compact, allowlisted summary and a versioned context pack. The context describes the seven-channel hardware, reviewed workflows, result fields, implementation boundaries, scientific limits, and reference cases. Raw EEG and dense per-sample arrays remain local   We evaluate the system at three levels. First, 12 recordings produced identical structured results over ten numerical repetitions, and a complete Rest/Task run produced identical result, report, and figure hashes over three repetitions. Second, request-capture and failure-injection experiments confirmed the tested data boundary and preservation of local artifacts under HTTP, malformed-output, and connection failures. Third, a boundary-awareness benchmark tested 36 ordinary and adversarial questions under four context ablations and two LLMs, yielding 288 outputs.These results support hardware- and implementation-aware grounding as a practical mechanism for calibrating what an EEG agent accepts, qualifies, or refuses; they do not establish clinical validity or a validated absolute cognitive-load index.', 'score': 0, 'issue_id': 2743, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': 'cb9ba223dccd8865', 'github_url': '', 'github_stars': 0, 'authors': ['Zhiyuan Xu', 'Yueqing Dai', 'Junling Li', 'Junwen Luo'], 'affiliations': ['Shanghai Pulse Element Intelligent Technology Co., Ltd. (NeuraDock)'], 'pdf_title_img': 'assets/pdf/title_img/2606.26519.jpg', 'data': {'categories': ['#hardware_aware', '#benchmark', '#science', '#open_source', '#healthcare', '#agents', '#dataset'], 'emoji': '🧠', 'ru': {'title': 'Новый взгляд на анализ ЭЭГ с помощью языковой модели', 'desc': 'В статье представлен NeuraDock Agent, который сочетает в себе детерминированный движок обработки ЭЭГ и интерфейс языковой модели. Это позволяет точно анализировать данные ЭЭГ, учитывая аппаратные особенности и обеспечивая безопасность локальных данных. NeuraDock Agent разделяет вычислительный движок и языковой слой, чтобы гарантировать, что языковая модель получает только обработанную и безопасную информацию. Оценка системы показала высокую стабильность результатов и надежность при различных условиях тестирования.'}, 'en': {'title': 'Empowering EEG Analysis with Secure Language Models', 'desc': 'NeuraDock Agent is a system that combines a precise EEG processing engine with a language model to analyze EEG data securely and accurately. It addresses the challenge of ensuring that language models understand the specific capabilities of EEG sensors and the algorithms used in the analysis. By separating the deterministic EEG engine from the language interface, it maintains local data security while providing relevant context to the language model. The system has been evaluated for consistency and boundary awareness, demonstrating its effectiveness in managing EEG data interpretations.'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agent_memory (4)', '#agents (16)', '#agi (2)', '#alignment (2)', '#architecture (3)', '#audio', '#benchmark (12)', '#compression (1)', '#context_window', '#continual_learning (1)', '#data (1)', '#dataset (7)', '#diffusion (2)', '#ethics', '#games (8)', '#graphs (1)', '#hallucinations', '#healthcare (1)', '#inference (3)', '#interpretability (3)', '#knowledge_graphs', '#leakage', '#long_context', '#low_resource (2)', '#machine_translation', '#math (1)', '#memorization', '#memory (2)', '#multilingual (3)', '#multimodal (3)', '#open_source (3)', '#optimization (15)', '#plp', '#prompt_caching', '#prompting', '#rag (1)', '#reasoning (1)', '#retrieval (1)', '#retrieval_eval', '#rl (5)', '#rlhf (2)', '#robotics (4)', '#science (3)', '#security (1)', '#session_memory', '#small_models (1)', '#story_generation', '#survey (1)', '#synthetic (1)', '#tool_use (2)', '#training (17)', '#transfer_learning (5)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);

                let title = item["data"][currentLang]["title"];

                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");

                if ('pdf_title_img' in item) {
                    pdfImg = '' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                                ${githubBlock}
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else if (sortBy === 'github') {
                sortedArticles.sort((a, b) => (Number(b.github_stars) || 0) - (Number(a.github_stars) || 0));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-06-29 19:56',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF",
                    github: "звёздам GitHub"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date",
                    github: "GitHub stars"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF 收录日期",
                    github: "GitHub 星标"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }

        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-06-29 19:56')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-06-29 19:56')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
