: "This paper presents the ISIC MultiAnnot++ dataset, a large-scale public resource for skin lesion segmentation that includes extensive metadata for analyzing annotator performance. The dataset consists of 17,684 segmentation masks from 14,967 dermoscopic images, making it the largest publicly available multi-annotator skin lesion segmentation dataset. It allows researchers to study the variability in segmentations provided by different annotators and to model consensus among them. Additionally, the dataset includes information about the annotators' skill levels and the tools used, facilitating deeper insights into segmentation quality and preferences."}, 'zh': {'title': '推动皮肤病变分割研究的多标注数据集', 'desc': '本文介绍了一个大规模的公共多标注皮肤病变分割数据集，名为ISIC MultiAnnot++。该数据集包含17,684个分割掩膜，覆盖14,967张皮肤病变的皮肤镜图像，是目前最大的公开可用的多标注皮肤病变分割数据集。数据集中还包含关于标注者技能水平和分割工具的元数据，支持对标注者偏好建模和元数据分析的研究。通过对数据集特征的分析，提供了经过整理的数据分区和共识分割掩膜。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.02315', 'title': 'Prithvi-Complimentary Adaptive Fusion Encoder (CAFE): unlocking full-potential for flood inundation mapping', 'url': 'https://huggingface.co/papers/2601.02315', 'abstract': "Prithvi-CAFE combines a pretrained Geo-Foundation Model encoder with a parallel CNN branch featuring attention modules to improve flood mapping accuracy by capturing both global context and local details.  \t\t\t\t\tAI-generated summary \t\t\t\t Geo-Foundation Models (GFMs), have proven effective in diverse downstream applications, including semantic segmentation, classification, and regression tasks. However, in case of flood mapping using Sen1Flood11 dataset as a downstream task, GFMs struggles to outperform the baseline U-Net, highlighting model's limitation in capturing critical local nuances. To address this, we present the Prithvi-Complementary Adaptive Fusion Encoder (CAFE), which integrate Prithvi GFM pretrained encoder with a parallel CNN residual branch enhanced by Convolutional Attention Modules (CAM). Prithvi-CAFE enables fast and efficient fine-tuning through adapters in Prithvi and performs multi-scale, multi-level fusion with CNN features, capturing critical local details while preserving long-range dependencies. We achieve state-of-the-art results on two comprehensive flood mapping datasets: Sen1Flood11 and FloodPlanet. On Sen1Flood11 test data, Prithvi-CAFE (IoU 83.41) outperforms the original Prithvi (IoU 82.50) and other major GFMs (TerraMind 82.90, DOFA 81.54, spectralGPT: 81.02). The improvement is even more pronounced on the hold-out test site, where Prithvi-CAFE achieves an IoU of 81.37 compared to the baseline U-Net (70.57) and original Prithvi (72.42). On FloodPlanet, Prithvi-CAFE also surpasses the baseline U-Net and other GFMs, achieving an IoU of 64.70 compared to U-Net (60.14), Terramind (62.33), DOFA (59.15) and Prithvi 2.0 (61.91). Our proposed simple yet effective Prithvi-CAFE demonstrates strong potential for improving segmentation tasks where multi-channel and multi-modal data provide complementary information and local details are critical. The code is released on https://github.com/Sk-2103/Prithvi-CAFE{Prithvi-CAFE Github}", 'score': 0, 'issue_id': 443, 'pub_date': '2026-01-05', 'pub_date_card': {'ru': '5 января', 'en': 'January 5', 'zh': '1月5日'}, 'hash': '548145f9a8b5d453', 'authors': ['Saurabh Kaushik', 'Lalit Maurya', 'Beth Tellman'], 'affiliations': ['Center for Sustainability and the Global Environment (SAGE), University of Wisconsin-Madison', 'Portsmouth AI and Data Science Centre (PAIDS), School of Computing, University of Portsmouth'], 'pdf_title_img': 'assets/pdf/title_img/2601.02315.jpg', 'data': {'categories': ['#cv', '#open_source', '#benchmark', '#multimodal', '#transfer_learning', '#architecture'], 'emoji': '🌊', 'ru': {'title': 'Слияние глобального контекста и локальных деталей для точного картирования наводнений', 'desc': 'В работе предлагается Prithvi-CAFE — архитектура, которая комбинирует предобученный энкодер геопространственной фундаментальной модели с параллельной ветвью CNN, оснащённой модулями внимания. Модель решает проблему того, что существующие GFM плохо работают на задаче картирования наводнений, так как не захватывают локальные детали, критичные для точного сегментирования. Метод использует адаптеры для эффективной тонкой настройки и многоуровневое слияние признаков, позволяя одновременно сохранять дальнодействующие зависимости и выделять локальные нюансы. Модель достигает передовых результатов на наборах данных Sen1Flood11 и FloodPlanet, значительно превосходя как базовую U-Net, так и другие фундаментальные модели по метрике IoU.'}, 'en': {'title': 'Enhancing Flood Mapping with Prithvi-CAFE: A Fusion of Global and Local Insights', 'desc': 'Prithvi-CAFE is a novel model that enhances flood mapping accuracy by combining a pretrained Geo-Foundation Model (GFM) encoder with a parallel Convolutional Neural Network (CNN) branch that includes attention mechanisms. This approach allows the model to effectively capture both global context and local details, addressing the limitations of traditional GFMs in flood mapping tasks. By utilizing multi-scale and multi-level feature fusion, Prithvi-CAFE achieves superior performance on flood mapping datasets, significantly outperforming the baseline U-Net and other GFMs. The results demonstrate its potential for improving segmentation tasks where detailed local information is crucial.'}, 'zh': {'title': '提升洪水映射准确性的Prithvi-CAFE模型', 'desc': 'Prithvi-CAFE是一种结合了预训练的地理基础模型编码器和并行卷积神经网络（CNN）分支的模型，旨在提高洪水映射的准确性。该模型通过卷积注意力模块（CAM）捕捉全局上下文和局部细节，从而克服了传统地理基础模型在洪水映射任务中的局限性。实验结果表明，Prithvi-CAFE在Sen1Flood11和FloodPlanet数据集上均取得了最先进的结果，显著超越了基线U-Net和其他主要的地理基础模型。该模型的设计使得在多通道和多模态数据的情况下，能够有效地进行细分任务。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.02314', 'title': 'Project Ariadne: A Structural Causal Framework for Auditing Faithfulness in LLM Agents', 'url': 'https://huggingface.co/papers/2601.02314', 'abstract': 'Project Ariadne uses structural causal models and counterfactual logic to evaluate the causal integrity of LLM reasoning, revealing a faithfulness gap where reasoning traces are not reliable drivers of outputs.  \t\t\t\t\tAI-generated summary \t\t\t\t As Large Language Model (LLM) agents are increasingly tasked with high-stakes autonomous decision-making, the transparency of their reasoning processes has become a critical safety concern. While Chain-of-Thought (CoT) prompting allows agents to generate human-readable reasoning traces, it remains unclear whether these traces are faithful generative drivers of the model\'s output or merely post-hoc rationalizations. We introduce Project Ariadne, a novel XAI framework that utilizes Structural Causal Models (SCMs) and counterfactual logic to audit the causal integrity of agentic reasoning. Unlike existing interpretability methods that rely on surface-level textual similarity, Project Ariadne performs hard interventions (do-calculus) on intermediate reasoning nodes -- systematically inverting logic, negating premises, and reversing factual claims -- to measure the Causal Sensitivity (φ) of the terminal answer. Our empirical evaluation of state-of-the-art models reveals a persistent Faithfulness Gap. We define and detect a widespread failure mode termed Causal Decoupling, where agents exhibit a violation density (ρ) of up to 0.77 in factual and scientific domains. In these instances, agents arrive at identical conclusions despite contradictory internal logic, proving that their reasoning traces function as "Reasoning Theater" while decision-making is governed by latent parametric priors. Our findings suggest that current agentic architectures are inherently prone to unfaithful explanation, and we propose the Ariadne Score as a new benchmark for aligning stated logic with model action.', 'score': 0, 'issue_id': 427, 'pub_date': '2026-01-05', 'pub_date_card': {'ru': '5 января', 'en': 'January 5', 'zh': '1月5日'}, 'hash': 'e9fe53c5bb19005f', 'authors': ['Sourena Khanzadeh'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2601.02314.jpg', 'data': {'categories': ['#alignment', '#agents', '#architecture', '#benchmark', '#reasoning', '#interpretability', '#security'], 'emoji': '🧩', 'ru': {'title': 'Раскрытие театра иллюзий: когда рассуждения LLM — это только постановка', 'desc': 'Project Ariadne — это фреймворк для объяснимости искусственного интеллекта, который использует структурные причинно-следственные модели и контрфактическую логику для проверки надёжности рассуждений больших языковых моделей. Исследование выявляет «пропасть верности», где цепочки мышления не являются фактическими причинами выходных данных, а скорее представляют собой постфактические объяснения. Авторы вводят концепцию «Театра рассуждений» — явления, когда модель приходит к одинаковым выводам несмотря на противоречивую внутреннюю логику, что доказывает управление решениями скрытыми параметрическими приоритетами. Предлагается новая метрика — Ariadne Score — для оценки соответствия между явной логикой и действиями модели.'}, 'en': {'title': 'Bridging the Faithfulness Gap in LLM Reasoning', 'desc': "Project Ariadne investigates how well Large Language Models (LLMs) explain their reasoning when making decisions. It uses Structural Causal Models and counterfactual logic to check if the reasoning provided by these models is genuinely linked to their outputs or just a facade. The study finds a significant 'Faithfulness Gap', where models often reach the same conclusions despite having conflicting internal reasoning. This indicates that the reasoning traces may not accurately reflect the decision-making process, leading to the introduction of the Ariadne Score to better assess the alignment of logic and actions in LLMs."}, 'zh': {'title': '揭示推理信任差距的阿里阿德项目', 'desc': '项目阿里阿德使用结构因果模型和反事实逻辑来评估大型语言模型（LLM）推理的因果完整性，揭示了推理轨迹与输出之间存在信任差距。尽管链式思维提示可以生成可读的推理轨迹，但这些轨迹是否真实反映模型输出仍不明确。通过对中间推理节点进行干预，项目阿里阿德测量了终端答案的因果敏感性，发现了因果解耦的普遍失败模式。我们的研究表明，当前的智能体架构容易产生不可信的解释，并提出了阿里阿德评分作为对齐逻辑与模型行为的新基准。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.22877', 'title': 'M-ErasureBench: A Comprehensive Multimodal Evaluation Benchmark for Concept Erasure in Diffusion Models', 'url': 'https://huggingface.co/papers/2512.22877', 'abstract': 'A multimodal evaluation framework and robustness enhancement module are introduced to address concept erasure vulnerabilities in text-to-image diffusion models across multiple input modalities.  \t\t\t\t\tAI-generated summary \t\t\t\t Text-to-image diffusion models may generate harmful or copyrighted content, motivating research on concept erasure. However, existing approaches primarily focus on erasing concepts from text prompts, overlooking other input modalities that are increasingly critical in real-world applications such as image editing and personalized generation. These modalities can become attack surfaces, where erased concepts re-emerge despite defenses. To bridge this gap, we introduce M-ErasureBench, a novel multimodal evaluation framework that systematically benchmarks concept erasure methods across three input modalities: text prompts, learned embeddings, and inverted latents. For the latter two, we evaluate both white-box and black-box access, yielding five evaluation scenarios. Our analysis shows that existing methods achieve strong erasure performance against text prompts but largely fail under learned embeddings and inverted latents, with Concept Reproduction Rate (CRR) exceeding 90% in the white-box setting. To address these vulnerabilities, we propose IRECE (Inference-time Robustness Enhancement for Concept Erasure), a plug-and-play module that localizes target concepts via cross-attention and perturbs the associated latents during denoising. Experiments demonstrate that IRECE consistently restores robustness, reducing CRR by up to 40% under the most challenging white-box latent inversion scenario, while preserving visual quality. To the best of our knowledge, M-ErasureBench provides the first comprehensive benchmark of concept erasure beyond text prompts. Together with IRECE, our benchmark offers practical safeguards for building more reliable protective generative models.', 'score': 0, 'issue_id': 432, 'pub_date': '2026-12-28', 'pub_date_card': {'ru': '28 декабря', 'en': 'December 28', 'zh': '12月28日'}, 'hash': 'c7c55233d17a7580', 'authors': ['Ju-Hsuan Weng', 'Jia-Wei Liao', 'Cheng-Fu Chou', 'Jun-Cheng Chen'], 'affiliations': ['National Taiwan University', 'Research Center for Information Technology Innovation, Academia Sinica'], 'pdf_title_img': 'assets/pdf/title_img/2512.22877.jpg', 'data': {'categories': ['#security', '#diffusion'], 'emoji': '🛡️', 'ru': {'title': 'Защита генеративных моделей: удаление концепций за пределами текстовых промптов', 'desc': 'В работе представлена многомодальная система оценки (M-ErasureBench) для проверки устойчивости методов удаления концепций в диффузионных моделях генерации изображений. Авторы показывают, что существующие подходы хорошо работают только с текстовыми промптами, но не защищают от атак через встроенные эмбеддинги и инвертированные латентные представления. Для решения этой проблемы предложен модуль IRECE, который во время инференса локализует целевые концепции через кросс-внимание и возмущает соответствующие латенты на этапе денойзирования. Эксперименты демонстрируют, что IRECE снижает уровень воспроизведения стёртых концепций на 40% в самом сложном сценарии, сохраняя качество генерируемых изображений.'}, 'en': {'title': 'Enhancing Concept Erasure in Multimodal AI Models', 'desc': "This paper introduces a new framework called M-ErasureBench to evaluate and improve the concept erasure capabilities of text-to-image diffusion models. It highlights the issue of concept erasure vulnerabilities not just in text prompts but also in other input types like learned embeddings and inverted latents. The authors propose a robustness enhancement module named IRECE, which helps to better localize and perturb target concepts during the model's denoising process. Their findings show that while existing methods work well for text prompts, they struggle with other modalities, and IRECE significantly improves performance by reducing the Concept Reproduction Rate (CRR) in challenging scenarios."}, 'zh': {'title': '提升生成模型鲁棒性的多模态评估与抹除方法', 'desc': '本文介绍了一种多模态评估框架和鲁棒性增强模块，以解决文本到图像扩散模型中的概念抹除脆弱性。现有方法主要集中在从文本提示中抹除概念，而忽视了在图像编辑和个性化生成等实际应用中越来越重要的其他输入模态。我们提出的M-ErasureBench框架系统地评估了三种输入模态下的概念抹除方法，并发现现有方法在文本提示下表现良好，但在学习嵌入和反转潜变量下效果不佳。为了解决这些脆弱性，我们提出了IRECE模块，通过交叉注意力定位目标概念，并在去噪过程中扰动相关潜变量，从而增强鲁棒性。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.24880', 'title': 'mHC: Manifold-Constrained Hyper-Connections', 'url': 'https://huggingface.co/papers/2512.24880', 'abstract': 'Manifold-Constrained Hyper-Connections (mHC) stabilize and scale residual connection architectures by restoring identity mapping properties through manifold projection and infrastructure optimization.  \t\t\t\t\tAI-generated summary \t\t\t\t Recently, studies exemplified by Hyper-Connections (HC) have extended the ubiquitous residual connection paradigm established over the past decade by expanding the residual stream width and diversifying connectivity patterns. While yielding substantial performance gains, this diversification fundamentally compromises the identity mapping property intrinsic to the residual connection, which causes severe training instability and restricted scalability, and additionally incurs notable memory access overhead. To address these challenges, we propose Manifold-Constrained Hyper-Connections (mHC), a general framework that projects the residual connection space of HC onto a specific manifold to restore the identity mapping property, while incorporating rigorous infrastructure optimization to ensure efficiency. Empirical experiments demonstrate that mHC is effective for training at scale, offering tangible performance improvements and superior scalability. We anticipate that mHC, as a flexible and practical extension of HC, will contribute to a deeper understanding of topological architecture design and suggest promising directions for the evolution of foundational models.', 'score': 49, 'issue_id': 360, 'pub_date': '2026-12-31', 'pub_date_card': {'ru': '31 декабря', 'en': 'December 31', 'zh': '12月31日'}, 'hash': '13fd2b75493e93cf', 'authors': ['Zhenda Xie', 'Yixuan Wei', 'Huanqi Cao', 'Chenggang Zhao', 'Chengqi Deng', 'Jiashi Li', 'Damai Dai', 'Huazuo Gao', 'Jiang Chang', 'Liang Zhao', 'Shangyan Zhou', 'Zhean Xu', 'Zhengyan Zhang', 'Wangding Zeng', 'Shengding Hu', 'Yuqing Wang', 'Jingyang Yuan', 'Lean Wang', 'Wenfeng Liang'], 'affiliations': ['DeepSeek-AI'], 'pdf_title_img': 'assets/pdf/title_img/2512.24880.jpg', 'data': {'categories': ['#architecture', '#training', '#optimization'], 'emoji': '🏗️', 'ru': {'title': 'Восстановление тождественного отображения в глубоких сетях через многообразия', 'desc': 'В статье предлагается метод Manifold-Constrained Hyper-Connections (mHC), который улучшает архитектуры остаточных связей путём восстановления свойства тождественного отображения через проекцию на многообразие. Авторы показывают, что расширение остаточного потока в гипер-соединениях приводит к нестабильности обучения и проблемам с масштабируемостью, поэтому предлагают применить ограничения на многообразии для сохранения желаемых свойств. Предложенный подход включает инфраструктурную оптимизацию для повышения эффективности и демонстрирует значительные улучшения производительности при обучении больших моделей. Метод mHC является гибким расширением гипер-соединений и открывает новые направления в проектировании топологии архитектур фундаментальных моделей.'}, 'en': {'title': 'Stabilizing Residual Connections with Manifold Projections', 'desc': 'This paper introduces Manifold-Constrained Hyper-Connections (mHC), a new framework designed to enhance residual connection architectures in machine learning. mHC addresses the issues of training instability and scalability that arise from diversifying connectivity patterns in Hyper-Connections (HC). By projecting the residual connection space onto a specific manifold, mHC restores the essential identity mapping property, which is crucial for stable training. The proposed method not only improves performance but also optimizes memory access, making it a significant advancement in the design of deep learning models.'}, 'zh': {'title': '流形约束超连接：提升残差连接的稳定性与可扩展性', 'desc': '本文提出了一种新的框架，称为流形约束超连接（mHC），旨在稳定和扩展残差连接架构。通过将残差连接空间投影到特定流形上，mHC 恢复了残差连接的身份映射特性，从而解决了训练不稳定和可扩展性受限的问题。该方法还结合了基础设施优化，以提高效率并减少内存访问开销。实验结果表明，mHC 在大规模训练中有效，提供了显著的性能提升和更好的可扩展性。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.24618', 'title': 'Youtu-LLM: Unlocking the Native Agentic Potential for Lightweight Large Language Models', 'url': 'https://huggingface.co/papers/2512.24618', 'abstract': 'Youtu-LLM is a lightweight language model optimized for computational efficiency and agentic intelligence through a compact architecture, STEM-focused training curriculum, and scalable mid-training strategies for planning and reasoning tasks.  \t\t\t\t\tAI-generated summary \t\t\t\t We introduce Youtu-LLM, a lightweight yet powerful language model that harmonizes high computational efficiency with native agentic intelligence. Unlike typical small models that rely on distillation, Youtu-LLM (1.96B) is pre-trained from scratch to systematically cultivate reasoning and planning capabilities. The key technical advancements are as follows: (1) Compact Architecture with Long-Context Support: Built on a dense Multi-Latent Attention (MLA) architecture with a novel STEM-oriented vocabulary, Youtu-LLM supports a 128k context window. This design enables robust long-context reasoning and state tracking within a minimal memory footprint, making it ideal for long-horizon agent and reasoning tasks. (2) Principled "Commonsense-STEM-Agent" Curriculum: We curated a massive corpus of approximately 11T tokens and implemented a multi-stage training strategy. By progressively shifting the pre-training data distribution from general commonsense to complex STEM and agentic tasks, we ensure the model acquires deep cognitive abilities rather than superficial alignment. (3) Scalable Agentic Mid-training: Specifically for the agentic mid-training, we employ diverse data construction schemes to synthesize rich and varied trajectories across math, coding, and tool-use domains. This high-quality data enables the model to internalize planning and reflection behaviors effectively. Extensive evaluations show that Youtu-LLM sets a new state-of-the-art for sub-2B LLMs. On general benchmarks, it achieves competitive performance against larger models, while on agent-specific tasks, it significantly surpasses existing SOTA baselines, demonstrating that lightweight models can possess strong intrinsic agentic capabilities.', 'score': 41, 'issue_id': 353, 'pub_date': '2026-12-31', 'pub_date_card': {'ru': '31 декабря', 'en': 'December 31', 'zh': '12月31日'}, 'hash': 'de67734dd7f71d25', 'authors': ['Junru Lu', 'Jiarui Qin', 'Lingfeng Qiao', 'Yinghui Li', 'Xinyi Dai', 'Bo Ke', 'Jianfeng He', 'Ruizhi Qiao', 'Di Yin', 'Xing Sun', 'Yunsheng Wu', 'Yinsong Liu', 'Shuangyin Liu', 'Mingkong Tang', 'Haodong Lin', 'Jiayi Kuang', 'Fanxu Meng', 'Xiaojuan Tang', 'Yunjia Xi', 'Junjie Huang', 'Haotong Yang', 'Zhenyi Shen', 'Yangning Li', 'Qianwen Zhang', 'Yifei Yu', 'Siyu An', 'Junnan Dong', 'Qiufeng Wang', 'Jie Wang', 'Keyu Chen', 'Wei Wen', 'Taian Guo', 'Zhifeng Shen', 'Daohai Yu', 'Jiahao Li', 'Ke Li', 'Zongyi Li', 'Xiaoyu Tan'], 'affiliations': ['Tencent', 'Youtu-LLM Team'], 'pdf_title_img': 'assets/pdf/title_img/2512.24618.jpg', 'data': {'categories': ['#synthetic', '#long_context', '#agents', '#training', '#small_models', '#architecture', '#reasoning', '#optimization'], 'emoji': '🧠', 'ru': {'title': 'Лёгкая, но умная: компактная модель с агентским интеллектом', 'desc': 'Youtu-LLM — это компактная языковая модель размером 1.96B параметров, разработанная с нуля для эффективного выполнения задач планирования и рассуждения. Модель использует инновационную архитектуру Multi-Latent Attention с поддержкой контекста в 128k токенов и специально разработанным STEM-ориентированным словарём. Обучение проводилось по принципиальной многоэтапной схеме на 11 триллионах токенов, постепенно переходя от общего знания к сложным STEM-задачам и агентским способностям. На этапе миддл-обучения применялись разнообразные стратегии синтеза данных для развития навыков планирования и рефлексии в математике, кодировании и работе с инструментами.'}, 'en': {'title': 'Lightweight Intelligence: Youtu-LLM Redefines Efficiency in Language Models', 'desc': 'Youtu-LLM is a lightweight language model designed for high computational efficiency and enhanced reasoning abilities. It features a unique Multi-Latent Attention architecture that supports long-context processing, allowing it to handle complex tasks with minimal memory use. The model is trained on a diverse dataset that transitions from general knowledge to specialized STEM and agentic tasks, fostering deep cognitive skills. Evaluations reveal that Youtu-LLM outperforms larger models in specific agent-related tasks, proving that smaller models can achieve significant intelligence and performance.'}, 'zh': {'title': '轻量级模型，强大智能！', 'desc': 'Youtu-LLM是一种轻量级语言模型，旨在提高计算效率和智能代理能力。它采用紧凑的架构和以STEM为重点的训练课程，从零开始预训练，以培养推理和规划能力。该模型支持128k的长上下文窗口，适合长时间的代理和推理任务。通过多阶段的训练策略，Youtu-LLM在复杂的STEM和代理任务上表现出色，证明了轻量级模型也能具备强大的内在智能能力。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.24873', 'title': 'Let It Flow: Agentic Crafting on Rock and Roll, Building the ROME Model within an Open Agentic Learning Ecosystem', 'url': 'https://huggingface.co/papers/2512.24873', 'abstract': 'The Agentic Learning Ecosystem (ALE) introduces a principled infrastructure for agent development, combining post-training optimization, sandbox environments, and policy alignment to enhance long-horizon training stability and performance in real-world tasks.  \t\t\t\t\tAI-generated summary \t\t\t\t Agentic crafting requires LLMs to operate in real-world environments over multiple turns by taking actions, observing outcomes, and iteratively refining artifacts. Despite its importance, the open-source community lacks a principled, end-to-end ecosystem to streamline agent development. We introduce the Agentic Learning Ecosystem (ALE), a foundational infrastructure that optimizes the production pipeline for agent LLMs. ALE consists of three components: ROLL, a post-training framework for weight optimization; ROCK, a sandbox environment manager for trajectory generation; and iFlow CLI, an agent framework for efficient context engineering. We release ROME (ROME is Obviously an Agentic Model), an open-source agent grounded by ALE and trained on over one million trajectories. Our approach includes data composition protocols for synthesizing complex behaviors and a novel policy optimization algorithm, Interaction-based Policy Alignment (IPA), which assigns credit over semantic interaction chunks rather than individual tokens to improve long-horizon training stability. Empirically, we evaluate ROME within a structured setting and introduce Terminal Bench Pro, a benchmark with improved scale and contamination control. ROME demonstrates strong performance across benchmarks like SWE-bench Verified and Terminal Bench, proving the effectiveness of the ALE infrastructure.', 'score': 32, 'issue_id': 353, 'pub_date': '2026-12-31', 'pub_date_card': {'ru': '31 декабря', 'en': 'December 31', 'zh': '12月31日'}, 'hash': '2b323e652f7b8183', 'authors': ['Weixun Wang', 'XiaoXiao Xu', 'Wanhe An', 'Fangwen Dai', 'Wei Gao', 'Yancheng He', 'Ju Huang', 'Qiang Ji', 'Hanqi Jin', 'Xiaoyang Li', 'Yang Li', 'Zhongwen Li', 'Shirong Lin', 'Jiashun Liu', 'Zenan Liu', 'Tao Luo', 'Dilxat Muhtar', 'Yuanbin Qu', 'Jiaqiang Shi', 'Qinghui Sun', 'Yingshui Tan', 'Hao Tang', 'Runze Wang', 'Yi Wang', 'Zhaoguo Wang', 'Yanan Wu', 'Shaopan Xiong', 'Binchen Xu', 'Xander Xu', 'Yuchi Xu', 'Qipeng Zhang', 'Xixia Zhang', 'Haizhou Zhao', 'Jie Zhao', 'Shuaibing Zhao', 'Baihui Zheng', 'Jianhui Zheng', 'Suhang Zheng', 'Yanni Zhu', 'Mengze Cai', 'Kerui Cao', 'Xitong Chen', 'Yue Dai', 'Lifan Du', 'Tao Feng', 'Tao He', 'Jin Hu', 'Yijie Hu', 'Ziyu Jiang', 'Cheng Li', 'Xiang Li', 'Jing Liang', 'Chonghuan Liu', 'ZhenDong Liu', 'Haodong Mi', 'Yanhu Mo', 'Junjia Ni', 'Shixin Pei', 'Jingyu Shen', 'XiaoShuai Song', 'Cecilia Wang', 'Chaofan Wang', 'Kangyu Wang', 'Pei Wang', 'Tao Wang', 'Wei Wang', 'Ke Xiao', 'Mingyu Xu', 'Tiange Xu', 'Nan Ya', 'Siran Yang', 'Jianan Ye', 'Yaxing Zang', 'Duo Zhang', 'Junbo Zhang', 'Boren Zheng', 'Wanxi Deng', 'Ling Pan', 'Lin Qu', 'Wenbo Su', 'Jiamang Wang', 'Wei Wang', 'Hu Wei', 'Minggang Wu', 'Cheng Yu', 'Bing Zhao', 'Zhicheng Zheng', 'Bo Zheng'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2512.24873.jpg', 'data': {'categories': ['#alignment', '#open_source', '#synthetic', '#dataset', '#agents', '#training', '#rlhf', '#optimization', '#benchmark'], 'emoji': '🤖', 'ru': {'title': 'Экосистема для практического обучения интеллектуальных агентов с оптимизацией политики', 'desc': 'Статья представляет Agentic Learning Ecosystem (ALE) — комплексную инфраструктуру для разработки агентов на основе LLM, которая включает фреймворк постобучения ROLL для оптимизации весов, окружение ROCK для генерации траекторий и фреймворк iFlow для инженерии контекста. Авторы предлагают новый алгоритм оптимизации политики под названием Interaction-based Policy Alignment (IPA), который назначает награды семантическим блокам взаимодействия вместо отдельных токенов, что улучшает стабильность обучения на длинных горизонтах планирования. В рамках исследования разработан ROME — открытый агент, обученный на более чем миллионе траекторий, и представлен бенчмарк Terminal Bench Pro с улучшенным контролем масштабируемости и контаминации. Экспериментальные результаты на бенчмарках SWE-bench Verified и Terminal Bench демонстрируют эффективность предложенной инфраструктуры для разработки агентов реального мира.'}, 'en': {'title': 'Streamlining Agent Development with ALE', 'desc': "The Agentic Learning Ecosystem (ALE) provides a structured framework for developing AI agents, particularly large language models (LLMs), to perform tasks in real-world settings. It integrates three key components: ROLL for optimizing model weights post-training, ROCK for managing sandbox environments to generate action trajectories, and iFlow CLI for enhancing context management. The system introduces a novel policy optimization method called Interaction-based Policy Alignment (IPA), which improves training stability by focusing on meaningful interactions rather than individual data points. The open-source agent ROME, built on ALE, showcases significant performance improvements across various benchmarks, demonstrating the framework's effectiveness in agent development."}, 'zh': {'title': '智能体开发的新基础设施：Agentic Learning Ecosystem', 'desc': 'Agentic Learning Ecosystem (ALE) 是一个为智能体开发提供的基础设施，旨在通过后训练优化、沙盒环境和策略对齐来提高长时间训练的稳定性和性能。该系统包括三个主要组件：ROLL用于权重优化的后训练框架，ROCK用于轨迹生成的沙盒环境管理器，以及iFlow CLI用于高效上下文工程的智能体框架。我们还发布了ROME，这是一个基于ALE的开源智能体，经过超过一百万条轨迹的训练。通过引入基于交互的策略对齐算法（IPA），我们能够在复杂行为合成和长时间训练稳定性方面取得显著进展。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.25073', 'title': 'GaMO: Geometry-aware Multi-view Diffusion Outpainting for Sparse-View 3D Reconstruction', 'url': 'https://huggingface.co/papers/2512.25073', 'abstract': 'GaMO enhances sparse-view 3D reconstruction by using geometry-aware multi-view outpainting to improve scene coverage and consistency, achieving state-of-the-art performance with reduced computational cost.  \t\t\t\t\tAI-generated summary \t\t\t\t Recent advances in 3D reconstruction have achieved remarkable progress in high-quality scene capture from dense multi-view imagery, yet struggle when input views are limited. Various approaches, including regularization techniques, semantic priors, and geometric constraints, have been implemented to address this challenge. Latest diffusion-based methods have demonstrated substantial improvements by generating novel views from new camera poses to augment training data, surpassing earlier regularization and prior-based techniques. Despite this progress, we identify three critical limitations in these state-of-the-art approaches: inadequate coverage beyond known view peripheries, geometric inconsistencies across generated views, and computationally expensive pipelines. We introduce GaMO (Geometry-aware Multi-view Outpainter), a framework that reformulates sparse-view reconstruction through multi-view outpainting. Instead of generating new viewpoints, GaMO expands the field of view from existing camera poses, which inherently preserves geometric consistency while providing broader scene coverage. Our approach employs multi-view conditioning and geometry-aware denoising strategies in a zero-shot manner without training. Extensive experiments on Replica and ScanNet++ demonstrate state-of-the-art reconstruction quality across 3, 6, and 9 input views, outperforming prior methods in PSNR and LPIPS, while achieving a 25times speedup over SOTA diffusion-based methods with processing time under 10 minutes. Project page: https://yichuanh.github.io/GaMO/', 'score': 21, 'issue_id': 358, 'pub_date': '2026-12-31', 'pub_date_card': {'ru': '31 декабря', 'en': 'December 31', 'zh': '12月31日'}, 'hash': 'a90af97d4a64b013', 'authors': ['Yi-Chuan Huang', 'Hao-Jen Chien', 'Chin-Yang Lin', 'Ying-Huan Chen', 'Yu-Lun Liu'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2512.25073.jpg', 'data': {'categories': ['#3d', '#diffusion', '#optimization', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Расширение поля зрения вместо синтеза новых видов для реконструкции разреженных сцен', 'desc': 'GaMO — это метод для реконструкции трёхмерных сцен из ограниченного количества видов, который использует многовидовую допаивку (outpainting) вместо генерации новых точек обзора. Ключевая идея заключается в расширении поля зрения существующих камер, что естественным образом сохраняет геометрическую согласованность между сгенерированными видами и обеспечивает более полное покрытие сцены. Метод использует геометрически-осведомлённую стратегию денойзинга в нулевом режиме (без обучения) и работает в 25 раз быстрее существующих диффузионных подходов. На стандартных бенчмарках Replica и ScanNet++ GaMO достигает лучших результатов по метрикам PSNR и LPIPS при обработке времени менее 10 минут.'}, 'en': {'title': 'Enhancing 3D Reconstruction with Geometry-Aware Outpainting', 'desc': 'GaMO (Geometry-aware Multi-view Outpainter) is a novel framework designed to enhance sparse-view 3D reconstruction by improving scene coverage and consistency. It achieves this by expanding the field of view from existing camera positions rather than generating new viewpoints, which helps maintain geometric accuracy. The method utilizes multi-view conditioning and geometry-aware denoising techniques in a zero-shot manner, eliminating the need for extensive training. Experimental results show that GaMO outperforms previous methods in reconstruction quality while significantly reducing computational costs, achieving a 25 times speedup over state-of-the-art diffusion-based techniques.'}, 'zh': {'title': 'GaMO：提升稀疏视图3D重建的几何感知方法', 'desc': 'GaMO（几何感知多视图外推器）通过多视图外推技术增强稀疏视图的3D重建，改善了场景覆盖和一致性。该方法不再生成新视点，而是扩展现有相机位置的视野，从而保持几何一致性并提供更广泛的场景覆盖。GaMO采用多视图条件和几何感知去噪策略，以零样本方式进行，无需训练。实验结果表明，GaMO在重建质量上超越了之前的方法，并在处理速度上实现了显著提升。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.23380', 'title': 'A unified framework for detecting point and collective anomalies in operating system logs via collaborative transformers', 'url': 'https://huggingface.co/papers/2512.23380', 'abstract': "CoLog, a log anomaly detection framework, employs collaborative transformers and multi-head impressed attention with a modality adaptation layer to achieve high-precision detection of both point and collective anomalies across diverse log modalities.  \t\t\t\t\tAI-generated summary \t\t\t\t Log anomaly detection is crucial for preserving the security of operating systems. Depending on the source of log data collection, various information is recorded in logs that can be considered log modalities. In light of this intuition, unimodal methods often struggle by ignoring the different modalities of log data. Meanwhile, multimodal methods fail to handle the interactions between these modalities. Applying multimodal sentiment analysis to log anomaly detection, we propose CoLog, a framework that collaboratively encodes logs utilizing various modalities. CoLog utilizes collaborative transformers and multi-head impressed attention to learn interactions among several modalities, ensuring comprehensive anomaly detection. To handle the heterogeneity caused by these interactions, CoLog incorporates a modality adaptation layer, which adapts the representations from different log modalities. This methodology enables CoLog to learn nuanced patterns and dependencies within the data, enhancing its anomaly detection capabilities. Extensive experiments demonstrate CoLog's superiority over existing state-of-the-art methods. Furthermore, in detecting both point and collective anomalies, CoLog achieves a mean precision of 99.63%, a mean recall of 99.59%, and a mean F1 score of 99.61% across seven benchmark datasets for log-based anomaly detection. The comprehensive detection capabilities of CoLog make it highly suitable for cybersecurity, system monitoring, and operational efficiency. CoLog represents a significant advancement in log anomaly detection, providing a sophisticated and effective solution to point and collective anomaly detection through a unified framework and a solution to the complex challenges automatic log data analysis poses. We also provide the implementation of CoLog at https://github.com/NasirzadehMoh/CoLog.", 'score': 17, 'issue_id': 366, 'pub_date': '2026-12-29', 'pub_date_card': {'ru': '29 декабря', 'en': 'December 29', 'zh': '12月29日'}, 'hash': '60dd192b220eb6aa', 'authors': ['Mohammad Nasirzadeh', 'Jafar Tahmoresnezhad', 'Parviz Rashidi-Khazaee'], 'affiliations': ['Urmia University of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2512.23380.jpg', 'data': {'categories': ['#open_source', '#architecture', '#benchmark', '#security', '#multimodal'], 'emoji': '🔍', 'ru': {'title': 'Совместное кодирование мультимодальных логов для обнаружения аномалий', 'desc': 'CoLog — это фреймворк для обнаружения аномалий в логах, использующий мультимодальный подход с сотрудничающими трансформерами и многоголовым механизмом внимания. Система способна обрабатывать различные модальности логов (разные типы источников данных) и выявлять как точечные, так и коллективные аномалии. Для адаптации к гетерогенности данных применяется специальный слой модальной адаптации, который согласует представления разных модальностей. На семи бенчмарк-датасетах CoLog достигает впечатляющих результатов: точность 99.63%, полноту 99.59% и F1-меру 99.61%.'}, 'en': {'title': 'CoLog: Revolutionizing Log Anomaly Detection with Collaborative Transformers', 'desc': 'CoLog is a log anomaly detection framework that utilizes collaborative transformers and multi-head impressed attention to effectively identify both point and collective anomalies in diverse log modalities. It addresses the limitations of unimodal and multimodal methods by incorporating a modality adaptation layer, which helps in managing the interactions between different log data types. This innovative approach allows CoLog to learn complex patterns and dependencies, significantly improving its detection accuracy. With impressive performance metrics, including a mean precision of 99.63%, CoLog stands out as a powerful tool for enhancing cybersecurity and operational efficiency.'}, 'zh': {'title': 'CoLog：高效的日志异常检测框架', 'desc': 'CoLog是一个日志异常检测框架，采用协作变换器和多头注意力机制，结合模态适应层，实现对多种日志模态中点异常和集体异常的高精度检测。该框架通过协同编码不同模态的日志，克服了单模态方法忽视日志数据多样性的问题。CoLog能够学习模态之间的交互，适应不同日志模态的表示，从而提高异常检测的能力。实验结果表明，CoLog在七个基准数据集上表现优异，平均精度达到99.63%，为网络安全和系统监控提供了有效的解决方案。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.25070', 'title': 'Scaling Open-Ended Reasoning to Predict the Future', 'url': 'https://huggingface.co/papers/2512.25070', 'abstract': 'High-stakes decision making involves reasoning under uncertainty about the future. In this work, we train language models to make predictions on open-ended forecasting questions. To scale up training data, we synthesize novel forecasting questions from global events reported in daily news, using a fully automated, careful curation recipe. We train the Qwen3 thinking models on our dataset, OpenForesight. To prevent leakage of future information during training and evaluation, we use an offline news corpus, both for data generation and retrieval in our forecasting system. Guided by a small validation set, we show the benefits of retrieval, and an improved reward function for reinforcement learning (RL). Once we obtain our final forecasting system, we perform held-out testing between May to August 2025. Our specialized model, OpenForecaster 8B, matches much larger proprietary models, with our training improving the accuracy, calibration, and consistency of predictions. We find calibration improvements from forecasting training generalize across popular benchmarks. We open-source all our models, code, and data to make research on language model forecasting broadly accessible.', 'score': 12, 'issue_id': 353, 'pub_date': '2026-12-31', 'pub_date_card': {'ru': '31 декабря', 'en': 'December 31', 'zh': '12月31日'}, 'hash': '3b992c58072db0d3', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#optimization', '#open_source', '#dataset', '#training', '#leakage', '#small_models', '#reasoning', '#rl', '#synthetic', '#data', '#benchmark'], 'emoji': '🔮', 'ru': {'title': 'Языковые модели как эксперты по предсказанию будущего', 'desc': 'В работе авторы обучают языковые модели делать предсказания по открытым вопросам прогнозирования, используя синтезированный датасет OpenForesight с новостями из глобальных событий. Для предотвращения утечки информации о будущем используется автономный корпус новостей как при генерации данных, так и при поиске информации в системе прогнозирования. Модель OpenForecaster 8B обучается с помощью reinforcement learning с улучшенной функцией вознаграждения, что повышает точность, калибровку и консистентность предсказаний. Авторы открыли исходный код, модели и датасеты, что делает исследования в области прогнозирования с языковыми моделями доступными для широкого сообщества.'}, 'en': {'title': 'Empowering Predictions: OpenForesight for Uncertain Futures', 'desc': 'This paper focuses on enhancing decision-making in uncertain situations by training language models to predict outcomes for open-ended forecasting questions. The authors create a large dataset called OpenForesight by synthesizing forecasting questions from global news events, ensuring that future information does not leak during training. They utilize reinforcement learning with an improved reward function and a validation set to refine their forecasting system. The resulting model, OpenForecaster 8B, demonstrates competitive performance against larger models, showing better accuracy and consistency in predictions, and the authors make their resources available for further research.'}, 'zh': {'title': '开放式预测：提升语言模型的决策能力', 'desc': '本研究旨在训练语言模型以应对高风险决策中的不确定性，特别是在开放式预测问题上。我们通过从每日新闻中提取全球事件，自动合成新的预测问题，以扩大训练数据集。我们使用离线新闻语料库来防止在训练和评估过程中泄露未来信息，并在此基础上训练我们的预测系统。最终，我们的专用模型OpenForecaster 8B在准确性、校准和一致性方面表现优异，能够与更大规模的专有模型相媲美。'}}, 'authors': [], 'affiliations': [], 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.24551', 'title': 'PhyGDPO: Physics-Aware Groupwise Direct Preference Optimization for Physically Consistent Text-to-Video Generation', 'url': 'https://huggingface.co/papers/2512.24551', 'abstract': 'Recent advances in text-to-video (T2V) generation have achieved good visual quality, yet synthesizing videos that faithfully follow physical laws remains an open challenge. Existing methods mainly based on graphics or prompt extension struggle to generalize beyond simple simulated environments or learn implicit physical reasoning. The scarcity of training data with rich physics interactions and phenomena is also a problem. In this paper, we first introduce a Physics-Augmented video data construction Pipeline, PhyAugPipe, that leverages a vision-language model (VLM) with chain-of-thought reasoning to collect a large-scale training dataset, PhyVidGen-135K. Then we formulate a principled Physics-aware Groupwise Direct Preference Optimization, PhyGDPO, framework that builds upon the groupwise Plackett-Luce probabilistic model to capture holistic preferences beyond pairwise comparisons. In PhyGDPO, we design a Physics-Guided Rewarding (PGR) scheme that embeds VLM-based physics rewards to steer optimization toward physical consistency. We also propose a LoRA-Switch Reference (LoRA-SR) scheme that eliminates memory-heavy reference duplication for efficient training. Experiments show that our method significantly outperforms state-of-the-art open-source methods on PhyGenBench and VideoPhy2. Please check our project page at https://caiyuanhao1998.github.io/project/PhyGDPO for more video results. Our code, models, and data will be released at https://github.com/caiyuanhao1998/Open-PhyGDPO', 'score': 12, 'issue_id': 353, 'pub_date': '2026-12-31', 'pub_date_card': {'ru': '31 декабря', 'en': 'December 31', 'zh': '12月31日'}, 'hash': '581846a1ed6df832', 'authors': ['Yuanhao Cai', 'Kunpeng Li', 'Menglin Jia', 'Jialiang Wang', 'Junzhe Sun', 'Feng Liang', 'Weifeng Chen', 'Felix Juefei-Xu', 'Chu Wang', 'Ali Thabet', 'Xiaoliang Dai', 'Xuan Ju', 'Alan Yuille', 'Ji Hou'], 'affiliations': ['CUHK', 'Johns Hopkins University', 'Meta BizAI', 'Meta Superintelligence Labs'], 'pdf_title_img': 'assets/pdf/title_img/2512.24551.jpg', 'data': {'categories': ['#multimodal', '#dataset', '#training', '#rlhf', '#video', '#data'], 'emoji': '🎬', 'ru': {'title': 'Физически осознанная генерация видео из текста с предпочтительной оптимизацией', 'desc': 'Работа посвящена улучшению генерации видео из текста путём внедрения физического моделирования. Авторы создали новый датасет PhyVidGen-135K, используя vision-language model и цепочку рассуждений для сбора видео с физически корректными взаимодействиями. Предложен новый метод оптимизации предпочтений PhyGDPO, который расширяет стандартный подход на основе модели Plackett-Luce для более полного учёта физической реалистичности. Метод включает вознаграждающую схему на основе vision-language model и эффективный механизм LoRA-Switch для снижения требований к памяти при обучении.'}, 'en': {'title': 'Generating Physically Consistent Videos with Advanced Optimization', 'desc': 'This paper addresses the challenge of generating videos that adhere to physical laws in text-to-video (T2V) generation. The authors introduce a new data construction pipeline called PhyAugPipe, which uses a vision-language model to create a large dataset with rich physics interactions. They also propose a novel optimization framework, PhyGDPO, that incorporates a physics-guided rewarding system to enhance the physical consistency of generated videos. Experimental results demonstrate that their approach significantly improves performance compared to existing methods.'}, 'zh': {'title': '物理一致性的视频生成新方法', 'desc': '本文提出了一种物理增强的视频数据构建管道PhyAugPipe，利用视觉-语言模型（VLM）和思维链推理来收集大规模训练数据集PhyVidGen-135K。我们还提出了一种基于物理的群体直接偏好优化框架PhyGDPO，旨在捕捉整体偏好并超越简单的成对比较。PhyGDPO中设计的物理引导奖励机制（PGR）通过嵌入VLM基础的物理奖励来引导优化，确保生成视频的物理一致性。此外，我们提出的LoRA-Switch Reference方案有效减少了内存占用，提高了训练效率。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.24210', 'title': 'GR-Dexter Technical Report', 'url': 'https://huggingface.co/papers/2512.24210', 'abstract': 'GR-Dexter introduces a hardware-model-data framework for bimanual dexterous-hand robot manipulation using vision-language-action models, combining teleoperation data and multimodal datasets to achieve robust generalization.  \t\t\t\t\tAI-generated summary \t\t\t\t Vision-language-action (VLA) models have enabled language-conditioned, long-horizon robot manipulation, but most existing systems are limited to grippers. Scaling VLA policies to bimanual robots with high degree-of-freedom (DoF) dexterous hands remains challenging due to the expanded action space, frequent hand-object occlusions, and the cost of collecting real-robot data. We present GR-Dexter, a holistic hardware-model-data framework for VLA-based generalist manipulation on a bimanual dexterous-hand robot. Our approach combines the design of a compact 21-DoF robotic hand, an intuitive bimanual teleoperation system for real-robot data collection, and a training recipe that leverages teleoperated robot trajectories together with large-scale vision-language and carefully curated cross-embodiment datasets. Across real-world evaluations spanning long-horizon everyday manipulation and generalizable pick-and-place, GR-Dexter achieves strong in-domain performance and improved robustness to unseen objects and unseen instructions. We hope GR-Dexter serves as a practical step toward generalist dexterous-hand robotic manipulation.', 'score': 11, 'issue_id': 353, 'pub_date': '2026-12-30', 'pub_date_card': {'ru': '30 декабря', 'en': 'December 30', 'zh': '12月30日'}, 'hash': '999fb5bf63af5286', 'authors': ['Ruoshi Wen', 'Guangzeng Chen', 'Zhongren Cui', 'Min Du', 'Yang Gou', 'Zhigang Han', 'Liqun Huang', 'Mingyu Lei', 'Yunfei Li', 'Zhuohang Li', 'Wenlei Liu', 'Yuxiao Liu', 'Xiao Ma', 'Hao Niu', 'Yutao Ouyang', 'Zeyu Ren', 'Haixin Shi', 'Wei Xu', 'Haoxiang Zhang', 'Jiajun Zhang', 'Xiao Zhang', 'Liwei Zheng', 'Weiheng Zhong', 'Yifei Zhou', 'Zhengming Zhu', 'Hang Li'], 'affiliations': ['ByteDance'], 'pdf_title_img': 'assets/pdf/title_img/2512.24210.jpg', 'data': {'categories': ['#robotics', '#dataset', '#multimodal', '#training'], 'emoji': '🤖', 'ru': {'title': 'Обучаемая ловкость: универсальная двуручная манипуляция через видео-языковые модели', 'desc': 'GR-Dexter представляет собой комплексный фреймворк аппаратного обеспечения, модели и данных для обучения двуручного робота-манипулятора с ловкими кистями на основе видео-языковых моделей действий. Система объединяет телеоперационные данные с крупномасштабными мультимодальными датасетами, включая кросс-воплощённые примеры манипуляции. Авторы разработали компактную 21-степенную кисть, интуитивную систему телеопрации для сбора реальных данных и специализированный рецепт обучения, который обеспечивает обобщение на новые объекты и инструкции. Экспериментальные результаты демонстрируют сильную производительность во внутридоменных задачах и устойчивость к невидимым объектам при выполнении долгогоризонтных манипуляционных операций.'}, 'en': {'title': 'Empowering Bimanual Robots with Vision-Language Action!', 'desc': 'GR-Dexter is a framework designed to enhance the manipulation capabilities of bimanual dexterous-hand robots using vision-language-action (VLA) models. It addresses challenges such as the complex action space and occlusions that arise with high degree-of-freedom robotic hands. By integrating teleoperation data with multimodal datasets, GR-Dexter enables robust generalization in robot manipulation tasks. The framework demonstrates strong performance in real-world scenarios, making it a significant advancement in the field of robotic manipulation.'}, 'zh': {'title': 'GR-Dexter：双手灵巧机器人操作的新突破', 'desc': 'GR-Dexter提出了一种硬件-模型-数据框架，用于双手灵巧机器人操作，结合了视觉-语言-动作模型。该框架通过整合遥操作数据和多模态数据集，实现了对复杂操作的强大泛化能力。GR-Dexter的设计包括一个紧凑的21自由度机器人手和直观的双手遥操作系统，以便收集真实机器人数据。通过在真实环境中的评估，GR-Dexter在日常操作和可泛化的抓取-放置任务中表现出色，增强了对未知物体和指令的鲁棒性。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.23343', 'title': 'AI Meets Brain: Memory Systems from Cognitive Neuroscience to Autonomous Agents', 'url': 'https://huggingface.co/papers/2512.23343', 'abstract': 'Memory serves as the pivotal nexus bridging past and future, providing both humans and AI systems with invaluable concepts and experience to navigate complex tasks. Recent research on autonomous agents has increasingly focused on designing efficient memory workflows by drawing on cognitive neuroscience. However, constrained by interdisciplinary barriers, existing works struggle to assimilate the essence of human memory mechanisms. To bridge this gap, we systematically synthesizes interdisciplinary knowledge of memory, connecting insights from cognitive neuroscience with LLM-driven agents. Specifically, we first elucidate the definition and function of memory along a progressive trajectory from cognitive neuroscience through LLMs to agents. We then provide a comparative analysis of memory taxonomy, storage mechanisms, and the complete management lifecycle from both biological and artificial perspectives. Subsequently, we review the mainstream benchmarks for evaluating agent memory. Additionally, we explore memory security from dual perspectives of attack and defense. Finally, we envision future research directions, with a focus on multimodal memory systems and skill acquisition.', 'score': 10, 'issue_id': 358, 'pub_date': '2026-12-29', 'pub_date_card': {'ru': '29 декабря', 'en': 'December 29', 'zh': '12月29日'}, 'hash': 'c907d7b6498bd21c', 'authors': ['Jiafeng Liang', 'Hao Li', 'Chang Li', 'Jiaqi Zhou', 'Shixin Jiang', 'Zekun Wang', 'Changkai Ji', 'Zhihao Zhu', 'Runxuan Liu', 'Tao Ren', 'Jinlan Fu', 'See-Kiong Ng', 'Xia Liang', 'Ming Liu', 'Bing Qin'], 'affiliations': ['Fudan University, China', 'Harbin Institute of Technology, China', 'National University of Singapore, Singapore', 'Peking University, China'], 'pdf_title_img': 'assets/pdf/title_img/2512.23343.jpg', 'data': {'categories': ['#agents', '#benchmark', '#multimodal'], 'emoji': '🧠', 'ru': {'title': 'Память как фундамент интеллекта: от нейронауки к агентам на основе LLM', 'desc': 'В этой работе авторы проводят систематический анализ памяти в автономных агентах, основанный на знаниях когнитивной нейронауки и принципах работы больших языковых моделей. Они изучают определение, функции и таксономию памяти, сравнивая биологические и искусственные механизмы хранения информации на полном жизненном цикле. Работа включает обзор основных бенчмарков для оценки памяти агентов и анализ вопросов безопасности с точки зрения атак и защиты. Авторы предлагают направления будущих исследований, сосредоточенные на мультимодальных системах памяти и приобретении навыков.'}, 'en': {'title': 'Bridging Human Memory and AI: A New Frontier in Autonomous Agents', 'desc': 'This paper explores the integration of human memory mechanisms into the design of autonomous agents, particularly those driven by large language models (LLMs). It synthesizes knowledge from cognitive neuroscience to enhance the understanding of memory functions and workflows in AI systems. The authors provide a comparative analysis of memory types, storage methods, and management processes from both biological and artificial viewpoints. They also discuss the evaluation of agent memory and propose future research directions, emphasizing the importance of multimodal memory systems and skill acquisition.'}, 'zh': {'title': '记忆：连接过去与未来的桥梁', 'desc': '本文探讨了记忆在人工智能系统中的重要性，强调了记忆如何帮助自主智能体完成复杂任务。研究结合了认知神经科学与大语言模型（LLM），系统性地分析了记忆的定义、功能及其在生物和人工智能中的管理生命周期。文章还比较了记忆的分类、存储机制，并回顾了评估智能体记忆的主流基准。最后，作者展望了未来的研究方向，特别是多模态记忆系统和技能获取。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.23988', 'title': 'Fantastic Reasoning Behaviors and Where to Find Them: Unsupervised Discovery of the Reasoning Process', 'url': 'https://huggingface.co/papers/2512.23988', 'abstract': "An unsupervised framework using sparse auto-encoders identifies and controls interpretable reasoning behaviors in large language models through disentangled latent vectors.  \t\t\t\t\tAI-generated summary \t\t\t\t Despite the growing reasoning capabilities of recent large language models (LLMs), their internal mechanisms during the reasoning process remain underexplored. Prior approaches often rely on human-defined concepts (e.g., overthinking, reflection) at the word level to analyze reasoning in a supervised manner. However, such methods are limited, as it is infeasible to capture the full spectrum of potential reasoning behaviors, many of which are difficult to define in token space. In this work, we propose an unsupervised framework (namely, RISE: Reasoning behavior Interpretability via Sparse auto-Encoder) for discovering reasoning vectors, which we define as directions in the activation space that encode distinct reasoning behaviors. By segmenting chain-of-thought traces into sentence-level 'steps' and training sparse auto-encoders (SAEs) on step-level activations, we uncover disentangled features corresponding to interpretable behaviors such as reflection and backtracking. Visualization and clustering analyses show that these behaviors occupy separable regions in the decoder column space. Moreover, targeted interventions on SAE-derived vectors can controllably amplify or suppress specific reasoning behaviors, altering inference trajectories without retraining. Beyond behavior-specific disentanglement, SAEs capture structural properties such as response length, revealing clusters of long versus short reasoning traces. More interestingly, SAEs enable the discovery of novel behaviors beyond human supervision. We demonstrate the ability to control response confidence by identifying confidence-related vectors in the SAE decoder space. These findings underscore the potential of unsupervised latent discovery for both interpreting and controllably steering reasoning in LLMs.", 'score': 6, 'issue_id': 353, 'pub_date': '2026-12-30', 'pub_date_card': {'ru': '30 декабря', 'en': 'December 30', 'zh': '12月30日'}, 'hash': 'eee1ab8177524c42', 'authors': ['Zhenyu Zhang', 'Shujian Zhang', 'John Lambert', 'Wenxuan Zhou', 'Zhangyang Wang', 'Mingqing Chen', 'Andrew Hard', 'Rajiv Mathews', 'Lun Wang'], 'affiliations': ['Google DeepMind', 'The University of Texas at Austin'], 'pdf_title_img': 'assets/pdf/title_img/2512.23988.jpg', 'data': {'categories': ['#reasoning', '#interpretability'], 'emoji': '🧠', 'ru': {'title': 'Раскрытие скрытых механизмов рассуждений в LLM через разреженное кодирование', 'desc': 'В этой работе предложена неконтролируемая система RISE для обнаружения и интерпретации векторов рассуждений в больших языковых моделях с помощью разреженных автокодировщиков. Исследователи разбивают цепочки мыслей на отдельные шаги и обучают SAE на активациях уровня шагов, чтобы выявить диsentangled признаки, соответствующие интерпретируемым поведениям рассуждений. Полученные векторы позволяют целенаправленно усиливать или подавлять специфические поведения рассуждений без переобучения модели. Система также обнаруживает новые поведения, выходящие за рамки человеческого надзора, например контроль уверенности в ответах.'}, 'en': {'title': 'Unleashing Interpretability: Controlling Reasoning in LLMs with Sparse Auto-Encoders', 'desc': "This paper introduces an unsupervised framework called RISE, which uses sparse auto-encoders to identify and control reasoning behaviors in large language models (LLMs). Unlike previous methods that rely on predefined concepts, RISE discovers reasoning vectors that represent distinct behaviors in the model's activation space. By analyzing sentence-level steps in reasoning, the framework reveals interpretable features such as reflection and backtracking, which can be visualized and clustered. Additionally, RISE allows for targeted interventions to manipulate these reasoning behaviors, enhancing our understanding and control over LLMs without the need for retraining."}, 'zh': {'title': '无监督推理行为控制的创新框架', 'desc': '本研究提出了一种无监督框架，利用稀疏自编码器（SAE）来识别和控制大型语言模型中的可解释推理行为。通过将推理过程分解为句子级的“步骤”，并在这些步骤的激活上训练稀疏自编码器，我们发现了与反思和回溯等可解释行为相对应的解耦特征。可视化和聚类分析表明，这些行为在解码器列空间中占据可分离的区域。此外，我们还可以通过对SAE导出的向量进行有针对性的干预，来可控地放大或抑制特定的推理行为，而无需重新训练模型。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.25075', 'title': 'SpaceTimePilot: Generative Rendering of Dynamic Scenes Across Space and Time', 'url': 'https://huggingface.co/papers/2512.25075', 'abstract': "SpaceTimePilot is a video diffusion model enabling independent control of spatial viewpoint and temporal motion through a time-embedding mechanism, temporal-warping training, and a synthetic dataset for precise space-time disentanglement.  \t\t\t\t\tAI-generated summary \t\t\t\t We present SpaceTimePilot, a video diffusion model that disentangles space and time for controllable generative rendering. Given a monocular video, SpaceTimePilot can independently alter the camera viewpoint and the motion sequence within the generative process, re-rendering the scene for continuous and arbitrary exploration across space and time. To achieve this, we introduce an effective animation time-embedding mechanism in the diffusion process, allowing explicit control of the output video's motion sequence with respect to that of the source video. As no datasets provide paired videos of the same dynamic scene with continuous temporal variations, we propose a simple yet effective temporal-warping training scheme that repurposes existing multi-view datasets to mimic temporal differences. This strategy effectively supervises the model to learn temporal control and achieve robust space-time disentanglement. To further enhance the precision of dual control, we introduce two additional components: an improved camera-conditioning mechanism that allows altering the camera from the first frame, and CamxTime, the first synthetic space-and-time full-coverage rendering dataset that provides fully free space-time video trajectories within a scene. Joint training on the temporal-warping scheme and the CamxTime dataset yields more precise temporal control. We evaluate SpaceTimePilot on both real-world and synthetic data, demonstrating clear space-time disentanglement and strong results compared to prior work. Project page: https://zheninghuang.github.io/Space-Time-Pilot/ Code: https://github.com/ZheningHuang/spacetimepilot", 'score': 5, 'issue_id': 353, 'pub_date': '2026-12-31', 'pub_date_card': {'ru': '31 декабря', 'en': 'December 31', 'zh': '12月31日'}, 'hash': 'a5a1be5c32218359', 'authors': ['Zhening Huang', 'Hyeonho Jeong', 'Xuelin Chen', 'Yulia Gryaditskaya', 'Tuanfeng Y. Wang', 'Joan Lasenby', 'Chun-Hao Huang'], 'affiliations': ['Adobe Research', 'University of Cambridge'], 'pdf_title_img': 'assets/pdf/title_img/2512.25075.jpg', 'data': {'categories': ['#diffusion', '#dataset', '#architecture', '#video', '#synthetic'], 'emoji': '🎬', 'ru': {'title': 'Независимое управление камерой и движением в видео через разделение пространства и времени', 'desc': 'SpaceTimePilot — это модель видео-диффузии, которая разделяет пространственное и временное управление для контролируемой генерации видео. Модель позволяет независимо изменять точку обзора камеры и последовательность движения объектов в сцене благодаря механизму встраивания временной информации в процесс диффузии. Для обучения авторы предложили схему временной деформации, которая переиспользует существующие наборы данных многовидовых видео для имитации временных вариаций. Дополнительно они создали синтетический датасет CamxTime с полным покрытием пространственно-временных траекторий для повышения точности двойного управления.'}, 'en': {'title': 'Mastering Space and Time in Video Generation', 'desc': 'SpaceTimePilot is a novel video diffusion model that allows users to independently manipulate both the viewpoint and motion of a scene in generated videos. It utilizes a time-embedding mechanism and a unique temporal-warping training approach to achieve effective space-time disentanglement. By leveraging a synthetic dataset called CamxTime, the model can generate videos with continuous and arbitrary changes in both space and time. The results show that SpaceTimePilot outperforms previous methods in terms of precision and control over video generation.'}, 'zh': {'title': '独立控制时空的创新视频生成模型', 'desc': 'SpaceTimePilot是一种视频扩散模型，能够独立控制空间视角和时间运动。通过时间嵌入机制和时间扭曲训练，该模型实现了精确的时空解耦。它可以根据单目视频，重新渲染场景，允许用户在空间和时间上进行连续的探索。我们还引入了CamxTime数据集，以增强模型的双重控制精度。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.23851', 'title': 'Pretraining Frame Preservation in Autoregressive Video Memory Compression', 'url': 'https://huggingface.co/papers/2512.23851', 'abstract': 'We present PFP, a neural network structure to compress long videos into short contexts, with an explicit pretraining objective to preserve the high-frequency details of single frames at arbitrary temporal positions. The baseline model can compress a 20-second video into a context at about 5k length, where random frames can be retrieved with perceptually preserved appearances. Such pretrained models can be directly fine-tuned as memory encoders for autoregressive video models, enabling long history memory with low context cost and relatively low fidelity loss. We evaluate the framework with ablative settings and discuss the trade-offs of possible neural architecture designs.', 'score': 5, 'issue_id': 353, 'pub_date': '2026-12-29', 'pub_date_card': {'ru': '29 декабря', 'en': 'December 29', 'zh': '12月29日'}, 'hash': '0e65f9e6890d2909', 'authors': ['Lvmin Zhang', 'Shengqu Cai', 'Muyang Li', 'Chong Zeng', 'Beijia Lu', 'Anyi Rao', 'Song Han', 'Gordon Wetzstein', 'Maneesh Agrawala'], 'affiliations': ['Carnegie Mellon University', 'HKUST', 'MIT', 'Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2512.23851.jpg', 'data': {'categories': ['#video', '#architecture', '#training'], 'emoji': '🎬', 'ru': {'title': 'Эффективное сжатие видео с сохранением деталей кадров', 'desc': 'Авторы представляют PFP — архитектуру нейронной сети для сжатия длинных видеопоследовательностей в компактные контексты. Модель обучается с явной целью сохранения высокочастотных деталей отдельных кадров в произвольных временных позициях. Базовая модель способна сжать 20-секундное видео в контекст длиной около 5000 токенов, из которого можно восстанавливать случайные кадры с хорошо сохраненным визуальным качеством. Предобученные модели легко дообучаются в качестве энкодеров памяти для авторегрессивных видеомоделей, обеспечивая доступ к длинной истории с низкими вычислительными затратами.'}, 'en': {'title': 'Efficient Video Compression with High-Fidelity Frame Retrieval', 'desc': 'The paper introduces PFP, a novel neural network architecture designed to compress lengthy videos into concise contexts while maintaining high-frequency details of individual frames. It achieves this by using a pretraining objective that allows for the retrieval of random frames with visually preserved quality. The model can effectively reduce a 20-second video to a context of approximately 5k, making it efficient for memory encoding in autoregressive video models. The authors also explore various neural architecture designs and their trade-offs through extensive evaluations.'}, 'zh': {'title': '高效视频压缩与记忆编码', 'desc': '我们提出了一种名为PFP的神经网络结构，用于将长视频压缩成短的上下文。该模型的预训练目标是保留单帧的高频细节，能够在任意时间位置进行压缩。基线模型可以将20秒的视频压缩为约5k长度的上下文，并且可以以感知上保留的外观随机检索帧。这种预训练模型可以直接微调为自回归视频模型的记忆编码器，从而以较低的上下文成本实现长历史记忆。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.22564', 'title': 'Geometry-Aware Optimization for Respiratory Sound Classification: Enhancing Sensitivity with SAM-Optimized Audio Spectrogram Transformers', 'url': 'https://huggingface.co/papers/2512.22564', 'abstract': 'Respiratory sound classification is hindered by the limited size, high noise levels, and severe class imbalance of benchmark datasets like ICBHI 2017. While Transformer-based models offer powerful feature extraction capabilities, they are prone to overfitting and often converge to sharp minima in the loss landscape when trained on such constrained medical data. To address this, we introduce a framework that enhances the Audio Spectrogram Transformer (AST) using Sharpness-Aware Minimization (SAM). Instead of merely minimizing the training loss, our approach optimizes the geometry of the loss surface, guiding the model toward flatter minima that generalize better to unseen patients. We also implement a weighted sampling strategy to handle class imbalance effectively. Our method achieves a state-of-the-art score of 68.10% on the ICBHI 2017 dataset, outperforming existing CNN and hybrid baselines. More importantly, it reaches a sensitivity of 68.31%, a crucial improvement for reliable clinical screening. Further analysis using t-SNE and attention maps confirms that the model learns robust, discriminative features rather than memorizing background noise.', 'score': 5, 'issue_id': 357, 'pub_date': '2026-12-27', 'pub_date_card': {'ru': '27 декабря', 'en': 'December 27', 'zh': '12月27日'}, 'hash': '2e3862f4d88666a8', 'authors': ['Atakan Işık', 'Selin Vulga Işık', 'Ahmet Feridun Işık', 'Mahşuk Taylan'], 'affiliations': ['nRespiratory'], 'pdf_title_img': 'assets/pdf/title_img/2512.22564.jpg', 'data': {'categories': ['#architecture', '#audio', '#training', '#healthcare'], 'emoji': '🫁', 'ru': {'title': 'Плоские минимумы для надежной диагностики дыхания', 'desc': 'В работе предложен метод классификации звуков дыхания на основе Audio Spectrogram Transformer, который часто переобучается на небольших медицинских датасетах с дисбалансом классов. Авторы используют Sharpness-Aware Minimization для оптимизации геометрии поверхности функции потерь, направляя модель к плоским минимумам с лучшей обобщающей способностью. Дополнительно применяется взвешенная стратегия семплирования для решения проблемы дисбаланса классов. Достигнуты результаты на уровне state-of-the-art на датасете ICBHI 2017 с чувствительностью 68.31%, что критически важно для надежного клинического скрининга.'}, 'en': {'title': 'Enhancing Respiratory Sound Classification with SAM and AST', 'desc': 'This paper addresses the challenges of respiratory sound classification, particularly the issues of limited dataset size, high noise levels, and class imbalance. The authors propose an enhanced Audio Spectrogram Transformer (AST) framework that incorporates Sharpness-Aware Minimization (SAM) to improve model generalization by optimizing the loss surface geometry. By focusing on flatter minima, the model is less likely to overfit and performs better on unseen data. Additionally, a weighted sampling strategy is introduced to effectively manage class imbalance, resulting in state-of-the-art performance on the ICBHI 2017 dataset.'}, 'zh': {'title': '优化呼吸声音分类的深度学习方法', 'desc': '本研究针对呼吸声音分类中的数据集限制问题，提出了一种改进的音频谱图变换器（AST）框架。我们采用了敏感度意识最小化（SAM）方法，优化损失表面的几何形状，以引导模型朝向更平坦的最小值，从而提高对未见患者的泛化能力。此外，我们还实施了加权采样策略，有效处理类别不平衡问题。实验结果表明，该方法在ICBHI 2017数据集上达到了68.10%的最新成绩，显著提高了临床筛查的可靠性。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.24885', 'title': 'BEDA: Belief Estimation as Probabilistic Constraints for Performing Strategic Dialogue Acts', 'url': 'https://huggingface.co/papers/2512.24885', 'abstract': 'A framework called BEDA uses probabilistic constraints on belief estimation to improve strategic dialogue through formalized adversarial and alignment acts, outperforming baselines across multiple task settings.  \t\t\t\t\tAI-generated summary \t\t\t\t Strategic dialogue requires agents to execute distinct dialogue acts, for which belief estimation is essential. While prior work often estimates beliefs accurately, it lacks a principled mechanism to use those beliefs during generation. We bridge this gap by first formalizing two core acts Adversarial and Alignment, and by operationalizing them via probabilistic constraints on what an agent may generate. We instantiate this idea in BEDA, a framework that consists of the world set, the belief estimator for belief estimation, and the conditional generator that selects acts and realizes utterances consistent with the inferred beliefs. Across three settings, Conditional Keeper Burglar (CKBG, adversarial), Mutual Friends (MF, cooperative), and CaSiNo (negotiation), BEDA consistently outperforms strong baselines: on CKBG it improves success rate by at least 5.0 points across backbones and by 20.6 points with GPT-4.1-nano; on Mutual Friends it achieves an average improvement of 9.3 points; and on CaSiNo it achieves the optimal deal relative to all baselines. These results indicate that casting belief estimation as constraints provides a simple, general mechanism for reliable strategic dialogue.', 'score': 4, 'issue_id': 357, 'pub_date': '2026-12-31', 'pub_date_card': {'ru': '31 декабря', 'en': 'December 31', 'zh': '12月31日'}, 'hash': 'da71873530f907a7', 'authors': ['Hengli Li', 'Zhaoxin Yu', 'Qi Shen', 'Chenxi Li', 'Mengmeng Wang', 'Tinglang Wu', 'Yipeng Kang', 'Yuxuan Wang', 'Song-Chun Zhu', 'Zixia Jia', 'Zilong Zheng'], 'affiliations': ['Department of Automation, THU', 'Institute for Artificial Intelligence, PKU', 'Institute of Automation, CAS', 'NLCo, BIGAI', 'School of Artificial Intelligence, BUPT', 'Yuanpei College, PKU'], 'pdf_title_img': 'assets/pdf/title_img/2512.24885.jpg', 'data': {'categories': ['#reasoning', '#alignment'], 'emoji': '🎭', 'ru': {'title': 'Убеждения как ограничения для стратегического диалога', 'desc': 'В работе предложена система BEDA, которая использует вероятностные ограничения на оценку убеждений агента для улучшения стратегического диалога. Авторы формализуют два ключевых типа действий диалога — противоборство и согласование — и реализуют их через вероятностные ограничения на генерируемые высказывания. Система состоит из модели мира, оценивателя убеждений и условного генератора, который выбирает действия и создаёт реплики, согласованные с предполагаемыми убеждениями собеседника. Результаты на трёх задачах показывают значительное улучшение по сравнению с базовыми моделями: на одной задаче точность выросла на 20.6 пункта при использовании GPT-4.1-nano.'}, 'en': {'title': 'Enhancing Strategic Dialogue with BEDA: Belief Estimation Meets Probabilistic Constraints', 'desc': 'The paper introduces BEDA, a framework that enhances strategic dialogue by using probabilistic constraints on belief estimation. It formalizes two key dialogue acts: Adversarial and Alignment, which help agents make better decisions during conversations. By integrating a belief estimator and a conditional generator, BEDA ensures that the generated responses align with the inferred beliefs of the agents. The framework shows significant improvements in performance across various task settings, demonstrating the effectiveness of using belief estimation as a guiding principle in dialogue generation.'}, 'zh': {'title': '信念约束提升战略对话的有效性', 'desc': 'BEDA框架通过对信念估计施加概率约束，提升了战略对话的效果。该框架正式化了对抗性和对齐性两个核心对话行为，并通过概率约束来操作这些行为。BEDA包括世界集、信念估计器和条件生成器，能够根据推断的信念选择对话行为并生成一致的发言。在多个任务设置中，BEDA的表现均优于强基线，显示出将信念估计作为约束的方式为可靠的战略对话提供了简单而通用的机制。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.24385', 'title': 'Forging Spatial Intelligence: A Roadmap of Multi-Modal Data Pre-Training for Autonomous Systems', 'url': 'https://huggingface.co/papers/2512.24385', 'abstract': 'The rapid advancement of autonomous systems, including self-driving vehicles and drones, has intensified the need to forge true Spatial Intelligence from multi-modal onboard sensor data. While foundation models excel in single-modal contexts, integrating their capabilities across diverse sensors like cameras and LiDAR to create a unified understanding remains a formidable challenge. This paper presents a comprehensive framework for multi-modal pre-training, identifying the core set of techniques driving progress toward this goal. We dissect the interplay between foundational sensor characteristics and learning strategies, evaluating the role of platform-specific datasets in enabling these advancements. Our central contribution is the formulation of a unified taxonomy for pre-training paradigms: ranging from single-modality baselines to sophisticated unified frameworks that learn holistic representations for advanced tasks like 3D object detection and semantic occupancy prediction. Furthermore, we investigate the integration of textual inputs and occupancy representations to facilitate open-world perception and planning. Finally, we identify critical bottlenecks, such as computational efficiency and model scalability, and propose a roadmap toward general-purpose multi-modal foundation models capable of achieving robust Spatial Intelligence for real-world deployment.', 'score': 4, 'issue_id': 354, 'pub_date': '2026-12-30', 'pub_date_card': {'ru': '30 декабря', 'en': 'December 30', 'zh': '12月30日'}, 'hash': 'bf38f19718f26a0d', 'authors': ['Song Wang', 'Lingdong Kong', 'Xiaolu Liu', 'Hao Shi', 'Wentong Li', 'Jianke Zhu', 'Steven C. H. Hoi'], 'affiliations': ['Alibaba Group', 'Nanjing University of Aeronautics', 'National University of Singapore', 'Singapore Management University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2512.24385.jpg', 'data': {'categories': ['#benchmark', '#3d', '#multimodal', '#dataset', '#robotics', '#survey'], 'emoji': '🚗', 'ru': {'title': 'Единая таксономия мультимодального предварительного обучения для пространственного интеллекта', 'desc': 'В статье представлена комплексная система для предварительного обучения мультимодальных моделей, которая объединяет данные с различных датчиков (камер и LiDAR) для создания пространственного интеллекта в автономных системах. Авторы разработали единую классификацию парадигм предварительного обучения, от простых однородальных базовых моделей до сложных унифицированных архитектур, способных выполнять задачи 3D-детекции объектов и предсказания семантической занятости пространства. Исследование также включает интеграцию текстовых входов и представлений занятости для открытого восприятия мира и планирования действий. Авторы выявляют критические узкие места в вычислительной эффективности и масштабируемости моделей, предлагая дорожную карту развития универсальных мультимодальных фундаментальных моделей.'}, 'en': {'title': 'Building Spatial Intelligence through Multi-Modal Integration', 'desc': 'This paper addresses the challenge of creating Spatial Intelligence in autonomous systems by integrating data from various sensors like cameras and LiDAR. It introduces a framework for multi-modal pre-training that enhances the ability of models to understand and process diverse sensor inputs. The authors propose a unified taxonomy for pre-training methods, which helps in developing advanced tasks such as 3D object detection. Additionally, the paper highlights key challenges like computational efficiency and scalability, providing a roadmap for building versatile multi-modal foundation models for real-world applications.'}, 'zh': {'title': '构建多模态空间智能的未来之路', 'desc': '本论文探讨了如何从多模态传感器数据中构建真正的空间智能，尤其是在自动驾驶和无人机等自主系统中。我们提出了一种全面的多模态预训练框架，分析了基础传感器特性与学习策略之间的相互作用。通过建立统一的预训练范畴，我们能够从单模态基线到复杂的统一框架，学习用于高级任务的整体表示。最后，我们识别了计算效率和模型可扩展性等关键瓶颈，并提出了实现通用多模态基础模型的路线图。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.24297', 'title': 'Figure It Out: Improving the Frontier of Reasoning with Active Visual Thinking', 'url': 'https://huggingface.co/papers/2512.24297', 'abstract': 'Complex reasoning problems often involve implicit spatial, geometric, and structural relationships that are not explicitly encoded in text. While recent reasoning models have achieved strong performance across many domains, purely text-based reasoning struggles to represent global structural constraints in complex settings. In this paper, we introduce FIGR, which integrates active visual thinking into multi-turn reasoning via end-to-end reinforcement learning. FIGR externalizes intermediate structural hypotheses by constructing visual representations during problem solving. By adaptively regulating when and how visual reasoning should be invoked, FIGR enables more stable and coherent reasoning over global structural properties that are difficult to capture from text alone. Experiments on challenging mathematical reasoning benchmarks demonstrate that FIGR outperforms strong text-only chain-of-thought baselines. In particular, FIGR improves the base model by 13.12% on AIME 2025 and 11.00% on BeyondAIME, highlighting the effectiveness of figure-guided multimodal reasoning in enhancing the stability and reliability of complex reasoning.', 'score': 4, 'issue_id': 353, 'pub_date': '2026-12-30', 'pub_date_card': {'ru': '30 декабря', 'en': 'December 30', 'zh': '12月30日'}, 'hash': '0f388b52a58f75b9', 'authors': ['Meiqi Chen', 'Fandong Meng', 'Jie Zhou'], 'affiliations': ['WeChat AI, Tencent Inc'], 'pdf_title_img': 'assets/pdf/title_img/2512.24297.jpg', 'data': {'categories': ['#rl', '#math', '#multimodal', '#benchmark'], 'emoji': '📊', 'ru': {'title': 'Визуальное мышление для более надёжного рассуждения в сложных задачах', 'desc': 'В статье представляется FIGR — система, которая интегрирует визуальное мышление в процесс многошагового рассуждения через обучение с подкреплением. Модель экстернализирует промежуточные структурные гипотезы, создавая визуальные представления во время решения задач, что помогает лучше захватывать глобальные структурные ограничения. Адаптивная регуляция момента и способа применения визуального анализа обеспечивает более стабильное и согласованное рассуждение. Экспериментальные результаты на сложных бенчмарках математического рассуждения показывают значительное улучшение: 13.12% на AIME 2025 и 11.00% на BeyondAIME по сравнению с текстовыми методами.'}, 'en': {'title': 'Enhancing Reasoning with V
