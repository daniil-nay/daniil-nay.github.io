isual Thinking: Introducing FIGR', 'desc': 'This paper presents FIGR, a novel approach that enhances multi-turn reasoning by incorporating visual thinking through reinforcement learning. Unlike traditional text-based models, FIGR constructs visual representations to capture complex spatial and structural relationships during problem solving. By dynamically deciding when to use visual reasoning, FIGR improves the coherence and stability of reasoning processes. Experimental results show that FIGR significantly outperforms existing text-only models on challenging mathematical reasoning tasks, demonstrating the benefits of integrating visual information.'}, 'zh': {'title': '视觉引导的多模态推理提升复杂推理能力', 'desc': '本文介绍了一种名为FIGR的模型，它通过端到端的强化学习将主动视觉思维整合到多轮推理中。FIGR在解决问题的过程中，通过构建视觉表示来外化中间结构假设，从而更好地处理复杂的推理问题。该模型能够自适应地调节何时以及如何调用视觉推理，使得对全球结构属性的推理更加稳定和连贯。实验结果表明，FIGR在数学推理基准测试中显著优于仅基于文本的推理模型，提升了推理的稳定性和可靠性。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.24097', 'title': 'Factorized Learning for Temporally Grounded Video-Language Models', 'url': 'https://huggingface.co/papers/2512.24097', 'abstract': 'Recent video-language models have shown great potential for video understanding, but still struggle with accurate temporal grounding for event-level perception. We observe that two main factors in video understanding (i.e., temporal grounding and textual response) form a logical hierarchy: accurate temporal evidence grounding lays the foundation for reliable textual response. However, existing works typically handle these two tasks in a coupled manner without a clear logical structure, leading to sub-optimal objectives. We address this from a factorized learning perspective. We first propose D^2VLM, a framework that decouples the learning of these two tasks while also emphasizing their inherent dependency. We adopt a "grounding then answering with evidence referencing" paradigm and introduce evidence tokens for evidence grounding, which emphasize event-level visual semantic capture beyond the focus on timestamp representation in existing works. To further facilitate the learning of these two tasks, we introduce a novel factorized preference optimization (FPO) algorithm. Unlike standard preference optimization, FPO explicitly incorporates probabilistic temporal grounding modeling into the optimization objective, enabling preference learning for both temporal grounding and textual response. We also construct a synthetic dataset to address the lack of suitable datasets for factorized preference learning with explicit temporal grounding. Experiments on various tasks demonstrate the clear advantage of our approach. Our source code is available at https://github.com/nusnlp/d2vlm.', 'score': 4, 'issue_id': 354, 'pub_date': '2026-12-30', 'pub_date_card': {'ru': '30 декабря', 'en': 'December 30', 'zh': '12月30日'}, 'hash': '9ba4701895c566d2', 'authors': ['Wenzheng Zeng', 'Difei Gao', 'Mike Zheng Shou', 'Hwee Tou Ng'], 'affiliations': ['National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2512.24097.jpg', 'data': {'categories': ['#training', '#multimodal', '#video', '#rlhf', '#dataset'], 'emoji': '🎬', 'ru': {'title': 'Разделение временной локализации и ответов в видео-языковых моделях', 'desc': 'Работа предлагает D²VLM — фреймворк для улучшения понимания видео, который разделяет обучение временной локализации событий и генерации текстовых ответов на две иерархические задачи. Авторы вводят токены доказательств для точного захвата семантики событий на уровне видео, что лучше, чем просто предсказание временных меток. Для оптимизации обеих задач одновременно предложен новый алгоритм факторизованной оптимизации предпочтений (FPO), который явно моделирует вероятностную временную локализацию в целевой функции. Кроме того, создан синтетический датасет для обучения модели с явной временной разметкой событий.'}, 'en': {'title': 'Decoupling Temporal Grounding and Textual Response for Enhanced Video Understanding', 'desc': "This paper introduces D^2VLM, a new framework designed to improve video understanding by separating the tasks of temporal grounding and textual response. The authors argue that accurate temporal grounding is essential for generating reliable textual responses, and they propose a method that emphasizes this relationship. By using a 'grounding then answering with evidence referencing' approach, the framework incorporates evidence tokens to enhance event-level visual semantic understanding. Additionally, the novel factorized preference optimization (FPO) algorithm is introduced to better model the dependencies between these tasks, leading to improved performance in video-language tasks."}, 'zh': {'title': '解耦视频理解中的时间定位与文本响应', 'desc': '最近的视频语言模型在视频理解方面展现了很大的潜力，但在事件级感知的时间定位上仍然存在困难。我们观察到，视频理解中的两个主要因素（时间定位和文本响应）形成了一个逻辑层次：准确的时间证据定位为可靠的文本响应奠定了基础。我们提出了D^2VLM框架，解耦这两个任务的学习，同时强调它们之间的内在依赖关系。通过引入新的因子化偏好优化算法（FPO），我们能够更好地优化时间定位和文本响应的学习。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.24176', 'title': 'Guiding a Diffusion Transformer with the Internal Dynamics of Itself', 'url': 'https://huggingface.co/papers/2512.24176', 'abstract': "The diffusion model presents a powerful ability to capture the entire (conditional) data distribution. However, due to the lack of sufficient training and data to learn to cover low-probability areas, the model will be penalized for failing to generate high-quality images corresponding to these areas. To achieve better generation quality, guidance strategies such as classifier free guidance (CFG) can guide the samples to the high-probability areas during the sampling stage. However, the standard CFG often leads to over-simplified or distorted samples. On the other hand, the alternative line of guiding diffusion model with its bad version is limited by carefully designed degradation strategies, extra training and additional sampling steps. In this paper, we proposed a simple yet effective strategy Internal Guidance (IG), which introduces an auxiliary supervision on the intermediate layer during training process and extrapolates the intermediate and deep layer's outputs to obtain generative results during sampling process. This simple strategy yields significant improvements in both training efficiency and generation quality on various baselines. On ImageNet 256x256, SiT-XL/2+IG achieves FID=5.31 and FID=1.75 at 80 and 800 epochs. More impressively, LightningDiT-XL/1+IG achieves FID=1.34 which achieves a large margin between all of these methods. Combined with CFG, LightningDiT-XL/1+IG achieves the current state-of-the-art FID of 1.19.", 'score': 3, 'issue_id': 361, 'pub_date': '2026-12-30', 'pub_date_card': {'ru': '30 декабря', 'en': 'December 30', 'zh': '12月30日'}, 'hash': 'fd34611418fdc611', 'authors': ['Xingyu Zhou', 'Qifan Li', 'Xiaobin Hu', 'Hai Chen', 'Shuhang Gu'], 'affiliations': ['National University of Singapore', 'North China Institute of Computer Systems Engineering', 'Sun Yat-sen University', 'University of Electronic Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2512.24176.jpg', 'data': {'categories': ['#cv', '#diffusion', '#training', '#architecture'], 'emoji': '✨', 'ru': {'title': 'Внутреннее руководство для совершенной генерации изображений', 'desc': 'В работе предложен метод Internal Guidance (IG) для улучшения качества генерации диффузионных моделей. Метод добавляет вспомогательную supervизию на промежуточные слои во время обучения и экстраполирует их выходы при генерации. Это позволяет достичь лучшего качества генерации и эффективности обучения по сравнению с классическим classifier free guidance, который часто приводит к искажениям. На датасете ImageNet 256x256 предложенный подход показывает впечатляющие результаты с FID=1.19, значительно превосходя существующие методы.'}, 'en': {'title': 'Enhancing Diffusion Models with Internal Guidance for Superior Image Generation', 'desc': 'This paper introduces a new strategy called Internal Guidance (IG) to improve the performance of diffusion models in generating high-quality images. The authors highlight that traditional methods like classifier free guidance (CFG) can lead to oversimplified outputs, while existing alternatives require complex degradation strategies and additional training. IG enhances the training process by providing auxiliary supervision on intermediate layers, which helps in generating better samples during the sampling phase. The results show significant improvements in image quality, achieving state-of-the-art performance on benchmarks like ImageNet.'}, 'zh': {'title': '内部引导：提升扩散模型生成质量的有效策略', 'desc': '扩散模型能够有效捕捉整个条件数据分布，但由于训练数据不足，模型在生成低概率区域的高质量图像时会受到惩罚。为提高生成质量，研究者们提出了无分类器引导（CFG）策略，以在采样阶段引导样本进入高概率区域。然而，标准的CFG常常导致样本过于简单或失真。本文提出了一种简单有效的内部引导（IG）策略，通过在训练过程中对中间层进行辅助监督，并在采样过程中外推中间层和深层的输出，从而显著提高了训练效率和生成质量。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.22905', 'title': 'JavisGPT: A Unified Multi-modal LLM for Sounding-Video Comprehension and Generation', 'url': 'https://huggingface.co/papers/2512.22905', 'abstract': 'This paper presents JavisGPT, the first unified multimodal large language model (MLLM) for Joint Audio-Video (JAV) comprehension and generation. JavisGPT adopts a concise encoder-LLM-decoder architecture, featuring a SyncFusion module for spatio-temporal audio-video fusion and synchrony-aware learnable queries to bridge a pretrained JAV-DiT generator. This design enables temporally coherent video-audio understanding and generation from multimodal instructions. We design an effective three-stage training pipeline consisting of multimodal pretraining, audio-video fine-tuning, and large-scale instruction-tuning, to progressively build multimodal comprehension and generation from existing vision-language models. To support this, we further construct JavisInst-Omni, a high-quality instruction dataset with over 200K GPT-4o-curated audio-video-text dialogues that span diverse and multi-level comprehension and generation scenarios. Extensive experiments on JAV comprehension and generation benchmarks show that JavisGPT outperforms existing MLLMs, particularly in complex and temporally synchronized settings.', 'score': 3, 'issue_id': 354, 'pub_date': '2026-12-28', 'pub_date_card': {'ru': '28 декабря', 'en': 'December 28', 'zh': '12月28日'}, 'hash': '0d7aa22be1582d4f', 'authors': ['Kai Liu', 'Jungang Li', 'Yuchong Sun', 'Shengqiong Wu', 'Jianzhang Gao', 'Daoan Zhang', 'Wei Zhang', 'Sheng Jin', 'Sicheng Yu', 'Geng Zhan', 'Jiayi Ji', 'Fan Zhou', 'Liang Zheng', 'Shuicheng Yan', 'Hao Fei', 'Tat-Seng Chua'], 'affiliations': ['ANU', 'HKUST(GZ)', 'HZCU', 'NTU', 'NUS', 'RUC', 'SMU', 'UR', 'USYD', 'ZJU'], 'pdf_title_img': 'assets/pdf/title_img/2512.22905.jpg', 'data': {'categories': ['#training', '#open_source', '#multimodal', '#video', '#audio', '#architecture', '#dataset'], 'emoji': '🎬', 'ru': {'title': 'Синхронизированное понимание и генерация аудио-видео через мультимодальную LLM', 'desc': 'JavisGPT — это первая единая мультимодальная языковая модель для совместного понимания и генерации аудио-видеоконтента. Модель использует архитектуру encoder-LLM-decoder с модулем SyncFusion для спatio-временной синхронизации аудио и видео сигналов. Авторы разработали трёхэтапный pipeline обучения: мультимодальный предтренинг, тонкая настройка на аудио-видео задачах и масштабное обучение на инструкциях. Для поддержки этого создан набор данных JavisInst-Omni с 200K диалогов, размеченных GPT-4o, охватывающих разнообразные сценарии понимания и генерации контента.'}, 'en': {'title': 'JavisGPT: Unifying Audio and Video Understanding with Multimodal Intelligence', 'desc': 'JavisGPT is a groundbreaking multimodal large language model designed for understanding and generating audio and video together. It uses a unique architecture that combines an encoder, a large language model (LLM), and a decoder, along with a SyncFusion module to effectively merge audio and video data. The model is trained through a three-stage process that includes pretraining, fine-tuning, and instruction-tuning, enhancing its ability to handle complex multimodal tasks. With the support of a comprehensive dataset of audio-video-text dialogues, JavisGPT demonstrates superior performance in tasks requiring synchronized audio and video comprehension and generation.'}, 'zh': {'title': 'JavisGPT：音视频理解与生成的统一模型', 'desc': '本文介绍了JavisGPT，这是首个统一的多模态大型语言模型（MLLM），用于联合音频-视频（JAV）理解和生成。JavisGPT采用简洁的编码器-LLM-解码器架构，配备SyncFusion模块，实现音频和视频的时空融合，并使用同步感知的可学习查询来连接预训练的JAV-DiT生成器。该设计使得从多模态指令中进行时间一致的音频视频理解和生成成为可能。我们还设计了一个有效的三阶段训练流程，包括多模态预训练、音频视频微调和大规模指令微调，以逐步构建多模态理解和生成能力。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.22280', 'title': 'Valori: A Deterministic Memory Substrate for AI Systems', 'url': 'https://huggingface.co/papers/2512.22280', 'abstract': 'Valori introduces a deterministic AI memory system using fixed-point arithmetic to ensure bit-identical results across platforms, addressing non-determinism in vector embeddings and similarity search for trustworthy AI.  \t\t\t\t\tAI-generated summary \t\t\t\t Modern AI systems rely on vector embeddings stored and searched using floating-point arithmetic. While effective for approximate similarity search, this design introduces fundamental non-determinism: identical models, inputs, and code can produce different memory states and retrieval results across hardware architectures (e.g., x86 vs. ARM). This prevents replayability and safe deployment, leading to silent data divergence that prevents post-hoc verification and compromises audit trails in regulated sectors. We present Valori, a deterministic AI memory substrate that replaces floating-point memory operations with fixed-point arithmetic (Q16.16) and models memory as a replayable state machine. Valori guarantees bit-identical memory states, snapshots, and search results across platforms. We demonstrate that non-determinism arises before indexing or retrieval and show how Valori enforces determinism at the memory boundary. Our results suggest that deterministic memory is a necessary primitive for trustworthy AI systems. The reference implementation is open-source and available at https://github.com/varshith-Git/Valori-Kernel (archived at https://zenodo.org/records/18022660).', 'score': 3, 'issue_id': 355, 'pub_date': '2026-12-25', 'pub_date_card': {'ru': '25 декабря', 'en': 'December 25', 'zh': '12月25日'}, 'hash': 'd3f900163e2812ae', 'authors': ['Varshith Gudur'], 'affiliations': ['Independent Researcher', 'Valori Kernel Project'], 'pdf_title_img': 'assets/pdf/title_img/2512.22280.jpg', 'data': {'categories': [], 'emoji': '🔐', 'ru': {'title': 'Детерминированная память для надёжных AI-систем через арифметику фиксированной точки', 'desc': 'Статья представляет Valori — систему детерминированной памяти для AI, которая использует арифметику с фиксированной точкой вместо чисел с плавающей точкой для хранения векторных представлений и поиска сходства. Основная проблема заключается в том, что традиционная реализация может давать разные результаты на разных платформах оборудования, что затрудняет воспроизведение и аудит AI-систем. Валори моделирует память как воспроизводимый конечный автомат, гарантируя идентичные состояния памяти и результаты поиска на различных архитектурах процессоров. Это решение критически важно для построения надёжных и проверяемых AI-систем в регулируемых отраслях.'}, 'en': {'title': 'Ensuring Consistency in AI with Deterministic Memory', 'desc': 'Valori is a new AI memory system that uses fixed-point arithmetic to ensure consistent results across different hardware platforms. Traditional AI systems often use floating-point arithmetic, which can lead to non-deterministic outcomes, meaning the same inputs can yield different results on different machines. This non-determinism can cause issues in verifying AI outputs and maintaining reliable audit trails, especially in regulated industries. By modeling memory as a replayable state machine, Valori guarantees that memory states and search results are identical, enhancing the trustworthiness of AI applications.'}, 'zh': {'title': '构建可信赖AI的确定性内存系统', 'desc': 'Valori 是一种确定性的人工智能内存系统，使用定点算术来确保跨平台的一致性。传统的浮点算术在向量嵌入和相似性搜索中引入了非确定性，导致相同的模型和输入在不同硬件上产生不同的结果。Valori 通过将浮点内存操作替换为定点算术，确保内存状态和搜索结果在各个平台上完全相同。我们的研究表明，确定性内存是构建可信赖人工智能系统的必要基础。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.23959', 'title': 'Improving Multi-step RAG with Hypergraph-based Memory for Long-Context Complex Relational Modeling', 'url': 'https://huggingface.co/papers/2512.23959', 'abstract': 'Multi-step retrieval-augmented generation (RAG) has become a widely adopted strategy for enhancing large language models (LLMs) on tasks that demand global comprehension and intensive reasoning. Many RAG systems incorporate a working memory module to consolidate retrieved information. However, existing memory designs function primarily as passive storage that accumulates isolated facts for the purpose of condensing the lengthy inputs and generating new sub-queries through deduction. This static nature overlooks the crucial high-order correlations among primitive facts, the compositions of which can often provide stronger guidance for subsequent steps. Therefore, their representational strength and impact on multi-step reasoning and knowledge evolution are limited, resulting in fragmented reasoning and weak global sense-making capacity in extended contexts. We introduce HGMem, a hypergraph-based memory mechanism that extends the concept of memory beyond simple storage into a dynamic, expressive structure for complex reasoning and global understanding. In our approach, memory is represented as a hypergraph whose hyperedges correspond to distinct memory units, enabling the progressive formation of higher-order interactions within memory. This mechanism connects facts and thoughts around the focal problem, evolving into an integrated and situated knowledge structure that provides strong propositions for deeper reasoning in subsequent steps. We evaluate HGMem on several challenging datasets designed for global sense-making. Extensive experiments and in-depth analyses show that our method consistently improves multi-step RAG and substantially outperforms strong baseline systems across diverse tasks.', 'score': 79, 'issue_id': 386, 'pub_date': '2026-12-30', 'pub_date_card': {'ru': '30 декабря', 'en': 'December 30', 'zh': '12月30日'}, 'hash': '7840b0b37077c947', 'authors': ['Chulun Zhou', 'Chunkang Zhang', 'Guoxin Yu', 'Fandong Meng', 'Jie Zhou', 'Wai Lam', 'Mo Yu'], 'affiliations': ['The Chinese University of Hong Kong', 'WeChat AI'], 'pdf_title_img': 'assets/pdf/title_img/2512.23959.jpg', 'data': {'categories': ['#graphs', '#training', '#rag', '#reasoning', '#long_context'], 'emoji': '🕸️', 'ru': {'title': 'От хранилища к сетевой памяти: гиперграфы для многошагового рассуждения', 'desc': 'В статье представлена новая архитектура памяти HGMem для многошаговых систем retrieval-augmented generation, которая преодолевает ограничения традиционных подходов, где память функционирует как пассивное хранилище фактов. Предложенный механизм основан на гиперграфах, где гиперребра представляют отдельные единицы памяти, позволяя постепенно формировать высокоуровневые взаимодействия между фактами и мыслями. Это динамичное представление памяти создает интегрированную структуру знаний, которая обеспечивает более глубокое глобальное понимание контекста и направляет последующие шаги рассуждения. Экспериментальные результаты показывают, что HGMem значительно превосходит существующие системы на задачах, требующих комплексного анализа и многошагового логического вывода.'}, 'en': {'title': 'Revolutionizing Memory for Enhanced Reasoning in Language Models', 'desc': "This paper presents HGMem, a new memory mechanism designed to enhance multi-step retrieval-augmented generation (RAG) in large language models (LLMs). Unlike traditional memory systems that simply store isolated facts, HGMem uses a hypergraph structure to create dynamic connections between information, allowing for richer reasoning and better understanding of complex tasks. By representing memory as a hypergraph, it captures higher-order relationships among facts, which improves the model's ability to make sense of information over multiple steps. The authors demonstrate that HGMem significantly outperforms existing methods on various datasets, showcasing its effectiveness in enhancing global comprehension and reasoning capabilities."}, 'zh': {'title': '超图记忆：提升多步骤推理的关键', 'desc': '多步骤检索增强生成（RAG）是一种提升大型语言模型（LLM）在全球理解和复杂推理任务中的策略。现有的记忆设计主要作为被动存储，无法有效利用高阶关联来增强推理能力。我们提出了HGMem，一种基于超图的记忆机制，将记忆扩展为动态、表达丰富的结构，以支持复杂推理和全球理解。实验结果表明，HGMem在多步骤RAG任务中表现优异，显著超越了强基线系统。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.24617', 'title': 'Dynamic Large Concept Models: Latent Reasoning in an Adaptive Semantic Space', 'url': 'https://huggingface.co/papers/2512.24617', 'abstract': 'Large Language Models (LLMs) apply uniform computation to all tokens, despite language exhibiting highly non-uniform information density. This token-uniform regime wastes capacity on locally predictable spans while under-allocating computation to semantically critical transitions. We propose Dynamic Large Concept Models (DLCM), a hierarchical language modeling framework that learns semantic boundaries from latent representations and shifts computation from tokens to a compressed concept space where reasoning is more efficient. DLCM discovers variable-length concepts end-to-end without relying on predefined linguistic units. Hierarchical compression fundamentally changes scaling behavior. We introduce the first compression-aware scaling law, which disentangles token-level capacity, concept-level reasoning capacity, and compression ratio, enabling principled compute allocation under fixed FLOPs. To stably train this heterogeneous architecture, we further develop a decoupled μP parametrization that supports zero-shot hyperparameter transfer across widths and compression regimes. At a practical setting (R=4, corresponding to an average of four tokens per concept), DLCM reallocates roughly one-third of inference compute into a higher-capacity reasoning backbone, achieving a +2.69\\% average improvement across 12 zero-shot benchmarks under matched inference FLOPs.', 'score': 40, 'issue_id': 375, 'pub_date': '2026-12-31', 'pub_date_card': {'ru': '31 декабря', 'en': 'December 31', 'zh': '12月31日'}, 'hash': '14b3c28c67b8e772', 'authors': ['Xingwei Qu', 'Shaowen Wang', 'Zihao Huang', 'Kai Hua', 'Fan Yin', 'Rui-Jie Zhu', 'Jundong Zhou', 'Qiyang Min', 'Zihao Wang', 'Yizhi Li', 'Tianyu Zhang', 'He Xing', 'Zheng Zhang', 'Yuxuan Song', 'Tianyu Zheng', 'Zhiyuan Zeng', 'Chenghua Lin', 'Ge Zhang', 'Wenhao Huang'], 'affiliations': ['ByteDance', 'M-A-P', 'Mila - Quebec AI Institute', 'Tsinghua University', 'University of Manchester'], 'pdf_title_img': 'assets/pdf/title_img/2512.24617.jpg', 'data': {'categories': ['#training', '#architecture'], 'emoji': '🧠', 'ru': {'title': 'Смарт-сжатие: концепты вместо токенов для эффективных рассуждений', 'desc': 'В работе предложена динамическая модель больших концептов (DLCM), которая вместо обработки всех токенов с одинаковыми вычислениями учитывает неравномерность информационной плотности в языке. Модель учится находить семантические границы и сжимать токены в концептуальное пространство, где рассуждение становится более эффективным. Авторы вывели первый закон масштабирования с учётом сжатия, который позволяет правильно распределять вычисления между обработкой токенов и рассуждениями о концептах. Предложенная параметризация обеспечивает стабильное обучение, и на практике модель достигает улучшения на 2.69% при сохранении того же количества вычислений.'}, 'en': {'title': 'Revolutionizing Language Models with Dynamic Concept Learning', 'desc': 'This paper introduces Dynamic Large Concept Models (DLCM), which improve how language models process information by focusing on important semantic transitions instead of treating all tokens equally. By learning semantic boundaries and shifting computation to a compressed concept space, DLCM enhances reasoning efficiency. The framework allows for the discovery of variable-length concepts without relying on fixed linguistic units, fundamentally changing how models scale. Additionally, it presents a new scaling law that optimizes compute allocation, leading to significant performance improvements in zero-shot tasks.'}, 'zh': {'title': '动态大型概念模型：提升语言模型推理效率的创新', 'desc': '大型语言模型（LLMs）对所有标记应用统一计算，但语言的信息密度并不均匀。这种统一的计算方式在可预测的区域浪费了计算能力，而在语义关键的转变上则分配不足。我们提出了动态大型概念模型（DLCM），它通过学习潜在表示的语义边界，将计算从标记转移到压缩的概念空间，从而提高推理效率。DLCM能够端到端地发现可变长度的概念，并引入了首个考虑压缩的扩展法则，优化了计算资源的分配。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.24165', 'title': 'DiffThinker: Towards Generative Multimodal Reasoning with Diffusion Models', 'url': 'https://huggingface.co/papers/2512.24165', 'abstract': 'While recent Multimodal Large Language Models (MLLMs) have attained significant strides in multimodal reasoning, their reasoning processes remain predominantly text-centric, leading to suboptimal performance in complex long-horizon, vision-centric tasks. In this paper, we establish a novel Generative Multimodal Reasoning paradigm and introduce DiffThinker, a diffusion-based reasoning framework. Conceptually, DiffThinker reformulates multimodal reasoning as a native generative image-to-image task, achieving superior logical consistency and spatial precision in vision-centric tasks. We perform a systematic comparison between DiffThinker and MLLMs, providing the first in-depth investigation into the intrinsic characteristics of this paradigm, revealing four core properties: efficiency, controllability, native parallelism, and collaboration. Extensive experiments across four domains (sequential planning, combinatorial optimization, constraint satisfaction, and spatial configuration) demonstrate that DiffThinker significantly outperforms leading closed source models including GPT-5 (+314.2\\%) and Gemini-3-Flash (+111.6\\%), as well as the fine-tuned Qwen3-VL-32B baseline (+39.0\\%), highlighting generative multimodal reasoning as a promising approach for vision-centric reasoning.', 'score': 37, 'issue_id': 378, 'pub_date': '2026-12-30', 'pub_date_card': {'ru': '30 декабря', 'en': 'December 30', 'zh': '12月30日'}, 'hash': '7e8814af6b3a30c5', 'authors': ['Zefeng He', 'Xiaoye Qu', 'Yafu Li', 'Tong Zhu', 'Siyuan Huang', 'Yu Cheng'], 'affiliations': ['Nanjing University', 'Shanghai AI Laboratory', 'Shanghai Jiao Tong University', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2512.24165.jpg', 'data': {'categories': ['#cv', '#reasoning', '#diffusion', '#architecture', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Диффузионное мышление: от текста к визуальному рассуждению', 'desc': 'В статье представлена новая парадигма генеративного мультимодального рассуждения, основанная на диффузионных моделях, названная DiffThinker. Авторы переформулируют задачу мультимодального рассуждения как задачу генерации изображений, что обеспечивает лучшую логическую согласованность и пространственную точность в видео-центричных задачах. Исследование выявило четыре ключевых свойства подхода: эффективность, управляемость, встроенный параллелизм и возможность взаимодействия с другими моделями. Экспериментальные результаты на четырех типах задач показывают существенное превосходство DiffThinker над современными большими языковыми моделями, включая GPT-5 и Gemini-3-Flash.'}, 'en': {'title': 'Revolutionizing Vision-Centric Reasoning with DiffThinker', 'desc': 'This paper introduces DiffThinker, a new framework for Generative Multimodal Reasoning that enhances the reasoning capabilities of Multimodal Large Language Models (MLLMs) in vision-centric tasks. Unlike traditional MLLMs that focus primarily on text, DiffThinker treats multimodal reasoning as a generative image-to-image task, improving logical consistency and spatial accuracy. The authors highlight four key advantages of this approach: efficiency, controllability, native parallelism, and collaboration. Through extensive experiments, DiffThinker demonstrates significant performance improvements over existing models, establishing it as a leading method for complex reasoning in visual contexts.'}, 'zh': {'title': '生成多模态推理的新突破', 'desc': '本文提出了一种新的生成多模态推理范式，并引入了DiffThinker，一个基于扩散的推理框架。DiffThinker将多模态推理重新定义为一种生成的图像到图像任务，从而在视觉中心任务中实现了更高的逻辑一致性和空间精度。通过与现有的多模态大型语言模型（MLLMs）进行系统比较，揭示了DiffThinker的四个核心特性：效率、可控性、原生并行性和协作性。大量实验表明，DiffThinker在多个领域的表现显著优于领先的闭源模型，展示了生成多模态推理在视觉推理中的潜力。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.22630', 'title': 'On the Role of Discreteness in Diffusion LLMs', 'url': 'https://huggingface.co/papers/2512.22630', 'abstract': 'Diffusion models offer appealing properties for language generation, such as parallel decoding and iterative refinement, but the discrete and highly structured nature of text challenges the direct application of diffusion principles. In this paper, we revisit diffusion language modeling from the view of diffusion process and language modeling, and outline five properties that separate diffusion mechanics from language-specific requirements. We first categorize existing approaches into continuous diffusion in embedding space and discrete diffusion over tokens. We then show that each satisfies only part of the five essential properties and therefore reflects a structural trade-off. Through analyses of recent large diffusion language models, we identify two central issues: (i) uniform corruption does not respect how information is distributed across positions, and (ii) token-wise marginal training cannot capture multi-token dependencies during parallel decoding. These observations motivate diffusion processes that align more closely with the structure of text, and encourage future work toward more coherent diffusion language models.', 'score': 14, 'issue_id': 375, 'pub_date': '2026-12-27', 'pub_date_card': {'ru': '27 декабря', 'en': 'December 27', 'zh': '12月27日'}, 'hash': '8ee34765599976ba', 'authors': ['Ziqi Jin', 'Bin Wang', 'Xiang Lin', 'Lidong Bing', 'Aixin Sun'], 'affiliations': ['MiroMind AI', 'Nanyang Technological University'], 'pdf_title_img': 'assets/pdf/title_img/2512.22630.jpg', 'data': {'categories': ['#training', '#architecture', '#diffusion'], 'emoji': '🔄', 'ru': {'title': 'Диффузия для текста: выравнивание процесса с природой языка', 'desc': 'В статье исследуются модели диффузии для генерации текста, которые обладают полезными свойствами, такими как параллельное декодирование и итеративное улучшение. Авторы переосмысливают применение диффузии к языковому моделированию и выделяют пять ключевых свойств, разделяющих механику диффузии от требований к обработке текста. Они анализируют существующие подходы, разделяя их на непрерывную диффузию в пространстве эмбеддингов и дискретную диффузию над токенами, показывая компромиссы каждого метода. Исследование выявляет критические проблемы: однородное повреждение текста не учитывает распределение информации по позициям, а обучение на маржинальных вероятностях отдельных токенов не может захватить многотокенные зависимости при параллельном декодировании.'}, 'en': {'title': 'Enhancing Language Generation with Structured Diffusion Models', 'desc': 'This paper explores the challenges of applying diffusion models to language generation due to the structured nature of text. It categorizes existing methods into two types: continuous diffusion in embedding space and discrete diffusion over tokens, highlighting their limitations. The authors identify two main issues: the uniform corruption of information and the inability to capture dependencies between multiple tokens during decoding. They propose that future diffusion models should better align with the inherent structure of language to improve coherence in generated text.'}, 'zh': {'title': '优化扩散模型以适应语言结构', 'desc': '扩散模型在语言生成中具有吸引人的特性，如并行解码和迭代优化，但文本的离散性和高度结构化特征使得直接应用扩散原理面临挑战。本文从扩散过程和语言建模的角度重新审视扩散语言建模，并概述了五个将扩散机制与语言特定要求区分开来的特性。我们将现有方法分为嵌入空间中的连续扩散和标记上的离散扩散，并指出每种方法仅满足五个基本特性中的一部分，因此反映出结构上的权衡。通过对最近大型扩散语言模型的分析，我们识别出两个核心问题：均匀腐蚀不尊重信息在位置上的分布，以及逐标记边际训练无法在并行解码中捕捉多标记依赖关系。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.24766', 'title': 'Dream2Flow: Bridging Video Generation and Open-World Manipulation with 3D Object Flow', 'url': 'https://huggingface.co/papers/2512.24766', 'abstract': 'Generative video modeling has emerged as a compelling tool to zero-shot reason about plausible physical interactions for open-world manipulation. Yet, it remains a challenge to translate such human-led motions into the low-level actions demanded by robotic systems. We observe that given an initial image and task instruction, these models excel at synthesizing sensible object motions. Thus, we introduce Dream2Flow, a framework that bridges video generation and robotic control through 3D object flow as an intermediate representation. Our method reconstructs 3D object motions from generated videos and formulates manipulation as object trajectory tracking. By separating the state changes from the actuators that realize those changes, Dream2Flow overcomes the embodiment gap and enables zero-shot guidance from pre-trained video models to manipulate objects of diverse categories-including rigid, articulated, deformable, and granular. Through trajectory optimization or reinforcement learning, Dream2Flow converts reconstructed 3D object flow into executable low-level commands without task-specific demonstrations. Simulation and real-world experiments highlight 3D object flow as a general and scalable interface for adapting video generation models to open-world robotic manipulation. Videos and visualizations are available at https://dream2flow.github.io/.', 'score': 6, 'issue_id': 387, 'pub_date': '2026-12-31', 'pub_date_card': {'ru': '31 декабря', 'en': 'December 31', 'zh': '12月31日'}, 'hash': '7ee4e8c52d41ebf1', 'authors': ['Karthik Dharmarajan', 'Wenlong Huang', 'Jiajun Wu', 'Li Fei-Fei', 'Ruohan Zhang'], 'affiliations': ['Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2512.24766.jpg', 'data': {'categories': ['#robotics', '#rl', '#video', '#3d', '#open_source', '#reasoning'], 'emoji': '🤖', 'ru': {'title': 'От видеогенерации к робототехнике через 3D-поток объектов', 'desc': 'Работа представляет Dream2Flow — фреймворк, который использует генеративные видеомодели для управления роботом-манипулятором без предварительного обучения на конкретной задаче. Ключевая идея заключается в использовании трёхмерного потока объектов как промежуточного представления, которое связывает генерацию видео с низкоуровневыми командами управления роботом. Метод восстанавливает 3D-траектории движения объектов из сгенерированных видео и формулирует манипуляцию как задачу отслеживания этих траекторий. Такой подход преодолевает проблему различия между морфологией человека и робота, позволяя манипулировать объектами разных типов — жёсткими, сочленёнными, деформируемыми и сыпучими — с использованием оптимизации траектории или обучением с подкреплением.'}, 'en': {'title': 'Bridging Video Generation and Robotic Control with Dream2Flow', 'desc': 'This paper presents Dream2Flow, a novel framework that connects generative video modeling with robotic control. It focuses on translating high-level human motions into low-level robotic actions by using 3D object flow as a key representation. The framework allows robots to manipulate various object types by tracking their trajectories, effectively bridging the gap between video generation and physical manipulation. Dream2Flow enables zero-shot learning, meaning it can adapt to new tasks without needing specific training for each one, showcasing its versatility in real-world applications.'}, 'zh': {'title': 'Dream2Flow：连接视频生成与机器人控制的桥梁', 'desc': '生成视频建模已成为一种有效工具，可以在开放世界中进行合理的物理交互推理。然而，将人类的动作转化为机器人系统所需的低级动作仍然是一个挑战。我们提出了Dream2Flow框架，通过3D物体流作为中间表示，连接视频生成和机器人控制。该方法从生成的视频中重建3D物体运动，并将操作形式化为物体轨迹跟踪，从而实现了零样本指导。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.24724', 'title': 'FlowBlending: Stage-Aware Multi-Model Sampling for Fast and High-Fidelity Video Generation', 'url': 'https://huggingface.co/papers/2512.24724', 'abstract': 'In this work, we show that the impact of model capacity varies across timesteps: it is crucial for the early and late stages but largely negligible during the intermediate stage. Accordingly, we propose FlowBlending, a stage-aware multi-model sampling strategy that employs a large model and a small model at capacity-sensitive stages and intermediate stages, respectively. We further introduce simple criteria to choose stage boundaries and provide a velocity-divergence analysis as an effective proxy for identifying capacity-sensitive regions. Across LTX-Video (2B/13B) and WAN 2.1 (1.3B/14B), FlowBlending achieves up to 1.65x faster inference with 57.35% fewer FLOPs, while maintaining the visual fidelity, temporal coherence, and semantic alignment of the large models. FlowBlending is also compatible with existing sampling-acceleration techniques, enabling up to 2x additional speedup. Project page is available at: https://jibin86.github.io/flowblending_project_page.', 'score': 4, 'issue_id': 387, 'pub_date': '2026-12-31', 'pub_date_card': {'ru': '31 декабря', 'en': 'December 31', 'zh': '12月31日'}, 'hash': '9fe956fc654521e6', 'authors': ['Jibin Song', 'Mingi Kwon', 'Jaeseok Jeong', 'Youngjung Uh'], 'affiliations': ['Yonsei University'], 'pdf_title_img': 'assets/pdf/title_img/2512.24724.jpg', 'data': {'categories': ['#video', '#small_models', '#inference'], 'emoji': '⚡', 'ru': {'title': 'Адаптивное смешивание моделей для ускорения видеогенерации', 'desc': 'В этой работе исследуется влияние мощности модели на различные этапы диффузионного процесса при генерации видео. Авторы показали, что большая модель критична на ранних и поздних стадиях, а на промежуточных этапах можно использовать более компактную модель без потери качества. Они предложили FlowBlending — стратегию многомодельного семплирования, которая адаптивно выбирает между большой и маленькой моделью в зависимости от чувствительности этапа к емкости. Метод достигает ускорения вывода до 1.65x и снижения вычислительных затрат на 57% при сохранении визуального качества и временной согласованности видео.'}, 'en': {'title': 'Optimizing Model Capacity for Efficient Inference with FlowBlending', 'desc': 'This paper investigates how the capacity of machine learning models affects their performance at different stages of processing. It finds that model capacity is important at the beginning and end of the process, but not as much in the middle. To address this, the authors introduce FlowBlending, a method that uses a large model for critical stages and a smaller model for less critical ones. This approach significantly speeds up inference and reduces computational load while preserving the quality of the output.'}, 'zh': {'title': '阶段感知的模型采样策略：FlowBlending', 'desc': '本研究表明，模型容量在不同时间步的影响是不同的：在早期和晚期阶段至关重要，而在中间阶段则几乎可以忽略。因此，我们提出了一种名为FlowBlending的阶段感知多模型采样策略，在对容量敏感的阶段使用大模型，而在中间阶段使用小模型。我们还引入了简单的标准来选择阶段边界，并提供了速度-发散分析作为识别容量敏感区域的有效代理。通过在LTX-Video和WAN 2.1上的实验，FlowBlending实现了高达1.65倍的推理速度提升，同时减少了57.35%的FLOPs，保持了大模型的视觉保真度、时间一致性和语义对齐。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.24007', 'title': 'TESO Tabu Enhanced Simulation Optimization for Noisy Black Box Problems', 'url': 'https://huggingface.co/papers/2512.24007', 'abstract': "Simulation optimization (SO) is frequently challenged by noisy evaluations, high computational costs, and complex, multimodal search landscapes. This paper introduces Tabu-Enhanced Simulation Optimization (TESO), a novel metaheuristic framework integrating adaptive search with memory-based strategies. TESO leverages a short-term Tabu List to prevent cycling and encourage diversification, and a long-term Elite Memory to guide intensification by perturbing high-performing solutions. An aspiration criterion allows overriding tabu restrictions for exceptional candidates. This combination facilitates a dynamic balance between exploration and exploitation in stochastic environments. We demonstrate TESO's effectiveness and reliability using an queue optimization problem, showing improved performance compared to benchmarks and validating the contribution of its memory components. Source code and data are available at: https://github.com/bulentsoykan/TESO.", 'score': 2, 'issue_id': 388, 'pub_date': '2026-12-30', 'pub_date_card': {'ru': '30 декабря', 'en': 'December 30', 'zh': '12月30日'}, 'hash': 'cd7eb2b7c3a9a044', 'authors': ['Bulent Soykan', 'Sean Mondesire', 'Ghaith Rabadi'], 'affiliations': ['University of Central Florida'], 'pdf_title_img': 'assets/pdf/title_img/2512.24007.jpg', 'data': {'categories': ['#optimization', '#open_source'], 'emoji': '🧠', 'ru': {'title': 'Память и табу для умной оптимизации в шумных средах', 'desc': 'В статье предлагается TESO — новый метаэвристический алгоритм оптимизации моделирования, который справляется с шумными оценками и сложными мультимодальными ландшафтами поиска. Алгоритм комбинирует адаптивный поиск с памятью, используя краткосрочный Tabu List для предотвращения циклирования и диверсификации, а также долгосрочную Elite Memory для интенсификации на базе возмущений лучших решений. Критерий аспирации позволяет переопределять tabu-ограничения для исключительных кандидатов, что обеспечивает динамический баланс между исследованием и эксплуатацией в стохастических окружениях. Эффективность TESO продемонстрирована на задаче оптимизации очередей, где алгоритм показал улучшенные результаты по сравнению с существующими методами.'}, 'en': {'title': 'Balancing Exploration and Exploitation in Simulation Optimization with TESO', 'desc': 'This paper presents a new method called Tabu-Enhanced Simulation Optimization (TESO) to tackle challenges in simulation optimization, such as noise and high computational costs. TESO combines adaptive search techniques with memory strategies, using a short-term Tabu List to avoid revisiting previous solutions and a long-term Elite Memory to focus on improving the best solutions found. An aspiration criterion is included to allow for flexibility in exploring exceptional solutions despite tabu restrictions. The results show that TESO outperforms existing methods in a queue optimization problem, highlighting the effectiveness of its memory components.'}, 'zh': {'title': '禁忌增强模拟优化：探索与开发的动态平衡', 'desc': '模拟优化（SO）常常面临噪声评估、高计算成本和复杂的多模态搜索环境的挑战。本文提出了一种新颖的元启发式框架——禁忌增强模拟优化（TESO），它将自适应搜索与基于记忆的策略相结合。TESO利用短期禁忌列表来防止循环并鼓励多样化，同时使用长期精英记忆来通过扰动高性能解来指导强化。通过在随机环境中动态平衡探索与开发，TESO在队列优化问题上展示了其有效性和可靠性，且性能优于基准，验证了其记忆组件的贡献。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.00393', 'title': 'NeoVerse: Enhancing 4D World Model with in-the-wild Monocular Videos', 'url': 'https://huggingface.co/papers/2601.00393', 'abstract': 'In this paper, we propose NeoVerse, a versatile 4D world model that is capable of 4D reconstruction, novel-trajectory video generation, and rich downstream applications. We first identify a common limitation of scalability in current 4D world modeling methods, caused either by expensive and specialized multi-view 4D data or by cumbersome training pre-processing. In contrast, our NeoVerse is built upon a core philosophy that makes the full pipeline scalable to diverse in-the-wild monocular videos. Specifically, NeoVerse features pose-free feed-forward 4D reconstruction, online monocular degradation pattern simulation, and other well-aligned techniques. These designs empower NeoVerse with versatility and generalization to various domains. Meanwhile, NeoVerse achieves state-of-the-art performance in standard reconstruction and generation benchmarks. Our project page is available at https://neoverse-4d.github.io', 'score': 82, 'issue_id': 407, 'pub_date': '2026-01-01', 'pub_date_card': {'ru': '1 января', 'en': 'January 1', 'zh': '1月1日'}, 'hash': '4b85bcdecc1e3e88', 'authors': ['Yuxue Yang', 'Lue Fan', 'Ziqi Shi', 'Junran Peng', 'Feng Wang', 'Zhaoxiang Zhang'], 'affiliations': ['CreateAI', 'NLPR & MAIS, CASIA'], 'pdf_title_img': 'assets/pdf/title_img/2601.00393.jpg', 'data': {'categories': ['#benchmark', '#video', '#3d'], 'emoji': '🎬', 'ru': {'title': 'Масштабируемая 4D-реконструкция из одной камеры', 'desc': 'В этой работе представлена NeoVerse — универсальная модель 4D-мира, способная выполнять 4D-реконструкцию, генерацию видео с новыми траекториями и поддерживать разнообразные приложения. Авторы выявили проблему масштабируемости существующих методов 4D-моделирования, которые требуют дорогостоящих мультивидовых данных или сложной предварительной обработки. NeoVerse решает эту проблему благодаря архитектуре, работающей со скромными монокулярными видео из реального мира, включая pose-free feed-forward реконструкцию и онлайн-симуляцию артефактов деградации. Метод достигает государственного результата в бенчмарках реконструкции и генерации видео.'}, 'en': {'title': 'NeoVerse: Scalable 4D World Modeling for All!', 'desc': 'This paper introduces NeoVerse, a 4D world model designed for efficient 4D reconstruction and video generation. It addresses the scalability issues found in existing methods that rely on complex multi-view data and extensive pre-processing. NeoVerse utilizes a pose-free feed-forward approach and simulates monocular degradation patterns, allowing it to work effectively with standard monocular videos. As a result, NeoVerse demonstrates superior performance in reconstruction and generation tasks across various applications.'}, 'zh': {'title': 'NeoVerse：多功能的4D世界模型', 'desc': '本文提出了NeoVerse，一个多功能的4D世界模型，能够进行4D重建、生成新轨迹视频以及丰富的下游应用。我们首先识别了当前4D世界建模方法在可扩展性方面的共同限制，这主要是由于昂贵且专业的多视角4D数据或繁琐的训练预处理。与此不同，NeoVerse基于一种核心理念，使整个流程能够扩展到各种野外单目视频。NeoVerse具有无姿态前馈4D重建、在线单目降解模式模拟等技术，赋予其在多个领域的多样性和泛化能力，同时在标准重建和生成基准测试中实现了最先进的性能。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.24615', 'title': 'Youtu-Agent: Scaling Agent Productivity with Automated Generation and Hybrid Policy Optimization', 'url': 'https://huggingface.co/papers/2512.24615', 'abstract': 'Existing Large Language Model (LLM) agent frameworks face two significant challenges: high configuration costs and static capabilities. Building a high-quality agent often requires extensive manual effort in tool integration and prompt engineering, while deployed agents struggle to adapt to dynamic environments without expensive fine-tuning. To address these issues, we propose Youtu-Agent, a modular framework designed for the automated generation and continuous evolution of LLM agents. Youtu-Agent features a structured configuration system that decouples execution environments, toolkits, and context management, enabling flexible reuse and automated synthesis. We introduce two generation paradigms: a Workflow mode for standard tasks and a Meta-Agent mode for complex, non-standard requirements, capable of automatically generating tool code, prompts, and configurations. Furthermore, Youtu-Agent establishes a hybrid policy optimization system: (1) an Agent Practice module that enables agents to accumulate experience and improve performance through in-context optimization without parameter updates; and (2) an Agent RL module that integrates with distributed training frameworks to enable scalable and stable reinforcement learning of any Youtu-Agents in an end-to-end, large-scale manner. Experiments demonstrate that Youtu-Agent achieves state-of-the-art performance on WebWalkerQA (71.47\\%) and GAIA (72.8\\%) using open-weight models. Our automated generation pipeline achieves over 81\\% tool synthesis success rate, while the Practice module improves performance on AIME 2024/2025 by +2.7\\% and +5.4\\% respectively. Moreover, our Agent RL training achieves 40\\% speedup with steady performance improvement on 7B LLMs, enhancing coding/reasoning and searching capabilities respectively up to 35\\% and 21\\% on Maths and general/multi-hop QA benchmarks.', 'score': 81, 'issue_id': 405, 'pub_date': '2026-12-31', 'pub_date_card': {'ru': '31 декабря', 'en': 'December 31', 'zh': '12月31日'}, 'hash': '40053cb88310e90a', 'authors': ['Yuchen Shi', 'Yuzheng Cai', 'Siqi Cai', 'Zihan Xu', 'Lichao Chen', 'Yulei Qin', 'Zhijian Zhou', 'Xiang Fei', 'Chaofan Qiu', 'Xiaoyu Tan', 'Gang Li', 'Zongyi Li', 'Haojia Lin', 'Guocan Cai', 'Yong Mao', 'Yunsheng Wu', 'Ke Li', 'Xing Sun'], 'affiliations': ['Tencent'], 'pdf_title_img': 'assets/pdf/title_img/2512.24615.jpg', 'data': {'categories': ['#rl', '#reasoning', '#benchmark', '#optimization', '#training', '#agents'], 'emoji': '🤖', 'ru': {'title': 'Автоматическая генерация и эволюция интеллектуальных агентов без ручной настройки', 'desc': 'В работе предлагается Youtu-Agent — модульный фреймворк для автоматической генерации и непрерывного совершенствования LLM-агентов, решающий проблемы высоких затрат на конфигурацию и статичности способностей существующих систем. Фреймворк использует структурированную систему конфигурации, которая разделяет окружение выполнения, наборы инструментов и управление контекстом, позволяя гибко переиспользовать компоненты и автоматически синтезировать новые агенты. Система включает два режима генерации: режим Workflow для стандартных задач и режим Meta-Agent для сложных требований с автоматической генерацией кода инструментов, промптов и конфигураций. Кроме того, предложена гибридная система оптимизации политик, включающая модуль Agent Practice для накопления опыта и оптимизации в контексте, а также модуль Agent RL для масштабируемого обучения с подкреплением в распределённой среде.'}, 'en': {'title': 'Youtu-Agent: Revolutionizing LLM Agent Flexibility and Performance', 'desc': 'The paper introduces Youtu-Agent, a modular framework that addresses the challenges of high configuration costs and static capabilities in existing Large Language Model (LLM) agent frameworks. It allows for automated generation and continuous evolution of LLM agents through a structured configuration system that separates execution environments, toolkits, and context management. Youtu-Agent employs two generation paradigms: Workflow mode for standard tasks and Meta-Agent mode for complex tasks, enabling the automatic creation of tool code and prompts. Additionally, it features a hybrid policy optimization system that enhances agent performance through in-context optimization and scalable reinforcement learning, achieving state-of-the-art results in various benchmarks.'}, 'zh': {'title': 'Youtu-Agent：自动化生成与持续演化的LLM代理框架', 'desc': '现有的大型语言模型（LLM）代理框架面临两个主要挑战：高配置成本和静态能力。构建高质量代理通常需要大量的手动工具集成和提示工程，而已部署的代理在动态环境中难以适应，且不易进行昂贵的微调。为了解决这些问题，我们提出了Youtu-Agent，一个旨在自动生成和持续演化LLM代理的模块化框架。Youtu-Agent通过结构化配置系统实现执行环境、工具包和上下文管理的解耦，支持灵活重用和自动合成。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.00664', 'title': 'Avatar Forcing: Real-Time Interactive Head Avatar Generation for Natural Conversation', 'url': 'https://huggingface.co/papers/2601.00664', 'abstract': "A framework called Avatar Forcing uses diffusion forcing and direct preference optimization with synthetic losing samples to enable real-time, expressive multimodal interactions in talking head avatars without labeled data.  \t\t\t\t\tAI-generated summary \t\t\t\t Talking head generation creates lifelike avatars from static portraits for virtual communication and content creation. However, current models do not yet convey the feeling of truly interactive communication, often generating one-way responses that lack emotional engagement. We identify two key challenges toward truly interactive avatars: generating motion in real-time under causal constraints and learning expressive, vibrant reactions without additional labeled data. To address these challenges, we propose Avatar Forcing, a new framework for interactive head avatar generation that models real-time user-avatar interactions through diffusion forcing. This design allows the avatar to process real-time multimodal inputs, including the user's audio and motion, with low latency for instant reactions to both verbal and non-verbal cues such as speech, nods, and laughter. Furthermore, we introduce a direct preference optimization method that leverages synthetic losing samples constructed by dropping user conditions, enabling label-free learning of expressive interaction. Experimental results demonstrate that our framework enables real-time interaction with low latency (approximately 500ms), achieving 6.8X speedup compared to the baseline, and produces reactive and expressive avatar motion, which is preferred over 80% against the baseline.", 'score': 43, 'issue_id': 405, 'pub_date': '2026-01-02', 'pub_date_card': {'ru': '2 января', 'en': 'January 2', 'zh': '1月2日'}, 'hash': 'f2dbe0c7e036ea97', 'authors': ['Taekyung Ki', 'Sangwon Jang', 'Jaehyeong Jo', 'Jaehong Yoon', 'Sung Ju Hwang'], 'affiliations': ['DeepAuto.ai', 'KAIST', 'NTU Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2601.00664.jpg', 'data': {'categories': ['#video', '#optimization', '#training', '#multimodal', '#synthetic', '#diffusion', '#rlhf'], 'emoji': '🎭', 'ru': {'title': 'Интерактивные аватары в реальном времени через диффузионное принуждение', 'desc': 'Avatar Forcing — это фреймворк для генерации интерактивных аватаров с говорящей головой, использующий диффузионное принуждение для обработки пользовательских мультимодальных входов в реальном времени с низкой задержкой. Метод решает задачу причинной генерации движений при ограничениях реального времени, позволяя аватару реагировать на речь, кивки и другие невербальные сигналы пользователя. Авторы предлагают подход прямой оптимизации предпочтений с синтетическими отрицательными примерами для обучения выразительным реакциям без размеченных данных. Фреймворк достигает ускорения в 6.8 раза и демонстрирует 80% предпочтение в сравнении с базовыми подходами.'}, 'en': {'title': 'Real-Time, Expressive Interactions with Avatar Forcing', 'desc': 'The paper introduces Avatar Forcing, a novel framework designed to enhance real-time interactions with talking head avatars. It utilizes diffusion forcing and direct preference optimization to generate expressive responses without the need for labeled data. The framework addresses challenges in creating lifelike avatars that can react to both verbal and non-verbal cues in real-time. Experimental results show significant improvements in interaction speed and expressiveness, making avatars more engaging for users.'}, 'zh': {'title': '实时交互，生动头像的未来', 'desc': '本文提出了一种名为Avatar Forcing的框架，旨在实现实时、富有表现力的多模态交互，特别是在对话头像生成中。该框架结合了扩散强制和直接偏好优化，能够在没有标记数据的情况下，通过合成的失败样本进行学习。Avatar Forcing能够处理用户的音频和动作输入，实现低延迟的即时反应，提升了交互的真实感和情感参与度。实验结果表明，该框架在实时交互中表现出显著的速度提升和更具表现力的头像动作。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.24330', 'title': 'SenseNova-MARS: Empowering Multimodal Agentic Reasoning and Search via Reinforcement Learning', 'url': 'https://huggingface.co/papers/2512.24330', 'abstract': "While Vision-Language Models (VLMs) can solve complex tasks through agentic reasoning, their capabilities remain largely constrained to text-oriented chain-of-thought or isolated tool invocation. They fail to exhibit the human-like proficiency required to seamlessly interleave dynamic tool manipulation with continuous reasoning, particularly in knowledge-intensive and visually complex scenarios that demand coordinated external tools such as search and image cropping. In this work, we introduce SenseNova-MARS, a novel Multimodal Agentic Reasoning and Search framework that empowers VLMs with interleaved visual reasoning and tool-use capabilities via reinforcement learning (RL). Specifically, SenseNova-MARS dynamically integrates the image search, text search, and image crop tools to tackle fine-grained and knowledge-intensive visual understanding challenges. In the RL stage, we propose the Batch-Normalized Group Sequence Policy Optimization (BN-GSPO) algorithm to improve the training stability and advance the model's ability to invoke tools and reason effectively. To comprehensively evaluate the agentic VLMs on complex visual tasks, we introduce the HR-MMSearch benchmark, the first search-oriented benchmark composed of high-resolution images with knowledge-intensive and search-driven questions. Experiments demonstrate that SenseNova-MARS achieves state-of-the-art performance on open-source search and fine-grained image understanding benchmarks. Specifically, on search-oriented benchmarks, SenseNova-MARS-8B scores 67.84 on MMSearch and 41.64 on HR-MMSearch, surpassing proprietary models such as Gemini-3-Flash and GPT-5. SenseNova-MARS represents a promising step toward agentic VLMs by providing effective and robust tool-use capabilities. To facilitate further research in this field, we will release all code, models, and datasets.", 'score': 29, 'issue_id': 405, 'pub_date': '2026-12-30', 'pub_date_card': {'ru': '30 декабря', 'en': 'December 30', 'zh': '12月30日'}, 'hash': 'ff90ddac66fbb641', 'authors': ['Yong Xien Chng', 'Tao Hu', 'Wenwen Tong', 'Xueheng Li', 'Jiandong Chen', 'Haojia Yu', 'Jiefan Lu', 'Hewei Guo', 'Hanming Deng', 'Chengjun Xie', 'Gao Huang', 'Dahua Lin', 'Lewei Lu'], 'affiliations': ['SenseTime Research', 'Tsinghua University', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2512.24330.jpg', 'data': {'categories': ['#rl', '#reasoning', '#benchmark', '#dataset', '#cv', '#open_source', '#optimization', '#training', '#multimodal', '#agents'], 'emoji': '🔍', 'ru': {'title': 'Агентское видение: обучение моделей интегрировать рассуждение с динамическим использованием инструментов', 'desc': 'В статье представлена SenseNova-MARS — инновационная система мультимодального агентского рассуждения, которая позволяет видео-языковым моделям динамически использовать несколько инструментов (поиск изображений, поиск текста, кадрирование) одновременно с рассуждениями. Авторы применяют обучение с подкреплением и предлагают новый алгоритм BN-GSPO для повышения стабильности обучения и улучшения способности модели к инструментальным действиям. Для оценки возможностей агентских моделей введен новый бенчмарк HR-MMSearch, состоящий из высокочастотных изображений со сложными, требующими поиска вопросами. Экспериментальные результаты показывают, что SenseNova-MARS достигает лучших показателей на поисковых и бенчмарках понимания изображений, превосходя даже закрытые модели Gemini и GPT-5.'}, 'en': {'title': 'Empowering VLMs with Dynamic Tool Manipulation and Reasoning', 'desc': "This paper presents SenseNova-MARS, a new framework designed to enhance Vision-Language Models (VLMs) by enabling them to perform dynamic tool manipulation alongside continuous reasoning. Unlike traditional VLMs that struggle with complex tasks requiring coordinated tool use, SenseNova-MARS integrates image search, text search, and image cropping tools through reinforcement learning. The authors introduce a novel training algorithm called Batch-Normalized Group Sequence Policy Optimization (BN-GSPO) to improve the model's stability and effectiveness in invoking tools. The framework is evaluated using the HR-MMSearch benchmark, demonstrating superior performance in knowledge-intensive visual tasks compared to existing models."}, 'zh': {'title': '提升视觉语言模型的智能推理能力', 'desc': '本文介绍了一种新的多模态智能推理和搜索框架SenseNova-MARS，旨在提升视觉语言模型（VLMs）在动态工具操作与连续推理中的能力。通过强化学习（RL），SenseNova-MARS能够将图像搜索、文本搜索和图像裁剪工具动态整合，以应对复杂的视觉理解任务。我们提出的Batch-Normalized Group Sequence Policy Optimization（BN-GSPO）算法提高了训练的稳定性，增强了模型调用工具和有效推理的能力。实验结果表明，SenseNova-MARS在开放源代码的搜索和细粒度图像理解基准上达到了最先进的性能，展示了其在智能VLMs领域的潜力。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.24271', 'title': "Taming Hallucinations: Boosting MLLMs' Video Understanding via Counterfactual Video Generation", 'url': 'https://huggingface.co/papers/2512.24271', 'abstract': 'Multimodal Large Language Models (MLLMs) have made remarkable progress in video understanding. However, they suffer from a critical vulnerability: an over-reliance on language priors, which can lead to visual ungrounded hallucinations, especially when processing counterfactual videos that defy common sense. This limitation, stemming from the intrinsic data imbalance between text and video, is challenging to address due to the substantial cost of collecting and annotating counterfactual data. To address this, we introduce DualityForge, a novel counterfactual data synthesis framework that employs controllable, diffusion-based video editing to transform real-world videos into counterfactual scenarios. By embedding structured contextual information into the video editing and QA generation processes, the framework automatically produces high-quality QA pairs together with original-edited video pairs for contrastive training. Based on this, we build DualityVidQA, a large-scale video dataset designed to reduce MLLM hallucinations. In addition, to fully exploit the contrastive nature of our paired data, we propose Duality-Normalized Advantage Training (DNA-Train), a two-stage SFT-RL training regime where the RL phase applies pair-wise ell_1 advantage normalization, thereby enabling a more stable and efficient policy optimization. Experiments on DualityVidQA-Test demonstrate that our method substantially reduces model hallucinations on counterfactual videos, yielding a relative improvement of 24.0% over the Qwen2.5-VL-7B baseline. Moreover, our approach achieves significant gains across both hallucination and general-purpose benchmarks, indicating strong generalization capability. We will open-source our dataset and code.', 'score': 24, 'issue_id': 405, 'pub_date': '2026-12-30', 'pub_date_card': {'ru': '30 декабря', 'en': 'December 30', 'zh': '12月30日'}, 'hash': '01479f4c4234799d', 'authors': ['Zhe Huang', 'Hao Wen', 'Aiming Hao', 'Bingze Song', 'Meiqi Wu', 'Jiahong Wu', 'Xiangxiang Chu', 'Sheng Lu', 'Haoqian Wang'], 'affiliations': ['AMAP, Alibaba Group', 'Beihang University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2512.24271.jpg', 'data': {'categories': ['#rl', '#dataset', '#video', '#open_source', '#training', '#multimodal', '#synthetic', '#diffusion', '#hallucinations'], 'emoji': '🎬', 'ru': {'title': 'Борьба с галлюцинациями в видео-моделях через синтез контрфактических данных', 'desc': 'Работа посвящена решению проблемы визуальных галлюцинаций в мультимодальных больших языковых моделях, которые чрезмерно полагаются на языковые закономерности при обработке видео. Авторы предлагают DualityForge — фреймворк синтеза контрфактических данных, использующий диффузионные методы редактирования видео для создания неправдоподобных сценариев из реальных видеозаписей. На основе этого подхода построен датасет DualityVidQA и предложен метод DNA-Train, комбинирующий supervised fine-tuning и reinforcement learning с нормализацией парных преимуществ. Эксперименты показывают снижение галлюцинаций на 24% и хорошую обобщающую способность модели на различных бенчмарках.'}, 'en': {'title': 'Transforming Video Understanding with Counterfactual Data Synthesis', 'desc': 'This paper addresses the limitations of Multimodal Large Language Models (MLLMs) in video understanding, particularly their tendency to generate visual hallucinations when faced with counterfactual scenarios. The authors introduce DualityForge, a framework that synthesizes counterfactual data through advanced video editing techniques, allowing for the creation of high-quality question-answer pairs. They also present DualityVidQA, a large-scale dataset aimed at training MLLMs to reduce hallucinations by providing contrastive examples. Additionally, the proposed Duality-Normalized Advantage Training (DNA-Train) enhances the training process, leading to significant improvements in model performance on both hallucination and general benchmarks.'}, 'zh': {'title': '减少幻觉，提升视频理解的双重力量', 'desc': '多模态大型语言模型（MLLMs）在视频理解方面取得了显著进展，但它们存在一个关键的弱点：过度依赖语言先验，导致在处理违反常识的反事实视频时出现视觉无根的幻觉。为了解决这一问题，我们提出了DualityForge，一个新颖的反事实数据合成框架，通过可控的扩散视频编辑将真实视频转化为反事实场景。该框架在视频编辑和问答生成过程中嵌入结构化上下文信息，自动生成高质量的问答对及原始-编辑视频对，以便进行对比训练。实验结果表明，我们的方法显著减少了模型在反事实视频上的幻觉，显示出强大的泛化能力。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.00796', 'title': 'AdaGaR: Adaptive Gabor Representation for Dynamic Scene Reconstruction', 'url': 'https://huggingface.co/papers/2601.00796', 'abstract': 'Reconstructing dynamic 3D scenes from monocular videos requires simultaneously capturing high-frequency appearance details and temporally continuous motion. Existing methods using single Gaussian primitives are limited by their low-pass filtering nature, while standard Gabor functions introduce energy instability. Moreover, lack of temporal continuity constraints often leads to motion artifacts during interpolation. We propose AdaGaR, a unified framework addressing both frequency adaptivity and temporal continuity in explicit dynamic scene modeling. We introduce Adaptive Gabor Representation, extending Gaussians through learnable frequency weights and adaptive energy compensation to balance detail capture and stability. For temporal continuity, we employ Cubic Hermite Splines with Temporal Curvature Regularization to ensure smooth motion evolution. An Adaptive Initialization mechanism combining depth estimation, point tracking, and foreground masks establishes stable point cloud distributions in early training. Experiments on Tap-Vid DAVIS demonstrate state-of-the-art performance (PSNR 35.49, SSIM 0.9433, LPIPS 0.0723) and strong generalization across frame interpolation, depth consistency, video editing, and stereo view synthesis. Project page: https://jiewenchan.github.io/AdaGaR/', 'score': 22, 'issue_id': 408, 'pub_date': '2026-01-02', 'pub_date_card': {'ru': '2 января', 'en': 'January 2', 'zh': '1月2日'}, 'hash': 'eb50cf753bd4888a', 'authors': ['Jiewen Chan', 'Zhenjun Zhao', 'Yu-Lun Liu'], 'affiliations': ['National Yang Ming Chiao Tung University', 'University of Zaragoza'], 'pdf_title_img': 'assets/pdf/title_img/2601.00796.jpg', 'data': {'categories': ['#video', '#3d', '#architecture'], 'emoji': '🎬', 'ru': {'title': 'Адаптивное представление Габора для динамических сцен с пространственно-временной непрерывностью', 'desc': 'В работе предложен метод AdaGaR для реконструкции динамических 3D сцен из монокулярных видео, который преодолевает ограничения существующих подходов на основе гауссианов. Авторы вводят адаптивное представление Габора с обучаемыми весами частот и компенсацией энергии для захвата деталей высокой частоты без артефактов нестабильности. Для обеспечения временной непрерывности движения используются кубические сплайны Эрмита с регуляризацией кривизны. Адаптивный механизм инициализации, объединяющий оценку глубины, отслеживание точек и маски переднего плана, обеспечивает стабильное распределение облака точек на ранних этапах обучения.'}, 'en': {'title': 'AdaGaR: Enhancing 3D Scene Reconstruction with Adaptive Gabor Representation', 'desc': 'This paper presents AdaGaR, a new framework for reconstructing dynamic 3D scenes from single videos. It improves upon existing methods by using Adaptive Gabor Representation, which allows for better detail capture and stability through learnable frequency weights. To ensure smooth motion over time, the framework incorporates Cubic Hermite Splines with Temporal Curvature Regularization. The results show that AdaGaR achieves state-of-the-art performance in various tasks, demonstrating its effectiveness in dynamic scene modeling.'}, 'zh': {'title': '自适应Gabor重建动态3D场景', 'desc': '本文提出了一种名为AdaGaR的统一框架，用于从单目视频重建动态3D场景。该方法通过自适应Gabor表示，利用可学习的频率权重和能量补偿来平衡细节捕捉和稳定性。为了确保时间连续性，采用了带有时间曲率正则化的三次Hermite样条，以实现平滑的运动演变。实验结果表明，AdaGaR在多个任务上表现出色，具有良好的泛化能力。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.24695', 'title': 'Nested Learning: The Illusion of Deep Learning Architectures', 'url': 'https://huggingface.co/papers/2512.24695', 'abstract': "Despite the recent progresses, particularly in developing Language Models, there are fundamental challenges and unanswered questions about how such models can continually learn/memorize, self-improve, and find effective solutions. In this paper, we present a new learning paradigm, called Nested Learning (NL), that coherently represents a machine learning model with a set of nested, multi-level, and/or parallel optimization problems, each of which with its own context flow. Through the lenses of NL, existing deep learning methods learns from data through compressing their own context flow, and in-context learning naturally emerges in large models. NL suggests a philosophy to design more expressive learning algorithms with more levels, resulting in higher-order in-context learning and potentially unlocking effective continual learning capabilities. We advocate for NL by presenting three core contributions: (1) Expressive Optimizers: We show that known gradient-based optimizers, such as Adam, SGD with Momentum, etc., are in fact associative memory modules that aim to compress the gradients' information (by gradient descent). Building on this insight, we present other more expressive optimizers with deep memory and/or more powerful learning rules; (2) Self-Modifying Learning Module: Taking advantage of NL's insights on learning algorithms, we present a sequence model that learns how to modify itself by learning its own update algorithm; and (3) Continuum Memory System: We present a new formulation for memory system that generalizes the traditional viewpoint of long/short-term memory. Combining our self-modifying sequence model with the continuum memory system, we present a continual learning module, called Hope, showing promising results in language modeling, knowledge incorporation, and few-shot generalization tasks, continual learning, and long-context reasoning tasks.", 'score': 19, 'issue_id': 407, 'pub_date': '2026-12-31', 'pub_date_card': {'ru': '31 декабря', 'en': 'December 31', 'zh': '12月31日'}, 'hash': '52823ab1600cf692', 'authors': ['Ali Behrouz', 'Meisam Razaviyayn', 'Peilin Zhong', 'Vahab Mirrokni'], 'affiliations': ['Columbia University', 'Google'], 'pdf_title_img': 'assets/pdf/title_img/2512.24695.jpg', 'data': {'categories': ['#reasoning', '#training', '#architecture', '#long_context', '#optimization'], 'emoji': '🎯', 'ru': {'title': 'Вложенное обучение: иерархический взгляд на самосовершенствующиеся модели', 'desc': 'В этой работе предложена новая парадигма обучения под названием Nested Learning (вложенное обучение), которая представляет модель машинного обучения как набор вложенных и параллельных задач оптимизации с собственными потоками контекста. Авторы показывают, что известные градиентные оптимизаторы (такие как Adam и SGD с моментом) являются модулями ассоциативной памяти, сжимающими информацию о градиентах. На основе этого insight они предлагают более выразительные оптимизаторы с глубокой памятью и самомодифицирующиеся обучающие модули, которые могут изменять свой собственный алгоритм обновления. Комбинируя эти идеи, авторы представляют модуль Hope для continual learning, который показывает перспективные результаты в языковом моделировании, долгоконтекстном рассуждении и few-shot обобщении.'}, 'en': {'title': 'Unlocking Continual Learning with Nested Learning Paradigm', 'desc': 'This paper introduces a new learning approach called Nested Learning (NL), which organizes machine learning models into a structure of nested optimization problems. NL allows models to learn from their own context flows, enhancing their ability to perform in-context learning and continual learning. The authors propose three main contributions: expressive optimizers that act as memory modules, a self-modifying learning module that adapts its own learning rules, and a continuum memory system that improves memory management. Together, these innovations aim to create more powerful and flexible learning algorithms that can better handle complex tasks in language modeling and reasoning.'}, 'zh': {'title': '嵌套学习：解锁持续学习的新范式', 'desc': '尽管最近在语言模型的发展上取得了进展，但仍然存在一些基本挑战和未解的问题。本文提出了一种新的学习范式，称为嵌套学习（Nested Learning，NL），它通过一组嵌套的多层次和/或并行优化问题来一致地表示机器学习模型。NL提供了一种设计更具表现力的学习算法的哲学，能够实现更高阶的上下文学习，并可能解锁有效的持续学习能力。我们通过三个核心贡献来支持NL的观点，包括表现力优化器、自我修改学习模块和连续记忆系统。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.00417', 'title': 'Deep Delta Learning', 'url': 'https://huggingface.co/papers/2601.00417', 'abstract': "The efficacy of deep residual networks is fundamentally predicated on the identity shortcut connection. While this mechanism effectively mitigates the vanishing gradient problem, it imposes a strictly additive inductive bias on feature transformations, thereby limiting the network's capacity to model complex state transitions. In this paper, we introduce Deep Delta Learning (DDL), a novel architecture that generalizes the standard residual connection by modulating the identity shortcut with a learnable, data-dependent geometric transformation. This transformation, termed the Delta Operator, constitutes a rank-1 perturbation of the identity matrix, parameterized by a reflection direction vector k(X) and a gating scalar β(X). We provide a spectral analysis of this operator, demonstrating that the gate β(X) enables dynamic interpolation between identity mapping, orthogonal projection, and geometric reflection. Furthermore, we restructure the residual update as a synchronous rank-1 injection, where the gate acts as a dynamic step size governing both the erasure of old information and the writing of new features. This unification empowers the network to explicitly control the spectrum of its layer-wise transition operator, enabling the modeling of complex, non-monotonic dynamics while preserving the stable training characteristics of gated residual architectures.", 'score': 18, 'issue_id': 405, 'pub_date': '2026-01-01', 'pub_date_card': {'ru': '1 января', 'en': 'January 1', 'zh': '1月1日'}, 'hash': 'b59181a06be243db', 'authors': ['Yifan Zhang', 'Yifeng Liu', 'Mengdi Wang', 'Quanquan Gu'], 'affiliations': ['Princeton University', 'University of California, Los Angeles'], 'pdf_title_img': 'assets/pdf/title_img/2601.00417.jpg', 'data': {'categories': ['#architecture'], 'emoji': '🔄', 'ru': {'title': 'Динамические остаточные связи через геометрические трансформации', 'desc': 'В этой работе предлагается Deep Delta Learning (DDL) — обобщение классических остаточных связей в глубоких нейронных сетях через модуляцию тождественного отображения обучаемым геометрическим преобразованием. Дельта-оператор представляет собой ранг-1 возмущение единичной матрицы, параметризованное вектором направления отражения и скалярной вентильной функцией, которые зависят от входных данных. Спектральный анализ показывает, что вентиль обеспечивает динамическую интерполяцию между тождественным отображением, ортогональной проекцией и геометрическим отражением. Предложенный подход позволяет сети явно контролировать спектр операторов переходов между слоями, моделируя сложную нелинейную динамику при сохранении стабильности обучения.'}, 'en': {'title': 'Empowering Residual Networks with Dynamic Transformations', 'desc': "This paper presents Deep Delta Learning (DDL), a new architecture that enhances deep residual networks by introducing a learnable transformation to the identity shortcut connection. The Delta Operator, a key component of DDL, allows for dynamic adjustments to feature transformations, overcoming limitations of traditional residual connections. By using a gating scalar and a reflection direction vector, DDL can interpolate between various transformations, improving the network's ability to model complex dynamics. This approach maintains the stability of training while enabling richer feature representation and more effective learning of non-linear relationships."}, 'zh': {'title': '深度增量学习：超越传统残差连接的创新', 'desc': '深度残差网络的有效性依赖于身份快捷连接。虽然这种机制有效地缓解了梯度消失问题，但它对特征变换施加了严格的加法归纳偏置，从而限制了网络建模复杂状态转变的能力。本文提出了一种新架构——深度增量学习（DDL），通过可学习的数据依赖几何变换来推广标准残差连接。我们引入的增量算子使网络能够动态控制层间过渡操作的谱，从而建模复杂的非单调动态，同时保持门控残差架构的稳定训练特性。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.00747', 'title': 'The Reasoning-Creativity Trade-off: Toward Creativity-Driven Problem Solving', 'url': 'https://huggingface.co/papers/2601.00747', 'abstract': "Large language model training methods that optimize for correctness can cause reasoning path diversity collapse, but a new variational framework provides principled solutions to maintain both accuracy and creativity.  \t\t\t\t\tAI-generated summary \t\t\t\t State-of-the-art large language model (LLM) pipelines rely on bootstrapped reasoning loops: sampling diverse chains of thought and reinforcing the highest-scoring ones, mainly optimizing correctness. We analyze how this design choice is sensitive to the collapse of the model's distribution over reasoning paths, slashing semantic entropy and undermining creative problem-solving. To analyze this failure, we introduce Distributional Creative Reasoning (DCR), a unified variational objective that casts training as gradient flow through probability measures on solution traces. STaR, GRPO, and DPO, as well as entropy bonuses, and other methods, all constitute special cases of the same loss. The framework delivers three core results: (i) the diversity decay theorem, describing how correctness-based objectives lead to distinct modes of diversity decay for STaR, GRPO, and DPO; (ii) designs that ensure convergence to a stable and diverse policy, effectively preventing collapse; and (iii) simple, actionable recipes to achieve this in practice. DCR thus offers the first principled recipe for LLMs that remain both correct and creative.", 'score': 9, 'issue_id': 416, 'pub_date': '2026-01-02', 'pub_date_card': {'ru': '2 января', 'en': 'January 2', 'zh': '1月2日'}, 'hash': '9a47601dbf8f88ab', 'authors': ['Max Ruiz Luyten', 'Mihaela van der Schaar'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2601.00747.jpg', 'data': {'categories': ['#reasoning', '#optimization', '#interpretability', '#training', '#rlhf', '#architecture'], 'emoji': '⚡', 'ru': {'title': 'Сохранение творчества при оптимизации корректности в больших языковых моделях', 'desc': 'Исследование показывает, что методы обучения больших языковых моделей, ориентированные только на корректность, приводят к коллапсу разнообразия путей рассуждения и снижению творческих способностей модели. Авторы предлагают Distributional Creative Reasoning (DCR) — единую вариационную целевую функцию, которая моделирует обучение как градиентный поток через вероятностные распределения на пространстве решений. Фреймворк объединяет существующие методы (STaR, GRPO, DPO) как частные случаи одной функции потерь и доказывает теорему о распаде разнообразия, объясняющую этот процесс. Исследование предоставляет практические рецепты для достижения оптимального баланса между точностью предсказаний и разнообразием творческого мышления в LLM.'}, 'en': {'title': 'Balancing Accuracy and Creativity in Language Models', 'desc': 'This paper addresses a problem in training large language models (LLMs) where focusing too much on correctness can reduce the diversity of reasoning paths. The authors introduce a new framework called Distributional Creative Reasoning (DCR) that helps maintain both accuracy and creativity in LLMs. By analyzing how traditional methods lead to a collapse in reasoning diversity, they provide solutions that ensure a stable and diverse policy during training. The framework also offers practical strategies to implement these solutions effectively in LLM pipelines.'}, 'zh': {'title': '保持准确性与创造性的平衡', 'desc': '本论文探讨了大型语言模型（LLM）在优化正确性时可能导致推理
