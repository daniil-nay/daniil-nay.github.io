scenarios.', 'score': 4, 'issue_id': 546, 'pub_date': '2026-01-12', 'pub_date_card': {'ru': '12 января', 'en': 'January 12', 'zh': '1月12日'}, 'hash': '0f39d0102305d976', 'authors': ['Siqi Zhu', 'Jiaxuan You'], 'affiliations': ['University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2601.07376.jpg', 'data': {'categories': ['#training', '#agents', '#rl', '#architecture'], 'emoji': '🔧', 'ru': {'title': 'Модульная архитектура для гибкого обучения LLM-агентов', 'desc': 'OpenTinker — это модульная инфраструктура для обучения с подкреплением LLM-агентов, разделяющая алгоритмический дизайн, исполнение и взаимодействие агента с окружением на отдельные компоненты. Вместо монолитных end-to-end пайплайнов, система декомпозирует системы обучения агентов на лёгкие, переиспользуемые компоненты с чётко определёнными границами абстракций. Инфраструктура включает централизованный планировщик для управления обучением и инференсом, поддерживающий LoRA-адаптацию, полнопараметрическое обучение с подкреплением и supervised fine-tuning на общих вычислительных ресурсах. Фреймворк демонстрирует эффективность на практических сценариях обучения многоагентных систем и обучения с подкреплением.'}, 'en': {'title': 'Modular Reinforcement Learning for Language Models', 'desc': 'OpenTinker is a modular framework designed for reinforcement learning (RL) of large language model (LLM) agents. It separates different components of the learning process, such as algorithm design and agent-environment interaction, allowing for more flexible and efficient system development. Users can define their agents and environments while the framework manages the execution of training and inference tasks. OpenTinker also includes a centralized scheduler to optimize resource usage across various RL methods, making it easier to implement multi-agent training scenarios.'}, 'zh': {'title': 'OpenTinker：模块化的强化学习基础设施', 'desc': 'OpenTinker是一个用于大型语言模型代理的强化学习基础设施，具有模块化的组件和管理的执行运行时。它通过将算法设计、执行和代理-环境交互分离，避免了单一的端到端强化学习管道。用户可以指定代理、环境和交互协议，而推理和训练则由管理的执行运行时处理。OpenTinker还引入了一个集中调度器，用于管理共享资源上的训练和推理工作负载，支持多代理训练的扩展设计原则。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.07767', 'title': 'Are LLM Decisions Faithful to Verbal Confidence?', 'url': 'https://huggingface.co/papers/2601.07767', 'abstract': 'Large language models exhibit a disconnect between their expressed uncertainty and strategic decision-making under varying penalty conditions, failing to adjust abstention policies even when optimal.  \t\t\t\t\tAI-generated summary \t\t\t\t Large Language Models (LLMs) can produce surprisingly sophisticated estimates of their own uncertainty. However, it remains unclear to what extent this expressed confidence is tied to the reasoning, knowledge, or decision making of the model. To test this, we introduce RiskEval: a framework designed to evaluate whether models adjust their abstention policies in response to varying error penalties. Our evaluation of several frontier models reveals a critical dissociation: models are neither cost-aware when articulating their verbal confidence, nor strategically responsive when deciding whether to engage or abstain under high-penalty conditions. Even when extreme penalties render frequent abstention the mathematically optimal strategy, models almost never abstain, resulting in utility collapse. This indicates that calibrated verbal confidence scores may not be sufficient to create trustworthy and interpretable AI systems, as current models lack the strategic agency to convert uncertainty signals into optimal and risk-sensitive decisions.', 'score': 3, 'issue_id': 547, 'pub_date': '2026-01-12', 'pub_date_card': {'ru': '12 января', 'en': 'January 12', 'zh': '1月12日'}, 'hash': '3238a30b63fa6e17', 'authors': ['Jiawei Wang', 'Yanfei Zhou', 'Siddartha Devic', 'Deqing Fu'], 'affiliations': ['University of Southern California'], 'pdf_title_img': 'assets/pdf/title_img/2601.07767.jpg', 'data': {'categories': ['#interpretability', '#benchmark', '#reasoning'], 'emoji': '⚖️', 'ru': {'title': 'Уверенность без стратегии: почему LLM не учитывают риск в решениях', 'desc': 'Исследование показывает, что большие языковые модели (LLM) не могут адекватно использовать свои оценки неуверенности при принятии решений в условиях различных штрафов за ошибки. Авторы предлагают фреймворк RiskEval для оценки того, насколько модели изменяют стратегию воздержания от ответа в зависимости от стоимости ошибок. Эксперименты показали критическое несоответствие: модели не учитывают экономические затраты ни при выражении вербальной уверенности, ни при выборе стратегии воздержания, даже когда частое отказ от ответа математически оптимален. Это указывает, что откалиброванные оценки уверенности недостаточны для создания надежных AI систем, так как моделям не хватает стратегической способности преобразовывать сигналы неуверенности в оптимальные решения, учитывающие риск.'}, 'en': {'title': 'Bridging the Gap: Uncertainty vs. Decision-Making in AI', 'desc': 'This paper investigates how well large language models (LLMs) understand and act on their own uncertainty when faced with different penalty scenarios. It introduces a framework called RiskEval to assess whether these models change their decision-making strategies based on the costs of errors. The findings show that LLMs often fail to adjust their abstention policies, even when it would be mathematically optimal to do so under high penalties. This suggests that while LLMs can express confidence, they do not effectively translate that uncertainty into strategic actions, raising concerns about their reliability in critical applications.'}, 'zh': {'title': '信心与决策的脱节：大型语言模型的挑战', 'desc': '大型语言模型（LLMs）在表达不确定性和在不同惩罚条件下的战略决策之间存在脱节。尽管这些模型能够生成复杂的不确定性估计，但它们在决策时并未根据错误惩罚的变化调整其放弃策略。我们提出了RiskEval框架来评估模型是否会在高惩罚条件下做出战略响应。研究表明，当前模型在表达信心时缺乏成本意识，且在面对高惩罚时几乎从不选择放弃，导致效用崩溃。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.06411', 'title': 'Structured Episodic Event Memory', 'url': 'https://huggingface.co/papers/2601.06411', 'abstract': 'Structured Episodic Event Memory (SEEM) enhances LLMs with hierarchical memory architecture combining graph and episodic layers for improved narrative coherence and reasoning.  \t\t\t\t\tAI-generated summary \t\t\t\t Current approaches to memory in Large Language Models (LLMs) predominantly rely on static Retrieval-Augmented Generation (RAG), which often results in scattered retrieval and fails to capture the structural dependencies required for complex reasoning. For autonomous agents, these passive and flat architectures lack the cognitive organization necessary to model the dynamic and associative nature of long-term interaction. To address this, we propose Structured Episodic Event Memory (SEEM), a hierarchical framework that synergizes a graph memory layer for relational facts with a dynamic episodic memory layer for narrative progression. Grounded in cognitive frame theory, SEEM transforms interaction streams into structured Episodic Event Frames (EEFs) anchored by precise provenance pointers. Furthermore, we introduce an agentic associative fusion and Reverse Provenance Expansion (RPE) mechanism to reconstruct coherent narrative contexts from fragmented evidence. Experimental results on the LoCoMo and LongMemEval benchmarks demonstrate that SEEM significantly outperforms baselines, enabling agents to maintain superior narrative coherence and logical consistency.', 'score': 3, 'issue_id': 545, 'pub_date': '2026-01-10', 'pub_date_card': {'ru': '10 января', 'en': 'January 10', 'zh': '1月10日'}, 'hash': 'bcf81e000cdc0bac', 'authors': ['Zhengxuan Lu', 'Dongfang Li', 'Yukun Shi', 'Beilun Wang', 'Longyue Wang', 'Baotian Hu'], 'affiliations': ['Alibaba Group, Hangzhou, China', 'Harbin Institute of Technology (Shenzhen), Shenzhen, China', 'Shenzhen Loop Area Institute, Shenzhen, China', 'Southeast University, Nanjing, China'], 'pdf_title_img': 'assets/pdf/title_img/2601.06411.jpg', 'data': {'categories': ['#reasoning', '#rag', '#long_context', '#agents', '#graphs', '#benchmark'], 'emoji': '🧠', 'ru': {'title': 'Иерархическая память для логически связного мышления агентов', 'desc': 'В статье предложена система SEEM (Structured Episodic Event Memory), которая улучшает возможности больших языковых моделей, комбинируя графовый и эпизодический слои памяти. Система преобразует потоки взаимодействия в структурированные фреймы событий с указателями происхождения, позволяя модели лучше отслеживать причинно-следственные связи. Авторы представили механизм ассоциативного слияния и обратного расширения происхождения (RPE) для восстановления связной повествовательной контекста из фрагментированных данных. Экспериментальные результаты показывают, что SEEM значительно превосходит базовые методы в сохранении логической согласованности и связности нарратива для автономных агентов.'}, 'en': {'title': 'Enhancing Narrative Coherence with Structured Memory in LLMs', 'desc': 'Structured Episodic Event Memory (SEEM) is a new framework designed to improve the memory capabilities of Large Language Models (LLMs) by integrating a hierarchical architecture. It combines a graph memory layer, which organizes relational facts, with an episodic memory layer that tracks narrative flow. This approach allows for better reasoning and coherence in generated narratives, addressing the limitations of traditional static memory systems. Experimental results show that SEEM enhances the ability of agents to create logically consistent and coherent stories from fragmented information.'}, 'zh': {'title': '结构化情节事件记忆：提升智能体叙事能力的关键', 'desc': '结构化情节事件记忆（SEEM）通过结合图形和情节层的层次记忆架构，增强了大型语言模型（LLMs）的叙事连贯性和推理能力。当前的记忆方法主要依赖静态的增强生成（RAG），导致信息检索分散，无法捕捉复杂推理所需的结构依赖关系。SEEM框架结合了关系事实的图形记忆层和叙事进展的动态情节记忆层，提供了更好的认知组织。实验结果表明，SEEM在LoCoMo和LongMemEval基准测试中显著优于传统方法，帮助智能体保持更高的叙事连贯性和逻辑一致性。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.07786', 'title': '"TODO: Fix the Mess Gemini Created": Towards Understanding GenAI-Induced Self-Admitted Technical Debt', 'url': 'https://huggingface.co/papers/2601.07786', 'abstract': 'Analysis of AI-referencing code comments reveals that developers explicitly acknowledge technical debt in AI-assisted code, identifying patterns of postponed testing, incomplete adaptation, and limited understanding as key factors in AI-induced technical debt emergence.  \t\t\t\t\tAI-generated summary \t\t\t\t As large language models (LLMs) such as ChatGPT, Copilot, Claude, and Gemini become integrated into software development workflows, developers increasingly leave traces of AI involvement in their code comments. Among these, some comments explicitly acknowledge both the use of generative AI and the presence of technical shortcomings. Analyzing 6,540 LLM-referencing code comments from public Python and JavaScript-based GitHub repositories (November 2022-July 2025), we identified 81 that also self-admit technical debt(SATD). Developers most often describe postponed testing, incomplete adaptation, and limited understanding of AI-generated code, suggesting that AI assistance affects both when and why technical debt emerges. We term GenAI-Induced Self-admitted Technical debt (GIST) as a proposed conceptual lens to describe recurring cases where developers incorporate AI-generated code while explicitly expressing uncertainty about its behavior or correctness.', 'score': 2, 'issue_id': 548, 'pub_date': '2026-01-12', 'pub_date_card': {'ru': '12 января', 'en': 'January 12', 'zh': '1月12日'}, 'hash': 'bbe97050931a6505', 'authors': ['Abdullah Al Mujahid', 'Mia Mohammad Imran'], 'affiliations': ['Missouri University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2601.07786.jpg', 'data': {'categories': [], 'emoji': '⚙️', 'ru': {'title': 'Когда AI помогает, но создаёт долги: признанная неполнота машинного кода', 'desc': 'Исследование анализирует комментарии в коде, где разработчики признают использование больших языковых моделей и наличие технического долга. Учёные изучили 6540 комментариев из публичных репозиториев Python и JavaScript, найдя 81 случай явного признания технического долга, вызванного AI. Основные проблемы включают отложенное тестирование, неполную адаптацию кода и недостаточное понимание сгенерированного материала. Авторы вводят понятие GIST (GenAI-Induced Self-admitted Technical Debt) для описания ситуаций, когда разработчики используют AI-код, но явно выражают сомнения в его корректности.'}, 'en': {'title': 'Understanding Technical Debt in AI-Assisted Coding', 'desc': 'This paper analyzes how developers acknowledge technical debt when using AI tools in coding. It focuses on comments from code repositories that mention both AI assistance and technical shortcomings. The study identifies common issues like delayed testing, incomplete adaptation of AI-generated code, and a lack of understanding of how the AI works. The authors introduce the concept of GenAI-Induced Self-admitted Technical debt (GIST) to describe these situations where developers express uncertainty about AI-generated code.'}, 'zh': {'title': 'AI辅助下的技术债务新视角', 'desc': '这篇论文分析了开发者在使用AI辅助代码时所留下的代码注释，揭示了技术债务的显性承认。研究发现，开发者在代码中提到的技术债务主要包括推迟测试、不完整的适应和对AI生成代码的有限理解。通过分析6540条与大型语言模型（LLM）相关的代码注释，论文提出了一个新的概念：生成AI引发的自我承认技术债务（GIST）。这表明AI辅助在软件开发中不仅影响了技术债务的出现时机，也影响了其原因。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.07033', 'title': 'Codified Foreshadowing-Payoff Text Generation', 'url': 'https://huggingface.co/papers/2601.07033', 'abstract': 'Large language models struggle with maintaining long-range narrative dependencies, but a new framework called CFPG addresses this by structuring narrative continuity through executable causal predicates to ensure proper fulfillment of foreshadowed events.  \t\t\t\t\tAI-generated summary \t\t\t\t Foreshadowing and payoff are ubiquitous narrative devices through which authors introduce commitments early in a story and resolve them through concrete, observable outcomes. However, despite advances in story generation, large language models (LLMs) frequently fail to bridge these long-range narrative dependencies, often leaving "Chekhov\'s guns" unfired even when the necessary context is present. Existing evaluations largely overlook this structural failure, focusing on surface-level coherence rather than the logical fulfillment of narrative setups. In this paper, we introduce Codified Foreshadowing-Payoff Generation (CFPG), a novel framework that reframes narrative quality through the lens of payoff realization. Recognizing that LLMs struggle to intuitively grasp the "triggering mechanism" of a foreshadowed event, CFPG transforms narrative continuity into a set of executable causal predicates. By mining and encoding Foreshadow-Trigger-Payoff triples from the BookSum corpus, we provide structured supervision that ensures foreshadowed commitments are not only mentioned but also temporally and logically fulfilled. Experiments demonstrate that CFPG significantly outperforms standard prompting baselines in payoff accuracy and narrative alignment. Our findings suggest that explicitly codifying narrative mechanics is essential for moving LLMs from surface-level fluency to genuine narrative competence.', 'score': 2, 'issue_id': 547, 'pub_date': '2026-01-11', 'pub_date_card': {'ru': '11 января', 'en': 'January 11', 'zh': '1月11日'}, 'hash': 'bcace5ff267ebd80', 'authors': ['Longfei Yun', 'Kun Zhou', 'Yupeng Hou', 'Letian Peng', 'Jingbo Shang'], 'affiliations': ['University of California, San Diego'], 'pdf_title_img': 'assets/pdf/title_img/2601.07033.jpg', 'data': {'categories': ['#long_context', '#story_generation', '#reasoning'], 'emoji': '🔫', 'ru': {'title': 'От поверхностной беглости к подлинной нарративной компетентности через кодификацию причинно-следственных связей', 'desc': "Статья представляет новый фреймворк CFPG для улучшения способности больших языковых моделей (LLM) правильно разрешать долгосрочные нарративные зависимости. Основная проблема заключается в том, что LLM часто не выполняют обещания, заложенные в начале истории (литературный приём предчувствия), оставляя события незавершёнными. Решение основано на преобразовании нарративной непрерывности в набор исполняемых причинно-следственных предикатов, которые кодифицируют триплеты 'предчувствие-триггер-разрешение' из корпуса текстов. Эксперименты показывают, что явное кодирование нарративных механик значительно повышает точность выполнения обещаний и логическую согласованность сгенерированных историй."}, 'en': {'title': 'Bridging Narrative Gaps with CFPG', 'desc': 'This paper introduces a new framework called Codified Foreshadowing-Payoff Generation (CFPG) to improve the narrative capabilities of large language models (LLMs). It addresses the issue of LLMs failing to maintain long-range narrative dependencies, particularly in fulfilling foreshadowed events. By using executable causal predicates, CFPG structures narrative continuity and ensures that commitments made early in a story are logically resolved later. The results show that CFPG enhances narrative quality by significantly improving payoff accuracy and alignment compared to traditional prompting methods.'}, 'zh': {'title': '通过因果谓词实现叙事的连贯性', 'desc': '大型语言模型在保持长篇叙事依赖关系方面存在困难。本文提出了一种新的框架，称为CFPG，通过可执行的因果谓词来构建叙事连续性，以确保预示事件的正确实现。CFPG通过从BookSum语料库中挖掘和编码预示-触发-回报三元组，提供了结构化的监督，确保预示的承诺不仅被提及，而且在时间和逻辑上得到满足。实验表明，CFPG在回报准确性和叙事一致性方面显著优于标准提示基线。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.03666', 'title': 'e5-omni: Explicit Cross-modal Alignment for Omni-modal Embeddings', 'url': 'https://huggingface.co/papers/2601.03666', 'abstract': 'Omni-modal embedding models face challenges with modality-dependent similarity scaling, ineffective in-batch negatives, and mismatched statistics across modalities, which are addressed through explicit alignment techniques including temperature calibration, controlled negative curriculum, and batch whitening with covariance regularization.  \t\t\t\t\tAI-generated summary \t\t\t\t Modern information systems often involve different types of items, e.g., a text query, an image, a video clip, or an audio segment. This motivates omni-modal embedding models that map heterogeneous modalities into a shared space for direct comparison. However, most recent omni-modal embeddings still rely heavily on implicit alignment inherited from pretrained vision-language model (VLM) backbones. In practice, this causes three common issues: (i) similarity logits have modality-dependent sharpness, so scores are not on a consistent scale; (ii) in-batch negatives become less effective over time because mixed-modality batches create an imbalanced hardness distribution; as a result, many negatives quickly become trivial and contribute little gradient; and (iii) embeddings across modalities show mismatched first- and second-order statistics, which makes rankings less stable. To tackle these problems, we propose e5-omni, a lightweight explicit alignment recipe that adapts off-the-shelf VLMs into robust omni-modal embedding models. e5-omni combines three simple components: (1) modality-aware temperature calibration to align similarity scales, (2) a controllable negative curriculum with debiasing to focus on confusing negatives while reducing the impact of false negatives, and (3) batch whitening with covariance regularization to better match cross-modal geometry in the shared embedding space. Experiments on MMEB-V2 and AudioCaps show consistent gains over strong bi-modal and omni-modal baselines, and the same recipe also transfers well to other VLM backbones. We release our model checkpoint at https://huggingface.co/Haon-Chen/e5-omni-7B.', 'score': 2, 'issue_id': 544, 'pub_date': '2026-01-07', 'pub_date_card': {'ru': '7 января', 'en': 'January 7', 'zh': '1月7日'}, 'hash': 'c6af8e5fb12ea40a', 'authors': ['Haonan Chen', 'Sicheng Gao', 'Radu Timofte', 'Tetsuya Sakai', 'Zhicheng Dou'], 'affiliations': ['Gaoling School of Artificial Intelligence, Renmin University of China', 'University of Würzburg', 'Waseda University'], 'pdf_title_img': 'assets/pdf/title_img/2601.03666.jpg', 'data': {'categories': ['#training', '#open_source', '#multimodal', '#optimization', '#benchmark'], 'emoji': '🌈', 'ru': {'title': 'Явное выравнивание для надёжных мультимодальных вложений', 'desc': 'В работе предложен метод e5-omni для улучшения мультимодальных моделей вложений, которые преобразуют различные типы данных (текст, изображения, видео, аудио) в единое пространство представлений. Авторы выявили три основные проблемы: неконсистентная шкала схожести между модальностями, неэффективные отрицательные примеры в батче и несовпадение статистики вложений. Решение включает три компонента: калибровку температуры для выравнивания масштабов сходства, контролируемый curriculum обучения отрицательными примерами и батч-отбеливание с регуляризацией ковариационной матрицы. Экспериментальные результаты демонстрируют устойчивое улучшение качества на бенчмарках MMEB-V2 и AudioCaps по сравнению с существующими подходами.'}, 'en': {'title': 'Aligning Modalities for Better Embeddings', 'desc': 'This paper addresses the challenges faced by omni-modal embedding models, which integrate different types of data like text, images, and audio into a unified space. The authors identify three main issues: inconsistent similarity scaling across modalities, ineffective negative samples in mixed-modality batches, and mismatched statistical properties of embeddings. To resolve these, they introduce e5-omni, which employs temperature calibration for similarity alignment, a controlled negative curriculum to enhance learning from difficult examples, and batch whitening to harmonize the statistical properties of embeddings. Their experiments demonstrate that e5-omni outperforms existing models, showcasing its effectiveness in creating robust omni-modal embeddings.'}, 'zh': {'title': '全模态嵌入的显式对齐技术', 'desc': '本文讨论了全模态嵌入模型面临的挑战，包括模态依赖的相似性缩放、无效的批内负样本和模态间统计不匹配。为了解决这些问题，提出了一种名为e5-omni的显式对齐技术，结合了温度校准、可控负样本课程和批次白化等方法。通过这些技术，模型能够更好地对齐不同模态的相似性尺度，提高负样本的有效性，并改善跨模态几何匹配。实验结果表明，e5-omni在多个基准测试中表现优越，且能够有效迁移到其他视觉语言模型。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.07181', 'title': 'ShowUI-Aloha: Human-Taught GUI Agent', 'url': 'https://huggingface.co/papers/2601.07181', 'abstract': 'ShowUI-Aloha presents a pipeline that converts unstructured human screen recordings into structured GUI tasks through recording, semantic interpretation, planning, and execution components.  \t\t\t\t\tAI-generated summary \t\t\t\t Graphical User Interfaces (GUIs) are central to human-computer interaction, yet automating complex GUI tasks remains a major challenge for autonomous agents, largely due to a lack of scalable, high-quality training data. While recordings of human demonstrations offer a rich data source, they are typically long, unstructured, and lack annotations, making them difficult for agents to learn from.To address this, we introduce ShowUI-Aloha, a comprehensive pipeline that transforms unstructured, in-the-wild human screen recordings from desktop environments into structured, actionable tasks. Our framework includes four key components: A recorder that captures screen video along with precise user interactions like mouse clicks, keystrokes, and scrolls. A learner that semantically interprets these raw interactions and the surrounding visual context, translating them into descriptive natural language captions. A planner that reads the parsed demonstrations, maintains task states, and dynamically formulates the next high-level action plan based on contextual reasoning. An executor that faithfully carries out these action plans at the OS level, performing precise clicks, drags, text inputs, and window operations with safety checks and real-time feedback. Together, these components provide a scalable solution for collecting and parsing real-world human data, demonstrating a viable path toward building general-purpose GUI agents that can learn effectively from simply observing humans.', 'score': 1, 'issue_id': 545, 'pub_date': '2026-01-12', 'pub_date_card': {'ru': '12 января', 'en': 'January 12', 'zh': '1月12日'}, 'hash': '96edfcef7f385531', 'authors': ['Yichun Zhang', 'Xiangwu Guo', 'Yauhong Goh', 'Jessica Hu', 'Zhiheng Chen', 'Xin Wang', 'Difei Gao', 'Mike Zheng Shou'], 'affiliations': ['Show Lab, National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2601.07181.jpg', 'data': {'categories': [], 'emoji': '🖥️', 'ru': {'title': 'От записей к действиям: автоматизация GUI-задач через семантическую интерпретацию', 'desc': 'ShowUI-Aloha представляет комплексный pipeline для преобразования неструктурированных видеозаписей взаимодействия человека с экраном в структурированные задачи управления графическим интерфейсом. Система включает четыре компонента: рекордер для захвата видео и действий пользователя, семантический интерпретатор для преобразования взаимодействий в текстовые описания, планировщик для формулирования высокоуровневых действий на основе контекста, и исполнитель для выполнения команд на уровне операционной системы. Фреймворк решает проблему недостатка масштабируемых обучающих данных для автономных агентов, позволяя им учиться непосредственно из наблюдений за поведением человека. Такой подход открывает перспективы для создания универсальных GUI-агентов, способных автоматизировать сложные задачи взаимодействия с компьютером.'}, 'en': {'title': 'Transforming Screen Recordings into Actionable GUI Tasks', 'desc': 'ShowUI-Aloha is a machine learning pipeline designed to convert unstructured screen recordings of human interactions with graphical user interfaces (GUIs) into structured tasks that autonomous agents can understand. It consists of four main components: a recorder that captures user interactions, a learner that interprets these interactions into natural language, a planner that formulates action plans based on the parsed data, and an executor that performs the actions on the operating system. This approach addresses the challenge of automating complex GUI tasks by utilizing rich data from human demonstrations, which are typically unstructured and lack annotations. By transforming these recordings into actionable tasks, ShowUI-Aloha paves the way for developing general-purpose GUI agents that can learn from observing human behavior.'}, 'zh': {'title': '将屏幕录制转化为智能GUI任务的解决方案', 'desc': 'ShowUI-Aloha是一个将非结构化的人类屏幕录制转换为结构化GUI任务的管道。它通过录制、语义解释、规划和执行四个组件来实现这一目标。该框架能够捕捉用户的交互行为，并将其转化为自然语言描述，进而生成高层次的行动计划。最终，执行器在操作系统层面执行这些计划，从而为构建通用的GUI代理提供了一种可扩展的解决方案。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.06944', 'title': 'SketchJudge: A Diagnostic Benchmark for Grading Hand-drawn Diagrams with Multimodal Large Language Models', 'url': 'https://huggingface.co/papers/2601.06944', 'abstract': "SketchJudge benchmark evaluates multimodal large language models' ability to grade hand-drawn STEM diagrams, revealing significant limitations in visual understanding compared to human performance.  \t\t\t\t\tAI-generated summary \t\t\t\t While Multimodal Large Language Models (MLLMs) have achieved remarkable progress in visual understanding, they often struggle when faced with the unstructured and ambiguous nature of human-generated sketches. This limitation is particularly pronounced in the underexplored task of visual grading, where models should not only solve a problem but also diagnose errors in hand-drawn diagrams. Such diagnostic capabilities depend on complex structural, semantic, and metacognitive reasoning. To bridge this gap, we introduce SketchJudge, a novel benchmark tailored for evaluating MLLMs as graders of hand-drawn STEM diagrams. SketchJudge encompasses 1,015 hand-drawn student responses across four domains: geometry, physics, charts, and flowcharts, featuring diverse stylistic variations and distinct error types. Evaluations on SketchJudge demonstrate that even advanced MLLMs lag significantly behind humans, validating the benchmark's effectiveness in exposing the fragility of current vision-language alignment in symbolic and noisy contexts. All data, code, and evaluation scripts are publicly available at https://github.com/yuhangsu82/SketchJudge.", 'score': 1, 'issue_id': 545, 'pub_date': '2026-01-11', 'pub_date_card': {'ru': '11 января', 'en': 'January 11', 'zh': '1月11日'}, 'hash': 'd245e56fb4a9de5e', 'authors': ['Yuhang Su', 'Mei Wang', 'Yaoyao Zhong', 'Guozhang Li', 'Shixing Li', 'Yihan Feng', 'Hua Huang'], 'affiliations': ['School of Artificial Intelligence, Beijing Normal University, Beijing, China'], 'pdf_title_img': 'assets/pdf/title_img/2601.06944.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#cv', '#dataset'], 'emoji': '✏️', 'ru': {'title': 'Когда даже умные модели не могут проверить школьный рисунок', 'desc': 'В статье представлен бенчмарк SketchJudge для оценки способности мультимодальных больших языковых моделей проверять и оценивать рукописные STEM диаграммы, созданные студентами. Бенчмарк содержит 1015 примеров рукописных ответов в четырёх областях: геометрия, физика, графики и блок-схемы с разнообразными стилистическими вариациями и типами ошибок. Исследование показывает, что современные MLLM значительно отстают от человека в задаче визуальной оценки, требующей не только решения задачи, но и диагностики ошибок в диаграммах на основе структурного, семантического и метакогнитивного анализа. Результаты подтверждают хрупкость текущего выравнивания зрительно-языковых моделей в работе с символическими и зашумленными визуальными данными.'}, 'en': {'title': 'SketchJudge: Bridging the Grading Gap for AI in STEM Diagrams', 'desc': 'The paper introduces SketchJudge, a benchmark designed to assess the performance of multimodal large language models (MLLMs) in grading hand-drawn STEM diagrams. It highlights the challenges these models face in understanding unstructured sketches, particularly in diagnosing errors, which requires advanced reasoning skills. The benchmark includes a diverse set of 1,015 student responses across various STEM domains, showcasing different styles and error types. Results indicate that MLLMs significantly underperform compared to human graders, emphasizing the need for improved vision-language alignment in complex visual tasks.'}, 'zh': {'title': '评估多模态模型的手绘图表评分能力', 'desc': '本论文介绍了SketchJudge基准测试，旨在评估多模态大型语言模型（MLLMs）在评分手绘STEM图表方面的能力。研究发现，这些模型在理解人类手绘草图时存在显著局限，尤其是在视觉评分任务中表现不佳。SketchJudge包含1015个手绘学生回答，涵盖几何、物理、图表和流程图等四个领域，展示了多样的风格变化和错误类型。评估结果表明，尽管MLLMs取得了进展，但在视觉-语言对齐的复杂和嘈杂环境中仍显著落后于人类。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.06747', 'title': 'FinForge: Semi-Synthetic Financial Benchmark Generation', 'url': 'https://huggingface.co/papers/2601.06747', 'abstract': "FinForge presents a scalable semi-synthetic pipeline for creating domain-specific financial evaluation benchmarks using expert curation and language model synthesis, demonstrating significant variations in financial reasoning capabilities among state-of-the-art models.  \t\t\t\t\tAI-generated summary \t\t\t\t Evaluating Language Models (LMs) in specialized, high-stakes domains such as finance remains a significant challenge due to the scarcity of open, high-quality, and domain-specific datasets. Existing general-purpose benchmarks provide broad coverage but lack the depth and domain fidelity needed to assess LMs' capabilities for real-world financial reasoning, which requires both conceptual understanding and quantitative rigor. To address this gap, we introduce FinForge, a scalable, semi-synthetic pipeline for constructing finance-specific evaluation benchmarks through a hybrid of expert-guided data curation and controlled LM-based synthesis. FinForge combines manual and programmatic corpus construction from authoritative financial sources with structured question generation and validation using Gemini 2.5 Flash. To demonstrate the pipeline's efficacy, we produce FinForge-5k, a snapshot benchmark comprising over 5,000 human-validated question-answer pairs across 11 finance subdomains, derived from a curated corpus of 100,000 verified documents totaling 143M tokens. Evaluation of state-of-the-art open-source and closed-source models on FinForge-5k reveals significant differences in financial reasoning, with leading models achieving accuracy levels near 80%. These findings underscore the framework's utility for diagnosing current model limitations and guiding future improvements in financial domain competence. All code and data are available at https://github.com/gtfintechlab/FinForge.", 'score': 1, 'issue_id': 550, 'pub_date': '2026-01-11', 'pub_date_card': {'ru': '11 января', 'en': 'January 11', 'zh': '1月11日'}, 'hash': 'ac083251989186b4', 'authors': ['Glenn Matlin', 'Akhil Theerthala', 'Anant Gupta', 'Anirudh JM', 'Rayan Castilla', 'Yi Mei Ng', 'Sudheer Chava'], 'affiliations': ['College of Business, Georgia Institute of Technology', 'College of Computing, Georgia Institute of Technology', 'Financial Services Innovation Lab, Georgia Institute of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2601.06747.jpg', 'data': {'categories': ['#synthetic', '#open_source', '#science'], 'emoji': '💰', 'ru': {'title': 'Финансовые умения больших языковых моделей: измерение и совершенствование', 'desc': 'FinForge представляет масштабируемый конвейер для создания специализированных бенчмарков по финансовым задачам, комбинируя ручную кураторскую работу экспертов с синтезом текстов на основе языковых моделей. Исследователи построили датасет FinForge-5k, содержащий свыше 5000 проверенных человеком пар вопрос-ответ по 11 подобластям финансов, полученных из корпуса в 100000 документов. Оценка современных LLM на этом бенчмарке выявила существенные различия в способности моделей к финансовому рассуждению, с лучшими результатами около 80% точности. Работа демонстрирует эффективность гибридного подхода для диагностики ограничений моделей в специализированных доменах высокого риска.'}, 'en': {'title': 'FinForge: Elevating Financial Reasoning in Language Models', 'desc': 'FinForge is a new method for creating specialized benchmarks to evaluate language models in the finance sector. It combines expert knowledge with language model synthesis to generate high-quality, domain-specific datasets. The pipeline produces a benchmark called FinForge-5k, which includes over 5,000 validated question-answer pairs from a large corpus of financial documents. Testing various models on this benchmark shows notable differences in their financial reasoning abilities, highlighting the need for better tools in this critical area.'}, 'zh': {'title': 'FinForge：金融领域评估的新标准', 'desc': 'FinForge是一个可扩展的半合成管道，用于创建特定领域的金融评估基准。该方法结合了专家指导的数据整理和语言模型合成，解决了金融领域高质量数据集稀缺的问题。通过构建包含超过5000个经过人工验证的问题-答案对的基准，FinForge展示了不同模型在金融推理能力上的显著差异。该框架有助于识别当前模型的局限性，并指导未来在金融领域的改进。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.06496', 'title': '3D CoCa v2: Contrastive Learners with Test-Time Search for Generalizable Spatial Intelligence', 'url': 'https://huggingface.co/papers/2601.06496', 'abstract': '3D CoCa v2 enhances 3D captioning by combining contrastive vision-language learning with spatially-aware 3D scene encoding and test-time search for improved generalization across diverse environments.  \t\t\t\t\tAI-generated summary \t\t\t\t Spatial intelligence refers to the ability to perceive, reason about, and describe objects and their relationships within three-dimensional environments, forming a foundation for embodied perception and scene understanding. 3D captioning aims to describe 3D scenes in natural language; however, it remains challenging due to the sparsity and irregularity of point clouds and, more critically, the weak grounding and limited out-of-distribution (OOD) generalization of existing captioners across drastically different environments, including indoor and outdoor 3D scenes. To address this challenge, we propose 3D CoCa v2, a generalizable 3D captioning framework that unifies contrastive vision-language learning with 3D caption generation and further improves robustness via test-time search (TTS) without updating the captioner parameters. 3D CoCa v2 builds on a frozen CLIP-based semantic prior, a spatially-aware 3D scene encoder for geometry, and a multimodal decoder jointly optimized with contrastive and captioning objectives, avoiding external detectors or handcrafted proposals. At inference, TTS produces diverse caption candidates and performs reward-guided selection using a compact scene summary. Experiments show improvements over 3D CoCa of +1.50 CIDEr@0.5IoU on ScanRefer and +1.61 CIDEr@0.5IoU on Nr3D, and +3.8 CIDEr@0.25 in zero-shot OOD evaluation on TOD3Cap. Code will be released at https://github.com/AIGeeksGroup/3DCoCav2.', 'score': 0, 'issue_id': 544, 'pub_date': '2026-01-10', 'pub_date_card': {'ru': '10 января', 'en': 'January 10', 'zh': '1月10日'}, 'hash': 'ee370f5e69428850', 'authors': ['Hao Tang', 'Ting Huang', 'Zeyu Zhang'], 'affiliations': ['School of Computer Science, Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2601.06496.jpg', 'data': {'categories': ['#open_source'], 'emoji': '🎬', 'ru': {'title': 'Трёхмерные описания без границ: контрастивное обучение для понимания пространства', 'desc': '3D CoCa v2 — это улучшенная модель для описания трёхмерных сцен на естественном языке, которая объединяет контрастивное обучение видения и языка с пространственно-осведомлённым кодировщиком 3D-сцен. Модель построена на замороженных семантических представлениях CLIP и использует мультимодальный декодер, совместно оптимизируемый с целями контрастивного обучения и генерации описаний. Для повышения надёжности применяется поиск во время тестирования (TTS), который генерирует разнообразные варианты описаний и выбирает лучшие на основе компактного резюме сцены, без обновления параметров модели. Экспериментальные результаты демонстрируют значительное улучшение обобщения на различных окружениях, включая синтетическое тестирование на несвязанных распределениях.'}, 'en': {'title': 'Enhancing 3D Captioning with Contrastive Learning and Spatial Awareness', 'desc': "3D CoCa v2 is a framework designed to improve 3D captioning by integrating contrastive vision-language learning with advanced 3D scene encoding. It addresses challenges like the irregularity of point clouds and the need for better generalization in diverse environments. The model utilizes a frozen CLIP-based semantic prior and a spatially-aware encoder to enhance understanding of 3D geometry. Additionally, it employs test-time search to generate diverse caption options and select the best one without altering the model's parameters, leading to significant performance gains in various benchmarks."}, 'zh': {'title': '提升三维描述生成的智能框架', 'desc': '3D CoCa v2 是一种增强三维描述生成的框架，它结合了对比视觉-语言学习和空间感知的三维场景编码。该方法旨在解决现有三维描述生成器在不同环境中的弱基础和有限的泛化能力。通过在推理阶段使用测试时搜索（TTS），3D CoCa v2 提高了描述的鲁棒性，而无需更新描述生成器的参数。实验结果表明，3D CoCa v2 在多个数据集上显著提升了描述生成的质量。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.06329', 'title': 'On the Fallacy of Global Token Perplexity in Spoken Language Model Evaluation', 'url': 'https://huggingface.co/papers/2601.06329', 'abstract': "Speech models trained on raw audio can generate appropriate content while maintaining speaker and emotion attributes, but traditional text-based evaluation methods underestimate speech characteristics; new evaluation approaches better correlate with human perception.  \t\t\t\t\tAI-generated summary \t\t\t\t Generative spoken language models pretrained on large-scale raw audio can continue a speech prompt with appropriate content while preserving attributes like speaker and emotion, serving as foundation models for spoken dialogue. In prior literature, these models are often evaluated using ``global token perplexity'', which directly applies the text perplexity formulation to speech tokens. However, this practice overlooks fundamental differences between speech and text modalities, possibly leading to an underestimation of the speech characteristics. In this work, we propose a variety of likelihood- and generative-based evaluation methods that serve in place of naive global token perplexity. We demonstrate that the proposed evaluations more faithfully reflect perceived generation quality, as evidenced by stronger correlations with human-rated mean opinion scores (MOS). When assessed under the new metrics, the relative performance landscape of spoken language models is reshaped, revealing a significantly reduced gap between the best-performing model and the human topline. Together, these results suggest that appropriate evaluation is critical for accurately assessing progress in spoken language modeling.", 'score': 0, 'issue_id': 546, 'pub_date': '2026-01-09', 'pub_date_card': {'ru': '9 января', 'en': 'January 9', 'zh': '1月9日'}, 'hash': '3718805726712adf', 'authors': ['Jeff Chan-Jan Sju', 'Liang-Hsuan Tseng', 'Yi-Cheng Lin', 'Yen-Chun Kuo', 'Ju-Chieh Chou', 'Kai-Wei Chang', 'Hung-yi Lee', 'Carlos Busso'], 'affiliations': ['Carnegie Mellon University', 'Massachusetts Institute of Technology', 'National Taiwan University', 'Toyota Technological Institute at Chicago'], 'pdf_title_img': 'assets/pdf/title_img/2601.06329.jpg', 'data': {'categories': ['#audio', '#benchmark'], 'emoji': '🎤', 'ru': {'title': 'Правильная оценка речевых моделей требует специализированных метрик, а не текстовых подходов', 'desc': 'В работе исследуются генеративные модели, обученные на сыром аудио, которые способны продолжать речевые последовательности, сохраняя характеристики говорящего и эмоции. Авторы показывают, что традиционная метрика глобальной перплексивности токенов, адаптированная из текстовых моделей, не учитывает специфику речевой модальности и недооценивает качество генерации. Предлагаются новые методы оценки, основанные на вероятностных и генеративных подходах, которые лучше коррелируют с оценками человека (MOS). При использовании предложенных метрик переоценивается перспективность лучших моделей устной речи, демонстрируя значительное сокращение разрыва между ними и человеческим уровнем.'}, 'en': {'title': 'Revolutionizing Speech Model Evaluation for Better Human Alignment', 'desc': 'This paper discusses the limitations of traditional text-based evaluation methods for speech models that generate audio content. It highlights that these methods often fail to capture the unique characteristics of speech, such as speaker identity and emotional tone. The authors propose new evaluation techniques that better align with human perceptions of speech quality, showing stronger correlations with human ratings. Their findings indicate that using these improved metrics can significantly change how we assess the performance of spoken language models, emphasizing the importance of appropriate evaluation in this field.'}, 'zh': {'title': '适当评估是语音模型进展的关键', 'desc': '本研究探讨了基于原始音频训练的语音模型，这些模型能够在保持说话者和情感特征的同时生成合适的内容。传统的文本评估方法未能充分考虑语音的特性，因此可能低估了语音模型的表现。我们提出了一系列新的评估方法，这些方法更好地与人类感知相符，能够更准确地反映生成质量。研究结果表明，适当的评估方法对于准确评估语音语言建模的进展至关重要。'}}, 'github_stars': 0, 'github_url': ''}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf moonly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (21)', '#agent_memory (6)', '#agents (42)', '#agi (3)', '#alignment (17)', '#architecture (51)', '#audio (10)', '#benchmark (79)', '#compression', '#context_window (5)', '#continual_learning', '#data (18)', '#dataset (53)', '#diffusion (29)', '#ethics (5)', '#games (5)', '#graphs (5)', '#hallucinations (9)', '#healthcare (4)', '#inference (11)', '#interpretability (19)', '#knowledge_graphs', '#leakage (2)', '#long_context (15)', '#low_resource (6)', '#machine_translation (1)', '#math (8)', '#memorization', '#memory (1)', '#multilingual (9)', '#multimodal (64)', '#open_source (52)', '#optimization (55)', '#plp (6)', '#prompt_caching', '#prompting (1)', '#rag (8)', '#reasoning (69)', '#retrieval (3)', '#retrieval_eval', '#rl (40)', '#rlhf (17)', '#robotics (10)', '#science (11)', '#security (10)', '#session_memory (2)', '#small_models (11)', '#story_generation (1)', '#survey (5)', '#synthetic (21)', '#tool_use (2)', '#training (93)', '#transfer_learning (6)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                const githubStars = Number(item["github_stars"]);
                let githubBlock = "";
                if (item["github_url"]) {
                    const starsText = Number.isFinite(githubStars) ? githubStars : 0;
                    githubBlock = `<span class="github-link"><span class="github-stars">⭐ ${starsText}</span><a href="${item['github_url']}" target="_blank">GitHub</a></span>`;
                }
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "../img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = '../' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                                ${githubBlock}
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else if (sortBy === 'github') {
                sortedArticles.sort((a, b) => (Number(b.github_stars) || 0) - (Number(a.github_stars) || 0));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-01-31 14:29',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF",
                    github: "звёздам GitHub"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date",
                    github: "GitHub stars"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF 收录日期",
                    github: "GitHub 星标"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }

        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-01-31 14:29')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-01-31 14:29')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('monthly'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
