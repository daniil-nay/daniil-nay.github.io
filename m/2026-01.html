路径多样性崩溃的问题。我们提出了一种新的变分框架，称为分布式创造性推理（DCR），旨在同时保持模型的准确性和创造力。通过分析不同训练方法的影响，我们发现基于正确性的目标会导致多样性衰退，并提出了防止这种崩溃的设计方案。DCR为实现既正确又富有创造性的LLM提供了首个系统化的解决方案。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.22955', 'title': 'Diversity or Precision? A Deep Dive into Next Token Prediction', 'url': 'https://huggingface.co/papers/2512.22955', 'abstract': "Recent advancements have shown that reinforcement learning (RL) can substantially improve the reasoning abilities of large language models (LLMs). The effectiveness of such RL training, however, depends critically on the exploration space defined by the pre-trained model's token-output distribution. In this paper, we revisit the standard cross-entropy loss, interpreting it as a specific instance of policy gradient optimization applied within a single-step episode. To systematically study how the pre-trained distribution shapes the exploration potential for subsequent RL, we propose a generalized pre-training objective that adapts on-policy RL principles to supervised learning. By framing next-token prediction as a stochastic decision process, we introduce a reward-shaping strategy that explicitly balances diversity and precision. Our method employs a positive reward scaling factor to control probability concentration on ground-truth tokens and a rank-aware mechanism that treats high-ranking and low-ranking negative tokens asymmetrically. This allows us to reshape the pre-trained token-output distribution and investigate how to provide a more favorable exploration space for RL, ultimately enhancing end-to-end reasoning performance. Contrary to the intuition that higher distribution entropy facilitates effective exploration, we find that imposing a precision-oriented prior yields a superior exploration space for RL.", 'score': 4, 'issue_id': 410, 'pub_date': '2026-12-28', 'pub_date_card': {'ru': '28 декабря', 'en': 'December 28', 'zh': '12月28日'}, 'hash': '77fedbb4aebb0ea1', 'authors': ['Haoyuan Wu', 'Hai Wang', 'Jiajia Wu', 'Jinxiang Ou', 'Keyao Wang', 'Weile Chen', 'Zihao Zheng', 'Bei Yu'], 'affiliations': ['Tencent', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2512.22955.jpg', 'data': {'categories': ['#reasoning', '#training', '#optimization', '#rl'], 'emoji': '🔍', 'ru': {'title': 'Переформулирование предварительного обучения для оптимального исследования в обучении с подкреплением', 'desc': 'В статье исследуется, как предварительная подготовка языковых моделей влияет на эффективность последующего обучения с подкреплением (RL). Авторы переинтерпретируют стандартную функцию кросс-энтропии как частный случай оптимизации градиентной политики и предлагают обобщённую цель предварительного обучения, адаптирующую принципы on-policy RL к контролируемому обучению. Метод использует переформулирование предсказания следующего токена как стохастического процесса принятия решений с применением техники shaping наград, которая асимметрично обрабатывает токены разных рангов. Ключевой результат противоречит интуиции: более сконцентрированное распределение (низкая энтропия) с ориентацией на точность создаёт лучшее пространство исследования для последующего RL и улучшает итоговую производительность моделей при решении задач логического вывода.'}, 'en': {'title': 'Enhancing Language Models: Precision Over Diversity in Exploration', 'desc': 'This paper explores how reinforcement learning (RL) can enhance the reasoning capabilities of large language models (LLMs) by improving their exploration strategies. It critiques the traditional cross-entropy loss, viewing it as a form of policy gradient optimization in a single-step context. The authors propose a new pre-training objective that integrates on-policy RL concepts into supervised learning, allowing for better exploration of the token-output distribution. Their findings suggest that a focus on precision, rather than just diversity, in the token distribution leads to more effective exploration and improved reasoning performance in LLMs.'}, 'zh': {'title': '优化探索空间，提升推理能力', 'desc': '最近的研究表明，强化学习（RL）可以显著提升大型语言模型（LLM）的推理能力。然而，RL训练的有效性在很大程度上依赖于预训练模型的输出分布所定义的探索空间。本文重新审视了标准的交叉熵损失，将其解释为在单步情境中应用的策略梯度优化的特定实例。我们提出了一种通用的预训练目标，结合了在线RL原则与监督学习，以改善RL的探索潜力，从而提升推理性能。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.00671', 'title': 'Fast-weight Product Key Memory', 'url': 'https://huggingface.co/papers/2601.00671', 'abstract': 'FwPKM introduces a dynamic, fast-weight episodic memory mechanism for sequence modeling that balances storage capacity and efficiency, achieving strong performance on long-context tasks like Needle in a Haystack evaluations.  \t\t\t\t\tAI-generated summary \t\t\t\t Sequence modeling layers in modern language models typically face a trade-off between storage capacity and computational efficiency. While Softmax attention offers unbounded storage at prohibitive quadratic costs, linear variants provide efficiency but suffer from limited, fixed-size storage. We propose Fast-weight Product Key Memory (FwPKM), a novel architecture that resolves this tension by transforming the sparse Product Key Memory (PKM) from a static module into a dynamic, "fast-weight" episodic memory. Unlike PKM, FwPKM updates its parameters dynamically at both training and inference time via local chunk-level gradient descent, allowing the model to rapidly memorize and retrieve new key-value pairs from input sequences. Experiments reveal that FwPKM functions as an effective episodic memory that complements the semantic memory of standard modules, yielding significant perplexity reductions on long-context datasets. Notably, in Needle in a Haystack evaluations, FwPKM generalizes to 128K-token contexts despite being trained on only 4K-token sequences.', 'score': 1, 'issue_id': 405, 'pub_date': '2026-01-02', 'pub_date_card': {'ru': '2 января', 'en': 'January 2', 'zh': '1月2日'}, 'hash': '072aff4bbbc7f7a5', 'authors': ['Tianyu Zhao', 'Llion Jones'], 'affiliations': ['Sakana AI'], 'pdf_title_img': 'assets/pdf/title_img/2601.00671.jpg', 'data': {'categories': ['#optimization', '#training', '#architecture', '#long_context'], 'emoji': '📚', 'ru': {'title': 'Динамическая эпизодическая память для эффективного моделирования длинных последовательностей', 'desc': 'В работе предлагается архитектура FwPKM, которая трансформирует статический модуль Product Key Memory в динамическую эпизодическую память с быстрыми весами. Система обновляет свои параметры во время тренировки и инференса через локальный градиентный спуск на уровне блоков, что позволяет быстро запоминать и извлекать новые пары ключ-значение из входных последовательностей. Модель эффективно разрешает классический компромисс между ёмкостью памяти и вычислительной эффективностью в сравнении с квадратичным Softmax-вниманием и линейными вариантами. Экспериментальные результаты показывают значительное улучшение на задачах с длинным контекстом, включая обобщение до 128K токенов при обучении только на 4K-токенных последовательностях.'}, 'en': {'title': 'Dynamic Memory for Efficient Sequence Modeling', 'desc': 'FwPKM introduces a new memory mechanism for sequence modeling that enhances both storage and efficiency. It transforms the traditional static Product Key Memory into a dynamic, fast-weight episodic memory that can adapt during training and inference. This allows the model to quickly memorize and retrieve information from long input sequences, addressing the limitations of existing attention mechanisms. Experiments show that FwPKM significantly improves performance on long-context tasks, demonstrating its ability to handle large amounts of data effectively.'}, 'zh': {'title': '动态快速权重记忆，提升序列建模效率', 'desc': 'FwPKM提出了一种动态的快速权重情节记忆机制，用于序列建模，平衡了存储容量和效率。在现代语言模型中，序列建模层通常面临存储容量与计算效率之间的权衡。FwPKM通过将稀疏的产品键记忆（PKM）从静态模块转变为动态的“快速权重”情节记忆，解决了这一矛盾。实验表明，FwPKM作为一种有效的情节记忆，显著降低了长上下文数据集的困惑度。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.00575', 'title': 'InfoSynth: Information-Guided Benchmark Synthesis for LLMs', 'url': 'https://huggingface.co/papers/2601.00575', 'abstract': 'InfoSynth generates novel, diverse coding benchmarks for large language models using information-theoretic metrics and genetic algorithms, enabling scalable and self-verifying evaluation.  \t\t\t\t\tAI-generated summary \t\t\t\t Large language models (LLMs) have demonstrated significant advancements in reasoning and code generation. However, efficiently creating new benchmarks to evaluate these capabilities remains a challenge. Traditional benchmark creation relies on manual human effort, a process that is both expensive and time-consuming. Furthermore, existing benchmarks often contaminate LLM training data, necessitating novel and diverse benchmarks to accurately assess their genuine capabilities. This work introduces InfoSynth, a novel framework for automatically generating and evaluating reasoning benchmarks guided by information-theoretic principles. We propose metrics based on KL-divergence and entropy to quantify benchmark novelty and diversity without relying on costly model evaluations. Building on this framework, we develop an end-to-end pipeline that synthesizes robust Python coding problems from seed datasets using genetic algorithms and iterative code feedback. Our method generates accurate test cases and solutions to new problems 97% of the time, and the synthesized benchmarks consistently exhibit higher novelty and diversity compared to their seed datasets. Moreover, our algorithm provides a method for controlling the novelty/diversity and difficulty of generated problems. InfoSynth offers a scalable, self-verifying pipeline for constructing high-quality, novel and diverse benchmarks for LLMs. Project Page: https://ishirgarg.github.io/infosynth_web/', 'score': 1, 'issue_id': 408, 'pub_date': '2026-01-02', 'pub_date_card': {'ru': '2 января', 'en': 'January 2', 'zh': '1月2日'}, 'hash': '2606b67e886459d6', 'authors': ['Ishir Garg', 'Neel Kolhe', 'Xuandong Zhao', 'Dawn Song'], 'affiliations': ['University of California, Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2601.00575.jpg', 'data': {'categories': ['#dataset', '#reasoning', '#open_source', '#synthetic', '#benchmark', '#plp'], 'emoji': '🧬', 'ru': {'title': 'Автоматическое создание разнообразных бенчмарков для LLM через информационную теорию', 'desc': 'InfoSynth — это фреймворк для автоматического создания новых бенчмарков для оценки способностей больших языковых моделей (LLM) в решении задач программирования. Метод использует информационно-теоретические метрики, основанные на KL-дивергенции и энтропии, для измерения оригинальности и разнообразия задач без дорогостоящих оценок моделей. Система применяет генетические алгоритмы и итеративную обратную связь по коду для синтеза новых задач на Python из начальных датасетов, создавая корректные тестовые примеры и решения с точностью 97%. Предложенный подход обеспечивает масштабируемое и самопроверяемое создание высококачественных бенчмарков, позволяя контролировать сложность и разнообразие генерируемых задач.'}, 'en': {'title': 'Automating Diverse Benchmark Creation for LLMs with InfoSynth', 'desc': 'InfoSynth is a framework designed to automatically create diverse and novel coding benchmarks for large language models (LLMs) using information-theoretic metrics and genetic algorithms. It addresses the challenges of traditional benchmark creation, which is often labor-intensive and can lead to contamination of training data. By employing metrics like KL-divergence and entropy, InfoSynth quantifies the novelty and diversity of generated benchmarks without the need for expensive model evaluations. The system can generate accurate coding problems with a high success rate and allows for control over the difficulty and diversity of the benchmarks, making it a scalable solution for evaluating LLM capabilities.'}, 'zh': {'title': 'InfoSynth：自动生成多样化编程基准的创新框架', 'desc': 'InfoSynth 是一个新框架，利用信息论指标和遗传算法自动生成和评估推理基准。该方法通过 KL 散度和熵来量化基准的新颖性和多样性，避免了昂贵的模型评估。通过遗传算法和迭代代码反馈，InfoSynth 能够从种子数据集中合成出强健的 Python 编程问题，生成的测试用例和解决方案准确率高达 97%。此外，该算法还提供了控制生成问题的新颖性、多样性和难度的方法，确保基准的高质量和多样性。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.00204', 'title': 'MorphAny3D: Unleashing the Power of Structured Latent in 3D Morphing', 'url': 'https://huggingface.co/papers/2601.00204', 'abstract': '3D morphing remains challenging due to the difficulty of generating semantically consistent and temporally smooth deformations, especially across categories. We present MorphAny3D, a training-free framework that leverages Structured Latent (SLAT) representations for high-quality 3D morphing. Our key insight is that intelligently blending source and target SLAT features within the attention mechanisms of 3D generators naturally produces plausible morphing sequences. To this end, we introduce Morphing Cross-Attention (MCA), which fuses source and target information for structural coherence, and Temporal-Fused Self-Attention (TFSA), which enhances temporal consistency by incorporating features from preceding frames. An orientation correction strategy further mitigates the pose ambiguity within the morphing steps. Extensive experiments show that our method generates state-of-the-art morphing sequences, even for challenging cross-category cases. MorphAny3D further supports advanced applications such as decoupled morphing and 3D style transfer, and can be generalized to other SLAT-based generative models. Project page: https://xiaokunsun.github.io/MorphAny3D.github.io/.', 'score': 1, 'issue_id': 407, 'pub_date': '2026-01-01', 'pub_date_card': {'ru': '1 января', 'en': 'January 1', 'zh': '1月1日'}, 'hash': 'a7f85192fb47366b', 'authors': ['Xiaokun Sun', 'Zeyu Cai', 'Hao Tang', 'Ying Tai', 'Jian Yang', 'Zhenyu Zhang'], 'affiliations': ['Nanjing University', 'Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2601.00204.jpg', 'data': {'categories': ['#3d', '#architecture'], 'emoji': '🔄', 'ru': {'title': 'Плавные 3D трансформации через умное смешивание признаков в сетях внимания', 'desc': 'Авторы представляют MorphAny3D, метод без обучения для создания плавных 3D морфирований между объектами, включая модели из разных категорий. Ключевая идея заключается в интеллектуальном смешивании представлений источника и целевого объекта внутри механизмов внимания генеративных моделей, используя структурированные скрытые представления (SLAT). Для повышения качества морфирования авторы введили два новых компонента: Morphing Cross-Attention для обеспечения структурной согласованности и Temporal-Fused Self-Attention для улучшения временной консистентности между кадрами. Метод демонстрирует передовые результаты даже для сложных случаев морфирования между разными категориями и поддерживает дополнительные приложения, такие как развязанное морфирование и 3D трансфер стиля.'}, 'en': {'title': 'Seamless 3D Morphing with MorphAny3D', 'desc': 'MorphAny3D is a novel framework designed to improve 3D morphing by ensuring that the deformations are both semantically consistent and temporally smooth. It utilizes Structured Latent (SLAT) representations to blend features from source and target objects effectively within attention mechanisms of 3D generators. The introduction of Morphing Cross-Attention (MCA) helps maintain structural coherence, while Temporal-Fused Self-Attention (TFSA) ensures that the morphing sequences are temporally consistent by referencing previous frames. This approach not only achieves state-of-the-art results in morphing across different categories but also opens up possibilities for advanced applications like decoupled morphing and 3D style transfer.'}, 'zh': {'title': 'MorphAny3D：高质量3D变形的新方法', 'desc': '3D变形一直是一个挑战，因为生成语义一致和时间平滑的变形非常困难，尤其是在不同类别之间。我们提出了MorphAny3D，这是一个无训练的框架，利用结构潜在（SLAT）表示来实现高质量的3D变形。我们的关键见解是，在3D生成器的注意力机制中智能地融合源和目标的SLAT特征，自然产生可信的变形序列。通过引入变形交叉注意力（MCA）和时间融合自注意力（TFSA），我们增强了结构一致性和时间一致性，实验结果表明我们的方法在变形序列生成上达到了最先进的水平。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.08521', 'title': 'Your Group-Relative Advantage Is Biased', 'url': 'https://huggingface.co/papers/2601.08521', 'abstract': 'Group-based reinforcement learning from verifier rewards suffers from biased advantage estimation that underestimates hard prompts and overestimates easy prompts, which is addressed through a history-aware adaptive difficulty weighting method.  \t\t\t\t\tAI-generated summary \t\t\t\t Reinforcement Learning from Verifier Rewards (RLVR) has emerged as a widely used approach for post-training large language models on reasoning tasks, with group-based methods such as GRPO and its variants gaining broad adoption. These methods rely on group-relative advantage estimation to avoid learned critics, yet its theoretical properties remain poorly understood.   In this work, we uncover a fundamental issue of group-based RL: the group-relative advantage estimator is inherently biased relative to the true (expected) advantage. We provide the first theoretical analysis showing that it systematically underestimates advantages for hard prompts and overestimates them for easy prompts, leading to imbalanced exploration and exploitation. To address this issue, we propose History-Aware Adaptive Difficulty Weighting (HA-DW), an adaptive reweighting scheme that adjusts advantage estimates based on an evolving difficulty anchor and training dynamics. Both theoretical analysis and experiments on five mathematical reasoning benchmarks demonstrate that HA-DW consistently improves performance when integrated into GRPO and its variants. Our results suggest that correcting biased advantage estimation is critical for robust and efficient RLVR training.', 'score': 95, 'issue_id': 552, 'pub_date': '2026-01-13', 'pub_date_card': {'ru': '13 января', 'en': 'January 13', 'zh': '1月13日'}, 'hash': 'caf215355050af49', 'github_url': '', 'github_stars': 0, 'authors': ['Fengkai Yang', 'Zherui Chen', 'Xiaohan Wang', 'Xiaodong Lu', 'Jiajun Chai', 'Guojun Yin', 'Wei Lin', 'Shuai Ma', 'Fuzhen Zhuang', 'Deqing Wang', 'Yaodong Yang', 'Jianxin Li', 'Yikun Ban'], 'affiliations': ['Beihang University', 'Meituan', 'Peking University', 'University of California, Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2601.08521.jpg', 'data': {'categories': ['#rl', '#optimization', '#reasoning', '#reinforcement_learning'], 'emoji': '⚙️', 'ru': {'title': 'Исправление смещений оценки преимуществ в обучении подкреплению с помощью верификаторов вознаграждений через адаптивное взвешивание сложности', 'desc': 'В данной работе рассматривается проблема смещенной оценки преимущества в методах группового подкрепления с использованием верификаторов вознаграждений. Показано, что такая оценка систематически недооценивает сложные задачи и переоценивает простые, что приводит к неэффективному процессу исследования и эксплуатации. Для решения этой проблемы предложен метод адаптивного взвешивания сложности на основе истории обучения (HA-DW), который корректирует смещения оценки преимуществ и улучшает общую эффективность обучения подкреплению.'}, 'en': {'title': 'History-Aware Adaptive Difficulty Weighting for Group-Based Reinforcement Learning', 'desc': 'This paper addresses the bias in advantage estimation in group-based reinforcement learning from verifier rewards by introducing History-Aware Adaptive Difficulty Weighting (HA-DW). The method adjusts advantage estimates dynamically using an evolving difficulty anchor and training dynamics, improving performance across various mathematical reasoning benchmarks.'}}}, {'id': 'https://huggingface.co/papers/2601.11496', 'title': 'The Poisoned Apple Effect: Strategic Manipulation of Mediated Markets via Technology Expansion of AI Agents', 'url': 'https://huggingface.co/papers/2601.11496', 'abstract': 'The integration of AI agents into economic markets fundamentally alters the landscape of strategic interaction. We investigate the economic implications of expanding the set of available technologies in three canonical game-theoretic settings: bargaining (resource division), negotiation (asymmetric information trade), and persuasion (strategic information transmission). We find that simply increasing the choice of AI delegates can drastically shift equilibrium payoffs and regulatory outcomes, often creating incentives for regulators to proactively develop and release technologies. Conversely, we identify a strategic phenomenon termed the "Poisoned Apple" effect: an agent may release a new technology, which neither they nor their opponent ultimately uses, solely to manipulate the regulator\'s choice of market design in their favor. This strategic release improves the releaser\'s welfare at the expense of their opponent and the regulator\'s fairness objectives. Our findings demonstrate that static regulatory frameworks are vulnerable to manipulation via technology expansion, necessitating dynamic market designs that adapt to the evolving landscape of AI capabilities.', 'score': 39, 'issue_id': 552, 'pub_date': '2026-01-16', 'pub_date_card': {'ru': '16 января', 'en': 'January 16', 'zh': '1月16日'}, 'hash': '111af399807fc2ee', 'github_url': '', 'github_stars': 0, 'authors': ['Eilam Shapira', 'Roi Reichart', 'Moshe Tennenholtz'], 'affiliations': ['Technion Israel Institute of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2601.11496.jpg', 'data': {'categories': ['#ethics', '#games'], 'emoji': '🤖', 'ru': {'title': 'Влияние ИИ-агентов на экономику и стратегическое взаимодействие', 'desc': 'В статье исследуется влияние внедрения искусственных интеллектуальных агентов в экономические рынки на стратегическое взаимодействие участников. Рассматриваются три классические игровые теоретические ситуации: ведение переговоров по разделению ресурсов, переговоры при асимметричной информации и передача стратегической информации. Установлено, что расширение набора доступных технологий существенно меняет равновесные выплаты и регулятивные результаты, создавая стимулы для регуляторов разрабатывать и выпускать новые технологии. Также обнаружен феномен «ядовитого яблока», когда агент выпускает новую технологию исключительно с целью манипуляции выбором регуляторной структуры рынка в свою пользу, ухудшая положение своего оппонента и регуляторных целей справедливости. Авторы подчеркивают необходимость динамических рыночных конструкций, способных адаптироваться к растущим возможностям искусственного интеллекта.'}, 'en': {'title': 'Article', 'desc': ''}}}, {'id': 'https://huggingface.co/papers/2601.10355', 'title': 'Unlocking Implicit Experience: Synthesizing Tool-Use Trajectories from Text', 'url': 'https://huggingface.co/papers/2601.10355', 'abstract': 'A text-based data synthesis approach generates multi-turn tool-use trajectories for large language models, achieving improved performance and reduced computational costs through a specialized trajectory synthesizer.  \t\t\t\t\tAI-generated summary \t\t\t\t Enabling Large Language Models (LLMs) to effectively utilize tools in multi-turn interactions is essential for building capable autonomous agents. However, acquiring diverse and realistic multi-turn tool-use data remains a significant challenge. In this work, we propose a novel text-based paradigm. We observe that textual corpora naturally contain rich, multi-step problem-solving experiences, which can serve as an untapped, scalable, and authentic data source for multi-turn tool-use tasks. Based on this insight, we introduce GEM, a data synthesis pipeline that enables the generation and extraction of multi-turn tool-use trajectories from text corpora through a four-stage process: relevance filtering, workflow & tool extraction, trajectory grounding, and complexity refinement. To reduce the computational cost, we further train a specialized Trajectory Synthesizer via supervised fine-tuning. This model distills the complex generation pipeline into an efficient, end-to-end trajectory generator. Experiments demonstrate that our GEM-32B achieve a 16.5% improvement on the BFCL V3 Multi-turn benchmark. Our models partially surpass the performance of models trained on τ - bench (Airline and Retail) in-domain data, highlighting the superior generalization capability derived from our text-based synthesis paradigm. Notably, our Trajectory Synthesizer matches the quality of the full pipeline while significantly reducing inference latency and costs.', 'score': 30, 'issue_id': 552, 'pub_date': '2026-01-15', 'pub_date_card': {'ru': '15 января', 'en': 'January 15', 'zh': '1月15日'}, 'hash': '561cb5995d29e4d4', 'github_url': '', 'github_stars': 0, 'authors': ['Zhihao Xu', 'Rumei Li', 'Jiahuan Li', 'Rongxiang Weng', 'Jingang Wang', 'Xunliang Cai', 'Xiting Wang'], 'affiliations': ['Meituan, China', 'Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2601.10355.jpg', 'data': {'categories': ['#agent_memory', '#memory', '#context_window', '#tool_use', '#multiturn', '#tools', '#dataset', '#training'], 'emoji': '📚', 'ru': {'title': 'Синтез многотurnовых траекторий инструмента для больших языковых моделей на основе текстовых данных', 'desc': 'В данной работе представлен подход на основе текстовых данных для синтеза многотurnовых траекторий использования инструментов для больших языковых моделей (LLM). Предложенная методология позволяет повысить эффективность и снизить вычислительные затраты за счет специализированного синтезатора траекторий. Посредством четырехэтапного процесса фильтрации релевантности, выделения рабочих процессов и инструментов, привязки траектории к реальным данным и уточнения сложности, достигается улучшение результатов на известных бенчмарках. В частности, модель GEM-32B демонстрирует увеличение производительности на 16.5%, а использование специального синтезатора траекторий обеспечивает сопоставимую по качеству генерацию при значительном сокращении времени обработки и затрат.'}, 'en': {'title': 'Text-Based Data Synthesis for Efficient Tool-Use Trajectories in LLM Multi-Turn Interactions', 'desc': 'This paper introduces GEM, a text-based data synthesis pipeline designed to generate multi-turn tool-use trajectories for large language models. It leverages textual corpora to extract and refine multi-step problem-solving experiences, enabling efficient and scalable training. A specialized Trajectory Synthesizer reduces computational costs by distilling the complex generation pipeline into an end-to-end model, resulting in improved performance and lower inference latency compared to traditional methods.'}}}, {'id': 'https://huggingface.co/papers/2601.08430', 'title': 'RubricHub: A Comprehensive and Highly Discriminative Rubric Dataset via Automated Coarse-to-Fine Generation', 'url': 'https://huggingface.co/papers/2601.08430', 'abstract': 'RLVR has advanced reasoning capabilities but struggles with open-ended generation due to lack of ground truth; this work proposes an automated rubric generation framework and dataset to improve performance in health reasoning benchmarks.  \t\t\t\t\tAI-generated summary \t\t\t\t Reinforcement Learning with Verifiable Rewards (RLVR) has driven substantial progress in reasoning-intensive domains like mathematics. However, optimizing open-ended generation remains challenging due to the lack of ground truth. While rubric-based evaluation offers a structured proxy for verification, existing methods suffer from scalability bottlenecks and coarse criteria, resulting in a supervision ceiling effect. To address this, we propose an automated Coarse-to-Fine Rubric Generation framework. By synergizing principle-guided synthesis, multi-model aggregation, and difficulty evolution, our approach produces comprehensive and highly discriminative criteria capable of capturing the subtle nuances. Based on this framework, we introduce RubricHub, a large-scale (sim110k) and multi-domain dataset. We validate its utility through a two-stage post-training pipeline comprising Rubric-based Rejection Sampling Fine-Tuning (RuFT) and Reinforcement Learning (RuRL). Experimental results demonstrate that RubricHub unlocks significant performance gains: our post-trained Qwen3-14B achieves state-of-the-art (SOTA) results on HealthBench (69.3), surpassing proprietary frontier models such as GPT-5. The code and data will be released soon.', 'score': 25, 'issue_id': 552, 'pub_date': '2026-01-13', 'pub_date_card': {'ru': '13 января', 'en': 'January 13', 'zh': '1月13日'}, 'hash': '9d3d0f8e4f3e3b69', 'github_url': 'https://github.com/teqkilla/RubricHub', 'github_stars': 24, 'authors': ['Sunzhu Li', 'Jiale Zhao', 'Miteto Wei', 'Huimin Ren', 'Yang Zhou', 'Jingwen Yang', 'Shunyu Liu', 'Kaike Zhang', 'Wei Chen'], 'affiliations': ['Li Auto Inc., China', 'Nanyang Technological University', 'The Chinese University of Hong Kong, Shenzhen, China', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2601.08430.jpg', 'data': {'categories': ['#healthcare', '#benchmark', '#transfer_learning', '#retrieval', '#reasoning', '#dataset'], 'emoji': '📚', 'ru': {'title': 'Автоматизация создания оценочных шкал для повышения эффективности систем искусственного интеллекта в медицинских задачах', 'desc': 'В данной работе рассматривается проблема отсутствия эталонных данных для оценки качества генерации в задачах с открытым концом у моделей машинного обучения на основе RLVR. Предлагается автоматизированная система создания рубрик и набор данных RubricHub для улучшения результатов в медицинских задачах. Используя подход координированной синтеза принципов, объединения нескольких моделей и эволюции сложности, разработанная методика позволяет создавать детализированные критерии оценки, которые значительно повышают качество решений.'}, 'en': {'title': 'Automated Rubric Generation Framework for Improved Open-Ended Reasoning', 'desc': 'This paper addresses the limitations of Reinforcement Learning with Verifiable Rewards (RLVR) in open-ended generation by proposing an automated rubric generation framework and dataset. It introduces a Coarse-to-Fine Rubric Generation method combining principle-guided synthesis, multi-model aggregation, and difficulty evolution. This framework is applied to create RubricHub, a large-scale dataset used for fine-tuning and reinforcement learning. The experimental results show significant improvements in performance on HealthBench, achieving state-of-the-art results.'}}}, {'id': 'https://huggingface.co/papers/2601.11000', 'title': 'When Personalization Misleads: Understanding and Mitigating Hallucinations in Personalized LLMs', 'url': 'https://huggingface.co/papers/2601.11000', 'abstract': "Personalized large language models can generate false information aligned with user history instead of factual truth, but a new method called FPPS helps maintain both factual accuracy and personalized responses while preserving existing personalization effects.  \t\t\t\t\tAI-generated summary \t\t\t\t Personalized large language models (LLMs) adapt model behavior to individual users to enhance user satisfaction, yet personalization can inadvertently distort factual reasoning. We show that when personalized LLMs face factual queries, there exists a phenomenon where the model generates answers aligned with a user's prior history rather than the objective truth, resulting in personalization-induced hallucinations that degrade factual reliability and may propagate incorrect beliefs, due to representational entanglement between personalization and factual representations. To address this issue, we propose Factuality-Preserving Personalized Steering (FPPS), a lightweight inference-time approach that mitigates personalization-induced factual distortions while preserving personalized behavior. We further introduce PFQABench, the first benchmark designed to jointly evaluate factual and personalized question answering under personalization. Experiments across multiple LLM backbones and personalization methods show that FPPS substantially improves factual accuracy while maintaining personalized performance.", 'score': 21, 'issue_id': 552, 'pub_date': '2026-01-16', 'pub_date_card': {'ru': '16 января', 'en': 'January 16', 'zh': '1月16日'}, 'hash': '891d8c6f80792efc', 'github_url': '', 'github_stars': 0, 'authors': ['Zhongxiang Sun', 'Yi Zhan', 'Chenglei Shen', 'Weijie Yu', 'Xiao Zhang', 'Ming He', 'Jun Xu'], 'affiliations': ['AI Lab at Lenovo Research', 'Gaolol School of Artificial Intelligence, Renmin University of China', 'School of Artificial Intelligence and Data Science, University of International Business and Economics'], 'pdf_title_img': 'assets/pdf/title_img/2601.11000.jpg', 'data': {'categories': ['#hallucinations', '#benchmark', '#personalization', '#inference', '#data'], 'emoji': '📚', 'ru': {'title': 'FPPS: Сохранение Фактической Точности при Персонализации Большими Языковыми Моделями', 'desc': 'Данная работа исследует проблему искажения фактов в персонализированных больших языковых моделях (LLM), которые адаптируются под индивидуальные предпочтения пользователей, что может приводить к генерации ложной информации, соответствующей истории пользователя, а не фактам. Предложенный метод FPPS позволяет сохранять как точность фактов, так и персональные настройки модели без значительных потерь эффективности. Для оценки разработанного подхода был создан новый набор данных PFQABench, объединяющий оценку точности фактов и персональных характеристик ответов.'}, 'en': {'title': 'Factuality-Preserving Personalized Steering for Large Language Models', 'desc': 'This paper addresses the challenge of maintaining factual accuracy in personalized large language models (LLMs). It introduces FPPS, a technique for factuality-preserving personalized steering that ensures factual correctness without compromising personalization effects. The study also presents PFQABench, a benchmark specifically designed to assess factual and personalized question answering. Experimental results demonstrate significant improvements in factual accuracy while retaining personalized performance.'}}}, {'id': 'https://huggingface.co/papers/2601.11404', 'title': 'ACoT-VLA: Action Chain-of-Thought for Vision-Language-Action Models', 'url': 'https://huggingface.co/papers/2601.11404', 'abstract': 'Vision-Language-Action models are enhanced by incorporating action-space reasoning through a structured sequence of coarse action intents, improving manipulation task performance in both simulation and real-world environments.  \t\t\t\t\tAI-generated summary \t\t\t\t Vision-Language-Action (VLA) models have emerged as essential generalist robot policies for diverse manipulation tasks, conventionally relying on directly translating multimodal inputs into actions via Vision-Language Model (VLM) embeddings. Recent advancements have introduced explicit intermediary reasoning, such as sub-task prediction (language) or goal image synthesis (vision), to guide action generation. However, these intermediate reasoning are often indirect and inherently limited in their capacity to convey the full, granular information required for precise action execution. Instead, we posit that the most effective form of reasoning is one that deliberates directly in the action space. We introduce Action Chain-of-Thought (ACoT), a paradigm where the reasoning process itself is formulated as a structured sequence of coarse action intents that guide the final policy. In this paper, we propose ACoT-VLA, a novel architecture that materializes the ACoT paradigm. Specifically, we introduce two complementary components: an Explicit Action Reasoner (EAR) and Implicit Action Reasoner (IAR). The former proposes coarse reference trajectories as explicit action-level reasoning steps, while the latter extracts latent action priors from internal representations of multimodal input, co-forming an ACoT that conditions the downstream action head to enable grounded policy learning. Extensive experiments in real-world and simulation environments demonstrate the superiority of our proposed method, which achieves 98.5%, 84.1%, and 47.4% on LIBERO, LIBERO-Plus and VLABench, respectively.', 'score': 18, 'issue_id': 552, 'pub_date': '2026-01-16', 'pub_date_card': {'ru': '16 января', 'en': 'January 16', 'zh': '1月16日'}, 'hash': 'feebd83e55594c09', 'github_url': '', 'github_stars': 0, 'authors': ['Linqing Zhong', 'Yi Liu', 'Yifei Wei', 'Ziyu Xiong', 'Maoqing Yao', 'Si Liu', 'Guanghui Ren'], 'affiliations': ['AgiBot', 'Beihang University'], 'pdf_title_img': 'assets/pdf/title_img/2601.11404.jpg', 'data': {'categories': ['#action', '#multimodal', '#reasoning', '#language', '#action_space_reasoning', '#vision'], 'emoji': '🤖', 'ru': {'title': 'Повышение эффективности моделей VLA за счет рассуждений в пространстве действий', 'desc': 'В данной работе предлагается улучшенная модель Vision-Language-Action (VLA), которая включает в себя рассуждения в пространстве действий через структурированную последовательность грубых намерений действий. Это позволяет повысить эффективность выполнения задач манипуляции как в симуляционных, так и в реальных средах. Введены два компонента: Явный Разум Действия (Explicit Action Reasoner — EAR) для формулирования явных шагов действий и Неявный Разум Действия (Implicit Action Reasoner — IAR) для извлечения скрытых предварительных условий действия из мультимодальных входов. Эксперименты показывают значительное улучшение по сравнению с предыдущими методами.'}, 'en': {'title': '', 'desc': ''}}}, {'id': 'https://huggingface.co/papers/2601.11037', 'title': 'BAPO: Boundary-Aware Policy Optimization for Reliable Agentic Search', 'url': 'https://huggingface.co/papers/2601.11037', 'abstract': "Reinforcement learning framework for agentic search that improves reliability by teaching agents to recognize reasoning limits and respond appropriately when evidence is insufficient.  \t\t\t\t\tAI-generated summary \t\t\t\t RL-based agentic search enables LLMs to solve complex questions via dynamic planning and external search. While this approach significantly enhances accuracy with agent policies optimized via large-scale reinforcement learning, we identify a critical gap in reliability: these agents fail to recognize their reasoning boundaries and rarely admit ``I DON'T KNOW'' (IDK) even when evidence is insufficient or reasoning reaches its limit. The lack of reliability often leads to plausible but unreliable answers, introducing significant risks in many real-world scenarios. To this end, we propose Boundary-Aware Policy Optimization (BAPO), a novel RL framework designed to cultivate reliable boundary awareness without compromising accuracy. BAPO introduces two key components: (i) a group-based boundary-aware reward that encourages an IDK response only when the reasoning reaches its limit, and (ii) an adaptive reward modulator that strategically suspends this reward during early exploration, preventing the model from exploiting IDK as a shortcut. Extensive experiments on four benchmarks demonstrate that BAPO substantially enhances the overall reliability of agentic search.", 'score': 12, 'issue_id': 552, 'pub_date': '2026-01-16', 'pub_date_card': {'ru': '16 января', 'en': 'January 16', 'zh': '1月16日'}, 'hash': '872fa7ac4160c51e', 'github_url': 'https://github.com/Liushiyu-0709/BAPO-Reliable-Search', 'github_stars': 16, 'authors': ['Shiyu Liu', 'Yongjing Yin', 'Jianhao Yan', 'Yunbo Tang', 'Qinggang Zhang', 'Bei Li', 'Xin Chen', 'Jingang Wang', 'Xunliang Cai', 'Jinsong Su'], 'affiliations': ['Meituan Inc.', 'The Hong Kong Polytechnic University', 'Westlake University', 'Xiamen University'], 'pdf_title_img': 'assets/pdf/title_img/2601.11037.jpg', 'data': {'categories': ['#reliability', '#rl', '#reasoning', '#boundary_aware_policy_optimization', '#agi'], 'emoji': '🤔', 'ru': {'title': 'Повышение надежности агентских систем через осознание границ рассуждений', 'desc': 'В данной работе предложен подход на основе подкрепления для агентского поиска, который улучшает надежность за счет обучения агентов распознаванию границ своих рассуждений и адекватному реагированию при недостатке доказательств. Предложенная архитектура, названная Boundary-Aware Policy Optimization (BAPO), включает в себя механизм поощрений, стимулирующий использование ответа «Я НЕ ЗНАЮ» только тогда, когда рассуждения достигают предела своих возможностей, а также модулятор вознаграждения, предотвращающий злоупотребление этим ответом на ранних этапах исследования.'}, 'en': {'title': 'Improving Reliability in Agentic Search Through Boundary-Aware Policy Optimization', 'desc': 'A Reinforcement Learning framework called Boundary-Aware Policy Optimization (BAPO) is introduced to enhance the reliability of AI agents performing agentic search tasks. It teaches agents to recognize their reasoning limits and respond appropriately when evidence is insufficient, reducing the risk of providing unreliable answers. This framework includes a group-based boundary-aware reward mechanism and an adaptive reward modulator to prevent exploitation of the IDK response as a shortcut.'}}}, {'id': 'https://huggingface.co/papers/2601.10909', 'title': 'FrankenMotion: Part-level Human Motion Generation and Composition', 'url': 'https://huggingface.co/papers/2601.10909', 'abstract': 'A diffusion-based framework generates human motion from text prompts with fine-grained part-level control using a newly constructed dataset with atomic, temporally-aware annotations.  \t\t\t\t\tAI-generated summary \t\t\t\t Human motion generation from text prompts has made remarkable progress in recent years. However, existing methods primarily rely on either sequence-level or action-level descriptions due to the absence of fine-grained, part-level motion annotations. This limits their controllability over individual body parts. In this work, we construct a high-quality motion dataset with atomic, temporally-aware part-level text annotations, leveraging the reasoning capabilities of large language models (LLMs). Unlike prior datasets that either provide synchronized part captions with fixed time segments or rely solely on global sequence labels, our dataset captures asynchronous and semantically distinct part movements at fine temporal resolution. Based on this dataset, we introduce a diffusion-based part-aware motion generation framework, namely FrankenMotion, where each body part is guided by its own temporally-structured textual prompt. This is, to our knowledge, the first work to provide atomic, temporally-aware part-level motion annotations and have a model that allows motion generation with both spatial (body part) and temporal (atomic action) control. Experiments demonstrate that FrankenMotion outperforms all previous baseline models adapted and retrained for our setting, and our model can compose motions unseen during training. Our code and dataset will be publicly available upon publication.', 'score': 10, 'issue_id': 552, 'pub_date': '2026-01-15', 'pub_date_card': {'ru': '15 января', 'en': 'January 15', 'zh': '1月15日'}, 'hash': 'a6f74fdfe5df1e23', 'github_url': 'https://github.com/Coral79/FrankenMotion-Code', 'github_stars': 29, 'authors': ['Chuqiao Li', 'Xianghui Xie', 'Yong Cao', 'Andreas Geiger', 'Gerard Pons-Moll'], 'affiliations': ['Max Planck Institute for Informatics, Saarland Informatics Campus, Germany', 'Tubingen AI Center, University of Tubingen, Germany'], 'pdf_title_img': 'assets/pdf/title_img/2601.10909.jpg', 'data': {'categories': ['#data', '#dataset'], 'emoji': '👩\u200d🦶', 'ru': {'title': 'Франкенменеджмент движений: контроль тела и времени', 'desc': 'В данной работе предложен диффузионный фреймворк для генерации движений человека на основе текстовых подсказок с высокой степенью детализации и контролем отдельных частей тела. Для этого был создан новый высококачественный набор данных с атомными и временно-зависимыми аннотациями частей тела. На основе данного набора данных разработана модель Франкенномotion, позволяющая управлять движениями как в пространстве, так и во времени, что ранее не реализовывалось в полной мере. Эксперименты показали значительное превосходство новой модели над предыдущими базовыми моделями.'}, 'en': {'title': '', 'desc': ''}}}, {'id': 'https://huggingface.co/papers/2601.09001', 'title': 'Entropy Sentinel: Continuous LLM Accuracy Monitoring from Decoding Entropy Traces in STEM', 'url': 'https://huggingface.co/papers/2601.09001', 'abstract': 'Output-entropy profiles computed from final-layer next-token probabilities serve as a scalable signal for monitoring LLM performance and prioritizing data acquisition under domain shifts.  \t\t\t\t\tAI-generated summary \t\t\t\t Deploying LLMs raises two coupled challenges: (1) monitoring - estimating where a model underperforms as traffic and domains drift - and (2) improvement - prioritizing data acquisition to close the largest performance gaps. We test whether an inference-time signal can estimate slice-level accuracy under domain shift. For each response, we compute an output-entropy profile from final-layer next-token probabilities (from top-k logprobs) and summarize it with eleven statistics. A lightweight classifier predicts instance correctness, and averaging predicted probabilities yields a domain-level accuracy estimate. We evaluate on ten STEM reasoning benchmarks with exhaustive train/test compositions (k in {1,2,3,4}; all "10 choose k" combinations), across nine LLMs from six families (3B-20B). Estimates often track held-out benchmark accuracy, and several models show near-monotonic ordering of domains. Output-entropy profiles are thus an accessible signal for scalable monitoring and for targeting data acquisition.', 'score': 10, 'issue_id': 552, 'pub_date': '2026-01-13', 'pub_date_card': {'ru': '13 января', 'en': 'January 13', 'zh': '1月13日'}, 'hash': 'fa2ecacb83da9b5f', 'github_url': '', 'github_stars': 0, 'authors': ['Pedro Memoli Buffa', 'Luciano Del Corro'], 'affiliations': ['Departamento de Matematica, FCEyN Universidad de Buenos Aires', 'ELIAS Lab, Departamento de Ingenierá Universidad de San Andres'], 'pdf_title_img': 'assets/pdf/title_img/2601.09001.jpg', 'data': {'categories': ['#training', '#interpretability', '#optimization', '#inference'], 'emoji': '📊', 'ru': {'title': 'Мониторинг и улучшение языковых моделей с помощью профилей энтропии вывода', 'desc': 'В данной работе исследуется использование профилей энтропии вывода на основе вероятностей следующего токена для мониторинга производительности языковых моделей и приоритизации сбора данных при изменении доменов. Показано, что эти профили могут служить надежным сигналом для оценки точности модели в различных условиях и помогают эффективно направлять процесс улучшения качества работы моделей.'}, 'en': {'title': '', 'desc': ''}}}, {'id': 'https://huggingface.co/papers/2601.09195', 'title': 'ProFit: Leveraging High-Value Signals in SFT via Probability-Guided Token Selection', 'url': 'https://huggingface.co/papers/2601.09195', 'abstract': 'Supervised fine-tuning with multiple references addresses overfitting to non-core expressions by masking low-probability tokens based on their semantic importance.  \t\t\t\t\tAI-generated summary \t\t\t\t Supervised fine-tuning (SFT) is a fundamental post-training strategy to align Large Language Models (LLMs) with human intent. However, traditional SFT often ignores the one-to-many nature of language by forcing alignment with a single reference answer, leading to the model overfitting to non-core expressions. Although our empirical analysis suggests that introducing multiple reference answers can mitigate this issue, the prohibitive data and computational costs necessitate a strategic shift: prioritizing the mitigation of single-reference overfitting over the costly pursuit of answer diversity. To achieve this, we reveal the intrinsic connection between token probability and semantic importance: high-probability tokens carry the core logical framework, while low-probability tokens are mostly replaceable expressions. Based on this insight, we propose ProFit, which selectively masks low-probability tokens to prevent surface-level overfitting. Extensive experiments confirm that ProFit consistently outperforms traditional SFT baselines on general reasoning and mathematical benchmarks.', 'score': 9, 'issue_id': 552, 'pub_date': '2026-01-14', 'pub_date_card': {'ru': '14 января', 'en': 'January 14', 'zh': '1月14日'}, 'hash': '687e04f44bf56850', 'github_url': 'https://github.com/Utaotao/ProFit', 'github_stars': 18, 'authors': ['Tao Liu', 'Taiqiang Wu', 'Runming Yang', 'Shaoning Sun', 'Junjie Wang', 'Yujiu Yang'], 'affiliations': ['The University of Hong Kong', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2601.09195.jpg', 'data': {'categories': ['#training', '#optimization', '#reasoning'], 'emoji': '📚', 'ru': {'title': 'Контролируемое дообучение с несколькими ссылками для предотвращения поверхностной переобученности', 'desc': 'Данная работа исследует проблему избыточной подгонки моделей машинного обучения к второстепенным выражениям при традиционном контролируемом дообучении (SFT). Предложенный метод ProFit решает эту задачу путем маскировки низко вероятностных токенов на основе их семантической значимости, что позволяет модели лучше сохранять ключевые логические структуры и улучшать ее общую производительность.'}, 'en': {'title': 'Article', 'desc': ''}}}, {'id': 'https://huggingface.co/papers/2601.10781', 'title': 'Future Optical Flow Prediction Improves Robot Control & Video Generation', 'url': 'https://huggingface.co/papers/2601.10781', 'abstract': 'A novel language-conditioned optical flow forecasting model combines Vision-Language Model and Diffusion architecture to predict future motion from noisy web-scale video data, demonstrating versatility in robotic manipulation and video generation tasks.  \t\t\t\t\tAI-generated summary \t\t\t\t Future motion representations, such as optical flow, offer immense value for control and generative tasks. However, forecasting generalizable spatially dense motion representations remains a key challenge, and learning such forecasting from noisy, real-world data remains relatively unexplored. We introduce FOFPred, a novel language-conditioned optical flow forecasting model featuring a unified Vision-Language Model (VLM) and Diffusion architecture. This unique combination enables strong multimodal reasoning with pixel-level generative fidelity for future motion prediction. Our model is trained on web-scale human activity data-a highly scalable but unstructured source. To extract meaningful signals from this noisy video-caption data, we employ crucial data preprocessing techniques and our unified architecture with strong image pretraining. The resulting trained model is then extended to tackle two distinct downstream tasks in control and generation. Evaluations across robotic manipulation and video generation under language-driven settings establish the cross-domain versatility of FOFPred, confirming the value of a unified VLM-Diffusion architecture and scalable learning from diverse web data for future optical flow prediction.', 'score': 8, 'issue_id': 559, 'pub_date': '2026-01-15', 'pub_date_card': {'ru': '15 января', 'en': 'January 15', 'zh': '1月15日'}, 'hash': '100f67342322af94', 'github_url': 'https://github.com/SalesforceAIResearch/FOFPred', 'github_stars': 2, 'authors': ['Kanchana Ranasinghe', 'Honglu Zhou', 'Yu Fang', 'Luyu Yang', 'Le Xue', 'Ran Xu', 'Caiming Xiong', 'Silvio Savarese', 'Michael S Ryoo', 'Juan Carlos Niebles'], 'affiliations': ['Salesforce AI Research', 'Stony Brook University'], 'pdf_title_img': 'assets/pdf/title_img/2601.10781.jpg', 'data': {'categories': ['#optical_flow_forecasting', '#vision_language_model', '#diffusion', '#robotics', '#multimodal'], 'emoji': '📈', 'ru': {'title': 'Прогнозирование оптического потока с помощью объединенной Vision-Language Model и Diffusion', 'desc': 'В данной работе представлена модель FOFPred для прогнозирования оптического потока на основе объединения Vision-Language Model и архитектуры диффузии. Модель обучена на больших объемах разнородных видеоданных из интернета с целью предсказания будущих движений объектов в видео. Использование унифицированной архитектуры позволяет добиться высокой точности и генерации детальных изображений движения на пиксельном уровне. Результаты показывают эффективность модели в задачах робототехники и создания видео.'}, 'en': {'title': 'Unified Vision-Language Model and Diffusion Architecture for Optical Flow Forecasting', 'desc': 'FOFPred is a novel language-conditioned optical flow forecasting model combining a Vision-Language Model and a Diffusion architecture. It predicts future motion from noisy web-scale video data, showcasing its utility in robotic manipulation and video generation tasks. By leveraging a unified Vision-Language Model and Diffusion architecture, it achieves strong multimodal reasoning and high pixel-level generative fidelity. Trained on large-scale human activity data, it demonstrates versatile applications across control and generation tasks.'}}}, {'id': 'https://huggingface.co/papers/2601.11514', 'title': 'ShapeR: Robust Conditional 3D Shape Generation from Casual Captures', 'url': 'https://huggingface.co/papers/2601.11514', 'abstract': 'ShapeR generates high-fidelity 3D shapes from casual image sequences using visual-inertial SLAM, 3D detection, and vision-language models with rectified flow transformer conditioning.  \t\t\t\t\tAI-generated summary \t\t\t\t Recent advances in 3D shape generation have achieved impressive results, but most existing methods rely on clean, unoccluded, and well-segmented inputs. Such conditions are rarely met in real-world scenarios. We present ShapeR, a novel approach for conditional 3D object shape generation from casually captured sequences. Given an image sequence, we leverage off-the-shelf visual-inertial SLAM, 3D detection algorithms, and vision-language models to extract, for each object, a set of sparse SLAM points, posed multi-view images, and machine-generated captions. A rectified flow transformer trained to effectively condition on these modalities then generates high-fidelity metric 3D shapes. To ensure robustness to the challenges of casually captured data, we employ a range of techniques including on-the-fly compositional augmentations, a curriculum training scheme spanning object- and scene-level datasets, and strategies to handle background clutter. Additionally, we introduce a new evaluation benchmark comprising 178 in-the-wild objects across 7 real-world scenes with geometry annotations. Experiments show that ShapeR significantly outperforms existing approaches in this challenging setting, achieving an improvement of 2.7x in Chamfer distance compared to state of the art.', 'score': 7, 'issue_id': 552, 'pub_date': '2026-01-16', 'pub_date_card': {'ru': '16 января', 'en': 'January 16', 'zh': '1月16日'}, 'hash': 'e76e2e46a2ba726d', 'github_url': 'https://github.com/facebookresearch/ShapeR', 'github_stars': 115, 'authors': ['Yawar Siddiqui', 'Duncan Frost', 'Samir Aroudj', 'Armen Avetisyan', 'Henry Howard-Jenkins', 'Daniel DeTone', 'Pierre Moulon', 'Qirui Wu', 'Zhengqin Li', 'Julian Straub', 'Richard Newcombe', 'Jakob Engel'], 'affiliations': ['Meta Reality Labs Research', 'Simon Fraser University'], 'pdf_title_img': 'assets/pdf/title_img/2601.11514.jpg', 'data': {'categories': ['#3d'], 'emoji': '📦', 'ru': {'title': 'ShapeR: Генерация высокоточных 3D форм на основе неформальных последовательностей изображений', 'desc': 'ShapeR — это метод генерации 3D-моделей объектов высокой точности из обычных видеоизображений с использованием визуально-инерциального SLAM, детекции 3D-объектов и моделей зрения и языка с условием трансформера потока, исправленного для дополнительных данных. Метод включает техники усиления данных в реальном времени, поэтапную схему обучения и стратегии борьбы с фоном, что позволяет значительно улучшить результаты по сравнению с существующими подходами.'}, 'en': {'title': 'High-Fidelity 3D Shape Generation from Casual Image Sequences Using Multimodal Conditioning', 'desc': 'ShapeR uses visual-inertial SLAM, 3D detection, and vision-language models with a rectified flow transformer to generate high-fidelity 3D shapes from casual image sequences. It employs on-the-fly augmentations, curriculum training, and handling of background clutter to improve performance. The method achieves significant improvements over previous approaches in real-world settings.'}}}, {'id': 'https://huggingface.co/papers/2601.10825', 'title': 'Reasoning Models Generate Societies of Thought', 'url': 'https://huggingface.co/papers/2601.10825', 'abstract': 'Reasoning models demonstrate enhanced performance through multi-agent-like interactions that create diverse cognitive perspectives and improve problem-solving through structured social organization.  \t\t\t\t\tAI-generated summary \t\t\t\t Large language models have achieved remarkable capabilities across domains, yet mechanisms underlying sophisticated reasoning remain elusive. Recent reasoning models outperform comparable instruction-tuned models on complex cognitive tasks, attributed to extended computation through longer chains of thought. Here we show that enhanced reasoning emerges not from extended computation alone, but from simulating multi-agent-like interactions -- a society of thought -- which enables diversification and debate among internal cognitive perspectives characterized by distinct personality traits and domain expertise. Through quantitative analysis and mechanistic interpretability methods applied to reasoning traces, we find that reasoning models like DeepSeek-R1 and QwQ-32B exhibit much greater perspective diversity than instruction-tuned models, activating broader conflict between heterogeneous personality- and expertise-related features during reasoning. This multi-agent structure manifests in conversational behaviors, including question-answering, perspective shifts, and the reconciliation of conflicting views, and in socio-emotional roles that characterize sharp back-and-forth conversations, together accounting for the accuracy advantage in reasoning tasks. Controlled reinforcement learning experiments reveal that base models increase conversational behaviors when rewarded solely for reasoning accuracy, and fine-tuning models with conversational scaffolding accelerates reasoning improvement over base models. These findings indicate that the social organization of thought enables effective exploration of solution spaces. We suggest that reasoning models establish a computational parallel to collective intelligence in human groups, where diversity enables superior problem-solving when systematically structured, which suggests new opportunities for agent organization to harness the wisdom of crowds.', 'score': 5, 'issue_id': 552, 'pub_date': '2026-01-15', 'pub_date_card': {'ru': '15 января', 'en': 'January 15', 'zh': '1月15日'}, 'hash': '7dcd7d60c59e0050', 'github_url': '', 'github_stars': 0, 'authors': ['Junsol Kim', 'Shiyang Lai', 'Nino Scherrer', 'Blaise Agüera y Arcas', 'James Evans'], 'affiliations': ['Google', 'Paradigms of Intelligence Team', 'Santa Fe Institute', 'University of Chicago'], 'pdf_title_img': 'assets/pdf/title_img/2601.10825.jpg', 'data': {'categories': ['#reasoning', '#agents', '#social_interaction', '#interpretability', '#cognitive_modeling'], 'emoji': '🤖', 'ru': {'title': 'Социальная организация мышления как ключ к эффективной обработке информации', 'desc': 'В данной работе показано, что модели машинного обучения демонстрируют улучшенные результаты благодаря взаимодействию в стиле мультиагентных систем, создающих разнообразные когнитивные перспективы и улучшающих решение задач за счет структурированной социальной организации. Исследование выявило, что высокая эффективность моделей обусловлена не только увеличением длины цепочек рассуждений, но и имитацией взаимодействия множества внутренних когнитивных представлений с различными личностными чертами и областями знаний. Это приводит к более широкому обсуждению и разрешению конфликтов мнений внутри модели, что способствует повышению точности выполнения сложных интеллектуальных задач.'}, 'en': {'title': 'Computational Collective Intelligence in Reasoning Models', 'desc': 'This paper explores how reasoning models enhance their performance through multi-agent-like interactions, creating diverse cognitive perspectives and improving problem-solving via structured social organization. It highlights that these models achieve better reasoning outcomes not just due to extended computation, but also because they simulate a society of thought, enabling diverse perspectives and debates. Quantitative analysis reveals that reasoning models like DeepSeek-R1 and QwQ-32B exhibit higher perspective diversity compared to instruction-tuned models, leading to improved reasoning accuracy. The study suggests that such social organization mimics collective intelligence in humans, offering new insights into leveraging the wisdom of crowds.'}}}, {'id': 'https://huggingface.co/papers/2601.11087', 'title': 'PhysRVG: Physics-Aware Unified Reinforcement Learning for Video Generative Models', 'url': 'https://huggingface.co/papers/2601.11087', 'abstract': "A physics-aware reinforcement learning paradigm is introduced for video generation that enforces physical collision rules directly in high-dimensional spaces, ensuring strict application of physics knowledge rather than treating it as conditional constraints.  \t\t\t\t\tAI-generated summary \t\t\t\t Physical principles are fundamental to realistic visual simulation, but remain a significant oversight in transformer-based video generation. This gap highlights a critical limitation in rendering rigid body motion, a core tenet of classical mechanics. While computer graphics and physics-based simulators can easily model such collisions using Newton formulas, modern pretrain-finetune paradigms discard the concept of object rigidity during pixel-level global denoising. Even perfectly correct mathematical constraints are treated as suboptimal solutions (i.e., conditions) during model optimization in post-training, fundamentally limiting the physical realism of generated videos. Motivated by these considerations, we introduce, for the first time, a physics-aware reinforcement learning paradigm for video generation models that enforces physical collision rules directly in high-dimensional spaces, ensuring the physics knowledge is strictly applied rather than treated as conditions. Subsequently, we extend this paradigm to a unified framework, termed Mimicry-Discovery Cycle (MDcycle), which allows substantial fine-tuning while fully preserving the model's ability to leverage physics-grounded feedback. To validate our approach, we construct new benchmark PhysRVGBench and perform extensive qualitative and quantitative experiments to thoroughly assess its effectiveness.", 'score': 4, 'issue_id': 552, 'pub_date': '2026-01-16', 'pub_date_card': {'ru': '16 января', 'en': 'January 16', 'zh': '1月16日'}, 'hash': '7de1634e59778ee2', 'github_url': '', 'github_stars': 0, 'authors': ['Qiyuan Zhang', 'Biao Gong', 'Shuai Tan', 'Zheng Zhang', 'Yujun Shen', 'Xing Zhu', 'Yuyuan Li', 'Kelu Yao', 'Chunhua Shen', 'Changqing Zou'], 'affiliations': ['Ant Group', 'Zhejiang Lab', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2601.11087.jpg', 'data': {'categories': ['#rl', '#video_generation', '#physics'], 'emoji': '🔄', 'ru': {'title': 'Физически осведомленное обучение с подкреплением для реалистичной генерации видео', 'desc': 'В статье представлена новая парадигма машинного обучения с подкреплением, ориентированная на физику, для генерации видео, которая напрямую применяет правила физических столкновений в многомерном пространстве. Это позволяет строго соблюдать физические знания вместо того, чтобы рассматривать их как условные ограничения. Предложенная архитектура включает в себя цикл подражания-обнаружения (MDcycle), который обеспечивает глубокое обучение моделей с сохранением способности использовать обратную связь, основанную на физической основе. Для проверки эффективности предложенного подхода был создан новый эталонный набор данных PhysRVGBench и проведены подробные качественные и количественные эксперименты.'}, 'en': {'title': '', 'desc': ''}}}, {'id': 'https://huggingface.co/papers/2601.09636', 'title': 'PersonalAlign: Hierarchical Implicit Intent Alignment for Personalized GUI Agent with Long-Term User-Centric Records', 'url': 'https://huggingface.co/papers/2601.09636', 'abstract': "PersonalAlign framework addresses GUI agent alignment with implicit user intents through hierarchical memory organization and long-term record reasoning, improving both execution and proactive performance.  \t\t\t\t\tAI-generated summary \t\t\t\t While GUI agents have shown strong performance under explicit and completion instructions, real-world deployment requires aligning with users' more complex implicit intents. In this work, we highlight Hierarchical Implicit Intent Alignment for Personalized GUI Agent (PersonalAlign), a new agent task that requires agents to leverage long-term user records as persistent context to resolve omitted preferences in vague instructions and anticipate latent routines by user state for proactive assistance. To facilitate this study, we introduce AndroidIntent, a benchmark designed to evaluate agents' ability in resolving vague instructions and providing proactive suggestions through reasoning over long-term user records. We annotated 775 user-specific preferences and 215 routines from 20k long-term records across different users for evaluation. Furthermore, we introduce Hierarchical Intent Memory Agent (HIM-Agent), which maintains a continuously updating personal memory and hierarchically organizes user preferences and routines for personalization. Finally, we evaluate a range of GUI agents on AndroidIntent, including GPT-5, Qwen3-VL, and UI-TARS, further results show that HIM-Agent significantly improves both execution and proactive performance by 15.7% and 7.3%.", 'score': 4, 'issue_id': 552, 'pub_date': '2026-01-14', 'pub_date_card': {'ru': '14 января', 'en': 'January 14', 'zh': '1月14日'}, 'hash': 'c7c5d5c2262a2509', 'github_url': '', 'github_stars': 0, 'authors': ['Yibo Lyu', 'Gongwei Chen', 'Rui Shao', 'Weili Guan', 'Liqiang Nie'], 'affiliations': ['Harbin Institute of Technology, Shenzhen'], 'pdf_title_img': 'assets/pdf/title_img/2601.09636.jpg', 'data': {'categories': ['#agent_memory', '#hallucinations', '#retrieval', '#context_window', '#reasoning', '#session_memory', '#agi', '#agents'], 'emoji': '📱', 'ru': {'title': 'Личный баланс: выравнивание намерений пользователей через персональную память ИИ-агента', 'desc': 'Framework PersonalAlign решает задачу выравнивания интерфейса пользователя с неявными намерениями пользователей через иерархическую организацию памяти и долгосрочное рассуждение на основе записей, что улучшает как выполнение, так и проактивное поведение интеллектуальных агентов. В работе представлен новый подход к задаче PersonalAlign, использующий персонифицированную память для учета предпочтений и рутинных действий пользователей в течение длительного времени. Для оценки эффективности предложенного подхода был создан набор данных AndroidIntent, включающий аннотированные предпочтения и рутины пользователей. Результаты экспериментов показали значительное улучшение выполнения и проактивного поведения по сравнению с другими агентами, такими как GPT-5 и Qwen3-VL.'}, 'en': {'title': 'Hierarchical Implicit Intent Alignment for Personalized GUI Agents', 'desc': "The PersonalAlign framework focuses on aligning GUI agents with user's implicit intents using hierarchical memory organization and long-term record reasoning. It enhances both execution and proactive performance by leveraging persistent user contexts. The AndroidIntent benchmark evaluates agents' abilities to resolve vague instructions and provide proactive suggestions based on long-term user records. The Hierarchical Intent Memory Agent (HIM-Agent) maintains personalized memories and organizes user preferences and routines hierarchically for better personalization. Experimental results demonstrate significant improvements in execution and proactive performance compared to other agents."}}}, {'id': 'https://huggingface.co/papers/2601.11516', 'title': 'Building Production-Ready Probes For Gemini', 'url': 'https://huggingface.co/papers/2601.11516', 'abstract': "Activation probes for language model misuse mitigation face challenges with long-context generalization, requiring new architectures and diverse training for robust performance across production shifts.  \t\t\t\t\tAI-generated summary \t\t\t\t Frontier language model capabilities are improving rapidly. We thus need stronger mitigations against bad actors misusing increasingly powerful systems. Prior work has shown that activation probes may be a promising misuse mitigation technique, but we identify a key remaining challenge: probes fail to generalize under important production distribution shifts. In particular, we find that the shift from short-context to long-context inputs is difficult for existing probe architectures. We propose several new probe architecture that handle this long-context distribution shift.   We evaluate these probes in the cyber-offensive domain, testing their robustness against various production-relevant shifts, including multi-turn conversations, static jailbreaks, and adaptive red teaming. Our results demonstrate that while multimax addresses context length, a combination of architecture choice and training on diverse distributions is required for broad generalization. Additionally, we show that pairing probes with prompted classifiers achieves optimal accuracy at a low cost due to the computational efficiency of probes.   These findings have informed the successful deployment of misuse mitigation probes in user-facing instances of Gemini, Google's frontier language model. Finally, we find early positive results using AlphaEvolve to automate improvements in both probe architecture search and adaptive red teaming, showing that automating some AI safety research is already possible.", 'score': 3, 'issue_id': 552, 'pub_date': '2026-01-16', 'pub_date_card': {'ru': '16 января', 'en': 'January 16', 'zh': '1月16日'}, 'hash': '87ddd4cbadd8d1f3', 'github_url': '', 'github_stars': 0, 'authors': ['János Kramár', 'Joshua Engels', 'Zheng Wang', 'Bilal Chughtai', 'Rohin Shah', 'Neel Nanda', 'Arthur Conmy'], 'affiliations': ['Google DeepMind'], 'pdf_title_img': 'assets/pdf/title_img/2601.11516.jpg', 'data': {'categories': ['#agent_memory', '#context_window', '#security', '#long_context', '#prompting', '#data'], 'emoji': '🔮', 'ru': {'title': 'Улучшение защиты языковых моделей через активационные пробы', 'desc': 'В данной работе рассматриваются проблемы обобщения активационных пробелов в языковых моделях при переходе от коротких к длинным контекстам, что требует разработки новых архитектур и разнообразного обучения для обеспечения надежной работы моделей в производственных условиях. Авторы предлагают новые архитектуры пробелов, которые успешно справляются с длинными контекстами, а также демонстрируют их эффективность на практике через тестирование в области кибератак. Исследование подтверждает важность сочетания правильной архитектуры и широкого набора данных для достижения общей универсальности, дополнительно подчеркивая потенциал автоматического улучшения безопасности ИИ через инструменты вроде AlphaEvolve.'}, 'en': {'title': 'Mitigating Language Model Misuse via Robust Activation Probes', 'desc': 'This paper explores the challenges of long-context generalization in activation probes for language models used in misuse mitigation. It proposes new architectures and diverse training methods to enhance robustness across different production environments. The study evaluates these probes in cyber-offensive scenarios and finds that combining specific architectures with prompt-based classifiers yields optimal performance. This work informs the deployment of misuse mitigation techniques in advanced language models like Gemini.'}}}, {'id': 'https://huggingface.co/papers/2601.11044', 'title': 'AgencyBench: Benchmarking the Frontiers of Autonomous Agents in 1M-Token Real-World Contexts', 'url': 'https://huggingface.co/papers/2601.11044', 'abstract': 'AgencyBench presents a comprehensive benchmark for evaluating autonomous agents across real-world scenarios, enabling automated evaluation through user simulation and sandbox environments while revealing performance gaps between closed-source and open-source models.  \t\t\t\t\tAI-generated summary \t\t\t\t Large Language Models (LLMs) based autonomous agents demonstrate multifaceted capabilities to contribute substantially to economic production. However, existing benchmarks remain focused on single agentic capability, failing to capture long-horizon real-world scenarios. Moreover, the reliance on human-in-the-loop feedback for realistic tasks creates a scalability bottleneck, hindering automated rollout collection and evaluation. To bridge this gap, we introduce AgencyBench, a comprehensive benchmark derived from daily AI usage, evaluating 6 core agentic capabilities across 32 real-world scenarios, comprising 138 tasks with specific queries, deliverables, and rubrics. These scenarios require an average of 90 tool calls, 1 million tokens, and hours of execution time to resolve. To enable automated evaluation, we employ a user simulation agent to provide iterative feedback, and a Docker sandbox to conduct visual and functional rubric-based assessment. Experiments reveal that closed-source models significantly outperform open-source models (48.4% vs 32.1%). Further analysis reveals significant disparities across models in resource efficiency, feedback-driven self-correction, and specific tool-use preferences. Finally, we investigate the impact of agentic scaffolds, observing that proprietary models demonstrate superior performance within their native ecosystems (e.g., Claude-4.5-Opus via Claude-Agent-SDK), while open-source models exhibit distinct performance peaks, suggesting potential optimization for specific execution frameworks. AgencyBench serves as a critical testbed for next-generation agents, highlighting the necessity of co-optimizing model architecture with agentic frameworks. We believe this work sheds light on the future direction of autonomous agents, and we release the full benchmark and evaluation toolkit at https://github.com/GAIR-NLP/AgencyBench.', 'score': 2, 'issue_id': 559, 'pub_date': '2026-01-16', 'pub_date_card': {'ru': '16 января', 'en': 'January 16', 'zh': '1月16日'}, 'hash': '7fa13a458769b5b4', 'github_url': 'https://github.com/GAIR-NLP/AgencyBench', 'github_stars': 18, 'authors': ['Keyu Li', 'Junhao Shi', 'Yang Xiao', 'Mohan Jiang', 'Jie Sun', 'Yunze Wu', 'Shijie Xia', 'Xiaojie Cai', 'Tianze Xu', 'Weiye Si', 'Wenjie Li', 'Dequan Wang', 'Pengfei Liu'], 'affiliations': ['GAIR', 'PolyU', 'SII', 'SJTU'], 'pdf_title_img': 'assets/pdf/title_img/2601.11044.jpg', 'data': {'categories': ['#agents', '#agent_memory', '#agi', '#tool_use', '#benchmark'], 'emoji': '🚀', 'ru': {'title': 'AgencyBench: Комплексная платформа для оценки автономных агентов', 'desc': 'AgencyBench представляет собой комплексную платформу для оценки автономных агентов в реальных сценариях, позволяющую проводить автоматизированную оценку через симуляцию и песочницы, выявляя пробелы в производительности между проприетарными и открытыми моделями искусственного интеллекта. Платформа включает в себя 32 реальные сценарии с 138 задачами, требующими до 90 вызовов инструментов, миллиона токенов и часов на выполнение. Использование пользовательского агента-симуляции и контейнера Docker для визуальной и функциональной оценки позволяет выявить значительные различия в эффективности моделей, их способности к самостоятельной коррекции и предпочтениях использования инструментов. Исследование показало, что проприетарные модели значительно превосходят открытые по ряду параметров.'}, 'en': {'title': 'Evaluating Autonomous Agents Through Real-World Scenarios Using AgencyBench', 'desc': 'AgencyBench introduces a comprehensive benchmark for autonomous agents, evaluating them across diverse real-world scenarios using user simulations and sandbox environments. It highlights performance differences between closed-source and open-source models, emphasizing the need for optimized agentic frameworks. The benchmark includes 32 scenarios, 138 tasks, and requires extensive computational resources. Results show that proprietary models excel within their ecosystems, while open-source models have distinct strengths.'}}}, {'id': 'https://huggingface.co/papers/2601.07812', 'title': 'More Images, More Problems? A Controlled Analysis of VLM Failure Modes', 'url': 'https://huggingface.co/papers/2601.07812', 'abstract': 'Large Vision Language Models exhibit significant limitations in multi-image understanding and reasoning, which are revealed through a new benchmark and addressed via procedural data generation and attention masking techniques.  \t\t\t\t\tAI-generated summary \t\t\t\t Large Vision Language Models (LVLMs) have demonstrated remarkable capabilities, yet their proficiency in understanding and reasoning over multiple images remains largely unexplored. While existing benchmarks have initiated the evaluation of multi-image models, a comprehensive analysis of their core weaknesses and their causes is still lacking. In this work, we introduce MIMIC (Multi-Image Model Insights and Challenges), a new benchmark designed to rigorously evaluate the multi-image capabilities of LVLMs. Using MIMIC, we conduct a series of diagnostic experiments that reveal pervasive issues: LVLMs often fail to aggregate information across images and struggle to track or attend to multiple concepts simultaneously. To address these failures, we propose two novel complementary remedies. On the data side, we present a procedural data-generation strategy that composes single-image annotations into rich, targeted multi-image training examples. On the optimization side, we analyze layer-wise attention patterns and derive an attention-masking scheme tailored for multi-image inputs. Experiments substantially improved cross-image aggregation, while also enhancing performance on existing multi-image benchmarks, outperforming prior state of the art across tasks. Data and code will be made available at https://github.com/anurag-198/MIMIC.', 'score': 2, 'issue_id': 552, 'pub_date': '2026-01-12', 'pub_date_card': {'ru': '12 января', 'en': 'January 12', 'zh': '1月12日'}, 'hash': '1087868e6e3d0c16', 'github_url': 'https://github.com/anurag-198/MIMIC', 'github_stars': 0, 'authors': ['Anurag Das', 'Adrian Bulat', 'Alberto Baldrati', 'Ioannis Maniadis Metaxas', 'Bernt Schiele', 'Georgios Tzimiropoulos', 'Brais Martinez'], 'affiliations': ['MPI for Informatics, Saarland Informatics Campus', 'Queen Mary University of London, UK', 'Samsung AI, Cambridge', 'Technical University of Ias, i, Romania'], 'pdf_title_img': 'assets/pdf/title_img/2601.07812.jpg', 'data': {'categories': ['#reasoning', '#interpretability', '#data', '#benchmark'], 'emoji': '📊', 'ru': {'title': 'Выявление и преодоление ограничений мультиизобразительных способностей больших моделей зрения и языка', 'desc': 'В данной работе исследуются ограничения больших моделей взаимодействия зрения и языка (LVLM) при обработке нескольких изображений и проведении логического рассуждения. Для этого был создан новый бенчмарк под названием MIMIC, который выявляет основные проблемы таких моделей и предлагает два решения: процедурная генерация данных для создания сложных мульти-изображений и маскировка внимания на уровне слоев нейронной сети. Эксперименты показали значительное улучшение в объединении информации из разных изображений и повышении общей производител
