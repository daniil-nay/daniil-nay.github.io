    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            return `${number} ${unitWord} ${timeUnits[lang].ago}`;
        }

        if (!['ru', 'en'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {

        function toggleTheme() {

        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2601.02151', 'title': 'Entropy-Adaptive Fine-Tuning: Resolving Confident Conflicts to Mitigate Forgetting', 'url': 'https://huggingface.co/papers/2601.02151', 'abstract': 'Entropy-Adaptive Fine-Tuning addresses catastrophic forgetting in supervised fine-tuning by using token-level entropy to distinguish uncertainty from knowledge conflict, enabling better preservation of general capabilities.  \t\t\t\t\tAI-generated summary \t\t\t\t Supervised Fine-Tuning (SFT) is the standard paradigm for domain adaptation, yet it frequently incurs the cost of catastrophic forgetting. In sharp contrast, on-policy Reinforcement Learning (RL) effectively preserves general capabilities. We investigate this discrepancy and identify a fundamental distributional gap: while RL aligns with the model\'s internal belief, SFT forces the model to fit external supervision. This mismatch often manifests as "Confident Conflicts" tokens characterized by low probability but low entropy. In these instances, the model is highly confident in its own prediction but is forced to learn a divergent ground truth, triggering destructive gradient updates. To address this, we propose Entropy-Adaptive Fine-Tuning (EAFT). Unlike methods relying solely on prediction probability, EAFT utilizes token-level entropy as a gating mechanism to distinguish between epistemic uncertainty and knowledge conflict. This allows the model to learn from uncertain samples while suppressing gradients on conflicting data. Extensive experiments on Qwen and GLM series (ranging from 4B to 32B parameters) across mathematical, medical, and agentic domains confirm our hypothesis. EAFT consistently matches the downstream performance of standard SFT while significantly mitigating the degradation of general capabilities.', 'score': 63, 'issue_id': 471, 'pub_date': '2026-01-05', 'pub_date_card': {'ru': '5 января', 'en': 'January 5', 'zh': '1月5日'}, 'hash': '9d40d1471e675eaa', 'authors': ['Muxi Diao', 'Lele Yang', 'Wuxuan Gong', 'Yutong Zhang', 'Zhonghao Yan', 'Yufei Han', 'Kongming Liang', 'Weiran Xu', 'Zhanyu Ma'], 'affiliations': ['Beijing University of Posts and Telecommunications', 'Zhongguancun Academy'], 'pdf_title_img': 'assets/pdf/title_img/2601.02151.jpg', 'data': {'categories': [], 'emoji': '⚖️', 'ru': {'title': 'Адаптивное дообучение через анализ энтропии токенов', 'desc': 'Статья посвящена решению проблемы катастрофического забывания при дообучении языковых моделей. Авторы выявили, что во время обучения с учителем (SFT) модель часто получает противоречивые сигналы - когда она уверена в своём предсказании, но вынуждена обучаться другому ответу. Они предложили метод Entropy-Adaptive Fine-Tuning (EAFT), который использует энтропию на уровне токенов для различия между неуверенностью модели и конфликтом знаний. Экспериментально показано, что EAFT сохраняет общие способности модели при одновременном сохранении качества на специализированных задачах.'}, 'en': {'title': 'Preserving Knowledge with Entropy-Aware Fine-Tuning', 'desc': "Entropy-Adaptive Fine-Tuning (EAFT) is a method designed to combat catastrophic forgetting during supervised fine-tuning of machine learning models. It uses token-level entropy to differentiate between uncertainty in predictions and conflicts with external labels, allowing the model to retain its general capabilities. By focusing on uncertain samples and minimizing updates on conflicting data, EAFT helps maintain performance across various tasks. Experiments show that EAFT achieves comparable results to traditional fine-tuning while preserving the model's overall knowledge."}, 'zh': {'title': '熵自适应微调：解决灾难性遗忘的创新方法', 'desc': '本文提出了一种名为熵自适应微调（EAFT）的方法，旨在解决监督微调中的灾难性遗忘问题。EAFT通过使用令牌级熵来区分不确定性和知识冲突，从而更好地保留模型的通用能力。与传统的监督微调方法不同，EAFT能够在不确定样本中学习，同时抑制对冲突数据的梯度更新。实验结果表明，EAFT在多个领域的下游任务中表现出色，能够有效减轻通用能力的退化。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.03509', 'title': 'Evolving Programmatic Skill Networks', 'url': 'https://huggingface.co/papers/2601.03509', 'abstract': "Programmatic Skill Network enables continual skill acquisition through executable symbolic programs that evolve via reflection, progressive optimization, and structural refactoring mechanisms.  \t\t\t\t\tAI-generated summary \t\t\t\t We study continual skill acquisition in open-ended embodied environments where an agent must construct, refine, and reuse an expanding library of executable skills. We introduce the Programmatic Skill Network (PSN), a framework in which skills are executable symbolic programs forming a compositional network that evolves through experience. PSN defines three core mechanisms instantiated via large language models: (1)REFLECT for structured fault localization over skill compositions, (2) progressive optimization with maturity-aware update gating that stabilizes reliable skills while maintaining plasticity for uncertain ones, and (3) canonical structural refactoring under rollback validation that maintains network compactness. We further show that PSN's learning dynamics exhibit structural parallels to neural network training. Experiments on MineDojo and Crafter demonstrate robust skill reuse, rapid adaptation, and strong generalization across open-ended task distributions.\\footnote{We plan to open-source the code.", 'score': 52, 'issue_id': 481, 'pub_date': '2026-01-07', 'pub_date_card': {'ru': '7 января', 'en': 'January 7', 'zh': '1月7日'}, 'hash': '5bf0162d41201122', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': [], 'emoji': '🧬', 'ru': {'title': 'Эволюция навыков через символические программы и рефлексию', 'desc': 'В работе представлена Programmatic Skill Network (PSN) — фреймворк для непрерывного обучения агентов в открытых средах, где навыки представляются как исполняемые символические программы. Система использует большие языковые модели для реализации трёх ключевых механизмов: структурированной локализации ошибок, прогрессивной оптимизации с адаптивным обновлением, и рефакторинга сетевой структуры с валидацией откатов. PSN позволяет агентам строить, уточнять и переиспользовать растущую библиотеку навыков, демонстрируя динамику обучения, аналогичную тренировке нейронных сетей. Экспериментальная оценка на задачах MineDojo и Crafter показывает эффективность повторного использования навыков, быструю адаптацию и хорошую генерализацию.'}, 'en': {'title': 'Evolving Skills for Endless Learning', 'desc': 'The Programmatic Skill Network (PSN) is a framework designed for continual skill acquisition in dynamic environments. It allows agents to create and refine a library of executable skills through three main mechanisms: REFLECT for identifying issues in skill combinations, progressive optimization to balance skill reliability and adaptability, and structural refactoring to keep the skill network efficient. PSN utilizes large language models to enhance these processes, enabling agents to learn from their experiences effectively. Experiments show that PSN can adapt quickly and generalize well across various tasks, demonstrating its potential in open-ended learning scenarios.'}, 'zh': {'title': '程序技能网络：持续技能获取的新方法', 'desc': '程序技能网络（PSN）是一种框架，旨在通过可执行的符号程序实现持续的技能获取。它通过反思、渐进优化和结构重构机制，使技能库不断扩展和演化。PSN利用大型语言模型实现三种核心机制：结构化故障定位、成熟度感知的优化更新和在回滚验证下的结构重构。实验结果表明，PSN在开放式任务分布中展现出强大的技能重用、快速适应和良好的泛化能力。'}}, 'authors': [], 'affiliations': [], 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.03872', 'title': 'Atlas: Orchestrating Heterogeneous Models and Tools for Multi-Domain Complex Reasoning', 'url': 'https://huggingface.co/papers/2601.03872', 'abstract': 'ATLAS is a dual-path framework that dynamically selects optimal model-tool combinations for cross-domain reasoning through cluster-based routing and reinforcement learning-based multi-step routing, achieving superior performance on complex reasoning tasks.  \t\t\t\t\tAI-generated summary \t\t\t\t The integration of large language models (LLMs) with external tools has significantly expanded the capabilities of AI agents. However, as the diversity of both LLMs and tools increases, selecting the optimal model-tool combination becomes a high-dimensional optimization challenge. Existing approaches often rely on a single model or fixed tool-calling logic, failing to exploit the performance variations across heterogeneous model-tool pairs. In this paper, we present ATLAS (Adaptive Tool-LLM Alignment and Synergistic Invocation), a dual-path framework for dynamic tool usage in cross-domain complex reasoning. ATLAS operates via a dual-path approach: (1) training-free cluster-based routing that exploits empirical priors for domain-specific alignment, and (2) RL-based multi-step routing that explores autonomous trajectories for out-of-distribution generalization. Extensive experiments across 15 benchmarks demonstrate that our method outperforms closed-source models like GPT-4o, surpassing existing routing methods on both in-distribution (+10.1%) and out-of-distribution (+13.1%) tasks. Furthermore, our framework shows significant gains in visual reasoning by orchestrating specialized multi-modal tools.', 'score': 30, 'issue_id': 474, 'pub_date': '2026-01-07', 'pub_date_card': {'ru': '7 января', 'en': 'January 7', 'zh': '1月7日'}, 'hash': '1f593458df41b2b9', 'authors': ['Jinyang Wu', 'Guocheng Zhai', 'Ruihan Jin', 'Jiahao Yuan', 'Yuhao Shen', 'Shuai Zhang', 'Zhengqi Wen', 'Jianhua Tao'], 'affiliations': ['East China Normal University', 'Tsinghua University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2601.03872.jpg', 'data': {'categories': ['#reasoning', '#optimization', '#rl', '#agents', '#benchmark', '#multimodal'], 'emoji': '🎯', 'ru': {'title': 'Адаптивное выравнивание инструментов и языковых моделей через интеллектуальную маршрутизацию', 'desc': 'ATLAS — это двухпутёвая система, которая динамически выбирает оптимальные комбинации языковых моделей и инструментов для решения сложных задач рассуждения. Система использует два подхода: кластеризацию без обучения для предметно-ориентированного выравнивания и обучение с подкреплением для многошагового маршрутизации, что позволяет обобщаться на новые данные. Фреймворк превосходит закрытые модели, включая GPT-4o, показывая улучшение производительности на 10,1% для известных задач и 13,1% для неизвестных. Метод особенно эффективен при работе со специализированными мультимодальными инструментами для визуального рассуждения.'}, 'en': {'title': 'Dynamic Model-Tool Selection for Superior Reasoning Performance', 'desc': 'ATLAS is a novel framework designed to enhance cross-domain reasoning by dynamically selecting the best combinations of models and tools. It utilizes a dual-path approach that includes cluster-based routing for domain-specific alignment and reinforcement learning for exploring optimal tool usage. This method addresses the challenges of high-dimensional optimization in selecting model-tool pairs, leading to improved performance on complex reasoning tasks. Experiments show that ATLAS significantly outperforms existing models and routing methods, particularly in visual reasoning tasks.'}, 'zh': {'title': 'ATLAS：动态选择最佳模型工具组合的双路径框架', 'desc': 'ATLAS是一种双路径框架，能够动态选择最佳的模型和工具组合，以应对跨领域推理的复杂任务。它通过基于聚类的路由和基于强化学习的多步路由来实现这一目标，从而在复杂推理任务上取得了优异的表现。ATLAS的双路径方法包括无训练的基于聚类的路由和基于强化学习的多步路由，能够有效利用领域特定的经验先验和自主探索的轨迹。实验结果表明，ATLAS在多个基准测试中超越了现有的闭源模型和路由方法，尤其在视觉推理方面表现出显著的提升。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.03986', 'title': 'Benchmark^2: Systematic Evaluation of LLM Benchmarks', 'url': 'https://huggingface.co/papers/2601.03986', 'abstract': "Researchers developed Benchmark^2, a framework with three metrics to evaluate benchmark quality for large language models, revealing significant variations in existing benchmarks and enabling more efficient evaluation through selective benchmark construction.  \t\t\t\t\tAI-generated summary \t\t\t\t The rapid proliferation of benchmarks for evaluating large language models (LLMs) has created an urgent need for systematic methods to assess benchmark quality itself. We propose Benchmark^2, a comprehensive framework comprising three complementary metrics: (1) Cross-Benchmark Ranking Consistency, measuring whether a benchmark produces model rankings aligned with peer benchmarks; (2) Discriminability Score, quantifying a benchmark's ability to differentiate between models; and (3) Capability Alignment Deviation, identifying problematic instances where stronger models fail but weaker models succeed within the same model family. We conduct extensive experiments across 15 benchmarks spanning mathematics, reasoning, and knowledge domains, evaluating 11 LLMs across four model families. Our analysis reveals significant quality variations among existing benchmarks and demonstrates that selective benchmark construction based on our metrics can achieve comparable evaluation performance with substantially reduced test sets.", 'score': 28, 'issue_id': 471, 'pub_date': '2026-01-07', 'pub_date_card': {'ru': '7 января', 'en': 'January 7', 'zh': '1月7日'}, 'hash': 'daa162d270fd4a3e', 'authors': ['Qi Qian', 'Chengsong Huang', 'Jingwen Xu', 'Changze Lv', 'Muling Wu', 'Wenhao Liu', 'Xiaohua Wang', 'Zhenghua Wang', 'Zisu Huang', 'Muzhao Tian', 'Jianhan Xu', 'Kun Hu', 'He-Da Wang', 'Yao Hu', 'Xuanjing Huang', 'Xiaoqing Zheng'], 'affiliations': ['College of Computer Science and Artificial Intelligence, Fudan University', 'Washington University in St. Louis', 'Xiaohongshu Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2601.03986.jpg', 'data': {'categories': ['#benchmark'], 'emoji': '📏', 'ru': {'title': 'Измеряем качество измерений: фреймворк для оценки бенчмарков LLM', 'desc': 'Исследователи представили Benchmark², фреймворк для оценки качества бенчмарков, используемых при тестировании больших языковых моделей. Фреймворк включает три метрики: согласованность ранжирования моделей между бенчмарками, способность различать производительность разных моделей и выявление аномалий, когда более слабые модели показывают лучший результат, чем сильные. На основе анализа 15 бенчмарков и 11 LLM-моделей авторы выявили значительные различия в качестве существующих тестовых наборов. Результаты показывают, что целенаправленный отбор бенчмарков на основе предложенных метрик позволяет достичь аналогичной оценивающей способности с использованием значительно меньшего количества тестов.'}, 'en': {'title': 'Benchmark^2: Elevating Benchmark Quality for Language Models', 'desc': "The paper introduces Benchmark^2, a new framework designed to evaluate the quality of benchmarks used for large language models (LLMs). It includes three key metrics: Cross-Benchmark Ranking Consistency, which checks if a benchmark's rankings match those of other benchmarks; Discriminability Score, which measures how well a benchmark can distinguish between different models; and Capability Alignment Deviation, which highlights cases where stronger models underperform compared to weaker ones. Through experiments on 15 different benchmarks and 11 LLMs, the researchers found significant differences in benchmark quality and showed that using their metrics allows for more efficient benchmark selection while maintaining evaluation effectiveness."}, 'zh': {'title': 'Benchmark^2：提升基准评估质量的框架', 'desc': '研究人员开发了Benchmark^2，这是一个评估大型语言模型基准质量的框架，包含三个指标。第一个指标是跨基准排名一致性，用于测量基准是否能与同行基准产生一致的模型排名。第二个指标是可区分性得分，量化基准区分模型的能力。第三个指标是能力对齐偏差，识别在同一模型家族中强模型失败而弱模型成功的情况。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.04151', 'title': 'Klear: Unified Multi-Task Audio-Video Joint Generation', 'url': 'https://huggingface.co/papers/2601.04151', 'abstract': 'Klear addresses audio-video joint generation challenges through a unified model architecture, progressive multitask training, and large-scale dense-caption data construction, achieving superior alignment and generalization.  \t\t\t\t\tAI-generated summary \t\t\t\t Audio-video joint generation has progressed rapidly, yet substantial challenges still remain. Non-commercial approaches still suffer audio-visual asynchrony, poor lip-speech alignment, and unimodal degradation, which can be stemmed from weak audio-visual correspondence modeling, limited generalization, and scarce high-quality dense-caption data. To address these issues, we introduce Klear and delve into three axes--model architecture, training strategy, and data curation. Architecturally, we adopt a single-tower design with unified DiT blocks and an Omni-Full Attention mechanism, achieving tight audio-visual alignment and strong scalability. Training-wise, we adopt a progressive multitask regime--random modality masking to joint optimization across tasks, and a multistage curriculum, yielding robust representations, strengthening A-V aligned world knowledge, and preventing unimodal collapse. For datasets, we present the first large-scale audio-video dataset with dense captions, and introduce a novel automated data-construction pipeline which annotates and filters millions of diverse, high-quality, strictly aligned audio-video-caption triplets. Building on this, Klear scales to large datasets, delivering high-fidelity, semantically and temporally aligned, instruction-following generation in both joint and unimodal settings while generalizing robustly to out-of-distribution scenarios. Across tasks, it substantially outperforms prior methods by a large margin and achieves performance comparable to Veo 3, offering a unified, scalable path toward next-generation audio-video synthesis.', 'score': 9, 'issue_id': 470, 'pub_date': '2026-01-07', 'pub_date_card': {'ru': '7 января', 'en': 'January 7', 'zh': '1月7日'}, 'hash': 'a6b0d69f2c3ead36', 'authors': ['Jun Wang', 'Chunyu Qiang', 'Yuxin Guo', 'Yiran Wang', 'Xijuan Zeng', 'Chen Zhang', 'Pengfei Wan'], 'affiliations': ['Kling Team, Kuaishou Technology'], 'pdf_title_img': 'assets/pdf/title_img/2601.04151.jpg', 'data': {'categories': ['#data', '#training', '#dataset', '#audio', '#video', '#multimodal', '#architecture'], 'emoji': '🎬', 'ru': {'title': 'Синхронное рождение звука и образа: единая архитектура для идеального аудиовизуального генерирования', 'desc': 'Статья представляет Klear — модель для совместной генерации аудио и видео, которая решает проблемы рассинхронизации и низкого качества выравнивания речи и губ. Архитектура модели основана на унифицированной трансформерной конструкции с механизмом Omni-Full Attention для достижения тесного аудиовизуального выравнивания. Авторы применяют прогрессивную многозадачную тренировку с маскированием модальностей и многоступенчатым curriculum learning, что предотвращает деградацию унимодальных потоков. Для обучения создан первый крупномасштабный датасет аудиовизуальных данных с плотными аннотациями, включающий миллионы автоматически обработанных и отфильтрованных тройок (аудио-видео-текст).'}, 'en': {'title': 'Klear: Unifying Audio-Video Generation for Superior Alignment and Generalization', 'desc': 'Klear is a new model designed to improve the generation of audio and video together. It uses a single architecture with advanced attention mechanisms to ensure that audio and video are closely aligned. The training process involves multitasking and progressive learning, which helps the model understand and generate better representations of audio-visual content. Additionally, Klear introduces a large dataset with detailed captions, allowing it to perform exceptionally well in generating high-quality audio-video outputs, even in challenging scenarios.'}, 'zh': {'title': 'Klear：音视频生成的新突破', 'desc': 'Klear 是一种新型的音频视频联合生成模型，旨在解决音视频不同步和口型与语音不匹配等问题。它采用统一的模型架构和渐进式多任务训练策略，能够实现更好的音视频对齐和泛化能力。通过构建大规模的密集标注数据集，Klear 提供了高质量的音视频-字幕三元组，增强了模型的表现。实验结果表明，Klear 在多个任务上显著超越了之前的方法，展现出强大的生成能力。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.04194', 'title': 'Choreographing a World of Dynamic Objects', 'url': 'https://huggingface.co/papers/2601.04194', 'abstract': 'CHORD is a universal generative framework that extracts Lagrangian motion information from Eulerian video representations to synthesize diverse 4D dynamic scenes without requiring category-specific rules or large datasets.  \t\t\t\t\tAI-generated summary \t\t\t\t Dynamic objects in our physical 4D (3D + time) world are constantly evolving, deforming, and interacting with other objects, leading to diverse 4D scene dynamics. In this paper, we present a universal generative pipeline, CHORD, for CHOReographing Dynamic objects and scenes and synthesizing this type of phenomena. Traditional rule-based graphics pipelines to create these dynamics are based on category-specific heuristics, yet are labor-intensive and not scalable. Recent learning-based methods typically demand large-scale datasets, which may not cover all object categories in interest. Our approach instead inherits the universality from the video generative models by proposing a distillation-based pipeline to extract the rich Lagrangian motion information hidden in the Eulerian representations of 2D videos. Our method is universal, versatile, and category-agnostic. We demonstrate its effectiveness by conducting experiments to generate a diverse range of multi-body 4D dynamics, show its advantage compared to existing methods, and demonstrate its applicability in generating robotics manipulation policies. Project page: https://yanzhelyu.github.io/chord', 'score': 7, 'issue_id': 470, 'pub_date': '2026-01-07', 'pub_date_card': {'ru': '7 января', 'en': 'January 7', 'zh': '1月7日'}, 'hash': 'f62cc6c228aa9b1c', 'authors': ['Yanzhe Lyu', 'Chen Geng', 'Karthik Dharmarajan', 'Yunzhi Zhang', 'Hadi Alzayer', 'Shangzhe Wu', 'Jiajun Wu'], 'affiliations': ['Stanford University', 'University of Cambridge', 'University of Maryland'], 'pdf_title_img': 'assets/pdf/title_img/2601.04194.jpg', 'data': {'categories': ['#video', '#synthetic', '#3d', '#multimodal', '#robotics'], 'emoji': '🎬', 'ru': {'title': 'Универсальная генерация 4D динамики из 2D видео без специальных правил', 'desc': 'CHORD — это универсальная генеративная модель, которая извлекает информацию о движении объектов из 2D видео в Эйлеровом представлении и преобразует её в Лагранжевы координаты для синтеза динамических 4D сцен. В отличие от традиционных физических симуляторов, требующих специфичных для каждого объекта правил, метод использует дистилляцию знаний из видео-моделей и не нуждается в больших размеченных датасетах. Подход универсален и категориально-агностичен, позволяя генерировать разнообразные динамические сцены с множественными взаимодействующими объектами. Авторы демонстрируют применимость метода не только для синтеза 4D контента, но и для генерации политик робототехнических манипуляций.'}, 'en': {'title': 'CHORD: Universal Synthesis of Dynamic 4D Scenes', 'desc': 'The paper introduces CHORD, a generative framework that synthesizes dynamic 4D scenes by extracting motion information from 2D video representations. Unlike traditional methods that rely on specific rules for different object categories, CHORD operates without needing large datasets or category-specific heuristics. It utilizes a distillation-based approach to capture Lagrangian motion, making it versatile and applicable to various scenarios. The effectiveness of CHORD is demonstrated through experiments that showcase its ability to generate diverse multi-body dynamics and its potential in robotics applications.'}, 'zh': {'title': 'CHORD：无类别限制的四维动态场景生成', 'desc': 'CHORD是一种通用的生成框架，能够从欧拉视频表示中提取拉格朗日运动信息，以合成多样的四维动态场景。该方法不需要特定类别的规则或大型数据集，具有普遍性和灵活性。与传统的基于规则的图形管道相比，CHORD能够更高效地生成动态场景，避免了繁琐的人工设计。实验结果表明，CHORD在生成多体四维动态方面表现优越，并且可以应用于机器人操作策略的生成。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.04171', 'title': 'Agentic Rubrics as Contextual Verifiers for SWE Agents', 'url': 'https://huggingface.co/papers/2601.04171', 'abstract': 'Agentic Rubrics enable efficient and scalable verification for software engineering agents by creating context-aware checklists that outperform traditional methods while maintaining interpretability.  \t\t\t\t\tAI-generated summary \t\t\t\t Verification is critical for improving agents: it provides the reward signal for Reinforcement Learning and enables inference-time gains through Test-Time Scaling (TTS). Despite its importance, verification in software engineering (SWE) agent settings often relies on code execution, which can be difficult to scale due to environment setup overhead. Scalable alternatives such as patch classifiers and heuristic methods exist, but they are less grounded in codebase context and harder to interpret. To this end, we explore Agentic Rubrics: an expert agent interacts with the repository to create a context-grounded rubric checklist, and candidate patches are then scored against it without requiring test execution. On SWE-Bench Verified under parallel TTS evaluation, Agentic Rubrics achieve a score of 54.2% on Qwen3-Coder-30B-A3B and 40.6% on Qwen3-32B, with at least a +3.5 percentage-point gain over the strongest baseline in our comparison set. We further analyze rubric behavior, showing that rubric scores are consistent with ground-truth tests while also flagging issues that tests do not capture. Our ablations show that agentic context gathering is essential for producing codebase-specific, unambiguous criteria. Together, these results suggest that Agentic Rubrics provide an efficient, scalable, and granular verification signal for SWE agents.', 'score': 6, 'issue_id': 470, 'pub_date': '2026-01-07', 'pub_date_card': {'ru': '7 января', 'en': 'January 7', 'zh': '1月7日'}, 'hash': '31d275e8d765ca8b', 'authors': ['Mohit Raghavendra', 'Anisha Gunjal', 'Bing Liu', 'Yunzhong He'], 'affiliations': ['Scale AI'], 'pdf_title_img': 'assets/pdf/title_img/2601.04171.jpg', 'data': {'categories': ['#reasoning', '#agents', '#interpretability', '#plp', '#benchmark', '#rl'], 'emoji': '✅', 'ru': {'title': 'Контекстные чеклисты вместо кода: агентивная верификация для масштабирования', 'desc': 'В статье предлагается метод Agentic Rubrics для верификации решений программных агентов без выполнения кода. Экспертный агент анализирует репозиторий и создает контекстный чеклист критериев оценки, который затем применяется к кандидатным патчам. Этот подход значительно превосходит традиционные методы классификации патчей и эвристики, обеспечивая +3.5 процентных пункта прироста на бенчмарке SWE-Bench. Метод сохраняет интерпретируемость и позволяет эффективно масштабировать верификацию за счет снижения вычислительных затрат на тестирование кода.'}, 'en': {'title': 'Agentic Rubrics: Context-Aware Checklists for Efficient Software Verification', 'desc': 'Agentic Rubrics are a new method for verifying software engineering agents by using context-aware checklists. This approach improves upon traditional verification methods by allowing agents to score candidate patches without needing to execute code, which can be time-consuming. The study shows that Agentic Rubrics outperform existing methods, achieving higher scores on benchmark tests while maintaining interpretability. Additionally, the rubrics help identify issues that standard tests might miss, making them a valuable tool for enhancing the performance of software engineering agents.'}, 'zh': {'title': 'Agentic Rubrics：高效可扩展的软件验证新方法', 'desc': '本文提出了一种名为Agentic Rubrics的方法，用于提高软件工程代理的验证效率和可扩展性。该方法通过创建上下文感知的检查清单，能够在不依赖代码执行的情况下对候选补丁进行评分，从而克服了传统方法的局限性。研究表明，Agentic Rubrics在多个基准测试中表现优异，得分显著高于现有的最强基线。通过分析，发现这种方法不仅与真实测试结果一致，还能识别测试未能捕捉到的问题，显示出其在软件工程中的潜力。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.02075', 'title': 'MDAgent2: Large Language Model for Code Generation and Knowledge Q&A in Molecular Dynamics', 'url': 'https://huggingface.co/papers/2601.02075', 'abstract': 'MDAgent2 enables automated molecular dynamics code generation and question answering through domain-adapted language models and a multi-agent runtime system.  \t\t\t\t\tAI-generated summary \t\t\t\t Molecular dynamics (MD) simulations are essential for understanding atomic-scale behaviors in materials science, yet writing LAMMPS scripts remains highly specialized and time-consuming tasks. Although LLMs show promise in code generation and domain-specific question answering, their performance in MD scenarios is limited by scarce domain data, the high deployment cost of state-of-the-art LLMs, and low code executability. Building upon our prior MDAgent, we present MDAgent2, the first end-to-end framework capable of performing both knowledge Q&A and code generation within the MD domain. We construct a domain-specific data-construction pipeline that yields three high-quality datasets spanning MD knowledge, question answering, and code generation. Based on these datasets, we adopt a three stage post-training strategy--continued pre-training (CPT), supervised fine-tuning (SFT), and reinforcement learning (RL)--to train two domain-adapted models, MD-Instruct and MD-Code. Furthermore, we introduce MD-GRPO, a closed-loop RL method that leverages simulation outcomes as reward signals and recycles low-reward trajectories for continual refinement. We further build MDAgent2-RUNTIME, a deployable multi-agent system that integrates code generation, execution, evaluation, and self-correction. Together with MD-EvalBench proposed in this work, the first benchmark for LAMMPS code generation and question answering, our models and system achieve performance surpassing several strong baselines.This work systematically demonstrates the adaptability and generalization capability of large language models in industrial simulation tasks, laying a methodological foundation for automatic code generation in AI for Science and industrial-scale simulations. URL: https://github.com/FredericVAN/PKU_MDAgent2', 'score': 6, 'issue_id': 470, 'pub_date': '2026-01-05', 'pub_date_card': {'ru': '5 января', 'en': 'January 5', 'zh': '1月5日'}, 'hash': 'aa0562dc0d93c752', 'authors': ['Zhuofan Shi', 'Hubao A', 'Yufei Shao', 'Dongliang Huang', 'Hongxu An', 'Chunxiao Xin', 'Haiyang Shen', 'Zhenyu Wang', 'Yunshan Na', 'Gang Huang', 'Xiang Jing'], 'affiliations': ['Liaoning Technical University', 'National Key Laboratory of Data Space Technology and System', 'Peking University', 'The Hong Kong University of Science and Technology', 'Wenjing Future Lab (Beijing) Technology Co., Ltd.'], 'pdf_title_img': 'assets/pdf/title_img/2601.02075.jpg', 'data': {'categories': ['#data', '#training', '#agents', '#dataset', '#plp', '#benchmark', '#rl', '#optimization', '#open_source', '#science', '#small_models'], 'emoji': '⚛️', 'ru': {'title': 'Язык для науки: автоматическая генерация кода молекулярной динамики', 'desc': 'MDAgent2 — это комплексная система для автоматизации работы с симуляциями молекулярной динамики, использующая адаптированные к предметной области языковые модели. Авторы создали специализированный конвейер обработки данных и разработали две доменные модели MD-Instruct и MD-Code, обученные с применением непрерывного предобучения, контролируемой настройки и обучения с подкреплением. Система включает инновационный метод MD-GRPO, который использует результаты симуляций как сигналы обратной связи для улучшения качества кода через итеративное переобучение. MDAgent2-RUNTIME представляет собой многоагентную систему для генерации, выполнения, оценки и самокоррекции кода LAMMPS, протестированную на собственном бенчмарке MD-EvalBench.'}, 'en': {'title': 'Automating Molecular Dynamics with MDAgent2: Code Generation and Q&A Simplified!', 'desc': 'MDAgent2 is an advanced framework designed to automate the generation of molecular dynamics (MD) code and facilitate question answering in the MD domain. It addresses the challenges of writing LAMMPS scripts by utilizing domain-adapted language models and a multi-agent runtime system. The framework employs a three-stage training approach, including continued pre-training, supervised fine-tuning, and reinforcement learning, to enhance model performance. Additionally, MDAgent2 introduces a closed-loop reinforcement learning method that improves code generation through feedback from simulation outcomes, making it a significant step forward in AI applications for scientific simulations.'}, 'zh': {'title': 'MDAgent2：自动化分子动力学的智能助手', 'desc': 'MDAgent2 是一个自动化的分子动力学代码生成和问答系统，利用领域适应的语言模型和多智能体运行时系统。该系统解决了编写 LAMMPS 脚本的专业性和耗时问题，通过构建高质量的数据集来支持知识问答和代码生成。MDAgent2 采用了三阶段的后训练策略，包括继续预训练、监督微调和强化学习，训练出适应分子动力学领域的模型。该研究展示了大型语言模型在工业模拟任务中的适应性和泛化能力，为科学和工业规模模拟中的自动代码生成奠定了方法论基础。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.00423', 'title': 'E-GRPO: High Entropy Steps Drive Effective Reinforcement Learning for Flow Models', 'url': 'https://huggingface.co/papers/2601.00423', 'abstract': 'Entropy-aware policy optimization method for reinforcement learning in flow matching models that improves exploration through SDE and ODE sampling strategies.  \t\t\t\t\tAI-generated summary \t\t\t\t Recent reinforcement learning has enhanced the flow matching models on human preference alignment. While stochastic sampling enables the exploration of denoising directions, existing methods which optimize over multiple denoising steps suffer from sparse and ambiguous reward signals. We observe that the high entropy steps enable more efficient and effective exploration while the low entropy steps result in undistinguished roll-outs. To this end, we propose E-GRPO, an entropy aware Group Relative Policy Optimization to increase the entropy of SDE sampling steps. Since the integration of stochastic differential equations suffer from ambiguous reward signals due to stochasticity from multiple steps, we specifically merge consecutive low entropy steps to formulate one high entropy step for SDE sampling, while applying ODE sampling on other steps. Building upon this, we introduce multi-step group normalized advantage, which computes group-relative advantages within samples sharing the same consolidated SDE denoising step. Experimental results on different reward settings have demonstrated the effectiveness of our methods.', 'score': 6, 'issue_id': 470, 'pub_date': '2026-01-01', 'pub_date_card': {'ru': '1 января', 'en': 'January 1', 'zh': '1月1日'}, 'hash': 'd7930acb619d200c', 'authors': ['Shengjun Zhang', 'Zhang Zhang', 'Chensheng Dai', 'Yueqi Duan'], 'affiliations': ['Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2601.00423.jpg', 'data': {'categories': ['#training', '#rl', '#alignment', '#optimization'], 'emoji': '🎲', 'ru': {'title': 'Энтропия как ключ к лучшему исследованию в обучении с подкреплением', 'desc': 'В статье предлагается E-GRPO — метод оптимизации политики, учитывающий энтропию, для улучшения обучения с подкреплением в моделях flow matching. Авторы заметили, что шаги с высокой энтропией обеспечивают более эффективное исследование пространства действий, в то время как шаги с низкой энтропией дают неразличимые траектории. Метод объединяет последовательные шаги с низкой энтропией в один шаг высокой энтропии при использовании стохастических дифференциальных уравнений, а для остальных шагов применяет детерминированное решение (ODE). Для оценки преимущества предлагается многошаговая нормализация внутри групп с одинаковыми консолидированными шагами денойзинга.'}, 'en': {'title': 'Enhancing Exploration with Entropy in Reinforcement Learning', 'desc': 'This paper presents E-GRPO, an entropy-aware policy optimization method designed to enhance exploration in reinforcement learning for flow matching models. The authors identify that high entropy steps lead to better exploration, while low entropy steps can produce unclear outcomes. To address the challenges of sparse rewards in stochastic differential equation (SDE) sampling, they propose merging consecutive low entropy steps into a single high entropy step. Additionally, they introduce a multi-step group normalized advantage to improve the computation of advantages in samples that share the same SDE denoising step, demonstrating improved performance in various reward settings.'}, 'zh': {'title': '熵感知策略优化，提升探索效率！', 'desc': '本文提出了一种新的强化学习策略优化方法，称为E-GRPO，旨在提高流匹配模型中的探索效率。该方法通过关注熵的变化，优化随机微分方程(SDE)的采样步骤，以克服现有方法在多步去噪中面临的稀疏和模糊奖励信号问题。我们发现高熵步骤能够促进更有效的探索，而低熵步骤则导致结果不明显。通过将连续的低熵步骤合并为一个高熵步骤，并在其他步骤上应用常微分方程(ODE)采样，E-GRPO显著提升了模型的性能。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.03471', 'title': 'EpiQAL: Benchmarking Large Language Models in Epidemiological Question Answering for Enhanced Alignment and Reasoning', 'url': 'https://huggingface.co/papers/2601.03471', 'abstract': 'EpiQAL presents a novel benchmark for evaluating epidemiological reasoning in language models through three distinct subsets measuring factual recall, multi-step inference, and conclusion reconstruction from scientific literature.  \t\t\t\t\tAI-generated summary \t\t\t\t Reliable epidemiological reasoning requires synthesizing study evidence to infer disease burden, transmission dynamics, and intervention effects at the population level. Existing medical question answering benchmarks primarily emphasize clinical knowledge or patient-level reasoning, yet few systematically evaluate evidence-grounded epidemiological inference. We present EpiQAL, the first diagnostic benchmark for epidemiological question answering across diverse diseases, comprising three subsets built from open-access literature. The subsets respectively evaluate text-grounded factual recall, multi-step inference linking document evidence with epidemiological principles, and conclusion reconstruction with the Discussion section withheld. Construction combines expert-designed taxonomy guidance, multi-model verification, and retrieval-based difficulty control. Experiments on ten open models reveal that current LLMs show limited performance on epidemiological reasoning, with multi-step inference posing the greatest challenge. Model rankings shift across subsets, and scale alone does not predict success. Chain-of-Thought prompting benefits multi-step inference but yields mixed results elsewhere. EpiQAL provides fine-grained diagnostic signals for evidence grounding, inferential reasoning, and conclusion reconstruction.', 'score': 5, 'issue_id': 471, 'pub_date': '2026-01-06', 'pub_date_card': {'ru': '6 января', 'en': 'January 6', 'zh': '1月6日'}, 'hash': '14c81969b5c87a07', 'authors': ['Mingyang Wei', 'Dehai Min', 'Zewen Liu', 'Yuzhang Xie', 'Guanchen Wu', 'Carl Yang', 'Max S. Y. Lau', 'Qi He', 'Lu Cheng', 'Wei Jin'], 'affiliations': ['Emory University', 'Microsoft', 'University of Illinois Chicago'], 'pdf_title_img': 'assets/pdf/title_img/2601.03471.jpg', 'data': {'categories': ['#dataset', '#reasoning', '#benchmark', '#healthcare', '#science'], 'emoji': '🔬', 'ru': {'title': 'Диагностирование эпидемиологического мышления в языковых моделях', 'desc': 'В статье представлен EpiQAL — первый диагностический набор данных для оценки эпидемиологического рассуждения в языковых моделях, построенный на основе научной литературы и содержащий три подмножества задач. Первое подмножество измеряет способность моделей к факультативному припоминанию информации из текста, второе оценивает многошаговое логическое вывод, связывающий доказательства из документов с эпидемиологическими принципами, а третье проверяет реконструкцию выводов при скрытом разделе Discussion. Исследования десяти открытых LLM показали, что современные языковые модели демонстрируют ограниченную производительность в эпидемиологическом рассуждении, при этом многошаговый вывод представляет наибольшую сложность. Результаты подтвердили, что масштаб модели не гарантирует успех в этой задаче, а Chain-of-Thought промптинг дает неоднозначные результаты в разных подмножествах.'}, 'en': {'title': 'EpiQAL: Advancing Epidemiological Reasoning in Language Models', 'desc': "EpiQAL is a new benchmark designed to assess how well language models can perform epidemiological reasoning. It includes three specific tests that measure a model's ability to recall facts, make multi-step inferences, and reconstruct conclusions from scientific texts. This benchmark is unique because it focuses on understanding population-level health issues rather than just clinical or patient-level questions. The findings show that current language models struggle with these tasks, especially with multi-step reasoning, highlighting the need for improved methods in this area."}, 'zh': {'title': 'EpiQAL：流行病学推理的新基准', 'desc': 'EpiQAL是一个新颖的基准，用于评估语言模型在流行病学推理方面的能力。它通过三个不同的子集来测量事实回忆、多步推理和从科学文献中重建结论。现有的医学问答基准主要关注临床知识或患者层面的推理，而很少系统地评估基于证据的流行病学推理。EpiQAL为多种疾病提供了第一个诊断基准，揭示了当前大型语言模型在流行病学推理方面的局限性，尤其是在多步推理方面。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.03699', 'title': 'RedBench: A Universal Dataset for Comprehensive Red Teaming of Large Language Models', 'url': 'https://huggingface.co/papers/2601.03699', 'abstract': 'RedBench presents a unified dataset with standardized risk categorization for evaluating LLM vulnerabilities across multiple domains and attack types.  \t\t\t\t\tAI-generated summary \t\t\t\t As large language models (LLMs) become integral to safety-critical applications, ensuring their robustness against adversarial prompts is paramount. However, existing red teaming datasets suffer from inconsistent risk categorizations, limited domain coverage, and outdated evaluations, hindering systematic vulnerability assessments. To address these challenges, we introduce RedBench, a universal dataset aggregating 37 benchmark datasets from leading conferences and repositories, comprising 29,362 samples across attack and refusal prompts. RedBench employs a standardized taxonomy with 22 risk categories and 19 domains, enabling consistent and comprehensive evaluations of LLM vulnerabilities. We provide a detailed analysis of existing datasets, establish baselines for modern LLMs, and open-source the dataset and evaluation code. Our contributions facilitate robust comparisons, foster future research, and promote the development of secure and reliable LLMs for real-world deployment. Code: https://github.com/knoveleng/redeval', 'score': 4, 'issue_id': 470, 'pub_date': '2026-01-07', 'pub_date_card': {'ru': '7 января', 'en': 'January 7', 'zh': '1月7日'}, 'hash': 'b9041e4ef3eab3d5', 'authors': ['Quy-Anh Dang', 'Chris Ngo', 'Truong-Son Hy'], 'affiliations': ['Knovel Engineering Lab', 'University of Alabama at Birmingham', 'VNU University of Science'], 'pdf_title_img': 'assets/pdf/title_img/2601.03699.jpg', 'data': {'categories': ['#open_source', '#security', '#dataset', '#benchmark'], 'emoji': '🔒', 'ru': {'title': 'Единый стандарт для проверки безопасности языковых моделей', 'desc': 'RedBench — это унифицированный датасет для оценки уязвимостей больших языковых моделей, объединяющий 37 существующих бенчмарков в один стандартизированный набор с 29,362 примерами. Авторы разработали единую таксономию с 22 категориями риска и 19 доменами, что позволяет проводить согласованную оценку устойчивости LLM к adversarial промптам. Датасет включает как атакующие, так и отказывающие промпты и обеспечивает надежную базу для систематического тестирования безопасности языковых моделей. Предоставление открытого кода и базовых результатов современных LLM способствует развитию более защищённых и надёжных моделей для критически важных приложений.'}, 'en': {'title': 'RedBench: A Unified Dataset for Evaluating LLM Vulnerabilities', 'desc': 'RedBench is a new dataset designed to evaluate the vulnerabilities of large language models (LLMs) against various types of attacks. It combines 37 existing benchmark datasets into one unified resource, containing over 29,000 samples of attack and refusal prompts. The dataset uses a standardized risk categorization system with 22 categories and covers 19 different domains, allowing for consistent assessments of LLM robustness. By providing this comprehensive resource and evaluation code, RedBench aims to enhance the security and reliability of LLMs in critical applications.'}, 'zh': {'title': 'RedBench：评估LLM脆弱性的统一数据集', 'desc': 'RedBench是一个统一的数据集，旨在评估大型语言模型（LLM）在多个领域和攻击类型下的脆弱性。该数据集整合了来自顶级会议和存储库的37个基准数据集，共包含29,362个样本，涵盖攻击和拒绝提示。RedBench采用标准化的分类法，设有22个风险类别和19个领域，使得对LLM脆弱性的评估更加一致和全面。通过提供现有数据集的详细分析和现代LLM的基准，RedBench促进了稳健的比较，推动了未来的研究，并支持安全可靠的LLM在实际应用中的发展。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.03315', 'title': "Why LLMs Aren't Scientists Yet: Lessons from Four Autonomous Research Attempts", 'url': 'https://huggingface.co/papers/2601.03315', 'abstract': 'A case study of four attempts to autonomously generate ML research papers using LLM agents reveals recurring failure modes and proposes design principles for robust AI-scientist systems.  \t\t\t\t\tAI-generated summary \t\t\t\t We report a case study of four end-to-end attempts to autonomously generate ML research papers using a pipeline of six LLM agents mapped to stages of the scientific workflow. Of these four, three attempts failed during implementation or evaluation. One completed the pipeline and was accepted to Agents4Science 2025, an experimental inaugural venue that required AI systems as first authors, passing both human and multi-AI review. From these attempts, we document six recurring failure modes: bias toward training data defaults, implementation drift under execution pressure, memory and context degradation across long-horizon tasks, overexcitement that declares success despite obvious failures, insufficient domain intelligence, and weak scientific taste in experimental design. We conclude by discussing four design principles for more robust AI-scientist systems, implications for autonomous scientific discovery, and we release all prompts, artifacts, and outputs at https://github.com/Lossfunk/ai-scientist-artefacts-v1', 'score': 4, 'issue_id': 479, 'pub_date': '2026-01-06', 'pub_date_card': {'ru': '6 января', 'en': 'January 6', 'zh': '1月6日'}, 'hash': 'e24727d5beee24ef', 'authors': ['Dhruv Trehan', 'Paras Chopra'], 'affiliations': ['Lossfunk'], 'pdf_title_img': 'assets/pdf/title_img/2601.03315.jpg', 'data': {'categories': ['#long_context', '#open_source', '#hallucinations', '#science'], 'emoji': '🤖', 'ru': {'title': 'На пути к надежным AI-ученым: уроки из неудачных попыток', 'desc': 'В статье описывается практический опыт автономной генерации научных работ по машинному обучению с помощью системы из шести LLM агентов, моделирующих этапы научного исследования. Из четырех попыток только одна успешно завершилась и была принята на конференцию Agents4Science 2025, пройдя проверку как у людей, так и у других AI систем. Авторы документируют шесть основных ошибок в работе такых систем: смещение к стандартам обучающих данных, дрейф реализации под давлением времени, деградация памяти при длительных задачах, необоснованный оптимизм и недостаточное понимание предметной области. На основе анализа предлагаются четыре принципа проектирования более надежных AI-ученых систем для будущих исследований.'}, 'en': {'title': 'Building Better AI Scientists: Learning from Failures', 'desc': 'This paper explores the challenges faced when using large language models (LLMs) to autonomously generate machine learning research papers. The authors conducted a case study with four attempts, where three failed due to various issues such as bias in training data and memory degradation during long tasks. One attempt succeeded and was accepted for publication, demonstrating the potential of AI in scientific research. The study identifies six common failure modes and proposes four design principles to enhance the reliability of AI systems in scientific discovery.'}, 'zh': {'title': '提升AI科学家系统的设计原则', 'desc': '本研究案例分析了四次尝试使用大型语言模型（LLM）代理自主生成机器学习研究论文的过程。结果显示，三次尝试在实施或评估阶段失败，只有一次成功完成并被接受到Agents4Science 2025会议。研究中总结了六种常见的失败模式，包括对训练数据的偏见、执行压力下的实现漂移、长时间任务中的记忆和上下文退化等。最后，提出了四项设计原则，以增强AI科学家系统的鲁棒性，并探讨了对自主科学发现的影响。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.03467', 'title': 'ThinkRL-Edit: Thinking in Reinforcement Learning for Reasoning-Centric Image Editing', 'url': 'https://huggingface.co/papers/2601.03467', 'abstract': 'ThinkRL-Edit enhances reasoning-centric image editing through reinforcement learning by expanding visual reasoning exploration beyond denoising stochasticity and using unbiased reward strategies.  \t\t\t\t\tAI-generated summary \t\t\t\t Instruction-driven image editing with unified multimodal generative models has advanced rapidly, yet their underlying visual reasoning remains limited, leading to suboptimal performance on reasoning-centric edits. Reinforcement learning (RL) has been investigated for improving the quality of image editing, but it faces three key challenges: (1) limited reasoning exploration confined to denoising stochasticity, (2) biased reward fusion, and (3) unstable VLM-based instruction rewards. In this work, we propose ThinkRL-Edit, a reasoning-centric RL framework that decouples visual reasoning from image synthesis and expands reasoning exploration beyond denoising. To the end, we introduce Chain-of-Thought (CoT)-based reasoning sampling with planning and reflection stages prior to generation in online sampling, compelling the model to explore multiple semantic hypotheses and validate their plausibility before committing to a visual outcome. To avoid the failures of weighted aggregation, we propose an unbiased chain preference grouping strategy across multiple reward dimensions. Moreover, we replace interval-based VLM scores with a binary checklist, yielding more precise, lower-variance, and interpretable rewards for complex reasoning. Experiments show our method significantly outperforms prior work on reasoning-centric image editing, producing instruction-faithful, visually coherent, and semantically grounded edits.', 'score': 3, 'issue_id': 472, 'pub_date': '2026-01-06', 'pub_date_card': {'ru': '6 января', 'en': 'January 6', 'zh': '1月6日'}, 'hash': 'bb71677f72564096', 'authors': ['Hengjia Li', 'Liming Jiang', 'Qing Yan', 'Yizhi Song', 'Hao Kang', 'Zichuan Liu', 'Xin Lu', 'Boxi Wu', 'Deng Cai'], 'affiliations': ['Intelligent Creation, ByteDance', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2601.03467.jpg', 'data': {'categories': ['#reasoning', '#training', '#cv', '#rl', '#optimization', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Глубокое рассуждение через reinforcement learning в редактировании изображений', 'desc': 'ThinkRL-Edit — это фреймворк на основе reinforcement learning для редактирования изображений, который отделяет визуальное рассуждение от синтеза изображений. Метод использует Chain-of-Thought подход с этапами планирования и рефлексии до генерации, позволяя модели исследовать множественные семантические гипотезы перед окончательным результатом. Для избежания смещения при агрегировании наград предложена объективная стратегия группировки предпочтений по нескольким измерениям вознаграждения. Замена интервальных VLM оценок на бинарный чек-лист обеспечивает более точные и интерпретируемые награды для сложных задач рассуждения.'}, 'en': {'title': 'Enhancing Image Editing with Reasoning-Driven Reinforcement Learning', 'desc': 'ThinkRL-Edit is a novel framework that enhances image editing by focusing on reasoning through reinforcement learning. It addresses limitations in traditional methods by allowing for broader exploration of visual reasoning beyond just denoising. The framework employs Chain-of-Thought reasoning, which involves planning and reflection to evaluate different semantic possibilities before generating images. Additionally, it introduces an unbiased reward strategy that improves the accuracy and interpretability of the editing process, leading to better results in reasoning-centric image edits.'}, 'zh': {'title': '推理驱动的图像编辑新突破', 'desc': 'ThinkRL-Edit 是一种基于强化学习的图像编辑框架，旨在增强以推理为中心的图像编辑能力。它通过将视觉推理与图像合成解耦，扩展了推理探索的范围，超越了去噪的随机性。该方法引入了基于思维链的推理采样，促使模型在生成之前进行多种语义假设的探索和验证。实验结果表明，ThinkRL-Edit 在推理中心的图像编辑任务中显著优于之前的方法，生成的编辑结果更符合指令要求，视觉上更连贯，语义上更扎实。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.03448', 'title': 'Enhancing Linguistic Competence of Language Models through Pre-training with Language Learning Tasks', 'url': 'https://huggingface.co/papers/2601.03448', 'abstract': 'Language models pre-trained with a framework combining standard next-token prediction and structured language learning tasks show enhanced linguistic competence without sacrificing general reasoning capabilities.  \t\t\t\t\tAI-generated summary \t\t\t\t Language models (LMs) are pre-trained on raw text datasets to generate text sequences token-by-token. While this approach facilitates the learning of world knowledge and reasoning, it does not explicitly optimize for linguistic competence. To bridge this gap, we propose L2T, a pre-training framework integrating Language Learning Tasks alongside standard next-token prediction. Inspired by human language acquisition, L2T transforms raw text into structured input-output pairs to provide explicit linguistic stimulation. Pre-training LMs on a mixture of raw text and L2T data not only improves overall performance on linguistic competence benchmarks but accelerates its acquisition, while maintaining competitive performance on general reasoning tasks.', 'score': 3, 'issue_id': 479, 'pub_date': '2026-01-06', 'pub_date_card': {'ru': '6 января', 'en': 'January 6', 'zh': '1月6日'}, 'hash': '2a965cc0eaea825a', 'authors': ['Atsuki Yamaguchi', 'Maggie Mi', 'Nikolaos Aletras'], 'affiliations': ['School of Computer Science, University of Sheffield, United Kingdom'], 'pdf_title_img': 'assets/pdf/title_img/2601.03448.jpg', 'data': {'categories': [], 'emoji': '📚', 'ru': {'title': 'Структурированное обучение для лингвистического мастерства языковых моделей', 'desc': 'Исследование представляет L2T — фреймворк для предварительного обучения языковых моделей, который комбинирует стандартное предсказание следующего токена с явными задачами структурированного языкового обучения. Вдохновляясь процессом овладения языком человеком, метод преобразует сырой текст в структурированные пары «вход-выход» для эксплицитной лингвистической стимуляции. Предварительное обучение на смеси обычного текста и данных L2T улучшает производительность на бенчмарках лингвистической компетентности и ускоряет её приобретение. При этом модель сохраняет конкурентную производительность на задачах общего рассуждения.'}, 'en': {'title': 'Enhancing Language Models with Structured Learning for Better Linguistic Competence', 'desc': 'This paper introduces L2T, a novel pre-training framework for language models that combines traditional next-token prediction with structured language learning tasks. By transforming raw text into structured input-output pairs, L2T enhances the linguistic competence of models, mimicking aspects of human language acquisition. The approach allows models to learn linguistic structures explicitly, leading to improved performance on linguistic benchmarks. Importantly, L2T maintains strong general reasoning capabilities, ensuring that the model remains versatile across various tasks.'}, 'zh': {'title': '提升语言能力与推理能力的平衡', 'desc': '本文提出了一种新的预训练框架L2T，结合了标准的下一个标记预测和结构化语言学习任务，以提高语言模型的语言能力。通过将原始文本转化为结构化的输入输出对，L2T为模型提供了明确的语言刺激，模仿人类语言习得的过程。预训练模型时使用原始文本和L2T数据的混合，不仅提升了语言能力基准测试的整体表现，还加快了语言能力的获取。同时，该方法在一般推理任务上仍保持了竞争力的表现。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.02933', 'title': 'Pearmut: Human Evaluation of Translation Made Trivial', 'url': 'https://huggingface.co/papers/2601.02933', 'abstract': 'Pearmut is a platform that simplifies human evaluation in multilingual NLP by providing a lightweight solution for end-to-end evaluation with support for various protocols and learning strategies.  \t\t\t\t\tAI-generated summary \t\t\t\t Human evaluation is the gold standard for multilingual NLP, but is often skipped in practice and substituted with automatic metrics, because it is notoriously complex and slow to set up with existing tools with substantial engineering and operational overhead. We introduce Pearmut, a lightweight yet feature-rich platform that makes end-to-end human evaluation as easy to run as automatic evaluation. Pearmut removes common entry barriers and provides support for evaluating multilingual tasks, with a particular focus on machine translation. The platform implements standard evaluation protocols, including DA, ESA, or MQM, but is also extensible to allow prototyping new protocols. It features document-level context, absolute and contrastive evaluation, attention checks, ESAAI pre-annotations and both static and active learning-based assignment strategies. Pearmut enables reliable human evaluation to become a practical, routine component of model development and diagnosis rather than an occasional effort.', 'score': 2, 'issue_id': 482, 'pub_date': '2026-01-06', 'pub_date_card': {'ru': '6 января', 'en': 'January 6', 'zh': '1月6日'}, 'hash': '0b135526779a2ba3', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#machine_translation', '#open_source', '#multilingual', '#benchmark'], 'emoji': '👥', 'ru': {'title': 'Человеческая оценка на практике: упрощение многоязычного NLP через Pearmut', 'desc': 'Pearmut — это платформа, которая упрощает проведение оценки людьми в многоязычных задачах обработки естественного языка, предоставляя лёгкое решение для комплексной оценки с поддержкой различных протоколов. Платформа устраняет барьеры при организации человеческой оценки, которая является золотым стандартом для многоязычных NLP систем, но часто заменяется автоматическими метриками из-за сложности и высоких операционных затрат. Pearmut поддерживает стандартные протоколы оценки (DA, ESA, MQM), расширяемые под новые протоколы, и включает документный контекст, абсолютную и контрастную оценку, проверки внимания и стратегии активного обучения. Платформа делает надежную человеческую оценку практичным и регулярным компонентом разработки моделей вместо редких усилий.'}, 'en': {'title': 'Simplifying Human Evaluation in Multilingual NLP with Pearmut', 'desc': 'Pearmut is a platform designed to streamline human evaluation in multilingual natural language processing (NLP). It addresses the challenges of traditional evaluation methods, which are often complex and time-consuming, by offering a lightweight solution that supports various evaluation protocols and learning strategies. The platform focuses on machine translation tasks and allows for both standard and customizable evaluation approaches, making it easier for researchers to incorporate human evaluation into their workflows. By simplifying the process, Pearmut aims to make reliable human evaluation a regular part of model development and assessment.'}, 'zh': {'title': '简化多语言NLP的人类评估', 'desc': 'Pearmut是一个简化多语言自然语言处理（NLP）人类评估的平台，提供轻量级的端到端评估解决方案。它支持多种评估协议和学习策略，特别关注机器翻译任务。通过实现标准评估协议，Pearmut消除了常见的入门障碍，使人类评估变得像自动评估一样简单。该平台使得可靠的人类评估成为模型开发和诊断的常规组成部分，而不是偶尔的努力。'}}, 'authors': [], 'affiliations': [], 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.03236', 'title': 'MAGMA: A Multi-Graph based Agentic Memory Architecture for AI Agents', 'url': 'https://huggingface.co/papers/2601.03236', 'abstract': 'MAGMA is a multi-graph memory architecture that improves long-context reasoning in language models by separating memory representation from retrieval logic across semantic, temporal, causal, and entity dimensions.  \t\t\t\t\tAI-generated summary \t\t\t\t Memory-Augmented Generation (MAG) extends Large Language Models with external memory to support long-context reasoning, but existing approaches largely rely on semantic similarity over monolithic memory stores, entangling temporal, causal, and entity information. This design limits interpretability and alignment between query intent and retrieved evidence, leading to suboptimal reasoning accuracy. In this paper, we propose MAGMA, a multi-graph agentic memory architecture that represents each memory item across orthogonal semantic, temporal, causal, and entity graphs. MAGMA formulates retrieval as policy-guided traversal over these relational views, enabling query-adaptive selection and structured context construction. By decoupling memory representation from retrieval logic, MAGMA provides transparent reasoning paths and fine-grained control over retrieval. Experiments on LoCoMo and LongMemEval demonstrate that MAGMA consistently outperforms state-of-the-art agentic memory systems in long-horizon reasoning tasks.', 'score': 1, 'issue_id': 475, 'pub_date': '2026-01-06', 'pub_date_card': {'ru': '6 января', 'en': 'January 6', 'zh': '1月6日'}, 'hash': '89b8c625aa26fb05', 'authors': ['Dongming Jiang', 'Yi Li', 'Guanpeng Li', 'Bingzhe Li'], 'affiliations': ['University of Florida', 'University of Texas at Dallas'], 'pdf_title_img': 'assets/pdf/title_img/2601.03236.jpg', 'data': {'categories': ['#rag', '#graphs', '#long_context', '#interpretability', '#reasoning', '#agents', '#architecture'], 'emoji': '🧠', 'ru': {'title': 'Многомерная память для понимания длинного контекста', 'desc': 'MAGMA представляет многографовую архитектуру памяти для улучшения долгоконтекстного рассуждения в языковых моделях. Система разделяет представление памяти и логику извлечения информации, организуя её по семантическим, временным, причинно-следственным и сущностным измерениям. Вместо монолитного хранилища, ориентированного только на семантическую близость, MAGMA использует управляемый агентом поиск через несколько релационных графов. Это позволяет моделям достичь лучшей интерпретируемости и более точных результатов при решении сложных задач долгосрочного рассуждения.'}, 'en': {'title': 'MAGMA: Enhancing Long-Context Reasoning with Multi-Graph Memory', 'desc': 'MAGMA is a new memory architecture designed to enhance long-context reasoning in language models. It separates how memory is represented from how it is retrieved, using different graphs for semantic, temporal, causal, and entity information. This separation allows for better interpretability and alignment between what a query is asking and the evidence retrieved, improving reasoning accuracy. Experiments show that MAGMA outperforms existing memory systems in tasks that require understanding over long contexts.'}, 'zh': {'title': 'MAGMA：提升长上下文推理的多图记忆架构', 'desc': 'MAGMA是一种多图记忆架构，旨在改善语言模型中的长上下文推理。它通过在语义、时间、因果和实体维度上分离记忆表示与检索逻辑，提升了推理的准确性。与传统方法依赖于单一记忆存储的语义相似性不同，MAGMA允许更灵活的查询适应性选择和结构化上下文构建。实验结果表明，MAGMA在长时间推理任务中优于现有的记忆系统。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.04090', 'title': 'Gen3R: 3D Scene Generation Meets Feed-Forward Reconstruction', 'url': 'https://huggingface.co/papers/2601.04090', 'abstract': 'Gen3R combines foundational reconstruction models with video diffusion models to generate 3D scenes with RGB videos and geometric information through aligned latents.  \t\t\t\t\tAI-generated summary \t\t\t\t We present Gen3R, a method that bridges the strong priors of foundational reconstruction models and video diffusion models for scene-level 3D generation. We repurpose the VGGT reconstruction model to produce geometric latents by training an adapter on its tokens, which are regularized to align with the appearance latents of pre-trained video diffusion models. By jointly generating these disentangled yet aligned latents, Gen3R produces both RGB videos and corresponding 3D geometry, including camera poses, depth maps, and global point clouds. Experiments demonstrate that our approach achieves state-of-the-art results in single- and multi-image conditioned 3D scene generation. Additionally, our method can enhance the robustness of reconstruction by leveraging generative priors, demonstrating the mutual benefit of tightly coupling reconstruction and generative models.', 'score': 0, 'issue_id': 480, 'pub_date': '2026-01-07', 'pub_date_card': {'ru': '7 января', 'en': 'January 7', 'zh': '1月7日'}, 'hash': '5b7a5d3b7d8f9455', 'authors': ['Jiaxin Huang', 'Yuanbo Yang', 'Bangbang Yang', 'Lin Ma', 'Yuewen Ma', 'Yiyi Liao'], 'affiliations': ['ByteDance', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2601.04090.jpg', 'data': {'categories': ['#3d', '#multimodal', '#video', '#architecture', '#diffusion'], 'emoji': '🎬', 'ru': {'title': 'Совместная генерация видео и геометрии через выравненные латентные представления', 'desc': 'Gen3R объединяет модели реконструкции и видео-диффузионные модели для генерации трёхмерных сцен. Метод использует адаптер, обученный на токенах VGGT модели, для создания геометрических латентных представлений, которые выравниваются с представлениями внешнего вида из предобученной видео-диффузионной модели. Совместная генерация разделённых, но согласованных латентов позволяет Gen3R производить RGB видео и соответствующую трёхмерную геометрию, включая позиции камер, карты глубины и облака точек. Подход достигает лучших результатов при условной 3D генерации сцен из одного или нескольких изображений.'}, 'en': {'title': 'Bridging 3D Reconstruction and Video Generation with Gen3R', 'desc': 'Gen3R is a novel method that integrates foundational reconstruction models with video diffusion models to create 3D scenes from RGB videos and geometric data. It utilizes the VGGT reconstruction model to generate geometric latents, which are then aligned with appearance latents from pre-trained video diffusion models. By generating these aligned latents together, Gen3R can produce both realistic RGB videos and detailed 3D geometry, including camera poses and depth maps. The results show that Gen3R outperforms existing methods in 3D scene generation and enhances reconstruction robustness by combining generative and reconstruction techniques.'}, 'zh': {'title': 'Gen3R：重建与生成模型的完美结合', 'desc': 'Gen3R是一种结合基础重建模型和视频扩散模型的方法，用于生成具有RGB视频和几何信息的3D场景。该方法通过训练适配器，将VGGT重建模型的几何潜变量与预训练视频扩散模型的外观潜变量对齐。通过共同生成这些解耦但对齐的潜变量，Gen3R能够生成RGB视频及其对应的3D几何信息，包括相机姿态、深度图和全局点云。实验表明，该方法在单图像和多图像条件下的3D场景生成中达到了最先进的结果，并且通过利用生成先验增强了重建的鲁棒性。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.03955', 'title': 'ResTok: Learning Hierarchical Residuals in 1D Visual Tokenizers for Autoregressive Image Generation', 'url': 'https://huggingface.co/papers/2601.03955', 'abstract': 'A novel 1D visual tokenizer called Residual Tokenizer is introduced that incorporates hierarchical residuals to improve autoregressive image generation by leveraging vision-specific design principles rather than language modeling approaches.  \t\t\t\t\tAI-generated summary \t\t\t\t Existing 1D visual tokenizers for autoregressive (AR) generation largely follow the design principles of language modeling, as they are built directly upon transformers whose priors originate in language, yielding single-hierarchy latent tokens and treating visual data as flat sequential token streams. However, this language-like formulation overlooks key properties of vision, particularly the hierarchical and residual network designs that have long been essential for convergence and efficiency in visual models. To bring "vision" back to vision, we propose the Residual Tokenizer (ResTok), a 1D visual tokenizer that builds hierarchical residuals for both image tokens and latent tokens. The hierarchical representations obtained through progressively merging enable cross-level feature fusion at each layer, substantially enhancing representational capacity. Meanwhile, the semantic residuals between hierarchies prevent information overlap, yielding more concentrated latent distributions that are easier for AR modeling. Cross-level bindings consequently emerge without any explicit constraints. To accelerate the generation process, we further introduce a hierarchical AR generator that substantially reduces sampling steps by predicting an entire level of latent tokens at once rather than generating them strictly token-by-token. Extensive experiments demonstrate that restoring hierarchical residual priors in visual tokenization significantly improves AR image generation, achieving a gFID of 2.34 on ImageNet-256 with only 9 sampling steps. Code is available at https://github.com/Kwai-Kolors/ResTok.', 'score': 0, 'issue_id': 482, 'pub_date': '2026-01-07', 'pub_date_card': {'ru': '7 января', 'en': 'January 7', 'zh': '1月7日'}, 'hash': '89b963ed293fb10d', 'authors': ['Xu Zhang', 'Cheng Da', 'Huan Yang', 'Kun Gai', 'Ming Lu', 'Zhan Ma'], 'affiliations': ['Kolors Team, Kuaishou Technology', 'Vision Lab, Nanjing University'], 'pdf_title_img': 'assets/pdf/title_img/2601.03955.jpg', 'data': {'categories': ['#cv', '#training', '#architecture'], 'emoji': '🏗️', 'ru': {'title': 'Иерархические остатки возвращают видение в визуальное моделирование', 'desc': 'В работе представлен новый одномерный визуальный токенизатор под названием Residual Tokenizer, который использует иерархические остатки для улучшения автрегрессивной генерации изображений. В отличие от существующих подходов, заимствующих принципы из языкового моделирования, предложенный метод возвращает видение-специфичные свойства, включая иерархические архитектуры и остаточные связи. Токенизатор строит иерархические остатки как для токенов изображения, так и для скрытых токенов, обеспечивая кросс-уровневое слияние признаков и более концентрированные распределения. Введенный иерархический автрегрессивный генератор значительно ускоряет процесс, предсказывая целый уровень токенов за раз вместо генерирования их последовательно, достигая gFID 2.34 на ImageNet-256 всего за 9 шагов.'}, 'en': {'title': 'Revolutionizing Image Generation with Hierarchical Residuals', 'desc': 'The paper presents a new visual tokenizer called Residual Tokenizer (ResTok) designed to enhance autoregressive image generation. Unlike traditional tokenizers that mimic language models, ResTok utilizes hierarchical residuals to better capture the structure of visual data. This approach allows for improved feature fusion and reduces information overlap, leading to more effective latent distributions for modeling. Additionally, a hierarchical autoregressive generator is introduced, which accelerates the generation process by predicting multiple latent tokens simultaneously, resulting in significant performance improvements.'}, 'zh': {'title': '引入层次残差，提升图像生成能力', 'desc': '本文介绍了一种新型的1D视觉标记器，称为残差标记器（Residual Tokenizer），它通过引入层次残差来改善自回归图像生成。与传统的基于语言建模的方法不同，残差标记器利用视觉特定的设计原则，构建层次化的残差结构，以增强图像和潜在标记的表示能力。通过逐步合并获得的层次表示，能够在每一层实现跨层特征融合，从而提高模型的表现力。同时，层次之间的语义残差防止了信息重叠，使得潜在分布更加集中，便于自回归建模。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.00705', 'title': 'RGS-SLAM: Robust Gaussian Splatting SLAM with One-Shot Dense Initialization', 'url': 'https://huggingface.co/papers/2601.00705', 'abstract': 'RGS-SLAM presents a robust Gaussian-splatting SLAM framework that uses dense multi-view correspondences and DINOv3 descriptors for efficient, stable mapping with improved rendering fidelity.  \t\t\t\t\tAI-generated summary \t\t\t\t We introduce RGS-SLAM, a robust Gaussian-splatting SLAM framework that replaces the residual-driven densification stage of GS-SLAM with a training-free correspondence-to-Gaussian initialization. Instead of progressively adding Gaussians as residuals reveal missing geometry, RGS-SLAM performs a one-shot triangulation of dense multi-view correspondences derived from DINOv3 descriptors refined through a confidence-aware inlier classifier, generating a well-distributed and structure-aware Gaussian seed prior to optimization. This initialization stabilizes early mapping and accelerates convergence by roughly 20\\%, yielding higher rendering fidelity in texture-rich and cluttered scenes while remaining fully compatible with existing GS-SLAM pipelines. Evaluated on the TUM RGB-D and Replica datasets, RGS-SLAM achieves competitive or superior localization and reconstruction accuracy compared with state-of-the-art Gaussian and point-based SLAM systems, sustaining real-time mapping performance at up to 925 FPS.', 'score': 0, 'issue_id': 476, 'pub_date': '2026-12-28', 'pub_date_card': {'ru': '28 декабря', 'en': 'December 28', 'zh': '12月28日'}, 'hash': '1549408a2d070aca', 'authors': ['Wei-Tse Cheng', 'Yen-Jen Chiou', 'Yuan-Fu Yang'], 'affiliations': ['National Yang Ming Chiao Tung University'], 'pdf_title_img': 'assets/pdf/title_img/2601.00705.jpg', 'data': {'categories': [], 'emoji': '🗺️', 'ru': {'title': 'Инициализация через плотные соответствия для стабильного Гауссова SLAM', 'desc': 'Авторы представляют RGS-SLAM, мощный фреймворк одновременной локализации и картографирования, использующий Гауссовых сплаттинга для восстановления сцены. Вместо постепенного добавления Гауссовых функций по мере выявления пропущенной геометрии, метод выполняет одноразовую триангуляцию плотных соответствий между видами, полученных из DINOv3 дескрипторов. Инициализация Гауссовых параметров стабилизирует ранний этап картографирования и ускоряет сходимость оптимизации примерно на 20%, обеспечивая улучшенное качество синтеза изображений. Метод достигает конкурентных результатов по локализации и реконструкции на бенчмарках TUM RGB-D и Replica, сохраняя реальное время работы до 925 FPS.'}, 'en': {'title': 'RGS-SLAM: Fast and Accurate Mapping with Gaussian Splatting', 'desc': 'RGS-SLAM is a new framework for Simultaneous Localization and Mapping (SLAM) that enhances the process of creating 3D maps using Gaussian splatting. It introduces a method that initializes mapping using dense correspondences from DINOv3 descriptors, eliminating the need for a complex training phase. This approach allows for faster and more stable mapping by quickly generating a well-distributed Gaussian representation of the environment. RGS-SLAM has shown to improve accuracy and rendering quality in challenging scenes while maintaining high-speed performance, making it compatible with existing SLAM systems.'}, 'zh': {'title': 'RGS-SLAM：高效稳定的SLAM新框架', 'desc': 'RGS-SLAM是一种稳健的高斯点云SLAM框架，利用密集的多视角对应关系和DINOv3描述符进行高效、稳定的地图构建。它通过一种无训练的对应到高斯初始化方法，替代了GS-SLAM中的残差驱动密集化阶段。R
