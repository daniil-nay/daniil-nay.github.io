GS-SLAM一次性三角化密集的多视角对应关系，生成结构感知的高斯种子，从而加速收敛并提高渲染质量。经过TUM RGB-D和Replica数据集的评估，RGS-SLAM在定位和重建精度上与最先进的SLAM系统相比表现出色，且在高达925 FPS的速度下实现实时地图构建。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05432', 'title': 'Thinking with Map: Reinforced Parallel Map-Augmented Agent for Geolocalization', 'url': 'https://huggingface.co/papers/2601.05432', 'abstract': 'Large vision-language models are enhanced for image geolocalization by incorporating map-based reasoning and agent-in-the-map loop optimization, achieving superior accuracy compared to existing models.  \t\t\t\t\tAI-generated summary \t\t\t\t The image geolocalization task aims to predict the location where an image was taken anywhere on Earth using visual clues. Existing large vision-language model (LVLM) approaches leverage world knowledge, chain-of-thought reasoning, and agentic capabilities, but overlook a common strategy used by humans -- using maps. In this work, we first equip the model Thinking with Map ability and formulate it as an agent-in-the-map loop. We develop a two-stage optimization scheme for it, including agentic reinforcement learning (RL) followed by parallel test-time scaling (TTS). The RL strengthens the agentic capability of model to improve sampling efficiency, and the parallel TTS enables the model to explore multiple candidate paths before making the final prediction, which is crucial for geolocalization. To evaluate our method on up-to-date and in-the-wild images, we further present MAPBench, a comprehensive geolocalization training and evaluation benchmark composed entirely of real-world images. Experimental results show that our method outperforms existing open- and closed-source models on most metrics, specifically improving Acc@500m from 8.0\\% to 22.1\\% compared to Gemini-3-Pro with Google Search/Map grounded mode.', 'score': 129, 'issue_id': 522, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': '6130091a1c7cf83b', 'authors': ['Yuxiang Ji', 'Yong Wang', 'Ziyu Ma', 'Yiming Hu', 'Hailang Huang', 'Xuecai Hu', 'Guanhua Chen', 'Liaoni Wu', 'Xiangxiang Chu'], 'affiliations': ['AMAP, Alibaba Group', 'Southern University of Science and Technology', 'Xiamen University'], 'pdf_title_img': 'assets/pdf/title_img/2601.05432.jpg', 'data': {'categories': ['#benchmark', '#optimization', '#agents', '#cv', '#dataset', '#multimodal', '#rl', '#open_source', '#reasoning'], 'emoji': '🗺️', 'ru': {'title': 'Карты как компас: научим AI находить себя на планете', 'desc': 'В работе представлен метод улучшения больших визуально-языковых моделей для задачи геолокализации изображений путём интеграции карт и агентного подхода. Модель оснащена способностью взаимодействовать с картами через цикл «агент-в-карте», что позволяет ей рассуждать так же, как люди при определении местоположения. Для оптимизации предложена двухэтапная схема: обучение с подкреплением для улучшения агентных способностей и параллельное масштабирование во время инференса для исследования множественных гипотез. Авторы представили новый бенчмарк MAPBench с реальными изображениями и добились значительного улучшения точности предсказания координат по сравнению с существующими решениями.'}, 'en': {'title': 'Mapping the Future of Image Geolocalization', 'desc': "This paper presents an advanced approach to image geolocalization by integrating map-based reasoning into large vision-language models (LVLMs). The authors introduce a novel agent-in-the-map loop optimization that enhances the model's ability to utilize maps, a strategy often employed by humans. They implement a two-stage optimization process that includes reinforcement learning to boost the model's agentic capabilities and parallel test-time scaling for efficient path exploration. The proposed method significantly improves accuracy on real-world images, as demonstrated by their new benchmark, MAPBench, achieving notable performance gains over existing models."}, 'zh': {'title': '地图思维助力图像地理定位', 'desc': '本文提出了一种增强的大型视觉-语言模型，用于图像地理定位，通过引入基于地图的推理和地图中的代理循环优化，显著提高了准确性。图像地理定位任务旨在利用视觉线索预测图像拍摄地点，现有模型通常忽视了人类常用的地图策略。我们为模型赋予了地图思维能力，并将其形式化为代理-地图循环，采用了两阶段优化方案，包括代理强化学习和并行测试时间缩放。实验结果表明，我们的方法在大多数指标上超越了现有模型，特别是在500米准确率上从8.0%提升至22.1%。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.03017', 'title': 'MMFormalizer: Multimodal Autoformalization in the Wild', 'url': 'https://huggingface.co/papers/2601.03017', 'abstract': 'MMFormalizer enables multimodal autoformalization by integrating visual perception with formal mathematical reasoning, supporting complex physical domains from classical mechanics to quantum mechanics.  \t\t\t\t\tAI-generated summary \t\t\t\t Autoformalization, which translates natural language mathematics into formal statements to enable machine reasoning, faces fundamental challenges in the wild due to the multimodal nature of the physical world, where physics requires inferring hidden constraints (e.g., mass or energy) from visual elements. To address this, we propose MMFormalizer, which extends autoformalization beyond text by integrating adaptive grounding with entities from real-world mathematical and physical domains. MMFormalizer recursively constructs formal propositions from perceptually grounded primitives through recursive grounding and axiom composition, with adaptive recursive termination ensuring that every abstraction is supported by visual evidence and anchored in dimensional or axiomatic grounding. We evaluate MMFormalizer on a new benchmark, PhyX-AF, comprising 115 curated samples from MathVerse, PhyX, Synthetic Geometry, and Analytic Geometry, covering diverse multimodal autoformalization tasks. Results show that frontier models such as GPT-5 and Gemini-3-Pro achieve the highest compile and semantic accuracy, with GPT-5 excelling in physical reasoning, while geometry remains the most challenging domain. Overall, MMFormalizer provides a scalable framework for unified multimodal autoformalization, bridging perception and formal reasoning. To the best of our knowledge, this is the first multimodal autoformalization method capable of handling classical mechanics (derived from the Hamiltonian), as well as relativity, quantum mechanics, and thermodynamics. More details are available on our project page: MMFormalizer.github.io', 'score': 94, 'issue_id': 525, 'pub_date': '2026-01-06', 'pub_date_card': {'ru': '6 января', 'en': 'January 6', 'zh': '1月6日'}, 'hash': '3e0ad6513065ae3a', 'authors': ['Jing Xiong', 'Qi Han', 'Yunta Hsieh', 'Hui Shen', 'Huajian Xin', 'Chaofan Tao', 'Chenyang Zhao', 'Hengyuan Zhang', 'Taiqiang Wu', 'Zhen Zhang', 'Haochen Wang', 'Zhongwei Wan', 'Lingpeng Kong', 'Ngai Wong'], 'affiliations': ['Ohio State University', 'The University of Hong Kong', 'University of California, Los Angeles', 'University of California, Santa Barbara', 'University of Edinburgh', 'University of Michigan, Ann Arbor'], 'pdf_title_img': 'assets/pdf/title_img/2601.03017.jpg', 'data': {'categories': ['#math', '#dataset', '#benchmark', '#reasoning', '#science', '#multimodal'], 'emoji': '🔬', 'ru': {'title': 'Восприятие встречает доказательства: мультимодальная формализация физики и математики', 'desc': 'MMFormalizer — это система для мультимодальной автоформализации, которая объединяет визуальное восприятие с формальным математическим рассуждением. Система работает путём рекурсивного построения формальных утверждений из визуально обоснованных примитивов, используя адаптивное завершение рекурсии для обеспечения связи каждой абстракции с визуальными данными. Авторы предложили новый бенчмарк PhyX-AF с 115 примерами из различных доменов, включая классическую механику, квантовую механику и термодинамику. Эксперименты показали, что современные LLM-модели достигают высокой точности в компиляции и семантике, хотя геометрия остаётся наиболее сложной областью.'}, 'en': {'title': 'Bridging Visual Perception and Mathematical Reasoning with MMFormalizer', 'desc': 'MMFormalizer is a novel framework that combines visual perception with formal mathematical reasoning to enhance autoformalization across various physical domains. It addresses the challenges of translating natural language mathematics into formal statements by integrating adaptive grounding with real-world entities. The system constructs formal propositions from visual elements through recursive grounding and axiom composition, ensuring that each abstraction is supported by visual evidence. Evaluated on the PhyX-AF benchmark, MMFormalizer demonstrates superior performance in physical reasoning tasks, marking a significant advancement in multimodal autoformalization capabilities.'}, 'zh': {'title': '多模态自动形式化的桥梁', 'desc': 'MMFormalizer 是一种多模态自动形式化工具，它将视觉感知与形式数学推理相结合，支持从经典力学到量子力学的复杂物理领域。该方法通过适应性基础与现实世界的数学和物理实体整合，超越了文本的自动形式化。MMFormalizer 通过递归基础和公理组合，从感知基础构建形式命题，确保每个抽象都有视觉证据支持。我们的评估表明，MMFormalizer 在多模态自动形式化任务中表现出色，尤其在物理推理方面，展示了其在处理经典力学和量子力学等领域的能力。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.03319', 'title': 'CaricatureGS: Exaggerating 3D Gaussian Splatting Faces With Gaussian Curvature', 'url': 'https://huggingface.co/papers/2601.03319', 'abstract': 'A photorealistic 3D caricaturization framework combines Gaussian curvature-based surface exaggeration with 3D Gaussian Splatting to create controllable, realistic avatars with improved fidelity and real-time deformation capabilities.  \t\t\t\t\tAI-generated summary \t\t\t\t A photorealistic and controllable 3D caricaturization framework for faces is introduced. We start with an intrinsic Gaussian curvature-based surface exaggeration technique, which, when coupled with texture, tends to produce over-smoothed renders. To address this, we resort to 3D Gaussian Splatting (3DGS), which has recently been shown to produce realistic free-viewpoint avatars. Given a multiview sequence, we extract a FLAME mesh, solve a curvature-weighted Poisson equation, and obtain its exaggerated form. However, directly deforming the Gaussians yields poor results, necessitating the synthesis of pseudo-ground-truth caricature images by warping each frame to its exaggerated 2D representation using local affine transformations. We then devise a training scheme that alternates real and synthesized supervision, enabling a single Gaussian collection to represent both natural and exaggerated avatars. This scheme improves fidelity, supports local edits, and allows continuous control over the intensity of the caricature. In order to achieve real-time deformations, an efficient interpolation between the original and exaggerated surfaces is introduced. We further analyze and show that it has a bounded deviation from closed-form solutions. In both quantitative and qualitative evaluations, our results outperform prior work, delivering photorealistic, geometry-controlled caricature avatars.', 'score': 45, 'issue_id': 525, 'pub_date': '2026-01-06', 'pub_date_card': {'ru': '6 января', 'en': 'January 6', 'zh': '1月6日'}, 'hash': '10d82cf2b9d195c1', 'authors': ['Eldad Matmon', 'Amit Bracha', 'Noam Rotstein', 'Ron Kimmel'], 'affiliations': ['Technion Israel Institute of Technology, Haifa, Israel'], 'pdf_title_img': 'assets/pdf/title_img/2601.03319.jpg', 'data': {'categories': ['#multimodal', '#3d'], 'emoji': '🤪', 'ru': {'title': 'Фотореалистичные 3D-карикатуры через гауссовы сплаттинг и управление кривизной', 'desc': 'Предлагается система для создания фотореалистичных шаржей лиц на основе 3D-моделей, которая использует кривизну Гаусса для преувеличения черт лица. Авторы применяют технику 3D Gaussian Splatting для получения реалистичных аватаров с высокой точностью, избегая проблемы чрезмерной сглаженности поверхности. Система использует метод обучения с чередованием реальных и синтезированных данных, что позволяет одному набору гауссианов представлять как естественные, так и карикатурные версии аватара. Фреймворк поддерживает локальное редактирование, непрерывное управление интенсивностью карикатуры и обеспечивает деформации в реальном времени.'}, 'en': {'title': 'Real-Time Control of Photorealistic 3D Caricatures', 'desc': 'This paper presents a new framework for creating photorealistic 3D caricatures of faces that allows for real-time control and deformation. It combines Gaussian curvature-based surface exaggeration with 3D Gaussian Splatting to enhance the realism and fidelity of the avatars. The method involves extracting a FLAME mesh from multiview sequences and applying a curvature-weighted Poisson equation to achieve exaggerated forms. A novel training approach that alternates between real and synthesized images enables the framework to effectively represent both realistic and exaggerated avatars, resulting in superior performance compared to previous methods.'}, 'zh': {'title': '逼真的3D漫画化头像生成', 'desc': '本文介绍了一种逼真的3D漫画化框架，结合了基于高斯曲率的表面夸张和3D高斯点云技术，能够创建可控的真实头像。该方法首先使用高斯曲率进行表面夸张，但在与纹理结合时可能导致过于平滑的渲染效果。为了解决这个问题，研究者采用了3D高斯点云技术，能够生成真实的多视角头像。通过交替使用真实和合成的监督训练，该框架提高了头像的真实感，支持局部编辑，并允许对漫画效果的强度进行连续控制。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.06002', 'title': 'The Molecular Structure of Thought: Mapping the Topology of Long Chain-of-Thought Reasoning', 'url': 'https://huggingface.co/papers/2601.06002', 'abstract': 'Large language models struggle with long chain-of-thought reasoning due to unstable structural patterns, but a molecular-inspired approach using effective semantic isomers and distribution-transfer-graph methods improves training stability and performance.  \t\t\t\t\tAI-generated summary \t\t\t\t Large language models (LLMs) often fail to learn effective long chain-of-thought (Long CoT) reasoning from human or non-Long-CoT LLMs imitation. To understand this, we propose that effective and learnable Long CoT trajectories feature stable molecular-like structures in unified view, which are formed by three interaction types: Deep-Reasoning (covalent-like), Self-Reflection (hydrogen-bond-like), and Self-Exploration (van der Waals-like). Analysis of distilled trajectories reveals these structures emerge from Long CoT fine-tuning, not keyword imitation. We introduce Effective Semantic Isomers and show that only bonds promoting fast entropy convergence support stable Long CoT learning, while structural competition impairs training. Drawing on these findings, we present Mole-Syn, a distribution-transfer-graph method that guides synthesis of effective Long CoT structures, boosting performance and RL stability across benchmarks.', 'score': 37, 'issue_id': 522, 'pub_date': '2026-01-09', 'pub_date_card': {'ru': '9 января', 'en': 'January 9', 'zh': '1月9日'}, 'hash': '3f57cbb3429682eb', 'authors': ['Qiguang Chen', 'Yantao Du', 'Ziniu Li', 'Jinhao Liu', 'Songyao Duan', 'Jiarui Guo', 'Minghao Liu', 'Jiaheng Liu', 'Tong Yang', 'Ge Zhang', 'Libo Qin', 'Wanxiang Che', 'Wenhao Huang'], 'affiliations': ['2077AI Foundation', 'ByteDance Seed China', 'Central South University', 'LARG, SCIR, Harbin Institute of Technology', 'M-A-P', 'Nanjing University', 'Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2601.06002.jpg', 'data': {'categories': ['#architecture', '#reasoning', '#optimization', '#training'], 'emoji': '🧬', 'ru': {'title': 'Молекулярный подход к стабилизации цепочек длинных рассуждений в LLM', 'desc': 'В этой работе исследуется проблема обучения больших языковых моделей длинным цепочкам рассуждений, которые характеризуются нестабильными структурными паттернами. Авторы предлагают молекулярно-вдохновленный подход, рассматривая эффективные траектории рассуждений как структуры с тремя типами взаимодействий: глубокое рассуждение, самоотражение и самоисследование. Они вводят концепцию эффективных семантических изомеров и показывают, что только связи, способствующие быстрой сходимости энтропии, поддерживают стабильное обучение. Метод Mole-Syn использует граф трансферта распределений для синтеза эффективных структур рассуждений, улучшая производительность и стабильность обучения с подкреплением.'}, 'en': {'title': 'Molecular Structures Enhance Long Chain-of-Thought Reasoning in LLMs', 'desc': 'This paper addresses the challenges that large language models (LLMs) face in performing long chain-of-thought (Long CoT) reasoning. It introduces a molecular-inspired framework that utilizes stable structural patterns, likening reasoning trajectories to molecular structures formed by different types of interactions. The authors propose Effective Semantic Isomers to enhance training stability, emphasizing that certain bonds are crucial for effective learning. Additionally, they present Mole-Syn, a method that improves the synthesis of Long CoT structures, leading to better performance and reinforcement learning stability.'}, 'zh': {'title': '分子启发的长链推理提升方法', 'desc': '大型语言模型在长链推理方面表现不佳，主要是因为其结构模式不稳定。我们提出了一种分子启发的方法，通过有效的语义异构体和分布转移图方法来提高训练的稳定性和性能。研究表明，稳定的分子结构可以通过深度推理、自我反思和自我探索三种交互类型形成，从而促进长链推理的学习。最终，我们提出了Mole-Syn方法，能够有效指导长链推理结构的合成，提升模型在各项基准测试中的表现和强化学习的稳定性。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.06021', 'title': 'Chaining the Evidence: Robust Reinforcement Learning for Deep Search Agents with Citation-Aware Rubric Rewards', 'url': 'https://huggingface.co/papers/2601.06021', 'abstract': "A citation-aware reward framework and policy optimization method improve deep search agents' reasoning comprehensiveness and factual accuracy while reducing shortcut exploitation and hallucinations.  \t\t\t\t\tAI-generated summary \t\t\t\t Reinforcement learning (RL) has emerged as a critical technique for enhancing LLM-based deep search agents. However, existing approaches primarily rely on binary outcome rewards, which fail to capture the comprehensiveness and factuality of agents' reasoning process, and often lead to undesirable behaviors such as shortcut exploitation and hallucinations. To address these limitations, we propose Citation-aware Rubric Rewards (CaRR), a fine-grained reward framework for deep search agents that emphasizes reasoning comprehensiveness, factual grounding, and evidence connectivity. CaRR decomposes complex questions into verifiable single-hop rubrics and requires agents to satisfy these rubrics by explicitly identifying hidden entities, supporting them with correct citations, and constructing complete evidence chains that link to the predicted answer. We further introduce Citation-aware Group Relative Policy Optimization (C-GRPO), which combines CaRR and outcome rewards for training robust deep search agents. Experiments show that C-GRPO consistently outperforms standard outcome-based RL baselines across multiple deep search benchmarks. Our analysis also validates that C-GRPO effectively discourages shortcut exploitation, promotes comprehensive, evidence-grounded reasoning, and exhibits strong generalization to open-ended deep research tasks. Our code and data are available at https://github.com/THUDM/CaRR.", 'score': 30, 'issue_id': 522, 'pub_date': '2026-01-09', 'pub_date_card': {'ru': '9 января', 'en': 'January 9', 'zh': '1月9日'}, 'hash': '2c4d9d165dc12ad2', 'authors': ['Jiajie Zhang', 'Xin Lv', 'Ling Feng', 'Lei Hou', 'Juanzi Li'], 'affiliations': ['Tsinghua University', 'Zhipu AI'], 'pdf_title_img': 'assets/pdf/title_img/2601.06021.jpg', 'data': {'categories': ['#rlhf', '#benchmark', '#optimization', '#hallucinations', '#rl', '#training', '#open_source', '#reasoning'], 'emoji': '🔗', 'ru': {'title': 'Награды с осознанием цитирований для честного глубокого поиска', 'desc': 'В работе предложена система наград Citation-aware Rubric Rewards (CaRR), которая оценивает качество рассуждений агентов глубокого поиска на основе полноты доказательств и корректности цитирований. Авторы разработали метод оптимизации политики C-GRPO, который комбинирует детализированные награды CaRR с исходными результатами для обучения устойчивых агентов. Подход требует от агентов разложить сложные вопросы на проверяемые подзадачи и построить полные цепочки доказательств с явными ссылками на источники. Эксперименты показывают, что метод эффективно снижает галлюцинации и использование ярлыков, одновременно улучшая обобщение на открытые исследовательские задачи.'}, 'en': {'title': 'Enhancing Deep Search Agents with Citation-Aware Rewards', 'desc': 'This paper introduces a new reward framework called Citation-aware Rubric Rewards (CaRR) to enhance the reasoning abilities of deep search agents in reinforcement learning. Traditional methods use simple binary rewards, which can lead to poor reasoning and inaccuracies, such as shortcut exploitation and hallucinations. CaRR focuses on breaking down complex questions into simpler, verifiable components that require agents to provide evidence and citations for their answers. Additionally, the paper presents Citation-aware Group Relative Policy Optimization (C-GRPO), which integrates CaRR with outcome rewards to train more effective and reliable deep search agents.'}, 'zh': {'title': '提升深度搜索代理推理的全面性与准确性', 'desc': '本文提出了一种新的奖励框架，称为引用意识评分奖励（CaRR），旨在提高深度搜索代理的推理全面性和事实准确性。传统的强化学习方法主要依赖于二元结果奖励，无法有效捕捉代理推理过程的复杂性，容易导致捷径利用和幻觉现象。CaRR通过将复杂问题分解为可验证的单步评分，要求代理明确识别隐藏实体，并用正确的引用支持它们，从而构建完整的证据链。我们还引入了引用意识组相对策略优化（C-GRPO），结合CaRR和结果奖励，训练出更强大的深度搜索代理。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05808', 'title': 'EnvScaler: Scaling Tool-Interactive Environments for LLM Agent via Programmatic Synthesis', 'url': 'https://huggingface.co/papers/2601.05808', 'abstract': "EnvScaler automates the creation of tool-interaction environments through programmatic synthesis, enhancing LLM performance in complex multi-turn, multi-tool tasks via supervised fine-tuning and reinforcement learning.  \t\t\t\t\tAI-generated summary \t\t\t\t Large language models (LLMs) are expected to be trained to act as agents in various real-world environments, but this process relies on rich and varied tool-interaction sandboxes. However, access to real systems is often restricted; LLM-simulated environments are prone to hallucinations and inconsistencies; and manually built sandboxes are hard to scale. In this paper, we propose EnvScaler, an automated framework for scalable tool-interaction environments via programmatic synthesis. EnvScaler comprises two components. First, SkelBuilder constructs diverse environment skeletons through topic mining, logic modeling, and quality evaluation. Then, ScenGenerator generates multiple task scenarios and rule-based trajectory validation functions for each environment. With EnvScaler, we synthesize 191 environments and about 7K scenarios, and apply them to Supervised Fine-Tuning (SFT) and Reinforcement Learning (RL) for Qwen3 series models. Results on three benchmarks show that EnvScaler significantly improves LLMs' ability to solve tasks in complex environments involving multi-turn, multi-tool interactions. We release our code and data at https://github.com/RUC-NLPIR/EnvScaler.", 'score': 24, 'issue_id': 522, 'pub_date': '2026-01-09', 'pub_date_card': {'ru': '9 января', 'en': 'January 9', 'zh': '1月9日'}, 'hash': '7fb43c28ab2879e9', 'authors': ['Xiaoshuai Song', 'Haofei Chang', 'Guanting Dong', 'Yutao Zhu', 'Zhicheng Dou', 'Ji-Rong Wen'], 'affiliations': ['Gaoling School of Artificial Intelligence, Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2601.05808.jpg', 'data': {'categories': ['#rl', '#dataset', '#agents', '#training'], 'emoji': '🏗️', 'ru': {'title': 'Автоматизация синтеза окружений для обучения агентов на основе LLM', 'desc': 'EnvScaler — это фреймворк для автоматизированного создания сред взаимодействия с инструментами с помощью синтеза программ. Система состоит из двух компонентов: SkelBuilder генерирует разнообразные скелеты окружений через майнинг тематик и логическое моделирование, а ScenGenerator создаёт множество сценариев задач и функции валидации траекторий. Синтезированные окружения и сценарии используются для обучения LLM через supervised fine-tuning и reinforcement learning. Экспериментальные результаты демонстрируют значительное улучшение способности LLM решать сложные задачи с многоступенчатым взаимодействием и использованием нескольких инструментов.'}, 'en': {'title': 'Automating Tool-Interaction Environments for Enhanced LLM Performance', 'desc': 'EnvScaler is a framework designed to automate the creation of environments where large language models (LLMs) can interact with various tools. It uses programmatic synthesis to generate diverse and scalable tool-interaction environments, addressing the limitations of manual sandbox creation. The framework consists of two main components: SkelBuilder, which creates environment skeletons, and ScenGenerator, which produces task scenarios and validation functions. By applying EnvScaler, researchers have synthesized numerous environments and scenarios, leading to significant improvements in LLM performance on complex multi-turn tasks.'}, 'zh': {'title': '自动化工具交互环境的合成与优化', 'desc': 'EnvScaler 是一个自动化框架，通过程序合成来创建可扩展的工具交互环境，从而提升大型语言模型（LLM）在复杂多轮、多工具任务中的表现。该框架包含两个主要组件：SkelBuilder 用于通过主题挖掘、逻辑建模和质量评估构建多样化的环境骨架；ScenGenerator 则为每个环境生成多个任务场景和基于规则的轨迹验证函数。通过 EnvScaler，我们合成了 191 个环境和约 7000 个场景，并将其应用于监督微调（SFT）和强化学习（RL），显著提高了 LLM 在复杂环境中的任务解决能力。我们的代码和数据已在 https://github.com/RUC-NLPIR/EnvScaler 发布。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.04720', 'title': 'Qwen3-VL-Embedding and Qwen3-VL-Reranker: A Unified Framework for State-of-the-Art Multimodal Retrieval and Ranking', 'url': 'https://huggingface.co/papers/2601.04720', 'abstract': 'The Qwen3-VL-Embedding and Qwen3-VL-Reranker models form an end-to-end multimodal search pipeline, leveraging multi-stage training and cross-attention mechanisms to achieve high-precision retrieval across diverse modalities.  \t\t\t\t\tAI-generated summary \t\t\t\t In this report, we introduce the Qwen3-VL-Embedding and Qwen3-VL-Reranker model series, the latest extensions of the Qwen family built on the Qwen3-VL foundation model. Together, they provide an end-to-end pipeline for high-precision multimodal search by mapping diverse modalities, including text, images, document images, and video, into a unified representation space. The Qwen3-VL-Embedding model employs a multi-stage training paradigm, progressing from large-scale contrastive pre-training to reranking model distillation, to generate semantically rich high-dimensional vectors. It supports Matryoshka Representation Learning, enabling flexible embedding dimensions, and handles inputs up to 32k tokens. Complementing this, Qwen3-VL-Reranker performs fine-grained relevance estimation for query-document pairs using a cross-encoder architecture with cross-attention mechanisms. Both model series inherit the multilingual capabilities of Qwen3-VL, supporting more than 30 languages, and are released in 2B and 8B parameter sizes to accommodate diverse deployment requirements. Empirical evaluations demonstrate that the Qwen3-VL-Embedding series achieves state-of-the-art results across diverse multimodal embedding evaluation benchmarks. Specifically, Qwen3-VL-Embedding-8B attains an overall score of 77.8 on MMEB-V2, ranking first among all models (as of January 8, 2025). This report presents the architecture, training methodology, and practical capabilities of the series, demonstrating their effectiveness on various multimodal retrieval tasks, including image-text retrieval, visual question answering, and video-text matching.', 'score': 20, 'issue_id': 524, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': 'f64f73630c899742', 'authors': ['Mingxin Li', 'Yanzhao Zhang', 'Dingkun Long', 'Keqin Chen', 'Sibo Song', 'Shuai Bai', 'Zhibo Yang', 'Pengjun Xie', 'An Yang', 'Dayiheng Liu', 'Jingren Zhou', 'Junyang Lin'], 'affiliations': ['Tongyi Lab, Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2601.04720.jpg', 'data': {'categories': ['#multilingual', '#benchmark', '#rag', '#open_source', '#training', '#architecture', '#multimodal'], 'emoji': '🔍', 'ru': {'title': 'Единое пространство для поиска во всех модальностях', 'desc': 'В работе представлены модели Qwen3-VL-Embedding и Qwen3-VL-Reranker, которые формируют полный конвейер мультимодального поиска, объединяя текст, изображения, документы и видео в единое представительное пространство. Модель Qwen3-VL-Embedding использует многоэтапное обучение с контрастивной предварительной подготовкой и дистилляцией моделей переранжирования для создания семантически богатых векторных представлений. Qwen3-VL-Reranker выполняет точную оценку релевантности запрос-документ с помощью кросс-кодера и механизмов кросс-внимания. Обе модели поддерживают более 30 языков, доступны в размерах 2B и 8B параметров и достигают лучших результатов на бенчмарках мультимодальных эмбеддингов.'}, 'en': {'title': 'Revolutionizing Multimodal Search with Qwen3 Models', 'desc': 'The Qwen3-VL-Embedding and Qwen3-VL-Reranker models create a powerful system for searching across different types of data, like text and images. They use advanced training techniques and cross-attention to improve how well they find relevant information. The embedding model generates detailed representations of data, while the reranker fine-tunes the results to ensure the best matches are highlighted. Together, they support multiple languages and have shown top performance in multimodal search tasks.'}, 'zh': {'title': '高精度多模态搜索的未来', 'desc': 'Qwen3-VL-Embedding和Qwen3-VL-Reranker模型构成了一个端到端的多模态搜索管道，利用多阶段训练和交叉注意力机制，实现高精度的检索。这些模型将文本、图像、文档图像和视频等多种模态映射到统一的表示空间。Qwen3-VL-Embedding模型采用多阶段训练，从大规模对比预训练到重排序模型蒸馏，生成语义丰富的高维向量。Qwen3-VL-Reranker则使用交叉编码器架构进行细粒度相关性估计，支持多语言，适应不同的部署需求。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05930', 'title': 'Can We Predict Before Executing Machine Learning Agents?', 'url': 'https://huggingface.co/papers/2601.05930', 'abstract': 'Autonomous machine learning agents overcome execution bottlenecks by predicting outcomes before physical execution, achieving faster convergence and improved performance through a predict-then-verify approach.  \t\t\t\t\tAI-generated summary \t\t\t\t Autonomous machine learning agents have revolutionized scientific discovery, yet they remain constrained by a Generate-Execute-Feedback paradigm. Previous approaches suffer from a severe Execution Bottleneck, as hypothesis evaluation relies strictly on expensive physical execution. To bypass these physical constraints, we internalize execution priors to substitute costly runtime checks with instantaneous predictive reasoning, drawing inspiration from World Models. In this work, we formalize the task of Data-centric Solution Preference and construct a comprehensive corpus of 18,438 pairwise comparisons. We demonstrate that LLMs exhibit significant predictive capabilities when primed with a Verified Data Analysis Report, achieving 61.5% accuracy and robust confidence calibration. Finally, we instantiate this framework in FOREAGENT, an agent that employs a Predict-then-Verify loop, achieving a 6x acceleration in convergence while surpassing execution-based baselines by +6%. Our code and dataset will be publicly available soon at https://github.com/zjunlp/predict-before-execute.', 'score': 19, 'issue_id': 522, 'pub_date': '2026-01-09', 'pub_date_card': {'ru': '9 января', 'en': 'January 9', 'zh': '1月9日'}, 'hash': 'f17fbcab3adc48b7', 'authors': ['Jingsheng Zheng', 'Jintian Zhang', 'Yujie Luo', 'Yuren Mao', 'Yunjun Gao', 'Lun Du', 'Huajun Chen', 'Ningyu Zhang'], 'affiliations': ['Ant Group', 'Zhejiang University', 'Zhejiang University - Ant Group Joint Laboratory of Knowledge Graph'], 'pdf_title_img': 'assets/pdf/title_img/2601.05930.jpg', 'data': {'categories': ['#benchmark', '#agents', '#dataset', '#open_source', '#science'], 'emoji': '🔮', 'ru': {'title': 'Предсказать прежде, чем выполнить: ускорение агентов через внутреннее моделирование', 'desc': 'Автономные агенты машинного обучения страдают от узкого места выполнения, когда проверка гипотез требует дорогостоящих физических экспериментов. Авторы предлагают предсказывать результаты выполнения до их реального проведения, используя модели мира и способности больших языковых моделей. Для этого они создали датасет из 18,438 попарных сравнений и показали, что LLM могут достичь 61.5% точности в предсказании предпочтений решений. Предложенный агент FOREAGENT использует цикл предсказания-проверки и достигает 6-кратного ускорения сходимости при улучшении качества на 6% по сравнению с базовыми подходами.'}, 'en': {'title': 'Predict Before You Execute: Accelerating Machine Learning Agents', 'desc': 'This paper introduces autonomous machine learning agents that enhance performance by predicting outcomes before actual execution, thus addressing the Execution Bottleneck in traditional methods. By using a Predict-then-Verify approach, these agents can achieve faster convergence and improved results without relying solely on costly physical execution. The authors formalize the concept of Data-centric Solution Preference and create a dataset of 18,438 comparisons to evaluate predictive capabilities. The proposed agent, FOREAGENT, demonstrates a significant acceleration in convergence and outperforms existing execution-based methods.'}, 'zh': {'title': '预测先行，执行更快！', 'desc': '自主机器学习代理通过在物理执行之前预测结果，克服了执行瓶颈，从而实现更快的收敛和更好的性能。这种方法采用了预测-验证的策略，避免了依赖昂贵的物理执行来评估假设。我们构建了一个包含18,438对比较的综合语料库，并证明了大型语言模型在经过验证的数据分析报告的引导下，具有显著的预测能力。最终，我们在FOREAGENT中实现了这一框架，该代理通过预测-验证循环实现了6倍的收敛加速，并超越了基于执行的基线。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05882', 'title': 'An Empirical Study on Preference Tuning Generalization and Diversity Under Domain Shift', 'url': 'https://huggingface.co/papers/2601.05882', 'abstract': 'Preference tuning of language models shows varying generalization capabilities under domain shift, with pseudo-labeling adaptation strategies effectively reducing performance degradation in summarization and question-answering tasks.  \t\t\t\t\tAI-generated summary \t\t\t\t Preference tuning aligns pretrained language models to human judgments of quality, helpfulness, or safety by optimizing over explicit preference signals rather than likelihood alone. Prior work has shown that preference-tuning degrades performance and reduces helpfulness when evaluated outside the training domain. However, the extent to which adaptation strategies mitigate this domain shift remains unexplored. We address this challenge by conducting a comprehensive and systematic study of alignment generalization under domain shift. We compare five popular alignment objectives and various adaptation strategies from source to target, including target-domain supervised fine-tuning and pseudo-labeling, across summarization and question-answering helpfulness tasks. Our findings reveal systematic differences in generalization across alignment objectives under domain shift. We show that adaptation strategies based on pseudo-labeling can substantially reduce domain-shift degradation', 'score': 18, 'issue_id': 534, 'pub_date': '2026-01-09', 'pub_date_card': {'ru': '9 января', 'en': 'January 9', 'zh': '1月9日'}, 'hash': '807f9304c133b53f', 'authors': ['Constantinos Karouzos', 'Xingwei Tan', 'Nikolaos Aletras'], 'affiliations': ['School of Computer Science University of Sheffield, UK'], 'pdf_title_img': 'assets/pdf/title_img/2601.05882.jpg', 'data': {'categories': ['#alignment', '#training', '#rlhf', '#transfer_learning'], 'emoji': '🎯', 'ru': {'title': 'Адаптация языковых моделей при смене области через псевдоразметку', 'desc': 'В статье исследуется, как языковые модели, которые были настроены на предпочтения пользователей, работают когда переходят на новые области данных. Авторы сравнивают пять различных методов выравнивания моделей и несколько стратегий адаптации, включая дообучение на размеченных данных целевой области и псевдоразметку. Результаты показывают, что разные методы выравнивания по-разному справляются с переходом между областями, и что стратегии адаптации на основе псевдоразметки наиболее эффективны. Исследование проведено на задачах суммаризации текстов и ответов на вопросы с целью предсказания полезности ответов.'}, 'en': {'title': 'Mitigating Domain Shift in Language Model Preference Tuning', 'desc': 'This paper investigates how preference tuning of language models can be affected by changes in the domain of the data. Preference tuning aims to align models with human preferences for quality and helpfulness, but it often leads to performance drops when applied to new domains. The authors explore various adaptation strategies, particularly focusing on pseudo-labeling, to see how they can help maintain performance in summarization and question-answering tasks. Their results indicate that certain adaptation methods can significantly lessen the negative impact of domain shifts on model performance.'}, 'zh': {'title': '伪标签策略助力语言模型领域适应', 'desc': '本论文研究了语言模型的偏好调优在领域转移下的泛化能力。通过伪标签适应策略，能够有效减少在摘要和问答任务中的性能下降。我们比较了五种流行的对齐目标和多种适应策略，发现不同的对齐目标在领域转移下的泛化表现存在系统性差异。结果表明，基于伪标签的适应策略可以显著降低领域转移带来的性能下降。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.04786', 'title': 'AgentOCR: Reimagining Agent History via Optical Self-Compression', 'url': 'https://huggingface.co/papers/2601.04786', 'abstract': 'AgentOCR reduces token consumption in agentic systems by representing interaction history as visual tokens and employing visual caching and self-compression techniques.  \t\t\t\t\tAI-generated summary \t\t\t\t Recent advances in large language models (LLMs) enable agentic systems trained with reinforcement learning (RL) over multi-turn interaction trajectories, but practical deployment is bottlenecked by rapidly growing textual histories that inflate token budgets and memory usage. We introduce AgentOCR, a framework that exploits the superior information density of visual tokens by representing the accumulated observation-action history as a compact rendered image. To make multi-turn rollouts scalable, AgentOCR proposes segment optical caching. By decomposing history into hashable segments and maintaining a visual cache, this mechanism eliminates redundant re-rendering. Beyond fixed rendering, AgentOCR introduces agentic self-compression, where the agent actively emits a compression rate and is trained with compression-aware reward to adaptively balance task success and token efficiency. We conduct extensive experiments on challenging agentic benchmarks, ALFWorld and search-based QA. Remarkably, results demonstrate that AgentOCR preserves over 95\\% of text-based agent performance while substantially reducing token consumption (>50\\%), yielding consistent token and memory efficiency. Our further analysis validates a 20x rendering speedup from segment optical caching and the effective strategic balancing of self-compression.', 'score': 18, 'issue_id': 523, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': 'a8a1ae23f28f1d1a', 'authors': ['Lang Feng', 'Fuchao Yang', 'Feng Chen', 'Xin Cheng', 'Haiyang Xu', 'Zhenglin Wan', 'Ming Yan', 'Bo An'], 'affiliations': ['Nanyang Technological University, Singapore', 'Tongyi Lab, Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2601.04786.jpg', 'data': {'categories': ['#cv', '#agents', '#inference', '#rl'], 'emoji': '🖼️', 'ru': {'title': 'Визуальное кэширование для экономии токенов в агентных системах', 'desc': 'AgentOCR — это фреймворк, который снижает потребление токенов в агентных системах, преобразуя историю взаимодействия в компактные визуальные токены вместо текстовых. Система использует сегментное оптическое кэширование, которое исключает избыточный пересчёт истории путём хеширования и кэширования визуальных представлений. Агент самостоятельно выбирает степень сжатия и обучается с помощью вознаграждения, чувствительного к сжатию, чтобы адаптивно балансировать успех задачи и эффективность токенов. На сложных бенчмарках AgentOCR сохраняет более 95% производительности текстовых агентов при сокращении потребления токенов более чем на 50%.'}, 'en': {'title': 'Efficient Interaction with Visual Tokens in Agentic Systems', 'desc': 'AgentOCR is a novel framework designed to enhance the efficiency of agentic systems by minimizing token usage during multi-turn interactions. It achieves this by converting interaction history into visual tokens, which are more information-dense than text. The framework employs segment optical caching to avoid redundant rendering of similar histories, significantly speeding up processing. Additionally, AgentOCR incorporates self-compression techniques that allow the agent to adaptively manage its performance and token efficiency, leading to substantial reductions in token consumption while maintaining high performance levels.'}, 'zh': {'title': 'AgentOCR：高效的视觉标记与自我压缩技术', 'desc': 'AgentOCR 是一种新框架，通过将交互历史表示为视觉标记，显著减少了代理系统中的令牌消耗。它利用视觉缓存和自我压缩技术，使得多轮交互的处理更加高效。通过将历史分解为可哈希的段并维护视觉缓存，AgentOCR 避免了冗余的重新渲染。实验结果表明，AgentOCR 在保持高性能的同时，令牌消耗减少超过 50%，并实现了显著的内存效率。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05966', 'title': 'VideoAR: Autoregressive Video Generation via Next-Frame & Scale Prediction', 'url': 'https://huggingface.co/papers/2601.05966', 'abstract': 'VideoAR presents a large-scale visual autoregressive framework for video generation that combines multi-scale next-frame prediction with autoregressive modeling, achieving state-of-the-art results with improved efficiency and temporal consistency.  \t\t\t\t\tAI-generated summary \t\t\t\t Recent advances in video generation have been dominated by diffusion and flow-matching models, which produce high-quality results but remain computationally intensive and difficult to scale. In this work, we introduce VideoAR, the first large-scale Visual Autoregressive (VAR) framework for video generation that combines multi-scale next-frame prediction with autoregressive modeling. VideoAR disentangles spatial and temporal dependencies by integrating intra-frame VAR modeling with causal next-frame prediction, supported by a 3D multi-scale tokenizer that efficiently encodes spatio-temporal dynamics. To improve long-term consistency, we propose Multi-scale Temporal RoPE, Cross-Frame Error Correction, and Random Frame Mask, which collectively mitigate error propagation and stabilize temporal coherence. Our multi-stage pretraining pipeline progressively aligns spatial and temporal learning across increasing resolutions and durations. Empirically, VideoAR achieves new state-of-the-art results among autoregressive models, improving FVD on UCF-101 from 99.5 to 88.6 while reducing inference steps by over 10x, and reaching a VBench score of 81.74-competitive with diffusion-based models an order of magnitude larger. These results demonstrate that VideoAR narrows the performance gap between autoregressive and diffusion paradigms, offering a scalable, efficient, and temporally consistent foundation for future video generation research.', 'score': 13, 'issue_id': 522, 'pub_date': '2026-01-09', 'pub_date_card': {'ru': '9 января', 'en': 'January 9', 'zh': '1月9日'}, 'hash': 'e8ed88c8c20040fb', 'authors': ['Longbin Ji', 'Xiaoxiong Liu', 'Junyuan Shang', 'Shuohuan Wang', 'Yu Sun', 'Hua Wu', 'Haifeng Wang'], 'affiliations': ['Baidu'], 'pdf_title_img': 'assets/pdf/title_img/2601.05966.jpg', 'data': {'categories': ['#architecture', '#benchmark', '#video', '#training'], 'emoji': '🎬', 'ru': {'title': 'Авторегрессивное видео: эффективность диффузии в скорости генерации', 'desc': 'VideoAR представляет первую крупномасштабную автарегрессивную архитектуру для генерации видео, которая комбинирует многомасштабное предсказание следующего кадра с авторегрессивным моделированием. Модель использует 3D многомасштабный токенизатор для эффективного кодирования пространственно-временной динамики и разделяет пространственные и временные зависимости. Для улучшения долгосрочной согласованности авторы предложили несколько методов, включая многомасштабный Temporal RoPE и корректировку ошибок между кадрами, которые снижают накопление ошибок. VideoAR достигает результатов, сопоставимых с диффузионными моделями, при этом требуя в 10 раз меньше шагов и демонстрируя масштабируемость авторегрессивного подхода в генерации видео.'}, 'en': {'title': 'VideoAR: Efficient and Consistent Video Generation with Autoregressive Modeling', 'desc': 'VideoAR is a novel framework for generating videos using a visual autoregressive approach that enhances efficiency and temporal consistency. It integrates multi-scale next-frame prediction with autoregressive modeling to effectively manage spatial and temporal dependencies. The framework employs techniques like Multi-scale Temporal RoPE and Cross-Frame Error Correction to reduce errors and maintain coherence over time. VideoAR sets new benchmarks in video generation, outperforming previous autoregressive models while significantly cutting down on computational requirements.'}, 'zh': {'title': 'VideoAR：高效一致的视频生成新框架', 'desc': 'VideoAR是一种大规模的视觉自回归框架，用于视频生成，结合了多尺度的下一帧预测和自回归建模，取得了先进的效率和时间一致性。该方法通过将帧内自回归建模与因果下一帧预测相结合，解耦了空间和时间依赖性。为了提高长期一致性，VideoAR提出了多尺度时间RoPE、跨帧误差修正和随机帧掩码等技术，减少了错误传播并稳定了时间连贯性。实验结果表明，VideoAR在自回归模型中达到了新的最先进结果，显著提高了性能并减少了推理步骤。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05905', 'title': 'Illusions of Confidence? Diagnosing LLM Truthfulness via Neighborhood Consistency', 'url': 'https://huggingface.co/papers/2601.05905', 'abstract': 'Large language models exhibit brittle beliefs under contextual perturbations, which are better measured by structural consistency metrics and addressed through structure-aware training methods.  \t\t\t\t\tAI-generated summary \t\t\t\t As Large Language Models (LLMs) are increasingly deployed in real-world settings, correctness alone is insufficient. Reliable deployment requires maintaining truthful beliefs under contextual perturbations. Existing evaluations largely rely on point-wise confidence like Self-Consistency, which can mask brittle belief. We show that even facts answered with perfect self-consistency can rapidly collapse under mild contextual interference. To address this gap, we propose Neighbor-Consistency Belief (NCB), a structural measure of belief robustness that evaluates response coherence across a conceptual neighborhood. To validate the efficiency of NCB, we introduce a new cognitive stress-testing protocol that probes outputs stability under contextual interference. Experiments across multiple LLMs show that the performance of high-NCB data is relatively more resistant to interference. Finally, we present Structure-Aware Training (SAT), which optimizes context-invariant belief structure and reduces long-tail knowledge brittleness by approximately 30%. Code will be available at https://github.com/zjunlp/belief.', 'score': 12, 'issue_id': 522, 'pub_date': '2026-01-09', 'pub_date_card': {'ru': '9 января', 'en': 'January 9', 'zh': '1月9日'}, 'hash': '30111934330923b5', 'authors': ['Haoming Xu', 'Ningyuan Zhao', 'Yunzhi Yao', 'Weihong Xu', 'Hongru Wang', 'Xinle Deng', 'Shumin Deng', 'Jeff Z. Pan', 'Huajun Chen', 'Ningyu Zhang'], 'affiliations': ['NUS-NCS Joint Lab', 'National University of Singapore', 'University of Edinburgh', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2601.05905.jpg', 'data': {'categories': [], 'emoji': '🏗️', 'ru': {'title': 'Укрепление структурной надёжности убеждений языковых моделей', 'desc': 'В работе показано, что большие языковые модели демонстрируют хрупкие убеждения при изменении контекста, которые плохо измеряются традиционными метриками вроде Self-Consistency. Авторы предлагают новую метрику Neighbor-Consistency Belief (NCB), которая оценивает согласованность ответов модели в концептуальной окрестности фактов. Они разработали специальный протокол стресс-тестирования для проверки стабильности выходов моделей под влиянием контекстных помех. Предложенный метод Structure-Aware Training (SAT) оптимизирует контекстно-инвариантную структуру убеждений и снижает хрупкость знаний на примерно 30%.'}, 'en': {'title': 'Building Robust Beliefs in Language Models', 'desc': "This paper discusses the limitations of Large Language Models (LLMs) in maintaining accurate beliefs when faced with slight changes in context. It introduces a new metric called Neighbor-Consistency Belief (NCB) to measure the robustness of these beliefs by assessing how consistent responses are within a related conceptual framework. The authors demonstrate that traditional evaluation methods can overlook fragile beliefs that may collapse under minor contextual shifts. To improve the stability of LLMs, they propose Structure-Aware Training (SAT), which enhances the models' ability to maintain consistent beliefs, reducing knowledge brittleness significantly."}, 'zh': {'title': '增强大型语言模型的信念稳定性', 'desc': '大型语言模型在面对上下文干扰时表现出脆弱的信念，这种现象可以通过结构一致性指标来更好地衡量。现有的评估方法主要依赖于点对点的自信度，可能掩盖了信念的脆弱性。我们提出了邻居一致性信念（NCB），这是一种评估响应一致性的结构性指标，能够在概念邻域内进行评估。通过结构感知训练（SAT），我们优化了上下文不变的信念结构，显著减少了知识的脆弱性。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05848', 'title': 'Goal Force: Teaching Video Models To Accomplish Physics-Conditioned Goals', 'url': 'https://huggingface.co/papers/2601.05848', 'abstract': "Video generation models trained on synthetic physics primitives demonstrate zero-shot generalization to complex real-world scenarios by modeling force propagation through time and space.  \t\t\t\t\tAI-generated summary \t\t\t\t Recent advancements in video generation have enabled the development of ``world models'' capable of simulating potential futures for robotics and planning. However, specifying precise goals for these models remains a challenge; text instructions are often too abstract to capture physical nuances, while target images are frequently infeasible to specify for dynamic tasks. To address this, we introduce Goal Force, a novel framework that allows users to define goals via explicit force vectors and intermediate dynamics, mirroring how humans conceptualize physical tasks. We train a video generation model on a curated dataset of synthetic causal primitives-such as elastic collisions and falling dominos-teaching it to propagate forces through time and space. Despite being trained on simple physics data, our model exhibits remarkable zero-shot generalization to complex, real-world scenarios, including tool manipulation and multi-object causal chains. Our results suggest that by grounding video generation in fundamental physical interactions, models can emerge as implicit neural physics simulators, enabling precise, physics-aware planning without reliance on external engines. We release all datasets, code, model weights, and interactive video demos at our project page.", 'score': 9, 'issue_id': 522, 'pub_date': '2026-01-09', 'pub_date_card': {'ru': '9 января', 'en': 'January 9', 'zh': '1月9日'}, 'hash': 'fedc48a7e2d815ae', 'authors': ['Nate Gillman', 'Yinghua Zhou', 'Zitian Tang', 'Evan Luo', 'Arjan Chakravarthy', 'Daksh Aggarwal', 'Michael Freeman', 'Charles Herrmann', 'Chen Sun'], 'affiliations': ['Brown University', 'Cornell University'], 'pdf_title_img': 'assets/pdf/title_img/2601.05848.jpg', 'data': {'categories': ['#robotics', '#dataset', '#synthetic', '#video', '#training', '#open_source'], 'emoji': '🎬', 'ru': {'title': 'От простых законов физики к пониманию сложного мира', 'desc': 'Исследователи разработали Goal Force — фреймворк для управления видео-генеративными моделями через явные векторы сил и промежуточную динамику, что позволяет пользователям задавать цели в терминах физического взаимодействия. Модель обучалась на синтетических примитивах физики (упругие столкновения, падающие костяшки домино) для распространения сил во времени и пространстве. Несмотря на обучение только на простых физических сценариях, модель продемонстрировала поразительную нулевую обобщаемость на сложные реальные задачи, включая манипуляцию инструментами и цепочки причинно-следственных взаимодействий. Результаты показывают, что заземление видео-генерации в фундаментальных физических законах позволяет моделям работать как неявные нейросетевые физические симуляторы для точного планирования.'}, 'en': {'title': 'Empowering Video Generation with Physics-Based Goal Setting', 'desc': 'This paper presents a new framework called Goal Force for video generation models that allows users to set goals using explicit force vectors. By training on simple physics scenarios, the model learns to simulate how forces propagate over time and space. Remarkably, it can apply this knowledge to complex real-world tasks without needing additional training, demonstrating zero-shot generalization. This approach positions the model as an implicit neural physics simulator, enhancing its ability to plan and execute dynamic tasks based on physical interactions.'}, 'zh': {'title': '通过力向量实现目标定义的创新框架', 'desc': '本论文介绍了一种名为Goal Force的新框架，允许用户通过明确的力向量和中间动态来定义目标。这种方法模仿了人类对物理任务的概念化，解决了传统文本指令和目标图像在动态任务中难以具体化的问题。我们训练的模型在简单的物理数据上表现出色，能够在复杂的现实场景中实现零-shot泛化，包括工具操作和多物体因果链。研究结果表明，通过将视频生成与基本物理交互相结合，模型可以作为隐式神经物理模拟器，实现精确的物理感知规划。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05403', 'title': 'Same Claim, Different Judgment: Benchmarking Scenario-Induced Bias in Multilingual Financial Misinformation Detection', 'url': 'https://huggingface.co/papers/2601.05403', 'abstract': 'A comprehensive benchmark evaluates behavioral biases in large language models for multilingual financial misinformation detection across diverse economic scenarios.  \t\t\t\t\tAI-generated summary \t\t\t\t Large language models (LLMs) have been widely applied across various domains of finance. Since their training data are largely derived from human-authored corpora, LLMs may inherit a range of human biases. Behavioral biases can lead to instability and uncertainty in decision-making, particularly when processing financial information. However, existing research on LLM bias has mainly focused on direct questioning or simplified, general-purpose settings, with limited consideration of the complex real-world financial environments and high-risk, context-sensitive, multilingual financial misinformation detection tasks (\\mfmd). In this work, we propose \\mfmdscen, a comprehensive benchmark for evaluating behavioral biases of LLMs in \\mfmd across diverse economic scenarios. In collaboration with financial experts, we construct three types of complex financial scenarios: (i) role- and personality-based, (ii) role- and region-based, and (iii) role-based scenarios incorporating ethnicity and religious beliefs. We further develop a multilingual financial misinformation dataset covering English, Chinese, Greek, and Bengali. By integrating these scenarios with misinformation claims, \\mfmdscen enables a systematic evaluation of 22 mainstream LLMs. Our findings reveal that pronounced behavioral biases persist across both commercial and open-source models. This project will be available at https://github.com/lzw108/FMD.', 'score': 8, 'issue_id': 528, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': '330579eb3db9e0c3', 'authors': ['Zhiwei Liu', 'Yupen Cao', 'Yuechen Jiang', 'Mohsinul Kabir', 'Polydoros Giannouris', 'Chen Xu', 'Ziyang Xu', 'Tianlei Zhu', 'Tariquzzaman Faisal', 'Triantafillos Papadopoulos', 'Yan Wang', 'Lingfei Qian', 'Xueqing Peng', 'Zhuohan Xie', 'Ye Yuan', 'Saeed Almheiri', 'Abdulrazzaq Alnajjar', 'Mingbin Chen', 'Harry Stuart', 'Paul Thompson', 'Prayag Tiwari', 'Alejandro Lopez-Lira', 'Xue Liu', 'Jimin Huang', 'Sophia Ananiadou'], 'affiliations': ['Archimedes, Athena Research Center', 'Athens University of Economics and Business', 'Columbia University', 'Dubai Police', 'ELLIS Manchester', 'Halmstad University', 'Islamic University of Technology', 'MBZUAI', 'McGill University', 'Mila - Quebec AI Institute', 'Stevens Institute of Technology', 'The FinAI', 'The University of Manchester', 'University of Florida', 'University of Melbourne'], 'pdf_title_img': 'assets/pdf/title_img/2601.05403.jpg', 'data': {'categories': ['#multilingual', '#ethics', '#low_resource', '#benchmark', '#survey', '#dataset', '#open_source'], 'emoji': '💰', 'ru': {'title': 'Выявление скрытых предубеждений LLM в финансовой дезинформации', 'desc': 'В работе представлен комплексный бенчмарк для оценки поведенческих предубеждений больших языковых моделей при обнаружении финансовой дезинформации на разных языках. Исследователи создали разнообразные сценарии на основе ролей, личностей, географических регионов, этнических и религиозных характеристик, чтобы оценить, как LLM обрабатывают финансовую информацию в сложных реальных условиях. Построен многоязычный датасет финансовой дезинформации на английском, китайском, греческом и бенгальском языках и протестировано 22 основные LLM. Результаты показывают, что выраженные поведенческие смещения присутствуют как в коммерческих, так и в открытых моделях, что представляет существенный риск для финансовых приложений.'}, 'en': {'title': 'Unveiling Biases in Language Models for Financial Misinformation Detection', 'desc': 'This paper introduces a benchmark called \textit{mfmdscen} to assess behavioral biases in large language models (LLMs) when detecting multilingual financial misinformation. The benchmark is designed to reflect complex real-world financial scenarios, incorporating factors like roles, regions, ethnicity, and religious beliefs. By evaluating 22 mainstream LLMs using this benchmark, the study highlights the persistence of behavioral biases in both commercial and open-source models. The findings emphasize the need for more nuanced approaches in training and deploying LLMs in high-stakes financial contexts.'}, 'zh': {'title': '评估大型语言模型的金融偏差', 'desc': '本研究提出了一个全面的基准测试，旨在评估大型语言模型（LLMs）在多语言金融虚假信息检测中的行为偏差。由于LLMs的训练数据主要来源于人类创作的文本，它们可能会继承各种人类偏见，这可能导致在处理金融信息时决策的不稳定性和不确定性。我们构建了三种复杂的金融场景，并开发了一个涵盖多种语言的金融虚假信息数据集，以便系统地评估22种主流LLMs的表现。研究结果表明，无论是商业模型还是开源模型，明显的行为偏差在各类模型中普遍存在。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05573', 'title': 'Orient Anything V2: Unifying Orientation and Rotation Understanding', 'url': 'https://huggingface.co/papers/2601.05573', 'abstract': 'Orient Anything V2 enhances 3D orientation understanding through scalable 3D asset synthesis, symmetry-aware periodic distribution fitting, and multi-frame relative rotation prediction, achieving state-of-the-art performance across multiple benchmarks.  \t\t\t\t\tAI-generated summary \t\t\t\t This work presents Orient Anything V2, an enhanced foundation model for unified understanding of object 3D orientation and rotation from single or paired images. Building upon Orient Anything V1, which defines orientation via a single unique front face, V2 extends this capability to handle objects with diverse rotational symmetries and directly estimate relative rotations. These improvements are enabled by four key innovations: 1) Scalable 3D assets synthesized by generative models, ensuring broad category coverage and balanced data distribution; 2) An efficient, model-in-the-loop annotation system that robustly identifies 0 to N valid front faces for each object; 3) A symmetry-aware, periodic distribution fitting objective that captures all plausible front-facing orientations, effectively modeling object rotational symmetry; 4) A multi-frame architecture that directly predicts relative object rotations. Extensive experiments show that Orient Anything V2 achieves state-of-the-art zero-shot performance on orientation estimation, 6DoF pose estimation, and object symmetry recognition across 11 widely used benchmarks. The model demonstrates strong generalization, significantly broadening the applicability of orientation estimation in diverse downstream tasks.', 'score': 7, 'issue_id': 522, 'pub_date': '2026-01-09', 'pub_date_card': {'ru': '9 января', 'en': 'January 9', 'zh': '1月9日'}, 'hash': '6d51bd0357e81bbe', 'authors': ['Zehan Wang', 'Ziang Zhang', 'Jiayang Xu', 'Jialei Wang', 'Tianyu Pang', 'Chao Du', 'HengShuang Zhao', 'Zhou Zhao'], 'affiliations': ['Sea AI Lab', 'Shanghai AI Lab', 'The University of Hong Kong', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2601.05573.jpg', 'data': {'categories': ['#benchmark', '#cv', '#dataset', '#3d', '#multimodal', '#synthetic', '#open_source'], 'emoji': '🔄', 'ru': {'title': 'Универсальное понимание трёхмерной ориентации объектов с учётом симметрии', 'desc': 'Orient Anything V2 — это улучшенная фундаментальная модель для понимания трёхмерной ориентации объектов на изображениях. Модель использует синтетические 3D-активы, генерируемые нейросетевыми моделями, и учитывает ротационную симметрию объектов через специальную функцию потерь для периодических распределений. Система предсказывает относительные повороты объектов на нескольких кадрах и достигает лучших результатов на 11 бенчмарках для оценки ориентации, позы и симметрии. Подход демонстрирует сильную обобщающую способность и значительно расширяет применимость в различных задачах компьютерного зрения.'}, 'en': {'title': 'Revolutionizing 3D Orientation Understanding with Orient Anything V2', 'desc': 'Orient Anything V2 is a machine learning model designed to improve the understanding of 3D object orientation and rotation from images. It builds on its predecessor by allowing for the handling of objects with various rotational symmetries and estimating relative rotations directly. Key innovations include the use of generative models for creating diverse 3D assets, a robust annotation system for identifying valid orientations, and a multi-frame architecture for predicting rotations. The model has shown exceptional performance in orientation estimation and related tasks across multiple benchmarks, demonstrating its versatility in real-world applications.'}, 'zh': {'title': '增强三维方向理解的革命性模型', 'desc': 'Orient Anything V2 是一个增强的基础模型，旨在统一理解物体的三维方向和旋转。与之前的版本相比，V2 能够处理具有不同旋转对称性的物体，并直接估计相对旋转。该模型通过四个关键创新实现了这些改进，包括可扩展的三维资产合成、有效的标注系统、对称感知的分布拟合目标以及多帧架构。实验结果表明，Orient Anything V2 在多个基准测试中实现了最先进的零样本性能，显著提高了方向估计的适用性。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.04888', 'title': 'SmartSearch: Process Reward-Guided Query Refinement for Search Agents', 'url': 'https://huggingface.co/papers/2601.04888', 'abstract': "SmartSearch enhances LLM-based search agents through process rewards and query refinement mechanisms that improve intermediate search query quality via a three-stage curriculum learning approach.  \t\t\t\t\tAI-generated summary \t\t\t\t Large language model (LLM)-based search agents have proven promising for addressing knowledge-intensive problems by incorporating information retrieval capabilities. Existing works largely focus on optimizing the reasoning paradigms of search agents, yet the quality of intermediate search queries during reasoning remains overlooked. As a result, the generated queries often remain inaccurate, leading to unexpected retrieval results and ultimately limiting search agents' overall effectiveness. To mitigate this issue, we introduce SmartSearch, a framework built upon two key mechanisms: (1) Process rewards, which provide fine-grained supervision for the quality of each intermediate search query through Dual-Level Credit Assessment. (2) Query refinement, which promotes the optimization of query generation by selectively refining low-quality search queries and regenerating subsequent search rounds based on these refinements. To enable the search agent to progressively internalize the ability to improve query quality under the guidance of process rewards, we design a three-stage curriculum learning framework. This framework guides the agent through a progression from imitation, to alignment, and ultimately to generalization. Experimental results show that SmartSearch consistently surpasses existing baselines, and additional quantitative analyses further confirm its significant gains in both search efficiency and query quality. The code is available at https://github.com/MYVAE/SmartSearch.", 'score': 5, 'issue_id': 522, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': '1d9a399da8a29c5c', 'authors': ['Tongyu Wen', 'Guanting Dong', 'Zhicheng Dou'], 'affiliations': ['Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2601.04888.jpg', 'data': {'categories': ['#reasoning', '#optimization', '#open_source'], 'emoji': '🔍', 'ru': {'title': 'Умный поиск через процессные награды и уточнение запросов', 'desc': 'SmartSearch — это фреймворк для улучшения LLM-based поисковых агентов, который фокусируется на качестве промежуточных поисковых запросов. Система использует процессные награды с двухуровневой оценкой кредита для тонкой настройки каждого запроса на этапе рассуждения. Механизм уточнения запросов позволяет переделывать низкокачественные поиски и перегенерировать последующие раунды на основе улучшений. Трёхэтапный curriculum learning подход направляет агента через имитацию, выравнивание и обобщение, что приводит к значительным улучшениям в эффективности поиска и качестве запросов.'}, 'en': {'title': 'Enhancing Search Quality with SmartSearch', 'desc': 'SmartSearch is a framework designed to improve the performance of large language model (LLM)-based search agents by enhancing the quality of their intermediate search queries. It introduces two main mechanisms: process rewards, which provide detailed feedback on the quality of each query, and query refinement, which helps to improve low-quality queries through selective adjustments. The framework employs a three-stage curriculum learning approach that guides the search agent from basic imitation to more complex generalization of query improvement. Experimental results demonstrate that SmartSearch outperforms existing methods, leading to better search efficiency and higher quality queries.'}, 'zh': {'title': 'SmartSearch：提升搜索代理的查询质量', 'desc': 'SmartSearch 是一种增强基于大语言模型（LLM）的搜索代理的框架。它通过过程奖励和查询优化机制，提高中间搜索查询的质量。该框架采用三阶段的课程学习方法，帮助搜索代理逐步掌握改进查询质量的能力。实验结果表明，SmartSearch 在搜索效率和查询质量上均优于现有的基线方法。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.02760', 'title': 'AnyDepth: Depth Estimation Made Easy', 'url': 'https://huggingface.co/papers/2601.02760', 'abstract': 'A lightweight monocular depth estimation framework uses DINOv3 as visual encoder and a compact transformer decoder to achieve higher accuracy with reduced computational overhead and improved data quality.  \t\t\t\t\tAI-generated summary \t\t\t\t Monocular depth estimation aims to recover the depth information of 3D scenes from 2D images. Recent work has made significant progress, but its reliance on large-scale datasets and complex decoders has limited its efficiency and generalization ability. In this paper, we propose a lightweight and data-centric framework for zero-shot monocular depth estimation. We first adopt DINOv3 as the visual encoder to obtain high-quality dense features. Secondly, to address the inherent drawbacks of the complex structure of the DPT, we design the Simple Depth Transformer (SDT), a compact transformer-based decoder. Compared to the DPT, it uses a single-path feature fusion and upsampling process to reduce the computational overhead of cross-scale feature fusion, achieving higher accuracy while reducing the number of parameters by approximately 85%-89%. Furthermore, we propose a quality-based filtering strategy to filter out harmful samples, thereby reducing dataset size while improving overall training quality. Extensive experiments on five benchmarks demonstrate that our framework surpasses the DPT in accuracy. This work highlights the importance of balancing model design and data quality for achieving efficient and generalizable zero-shot depth estimation. Code: https://github.com/AIGeeksGroup/AnyDepth. Website: https://aigeeksgroup.github.io/AnyDepth.', 'score': 4, 'issue_id': 524, 'pub_date': '2026-01-06', 'pub_date_card': {'ru': '6 января', 'en': 'January 6', 'zh': '1月6日'}, 'hash': 'a6ad530d65a90d73', 'authors': ['Zeyu Ren', 'Zeyu Zhang', 'Wukai Li', 'Qingxiang Liu', 'Hao Tang'], 'affiliations': ['Peking University', 'Shanghai University of Engineering Science', 'The University of Melbourne'], 'pdf_title_img': 'assets/pdf/title_img/2601.02760.jpg', 'data': {'categories': ['#small_models', '#3d', '#training', '#data', '#architecture', '#cv'], 'emoji': '🎯', 'ru': {'title': 'Эффективная оценка глубины через баланс дизайна модели и качества данных', 'desc': 'В статье предлагается лёгкий фреймворк для монокулярной оценки глубины, использующий DINOv3 в качестве визуального энкодера для получения высокачественных признаков. Авторы разработали Simple Depth Transformer (SDT) — компактный трансформерный декодер, который снижает вычислительные затраты на 85-89% параметров по сравнению с DPT, сохраняя при этом более высокую точность. Предложена стратегия фильтрации выборок на основе качества для улучшения набора данных и снижения его размера. Экспериментальные результаты на пяти бенчмарках доказывают превосходство предложенного подхода в задаче zero-shot оценки глубины.'}, 'en': {'title': 'Efficient Monocular Depth Estimation with DINOv3 and SDT', 'desc': 'This paper presents a lightweight framework for monocular depth estimation that utilizes DINOv3 as a visual encoder and a compact transformer decoder called Simple Depth Transformer (SDT). The framework aims to improve accuracy while significantly reducing computational costs and the size of the dataset required for training. By employing a single-path feature fusion and upsampling process, the SDT minimizes the complexity of traditional decoders, achieving a reduction in parameters by 85%-89%. The authors also introduce a quality-based filtering strategy to enhance data quality, demonstrating that their approach outperforms existing methods in accuracy across multiple benchmarks.'}, 'zh': {'title': '轻量级单目深度估计的高效解决方案', 'desc': '本文提出了一种轻量级的单目深度估计框架，使用DINOv3作为视觉编码器和紧凑的变换解码器，以提高准确性并减少计算开销。该框架通过单路径特征融合和上采样过程，显著降低了跨尺度特征融合的计算复杂度，同时参数数量减少约85%-89%。此外，提出了一种基于质量的过滤策略，以去除有害样本，从而减少数据集大小并提高整体训练质量。实验结果表明，该框架在准确性上超越了传统的DPT模型，强调了模型设计与数据质量之间的平衡对于高效和可泛化的零-shot深度估计的重要性。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.04823', 'title': 'DR-LoRA: Dynamic Rank LoRA for Mixture-of-Experts Adaptation', 'url': 'https://huggingface.co/papers/2601.04823', 'abstract': "DR-LoRA dynamically adjusts LoRA ranks for experts in Mixture-of-Experts models based on task-specific demands, improving parameter efficiency and performance.  \t\t\t\t\tAI-generated summary \t\t\t\t Mixture-of-Experts (MoE) has become a prominent paradigm for scaling Large Language Models (LLMs). Parameter-efficient fine-tuning (PEFT), such as LoRA, is widely adopted to adapt pretrained MoE LLMs to downstream tasks. However, existing approaches assign identical LoRA ranks to all experts, overlooking the intrinsic functional specialization within MoE LLMs. This uniform allocation leads to resource mismatch, task-relevant experts are under-provisioned while less relevant ones receive redundant parameters. We propose a Dynamic Rank LoRA framework named DR-LoRA, which dynamically grows expert LoRA ranks during fine-tuning based on task-specific demands. DR-LoRA employs an Expert Saliency Scoring mechanism that integrates expert routing frequency and LoRA rank importance to quantify each expert's demand for additional capacity. Experts with higher saliency scores are prioritized for rank expansion, enabling the automatic formation of a heterogeneous rank distribution tailored to the target task. Experiments on multiple benchmarks demonstrate that DR-LoRA consistently outperforms standard LoRA and static allocation strategies under the same parameter budget, achieving superior task performance with more efficient parameter utilization.", 'score': 3, 'issue_id': 522, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': '81ecc151e1820135', 'authors': ['Guanzhi Deng', 'Bo Li', 'Ronghao Chen', 'Huacan Wang', 'Linqi Song', 'Lijie Wen'], 'affiliations': ['City University of Hong Kong', 'Peking University', 'Tsinghua University', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2601.04823.jpg', 'data': {'categories': ['#architecture', '#training'], 'emoji': '🎯', 'ru': {'title': 'Умная адаптация экспертов: динамические ранги для эффективной подстройки больших моделей', 'desc': 'В статье предложен метод DR-LoRA для динамической подстройки рангов адаптеров LoRA в моделях Mixture-of-Experts во время fine-tuning. Авторы вводят механизм оценки значимости экспертов, который учитывает частоту маршрутизации и важность ранга для определения потребности каждого эксперта в дополнительной параметризации. Метод автоматически формирует гетерогенное распределение рангов, адаптируясь к конкретной задаче, вместо равномерного выделения параметров всем экспертам. Экспериментальные результаты показывают, что DR-LoRA превосходит стандартные методы адаптации при той же параметрической бюджета, обеспечивая лучшую производительность с более эффективным использованием параметров.'}, 'en': {'title': 'Dynamic Expert Tuning for Efficient MoE Performance', 'desc': 'The paper introduces DR-LoRA, a method that optimizes the use of parameters in Mixture-of-Experts (MoE) models by dynamically adjusting the LoRA ranks of different experts based on the specific needs of a task. Traditional approaches assign the same LoRA rank to all experts, which can lead to inefficiencies as some experts may be over-allocated while others are under-utilized. DR-LoRA addresses this issue by using an Expert Saliency Scoring mechanism that evaluates how much additional capacity each expert requires based on their relevance to the task. The results show that DR-LoRA significantly improves performance and parameter efficiency compared to standard LoRA methods and static rank assignments.'}, 'zh': {'title': '动态调整专家等级，提升模型性能', 'desc': 'DR-LoRA是一种动态调整Mixture-of-Experts模型中LoRA等级的方法，旨在根据特定任务的需求提高参数效率和性能。传统方法为所有专家分配相同的LoRA等级，忽视了专家之间的功能专门化，导致资源分配不均。DR-LoRA通过专家显著性评分机制，动态调整专家的LoRA等级，优先扩展需求更高的专家。实验结果表明，DR-LoRA在多个基准测试中表现优于标准LoRA和静态分配策略，能够在相同参数预算下实现更高的任务性能。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.04726', 'title': 'Memory Matters More: Event-Centric Memory as a Logic Map for Agent Searching and Reasoning', 'url': 'https://huggingface.co/papers/2601.04726', 'abstract': 'CompassMem is an event-centric memory framework that organizes experiences into an Event Graph to enable structured memory navigation and long-horizon reasoning beyond traditional retrieval methods.  \t\t\t\t\tAI-generated summary \t\t\t\t Large language models (LLMs) are increasingly deployed as intelligent agents that reason, plan, and interact with their environments. To effectively scale to long-horizon scenarios, a key capability for such agents is a memory mechanism that can retain, organize, and retrieve past experiences to support downstream decision-making. However, most existing approaches organize and store memories in a flat manner and rely on simple similarity-based retrieval techniques. Even when structured memory is introduced, existing methods often struggle to explicitly capture the logical relationships among experiences or memory units. Moreover, memory access is largely detached from the constructed structure and still depends on shallow semantic retrieval, preventing agents from reasoning logically over long-horizon dependencies. In this work, we propose CompassMem, an event-centric memory framework inspired by Event Segmentation Theory. CompassMem organizes memory as an Event Graph by incrementally segmenting experiences into events and linking them through explicit logical relations. This graph serves as a logic map, enabling agents to perform structured and goal-directed navigation over memory beyond superficial retrieval, progressively gathering valuable memories to support long-horizon reasoning. Experiments on LoCoMo and NarrativeQA demonstrate that CompassMem consistently improves both retrieval and reasoning performance across multiple backbone models.', 'score': 3, 'issue_id': 526, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': '156f14ff101f34b7', 'authors': ['Yuyang Hu', 'Jiongnan Liu', 'Jiejun Tan', 'Yutao Zhu', 'Zhicheng Dou'], 'affiliations': ['Gaoling School of Artificial Intelligence, Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2601.04726.jpg', 'data': {'categories': ['#long_context', '#reasoning', '#graphs'], 'emoji': '🧭', 'ru': {'title': 'Граф событий как логическая карта для долгосрочного рассуждения агентов', 'desc': 'CompassMem — это фреймворк памяти, ориентированный на события, который организует опыт агента в виде графа событий с явными логическими связями. В отличие от традиционных подходов, использующих поверхностный поиск по семантическому сходству, CompassMem позволяет агентам структурированно навигировать по памяти и выполнять логические рассуждения над долгосрочными зависимостями. Фреймворк инкрементально сегментирует опыт на события и связывает их через явные логические отношения, создавая логическую карту для целенаправленного поиска информации. Экспериментальные результаты показывают, что CompassMem улучшает как качество извлечения памяти, так и производительность рассуждений для различных моделей-основ.'}, 'en': {'title': 'Empowering Long-Horizon Reasoning with Event-Centric Memory', 'desc': 'CompassMem is a novel memory framework designed for intelligent agents that enhances their ability to reason and plan over extended periods. It organizes experiences into an Event Graph, which captures the logical relationships between events, allowing for structured memory navigation. Unlike traditional flat memory systems that rely on simple similarity-based retrieval, CompassMem enables agents to access memories in a way that supports deeper reasoning and decision-making. Experiments show that this approach significantly improves both memory retrieval and reasoning capabilities in various tasks.'}, 'zh': {'title': 'CompassMem：结构化记忆导航的新方法', 'desc': 'CompassMem是一种以事件为中心的记忆框架，它将经验组织成事件图，以便实现结构化的记忆导航和长时间推理。该框架通过逐步将经验分段为事件，并通过明确的逻辑关系将它们连接起来，从而克服了传统方法的局限。与现有的扁平记忆存储方式不同，CompassMem能够捕捉经验之间的逻辑关系，支持更深层次的推理。实验结果表明，CompassMem在多个基础模型上都显著提高了检索和推理的性能。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05637', 'title': 'GenCtrl -- A Formal Controllability Toolkit for Generative Models', 'url': 'https://huggingface.co/papers/2601.05637', 'abstract': "Generative models' controllability is theoretically analyzed through a framework that estimates controllable sets with distribution-free bounds, revealing that controllability is fragile and context-dependent.  \t\t\t\t\tAI-generated summary \t\t\t\t As generative models become ubiquitous, there is a critical need for fine-grained control over the generation process. Yet, while controlled generation methods from prompting to fine-tuning proliferate, a fundamental question remains unanswered: are these models truly controllable in the first place? In this work, we provide a theoretical framework to formally answer this question. Framing human-model interaction as a control process, we propose a novel algorithm to estimate the controllable sets of models in a dialogue setting. Notably, we provide formal guarantees on the estimation error as a function of sample complexity: we derive probably-approximately correct bounds for controllable set estimates that are distribution-free, employ no assumptions except for output boundedness, and work for any black-box nonlinear control system (i.e., any generative model). We empirically demonstrate the theoretical framework on different tasks in controlling dialogue processes, for
