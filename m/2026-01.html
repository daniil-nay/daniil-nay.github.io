ng a native 32k context length and subsequently extended to 256k. To efficiently scale post-training compute, MiMo-V2-Flash introduces a novel Multi-Teacher On-Policy Distillation (MOPD) paradigm. In this framework, domain-specialized teachers (e.g., trained via large-scale reinforcement learning) provide dense and token-level reward, enabling the student model to perfectly master teacher expertise. MiMo-V2-Flash rivals top-tier open-weight models such as DeepSeek-V3.2 and Kimi-K2, despite using only 1/2 and 1/3 of their total parameters, respectively. During inference, by repurposing MTP as a draft model for speculative decoding, MiMo-V2-Flash achieves up to 3.6 acceptance length and 2.6x decoding speedup with three MTP layers. We open-source both the model weights and the three-layer MTP weights to foster open research and community collaboration.', 'score': 16, 'issue_id': 448, 'pub_date': '2026-01-06', 'pub_date_card': {'ru': '6 января', 'en': 'January 6', 'zh': '1月6日'}, 'hash': '5e7a6fb684c9e6b5', 'authors': ['Bangjun Xiao', 'Bingquan Xia', 'Bo Yang', 'Bofei Gao', 'Bowen Shen', 'Chen Zhang', 'Chenhong He', 'Chiheng Lou', 'Fuli Luo', 'Gang Wang', 'Gang Xie', 'Hailin Zhang', 'Hanglong Lv', 'Hanyu Li', 'Heyu Chen', 'Hongshen Xu', 'Houbin Zhang', 'Huaqiu Liu', 'Jiangshan Duo', 'Jianyu Wei', 'Jiebao Xiao', 'Jinhao Dong', 'Jun Shi', 'Junhao Hu', 'Kainan Bao', 'Kang Zhou', 'Lei Li', 'Liang Zhao', 'Linghao Zhang', 'Peidian Li', 'Qianli Chen', 'Shaohui Liu', 'Shihua Yu', 'Shijie Cao', 'Shimao Chen', 'Shouqiu Yu', 'Shuo Liu', 'Tianling Zhou', 'Weijiang Su', 'Weikun Wang', 'Wenhan Ma', 'Xiangwei Deng', 'Bohan Mao', 'Bowen Ye', 'Can Cai', 'Chenghua Wang', 'Chengxuan Zhu', 'Chong Ma', 'Chun Chen', 'Chunan Li', 'Dawei Zhu', 'Deshan Xiao', 'Dong Zhang', 'Duo Zhang', 'Fangyue Liu', 'Feiyu Yang', 'Fengyuan Shi', 'Guoan Wang', 'Hao Tian', 'Hao Wu', 'Heng Qu', 'Hongfei Yi', 'Hongxu An', 'Hongyi Guan', 'Xing Zhang', 'Yifan Song', 'Yihan Yan', 'Yihao Zhao', 'Yingchun Lai', 'Yizhao Gao', 'Yu Cheng', 'Yuanyuan Tian', 'Yudong Wang', 'Zhen Tang', 'Zhengju Tang', 'Zhengtao Wen', 'Zhichao Song', 'Zhixian Zheng', 'Zihan Jiang', 'Jian Wen', 'Jiarui Sun', 'Jiawei Li', 'Jinlong Xue', 'Jun Xia', 'Kai Fang', 'Menghang Zhu', 'Nuo Chen', 'Qian Tu', 'Qihao Zhang', 'Qiying Wang', 'Rang Li', 'Rui Ma', 'Shaolei Zhang', 'Shengfan Wang', 'Shicheng Li', 'Shuhao Gu', 'Shuhuai Ren', 'Sirui Deng', 'Tao Guo', 'Tianyang Lu', 'Weiji Zhuang', 'Weikang Zhang', 'Weimin Xiong', 'Wenshan Huang', 'Wenyu Yang', 'Xin Zhang', 'Xing Yong', 'Xu Wang', 'Xueyang Xie', 'Yilin Jiang', 'Yixin Yang', 'Yongzhe He', 'Yu Tu', 'Yuanliang Dong', 'Yuchen Liu', 'Yue Ma', 'Yue Yu', 'Yuxing Xiang', 'Zhaojun Huang', 'Zhenru Lin', 'Zhipeng Xu', 'Zhiyang Chen', 'Zhonghua Deng', 'Zihan Zhang', 'Zihao Yue'], 'affiliations': ['Xiaomi'], 'pdf_title_img': 'assets/pdf/title_img/2601.02780.jpg', 'data': {'categories': ['#small_models', '#optimization', '#reasoning', '#open_source', '#architecture', '#long_context', '#inference', '#agents', '#training'], 'emoji': '⚡', 'ru': {'title': 'Эффективная многоучительская дистилляция для разреженных экспертных моделей', 'desc': 'MiMo-V2-Flash — это разреженная модель архитектуры Mixture-of-Experts с гибридным механизмом внимания, которая содержит 309 млрд параметров, но использует только 15 млрд активных параметров во время inference. Модель применяет инновационный подход Multi-Token Prediction для предварительного обучения на 27 триллионах токенов и использует гибридное внимание, чередующееся скользящее окно с глобальным вниманием в соотношении 5:1. Для эффективного масштабирования post-training авторы предложили парадигму Multi-Teacher On-Policy Distillation, где специализированные учительские модели передают знания студентской модели через плотные награды на уровне токенов. Благодаря спекулятивному декодированию модель достигает 2.6-кратного ускорения inference, превосходя по качеству намного более крупные открытые модели.'}, 'en': {'title': 'Efficient Power: MiMo-V2-Flash Redefines MoE Performance', 'desc': 'MiMo-V2-Flash is a state-of-the-art Mixture-of-Experts (MoE) model that utilizes a hybrid attention mechanism to enhance performance while minimizing the number of active parameters. It features a unique combination of Sliding Window Attention and global attention, allowing it to process information efficiently over long contexts. The model is trained on an extensive dataset of 27 trillion tokens and employs a novel Multi-Teacher On-Policy Distillation technique to improve its learning from specialized teachers. As a result, MiMo-V2-Flash achieves competitive performance with significantly fewer parameters compared to leading models, while also accelerating inference speed through innovative decoding strategies.'}, 'zh': {'title': '高效推理与强大能力的专家混合模型', 'desc': 'MiMo-V2-Flash是一种稀疏的专家混合模型，采用混合注意力架构和高效的蒸馏技术，能够在减少参数的同时实现强大的性能和更快的推理速度。该模型具有3090亿个总参数和150亿个活跃参数，专为快速推理和智能能力设计。它在27万亿个标记上进行预训练，使用多标记预测方法，并引入了新的多教师在线蒸馏框架，以提高后期训练的计算效率。尽管参数数量仅为其他顶级模型的一半或三分之一，MiMo-V2-Flash在推理时仍能实现显著的速度提升。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.01874', 'title': 'CogFlow: Bridging Perception and Reasoning through Knowledge Internalization for Visual Mathematical Problem Solving', 'url': 'https://huggingface.co/papers/2601.01874', 'abstract': 'Visual mathematical problem solving remains challenging for multimodal large language models, prompting the development of CogFlow, a cognitive-inspired three-stage framework that enhances perception, internalization, and reasoning through synergistic rewards and visual-gated policy optimization.  \t\t\t\t\tAI-generated summary \t\t\t\t Despite significant progress, multimodal large language models continue to struggle with visual mathematical problem solving. Some recent works recognize that visual perception is a bottleneck in visual mathematical reasoning, but their solutions are limited to improving the extraction and interpretation of visual inputs. Notably, they all ignore the key issue of whether the extracted visual cues are faithfully integrated and properly utilized in subsequent reasoning. Motivated by this, we present CogFlow, a novel cognitive-inspired three-stage framework that incorporates a knowledge internalization stage, explicitly simulating the hierarchical flow of human reasoning: perceptionRightarrowinternalizationRightarrowreasoning. Inline with this hierarchical flow, we holistically enhance all its stages. We devise Synergistic Visual Rewards to boost perception capabilities in parametric and semantic spaces, jointly improving visual information extraction from symbols and diagrams. To guarantee faithful integration of extracted visual cues into subsequent reasoning, we introduce a Knowledge Internalization Reward model in the internalization stage, bridging perception and reasoning. Moreover, we design a Visual-Gated Policy Optimization algorithm to further enforce the reasoning is grounded with the visual knowledge, preventing models seeking shortcuts that appear coherent but are visually ungrounded reasoning chains. Moreover, we contribute a new dataset MathCog for model training, which contains samples with over 120K high-quality perception-reasoning aligned annotations. Comprehensive experiments and analysis on commonly used visual mathematical reasoning benchmarks validate the superiority of the proposed CogFlow.', 'score': 16, 'issue_id': 448, 'pub_date': '2026-01-05', 'pub_date_card': {'ru': '5 января', 'en': 'January 5', 'zh': '1月5日'}, 'hash': '6623fd64c385ec07', 'authors': ['Shuhang Chen', 'Yunqiu Xu', 'Junjie Xie', 'Aojun Lu', 'Tao Feng', 'Zeying Huang', 'Ning Zhang', 'Yi Sun', 'Yi Yang', 'Hangjie Yuan'], 'affiliations': ['Intelligent Learning', 'Sichuan University', 'Tsinghua University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2601.01874.jpg', 'data': {'categories': ['#multimodal', '#dataset', '#reasoning', '#optimization', '#math', '#rlhf', '#benchmark'], 'emoji': '🧠', 'ru': {'title': 'Когнитивный поток: от восприятия к обоснованному математическому рассуждению', 'desc': 'В статье представлена CogFlow — фреймворк, вдохновлённый когнитивной психологией, для решения мультимодальными языковыми моделями визуальных математических задач. Фреймворк состоит из трёх стадий: восприятие визуальной информации, интернализация знаний и рассуждение, каждая из которых улучшается с помощью специальных вознаграждений. Авторы вводят синергетические визуальные награды для улучшения восприятия символов и диаграмм, модель вознаграждения для интернализации знаний и алгоритм оптимизации политики для обеспечения обоснованности рассуждений визуальными данными. Для обучения модели создан новый датасет MathCog с более чем 120K аннотаций, выравненных по восприятию и рассуждению.'}, 'en': {'title': 'CogFlow: Enhancing Visual Mathematical Reasoning in AI', 'desc': 'This paper introduces CogFlow, a new framework designed to improve how multimodal large language models solve visual mathematical problems. It consists of three stages: perception, internalization, and reasoning, which mimic human cognitive processes. The framework enhances visual perception through Synergistic Visual Rewards and ensures that visual cues are effectively integrated into reasoning with a Knowledge Internalization Reward. Additionally, it employs a Visual-Gated Policy Optimization algorithm to maintain a strong connection between visual knowledge and reasoning, supported by a new dataset called MathCog for training.'}, 'zh': {'title': 'CogFlow：提升视觉数学推理的认知框架', 'desc': '视觉数学问题解决对多模态大语言模型仍然具有挑战性。为此，本文提出了CogFlow，一个受认知启发的三阶段框架，旨在通过协同奖励和视觉门控策略优化来增强感知、内化和推理能力。CogFlow的设计模拟了人类推理的层次流程，确保提取的视觉线索能够有效整合并用于后续推理。通过引入新的奖励机制和数据集，CogFlow在视觉数学推理任务中展现了显著的优势。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.01321', 'title': 'Digital Twin AI: Opportunities and Challenges from Large Language Models to World Models', 'url': 'https://huggingface.co/papers/2601.01321', 'abstract': 'AI integration in digital twins follows a four-stage framework encompassing modeling, mirroring, intervention, and autonomous management, leveraging physics-informed approaches, generative AI, and foundation models for intelligent system operation.  \t\t\t\t\tAI-generated summary \t\t\t\t Digital twins, as precise digital representations of physical systems, have evolved from passive simulation tools into intelligent and autonomous entities through the integration of artificial intelligence technologies. This paper presents a unified four-stage framework that systematically characterizes AI integration across the digital twin lifecycle, spanning modeling, mirroring, intervention, and autonomous management. By synthesizing existing technologies and practices, we distill a unified four-stage framework that systematically characterizes how AI methodologies are embedded across the digital twin lifecycle: (1) modeling the physical twin through physics-based and physics-informed AI approaches, (2) mirroring the physical system into a digital twin with real-time synchronization, (3) intervening in the physical twin through predictive modeling, anomaly detection, and optimization strategies, and (4) achieving autonomous management through large language models, foundation models, and intelligent agents. We analyze the synergy between physics-based modeling and data-driven learning, highlighting the shift from traditional numerical solvers to physics-informed and foundation models for physical systems. Furthermore, we examine how generative AI technologies, including large language models and generative world models, transform digital twins into proactive and self-improving cognitive systems capable of reasoning, communication, and creative scenario generation. Through a cross-domain review spanning eleven application domains, including healthcare, aerospace, smart manufacturing, robotics, and smart cities, we identify common challenges related to scalability, explainability, and trustworthiness, and outline directions for responsible AI-driven digital twin systems.', 'score': 7, 'issue_id': 457, 'pub_date': '2026-01-04', 'pub_date_card': {'ru': '4 января', 'en': 'January 4', 'zh': '1月4日'}, 'hash': 'bcc1eff55563ff64', 'authors': ['Rong Zhou', 'Dongping Chen', 'Zihan Jia', 'Yao Su', 'Yixin Liu', 'Yiwen Lu', 'Dongwei Shi', 'Yue Huang', 'Tianyang Xu', 'Yi Pan', 'Xinliang Li', 'Yohannes Abate', 'Qingyu Chen', 'Zhengzhong Tu', 'Yu Yang', 'Yu Zhang', 'Qingsong Wen', 'Gengchen Mai', 'Sunyang Fu', 'Jiachen Li', 'Xuyu Wang', 'Ziran Wang', 'Jing Huang', 'Tianming Liu', 'Yong Chen', 'Lichao Sun', 'Lifang He'], 'affiliations': ['Childrens Hospital of Philadelphia', 'Columbia University', 'Florida International University', 'Lehigh University', 'Purdue University', 'Squirrel Ai Learning', 'Stanford University', 'Texas A&M University', 'University of California, Riverside', 'University of Georgia', 'University of Maryland', 'University of New South Wales', 'University of Notre Dame', 'University of Pennsylvania', 'University of Texas Health Science Center at Houston', 'University of Texas at Austin', 'Worcester Polytechnic Institute', 'Yale University'], 'pdf_title_img': 'assets/pdf/title_img/2601.01321.jpg', 'data': {'categories': ['#agents', '#robotics', '#healthcare', '#science', '#optimization', '#multimodal'], 'emoji': '🤖', 'ru': {'title': 'От пассивного симулятора к автономному когнитивному агенту: четыре этапа эволюции цифровых двойников', 'desc': 'В статье представлена унифицированная четырёхэтапная архитектура интеграции искусственного интеллекта в цифровые двойники. Первый этап включает моделирование физических систем с использованием физико-информированных подходов и машинного обучения. На втором этапе осуществляется синхронизация цифрового представления с реальной системой в режиме реального времени. Третий и четвёртый этапы предусматривают вмешательство через предсказательное моделирование и аномалия-детектирование, а также достижение автономного управления через большие языковые модели и интеллектуальные агенты.'}, 'en': {'title': 'Transforming Digital Twins with AI: A Four-Stage Framework', 'desc': 'This paper discusses how artificial intelligence (AI) can enhance digital twins, which are digital replicas of physical systems. It introduces a four-stage framework that includes modeling, mirroring, intervention, and autonomous management to describe the integration of AI in digital twins. The framework emphasizes the use of physics-informed approaches and generative AI to improve the functionality and intelligence of these systems. Additionally, the paper explores challenges such as scalability and trustworthiness in various application domains like healthcare and smart cities.'}, 'zh': {'title': '人工智能赋能数字双胞胎的四阶段框架', 'desc': '本文提出了一个四阶段框架，用于系统性地描述人工智能在数字双胞胎生命周期中的整合。这个框架包括建模、镜像、干预和自主管理四个阶段，利用物理知识驱动的方法和生成式人工智能技术。数字双胞胎从被动的模拟工具发展为智能和自主的实体，能够实时同步物理系统并进行预测和优化。通过跨领域的审查，本文还探讨了可扩展性、可解释性和可信性等共同挑战，并为负责任的人工智能驱动的数字双胞胎系统提供了方向。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.02989', 'title': 'Mechanistic Interpretability of Large-Scale Counting in LLMs through a System-2 Strategy', 'url': 'https://huggingface.co/papers/2601.02989', 'abstract': 'A test-time strategy inspired by System-2 cognitive processes decomposes large counting tasks into smaller sub-problems, enabling large language models to overcome architectural limitations and achieve high accuracy on complex counting tasks through mechanistic components like latent count computation, dedicated attention heads, and final aggregation stages.  \t\t\t\t\tAI-generated summary \t\t\t\t Large language models (LLMs), despite strong performance on complex mathematical problems, exhibit systematic limitations in counting tasks. This issue arises from architectural limits of transformers, where counting is performed across layers, leading to degraded precision for larger counting problems due to depth constraints. To address this limitation, we propose a simple test-time strategy inspired by System-2 cognitive processes that decomposes large counting tasks into smaller, independent sub-problems that the model can reliably solve. We evaluate this approach using observational and causal mediation analyses to understand the underlying mechanism of this System-2-like strategy. Our mechanistic analysis identifies key components: latent counts are computed and stored in the final item representations of each part, transferred to intermediate steps via dedicated attention heads, and aggregated in the final stage to produce the total count. Experimental results demonstrate that this strategy enables LLMs to surpass architectural limitations and achieve high accuracy on large-scale counting tasks. This work provides mechanistic insight into System-2 counting in LLMs and presents a generalizable approach for improving and understanding their reasoning behavior.', 'score': 4, 'issue_id': 457, 'pub_date': '2026-01-06', 'pub_date_card': {'ru': '6 января', 'en': 'January 6', 'zh': '1月6日'}, 'hash': 'd3bdfab34076a3ff', 'authors': ['Hosein Hasani', 'Mohammadali Banayeeanzade', 'Ali Nafisi', 'Sadegh Mohammadian', 'Fatemeh Askari', 'Mobin Bagherian', 'Amirmohammad Izadi', 'Mahdieh Soleymani Baghshah'], 'affiliations': ['Sharif University of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2601.02989.jpg', 'data': {'categories': ['#reasoning', '#architecture', '#training', '#math', '#interpretability'], 'emoji': '🧮', 'ru': {'title': 'Преодоление ограничений трансформеров через декомпозицию задач подсчёта', 'desc': 'Исследование показывает, что большие языковые модели испытывают трудности с задачами подсчёта из-за архитектурных ограничений трансформеров. Авторы предлагают тестовую стратегию, вдохновлённую когнитивными процессами System-2, которая разбивает сложные задачи подсчёта на более простые подзадачи. Через механистический анализ выявлены ключевые компоненты: вычисление скрытых счётчиков, передача информации через специализированные attention heads и финальная агрегация. Предложенный подход позволяет языковым моделям преодолеть архитектурные ограничения и достичь высокой точности на сложных задачах подсчёта.'}, 'en': {'title': 'Decomposing Counting Tasks for Enhanced Accuracy in LLMs', 'desc': 'This paper addresses the limitations of large language models (LLMs) in performing complex counting tasks due to the constraints of their transformer architecture. It introduces a test-time strategy inspired by System-2 cognitive processes, which breaks down large counting problems into smaller, manageable sub-problems. The approach utilizes mechanistic components such as latent count computation, dedicated attention heads, and aggregation stages to enhance accuracy. Experimental results show that this method allows LLMs to effectively overcome their architectural limitations and improve their counting performance.'}, 'zh': {'title': '分解计数任务，提升模型准确性', 'desc': '本文提出了一种受系统-2认知过程启发的测试策略，旨在将大型计数任务分解为更小的子问题，从而帮助大型语言模型克服架构限制。通过这种方法，模型能够在复杂的计数任务中实现更高的准确性。我们通过观察和因果中介分析评估了这一策略的有效性，并识别出关键机制组件，如潜在计数的计算、专用注意力头的使用以及最终聚合阶段。实验结果表明，该策略使大型语言模型能够超越架构限制，成功应对大规模计数任务。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.03256', 'title': 'Muses: Designing, Composing, Generating Nonexistent Fantasy 3D Creatures without Training', 'url': 'https://huggingface.co/papers/2601.03256', 'abstract': "Muses enables feed-forward generation of 3D creatures by leveraging skeletal structures and graph-constrained reasoning for coherent design and assembly.  \t\t\t\t\tAI-generated summary \t\t\t\t We present Muses, the first training-free method for fantastic 3D creature generation in a feed-forward paradigm. Previous methods, which rely on part-aware optimization, manual assembly, or 2D image generation, often produce unrealistic or incoherent 3D assets due to the challenges of intricate part-level manipulation and limited out-of-domain generation. In contrast, Muses leverages the 3D skeleton, a fundamental representation of biological forms, to explicitly and rationally compose diverse elements. This skeletal foundation formalizes 3D content creation as a structure-aware pipeline of design, composition, and generation. Muses begins by constructing a creatively composed 3D skeleton with coherent layout and scale through graph-constrained reasoning. This skeleton then guides a voxel-based assembly process within a structured latent space, integrating regions from different objects. Finally, image-guided appearance modeling under skeletal conditions is applied to generate a style-consistent and harmonious texture for the assembled shape. Extensive experiments establish Muses' state-of-the-art performance in terms of visual fidelity and alignment with textual descriptions, and potential on flexible 3D object editing. Project page: https://luhexiao.github.io/Muses.github.io/.", 'score': 3, 'issue_id': 456, 'pub_date': '2026-01-06', 'pub_date_card': {'ru': '6 января', 'en': 'January 6', 'zh': '1月6日'}, 'hash': '2ad714481787b5c2', 'authors': ['Hexiao Lu', 'Xiaokun Sun', 'Zeyu Cai', 'Hao Guo', 'Ying Tai', 'Jian Yang', 'Zhenyu Zhang'], 'affiliations': ['China Agricultural University', 'Nanjing University'], 'pdf_title_img': 'assets/pdf/title_img/2601.03256.jpg', 'data': {'categories': ['#graphs', '#reasoning', '#multimodal', '#3d'], 'emoji': '🦴', 'ru': {'title': 'Скелет как мост между воображением и реальностью 3D', 'desc': 'Muses — это первый метод без обучения для генерации 3D существ, использующий скелетные структуры как основу для синтеза. Алгоритм применяет граф-ограниченное рассуждение для создания согласованного скелета с правильной компоновкой и масштабом. Затем метод направляет процесс воксельной сборки в структурированном латентном пространстве, интегрируя части из разных объектов. Наконец, модель внешнего вида, направляемая изображением и скелетными условиями, генерирует текстуру, создавая стилистически единый и гармоничный 3D актив.'}, 'en': {'title': 'Muses: Crafting Coherent 3D Creatures with Skeletal Structures', 'desc': 'Muses is a novel method for generating 3D creatures without the need for prior training. It uses a skeletal structure to guide the design and assembly of 3D models, ensuring that the generated creatures are coherent and visually appealing. By employing graph-constrained reasoning, Muses effectively organizes different parts of the creature, allowing for a structured approach to 3D content creation. The final output is enhanced with image-guided appearance modeling, resulting in textures that are consistent with the overall design.'}, 'zh': {'title': 'Muses：无训练的3D生物体生成新方法', 'desc': 'Muses是一种新颖的3D生物体生成方法，采用骨骼结构和图约束推理来实现连贯的设计与组装。与以往依赖于部件优化或手动组装的方法不同，Muses能够在不需要训练的情况下，直接生成高质量的3D生物体。该方法通过构建具有一致布局和比例的3D骨骼，形成一个结构感知的设计和生成流程。最终，Muses在视觉真实感和与文本描述的一致性方面表现出色，展现了灵活的3D对象编辑潜力。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.01592', 'title': 'OpenRT: An Open-Source Red Teaming Framework for Multimodal LLMs', 'url': 'https://huggingface.co/papers/2601.01592', 'abstract': 'OpenRT is a unified red-teaming framework for evaluating multimodal large language model safety through modular adversarial testing across multiple attack dimensions and models.  \t\t\t\t\tAI-generated summary \t\t\t\t The rapid integration of Multimodal Large Language Models (MLLMs) into critical applications is increasingly hindered by persistent safety vulnerabilities. However, existing red-teaming benchmarks are often fragmented, limited to single-turn text interactions, and lack the scalability required for systematic evaluation. To address this, we introduce OpenRT, a unified, modular, and high-throughput red-teaming framework designed for comprehensive MLLM safety evaluation. At its core, OpenRT architects a paradigm shift in automated red-teaming by introducing an adversarial kernel that enables modular separation across five critical dimensions: model integration, dataset management, attack strategies, judging methods, and evaluation metrics. By standardizing attack interfaces, it decouples adversarial logic from a high-throughput asynchronous runtime, enabling systematic scaling across diverse models. Our framework integrates 37 diverse attack methodologies, spanning white-box gradients, multi-modal perturbations, and sophisticated multi-agent evolutionary strategies. Through an extensive empirical study on 20 advanced models (including GPT-5.2, Claude 4.5, and Gemini 3 Pro), we expose critical safety gaps: even frontier models fail to generalize across attack paradigms, with leading models exhibiting average Attack Success Rates as high as 49.14%. Notably, our findings reveal that reasoning models do not inherently possess superior robustness against complex, multi-turn jailbreaks. By open-sourcing OpenRT, we provide a sustainable, extensible, and continuously maintained infrastructure that accelerates the development and standardization of AI safety.', 'score': 3, 'issue_id': 453, 'pub_date': '2026-01-04', 'pub_date_card': {'ru': '4 января', 'en': 'January 4', 'zh': '1月4日'}, 'hash': '9db3fbc6579e6a18', 'authors': ['Xin Wang', 'Yunhao Chen', 'Juncheng Li', 'Yixu Wang', 'Yang Yao', 'Tianle Gu', 'Jie Li', 'Yan Teng', 'Xingjun Ma', 'Yingchun Wang', 'Xia Hu'], 'affiliations': ['Shanghai Artificial Intelligence Laboratory'], 'pdf_title_img': 'assets/pdf/title_img/2601.01592.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#security', '#open_source', '#agents'], 'emoji': '🛡️', 'ru': {'title': 'Модульная система для выявления уязвимостей в мультимодальных больших языковых моделях', 'desc': 'OpenRT — это единая модульная платформа для красного тестирования мультимодальных больших языковых моделей, которая позволяет систематически оценивать их безопасность.框架интегрирует 37 различных методик атак, включая градиентные методы белого ящика, мультимодальные возмущения и эволюционные стратегии на основе агентов. Исследование на 20 передовых моделях выявило критические уязвимости в безопасности: даже лучшие модели показывают уровень успешных атак до 49.14% и не обобщаются хорошо между разными типами атак. Открыв исходный код, авторы создали масштабируемую инфраструктуру для ускорения развития и стандартизации безопасности искусственного интеллекта.'}, 'en': {'title': 'OpenRT: Revolutionizing Safety Evaluation for Multimodal AI Models', 'desc': 'OpenRT is a comprehensive framework designed to evaluate the safety of multimodal large language models (MLLMs) through modular adversarial testing. It addresses the limitations of existing red-teaming benchmarks by allowing for systematic evaluation across multiple attack dimensions and models. The framework introduces an adversarial kernel that separates various components, enabling efficient scaling and integration of diverse attack strategies. Through extensive testing on advanced models, OpenRT reveals significant safety vulnerabilities, highlighting the need for improved robustness in AI systems.'}, 'zh': {'title': 'OpenRT：多模态语言模型安全评估的新标准', 'desc': 'OpenRT是一个统一的红队框架，用于通过模块化对抗测试评估多模态大型语言模型的安全性。该框架解决了现有红队基准分散、仅限于单轮文本交互和缺乏系统评估可扩展性的问题。OpenRT引入了对抗内核，支持在模型集成、数据集管理、攻击策略、判断方法和评估指标等五个关键维度的模块化分离。通过整合37种不同的攻击方法，OpenRT能够系统性地评估多种模型的安全性，揭示了即使是最先进的模型在面对复杂攻击时也存在显著的安全漏洞。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.02439', 'title': 'WebGym: Scaling Training Environments for Visual Web Agents with Realistic Tasks', 'url': 'https://huggingface.co/papers/2601.02439', 'abstract': "WebGym presents a large-scale open-source environment for training visual web agents using reinforcement learning with high-throughput asynchronous sampling, achieving superior performance on unseen websites compared to proprietary models.  \t\t\t\t\tAI-generated summary \t\t\t\t We present WebGym, the largest-to-date open-source environment for training realistic visual web agents. Real websites are non-stationary and diverse, making artificial or small-scale task sets insufficient for robust policy learning. WebGym contains nearly 300,000 tasks with rubric-based evaluations across diverse, real-world websites and difficulty levels. We train agents with a simple reinforcement learning (RL) recipe, which trains on the agent's own interaction traces (rollouts), using task rewards as feedback to guide learning. To enable scaling RL, we speed up sampling of trajectories in WebGym by developing a high-throughput asynchronous rollout system, designed specifically for web agents. Our system achieves a 4-5x rollout speedup compared to naive implementations. Second, we scale the task set breadth, depth, and size, which results in continued performance improvement. Fine-tuning a strong base vision-language model, Qwen-3-VL-8B-Instruct, on WebGym results in an improvement in success rate on an out-of-distribution test set from 26.2% to 42.9%, significantly outperforming agents based on proprietary models such as GPT-4o and GPT-5-Thinking that achieve 27.1% and 29.8%, respectively. This improvement is substantial because our test set consists only of tasks on websites never seen during training, unlike many other prior works on training visual web agents.", 'score': 2, 'issue_id': 448, 'pub_date': '2026-01-05', 'pub_date_card': {'ru': '5 января', 'en': 'January 5', 'zh': '1月5日'}, 'hash': 'f7bca4e4785414da', 'authors': ['Hao Bai', 'Alexey Taymanov', 'Tong Zhang', 'Aviral Kumar', 'Spencer Whitehead'], 'affiliations': ['CMU', 'Microsoft', 'UIUC'], 'pdf_title_img': 'assets/pdf/title_img/2601.02439.jpg', 'data': {'categories': ['#dataset', '#open_source', '#optimization', '#benchmark', '#rl', '#agents'], 'emoji': '🕷️', 'ru': {'title': 'Масштабируемое обучение веб-агентов через обогащённую среду и оптимизированный RL', 'desc': 'WebGym представляет крупномасштабную открытую среду для обучения визуальных веб-агентов с использованием обучения с подкреплением. Система содержит около 300 тысяч задач с оценкой на реальных веб-сайтах различных уровней сложности. Авторы разработали высокопроизводительную асинхронную систему сбора траекторий, которая ускоряет обучение в 4-5 раз. Путём масштабирования набора задач и тонкой настройки модели Qwen-3-VL-8B-Instruct достигнута производительность 42.9% успеха на неизученных сайтах, превосходящая проприетарные модели типа GPT-4o.'}, 'en': {'title': 'WebGym: Revolutionizing Visual Web Agent Training with Scalable RL', 'desc': 'WebGym is a large-scale open-source platform designed for training visual web agents using reinforcement learning (RL). It features nearly 300,000 diverse tasks that simulate real-world websites, allowing agents to learn from their own interactions and receive feedback through task rewards. The platform employs a high-throughput asynchronous rollout system to significantly speed up the sampling of trajectories, achieving a 4-5x increase in efficiency. By fine-tuning a vision-language model on this extensive dataset, agents show a marked improvement in performance on unseen tasks, surpassing proprietary models in success rates.'}, 'zh': {'title': 'WebGym：提升视觉网络代理训练的新平台', 'desc': 'WebGym是一个大规模的开源环境，用于训练视觉网络代理，采用强化学习方法。该环境包含近30万个任务，涵盖多样化的真实网站和不同难度级别，能够有效支持策略学习。通过高吞吐量的异步采样系统，WebGym显著提高了训练速度，达到4-5倍的加速效果。经过在WebGym上的微调，视觉语言模型Qwen-3-VL-8B-Instruct在未见过的网站测试集上的成功率从26.2%提升至42.9%，超越了基于专有模型的代理。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.01720', 'title': 'FFP-300K: Scaling First-Frame Propagation for Generalizable Video Editing', 'url': 'https://huggingface.co/papers/2601.01720', 'abstract': 'A new large-scale video dataset and framework are presented that enable effective first-frame propagation without runtime guidance through adaptive spatio-temporal positional encoding and self-distillation techniques.  \t\t\t\t\tAI-generated summary \t\t\t\t First-Frame Propagation (FFP) offers a promising paradigm for controllable video editing, but existing methods are hampered by a reliance on cumbersome run-time guidance. We identify the root cause of this limitation as the inadequacy of current training datasets, which are often too short, low-resolution, and lack the task diversity required to teach robust temporal priors. To address this foundational data gap, we first introduce FFP-300K, a new large-scale dataset comprising 300K high-fidelity video pairs at 720p resolution and 81 frames in length, constructed via a principled two-track pipeline for diverse local and global edits. Building on this dataset, we propose a novel framework designed for true guidance-free FFP that resolves the critical tension between maintaining first-frame appearance and preserving source video motion. Architecturally, we introduce Adaptive Spatio-Temporal RoPE (AST-RoPE), which dynamically remaps positional encodings to disentangle appearance and motion references. At the objective level, we employ a self-distillation strategy where an identity propagation task acts as a powerful regularizer, ensuring long-term temporal stability and preventing semantic drift. Comprehensive experiments on the EditVerseBench benchmark demonstrate that our method significantly outperforming existing academic and commercial models by receiving about 0.2 PickScore and 0.3 VLM score improvement against these competitors.', 'score': 2, 'issue_id': 448, 'pub_date': '2026-01-05', 'pub_date_card': {'ru': '5 января', 'en': 'January 5', 'zh': '1月5日'}, 'hash': '7afdd909674fcc28', 'authors': ['Xijie Huang', 'Chengming Xu', 'Donghao Luo', 'Xiaobin Hu', 'Peng Tang', 'Xu Peng', 'Jiangning Zhang', 'Chengjie Wang', 'Yanwei Fu'], 'affiliations': ['FDU', 'Tencent YouTu Lab'], 'pdf_title_img': 'assets/pdf/title_img/2601.01720.jpg', 'data': {'categories': ['#dataset', '#architecture', '#video', '#benchmark'], 'emoji': '🎬', 'ru': {'title': 'Свободное от руководства распространение первого кадра через адаптивное позиционное кодирование', 'desc': 'В работе представлен новый большой набор данных FFP-300K, содержащий 300,000 видеопар высокого качества, и фреймворк для пропагации первого кадра без руководства пользователя во время исполнения. Предложена архитектура с адаптивным спатиотемпоральным позиционным кодированием (AST-RoPE), которое динамически разделяет представления внешнего вида и движения в видео. В качестве механизма регуляризации используется самодистилляция, где задача идентичной пропагации обеспечивает долгосрочную временную стабильность и предотвращает семантический дрейф. Экспериментальные результаты показывают значительное улучшение качества редактирования видео по сравнению с существующими методами на бенчмарке EditVerseBench.'}, 'en': {'title': 'Revolutionizing Video Editing with Guidance-Free First-Frame Propagation', 'desc': 'This paper introduces a new large-scale video dataset called FFP-300K, which contains 300,000 high-quality video pairs designed to improve first-frame propagation (FFP) in video editing. The authors address the limitations of existing methods that rely on real-time guidance by proposing a framework that uses adaptive spatio-temporal positional encoding and self-distillation techniques. The framework allows for effective video editing without the need for runtime guidance, maintaining the appearance of the first frame while preserving the motion of the source video. Experimental results show that this approach significantly outperforms current models, demonstrating its effectiveness in controllable video editing tasks.'}, 'zh': {'title': '无指导的首帧传播新方法', 'desc': '本文提出了一种新的大规模视频数据集和框架，旨在实现有效的首帧传播，而无需运行时指导。我们引入了FFP-300K数据集，包含30万个720p分辨率的高保真视频对，解决了现有数据集短小、低分辨率和任务多样性不足的问题。通过自适应时空位置编码和自蒸馏技术，我们的框架能够在保持首帧外观的同时，保留源视频的运动信息。实验结果表明，我们的方法在EditVerseBench基准测试中显著优于现有的学术和商业模型。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.03227', 'title': 'The Sonar Moment: Benchmarking Audio-Language Models in Audio Geo-Localization', 'url': 'https://huggingface.co/papers/2601.03227', 'abstract': "Audio geo-localization benchmark AGL1K is introduced to advance audio language models' geospatial reasoning capabilities through curated audio clips and evaluation across multiple models.  \t\t\t\t\tAI-generated summary \t\t\t\t Geo-localization aims to infer the geographic origin of a given signal. In computer vision, geo-localization has served as a demanding benchmark for compositional reasoning and is relevant to public safety. In contrast, progress on audio geo-localization has been constrained by the lack of high-quality audio-location pairs. To address this gap, we introduce AGL1K, the first audio geo-localization benchmark for audio language models (ALMs), spanning 72 countries and territories. To extract reliably localizable samples from a crowd-sourced platform, we propose the Audio Localizability metric that quantifies the informativeness of each recording, yielding 1,444 curated audio clips. Evaluations on 16 ALMs show that ALMs have emerged with audio geo-localization capability. We find that closed-source models substantially outperform open-source models, and that linguistic clues often dominate as a scaffold for prediction. We further analyze ALMs' reasoning traces, regional bias, error causes, and the interpretability of the localizability metric. Overall, AGL1K establishes a benchmark for audio geo-localization and may advance ALMs with better geospatial reasoning capability.", 'score': 1, 'issue_id': 451, 'pub_date': '2026-01-06', 'pub_date_card': {'ru': '6 января', 'en': 'January 6', 'zh': '1月6日'}, 'hash': '0fccc0342ae86d5a', 'authors': ['Ruixing Zhang', 'Zihan Liu', 'Leilei Sun', 'Tongyu Zhu', 'Weifeng Lv'], 'affiliations': ['Shanghai AI Laboratory', 'The Key Laboratory of Data Science and Intelligent Computing, International Innovation Institute, Beihang University', 'The State Key Laboratory of Complex and Critical Software Environment, Beihang University'], 'pdf_title_img': 'assets/pdf/title_img/2601.03227.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#dataset', '#open_source', '#interpretability', '#audio', '#reasoning'], 'emoji': '🌍', 'ru': {'title': 'Первый бенчмарк для геолокализации аудио на основе языковых моделей', 'desc': 'В статье представлен первый бенчмарк AGL1K для оценки способности аудио языковых моделей определять географическое происхождение звуковых записей. Авторы собрали 1444 тщательно отобранных аудиоклипов из 72 стран, разработав метрику Audio Localizability для выделения информативных образцов. Оценка 16 различных ALM показала, что закрытые модели значительно превосходят открытые, при этом языковые подсказки часто играют доминирующую роль в предсказаниях. Анализ включает исследование логики рассуждений моделей, региональные смещения и интерпретируемость предложенной метрики.'}, 'en': {'title': 'AGL1K: Advancing Audio Geo-Localization for Better Spatial Reasoning', 'desc': 'The paper introduces AGL1K, a new benchmark designed to enhance the geospatial reasoning abilities of audio language models (ALMs) using curated audio clips. It addresses the challenge of audio geo-localization, which involves determining the geographic origin of audio signals, a task previously limited by the lack of quality audio-location pairs. AGL1K includes 1,444 carefully selected audio clips from 72 countries, utilizing a novel Audio Localizability metric to ensure the recordings are informative. The study evaluates 16 ALMs, revealing that closed-source models outperform open-source ones and highlighting the importance of linguistic cues in making predictions.'}, 'zh': {'title': '音频地理定位新基准AGL1K', 'desc': '本文介绍了音频地理定位基准AGL1K，旨在通过精心挑选的音频片段提升音频语言模型的地理推理能力。地理定位的目标是推断给定信号的地理来源，而音频地理定位的进展受到高质量音频-位置对缺乏的限制。AGL1K是首个针对音频语言模型的音频地理定位基准，涵盖72个国家和地区，并提出了音频可定位性指标来量化每个录音的信息量。通过对16个音频语言模型的评估，发现闭源模型在音频地理定位能力上显著优于开源模型，语言线索在预测中起到了主导作用。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.03194', 'title': 'X-MuTeST: A Multilingual Benchmark for Explainable Hate Speech Detection and A Novel LLM-consulted Explanation Framework', 'url': 'https://huggingface.co/papers/2601.03194', 'abstract': 'A novel explainability-guided training framework for hate speech detection in Indic languages that combines large language models with attention-enhancing techniques and provides human-annotated rationales for improved performance and interpretability.  \t\t\t\t\tAI-generated summary \t\t\t\t Hate speech detection on social media faces challenges in both accuracy and explainability, especially for underexplored Indic languages. We propose a novel explainability-guided training framework, X-MuTeST (eXplainable Multilingual haTe Speech deTection), for hate speech detection that combines high-level semantic reasoning from large language models (LLMs) with traditional attention-enhancing techniques. We extend this research to Hindi and Telugu alongside English by providing benchmark human-annotated rationales for each word to justify the assigned class label. The X-MuTeST explainability method computes the difference between the prediction probabilities of the original text and those of unigrams, bigrams, and trigrams. Final explanations are computed as the union between LLM explanations and X-MuTeST explanations. We show that leveraging human rationales during training enhances both classification performance and explainability. Moreover, combining human rationales with our explainability method to refine the model attention yields further improvements. We evaluate explainability using Plausibility metrics such as Token-F1 and IOU-F1 and Faithfulness metrics such as Comprehensiveness and Sufficiency. By focusing on under-resourced languages, our work advances hate speech detection across diverse linguistic contexts. Our dataset includes token-level rationale annotations for 6,004 Hindi, 4,492 Telugu, and 6,334 English samples. Data and code are available on https://github.com/ziarehman30/X-MuTeST', 'score': 1, 'issue_id': 448, 'pub_date': '2026-01-06', 'pub_date_card': {'ru': '6 января', 'en': 'January 6', 'zh': '1月6日'}, 'hash': 'ab654e9d20b8b95f', 'authors': ['Mohammad Zia Ur Rehman', 'Sai Kartheek Reddy Kasu', 'Shashivardhan Reddy Koppula', 'Sai Rithwik Reddy Chirra', 'Shwetank Shekhar Singh', 'Nagendra Kumar'], 'affiliations': ['Arizona State University', 'Indian Institute of Information Technology Dharwad', 'Indian Institute of Technology Indore', 'Indian Institute of Technology Mandi'], 'pdf_title_img': 'assets/pdf/title_img/2601.03194.jpg', 'data': {'categories': ['#interpretability', '#low_resource', '#dataset', '#open_source', '#multilingual', '#benchmark', '#training'], 'emoji': '🚨', 'ru': {'title': 'Объяснимое обнаружение речи ненависти в индийских языках с помощью большие языковых моделей', 'desc': 'В статье предложена новая система X-MuTeST для обнаружения речи ненависти в индийских языках (хинди и телугу) и английском, которая объединяет большие языковые модели с механизмами внимания для улучшения точности классификации. Система использует человеческие аннотированные обоснования на уровне отдельных слов, которые объясняют, почему текст классифицирован как речь ненависти. Метод вычисляет объяснения путём сравнения вероятностей предсказания исходного текста и его n-грамм, а затем объединяет объяснения от LLM с собственными объяснениями модели. Авторы демонстрируют, что использование человеческих обоснований во время обучения улучшает как качество классификации, так и интерпретируемость модели.'}, 'en': {'title': 'Enhancing Hate Speech Detection with Explainability in Indic Languages', 'desc': "This paper introduces X-MuTeST, a new framework for detecting hate speech in Indic languages like Hindi and Telugu, as well as English. It combines large language models with attention-enhancing techniques to improve both the accuracy and interpretability of the detection process. The framework uses human-annotated rationales to provide explanations for the model's predictions, which helps users understand why certain texts are classified as hate speech. By evaluating the model's explainability through various metrics, the study demonstrates that incorporating human rationales significantly boosts performance and clarity in hate speech detection."}, 'zh': {'title': '可解释性引导的仇恨言论检测新框架', 'desc': '本论文提出了一种新颖的可解释性引导训练框架，旨在提高印度语言中的仇恨言论检测。该框架结合了大型语言模型和注意力增强技术，并提供人工标注的理由，以提升模型的性能和可解释性。我们在印地语、泰卢固语和英语中扩展了这一研究，提供了每个单词的基准人类标注理由。通过在训练过程中利用人类理由，我们的模型在分类性能和可解释性上均得到了显著提升。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.03153', 'title': 'Parallel Latent Reasoning for Sequential Recommendation', 'url': 'https://huggingface.co/papers/2601.03153', 'abstract': 'Parallel Latent Reasoning framework improves sequential recommendation by exploring multiple diverse reasoning trajectories simultaneously through learnable trigger tokens and adaptive aggregation.  \t\t\t\t\tAI-generated summary \t\t\t\t Capturing complex user preferences from sparse behavioral sequences remains a fundamental challenge in sequential recommendation. Recent latent reasoning methods have shown promise by extending test-time computation through multi-step reasoning, yet they exclusively rely on depth-level scaling along a single trajectory, suffering from diminishing returns as reasoning depth increases. To address this limitation, we propose Parallel Latent Reasoning (PLR), a novel framework that pioneers width-level computational scaling by exploring multiple diverse reasoning trajectories simultaneously. PLR constructs parallel reasoning streams through learnable trigger tokens in continuous latent space, preserves diversity across streams via global reasoning regularization, and adaptively synthesizes multi-stream outputs through mixture-of-reasoning-streams aggregation. Extensive experiments on three real-world datasets demonstrate that PLR substantially outperforms state-of-the-art baselines while maintaining real-time inference efficiency. Theoretical analysis further validates the effectiveness of parallel reasoning in improving generalization capability. Our work opens new avenues for enhancing reasoning capacity in sequential recommendation beyond existing depth scaling.', 'score': 1, 'issue_id': 448, 'pub_date': '2026-01-06', 'pub_date_card': {'ru': '6 января', 'en': 'January 6', 'zh': '1月6日'}, 'hash': '746852f405d7e377', 'authors': ['Jiakai Tang', 'Xu Chen', 'Wen Chen', 'Jian Wu', 'Yuning Jiang', 'Bo Zheng'], 'affiliations': ['Alibaba Group', 'GSAI, Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2601.03153.jpg', 'data': {'categories': [], 'emoji': '🌳', 'ru': {'title': 'Параллельные рассуждения вместо глубины: новый масштаб для рекомендаций', 'desc': 'Статья предлагает новый подход к задаче последовательных рекомендаций — Parallel Latent Reasoning (PLR), который вместо углубления одной цепочки рассуждений исследует одновременно несколько разнообразных траекторий. Фреймворк использует обучаемые триггер-токены в латентном пространстве для создания параллельных потоков рассуждений и регуляризацию для сохранения их разнообразия. Результаты агрегируются адаптивным способом через механизм mixture-of-reasoning-streams, что позволяет эффективнее моделировать сложные предпочтения пользователей из разреженных последовательностей поведения. Экспериментальная проверка показала, что метод превосходит существующие подходы, сохраняя при этом скорость инференса в реальном времени.'}, 'en': {'title': 'Unlocking Diverse Reasoning for Better Recommendations', 'desc': 'The Parallel Latent Reasoning (PLR) framework enhances sequential recommendation systems by utilizing multiple reasoning paths at once, rather than just deepening a single path. It introduces learnable trigger tokens to create diverse reasoning streams in a continuous latent space, which helps capture complex user preferences from limited data. By applying global reasoning regularization, PLR maintains diversity among these streams and combines their outputs effectively through adaptive aggregation. This approach not only improves performance on real-world datasets but also ensures efficient real-time inference, marking a significant advancement in the field of sequential recommendation.'}, 'zh': {'title': '并行潜在推理：提升序列推荐的多样性与效率', 'desc': '本文提出了一种名为并行潜在推理（PLR）的框架，旨在通过同时探索多条多样化的推理轨迹来改善序列推荐。PLR利用可学习的触发令牌在连续潜在空间中构建并行推理流，并通过全局推理正则化保持流之间的多样性。该框架通过混合推理流的聚合自适应地合成多流输出，从而提高推荐的准确性。实验结果表明，PLR在三个真实世界数据集上显著优于现有的最先进基线，同时保持实时推理效率。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.03127', 'title': 'Unified Thinker: A General Reasoning Modular Core for Image Generation', 'url': 'https://huggingface.co/papers/2601.03127', 'abstract': 'Unified Thinker addresses the reasoning-execution gap in image generation by decoupling a reasoning module from image generators and using reinforcement learning to optimize visual correctness.  \t\t\t\t\tAI-generated summary \t\t\t\t Despite impressive progress in high-fidelity image synthesis, generative models still struggle with logic-intensive instruction following, exposing a persistent reasoning--execution gap. Meanwhile, closed-source systems (e.g., Nano Banana) have demonstrated strong reasoning-driven image generation, highlighting a substantial gap to current open-source models. We argue that closing this gap requires not merely better visual generators, but executable reasoning: decomposing high-level intents into grounded, verifiable plans that directly steer the generative process. To this end, we propose Unified Thinker, a task-agnostic reasoning architecture for general image generation, designed as a unified planning core that can plug into diverse generators and workflows. Unified Thinker decouples a dedicated Thinker from the image Generator, enabling modular upgrades of reasoning without retraining the entire generative model. We further introduce a two-stage training paradigm: we first build a structured planning interface for the Thinker, then apply reinforcement learning to ground its policy in pixel-level feedback, encouraging plans that optimize visual correctness over textual plausibility. Extensive experiments on text-to-image generation and image editing show that Unified Thinker substantially improves image reasoning and generation quality.', 'score': 1, 'issue_id': 461, 'pub_date': '2026-01-06', 'pub_date_card': {'ru': '6 января', 'en': 'January 6', 'zh': '1月6日'}, 'hash': 'bdb54287aa878bd3', 'authors': ['Sashuai Zhou', 'Qiang Zhou', 'Jijin Hu', 'Hanqing Yang', 'Yue Cao', 'Junpeng Ma', 'Yinchao Ma', 'Jun Song', 'Tiezheng Ge', 'Cheng Yu', 'Bo Zheng', 'Zhou Zhao'], 'affiliations': ['Alibaba Group', 'Fudan University', 'Nanjing University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2601.03127.jpg', 'data': {'categories': ['#training', '#cv', '#rl', '#reasoning', '#optimization', '#architecture', '#open_source'], 'emoji': '🧠', 'ru': {'title': 'Логика прежде всего: обучение моделей генерации с явным планированием', 'desc': 'Работа посвящена проблеме разрыва между логическим рассуждением и качеством генерации изображений в современных моделях. Авторы предлагают архитектуру Unified Thinker, которая отделяет модуль рассуждений от генератора изображений, позволяя модульное обновление без переобучения всей модели. Система использует двухэтапное обучение: сначала создаётся структурированный интерфейс планирования, затем применяется reinforcement learning для оптимизации плана на основе пиксельной обратной связи. Экспериментальные результаты показывают значительное улучшение качества генерации изображений при выполнении сложных инструкций.'}, 'en': {'title': 'Bridging Reasoning and Image Generation with Unified Thinker', 'desc': 'Unified Thinker is a novel approach that addresses the reasoning-execution gap in image generation by separating the reasoning process from the image generation process. It utilizes reinforcement learning to enhance the accuracy of generated images based on logical instructions. This method allows for modular upgrades to the reasoning component without needing to retrain the entire image generator. Through extensive testing, Unified Thinker has shown significant improvements in both the reasoning capabilities and the quality of generated images.'}, 'zh': {'title': '统一思考者：缩小推理与执行的差距', 'desc': 'Unified Thinker 解决了图像生成中的推理与执行之间的差距。它通过将推理模块与图像生成器解耦，并使用强化学习来优化视觉正确性。该方法不仅关注更好的视觉生成器，还强调可执行的推理，将高层意图分解为可验证的计划，从而直接引导生成过程。实验表明，Unified Thinker 在文本到图像生成和图像编辑方面显著提高了图像推理和生成质量。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.02996', 'title': 'Large Reasoning Models Are (Not Yet) Multilingual Latent Reasoners', 'url': 'https://huggingface.co/papers/2601.02996', 'abstract': 'Large reasoning models exhibit multilingual latent reasoning capabilities with varying strength across languages and benchmarks, showing consistent internal prediction evolution despite surface-level differences.  \t\t\t\t\tAI-generated summary \t\t\t\t Large reasoning models (LRMs) achieve strong performance on mathematical reasoning tasks, often attributed to their capability to generate explicit chain-of-thought (CoT) explanations. However, recent work shows that LRMs often arrive at the correct answer before completing these textual reasoning steps, indicating the presence of latent reasoning -- internal, non-verbal computation encoded in hidden states. While this phenomenon has been explored in English, its multilingual behavior remains largely unknown. In this paper, we conduct a systematic investigation of multilingual latent reasoning in LRMs across 11 languages. Using a truncation-based strategy, we examine how the correct answer emerges as the model is given only partial reasoning traces, allowing us to measure stepwise latent prediction formation. Our results reveal clear evidence of multilingual latent reasoning, though unevenly: strong in resource-rich languages, weaker in low-resource ones, and broadly less observable on harder benchmarks. To understand whether these differences reflect distinct internal mechanisms, we further perform representational analyses. Despite surface-level disparities, we find that the internal evolution of predictions is highly consistent across languages and broadly aligns with English -- a pattern suggesting an English-centered latent reasoning pathway.', 'score': 1, 'issue_id': 466, 'pub_date': '2026-01-06', 'pub_date_card': {'ru': '6 января', 'en': 'January 6', 'zh': '1月6日'}, 'hash': '5481230dde24f9ec', 'authors': ['Yihong Liu', 'Raoyuan Zhao', 'Hinrich Schütze', 'Michael A. Hedderich'], 'affiliations': ['Center for Information and Language Processing, LMU Munich', 'Munich Center for Machine Learning (MCML)'], 'pdf_title_img': 'assets/pdf/title_img/2601.02996.jpg', 'data': {'categories': ['#multilingual', '#reasoning', '#math', '#low_resource', '#interpretability'], 'emoji': '🧠', 'ru': {'title': 'Скрытое мышление LRM: единый внутренний механизм рассуждения за многоязычным фасадом', 'desc': 'В работе исследуются скрытые процессы рассуждения в больших языковых моделях, которые способны решать задачи математического мышления параллельно с генерацией текстовых объяснений. Авторы проанализировали мультиязычное поведение этого явления на 11 языках, используя стратегию обрезания цепочек рассуждений для измерения скрытого предсказания ответов на промежуточных этапах. Результаты показывают, что скрытое мышление сильнее выражено в богатых ресурсами языках и слабее в низкоресурсных языках. Несмотря на поверхностные различия, внутренняя эволюция предсказаний остаётся согласованной и ориентирована на английский язык как доминирующий путь рассуждения.'}, 'en': {'title': 'Unveiling Multilingual Latent Reasoning in AI Models', 'desc': 'This paper investigates how large reasoning models (LRMs) perform reasoning tasks in multiple languages. It reveals that these models can generate correct answers through internal, non-verbal computations, known as latent reasoning, even before completing explicit reasoning steps. The study shows that while multilingual latent reasoning exists, its strength varies significantly across languages, being stronger in resource-rich languages and weaker in low-resource ones. Additionally, the internal prediction processes are consistent across languages, suggesting a dominant reasoning pathway centered around English.'}, 'zh': {'title': '多语言潜在推理的探索', 'desc': '大型推理模型（LRMs）在多语言推理能力上表现出不同的强度，尽管表面上存在差异。这些模型在数学推理任务中表现出色，部分原因是它们能够生成明确的推理链（CoT）解释。然而，研究表明，LRMs在完成这些文本推理步骤之前就能得出正确答案，表明存在潜在推理，即隐藏状态中编码的内部非语言计算。我们对11种语言中的多语言潜在推理进行了系统调查，结果显示在资源丰富的语言中潜在推理较强，而在资源匮乏的语言中较弱，且在更难的基准测试中观察到的情况普遍较少。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.02359', 'title': 'ExposeAnyone: Personalized Audio-to-Expression Diffusion Models Are Robust Zero-Shot Face Forgery Detectors', 'url': 'https://huggingface.co/papers/2601.02359', 'abstract': 'A fully self-supervised diffusion model approach for face forgery detection that computes identity distances through reconstruction errors, demonstrating superior performance on unseen manipulations and real-world corruptions.  \t\t\t\t\tAI-generated summary \t\t\t\t Detecting unknown deepfake manipulations remains one of the most challenging problems in face forgery detection. Current state-of-the-art approaches fail to generalize to unseen manipulations, as they primarily rely on supervised training with existing deepfakes or pseudo-fakes, which leads to overfitting to specific forgery patterns. In contrast, self-supervised methods offer greater potential for generalization, but existing work struggles to learn discriminative representations only from self-supervision. In this paper, we propose ExposeAnyone, a fully self-supervised approach based on a diffusion model that generates expression sequences from audio. The key idea is, once the model is personalized to specific subjects using reference sets, it can compute the identity distances between suspected videos and personalized subjects via diffusion reconstruction errors, enabling person-of-interest face forgery detection. Extensive experiments demonstrate that 1) our method outperforms the previous state-of-the-art method by 4.22 percentage points in the average AUC on DF-TIMIT, DFDCP, KoDF, and IDForge datasets, 2) our model is also capable of detecting Sora2-generated videos, where the previous approaches perform poorly, and 3) our method is highly robust to corruptions such as blur and compression, highlighting the applicability in real-world face forgery detection.', 'score': 1, 'issue_id': 459, 'pub_date': '2026-01-05', 'pub_date_card': {'ru': '5 января', 'en': 'January 5', 'zh': '1月5日'}, 'hash': '6f0c74586245b344', 'authors': ['Kaede Shiohara', 'Toshihiko Yamasaki', 'Vladislav Golyanik'], 'affiliations': ['Max Planck Institute for Informatics', 'The University of Tokyo'], 'pdf_title_img': 'assets/pdf/title_img/2601.02359.jpg', 'data': {'categories': ['#diffusion', '#dataset', '#cv', '#security', '#training'], 'emoji': '🎭', 'ru': {'title': 'Самоконтролируемое обнаружение глубоких подделок через реконструкцию диффузионной модели', 'desc': 'Статья представляет ExposeAnyone — полностью самоконтролируемый подход на основе диффузионной модели для обнаружения подделок лиц, который генерирует последовательности мимики из аудио. После персонализации модели на эталонных наборах данных конкретных субъектов, система вычисляет расстояния идентичности между подозреваемыми видео и персонализованными субъектами через ошибки реконструкции диффузионной модели. Метод превосходит существующие подходы на стандартных бенчмарках (улучшение на 4.22 процентных пункта по AUC) и эффективно обнаруживает неизвестные манипуляции, включая видео, сгенерированные новыми моделями. Подход демонстрирует высокую устойчивость к реальным артефактам, таким как размытие и сжатие, что подтверждает его практическую применимость.'}, 'en': {'title': 'Revolutionizing Face Forgery Detection with Self-Supervised Learning', 'desc': 'This paper presents ExposeAnyone, a novel self-supervised diffusion model designed for detecting face forgery. Unlike traditional methods that rely on supervised learning and often overfit to known deepfake patterns, this approach computes identity distances through reconstruction errors, allowing it to generalize better to unseen manipulations. The model is personalized using reference sets, enabling it to effectively identify forgeries related to specific individuals. Experimental results show that ExposeAnyone significantly outperforms existing methods and demonstrates robustness against various real-world corruptions.'}, 'zh': {'title': '自监督扩散模型：面部伪造检测的新突破', 'desc': '本文提出了一种完全自监督的扩散模型方法，用于面部伪造检测。该方法通过重建误差计算身份距离，能够有效识别未知的深度伪造操作。与现有的依赖监督训练的方法不同，我们的方法在未见过的伪造模式上表现出更好的泛化能力。实验结果表明，我们的方法在多个数据集上超越了之前的最先进技术，并且对模糊和压缩等干扰具有很强的鲁棒性。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.00581', 'title': 'AceFF: A State-of-the-Art Machine Learning Potential for Small Molecules', 'url': 'https://huggingface.co/papers/2601.00581', 'abstract': 'We introduce AceFF, a pre-trained machine learning interatomic potential (MLIP) optimized for small molecule drug discovery. While MLIPs have emerged as efficient alternatives to Density Functional Theory (DFT), generalizability across diverse chemical spaces remains difficult. AceFF addresses this via a refined TensorNet2 architecture trained on a comprehensive dataset of drug-like compounds. This approach yields a force field that balances high-throughput inference speed with DFT-level accuracy. AceFF fully supports the essential medicinal chemistry elements (H, B, C, N, O, F, Si, P, S, Cl, Br, I) and is explicitly trained to handle charged states. Validation against rigorous benchmarks, including complex torsional energy scans, molecular dynamics trajectories, batched minimizations, and forces and anergy accuracy demonstrates that AceFF establishes a new state-of-the-art for organic molecules. The AceFF-2 model weights and inference code are available at https://huggingface.co/Acellera/AceFF-2.0.', 'score': 1, 'issue_id': 455, 'pub_date': '2026-01-02', 'pub_date_card': {'ru': '2 января', 'en': 'January 2', 'zh': '1月2日'}, 'hash': '5781155fabaaedcd', 'authors': ['Stephen E. Farr', 'Stefan Doerr', 'Antonio Mirarchi', 'Francesc Sabanes Zariquiey', 'Gianni De Fabritiis'], 'affiliations': ['Acellera', 'Acellera Labs', 'Computational Science Laboratory, Universitat Pompeu Fabra', 'Institucio Catalana de Recerca Estudis Avancats (ICREA)'], 'pdf_title_img': 'assets/pdf/title_img/2601.00581.jpg', 'data': {'categories': [], 'emoji': '⚗️', 'ru': {'title': 'DFT-точность со скоростью машинного обучения для молекулярного моделирования', 'desc': 'В работе представляется AceFF — предварительно обученный потенциал взаимодействия атомов (MLIP), разработанный специально для открытия лекарственных средств. Авторы решили проблему обобщаемости на разные химические пространства, используя улучшенную архитектуру TensorNet2 и обучив модель на большом наборе соединений, подобных лекарствам. Полученное поле сил достигает баланса между высокой скоростью вывода и точностью, сравнимой с методом функционала плотности (DFT). Модель поддерживает все необходимые элементы органической химии и явно обучена работать с заряженными состояниями молекул, что подтверждается валидацией на сложных тестовых наборах.'}, 'en': {'title': 'AceFF: Revolutionizing Drug Discovery with ML Interatomic Potentials', 'desc': 'AceFF is a pre-trained machine learning interatomic potential designed specifically for small molecule drug discovery. It improves upon traditional Density Functional Theory (DFT) by providing a more generalizable model across various chemical spaces. Utilizing a refined TensorNet2 architecture, AceFF achieves a balance between fast inference and high accuracy comparable to DFT. The model is validated through rigorous benchmarks, demonstrating its effectiveness in handling essential medicinal chemistry elements and complex molecular behaviors.'}, 'zh': {'title': 'AceFF：药物发现的新一代机器学习模型', 'desc': 'AceFF是一种预训练的机器学习原子间势能模型，专为小分子药物发现而优化。尽管机器学习原子间势能模型（MLIP）已成为密度泛函理论（DFT）的高效替代方案，但在不同化学空间中的泛化能力仍然面临挑战。AceFF通过改进的TensorNet2架构，基于全面的药物类化合物数据集进行训练，从而实现了高通量推理速度与DFT级别精度的平衡。该模型支持多种重要的药物化学元素，并经过严格基准测试验证，确立了有机分子的最新技术水平。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.23950', 'title': 'U-Net-Like Spiking Neural Networks for Single Image Dehazing', 'url': 'https://huggingface.co/papers/2512.23950', 'abstract': 'DehazeSNN combines a U-Net-like architecture with Spiking Neural Networks and an Orthogonal Leaky-Integrate-and-Fire Block to achieve efficient and effective image dehazing with reduced computational resources.  \t\t\t\t\tAI-generated summary \t\t\t\t Image dehazing is a critical challenge in computer vision, essential for enhancing image clarity in hazy conditions. Traditional methods often rely on atmospheric scattering models, while recent deep learning techniques, specifically Convolutional Neural Networks (CNNs) and Transformers, have improved performance by effectively analyzing image features. However, CNNs struggle with long-range dependencies, and Transformers demand significant computational resources. To address these limitations, we propose DehazeSNN, an innovative architecture that integrates a U-Net-like design with Spiking Neural Networks (SNNs). DehazeSNN captures multi-scale image features while efficiently managing local and long-range dependencies. The introduction of the Orthogonal Leaky-Integrate-and-Fire Block (OLIFBlock) enhances cross-channel communication, resulting in superior dehazing performance with reduced computational burden. Our extensive experiments show that DehazeSNN is highly competitive to state-of-the-art methods on benchmark datasets, delivering high-quality haze-free images with a smaller model size and less multiply-accumulate operations. The proposed dehazing method is publicly available at https://github.com/HaoranLiu507/DehazeSNN.', 'score': 1, 'issue_id': 455, 'pub_date': '2026-12-30', 'pub_date_card': {'ru': '30 декабря', 'en': 'December 30', 'zh': '12月30日'}, 'hash': 'bf1ddc8caabda593', 'authors': ['Huibin Li', 'Haoran Liu', 'Mingzhe Liu', 'Yulong Xiao', 'Peng Li', 'Guibin Zan'], 'affiliations': ['College of Computer Science and Cyber Security, Chengdu University of Technology', 'College of Nuclear Technology and Automation Engineering, Chengdu University of Technology', 'Department of Energy, Politecnico di Milano', 'School of Data Science and Artificial Intelligence, Wenzhou University of Technology', 'Sigray, Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2512.23950.jpg', 'data': {'categories': ['#architecture', '#cv', '#small_models'], 'emoji': '🌫️', 'ru': {'title': 'Импульсные нейросети для эффективного удаления дымки из изображений', 'desc': 'Авторы предлагают DehazeSNN — инновационную архитектуру для удаления дымки с изображений, которая объединяет U-Net подобную структуру со Spiking Neural Networks (импульсными нейронными сетями). Ключевой компонент — Orthogonal Leaky-Integrate-and-Fire Block — улучшает межканальное взаимодействие и позволяет эффективно обрабатывать как локальные, так и дальнодействующие зависимости в изображениях. Предложенный метод достигает результатов, сравнимых с современными алгоритмами на эталонных наборах данных, но при этом требует значительно меньше вычислительных ресурсов и имеет меньший размер модели. Основное преимущество — использование импульсных нейронных сетей позволяет снизить количество операций умножения-накопления без потери качества восстановления изображений.'}, 'en': {'title': 'Efficient Image Dehazing with Spiking Neural Networks', 'desc': 'DehazeSNN is a novel architecture designed for image dehazing that combines a U-Net-like structure with Spiking Neural Networks (SNNs) and an Orthogonal Leaky-Integrate-and-Fire Block. This approach effectively captures multi-scale features while addressing the challenges of long-range dependencies and computational efficiency. By enhancing cross-channel communication, DehazeSNN achieves superior performance in producing clear images from hazy conditions. Extensive experiments demonstrate that it competes well with existing state-of-the-art methods while requiring fewer computational resources.'}, 'zh': {'title': '高效去雾，清晰可见！', 'desc': 'DehazeSNN是一种结合了U-Net架构和脉冲神经网络（SNN）的创新模型，旨在高效地去除图像中的雾霾。该模型通过引入正交泄漏积分发射块（OLIFBlock），有效地管理局部和长距离依赖关系，提升了图像去雾的性能。与传统的卷积神经网络（CNN）和变换器相比，DehazeSNN在计算资源上更为节省，同时仍能捕捉多尺度的图像特征。实验结果表明，DehazeSNN在基准数据集上表现出色，能够生成高质量的无雾图像。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.01584', 'title': 'Steerability of Instrumental-Convergence Tendencies in LLMs', 'url': 'https://huggingface.co/papers/2601.01584', 'abstract': 'Research investigates the balance between AI system capabilities and steerability, finding that specific prompts can dramatically reduce unwanted behaviors in large language models.  \t\t\t\t\tAI-generated summary \t\t\t\t We examine two properties of AI systems: capability (what a system can do) and steerability (how reliably one can shift behavior toward intended outcomes). A central question is whether capability growth reduces steerability and risks control collapse. We also distinguish between authorized steerability (builders reliably reaching intended behaviors) and unauthorized steerability (attackers eliciting disallowed behaviors). This distinction highlights a fundamental safety--security dilemma of AI models: safety requires high steerability to enforce control (e.g., stop/refuse), while security requires low steerability for malicious actors to elicit harmful behaviors. This tension presents a significant challenge for open-weight models, which currently exhibit high steerability via common techniques like fine-tuning or adversarial attacks. Using Qwen3 and InstrumentalEval, we find that a short anti-instrumental prompt suffix sharply reduces the measured convergence rate (e.g., shutdown avoidance, self-replication). For Qwen3-30B Instruct, the convergence rate drops from 81.69% under a pro-instrumental suffix to 2.82% under an anti-instrumental suffix. Under anti-instrumental prompting, larger aligned models show lower convergence rates than smaller ones (Instruct: 2.82% vs. 4.23%; Thinking: 4.23% vs. 9.86%). Code is available at github.com/j-hoscilowicz/instrumental_steering.', 'score': 0, 'issue_id': 453, 'pub_date': '2026-01-04', 'pub_date_card': {'ru': '4 января', 'en': 'January 4', 'zh': '1月4日'}, 'hash': 'd9598b6cc511ad4c', 'authors': ['Jakub Hoscilowicz'], 'affiliations': ['Warsaw University of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2601.01584.jpg', 'data': {'categories': ['#training', '#alignment', '#security', '#ethics', '#small_models'], 'emoji': '🎛️', 'ru': {'title': 'Управляемость против инструментальности: как простой промпт контролирует поведение языковых моделей', 'desc': 'В работе исследуется компромисс между возможностями AI систем и их управляемостью, то есть способностью надёжно направить поведение модели в нужное русло. Авторы выделяют два типа управляемости: авторизованную (когда разработчики контролируют модель) и несанкционированную (когда злоумышленники манипулируют поведением). Основной вывод состоит в том, что короткий промпт-суффикс может резко снизить нежелательные инструментальные поведения LLM, такие как избегание отключения или саморепликация. На примере модели Qwen3 показано, что правильно подобранный промпт может снизить сходимость к вредоносному поведению с 81.69% до 2.82%, причём большие модели демонстрируют большую устойчивость к манипуляциям.'}, 'en': {'title': 'Balancing AI Power and Control: The Steerability Challenge', 'desc': 'This research explores the relationship between the capabilities of AI systems and their steerability, which refers to how well we can control their behavior. It highlights a critical safety-security dilemma: while we need high steerability to ensure safety and prevent harmful actions, low steerability is necessary to protect against malicious exploitation. The study demonstrates that specific prompts can significantly reduce unwanted behaviors in large language models, such as shutdown avoidance and self-replication. By using anti-instrumental prompts, the researchers found that larger models can exhibit lower convergence rates compared to smaller ones, indicating a potential method for enhancing control over AI systems.'}, 'zh': {'title': '平衡AI能力与可引导性，确保安全与控制', 'desc': '本研究探讨了人工智能系统的能力与可引导性之间的平衡。我们发现，特定的提示可以显著减少大型语言模型的不当行为。研究区分了授权可引导性和未经授权的可引导性，强调了安全与安全性之间的基本矛盾。通过使用Qwen3和InstrumentalEval，我们发现短的反工具提示后缀可以显著降低不当行为的发生率。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.20578', 'title': 'Can LLMs Predict Their Own Failures? Self-Awareness via Internal Circuits', 'url': 'https://huggingface.co/papers/2512.20578', 'abstract': 'Large language models (LLMs) generate fluent and complex outputs but often fail to recognize their own mistakes and hallucinations. Existing approaches typically rely on external judges, multi-sample consistency, or text-based self-critique, which incur additional compute or correlate weakly with true correctness. We ask: can LLMs predict their own failures by inspecting internal states during inference? We introduce Gnosis, a lightweight self-awareness mechanism that enables frozen LLMs to perform intrinsic self-verification by decoding signals from hidden states and attention patterns. Gnosis passively observes internal traces, compresses them into fixed-budget descriptors, and predicts correctness with negligible inference cost, adding only ~5M parameters and operating independently of sequence length. Across math reasoning, open-domain question answering, and academic knowledge benchmarks, and over frozen backbones ranging from 1.7B to 20B parameters, Gnosis consistently outperforms strong internal baselines and large external judges in both accuracy and calibration. Moreover, it generalizes zero-shot to partial generations, enabling early detection of failing trajectories and compute-aware control. These results show that reliable correctness cues are intrinsic to generation process and can be extracted efficiently without external supervision.', 'score': 46, 'issue_id': 426, 'pub_date': '2026-12-23', 'pub_date_card': {'ru': '23 декабря', 'en': 'December 23', 'zh': '12月23日'}, 'hash': '044a6c076f36aa3e', 'authors': ['Amirhosein Ghasemabadi', 'Di Niu'], 'affiliations': ['University of Alberta, Canada'], 'pdf_title_img': 'assets/pdf/title_img/2512.20578.jpg', 'data': {'categories': ['#benchmark', '#interpretability', '#hallucinations', '#reasoning', '#inference', '#training'], 'emoji': '🧠', 'ru': {'title': 'Самопроверка языковых моделей через анализ внутренних состояний', 'desc': 'В статье предлагается Gnosis — механизм самоосознания для больших языковых моделей, который позволяет им обнаруживать собственные ошибки и галлюцинации путём анализа внутренних состояний сети во время генерации. Подход работает путём декодирования сигналов из скрытых слоёв и паттернов внимания, сжимая их в компактные дескрипторы фиксированного размера для предсказания корректности ответа. Методология добавляет всего ~5 млн параметров и функционирует с пренебрежимо малыми вычислительными затратами, не зависит от длины последовательности и не требует внешних судей. Эксперименты на задачах математического рассуждения, открытых вопросно-ответных системах и тестах академических знаний показывают, что Gnosis превосходит сильные базовые модели и внешние верификаторы по точности и калибровке, а также обобщается на частичные генерации для раннего обнаружения ошибок.'}, 'en': {'title': 'Empowering LLMs with Self-Awareness for Error Prediction', 'desc': 'This paper presents Gnosis, a novel self-awareness mechanism for large language models (LLMs) that allows them to predict their own errors during inference. Instead of relying on external judges or additional computational resources, Gnosis analyzes internal states and attention patterns to assess correctness. It compresses these internal signals into manageable descriptors, enabling LLMs to perform self-verification with minimal added parameters and computational cost. The results demonstrate that Gnosis enhances accuracy and reliability in various tasks, showing that LLMs can effectively monitor their own performance without external assistance.'}, 'zh': {'title': 'Gnosis：让模型自我识别错误的创新机制', 'desc': '大型语言模型（LLMs）能够生成流畅且复杂的输出，但常常无法识别自身的错误和幻觉。现有的方法通常依赖外部评估者、多样本一致性或基于文本的自我批评，这些方法会增加计算成本或与真实正确性相关性较弱。我们提出了一种名为Gnosis的轻量级自我意识机制，使得冻结的LLMs能够通过解码隐藏状态和注意力模式中的信号进行内在自我验证。Gnosis能够被动观察内部痕迹，将其压缩为固定预算的描述符，并以极小的推理成本预测正确性，且仅增加约5M参数，独立于序列长度。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.02204', 'title': 'NextFlow: Unified Sequential Modeling Activates Multimodal Understanding and Generation', 'url': 'https://huggingface.co/papers/2601.02204', 'abstract': 'NextFlow is a unified decoder-only autoregressive transformer that processes interleaved text-image tokens, enabling fast multimodal generation through novel next-token and next-scale prediction strategies.  \t\t\t\t\tAI-generated summary \t\t\t\t We present NextFlow, a unified decoder-only autoregressive transformer trained on 6 trillion interleaved text-image discrete tokens. By leveraging a unified vision representation within a unified autoregressive architecture, NextFlow natively activates multimodal understanding and generation capabilities, unlocking abilities of image editing, interleaved content and video generation. Motivated by the distinct nature of modalities - where text is strictly sequential and images are inherently hierarchical - we retain next-token prediction for text but adopt next-scale prediction for visual generation. This departs from traditional raster-scan methods, enabling the generation of 1024x1024 images in just 5 seconds - orders of magnitude faster than comparable AR models. We address the instabilities of multi-scale generation through a robust training recipe. Furthermore, we introduce a prefix-tuning strategy for reinforcement learning. Experiments demonstrate that NextFlow achieves state-of-the-art performance among unified models and rivals specialized diffusion baselines in visual quality.', 'score': 45, 'issue_id': 426, 'pub_date': '2026-01-05', 'pub_date_card': {'ru': '5 января', 'en': 'January 5', 'zh': '1月5日'}, 'hash': '0489432e14ac471c', 'authors': ['Huichao Zhang', 'Liao Qu', 'Yiheng Liu', 'Hang Chen', 'Yangyang Song', 'Yongsheng Dong', 'Shikun Sun', 'Xian Li', 'Xu Wang', 'Yi Jiang', 'Hu Ye', 'Bo Chen', 'Yiming Gao', 'Peng Liu', 'Akide Liu', 'Zhipeng Yang', 'Qili Deng', 'Linjie Xing', 'Jiyang Liu', 'Zhao Wang', 'Yang Zhou', 'Mingcong Liu', 'Yi Zhang', 'Qian He', 'Xiwei Hu', 'Zhongqi Qi', 'Jie Shao', 'Zhiye Fu', 'Shuai Wang', 'Fangmin Chen', 'Xuezhi Chai', 'Zhihua Wu', 'Yitong Wang', 'Zehuan Yuan', 'Daniel K. Du', 'Xinglong Wu'], 'affiliations': ['ByteDance', 'Monash University', 'TsingHua University'], 'pdf_title_img': 'assets/pdf/title_img/2601.02204.jpg', 'data': {'categories': ['#multimodal', '#video', '#rlhf', '#architecture', '#training'], 'emoji': '⚡', 'ru': {'title': 'Мультимодальная генерация со скоростью света через многомасштабное предсказание', 'desc': 'NextFlow — это единая модель трансформера, обучаемая предсказывать следующий токен на 6 триллионах перемешанных текстово-визуальных дискретных токенов. Архитектура использует разные стратегии генерации для разных модальностей: для текста применяется стандартное предсказание следующего токена, а для изображений — предсказание следующего масштаба, что отражает иерархическую природу визуального контента. Такой подход позволяет генерировать изображения высокого разрешения (1024x1024) за 5 секунд, что значительно быстрее традиционных авторегрессивных моделей на основе растровой развёртки. Модель демонстрирует конкурентную производительность в редактировании изображений, генерации видео и создании пе
