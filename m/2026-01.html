the Standing Committee, that dominates routing across various domains and architectures. This suggests that the expected specialization in MoE models is less significant than previously thought, and current training methods may hinder the model's performance by not aligning with its natural optimization tendencies."}, 'zh': {'title': '混合专家模型中的中央委员会影响专业化', 'desc': '这篇论文挑战了混合专家模型中领域专业化的假设，指出在不同领域和架构中存在一个持续的中央委员会专家，主导着路由行为。研究引入了COMMITTEEAUDIT框架，分析专家组的路由行为，而不是单个专家。通过对三种代表性模型和MMLU基准的研究，发现了一个领域不变的常设委员会，这个委员会在不同领域、层次和路由预算中始终占据主要的路由质量。研究结果表明，混合专家模型中的专业化程度远低于普遍认为的水平，当前的训练目标可能会限制模型的训练效率和性能。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05172', 'title': 'CoV: Chain-of-View Prompting for Spatial Reasoning', 'url': 'https://huggingface.co/papers/2601.05172', 'abstract': 'Chain-of-View prompting enables vision-language models to actively explore 3D environments by selecting question-aligned views and iteratively adjusting camera positions to improve spatial reasoning in embodied question answering.  \t\t\t\t\tAI-generated summary \t\t\t\t Embodied question answering (EQA) in 3D environments often requires collecting context that is distributed across multiple viewpoints and partially occluded. However, most recent vision--language models (VLMs) are constrained to a fixed and finite set of input views, which limits their ability to acquire question-relevant context at inference time and hinders complex spatial reasoning. We propose Chain-of-View (CoV) prompting, a training-free, test-time reasoning framework that transforms a VLM into an active viewpoint reasoner through a coarse-to-fine exploration process. CoV first employs a View Selection agent to filter redundant frames and identify question-aligned anchor views. It then performs fine-grained view adjustment by interleaving iterative reasoning with discrete camera actions, obtaining new observations from the underlying 3D scene representation until sufficient context is gathered or a step budget is reached.   We evaluate CoV on OpenEQA across four mainstream VLMs and obtain an average +11.56\\% improvement in LLM-Match, with a maximum gain of +13.62\\% on Qwen3-VL-Flash. CoV further exhibits test-time scaling: increasing the minimum action budget yields an additional +2.51\\% average improvement, peaking at +3.73\\% on Gemini-2.5-Flash. On ScanQA and SQA3D, CoV delivers strong performance (e.g., 116 CIDEr / 31.9 EM@1 on ScanQA and 51.1 EM@1 on SQA3D). Overall, these results suggest that question-aligned view selection coupled with open-view search is an effective, model-agnostic strategy for improving spatial reasoning in 3D EQA without additional training.', 'score': 8, 'issue_id': 502, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': '30169d7a3fe8549f', 'authors': ['Haoyu Zhao', 'Akide Liu', 'Zeyu Zhang', 'Weijie Wang', 'Feng Chen', 'Ruihan Zhu', 'Gholamreza Haffari', 'Bohan Zhuang'], 'affiliations': ['AIML, Adelaide University', 'Monash University', 'ZIP Lab, Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2601.05172.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#agents', '#3d', '#reasoning'], 'emoji': '🔍', 'ru': {'title': 'Активное исследование 3D сцен через целенаправленный выбор точек обзора', 'desc': 'В работе предложен метод Chain-of-View prompting, который позволяет мультимодальным моделям активно исследовать трёхмерные окружения, выбирая релевантные ракурсы и итеративно корректируя позицию камеры. Подход использует агента для выбора ключевых видов, отфильтровывая избыточные кадры, а затем применяет тонкую настройку позиции камеры через чередование рассуждений с дискретными действиями. Метод работает как постобработка без дополнительного обучения и показывает улучшение на 11.56% в среднем на бенчмарке OpenEQA. Результаты демонстрируют, что согласованный с вопросом выбор видов эффективно улучшает пространственное рассуждение в задачах воплощённого ответа на вопросы в 3D окружениях.'}, 'en': {'title': 'Enhancing Spatial Reasoning in 3D with Chain-of-View Prompting', 'desc': 'This paper introduces Chain-of-View (CoV) prompting, a novel approach that enhances vision-language models (VLMs) for embodied question answering in 3D environments. CoV allows models to dynamically select and adjust camera views to gather relevant context, overcoming limitations of fixed input views. By employing a View Selection agent and iterative reasoning, CoV improves spatial reasoning capabilities without requiring additional training. The results show significant performance gains across various benchmarks, demonstrating the effectiveness of this model-agnostic strategy.'}, 'zh': {'title': '链视提示：提升三维空间推理的有效策略', 'desc': '本文提出了一种名为链视提示（Chain-of-View，CoV）的方法，旨在提升视觉语言模型在三维环境中的空间推理能力。CoV通过选择与问题相关的视角并迭代调整相机位置，帮助模型主动探索环境，从而收集分散在多个视点的上下文信息。该方法不需要额外的训练，而是通过粗到细的探索过程，使模型能够在推理时获取更多相关信息。实验结果表明，CoV在多个主流视觉语言模型上均显著提高了表现，证明了其在三维环境中进行问题回答的有效性。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.03559', 'title': 'DiffCoT: Diffusion-styled Chain-of-Thought Reasoning in LLMs', 'url': 'https://huggingface.co/papers/2601.03559', 'abstract': 'DiffCoT reformulates chain-of-thought reasoning as an iterative denoising process using diffusion principles, enabling unified generation and correction of intermediate steps while maintaining causal consistency.  \t\t\t\t\tAI-generated summary \t\t\t\t Chain-of-Thought (CoT) reasoning improves multi-step mathematical problem solving in large language models but remains vulnerable to exposure bias and error accumulation, as early mistakes propagate irreversibly through autoregressive decoding. In this work, we propose DiffCoT, a diffusion-styled CoT framework that reformulates CoT reasoning as an iterative denoising process. DiffCoT integrates diffusion principles at the reasoning-step level via a sliding-window mechanism, enabling unified generation and retrospective correction of intermediate steps while preserving token-level autoregression. To maintain causal consistency, we further introduce a causal diffusion noise schedule that respects the temporal structure of reasoning chains. Extensive experiments on three multi-step CoT reasoning benchmarks across diverse model backbones demonstrate that DiffCoT consistently outperforms existing CoT preference optimization methods, yielding improved robustness and error-correction capability in CoT reasoning.', 'score': 8, 'issue_id': 492, 'pub_date': '2026-01-07', 'pub_date_card': {'ru': '7 января', 'en': 'January 7', 'zh': '1月7日'}, 'hash': 'add13e4a635a0515', 'authors': ['Shidong Cao', 'Hongzhan Lin', 'Yuxuan Gu', 'Ziyang Luo', 'Jing Ma'], 'affiliations': ['Harbin Institute of Technology', 'Hong Kong Baptist University'], 'pdf_title_img': 'assets/pdf/title_img/2601.03559.jpg', 'data': {'categories': ['#training', '#diffusion', '#math', '#reasoning', '#architecture'], 'emoji': '🔄', 'ru': {'title': 'Цепочка рассуждений как процесс очистки от шума', 'desc': 'В работе предлагается DiffCoT — метод переформулирования цепочки рассуждений как итеративного процесса удаления шума, основанного на принципах диффузионных моделей. Подход решает проблему ошибок в многошаговом рассуждении, позволяя не только генерировать промежуточные шаги, но и исправлять их ретроспективно, сохраняя при этом причинно-следственную согласованность. Авторы вводят скользящее окно на уровне шагов рассуждения и специальное расписание шума для поддержания временной структуры логических цепочек. Экспериментальные результаты на нескольких бенчмарках показывают, что DiffCoT превосходит существующие методы оптимизации предпочтений в цепочке рассуждений, обеспечивая лучшую робустность и способность к исправлению ошибок.'}, 'en': {'title': 'DiffCoT: Enhancing Reasoning with Diffusion Principles', 'desc': 'This paper introduces DiffCoT, a novel framework that enhances chain-of-thought (CoT) reasoning in large language models by applying diffusion principles. It reformulates CoT reasoning as an iterative denoising process, allowing for the generation and correction of intermediate reasoning steps while maintaining causal consistency. The framework employs a sliding-window mechanism to integrate diffusion at the reasoning-step level, which helps to mitigate issues like exposure bias and error accumulation. Experimental results show that DiffCoT outperforms traditional CoT optimization methods, demonstrating better robustness and error correction in multi-step reasoning tasks.'}, 'zh': {'title': 'DiffCoT：提升链式思维推理的鲁棒性与准确性', 'desc': 'DiffCoT将链式思维推理重新构建为一个迭代去噪过程，利用扩散原理来统一生成和修正中间步骤，同时保持因果一致性。传统的链式思维推理在多步骤数学问题解决中表现良好，但容易受到曝光偏差和错误累积的影响。DiffCoT通过滑动窗口机制在推理步骤级别整合扩散原理，使得中间步骤的生成和回顾性修正变得更加高效。实验结果表明，DiffCoT在多个多步骤推理基准测试中优于现有的方法，展现出更强的鲁棒性和错误修正能力。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05239', 'title': 'Plenoptic Video Generation', 'url': 'https://huggingface.co/papers/2601.05239', 'abstract': 'PlenopticDreamer enables consistent multi-view video re-rendering through synchronized generative hallucinations, leveraging camera-guided retrieval and progressive training mechanisms for improved temporal coherence and visual fidelity.  \t\t\t\t\tAI-generated summary \t\t\t\t Camera-controlled generative video re-rendering methods, such as ReCamMaster, have achieved remarkable progress. However, despite their success in single-view setting, these works often struggle to maintain consistency across multi-view scenarios. Ensuring spatio-temporal coherence in hallucinated regions remains challenging due to the inherent stochasticity of generative models. To address it, we introduce PlenopticDreamer, a framework that synchronizes generative hallucinations to maintain spatio-temporal memory. The core idea is to train a multi-in-single-out video-conditioned model in an autoregressive manner, aided by a camera-guided video retrieval strategy that adaptively selects salient videos from previous generations as conditional inputs. In addition, Our training incorporates progressive context-scaling to improve convergence, self-conditioning to enhance robustness against long-range visual degradation caused by error accumulation, and a long-video conditioning mechanism to support extended video generation. Extensive experiments on the Basic and Agibot benchmarks demonstrate that PlenopticDreamer achieves state-of-the-art video re-rendering, delivering superior view synchronization, high-fidelity visuals, accurate camera control, and diverse view transformations (e.g., third-person to third-person, and head-view to gripper-view in robotic manipulation). Project page: https://research.nvidia.com/labs/dir/plenopticdreamer/', 'score': 7, 'issue_id': 493, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': 'e200e4f57b8dacae', 'authors': ['Xiao Fu', 'Shitao Tang', 'Min Shi', 'Xian Liu', 'Jinwei Gu', 'Ming-Yu Liu', 'Dahua Lin', 'Chen-Hsuan Lin'], 'affiliations': ['Georgia Institute of Technology', 'NVIDIA', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2601.05239.jpg', 'data': {'categories': ['#multimodal', '#video', '#training'], 'emoji': '🎬', 'ru': {'title': 'Синхронные галлюцинации для согласованного мультивидового переотрисовки', 'desc': 'PlenopticDreamer — это фреймворк для переотрисовки видео с контролируемой камерой, который решает проблему поддержания пространственно-временной согласованности при генерации нескольких видов одновременно. Метод использует синхронизированные генеративные галлюцинации и стратегию поиска видео, управляемую параметрами камеры, чтобы адаптивно выбирать релевантные фреймы из предыдущих поколений в качестве условных входов. В обучении применяются прогрессивное масштабирование контекста и самокондиционирование для улучшения устойчивости к накоплению ошибок при длительной генерации видео. Экспериментальные результаты показывают, что фреймворк достигает современных показателей в качестве визуализации, синхронизации видов и точности управления камерой.'}, 'en': {'title': 'Synchronized Generative Hallucinations for Multi-View Video Mastery', 'desc': 'PlenopticDreamer is a novel framework designed for multi-view video re-rendering that ensures consistent visual output across different perspectives. It utilizes synchronized generative hallucinations, which help maintain spatio-temporal coherence in the generated video content. The model employs a camera-guided retrieval system to select relevant video segments from previous generations, enhancing the quality of the output. Additionally, it incorporates progressive training techniques to improve model robustness and visual fidelity, achieving state-of-the-art results in video re-rendering tasks.'}, 'zh': {'title': '同步生成幻觉，实现多视角视频重渲染的突破', 'desc': 'PlenopticDreamer 是一种新框架，能够通过同步生成的幻觉实现一致的多视角视频重渲染。它利用相机引导的检索和渐进训练机制，改善了时间一致性和视觉保真度。该方法通过自回归方式训练多输入单输出的视频条件模型，并自适应选择前期生成的显著视频作为条件输入。实验结果表明，PlenopticDreamer 在视频重渲染方面达到了最先进的水平，提供了卓越的视角同步和高保真视觉效果。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05124', 'title': 'Re-Align: Structured Reasoning-guided Alignment for In-Context Image Generation and Editing', 'url': 'https://huggingface.co/papers/2601.05124', 'abstract': "Re-Align addresses the gap between understanding and generation in in-context image generation and editing through structured reasoning-guided alignment and reinforcement learning training.  \t\t\t\t\tAI-generated summary \t\t\t\t In-context image generation and editing (ICGE) enables users to specify visual concepts through interleaved image-text prompts, demanding precise understanding and faithful execution of user intent. Although recent unified multimodal models exhibit promising understanding capabilities, these strengths often fail to transfer effectively to image generation. We introduce Re-Align, a unified framework that bridges the gap between understanding and generation through structured reasoning-guided alignment. At its core lies the In-Context Chain-of-Thought (IC-CoT), a structured reasoning paradigm that decouples semantic guidance and reference association, providing clear textual target and mitigating confusion among reference images. Furthermore, Re-Align introduces an effective RL training scheme that leverages a surrogate reward to measure the alignment between structured reasoning text and the generated image, thereby improving the model's overall performance on ICGE tasks. Extensive experiments verify that Re-Align outperforms competitive methods of comparable model scale and resources on both in-context image generation and editing tasks.", 'score': 5, 'issue_id': 495, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': 'ab34d211b4ce6dc5', 'authors': ['Runze He', 'Yiji Cheng', 'Tiankai Hang', 'Zhimin Li', 'Yu Xu', 'Zijin Yin', 'Shiyi Zhang', 'Wenxun Dai', 'Penghui Du', 'Ao Ma', 'Chunyu Wang', 'Qinglin Lu', 'Jizhong Han', 'Jiao Dai'], 'affiliations': ['Hunyuan, Tencent', 'IIE, CAS', 'UCAS'], 'pdf_title_img': 'assets/pdf/title_img/2601.05124.jpg', 'data': {'categories': ['#transfer_learning', '#multimodal', '#alignment', '#reasoning', '#rl', '#training'], 'emoji': '🎨', 'ru': {'title': 'Структурированное рассуждение для согласования понимания и генерации изображений', 'desc': 'Re-Align решает проблему разрыва между пониманием и генерацией в задачах контекстной генерации и редактирования изображений. В основе подхода лежит метод In-Context Chain-of-Thought (IC-CoT), который структурированно разделяет семантическое руководство и ассоциацию с референсными изображениями, обеспечивая ясные текстовые цели. Авторы применяют обучение с подкреплением, используя суррогатное вознаграждение для измерения согласованности между структурированным рассуждением и сгенерированным изображением. Экспериментальные результаты демонстрируют, что Re-Align превосходит конкурентные методы на задачах контекстной генерации и редактирования изображений.'}, 'en': {'title': 'Bridging Understanding and Generation in Image Creation', 'desc': 'Re-Align is a new framework designed to improve in-context image generation and editing by enhancing the connection between understanding user prompts and generating images. It uses a method called In-Context Chain-of-Thought (IC-CoT) to clarify the relationship between text prompts and reference images, which helps the model better understand what users want. Additionally, Re-Align employs a reinforcement learning training approach that uses a surrogate reward to evaluate how well the generated images match the structured reasoning provided by the text. Experiments show that Re-Align performs better than other similar models in generating and editing images based on user input.'}, 'zh': {'title': '理解与生成的桥梁：Re-Align', 'desc': 'Re-Align 是一个统一框架，旨在通过结构化推理引导的对齐来解决图像生成和编辑中的理解与生成之间的差距。它采用了上下文链式思维（IC-CoT）的方法，能够将语义指导和参考关联解耦，从而提供清晰的文本目标，减少参考图像之间的混淆。此外，Re-Align 还引入了一种有效的强化学习训练方案，利用替代奖励来衡量结构化推理文本与生成图像之间的对齐程度，从而提升模型在图像生成和编辑任务上的整体表现。大量实验验证了 Re-Align 在同类模型规模和资源下的竞争方法中表现优越。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.03111', 'title': 'One Sample to Rule Them All: Extreme Data Efficiency in RL Scaling', 'url': 'https://huggingface.co/papers/2601.03111', 'abstract': 'Reinforcement learning with carefully designed single training samples can significantly enhance the reasoning abilities of large language models across multiple disciplines, outperforming traditional approaches that rely on large datasets.  \t\t\t\t\tAI-generated summary \t\t\t\t The reasoning ability of large language models (LLMs) can be unleashed with reinforcement learning (RL) (OpenAI, 2024; DeepSeek-AI et al., 2025a; Zeng et al., 2025). The success of existing RL attempts in LLMs usually relies on high-quality samples of thousands or beyond. In this paper, we challenge fundamental assumptions about data requirements in RL for LLMs by demonstrating the remarkable effectiveness of one-shot learning. Specifically, we introduce polymath learning, a framework for designing one training sample that elicits multidisciplinary impact. We present three key findings: (1) A single, strategically selected math reasoning sample can produce significant performance improvements across multiple domains, including physics, chemistry, and biology with RL; (2) The math skills salient to reasoning suggest the characteristics of the optimal polymath sample; and (3) An engineered synthetic sample that integrates multidiscipline elements outperforms training with individual samples that naturally occur. Our approach achieves superior performance to training with larger datasets across various reasoning benchmarks, demonstrating that sample quality and design, rather than quantity, may be the key to unlock enhanced reasoning capabilities in language models. Our results suggest a shift, dubbed as sample engineering, toward precision engineering of training samples rather than simply increasing data volume.', 'score': 5, 'issue_id': 502, 'pub_date': '2026-01-06', 'pub_date_card': {'ru': '6 января', 'en': 'January 6', 'zh': '1月6日'}, 'hash': 'fd6febf737aa4e79', 'authors': ['Yiyuan Li', 'Zhen Huang', 'Yanan Wu', 'Weixun Wang', 'Xuefeng Li', 'Yijia Luo', 'Wenbo Su', 'Bo Zheng', 'Pengfei Liu'], 'affiliations': ['GAIR', 'Shanghai Jiaotong University', 'Taobao & Tmall Group of Alibaba'], 'pdf_title_img': 'assets/pdf/title_img/2601.03111.jpg', 'data': {'categories': ['#synthetic', '#training', '#rl', '#optimization', '#reasoning'], 'emoji': '🎯', 'ru': {'title': 'Один пример вместо тысяч: инженерия качества обучающих данных для усиления рассуждений LLM', 'desc': 'В этой работе исследуется применение обучения с подкреплением для улучшения способностей больших языковых моделей к рассуждению, используя концепцию полиматического обучения на одном примере. Авторы демонстрируют, что один стратегически подобранный пример решения математической задачи может существенно улучшить производительность модели сразу по нескольким дисциплинам — физике, химии и биологии. Ключевое открытие состоит в том, что качество и дизайн обучающего примера значительно важнее количества данных, а специально разработанный синтетический пример превосходит традиционные выборки. Авторы вводят концепцию инженерии примеров — целенаправленного проектирования обучающих данных вместо простого увеличения их объёма.'}, 'en': {'title': 'Unlocking Reasoning with One Perfect Sample', 'desc': 'This paper explores how reinforcement learning (RL) can improve the reasoning abilities of large language models (LLMs) using just one carefully designed training sample. It introduces a new approach called polymath learning, which shows that a single, well-chosen math reasoning sample can enhance performance in various fields like physics, chemistry, and biology. The authors argue that the quality and design of training samples are more important than the quantity, challenging the traditional reliance on large datasets. Their findings suggest a shift towards sample engineering, focusing on creating optimal training samples to boost reasoning capabilities in LLMs.'}, 'zh': {'title': '样本设计：提升推理能力的新策略', 'desc': '本论文探讨了通过精心设计的单一训练样本来提升大型语言模型的推理能力。我们提出了一种名为多才学习的框架，展示了单次学习在多个学科中的有效性。研究表明，经过精心选择的数学推理样本能够显著提高在物理、化学和生物等领域的表现。我们的结果表明，样本的质量和设计比数量更为重要，这可能是提升语言模型推理能力的关键。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05163', 'title': 'DocDancer: Towards Agentic Document-Grounded Information Seeking', 'url': 'https://huggingface.co/papers/2601.05163', 'abstract': 'DocDancer is an end-to-end trained open-source document question answering agent that formulates the task as an information-seeking problem and uses a tool-driven framework with exploration and synthesis for training.  \t\t\t\t\tAI-generated summary \t\t\t\t Document Question Answering (DocQA) focuses on answering questions grounded in given documents, yet existing DocQA agents lack effective tool utilization and largely rely on closed-source models. In this work, we introduce DocDancer, an end-to-end trained open-source Doc agent. We formulate DocQA as an information-seeking problem and propose a tool-driven agent framework that explicitly models document exploration and comprehension. To enable end-to-end training of such agents, we introduce an Exploration-then-Synthesis data synthesis pipeline that addresses the scarcity of high-quality training data for DocQA. Training on the synthesized data, the trained models on two long-context document understanding benchmarks, MMLongBench-Doc and DocBench, show their effectiveness. Further analysis provides valuable insights for the agentic tool design and synthetic data.', 'score': 3, 'issue_id': 492, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': 'd54786c0b7245d58', 'authors': ['Qintong Zhang', 'Xinjie Lv', 'Jialong Wu', 'Baixuan Li', 'Zhengwei Tao', 'Guochen Yan', 'Huanyao Zhang', 'Bin Wang', 'Jiahao Xu', 'Haitao Mi', 'Wentao Zhang'], 'affiliations': ['Peking University', 'Shanghai AI Lab', 'Tencent AI Lab'], 'pdf_title_img': 'assets/pdf/title_img/2601.05163.jpg', 'data': {'categories': ['#open_source', '#long_context', '#benchmark', '#dataset', '#data', '#agents', '#synthetic'], 'emoji': '🕺', 'ru': {'title': 'Танец с документами: агент с инструментами для поиска информации в текстах', 'desc': 'DocDancer — это открытый агент для ответа на вопросы о документах, который формулирует задачу как проблему поиска информации и использует фреймворк на основе инструментов с этапами исследования и синтеза. Авторы предлагают конвейер синтеза данных Exploration-then-Synthesis для решения проблемы нехватки высококачественных тренировочных данных в задачах DocQA. Модель обучается end-to-end на синтетических данных и демонстрирует эффективность на бенчмарках MMLongBench-Doc и DocBench для понимания длинных документов. Работа предоставляет ценные рекомендации по проектированию инструментов для агентов и созданию синтетических данных.'}, 'en': {'title': 'DocDancer: Revolutionizing Document Question Answering with Open-Source Innovation', 'desc': 'DocDancer is an innovative open-source document question answering (DocQA) agent that approaches the task as an information-seeking challenge. It utilizes a tool-driven framework that emphasizes both exploration of documents and synthesis of information for effective training. To tackle the issue of limited high-quality training data, the authors introduce a novel Exploration-then-Synthesis data synthesis pipeline. The performance of DocDancer is validated on two benchmarks, demonstrating its capability in long-context document understanding and providing insights for future tool design.'}, 'zh': {'title': 'DocDancer：开源文档问答的新突破', 'desc': 'DocDancer是一个端到端训练的开源文档问答代理，旨在将文档问答任务视为信息获取问题。它采用工具驱动的框架，通过探索和综合的方式进行训练，以提高问答的准确性。为了支持端到端的训练，本文提出了一种探索-再综合的数据合成管道，解决了高质量训练数据稀缺的问题。经过合成数据的训练，DocDancer在两个长文本理解基准上表现出色，展示了其有效性。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05149', 'title': 'Multi-Scale Local Speculative Decoding for Image Generation', 'url': 'https://huggingface.co/papers/2601.05149', 'abstract': 'Multi-Scale Local Speculative Decoding accelerates autoregressive image generation through multi-resolution drafting and spatially informed verification while maintaining semantic quality and perceptual fidelity.  \t\t\t\t\tAI-generated summary \t\t\t\t Autoregressive (AR) models have achieved remarkable success in image synthesis, yet their sequential nature imposes significant latency constraints. Speculative Decoding offers a promising avenue for acceleration, but existing approaches are limited by token-level ambiguity and lack of spatial awareness. In this work, we introduce Multi-Scale Local Speculative Decoding (MuLo-SD), a novel framework that combines multi-resolution drafting with spatially informed verification to accelerate AR image generation. Our method leverages a low-resolution drafter paired with learned up-samplers to propose candidate image tokens, which are then verified in parallel by a high-resolution target model. Crucially, we incorporate a local rejection and resampling mechanism, enabling efficient correction of draft errors by focusing on spatial neighborhoods rather than raster-scan resampling after the first rejection. We demonstrate that MuLo-SD achieves substantial speedups - up to 1.7times - outperforming strong speculative decoding baselines such as EAGLE-2 and LANTERN in terms of acceleration, while maintaining comparable semantic alignment and perceptual quality. These results are validated using GenEval, DPG-Bench, and FID/HPSv2 on the MS-COCO 5k validation split. Extensive ablations highlight the impact of up-sampling design, probability pooling, and local rejection and resampling with neighborhood expansion. Our approach sets a new state-of-the-art in speculative decoding for image synthesis, bridging the gap between efficiency and fidelity.', 'score': 2, 'issue_id': 505, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': '3eb3439c3eef40bd', 'authors': ['Elia Peruzzo', 'Guillaume Sautière', 'Amirhossein Habibian'], 'affiliations': ['Qualcomm AI Research'], 'pdf_title_img': 'assets/pdf/title_img/2601.05149.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'Многомасштабное спекулятивное декодирование для быстрой генерации изображений', 'desc': 'В статье предложен метод Multi-Scale Local Speculative Decoding (MuLo-SD) для ускорения авторегрессивной генерации изображений. Метод использует двухуровневую архитектуру с низкоразрешённой моделью-черновиком и высокоразрешённой целевой моделью для параллельной проверки предложенных токенов. Ключевой инновацией является механизм локального отклонения и переиспользования, который исправляет ошибки в пространственной окрестности вместо полной переиспользования изображения. Метод достигает ускорения до 1.7x при сохранении качества генерируемых изображений, превосходя существующие подходы вроде EAGLE-2 и LANTERN.'}, 'en': {'title': 'Accelerating Image Generation with Smart Drafting and Verification', 'desc': 'This paper presents Multi-Scale Local Speculative Decoding (MuLo-SD), a new method to speed up autoregressive image generation while preserving quality. It combines low-resolution drafting with high-resolution verification to propose and refine image tokens efficiently. The approach uses a local rejection and resampling mechanism that focuses on nearby pixels, improving error correction. The results show that MuLo-SD significantly accelerates the generation process, achieving up to 1.7 times faster performance compared to existing methods, without sacrificing semantic and perceptual quality.'}, 'zh': {'title': '多尺度局部推测解码：加速图像生成的新方法', 'desc': '本论文提出了一种新的多尺度局部推测解码框架（MuLo-SD），旨在加速自回归图像生成。该方法结合了多分辨率草图和空间信息验证，解决了现有推测解码方法在标记级别模糊性和缺乏空间意识的问题。通过低分辨率草图生成候选图像标记，并利用高分辨率目标模型进行并行验证，显著提高了生成速度。实验结果表明，MuLo-SD在保持语义一致性和感知质量的同时，速度提升可达1.7倍，成为图像合成领域的最新技术。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.04792', 'title': 'PyramidalWan: On Making Pretrained Video Model Pyramidal for Efficient Inference', 'url': 'https://huggingface.co/papers/2601.04792', 'abstract': 'Pyramidal diffusion models reduce computational cost through hierarchical resolution processing, with pretrained models converted via low-cost fine-tuning maintaining output quality while enabling efficient inference.  \t\t\t\t\tAI-generated summary \t\t\t\t Recently proposed pyramidal models decompose the conventional forward and backward diffusion processes into multiple stages operating at varying resolutions. These models handle inputs with higher noise levels at lower resolutions, while less noisy inputs are processed at higher resolutions. This hierarchical approach significantly reduces the computational cost of inference in multi-step denoising models. However, existing open-source pyramidal video models have been trained from scratch and tend to underperform compared to state-of-the-art systems in terms of visual plausibility. In this work, we present a pipeline that converts a pretrained diffusion model into a pyramidal one through low-cost finetuning, achieving this transformation without degradation in quality of output videos. Furthermore, we investigate and compare various strategies for step distillation within pyramidal models, aiming to further enhance the inference efficiency. Our results are available at https://qualcomm-ai-research.github.io/PyramidalWan.', 'score': 2, 'issue_id': 509, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': '482ad7e44a3f4895', 'authors': ['Denis Korzhenkov', 'Adil Karjauv', 'Animesh Karnewar', 'Mohsen Ghafoorian', 'Amirhossein Habibian'], 'affiliations': ['Qualcomm AI Research'], 'pdf_title_img': 'assets/pdf/title_img/2601.04792.jpg', 'data': {'categories': ['#optimization', '#diffusion', '#training', '#video', '#inference', '#open_source'], 'emoji': '🔺', 'ru': {'title': 'Иерархический денойзинг: пирамидальные диффузионные модели для быстрого инференса', 'desc': 'В работе предложен метод преобразования предобученных диффузионных моделей в пирамидальные модели с помощью экономичной доориентировки. Пирамидальные модели обрабатывают входные данные иерархически: шумные входы обрабатываются на низких разрешениях, а менее шумные — на высоких, что значительно снижает вычислительные затраты при многошаговом денойзинге. Авторы исследуют различные стратегии дистилляции шагов в пирамидальных моделях для дальнейшего повышения эффективности инференса. Предложенный подход позволяет конвертировать существующие модели без потери качества выходных видео.'}, 'en': {'title': 'Efficient Inference with Pyramidal Diffusion Models', 'desc': 'This paper introduces pyramidal diffusion models that optimize computational efficiency by processing data at different resolutions. The models operate in stages, handling noisier inputs at lower resolutions and clearer inputs at higher resolutions, which reduces the overall computational load during inference. The authors propose a method to convert existing pretrained models into pyramidal models using low-cost fine-tuning, ensuring that the quality of the output remains high. Additionally, they explore various strategies for step distillation to further improve the efficiency of these models during inference.'}, 'zh': {'title': '金字塔扩散模型：高效推理的新方法', 'desc': '金字塔扩散模型通过分层分辨率处理来降低计算成本。这些模型将传统的前向和后向扩散过程分解为多个阶段，在不同的分辨率下运行。它们在较低分辨率下处理高噪声输入，而在较高分辨率下处理低噪声输入，从而显著减少多步去噪模型的推理计算成本。我们提出了一种通过低成本微调将预训练扩散模型转换为金字塔模型的流程，确保输出视频质量不下降，同时还研究了金字塔模型中的步骤蒸馏策略，以进一步提高推理效率。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.04754', 'title': 'ProFuse: Efficient Cross-View Context Fusion for Open-Vocabulary 3D Gaussian Splatting', 'url': 'https://huggingface.co/papers/2601.04754', 'abstract': 'ProFuse enhances 3D scene understanding by integrating semantic information into 3D Gaussian Splatting through efficient context-aware processing and pre-registration phases.  \t\t\t\t\tAI-generated summary \t\t\t\t We present ProFuse, an efficient context-aware framework for open-vocabulary 3D scene understanding with 3D Gaussian Splatting (3DGS). The pipeline enhances cross-view consistency and intra-mask cohesion within a direct registration setup, adding minimal overhead and requiring no render-supervised fine-tuning. Instead of relying on a pretrained 3DGS scene, we introduce a dense correspondence-guided pre-registration phase that initializes Gaussians with accurate geometry while jointly constructing 3D Context Proposals via cross-view clustering. Each proposal carries a global feature obtained through weighted aggregation of member embeddings, and this feature is fused onto Gaussians during direct registration to maintain per-primitive language coherence across views. With associations established in advance, semantic fusion requires no additional optimization beyond standard reconstruction, and the model retains geometric refinement without densification. ProFuse achieves strong open-vocabulary 3DGS understanding while completing semantic attachment in about five minutes per scene, which is two times faster than SOTA.', 'score': 2, 'issue_id': 499, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': '8bdee003577e3af9', 'authors': ['Yen-Jen Chiou', 'Wei-Tse Cheng', 'Yuan-Fu Yang'], 'affiliations': ['National Yang Ming Chiao Tung University'], 'pdf_title_img': 'assets/pdf/title_img/2601.04754.jpg', 'data': {'categories': ['#3d', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Семантическое слияние в 3D Gaussian Splatting без дополнительной оптимизации', 'desc': 'ProFuse представляет эффективный фреймворк для семантического понимания 3D сцен с использованием 3D Gaussian Splatting, который интегрирует языковую информацию через контекстно-осознанную обработку. Ключевой инновацией является фаза предварительной регистрации, управляемая плотными соответствиями, которая инициализирует гауссианы с точной геометрией и одновременно строит 3D контекстные предложения путём кросс-видового кластеризации. Глобальные признаки каждого предложения получаются через взвешенную агрегацию эмбеддингов и сливаются с гауссианами для сохранения языковой согласованности примитивов на разных видах. Метод достигает сильных результатов в open-vocabulary понимании сцен за пять минут без дополнительной оптимизации, что вдвое быстрее существующих аналогов.'}, 'en': {'title': 'ProFuse: Fast and Semantic 3D Scene Understanding', 'desc': 'ProFuse is a novel framework that improves 3D scene understanding by integrating semantic information into the process of 3D Gaussian Splatting (3DGS). It utilizes a context-aware approach that enhances the consistency of views and the cohesion of object masks without needing extensive fine-tuning. The method includes a pre-registration phase that accurately initializes Gaussian representations and constructs 3D Context Proposals through cross-view clustering. This allows for efficient semantic fusion and geometric refinement, achieving significant speed improvements over existing state-of-the-art methods.'}, 'zh': {'title': 'ProFuse：高效的3D场景理解新方法', 'desc': 'ProFuse 是一个高效的上下文感知框架，旨在通过 3D 高斯点云（3D Gaussian Splatting）增强开放词汇的 3D 场景理解。该方法通过直接注册设置提高了跨视图一致性和内部掩膜的凝聚力，且几乎没有额外开销。ProFuse 引入了一种密集对应引导的预注册阶段，能够准确初始化高斯并通过跨视图聚类共同构建 3D 上下文提案。该模型在每个场景中完成语义附加的速度约为五分钟，是当前最先进技术的两倍。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.04575', 'title': 'Scaling Behavior Cloning Improves Causal Reasoning: An Open Model for Real-Time Video Game Playing', 'url': 'https://huggingface.co/papers/2601.04575', 'abstract': "Behavior cloning demonstrates improved performance and causal reasoning through scaling model size and training data, achieving human-level gameplay in 3D video games.  \t\t\t\t\tAI-generated summary \t\t\t\t Behavior cloning is enjoying a resurgence in popularity as scaling both model and data sizes proves to provide a strong starting point for many tasks of interest. In this work, we introduce an open recipe for training a video game playing foundation model designed for inference in realtime on a consumer GPU. We release all data (8300+ hours of high quality human gameplay), training and inference code, and pretrained checkpoints under an open license. We show that our best model is capable of playing a variety of 3D video games at a level competitive with human play. We use this recipe to systematically examine the scaling laws of behavior cloning to understand how the model's performance and causal reasoning varies with model and data scale. We first show in a simple toy problem that, for some types of causal reasoning, increasing both the amount of training data and the depth of the network results in the model learning a more causal policy. We then systematically study how causality varies with the number of parameters (and depth) and training steps in scaled models of up to 1.2 billion parameters, and we find similar scaling results to what we observe in the toy problem.", 'score': 2, 'issue_id': 504, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': 'ca12e042748c296d', 'authors': ['Yuguang Yue', 'Irakli Salia', 'Samuel Hunt', 'Chris Green', 'Wenzhe Shi', 'Jonathan J Hunt'], 'affiliations': ['Player2, USA'], 'pdf_title_img': 'assets/pdf/title_img/2601.04575.jpg', 'data': {'categories': ['#games', '#training', '#dataset', '#optimization', '#3d', '#reasoning', '#agents', '#video', '#open_source'], 'emoji': '🎮', 'ru': {'title': 'Масштабирование поведенческого клонирования раскрывает причинно-следственное рассуждение в видеоиграх', 'desc': 'В этой работе авторы используют поведенческое клонирование для обучения модели игре в видеоигры путём масштабирования размера модели и объёма данных обучения. Они выпустили открытый набор данных из более чем 8300 часов геймплея и предварительно обученные модели весом до 1.2 миллиардов параметров. Исследование показывает, что увеличение как объёма обучающих данных, так и глубины нейросети улучшает способность модели к причинно-следственному рассуждению при принятии решений. Результаты демонстрируют, что масштабирование позволяет достичь уровня производительности, сопоставимого с человеческим игровым мастерством в различных трёхмерных видеоиграх.'}, 'en': {'title': 'Scaling Up Behavior Cloning for Human-Level Gameplay', 'desc': "This paper discusses the resurgence of behavior cloning in machine learning, particularly for training models to play 3D video games. By scaling up both the model size and the amount of training data, the authors demonstrate that their foundation model can achieve human-level performance in gameplay. They provide an open-source framework that includes extensive gameplay data, training code, and pretrained models, allowing others to replicate their results. The study also explores how increasing model depth and training data enhances the model's ability to learn causal relationships, revealing important insights into the scaling laws of behavior cloning."}, 'zh': {'title': '行为克隆：通过扩展实现人类水平的游戏表现', 'desc': '行为克隆通过扩大模型规模和训练数据，展示了在3D视频游戏中达到人类水平的游戏表现和因果推理能力。本文介绍了一种开放的训练视频游戏基础模型的配方，旨在实时推理并在消费级GPU上运行。我们发布了8300多个小时的高质量人类游戏数据、训练和推理代码，以及预训练检查点，均在开放许可下提供。研究表明，最佳模型能够在多种3D视频游戏中与人类玩家竞争，且通过系统性研究行为克隆的扩展规律，揭示了模型性能和因果推理如何随模型和数据规模变化。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.04342', 'title': 'ReHyAt: Recurrent Hybrid Attention for Video Diffusion Transformers', 'url': 'https://huggingface.co/papers/2601.04342', 'abstract': "ReHyAt introduces a recurrent hybrid attention mechanism that combines softmax and linear attention benefits, enabling efficient video generation with reduced computational costs and improved scalability.  \t\t\t\t\tAI-generated summary \t\t\t\t Recent advances in video diffusion models have shifted towards transformer-based architectures, achieving state-of-the-art video generation but at the cost of quadratic attention complexity, which severely limits scalability for longer sequences. We introduce ReHyAt, a Recurrent Hybrid Attention mechanism that combines the fidelity of softmax attention with the efficiency of linear attention, enabling chunk-wise recurrent reformulation and constant memory usage. Unlike the concurrent linear-only SANA Video, ReHyAt's hybrid design allows efficient distillation from existing softmax-based models, reducing the training cost by two orders of magnitude to ~160 GPU hours, while being competitive in the quality. Our light-weight distillation and finetuning pipeline provides a recipe that can be applied to future state-of-the-art bidirectional softmax-based models. Experiments on VBench and VBench-2.0, as well as a human preference study, demonstrate that ReHyAt achieves state-of-the-art video quality while reducing attention cost from quadratic to linear, unlocking practical scalability for long-duration and on-device video generation. Project page is available at https://qualcomm-ai-research.github.io/rehyat.", 'score': 2, 'issue_id': 509, 'pub_date': '2026-01-07', 'pub_date_card': {'ru': '7 января', 'en': 'January 7', 'zh': '1月7日'}, 'hash': '1816aeec79b1b6b5', 'authors': ['Mohsen Ghafoorian', 'Amirhossein Habibian'], 'affiliations': ['Qualcomm AI Research'], 'pdf_title_img': 'assets/pdf/title_img/2601.04342.jpg', 'data': {'categories': ['#optimization', '#diffusion', '#training', '#architecture', '#video', '#inference', '#open_source'], 'emoji': '🎬', 'ru': {'title': 'Гибридное внимание для масштабируемой генерации видео', 'desc': 'ReHyAt представляет гибридный механизм внимания, который сочетает преимущества softmax и линейного внимания для эффективной генерации видео. Метод использует рекуррентную переформулировку по фрагментам и достигает постоянного расхода памяти, преодолевая квадратичную сложность трансформер-архитектур. Благодаря дистилляции знаний из существующих моделей на основе softmax, ReHyAt требует в сто раз меньше вычислительных ресурсов (~160 GPU часов) при сохранении высокого качества. Эксперименты показывают, что метод достигает современных результатов в генерации видео, снижая вычислительную сложность с квадратичной до линейной.'}, 'en': {'title': 'ReHyAt: Efficient Video Generation with Hybrid Attention', 'desc': 'ReHyAt presents a novel Recurrent Hybrid Attention mechanism that merges the advantages of softmax and linear attention, facilitating efficient video generation. This approach addresses the challenge of quadratic attention complexity in transformer-based models, which hampers scalability for longer video sequences. By enabling chunk-wise recurrent processing and maintaining constant memory usage, ReHyAt significantly reduces training costs while preserving high video quality. The method has been validated through experiments, showing it achieves state-of-the-art results in video generation with improved efficiency.'}, 'zh': {'title': 'ReHyAt：高效视频生成的新方法', 'desc': 'ReHyAt是一种递归混合注意力机制，结合了softmax和线性注意力的优点，能够高效生成视频，同时降低计算成本并提高可扩展性。传统的视频扩散模型使用基于变换器的架构，虽然生成效果优秀，但在处理长序列时会面临二次注意力复杂度的问题。ReHyAt通过块状递归重构和恒定内存使用，解决了这一问题，并且在训练成本上减少了两个数量级。实验结果表明，ReHyAt在视频质量上达到了最先进的水平，同时将注意力成本从二次降低到线性，适用于长时长和设备上的视频生成。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.03362', 'title': 'Guardians of the Hair: Rescuing Soft Boundaries in Depth, Stereo, and Novel Views', 'url': 'https://huggingface.co/papers/2601.03362', 'abstract': 'HairGuard is a framework for recovering fine-grained soft boundary details in 3D vision tasks through specialized depth refinement and view synthesis techniques.  \t\t\t\t\tAI-generated summary \t\t\t\t Soft boundaries, like thin hairs, are commonly observed in natural and computer-generated imagery, but they remain challenging for 3D vision due to the ambiguous mixing of foreground and background cues. This paper introduces Guardians of the Hair (HairGuard), a framework designed to recover fine-grained soft boundary details in 3D vision tasks. Specifically, we first propose a novel data curation pipeline that leverages image matting datasets for training and design a depth fixer network to automatically identify soft boundary regions. With a gated residual module, the depth fixer refines depth precisely around soft boundaries while maintaining global depth quality, allowing plug-and-play integration with state-of-the-art depth models. For view synthesis, we perform depth-based forward warping to retain high-fidelity textures, followed by a generative scene painter that fills disoccluded regions and eliminates redundant background artifacts within soft boundaries. Finally, a color fuser adaptively combines warped and inpainted results to produce novel views with consistent geometry and fine-grained details. Extensive experiments demonstrate that HairGuard achieves state-of-the-art performance across monocular depth estimation, stereo image/video conversion, and novel view synthesis, with significant improvements in soft boundary regions.', 'score': 2, 'issue_id': 495, 'pub_date': '2026-01-06', 'pub_date_card': {'ru': '6 января', 'en': 'January 6', 'zh': '1月6日'}, 'hash': 'fd6d3f256e025564', 'authors': ['Xiang Zhang', 'Yang Zhang', 'Lukas Mehl', 'Markus Gross', 'Christopher Schroers'], 'affiliations': ['DisneyResearchStudios', 'ETH Zurich'], 'pdf_title_img': 'assets/pdf/title_img/2601.03362.jpg', 'data': {'categories': ['#cv', '#data', '#dataset', '#3d'], 'emoji': '💇', 'ru': {'title': 'Охрана мелких деталей: восстановление тонких границ в 3D-зрении', 'desc': 'HairGuard — это фреймворк для восстановления тонких мягких границ объектов в задачах компьютерного зрения, используя уточнение карт глубины и синтез новых видов. Авторы предлагают специализированный конвейер подготовки данных на основе датасетов матирования изображений и нейросетевой модуль для автоматического выявления областей мягких границ. Для синтеза видов применяется деформация текстур на основе карт глубины, генеративная нейросеть для заполнения невидимых областей и адаптивный модуль объединения для получения консистентных результатов. Экспериментальные результаты демонстрируют значительные улучшения в оценке глубины, стереосинтезе и синтезе новых видов, особенно в областях тонких структур.'}, 'en': {'title': 'HairGuard: Mastering Soft Boundaries in 3D Vision', 'desc': 'HairGuard is a novel framework aimed at enhancing the recovery of fine-grained soft boundary details in 3D vision tasks. It utilizes a specialized depth fixer network that identifies and refines depth around soft boundaries, ensuring high-quality global depth. The framework also incorporates depth-based forward warping and a generative scene painter to synthesize new views while maintaining texture fidelity and eliminating background artifacts. Extensive experiments show that HairGuard outperforms existing methods in monocular depth estimation and view synthesis, particularly in handling soft boundary regions effectively.'}, 'zh': {'title': 'HairGuard：恢复3D视觉中的细粒度软边界', 'desc': 'HairGuard是一个框架，旨在通过专门的深度细化和视图合成技术，恢复3D视觉任务中的细粒度软边界细节。该框架首先提出了一种新颖的数据整理流程，利用图像抠图数据集进行训练，并设计了一个深度修复网络，自动识别软边界区域。深度修复网络使用门控残差模块，精确细化软边界周围的深度，同时保持全局深度质量。通过深度基础的前向扭曲和生成场景绘制，HairGuard能够生成具有一致几何形状和细粒度细节的新视图，显著提升了软边界区域的表现。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.24160', 'title': 'Towards Open-Vocabulary Industrial Defect Understanding with a Large-Scale Multimodal Dataset', 'url': 'https://huggingface.co/papers/2512.24160', 'abstract': 'A large-scale industrial multimodal defect dataset with 1 million image-text pairs enables efficient foundation model adaptation for manufacturing quality inspection and generation tasks.  \t\t\t\t\tAI-generated summary \t\t\t\t We present IMDD-1M, the first large-scale Industrial Multimodal Defect Dataset comprising 1,000,000 aligned image-text pairs, designed to advance multimodal learning for manufacturing and quality inspection. IMDD-1M contains high-resolution real-world defects spanning over 60 material categories and more than 400 defect types, each accompanied by expert-verified annotations and fine-grained textual descriptions detailing defect location, severity, and contextual attributes. This dataset enables a wide spectrum of applications, including classification, segmentation, retrieval, captioning, and generative modeling. Building upon IMDD-1M, we train a diffusion-based vision-language foundation model from scratch, specifically tailored for industrial scenarios. The model serves as a generalizable foundation that can be efficiently adapted to specialized domains through lightweight fine-tuning. With less than 5% of the task-specific data required by dedicated expert models, it achieves comparable performance, highlighting the potential of data-efficient foundation model adaptation for industrial inspection and generation, paving the way for scalable, domain-adaptive, and knowledge-grounded manufacturing intelligence.', 'score': 2, 'issue_id': 497, 'pub_date': '2026-12-30', 'pub_date_card': {'ru': '30 декабря', 'en': 'December 30', 'zh': '12月30日'}, 'hash': '9eb9ce39c2f3de67', 'authors': ['TsaiChing Ni', 'ZhenQi Chen', 'YuanFu Yang'], 'affiliations': ['Institute of Intelligent Systems, National Yang Ming Chiao Tung University'], 'pdf_title_img': 'assets/pdf/title_img/2512.24160.jpg', 'data': {'categories': ['#open_source', '#dataset', '#transfer_learning', '#diffusion', '#synthetic', '#multimodal', '#training'], 'emoji': '🏭', 'ru': {'title': 'Универсальная мультимодальная модель для промышленной диагностики дефектов с экономией данных', 'desc': 'Представлена IMDD-1M — первый крупномасштабный датасет промышленных дефектов с 1 миллионом пар изображений и текстовых описаний, содержащий более 60 категорий материалов и 400 типов дефектов с экспертными аннотациями. На основе этого датасета создана мультимодальная foundation model, совмещающая видение и язык, обученная с использованием диффузионного подхода специально для промышленных сценариев. Модель демонстрирует эффективность адаптации к специализированным доменам через легкую дообучение, требуя менее 5% задачно-специфических данных по сравнению с традиционными моделями. Это открывает возможности для масштабируемого и эффективного по данным решения в области контроля качества и генерации в производстве.'}, 'en': {'title': 'Revolutionizing Manufacturing with IMDD-1M: A Million Defects for Smarter AI', 'desc': 'The paper introduces IMDD-1M, a comprehensive dataset containing 1 million image-text pairs focused on industrial defects, aimed at enhancing multimodal learning in manufacturing. This dataset features high-resolution images of defects across various materials, each paired with detailed textual descriptions that include annotations on defect characteristics. The authors develop a diffusion-based vision-language foundation model that can be fine-tuned for specific industrial tasks, demonstrating its versatility and efficiency. Remarkably, this model requires significantly less task-specific data while maintaining high performance, showcasing the effectiveness of foundation model adaptation in industrial applications.'}, 'zh': {'title': '推动工业智能的多模态缺陷数据集', 'desc': '本文介绍了IMDD-1M，这是首个大规模工业多模态缺陷数据集，包含100万个对齐的图像-文本对，旨在推动制造和质量检测的多模态学习。该数据集涵盖60多种材料类别和400多种缺陷类型，配有专家验证的注释和详细的文本描述，说明缺陷的位置、严重程度和上下文属性。IMDD-1M支持分类、分割、检索、描述生成和生成建模等多种应用。基于IMDD-1M，我们从零开始训练了一个基于扩散的视觉-语言基础模型，专门针对工业场景，展示了数据高效的基础模型适应性在工业检测和生成中的潜力。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.23628', 'title': 'Memorization in 3D Shape Generation: An Empirical Study', 'url': 'https://huggingface.co/papers/2512.23628', 'abstract': 'Researchers develop a framework to measure memorization in 3D generative models and identify factors affecting it, finding that data modality and model design parameters influence how much training data is remembered during generation.  \t\t\t\t\tAI-generated summary \t\t\t\t Generative models are increasingly used in 3D vision to synthesize novel shapes, yet it remains unclear whether their generation relies on memorizing training shapes. Understanding their memorization could help prevent training data leakage and improve the diversity of generated results. In this paper, we design an evaluation framework to quantify memorization in 3D generative models and study the influence of different data and modeling designs on memorization. We first apply our framework to quantify memorization in existing methods. Next, through controlled experiments with a latent vector-set (Vecset) diffusion model, we find that, on the data side, memorization depends on data modality, and increases with data diversity and finer-grained conditioning; on the modeling side, it peaks at a moderate guidance scale and can be mitigated by longer Vecsets and simple rotation augmentation. Together, our framework and analysis provide an empirical understanding of memorization in 3D generative models and suggest simple yet effective strategies to reduce it without degrading generation quality. Our code is available at https://github.com/zlab-princeton/3d_mem.', 'score': 2, 'issue_id': 493, 'pub_date': '2026-12-29', 'pub_date_card': {'ru': '29 декабря', 'en': 'December 29', 'zh': '12月29日'}, 'hash': 'ae6b1f98f106b276', 'authors': ['Shu Pu', 'Boya Zeng', 'Kaichen Zhou', 'Mengyu Wang', 'Zhuang Liu'], 'affiliations': ['Harvard University', 'Princeton University'], 'pdf_title_img': 'assets/pdf/title_img/2512.23628.jpg', 'data': {'categories': ['#benchmark', '#diffusion', '#open_source', '#3d', '#leakage'], 'emoji': '🧠', 'ru': {'title': 'Контроль меморизации в трёхмерных генеративных моделях', 'desc': 'Авторы разработали фреймворк для измерения меморизации (запоминания) в трёхмерных генеративных моделях. Исследование выявило, что модальность данных и параметры архитектуры модели влияют на степень, с которой модель запоминает примеры из обучающего набора. Через управляемые эксперименты с диффузионной моделью Vecset авторы обнаружили, что меморизация зависит от разнообразия данных и может быть снижена через аугментацию и оптимизацию параметров guidance. Предложенный подход помогает предотвратить утечку обучающих данных и улучшить разнообразие генерируемых результатов.'}, 'en': {'title': 'Measuring and Mitigating Memorization in 3D Generative Models', 'desc': 'This paper presents a framework to assess how much 3D generative models memorize their training data during the generation process. The researchers found that factors such as the type of data used and the design of the model significantly affect memorization levels. Their experiments revealed that increased data diversity and finer conditioning lead to higher memorization, while certain modeling techniques can help reduce it. The findings aim to enhance the understanding of memorization in generative models, which can help improve the quality and diversity of generated outputs.'}, 'zh': {'title': '量化3D生成模型中的记忆现象', 'desc': '本研究开发了一个框架，用于测量3D生成模型中的记忆现象，并识别影响因素。研究发现，数据模态和模型设计参数会影响训练数据在生成过程中的记忆程度。通过对现有方法的评估，我们量化了记忆现象，并通过实验发现，记忆与数据多样性和细粒度条件有关。我们的框架和分析为理解3D生成模型中的记忆提供了实证依据，并提出了有效的减少记忆的方法。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.04620', 'title': 'AgentDevel: Reframing Self-Evolving LLM Agents as Release Engineering', 'url': 'https://huggingface.co/papers/2601.04620', 'abstract': 'AgentDevel presents a release engineering approach for large language model agents that treats them as shippable artifacts and emphasizes stable, auditable improvements through externalized testing and diagnostic processes.  \t\t\t\t\tAI-generated summary \t\t\t\t Recent progress in large language model (LLM) agents has largely focused on embedding self-improvement mechanisms inside the agent or searching over many concurrent variants. While these approaches can raise aggregate scores, they often yield unstable and hard-to-audit improvement trajectories, making it difficult to guarantee non-regression or to reason about failures across versions. We reframe agent improvement as release engineering: agents are treated as shippable artifacts, and improvement is externalized into a regression-aware release pipeline. We introduce AgentDevel, a release engineering pipeline that iteratively runs the current agent, produces implementation-blind, symptom-level quality signals from execution traces, synthesizes a single release candidate (RC) via executable diagnosis, and promotes it under flip-centered gating. AgentDevel features three core designs: (i) an implementation-blind LLM critic that characterizes failure appearances without accessing agent internals, (ii) script-based executable diagnosis that aggregates dominant symptom patterns and produces auditable engineering specifications, and (iii) flip-centered gating that prioritizes pass to fail regressions and fail to pass fixes as first-class evidence. Unlike population-based search or in-agent self-refinement, AgentDevel maintains a single canonical version line and emphasizes non-regression as a primary objective. Experiments on execution-heavy benchmarks demonstrate that AgentDevel yields stable improvements with significantly fewer regressions while producing reproducible, auditable artifacts. Overall, AgentDevel provides a practical development discipline for building, debugging, and releasing LLM agents as software development.', 'score': 1, 'issue_id': 499, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': '0dcce10378a61ef8', 'authors': ['Di Zhang'], 'affiliations': ['Fudan University'], 'pdf_title_img': 'assets/pdf/title_img/2601.04620.jpg', 'data': {'categories': ['#open_source'], 'emoji': '📦', 'ru': {'title': 'LLM-агенты как управляемый софтвер: разработка через инженерию релизов', 'desc': 'AgentDevel представляет подход к разработке LLM-агентов, основанный на принципах инженерии релизов, где агенты рассматриваются как готовые артефакты. Вместо встраивания механизмов самоусовершенствования внутри агента, улучшения происходят через внешний конвейер разработки, обеспечивающий стабильность и отсутствие регрессий. Основной метод использует трёхэтапный процесс: анализ ошибок через реализационно-независимого критика на LLM, синтез кандидата на релиз через выполняемую диагностику и промоция версии с контролем регрессий. Экспериментальные результаты демонстрируют, что AgentDevel обеспечивает воспроизводимые и аудируемые улучшения с минимальными регрессиями в сравнении с методами поиска по популяции.'}, 'en': {'title': 'Stable and Auditable Improvements for LLM Agents', 'desc': "AgentDevel introduces a new way to improve large language model (LLM) agents by treating them like software products that can be released and updated. Instead of embedding self-improvement directly in the agents, it uses a structured release engineering approach that focuses on stability and auditability. The system generates quality signals from the agents' performance, allowing for better diagnosis of issues without needing to look inside the agent's code. This method ensures that improvements are consistent and verifiable, reducing the chances of regressions and making the development process more reliable."}, 'zh': {'title': 'AgentDevel：稳定可审计的大型语言模型代理发布工程', 'desc': 'AgentDevel提出了一种针对大型语言模型代理的发布工程方法，将其视为可交付的工件，并强调通过外部测试和诊断过程实现稳定、可审计的改进。与传统的自我改进机制不同，该方法将代理的改进外部化到一个回归感知的发布管道中。AgentDevel的核心设计包括一个不依赖实现的LLM评论器、基于脚本的可执行诊断和以翻转为中心的门控机制。实验表明，AgentDevel能够在减少回归的同时，实现稳定的改进，并生成可重复、可审计的工件。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.04300', 'title': 'Beyond Binary Preference: Aligning Diffusion Models to Fine-grained Criteria by Decoupling Attributes', 'url': 'https://huggingface.co/papers/2601.04300', 'abstract': 'A two-stage framework for diffusion model alignment using hierarchical evaluation criteria and complex preference optimization demonstrates improved generation quality and expert alignment.  \t\t\t\t\tAI-generated summary \t\t\t\t Post-training alignment of diffusion models relies on simplified signals, such as scalar rewards or binary preferences. This limits alignment with complex human expertise, which is hierarchical and fine-grained. To address this, we first construct a hierarchical, fine-grained evaluation criteria with domain experts, which decomposes image quality into multiple positive and negative attributes organized in a tree structure. Building on this, we propose a two-stage alignment framework. First, we inject domain knowledge to an auxiliary diffusion model via Supervised Fine-Tuning. Second, we introduce Complex Preference Optimization (CPO) that extends DPO to align the target diffusion to our non-binary, hierarchical criteria. Specifically, we reformulate the alignment problem to simultaneously maximize the probability of positive attributes while minimizing the probability of negative attributes with the auxiliary diffusion. We instantiate our approach in the domain of painting generation and conduct CPO training with an annotated dataset of painting with fine-grained attributes based on our criteria. Extensive experiments demonstrate that CPO significantly enhances generation quality and alignment with expertise, opening new avenues for fine-grained criteria alignment.', 'score': 1, 'issue_id': 498, 'pub_date': '2026-01-07', 'pub_date_card': {'ru': '7 января', 'en': 'January 7', 'zh': '1月7日'}, 'hash': '465dd03a32e42d19', 'authors': ['Chenye Meng', 'Zejian Li', 'Zhongni Liu', 'Yize Li', 'Changle Xie', 'Kaixin Jia', 'Ling Yang', 'Huanghuang Deng', 'Shiying Ding', 'Shengyuan Zhang', 'Jiayi Li', 'Lingyun Sun'], 'affiliations': ['Peking University', 'University of Electronic Science and Technology of China', 'University of Nottingham Ningbo China', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2601.04300.jpg', 'data': {'categories': ['#diffusion', '#alignment'], 'emoji': '🎨', 'ru': {'title': 'Иерархическое выравнивание диффузионных моделей через детализированную оптимизацию предпочтений', 'desc': 'Статья предлагает двухэтапный фреймворк для выравнивания диффузионных моделей с использованием иерархических критериев оценки. На первом этапе вспомогательная диффузионная модель обучается методом supervised fine-tuning с внедрением экспертных знаний. На втором этапе авторы вводят метод Complex Preference Optimization (CPO), расширяющий DPO для работы с многоуровневыми критериями вместо бинарных предпочтений. Подход одновременно максимизирует вероятность положительных атрибутов изображения и минимизирует вероятность отрицательных, что достигается через иерархическую декомпозицию характеристик качества.'}, 'en': {'title': 'Enhancing Diffusion Models with Hierarchical Expert Alignment', 'desc': "This paper presents a two-stage framework designed to improve the alignment of diffusion models with complex human preferences in image generation. It begins by creating a hierarchical evaluation system that breaks down image quality into detailed attributes, allowing for a more nuanced assessment. The framework then employs Supervised Fine-Tuning to incorporate expert knowledge into the diffusion model, followed by Complex Preference Optimization (CPO) to refine the model's outputs based on these detailed criteria. Experimental results show that this approach significantly enhances both the quality of generated images and their alignment with expert evaluations."}, 'zh': {'title': '提升扩散模型对齐的创新框架', 'desc': '本文提出了一种两阶段框架，用于对扩散模型进行对齐，采用分层评估标准和复杂偏好优化。传统的后训练对齐方法依赖于简化信号，如标量奖励或二元偏好，这限制了与复杂人类专业知识的对齐。我们首先与领域专家构建了一个分层的细粒度评估标准，将图像质量分解为多个正面和负面属性，并以树状结构组织。通过引入复杂偏好优化（CPO），我们能够同时最大化正面属性的概率，同时最小化负面属性的概率，从而显著提高生成质量和与专业知识的对齐。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.02702', 'title': 'Learning User Preferences Through Interaction for Long-Term Collaboration', 'url': 'https://huggingface.co/papers/2601.02702', 'abstract': "MultiSessionCollab benchmark evaluates agents' ability to learn and adapt to user preferences through persistent memory systems that enhance long-term collaboration quality.  \t\t\t\t\tAI-generated summary \t\t\t\t As conversational agents accumulate experience collaborating with users, adapting to user preferences is essential for fostering long-term relationships and improving collaboration quality over time. We introduce MultiSessionCollab, a benchmark that evaluates how well agents can learn user preferences and leverage them to improve collaboration quality throughout multiple sessions. To develop agents that succeed in this setting, we present long-term collaborative agents equipped with a memory that persists and refines user preference as interaction experience accumulates. Moreover, we demonstrate that learning signals can be derived from user simulator behavior in MultiSessionCollab to train agents to generate more comprehensive reflections and update their memory more effectively. Extensive experiments show that equipping agents with memory improves long-term collaboration, yielding higher task success rates, more efficient interactions, and reduced user effort. Finally, we conduct a human user study that demonstrates that memory helps improve user experience in real-world settings.", 'score': 1, 'issue_id': 508, 'pub_date': '2026-01-06', 'pub_date_card': {'ru': '6 января', 'en': 'January 6', 'zh': '1月6日'}, 'hash': '9b399a11240ed646', 'authors': ['Shuhaib Mehri', 'Priyanka Kargupta', 'Tal August', 'Dilek Hakkani-Tür'], 'affiliations': ['University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2601.02702.jpg', 'data': {'categories': ['#benchmark', '#agents'], 'emoji': '🧠', 'ru': {'title': 'Агенты с долгосрочной памятью для персонализированной коллаборации с пользователями', 'desc': 'В статье представлен бенчмарк MultiSessionCollab для оценки способности агентов обучаться и адаптироваться к предпочтениям пользователей через системы долгосрочной памяти. Авторы разработали долгосрочные коллаборативные агенты с персистентной памятью, которая накапливает и уточняет предпочтения пользователя по мере взаимодействия. Они показали, что сигналы обучения можно извлекать из поведения симулятора пользователя для тренировки агентов генерировать более полные рефлексии и эффективнее обновлять память. Эксперименты и пользовательские исследования подтверждают, что оснащение агентов памятью улучшает качество долгосрочной коллаборации и пользовательский опыт.'}, 'en': {'title': 'Enhancing Collaboration with Memory-Driven Agents', 'desc': 'The MultiSessionCollab benchmark assesses how well agents can learn and adapt to user preferences over time using persistent memory systems. This approach allows agents to enhance the quality of collaboration by refining their understanding of user needs through multiple interactions. By leveraging learning signals from user simulator behavior, agents can improve their memory updates and generate better reflections on user preferences. Experimental results indicate that agents with memory not only achieve higher task success rates but also create more efficient interactions, ultimately leading to a better user experience.'}, 'zh': {'title': '提升长期合作质量的智能体记忆系统', 'desc': 'MultiSessionCollab基准测试评估智能体在长期合作中学习和适应用户偏好的能力。通过持久的记忆系统，智能体能够在多个会话中不断改进合作质量。我们展示了如何利用用户模拟器的行为信号来训练智能体，使其能够更有效地更新记忆并生成更全面的反思。实验结果表明，具备记忆的智能体在长期合作中表现更佳，任务成功率更高，交互效率更高，用户的努力也减少了。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.02016', 'title': 'Enhancing Object Detection with Privileged Information: A Model-Agnostic Teacher-Student Approach', 'url': 'https://huggingface.co/papers/2601.02016', 'abstract': 'Learning Using Privileged Information paradigm enhances object detection accuracy by integrating additional training-time information through teacher-student architectures without increasing inference complexity.  \t\t\t\t\tAI-generated summary \t\t\t\t This paper investigates the integration of the Learning Using Privileged Information (LUPI) paradigm in object detection to exploit fine-grained, descriptive information available during training but not at inference. We introduce a general, model-agnostic methodology for injecting privileged information-such as bounding box masks, saliency maps, and depth cues-into deep learning-based object detectors through a teacher-student architecture. Experiments are conducted across five state-of-the-art object detection models and multiple public benchmarks, including UAV-based litter detection datasets and Pascal VOC 2012, to assess the impact on accuracy, generalization, and computational efficiency. Our results demonstrate that LUPI-trained students consistently outperform their baseline counterparts, achieving significant boosts in detection accuracy with no increase in inference complexity or model size. Performance improvements are especially marked for medium and large objects, while ablation studies reveal that intermediate weighting of teacher guidance optimally balances learning from privileged and standard inputs. The findings affirm that the LUPI framework provides an effective and practical strategy for advancing object detection systems in both resource-constrained and real-world settings.', 'score': 1, 'issue_id': 496, 'pub_date': '2026-01-05', 'pub_date_card': {'ru': '5 января', 'en': 'January 5', 'zh': '1月5日'}, 'hash': '661151975c914811', 'authors': ['Matthias Bartolo', 'Dylan Seychell', 'Gabriel Hili', 'Matthew Montebello', 'Carl James Debono', 'Saviour Formosa', 'Konstantinos Makantasis'], 'affiliations': ['Department of Artificial Communications of Malta', 'Department of Communications and Computer Engineering, Faculty of Information and Communications Technology, University of Malta', 'Department of Criminology, Faculty of Social Wellbeing, University of Malta', 'Faculty Intelligence, Technology, University'], 'pdf_title_img': 'assets/pdf/title_img/2601.02016.jpg', 'data': {'categories': ['#cv', '#training', '#benchmark'], 'emoji': '🎓', 'ru': {'title': 'Привилегированная информация учителя для эффективной детекции объектов', 'desc': 'В статье исследуется применение парадигмы обучения с привилегированной информацией (LUPI) для улучшения детекции объектов. Авторы предлагают модель-агностический метод внедрения дополнительной информации, такой как маски ограничивающих боксов, карты заметности и карты глубины, в архитектуру учитель-ученик во время обучения. Экспериментальная оценка проведена на пяти современных детекторах объектов с использованием нескольких общедоступных датасетов, включая UAV-данные и Pascal VOC 2012. Результаты показывают, что модели-ученики, обученные с LUPI, значительно превосходят базовые варианты без увеличения вычислительной сложности и размера модели.'}, 'en': {'title': 'Boosting Object Detection with Privileged Information', 'desc': 'This paper explores the Learning Using Privileged Information (LUPI) approach to improve object detection by utilizing extra information available during training. It presents a flexible method to incorporate privileged data, like bounding box masks and depth cues, into existing deep learning models using a teacher-student framework. The experiments show that models trained with LUPI significantly enhance detection accuracy without adding complexity during inference. The results indicate that this method is particularly beneficial for detecting medium and large objects, making it a valuable strategy for real-world applications.'}, 'zh': {'title': '利用特权信息提升目标检测精度', 'desc': '本文探讨了在目标检测中整合特权信息学习（LUPI）范式，以利用训练期间可用但推理时不可用的细粒度描述信息。我们提出了一种通用的、与模型无关的方法，通过教师-学生架构将特权信息（如边界框掩码、显著性图和深度线索）注入基于深度学习的目标检测器中。实验结果表明，经过LUPI训练的学生模型在准确性、泛化能力和计算效率上均优于基线模型，尤其在中大物体的检测中表现显著提升。研究结果确认LUPI框架为在资源受限和现实世界环境中提升目标检测系统提供了一种有效且实用的策略。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.04233', 'title': 'LEMAS: Large A 150K-Hour Large-scale Extensible Multilingual Audio Suite with Generative Speech Models', 'url': 'https://huggingface.co/papers/2601.04233', 'abstract': "The LEMAS-Dataset enables high-quality multilingual speech synthesis and editing through specialized models leveraging flow-matching and autoregressive architectures with novel training techniques.  \t\t\t\t\tAI-generated summary \t\t\t\t We present the LEMAS-Dataset, which, to our knowledge, is currently the largest open-source multilingual speech corpus with word-level timestamps. Covering over 150,000 hours across 10 major languages, LEMAS-Dataset is constructed via a efficient data processing pipeline that ensures high-quality data and annotations. To validate the effectiveness of LEMAS-Dataset across diverse generative paradigms, we train two benchmark models with distinct architectures and task specializations on this dataset. LEMAS-TTS, built upon a non-autoregressive flow-matching framework, leverages the dataset's massive scale and linguistic diversity to achieve robust zero-shot multilingual synthesis. Our proposed accent-adversarial training and CTC loss mitigate cross-lingual accent issues, enhancing synthesis stability. Complementarily, LEMAS-Edit employs an autoregressive decoder-only architecture that formulates speech editing as a masked token infilling task. By exploiting precise word-level alignments to construct training masks and adopting adaptive decoding strategies, it achieves seamless, smooth-boundary speech editing with natural transitions. Experimental results demonstrate that models trained on LEMAS-Dataset deliver high-quality synthesis and editing performance, confirming the dataset's quality. We envision that this richly timestamp-annotated, fine-grained multilingual corpus will drive future advances in prompt-based speech generation systems.", 'score': 1, 'issue_id': 503, 'pub_date': '2026-01-04', 'pub_date_card': {'ru': '4 января', 'en': 'January 4', 'zh': '1月4日'}, 'hash': 'ce6f38f3022fb1cb', 'authors': ['Zhiyuan Zhao', 'Lijian Lin', 'Ye Zhu', 'Kai Xie', 'Yunfei Liu', 'Yu Li'], 'affiliations': ['International Digital Economy Academy (IDEA)'], 'pdf_title_img': 'assets/pdf/title_img/2601.04233.jpg', 'data': {'categories': ['#training', '#open_source', '#low_resource', '#optimization', '#architecture', '#dataset', '#multilingual', '#audio'], 'emoji': '🗣️', 'ru': {'title': 'Многоязычный датасет с разметкой для синтеза и редактирования речи нового поколения', 'desc': "Представлена LEMAS-Dataset — крупнейший открытый многоязычный корпус речи с разметкой на уровне слов, содержащий более 150 тысяч часов аудио на 10 языках. На основе этого датасета обучены две модели: LEMAS-TTS использует flow-matching архитектуру для многоязычного синтеза речи с применением adversarial обучения для снижения акцентных артефактов, а LEMAS-Edit реализует редактирование речи через autoregressive decoder с маскированной инфилировкой токенов. Точная разметка временных меток слов позволяет достичь плавных переходов при редактировании и высокого качества синтеза на нескольких языках одновременно. Датасет открывает перспективы для развития систем генерации речи на основе prompt'ов и других приложений обработки естественного языка."}, 'en': {'title': 'Unlocking Multilingual Speech Synthesis with LEMAS-Dataset', 'desc': "The LEMAS-Dataset is a large open-source multilingual speech corpus designed for high-quality speech synthesis and editing. It includes over 150,000 hours of audio in 10 languages, with precise word-level timestamps to enhance data quality. Two models, LEMAS-TTS and LEMAS-Edit, utilize different architectures to demonstrate effective multilingual synthesis and speech editing capabilities. The dataset's innovative training techniques, including accent-adversarial training, improve performance across diverse languages and accents, paving the way for future advancements in speech generation systems."}, 'zh': {'title': 'LEMAS-Dataset：多语言语音合成与编辑的未来', 'desc': 'LEMAS-Dataset是一个高质量的多语言语音合成和编辑数据集，包含超过150,000小时的语音数据，覆盖10种主要语言。该数据集通过高效的数据处理流程构建，确保了数据和注释的高质量。我们训练了两种基准模型，分别采用非自回归和自回归架构，以验证LEMAS-Dataset在不同生成范式中的有效性。实验结果表明，基于LEMAS-Dataset训练的模型在语音合成和编辑性能上表现出色，证明了该数据集的质量。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05125', 'title': 'VERSE: Visual Embedding Reduction and Space Exploration. Clustering-Guided Insights for Training Data Enhancement in Visually-Rich Document Understanding', 'url': 'https://huggingface.co/papers/2601.05125', 'abstract': 'VERSE is a methodology for analyzing and improving Vision-Language Models in document understanding by visualizing latent representations and generating synthetic data to enhance performance in error-prone clusters.  \t\t\t\t\tAI-generated summary \t\t\t\t This work introduces VERSE, a methodology for analyzing and improving Vision-Language Models applied to Visually-rich Document Understanding by exploring their visual embedding space. VERSE enables the visualization of latent representations, supporting the assessment of model feasibility. It also facilitates the identification of problematic regions and guides the generation of synthetic data to enhance performance in those clusters. We validate the methodology by training on the synthetic MERIT Dataset and evaluating on its real-world counterpart, MERIT Secret. Results show that VERSE helps uncover the visual features associated with error-prone clusters, and that retraining with samples containing these features substantially boosts F1 performance without degrading generalization. Furthermore, we demonstrate that on-premise models such as Donut and Idefics2, when optimized with VERSE, match or even surpass the performance of SaaS solutions like GPT-4 and Pixtral.', 'score': 0, 'issue_id': 500, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': '2d5ee3972f5a6371', 'authors': ['Ignacio de Rodrigo', 'Alvaro J. Lopez-Lopez', 'Jaime Boal'], 'affiliations': ['Institute for Research in Technology, ICAI School of Engineering, Comillas Pontifical University, Calle Rey Francisco, 4, Madrid, 28008, Madrid, Spain'], 'pdf_title_img': 'assets/pdf/title_img/2601.05125.jpg', 'data': {'categories': ['#training', '#data', '#multimodal', '#cv', '#dataset'], 'emoji': '📊', 'ru': {'title': 'Визуализация и синтез: путь к совершенству Vision-Language моделей', 'desc': 'VERSE — это методология для анализа и улучшения Vision-Language моделей в задачах понимания документов. Она позволяет визуализировать скрытые представления в пространстве встраиваний и выявлять проблемные кластеры, где модель допускает ошибки. На основе анализа проблемных областей методология генерирует синтетические данные для целевого обучения модели. Экспериментальные результаты демонстрируют, что переобучение с использованием сгенерированных примеров значительно улучшает метрику F1 и позволяет локальным моделям (Donut, Idefics2)
