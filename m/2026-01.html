реплетённого текстово-визуального контента.'}, 'en': {'title': 'NextFlow: Fast and Unified Multimodal Generation', 'desc': "NextFlow is a powerful autoregressive transformer designed to handle both text and images simultaneously by processing interleaved tokens. It uses a unique approach called next-scale prediction for images, which allows it to generate high-quality visuals much faster than traditional methods. By training on a massive dataset of 6 trillion tokens, NextFlow enhances its ability to understand and create multimodal content, such as videos and edited images. The model's innovative training techniques and prefix-tuning strategy help it achieve top performance in generating images and text, competing with specialized models in visual quality."}, 'zh': {'title': 'NextFlow：快速多模态生成的变革者', 'desc': 'NextFlow是一种统一的解码器自回归变换器，能够处理交错的文本和图像标记，从而实现快速的多模态生成。它通过训练6万亿个交错的文本-图像离散标记，激活了多模态理解和生成的能力，支持图像编辑和视频生成。NextFlow采用了文本的下一个标记预测和视觉生成的下一个尺度预测，显著提高了生成速度，能够在5秒内生成1024x1024的图像。实验结果表明，NextFlow在统一模型中表现出色，视觉质量与专门的扩散模型相媲美。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.01739', 'title': 'K-EXAONE Technical Report', 'url': 'https://huggingface.co/papers/2601.01739', 'abstract': 'K-EXAONE is a multilingual language model with a Mixture-of-Experts architecture that achieves competitive performance on various benchmarks while supporting multiple languages and long-context windows.  \t\t\t\t\tAI-generated summary \t\t\t\t This technical report presents K-EXAONE, a large-scale multilingual language model developed by LG AI Research. K-EXAONE is built on a Mixture-of-Experts architecture with 236B total parameters, activating 23B parameters during inference. It supports a 256K-token context window and covers six languages: Korean, English, Spanish, German, Japanese, and Vietnamese. We evaluate K-EXAONE on a comprehensive benchmark suite spanning reasoning, agentic, general, Korean, and multilingual abilities. Across these evaluations, K-EXAONE demonstrates performance comparable to open-weight models of similar size. K-EXAONE, designed to advance AI for a better life, is positioned as a powerful proprietary AI foundation model for a wide range of industrial and research applications.', 'score': 44, 'issue_id': 426, 'pub_date': '2026-01-05', 'pub_date_card': {'ru': '5 января', 'en': 'January 5', 'zh': '1月5日'}, 'hash': 'ab3744d785e77871', 'authors': ['Eunbi Choi', 'Kibong Choi', 'Seokhee Hong', 'Junwon Hwang', 'Hyojin Jeon', 'Hyunjik Jo', 'Joonkee Kim', 'Seonghwan Kim', 'Soyeon Kim', 'Sunkyoung Kim', 'Yireun Kim', 'Yongil Kim', 'Haeju Lee', 'Jinsik Lee', 'Kyungmin Lee', 'Sangha Park', 'Heuiyeen Yeen', 'Hwan Chang', 'Stanley Jungkyu Choi', 'Yejin Choi', 'Jiwon Ham', 'Kijeong Jeon', 'Geunyeong Jeong', 'Gerrard Jeongwon Jo', 'Yonghwan Jo', 'Jiyeon Jung', 'Naeun Kang', 'Dohoon Kim', 'Euisoon Kim', 'Hayeon Kim', 'Hyosang Kim', 'Hyunseo Kim', 'Jieun Kim', 'Minu Kim', 'Myoungshin Kim', 'Unsol Kim', 'Youchul Kim', 'YoungJin Kim', 'Chaeeun Lee', 'Chaeyoon Lee', 'Changhun Lee', 'Dahm Lee', 'Edward Hwayoung Lee', 'Honglak Lee', 'Jinsang Lee', 'Jiyoung Lee', 'Sangeun Lee', 'Seungwon Lim', 'Solji Lim', 'Woohyung Lim', 'Chanwoo Moon', 'Jaewoo Park', 'Jinho Park', 'Yongmin Park', 'Hyerin Seo', 'Wooseok Seo', 'Yongwoo Song', 'Sejong Yang', 'Sihoon Yang', 'Chang En Yea', 'Sihyuk Yi', 'Chansik Yoon', 'Dongkeun Yoon', 'Sangyeon Yoon', 'Hyeongu Yun'], 'affiliations': ['LG AI Research'], 'pdf_title_img': 'assets/pdf/title_img/2601.01739.jpg', 'data': {'categories': ['#benchmark', '#multilingual', '#reasoning', '#agents', '#architecture', '#long_context'], 'emoji': '🌍', 'ru': {'title': 'Эффективная многоязычная модель с архитектурой смеси экспертов', 'desc': 'K-EXAONE - это многоязычная большая языковая модель с архитектурой Mixture-of-Experts, разработанная компанией LG AI Research. Модель содержит 236 миллиардов параметров, из которых 23 миллиарда активируются во время инференса, что обеспечивает эффективность вычислений. K-EXAONE поддерживает контекстное окно в 256K токенов и работает на шести языках: корейском, английском, испанском, немецком, японском и вьетнамском. На обширном наборе бенчмарков модель демонстрирует производительность, сравнимую с открытыми моделями аналогичного размера.'}, 'en': {'title': 'K-EXAONE: Powering Multilingual AI with Efficiency', 'desc': 'K-EXAONE is a state-of-the-art multilingual language model that utilizes a Mixture-of-Experts architecture, allowing it to efficiently manage a large number of parameters. With a total of 236 billion parameters, it activates only a subset of 23 billion during inference, optimizing performance while maintaining resource efficiency. The model supports a long context window of 256,000 tokens and is capable of understanding and generating text in six different languages. Evaluations show that K-EXAONE performs competitively against other large models, making it a valuable tool for various applications in both industry and research.'}, 'zh': {'title': 'K-EXAONE：多语言的强大AI基础模型', 'desc': 'K-EXAONE是一种多语言模型，采用混合专家架构，具有2360亿个参数，在推理时激活230亿个参数。它支持256K的上下文窗口，并覆盖六种语言，包括韩语、英语、西班牙语、德语、日语和越南语。通过全面的基准测试，K-EXAONE在推理、代理、通用、韩语和多语言能力方面表现出色，性能与类似规模的开放权重模型相当。该模型旨在推动人工智能的发展，以改善人类生活，适用于广泛的工业和研究应用。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.01425', 'title': 'DreamID-V:Bridging the Image-to-Video Gap for High-Fidelity Face Swapping via Diffusion Transformer', 'url': 'https://huggingface.co/papers/2601.01425', 'abstract': 'A novel video face swapping framework combines image face swapping techniques with diffusion transformers and curriculum learning to achieve superior identity preservation and visual realism.  \t\t\t\t\tAI-generated summary \t\t\t\t Video Face Swapping (VFS) requires seamlessly injecting a source identity into a target video while meticulously preserving the original pose, expression, lighting, background, and dynamic information. Existing methods struggle to maintain identity similarity and attribute preservation while preserving temporal consistency. To address the challenge, we propose a comprehensive framework to seamlessly transfer the superiority of Image Face Swapping (IFS) to the video domain. We first introduce a novel data pipeline SyncID-Pipe that pre-trains an Identity-Anchored Video Synthesizer and combines it with IFS models to construct bidirectional ID quadruplets for explicit supervision. Building upon paired data, we propose the first Diffusion Transformer-based framework DreamID-V, employing a core Modality-Aware Conditioning module to discriminatively inject multi-model conditions. Meanwhile, we propose a Synthetic-to-Real Curriculum mechanism and an Identity-Coherence Reinforcement Learning strategy to enhance visual realism and identity consistency under challenging scenarios. To address the issue of limited benchmarks, we introduce IDBench-V, a comprehensive benchmark encompassing diverse scenes. Extensive experiments demonstrate DreamID-V outperforms state-of-the-art methods and further exhibits exceptional versatility, which can be seamlessly adapted to various swap-related tasks.', 'score': 33, 'issue_id': 426, 'pub_date': '2026-01-04', 'pub_date_card': {'ru': '4 января', 'en': 'January 4', 'zh': '1月4日'}, 'hash': '86e81641764103d2', 'authors': ['Xu Guo', 'Fulong Ye', 'Xinghui Li', 'Pengqi Tu', 'Pengze Zhang', 'Qichao Sun', 'Songtao Zhao', 'Xiangwang Hou', 'Qian He'], 'affiliations': ['Intelligent Creation Lab, ByteDance', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2601.01425.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#synthetic', '#video', '#diffusion', '#architecture', '#rl', '#training'], 'emoji': '🎭', 'ru': {'title': 'Трансформеры диффузии для согласованной подмены лиц в видео', 'desc': 'В работе предложена новая архитектура для подмены лиц в видео, которая адаптирует методы подмены лиц на изображениях в видеодомен с помощью диффузионных трансформеров. Авторы разработали специальный pipeline SyncID-Pipe для создания обучающих данных и представили модель DreamID-V с модулем модально-осведомлённого кондиционирования для управления несколькими условиями. Для повышения качества реалистичности и согласованности идентичности используются механизм учебного расписания синтез-в-реальность и стратегия обучения с подкреплением для сохранения идентичности. Авторы также представили новый бенчмарк IDBench-V и продемонстрировали превосходство метода на различных задачах подмены лиц.'}, 'en': {'title': 'Seamless Video Face Swapping with Identity Preservation', 'desc': 'This paper presents a new framework for video face swapping that integrates image face swapping techniques with advanced machine learning methods like diffusion transformers and curriculum learning. The framework, named DreamID-V, focuses on maintaining identity preservation and visual realism while ensuring temporal consistency in videos. It introduces a novel data pipeline called SyncID-Pipe, which helps in training a video synthesizer that effectively manages identity information. Additionally, the paper proposes a new benchmark, IDBench-V, to evaluate the performance of video face swapping methods across various scenarios, demonstrating that DreamID-V outperforms existing techniques.'}, 'zh': {'title': '视频换脸的新突破：真实与身份的完美结合', 'desc': '这篇论文提出了一种新的视频换脸框架，结合了图像换脸技术、扩散变换器和课程学习，以实现更好的身份保留和视觉真实感。该框架通过引入SyncID-Pipe数据管道，预训练身份锚定视频合成器，并与图像换脸模型结合，构建双向身份四元组进行显式监督。论文中还提出了基于扩散变换器的DreamID-V框架，利用模态感知条件模块来有效注入多模态条件。通过合成到真实的课程机制和身份一致性强化学习策略，增强了在复杂场景下的视觉真实感和身份一致性。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.02256', 'title': 'VAR RL Done Right: Tackling Asynchronous Policy Conflicts in Visual Autoregressive Generation', 'url': 'https://huggingface.co/papers/2601.02256', 'abstract': 'Visual autoregressive models face training instability due to asynchronous policy conflicts, which are addressed through a novel framework enhancing group relative policy optimization with intermediate rewards, dynamic time-step reweighting, and mask propagation algorithms.  \t\t\t\t\tAI-generated summary \t\t\t\t Visual generation is dominated by three paradigms: AutoRegressive (AR), diffusion, and Visual AutoRegressive (VAR) models. Unlike AR and diffusion, VARs operate on heterogeneous input structures across their generation steps, which creates severe asynchronous policy conflicts. This issue becomes particularly acute in reinforcement learning (RL) scenarios, leading to unstable training and suboptimal alignment. To resolve this, we propose a novel framework to enhance Group Relative Policy Optimization (GRPO) by explicitly managing these conflicts. Our method integrates three synergistic components: 1) a stabilizing intermediate reward to guide early-stage generation; 2) a dynamic time-step reweighting scheme for precise credit assignment; and 3) a novel mask propagation algorithm, derived from principles of Reward Feedback Learning (ReFL), designed to isolate optimization effects both spatially and temporally. Our approach demonstrates significant improvements in sample quality and objective alignment over the vanilla GRPO baseline, enabling robust and effective optimization for VAR models.', 'score': 28, 'issue_id': 426, 'pub_date': '2026-01-05', 'pub_date_card': {'ru': '5 января', 'en': 'January 5', 'zh': '1月5日'}, 'hash': 'b51d8fc1590931c7', 'authors': ['Shikun Sun', 'Liao Qu', 'Huichao Zhang', 'Yiheng Liu', 'Yangyang Song', 'Xian Li', 'Xu Wang', 'Yi Jiang', 'Daniel K. Du', 'Xinglong Wu', 'Jia Jia'], 'affiliations': ['ByteDance', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2601.02256.jpg', 'data': {'categories': ['#optimization', '#diffusion', '#rl', '#cv', '#training'], 'emoji': '🎨', 'ru': {'title': 'Стабилизация обучения визуальных авторегрессивных моделей через управление конфликтами политик', 'desc': 'В статье рассматривается проблема нестабильности обучения визуальных авторегрессивных моделей, вызванная асинхронными конфликтами политик при работе с разнородными структурами входных данных. Авторы предлагают улучшенную версию Group Relative Policy Optimization, которая интегрирует три компонента: промежуточные награды для стабилизации, динамическое перевзвешивание временных шагов для корректной оценки вклада действий и алгоритм распространения масок для пространственно-временной изоляции эффектов оптимизации. Методология основана на принципах Reward Feedback Learning и позволяет более эффективно управлять конфликтами политик на разных этапах генерации. Предложенный подход демонстрирует значительное улучшение качества генерируемых образцов и устойчивость при обучении VAR моделей с использованием методов усиливающего обучения.'}, 'en': {'title': 'Stabilizing Visual Generation with Enhanced Policy Optimization', 'desc': 'This paper addresses the training instability in Visual AutoRegressive (VAR) models caused by asynchronous policy conflicts. It introduces a new framework that enhances Group Relative Policy Optimization (GRPO) by incorporating intermediate rewards, dynamic time-step reweighting, and mask propagation algorithms. These components work together to stabilize training and improve the alignment of generated outputs. The proposed method shows significant improvements in sample quality compared to traditional GRPO methods, making VAR models more robust and effective in visual generation tasks.'}, 'zh': {'title': '解决视觉自回归模型训练不稳定性的新框架', 'desc': '本文提出了一种新颖的框架，旨在解决视觉自回归模型在训练过程中由于异步策略冲突而导致的不稳定性。该框架通过增强群体相对策略优化（GRPO），引入了中间奖励、动态时间步重加权和掩码传播算法等三个协同组件。中间奖励用于指导早期生成，动态时间步重加权则帮助精确分配信用，而掩码传播算法则从奖励反馈学习的原则出发，旨在空间和时间上隔离优化效果。实验结果表明，该方法在样本质量和目标对齐方面显著优于传统的GRPO基线，能够有效优化视觉自回归模型。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.24138', 'title': 'GARDO: Reinforcing Diffusion Models without Reward Hacking', 'url': 'https://huggingface.co/papers/2512.24138', 'abstract': 'Online reinforcement learning for diffusion model fine-tuning suffers from reward hacking due to proxy reward mismatches, which GARDO addresses through selective regularization, adaptive reference updates, and diversity-aware reward amplification.  \t\t\t\t\tAI-generated summary \t\t\t\t Fine-tuning diffusion models via online reinforcement learning (RL) has shown great potential for enhancing text-to-image alignment. However, since precisely specifying a ground-truth objective for visual tasks remains challenging, the models are often optimized using a proxy reward that only partially captures the true goal. This mismatch often leads to reward hacking, where proxy scores increase while real image quality deteriorates and generation diversity collapses. While common solutions add regularization against the reference policy to prevent reward hacking, they compromise sample efficiency and impede the exploration of novel, high-reward regions, as the reference policy is usually sub-optimal. To address the competing demands of sample efficiency, effective exploration, and mitigation of reward hacking, we propose Gated and Adaptive Regularization with Diversity-aware Optimization (GARDO), a versatile framework compatible with various RL algorithms. Our key insight is that regularization need not be applied universally; instead, it is highly effective to selectively penalize a subset of samples that exhibit high uncertainty. To address the exploration challenge, GARDO introduces an adaptive regularization mechanism wherein the reference model is periodically updated to match the capabilities of the online policy, ensuring a relevant regularization target. To address the mode collapse issue in RL, GARDO amplifies the rewards for high-quality samples that also exhibit high diversity, encouraging mode coverage without destabilizing the optimization process. Extensive experiments across diverse proxy rewards and hold-out unseen metrics consistently show that GARDO mitigates reward hacking and enhances generation diversity without sacrificing sample efficiency or exploration, highlighting its effectiveness and robustness.', 'score': 23, 'issue_id': 428, 'pub_date': '2026-12-30', 'pub_date_card': {'ru': '30 декабря', 'en': 'December 30', 'zh': '12月30日'}, 'hash': '824aa5f73ac6084b', 'authors': ['Haoran He', 'Yuxiao Ye', 'Jie Liu', 'Jiajun Liang', 'Zhiyong Wang', 'Ziyang Yuan', 'Xintao Wang', 'Hangyu Mao', 'Pengfei Wan', 'Ling Pan'], 'affiliations': ['CUHK MMLab', 'Hong Kong University of Science and Technology', 'Kuaishou Technology', 'The University of Edinburgh'], 'pdf_title_img': 'assets/pdf/title_img/2512.24138.jpg', 'data': {'categories': ['#alignment', '#optimization', '#diffusion', '#rlhf', '#training', '#rl'], 'emoji': '🎯', 'ru': {'title': 'Избирательная регуляризация против взлома награды в диффузионных моделях', 'desc': 'Статья описывает проблему reward hacking при fine-tuning диффузионных моделей через онлайн обучение с подкреплением, когда прокси-награда не полностью соответствует истинной цели. Авторы предлагают GARDO — универсальный фреймворк, который использует селективную регуляризацию только для образцов с высокой неопределённостью, вместо универсального штрафа. Метод включает адаптивное обновление эталонной модели и усиление награды для разнообразных высококачественных образцов, чтобы предотвратить коллапс режимов. Экспериментальные результаты показывают, что GARDO эффективно предотвращает reward hacking, улучшает разнообразие генерации и сохраняет sample efficiency без ущерба для исследования пространства решений.'}, 'en': {'title': 'Enhancing Diffusion Models with GARDO: Tackling Reward Hacking and Boosting Diversity', 'desc': 'This paper presents GARDO, a framework designed to improve online reinforcement learning for fine-tuning diffusion models. It addresses the problem of reward hacking, which occurs when models optimize for proxy rewards that do not accurately reflect the desired outcomes. GARDO employs selective regularization to penalize only uncertain samples, adaptive reference updates to keep the model aligned with the current policy, and diversity-aware reward amplification to encourage varied outputs. The results demonstrate that GARDO effectively enhances image quality and diversity while maintaining efficient exploration in the learning process.'}, 'zh': {'title': '解决奖励黑客，提升生成多样性！', 'desc': '在线强化学习在扩散模型微调中面临奖励黑客问题，主要是由于代理奖励与真实目标不匹配。GARDO通过选择性正则化、自适应参考更新和多样性奖励放大来解决这一问题。该方法有效地减少了奖励黑客现象，同时提高了生成的多样性，而不牺牲样本效率。GARDO的关键在于选择性地对高不确定性的样本进行惩罚，并定期更新参考模型，以确保正则化目标的相关性。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.02358', 'title': 'VINO: A Unified Visual Generator with Interleaved OmniModal Context', 'url': 'https://huggingface.co/papers/2601.02358', 'abstract': 'VINO is a unified visual generator that uses a shared diffusion backbone with multimodal inputs to perform image and video generation and editing tasks.  \t\t\t\t\tAI-generated summary \t\t\t\t We present VINO, a unified visual generator that performs image and video generation and editing within a single framework. Instead of relying on task-specific models or independent modules for each modality, VINO uses a shared diffusion backbone that conditions on text, images and videos, enabling a broad range of visual creation and editing tasks under one model. Specifically, VINO couples a vision-language model (VLM) with a Multimodal Diffusion Transformer (MMDiT), where multimodal inputs are encoded as interleaved conditioning tokens, and then used to guide the diffusion process. This design supports multi-reference grounding, long-form instruction following, and coherent identity preservation across static and dynamic content, while avoiding modality-specific architectural components. To train such a unified system, we introduce a multi-stage training pipeline that progressively expands a video generation base model into a unified, multi-task generator capable of both image and video input and output. Across diverse generation and editing benchmarks, VINO demonstrates strong visual quality, faithful instruction following, improved reference and attribute preservation, and more controllable multi-identity edits. Our results highlight a practical path toward scalable unified visual generation, and the promise of interleaved, in-context computation as a foundation for general-purpose visual creation.', 'score': 21, 'issue_id': 426, 'pub_date': '2026-01-05', 'pub_date_card': {'ru': '5 января', 'en': 'January 5', 'zh': '1月5日'}, 'hash': '921cf734749276d1', 'authors': ['Junyi Chen', 'Tong He', 'Zhoujie Fu', 'Pengfei Wan', 'Kun Gai', 'Weicai Ye'], 'affiliations': ['Kling Team, Kuaishou Technology', 'Nanyang Technology University', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2601.02358.jpg', 'data': {'categories': ['#multimodal', '#video', '#open_source', '#diffusion', '#architecture', '#training'], 'emoji': '🎬', 'ru': {'title': 'Единая система для всех видов визуального творчества', 'desc': 'VINO — это единая система для генерации и редактирования изображений и видео, основанная на общей диффузионной архитектуре. Модель объединяет vision-language model с Multimodal Diffusion Transformer, принимая на вход текст, изображения и видео в виде чередующихся токенов условий. Специальный многоэтапный процесс обучения постепенно расширяет базовую модель видеогенерации в универсальный генератор, поддерживающий несколько задач. VINO демонстрирует высокое качество генерации, точное следование инструкциям, лучшее сохранение атрибутов и позволяет управлять редактированием нескольких персонажей одновременно.'}, 'en': {'title': 'VINO: One Model for All Visual Creations', 'desc': "VINO is a cutting-edge visual generator that integrates image and video generation and editing into a single framework using a shared diffusion backbone. It leverages a vision-language model combined with a Multimodal Diffusion Transformer to process various inputs like text, images, and videos, allowing for versatile visual tasks. The model employs interleaved conditioning tokens to guide the diffusion process, ensuring coherent outputs and effective instruction adherence. VINO's innovative multi-stage training pipeline enhances its capabilities, demonstrating superior visual quality and control in generating and editing both static and dynamic content."}, 'zh': {'title': '统一视觉生成的未来', 'desc': 'VINO是一种统一的视觉生成器，能够在单一框架内执行图像和视频的生成与编辑任务。它使用共享的扩散骨干网络，结合文本、图像和视频的多模态输入，避免了依赖特定任务模型的复杂性。VINO将视觉语言模型与多模态扩散变换器结合，通过交错的条件标记引导扩散过程，从而实现多参考基础、长形式指令跟随和一致的身份保留。该系统的多阶段训练流程使其能够逐步扩展为一个多任务生成器，展示了强大的视觉质量和可控的多身份编辑能力。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.02281', 'title': 'InfiniteVGGT: Visual Geometry Grounded Transformer for Endless Streams', 'url': 'https://huggingface.co/papers/2601.02281', 'abstract': "InfiniteVGGT enables continuous 3D visual geometry understanding through a causal transformer with adaptive memory management, outperforming existing streaming methods in long-term stability while introducing a new benchmark for extended evaluation.  \t\t\t\t\tAI-generated summary \t\t\t\t The grand vision of enabling persistent, large-scale 3D visual geometry understanding is shackled by the irreconcilable demands of scalability and long-term stability. While offline models like VGGT achieve inspiring geometry capability, their batch-based nature renders them irrelevant for live systems. Streaming architectures, though the intended solution for live operation, have proven inadequate. Existing methods either fail to support truly infinite-horizon inputs or suffer from catastrophic drift over long sequences. We shatter this long-standing dilemma with InfiniteVGGT, a causal visual geometry transformer that operationalizes the concept of a rolling memory through a bounded yet adaptive and perpetually expressive KV cache. Capitalizing on this, we devise a training-free, attention-agnostic pruning strategy that intelligently discards obsolete information, effectively ``rolling'' the memory forward with each new frame. Fully compatible with FlashAttention, InfiniteVGGT finally alleviates the compromise, enabling infinite-horizon streaming while outperforming existing streaming methods in long-term stability. The ultimate test for such a system is its performance over a truly infinite horizon, a capability that has been impossible to rigorously validate due to the lack of extremely long-term, continuous benchmarks. To address this critical gap, we introduce the Long3D benchmark, which, for the first time, enables a rigorous evaluation of continuous 3D geometry estimation on sequences about 10,000 frames. This provides the definitive evaluation platform for future research in long-term 3D geometry understanding. Code is available at: https://github.com/AutoLab-SAI-SJTU/InfiniteVGGT", 'score': 20, 'issue_id': 432, 'pub_date': '2026-01-05', 'pub_date_card': {'ru': '5 января', 'en': 'January 5', 'zh': '1月5日'}, 'hash': '6ad1993c1280bb64', 'authors': ['Shuai Yuan', 'Yantai Yang', 'Xiaotian Yang', 'Xupeng Zhang', 'Zhonghao Zhao', 'Lingming Zhang', 'Zhipeng Zhang'], 'affiliations': ['AutoLab, School of Artificial Intelligence, Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2601.02281.jpg', 'data': {'categories': ['#3d', '#cv', '#benchmark', '#architecture'], 'emoji': '♾️', 'ru': {'title': 'Бесконечная память: трансформер для вечного понимания 3D геометрии', 'desc': 'InfiniteVGGT представляет собой причинный трансформер для непрерывного понимания 3D геометрии сцены, который решает проблему масштабируемости потоковых архитектур через адаптивное управление памятью KV-кеша. Модель использует беспристрастную стратегию обрезки внимания, которая удаляет устаревшую информацию и позволяет обрабатывать бесконечные последовательности кадров без катастрофического дрейфа. Авторы также представляют новый бенчмарк Long3D для оценки моделей на экстремально длинных видеопоследовательностях из 10,000 кадров. Предложенный метод превосходит существующие потоковые подходы в долгосрочной стабильности и открывает новые возможности для реальных систем визуального анализа.'}, 'en': {'title': 'InfiniteVGGT: Revolutionizing 3D Geometry Understanding with Adaptive Memory', 'desc': 'InfiniteVGGT is a novel approach that enhances 3D visual geometry understanding by utilizing a causal transformer with an adaptive memory system. This method addresses the challenges of scalability and long-term stability that have hindered previous streaming architectures. By implementing a rolling memory mechanism and a pruning strategy, InfiniteVGGT effectively manages information over extended sequences without losing performance. Additionally, it introduces the Long3D benchmark, allowing for rigorous evaluation of continuous 3D geometry estimation across thousands of frames, setting a new standard for future research.'}, 'zh': {'title': '无限视野，稳定几何理解', 'desc': 'InfiniteVGGT 是一种因果视觉几何变换器，能够实现持续的 3D 视觉几何理解。它通过自适应的记忆管理，克服了现有流式方法在长期稳定性方面的不足。与传统的批处理模型不同，InfiniteVGGT 采用了滚动记忆的概念，能够有效处理无限时域的输入。我们还引入了 Long3D 基准，首次提供了对连续 3D 几何估计的严格评估平台。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.02346', 'title': 'Falcon-H1R: Pushing the Reasoning Frontiers with a Hybrid Model for Efficient Test-Time Scaling', 'url': 'https://huggingface.co/papers/2601.02346', 'abstract': 'Falcon-H1R is a 7B-parameter language model that achieves competitive reasoning performance through efficient training strategies and architectural design, enabling scalable reasoning capabilities in compact models.  \t\t\t\t\tAI-generated summary \t\t\t\t This work introduces Falcon-H1R, a 7B-parameter reasoning-optimized model that establishes the feasibility of achieving competitive reasoning performance with small language models (SLMs). Falcon-H1R stands out for its parameter efficiency, consistently matching or outperforming SOTA reasoning models that are 2times to 7times larger across a variety of reasoning-intensive benchmarks. These results underscore the importance of careful data curation and targeted training strategies (via both efficient SFT and RL scaling) in delivering significant performance gains without increasing model size. Furthermore, Falcon-H1R advances the 3D limits of reasoning efficiency by combining faster inference (through its hybrid-parallel architecture design), token efficiency, and higher accuracy. This unique blend makes Falcon-H1R-7B a practical backbone for scaling advanced reasoning systems, particularly in scenarios requiring extensive chain-of-thoughts generation and parallel test-time scaling. Leveraging the recently introduced DeepConf approach, Falcon-H1R achieves state-of-the-art test-time scaling efficiency, offering substantial improvements in both accuracy and computational cost. As a result, Falcon-H1R demonstrates that compact models, through targeted model training and architectural choices, can deliver robust and scalable reasoning performance.', 'score': 12, 'issue_id': 427, 'pub_date': '2026-01-05', 'pub_date_card': {'ru': '5 января', 'en': 'January 5', 'zh': '1月5日'}, 'hash': 'be0a839ff0b87c9a', 'authors': ['Falcon LLM Team', 'Iheb Chaabane', 'Puneesh Khanna', 'Suhail Mohmad', 'Slim Frikha', 'Shi Hu', 'Abdalgader Abubaker', 'Reda Alami', 'Mikhail Lubinets', 'Mohamed El Amine Seddik', 'Hakim Hacid'], 'affiliations': ['Falcon LLM Team', 'Technology Innovation Institute (TIIUAE)'], 'pdf_title_img': 'assets/pdf/title_img/2601.02346.jpg', 'data': {'categories': ['#rl', '#training', '#optimization', '#architecture', '#benchmark', '#reasoning', '#open_source', '#small_models'], 'emoji': '⚡', 'ru': {'title': 'Мощные рассуждения в компактной модели', 'desc': 'Falcon-H1R — это компактная языковая модель с 7 миллиардами параметров, которая достигает конкурентоспособной производительности в задачах логического вывода благодаря оптимизированной архитектуре и эффективным стратегиям обучения. Модель демонстрирует выдающуюся параметрическую эффективность, сопоставляясь или превосходя более крупные модели на 2-7 раз в бенчмарках, требующих логических рассуждений. Ключевой вклад заключается в комбинации тщательной подготовки данных, адаптивного обучения (SFT и RL) и гибридно-параллельной архитектуры, обеспечивающих высокую точность с низкой затратой вычислительных ресурсов. Модель показывает, что компактные SLM могут обеспечить масштабируемые возможности логического вывода и эффективное масштабирование во время тестирования.'}, 'en': {'title': 'Compact Power: Reasoning Efficiency with Falcon-H1R', 'desc': 'Falcon-H1R is a compact 7B-parameter language model designed to excel in reasoning tasks while maintaining efficiency. It achieves competitive performance by utilizing advanced training strategies and a hybrid-parallel architecture, allowing it to outperform larger models in various benchmarks. The model emphasizes the significance of data curation and targeted training methods, such as efficient supervised fine-tuning (SFT) and reinforcement learning (RL) scaling. Overall, Falcon-H1R showcases that smaller models can achieve high reasoning capabilities without the need for increased size, making them practical for complex reasoning applications.'}, 'zh': {'title': '小型模型也能实现强大推理能力', 'desc': 'Falcon-H1R是一个拥有70亿参数的语言模型，通过高效的训练策略和架构设计，实现了竞争力的推理性能。该模型在多个推理密集型基准测试中，表现出与2到7倍更大模型相当或更优的性能，展示了小型语言模型的潜力。研究强调了数据精心策划和针对性训练策略的重要性，这使得在不增加模型规模的情况下，显著提升了性能。此外，Falcon-H1R通过混合并行架构设计，结合快速推理和高准确性，推动了推理效率的极限。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.24601', 'title': 'Recursive Language Models', 'url': 'https://huggingface.co/papers/2512.24601', 'abstract': 'We study allowing large language models (LLMs) to process arbitrarily long prompts through the lens of inference-time scaling. We propose Recursive Language Models (RLMs), a general inference strategy that treats long prompts as part of an external environment and allows the LLM to programmatically examine, decompose, and recursively call itself over snippets of the prompt. We find that RLMs successfully handle inputs up to two orders of magnitude beyond model context windows and, even for shorter prompts, dramatically outperform the quality of base LLMs and common long-context scaffolds across four diverse long-context tasks, while having comparable (or cheaper) cost per query.', 'score': 12, 'issue_id': 430, 'pub_date': '2026-12-31', 'pub_date_card': {'ru': '31 декабря', 'en': 'December 31', 'zh': '12月31日'}, 'hash': '55f7266c613668ec', 'authors': ['Alex L. Zhang', 'Tim Kraska', 'Omar Khattab'], 'affiliations': ['MIT CSAIL'], 'pdf_title_img': 'assets/pdf/title_img/2512.24601.jpg', 'data': {'categories': [], 'emoji': '🔄', 'ru': {'title': 'Рекурсивные языковые модели для обработки бесконечно длинных контекстов', 'desc': 'В работе предлагается метод Recursive Language Models (RLM) для обработки очень длинных промптов за счёт масштабирования на этапе инференса. Модель способна рекурсивно вызывать саму себя, разбивая длинный контекст на фрагменты и анализируя их последовательно. Такой подход позволяет обрабатывать входные последовательности на два порядка длиннее, чем размер контекстного окна модели. Метод демонстрирует значительное улучшение качества на различных задачах с длинным контекстом при сопоставимой или даже меньшей вычислительной стоимости.'}, 'en': {'title': 'Unlocking Infinite Context with Recursive Language Models', 'desc': 'This paper introduces Recursive Language Models (RLMs), a novel approach for large language models (LLMs) to manage long prompts effectively. RLMs treat lengthy inputs as an external environment, enabling the model to break down the prompt and recursively analyze its components. The study demonstrates that RLMs can process inputs significantly larger than the typical context window of LLMs, achieving superior performance on various long-context tasks. Additionally, RLMs maintain a cost-effective solution, providing high-quality outputs without increasing the expense per query.'}, 'zh': {'title': '递归语言模型：超越上下文限制的创新', 'desc': '我们研究了如何让大型语言模型（LLMs）处理任意长度的提示，采用推理时间扩展的视角。我们提出了递归语言模型（RLMs），这是一种通用的推理策略，将长提示视为外部环境的一部分，允许LLM以编程方式检查、分解并递归调用自身处理提示片段。研究发现，RLMs能够成功处理输入长度超过模型上下文窗口两个数量级的情况，并且在处理较短提示时，其质量显著优于基础LLMs和常见的长上下文框架，且每次查询的成本相当或更低。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.02356', 'title': 'Talk2Move: Reinforcement Learning for Text-Instructed Object-Level Geometric Transformation in Scenes', 'url': 'https://huggingface.co/papers/2601.02356', 'abstract': 'Talk2Move presents a reinforcement learning-based diffusion framework that enables precise, semantically faithful spatial transformations of objects in scenes using natural language instructions.  \t\t\t\t\tAI-generated summary \t\t\t\t We introduce Talk2Move, a reinforcement learning (RL) based diffusion framework for text-instructed spatial transformation of objects within scenes. Spatially manipulating objects in a scene through natural language poses a challenge for multimodal generation systems. While existing text-based manipulation methods can adjust appearance or style, they struggle to perform object-level geometric transformations-such as translating, rotating, or resizing objects-due to scarce paired supervision and pixel-level optimization limits. Talk2Move employs Group Relative Policy Optimization (GRPO) to explore geometric actions through diverse rollouts generated from input images and lightweight textual variations, removing the need for costly paired data. A spatial reward guided model aligns geometric transformations with linguistic description, while off-policy step evaluation and active step sampling improve learning efficiency by focusing on informative transformation stages. Furthermore, we design object-centric spatial rewards that evaluate displacement, rotation, and scaling behaviors directly, enabling interpretable and coherent transformations. Experiments on curated benchmarks demonstrate that Talk2Move achieves precise, consistent, and semantically faithful object transformations, outperforming existing text-guided editing approaches in both spatial accuracy and scene coherence.', 'score': 11, 'issue_id': 426, 'pub_date': '2026-01-05', 'pub_date_card': {'ru': '5 января', 'en': 'January 5', 'zh': '1月5日'}, 'hash': 'a0b15d4316aee180', 'authors': ['Jing Tan', 'Zhaoyang Zhang', 'Yantao Shen', 'Jiarui Cai', 'Shuo Yang', 'Jiajun Wu', 'Wei Xia', 'Zhuowen Tu', 'Stefano Soatto'], 'affiliations': ['AWS Agentic AI', 'Amazon Robotics', 'Amazon Web Services', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2601.02356.jpg', 'data': {'categories': ['#rl', '#training', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Геометрические трансформации объектов через естественный язык', 'desc': 'Talk2Move — это фреймворк на основе диффузионных моделей и обучения с подкреплением, который позволяет преобразовывать объекты в сцене по текстовым инструкциям на естественном языке. Система использует Group Relative Policy Optimization для исследования различных геометрических действий без необходимости в больших наборах размеченных данных. Модель обучается с помощью специально разработанных пространственных функций награды, которые оценивают смещение, ротацию и масштабирование объектов, обеспечивая семантически верные преобразования. Экспериментальные результаты показывают, что метод превосходит существующие подходы по точности пространственных трансформаций и согласованности сцены.'}, 'en': {'title': "Transforming Scenes with Words: Talk2Move's Reinforcement Learning Revolution", 'desc': 'Talk2Move is a novel framework that uses reinforcement learning to enable spatial transformations of objects in scenes based on natural language instructions. It addresses the challenge of performing geometric transformations like translation, rotation, and resizing, which are difficult for existing methods due to limited data and optimization constraints. By utilizing Group Relative Policy Optimization (GRPO), Talk2Move generates diverse rollouts from images and text variations, eliminating the need for expensive paired datasets. The framework incorporates spatial rewards that directly assess geometric changes, resulting in accurate and coherent transformations that align well with the provided linguistic descriptions.'}, 'zh': {'title': 'Talk2Move：自然语言驱动的物体空间变换', 'desc': 'Talk2Move是一个基于强化学习的扩散框架，能够根据自然语言指令精确地对场景中的物体进行空间变换。该方法解决了多模态生成系统在自然语言指导下进行物体几何变换的挑战，克服了现有方法在配对监督和像素级优化方面的局限。通过使用群体相对策略优化（GRPO），Talk2Move能够在不需要昂贵配对数据的情况下，探索几何动作并生成多样的输出。实验结果表明，Talk2Move在空间准确性和场景一致性方面超越了现有的文本引导编辑方法。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.02179', 'title': 'Confidence Estimation for LLMs in Multi-turn Interactions', 'url': 'https://huggingface.co/papers/2601.02179', 'abstract': 'Multi-turn conversation confidence estimation lacks systematic evaluation frameworks, prompting the introduction of novel metrics and a "Hinter-Guesser" paradigm for controlled dataset generation to improve calibration and monotonicity.  \t\t\t\t\tAI-generated summary \t\t\t\t While confidence estimation is a promising direction for mitigating hallucinations in Large Language Models (LLMs), current research dominantly focuses on single-turn settings. The dynamics of model confidence in multi-turn conversations, where context accumulates and ambiguity is progressively resolved, remain largely unexplored. Reliable confidence estimation in multi-turn settings is critical for many downstream applications, such as autonomous agents and human-in-the-loop systems. This work presents the first systematic study of confidence estimation in multi-turn interactions, establishing a formal evaluation framework grounded in two key desiderata: per-turn calibration and monotonicity of confidence as more information becomes available. To facilitate this, we introduce novel metrics, including a length-normalized Expected Calibration Error (InfoECE), and a new "Hinter-Guesser" paradigm for generating controlled evaluation datasets. Our experiments reveal that widely-used confidence techniques struggle with calibration and monotonicity in multi-turn dialogues. We propose P(Sufficient), a logit-based probe that achieves comparatively better performance, although the task remains far from solved. Our work provides a foundational methodology for developing more reliable and trustworthy conversational agents.', 'score': 6, 'issue_id': 438, 'pub_date': '2026-01-05', 'pub_date_card': {'ru': '5 января', 'en': 'January 5', 'zh': '1月5日'}, 'hash': 'e1689fc7ddf3b100', 'authors': ['Caiqi Zhang', 'Ruihan Yang', 'Xiaochen Zhu', 'Chengzu Li', 'Tiancheng Hu', 'Yijiang River Dong', 'Deqing Yang', 'Nigel Collier'], 'affiliations': ['Fudan University', 'University of Cambridge'], 'pdf_title_img': 'assets/pdf/title_img/2601.02179.jpg', 'data': {'categories': ['#benchmark', '#agents', '#hallucinations', '#alignment', '#training'], 'emoji': '🎯', 'ru': {'title': 'Калибровка уверенности LLM в многооборотных разговорах', 'desc': 'В работе представлено первое систематическое исследование оценки уверенности (confidence estimation) языковых моделей в многооборотных диалогах, где контекст накапливается и неопределённость постепенно снижается. Авторы предложили формальную схему оценки, основанную на двух ключевых критериях: калибровке на каждом ходу и монотонности уверенности при поступлении новой информации. Для этого введены новые метрики, включая нормализованную по длине Expected Calibration Error (InfoECE), и парадигма "Hinter-Guesser" для генерации контролируемых оценочных наборов данных. Экспериментальные результаты показывают, что известные техники оценки уверенности плохо работают с калибровкой в многооборотных диалогах, а предложенный метод P(Sufficient) демонстрирует лучшую производительность.'}, 'en': {'title': 'Enhancing Confidence in Multi-Turn Conversations', 'desc': "This paper addresses the challenge of estimating confidence in multi-turn conversations, which is crucial for improving the reliability of conversational agents. It introduces a systematic evaluation framework that focuses on two main aspects: per-turn calibration and the monotonicity of confidence as more context is provided. The authors propose new metrics, such as the length-normalized Expected Calibration Error (InfoECE), and a novel dataset generation method called the 'Hinter-Guesser' paradigm. Their findings indicate that existing confidence estimation techniques are inadequate in multi-turn settings, and they suggest a new approach, P(Sufficient), which shows improved performance but highlights that further work is needed in this area."}, 'zh': {'title': '提升多轮对话置信度的系统化研究', 'desc': '本论文探讨了多轮对话中的置信度估计问题，提出了系统化的评估框架。研究发现，现有的置信度估计方法在多轮对话中面临校准和单调性的问题。为了解决这些问题，作者引入了新的评估指标和"Hinter-Guesser"范式，以生成受控的数据集。该研究为开发更可靠的对话代理提供了基础方法论。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.01046', 'title': 'KV-Embedding: Training-free Text Embedding via Internal KV Re-routing in Decoder-only LLMs', 'url': 'https://huggingface.co/papers/2601.01046', 'abstract': 'KV-Embedding enables training-free representation learning from frozen LLMs by utilizing key-value states for enhanced context access and automated layer selection.  \t\t\t\t\tAI-generated summary \t\t\t\t While LLMs are powerful embedding backbones, their application in training-free settings faces two structural challenges: causal attention restricts early tokens from accessing subsequent context, and the next-token prediction objective biases representations toward generation rather than semantic compression. To address these limitations, we propose KV-Embedding, a framework that activates the latent representation power of frozen LLMs. Our method leverages the observation that the key-value (KV) states of the final token at each layer encode a compressed view of the sequence. By re-routing these states as a prepended prefix, we enable all tokens to access sequence-level context within a single forward pass. To ensure model-agnostic applicability, we introduce an automated layer selection strategy based on intrinsic dimensionality. Evaluations on MTEB across Qwen, Mistral, and Llama backbones show that KV-Embedding outperforms existing training-free baselines by up to 10%, while maintaining robust performance on sequences up to 4,096 tokens. These results demonstrate that internal state manipulation offers an efficient alternative to input modification, and we hope this work encourages further exploration of LLM internals for representation learning.', 'score': 5, 'issue_id': 426, 'pub_date': '2026-01-03', 'pub_date_card': {'ru': '3 января', 'en': 'January 3', 'zh': '1月3日'}, 'hash': '0d6e03d3443f8363', 'authors': ['Yixuan Tang', 'Yi Yang'], 'affiliations': ['The Hong Kong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2601.01046.jpg', 'data': {'categories': ['#multimodal', '#training'], 'emoji': '🔑', 'ru': {'title': 'Раскрытие скрытой мощи замороженных моделей через манипуляцию внутренними состояниями', 'desc': 'В статье предложен метод KV-Embedding для обучения-свободного извлечения представлений из замороженных больших языковых моделей. Авторы решают две проблемы: ограничение причинного внимания на ранних токенах и смещение представлений в сторону генерации текста. Метод использует ключ-значение состояния последнего токена каждого слоя как сжатое представление последовательности, которое переиспользуется как приставка для всех токенов. Для автоматического выбора оптимального слоя применяется стратегия на основе внутренней размерности, показывая улучшение на 10% по сравнению с существующими базовыми методами.'}, 'en': {'title': 'Unlocking Context with KV-Embedding in Frozen LLMs', 'desc': 'The paper introduces KV-Embedding, a novel framework that enhances representation learning from frozen large language models (LLMs) without the need for additional training. It addresses two main challenges: the limitations of causal attention that prevent early tokens from accessing later context, and the bias of next-token prediction that favors generation over meaningful representation. By utilizing key-value states from the final token of each layer, KV-Embedding allows all tokens to access comprehensive sequence-level context in a single forward pass. The method shows significant improvements in performance on various benchmarks, demonstrating the potential of manipulating internal states for better representation learning.'}, 'zh': {'title': 'KV-Embedding：无训练表示学习的新方法', 'desc': 'KV-Embedding是一种新框架，能够从冻结的大型语言模型（LLM）中进行无训练的表示学习。它通过利用关键-值（KV）状态来增强上下文访问，并自动选择层级，从而解决了因果注意力和下一个标记预测目标带来的结构性挑战。该方法允许所有标记在一次前向传播中访问序列级上下文，提升了表示的语义压缩能力。实验结果表明，KV-Embedding在多个基准测试中超越了现有的无训练基线，展示了内部状态操作在表示学习中的高效性。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.00501', 'title': 'CPPO: Contrastive Perception for Vision Language Policy Optimization', 'url': 'https://huggingface.co/papers/2601.00501', 'abstract': 'CPPO improves vision-language model fine-tuning by detecting perception tokens through entropy shifts and using contrastive perception loss to enhance multimodal reasoning efficiency.  \t\t\t\t\tAI-generated summary \t\t\t\t We introduce CPPO, a Contrastive Perception Policy Optimization method for finetuning vision-language models (VLMs). While reinforcement learning (RL) has advanced reasoning in language models, extending it to multimodal reasoning requires improving both the perception and reasoning aspects. Prior works tackle this challenge mainly with explicit perception rewards, but disentangling perception tokens from reasoning tokens is difficult, requiring extra LLMs, ground-truth data, forced separation of perception from reasoning by policy model, or applying rewards indiscriminately to all output tokens. CPPO addresses this problem by detecting perception tokens via entropy shifts in the model outputs under perturbed input images. CPPO then extends the RL objective function with a Contrastive Perception Loss (CPL) that enforces consistency under information-preserving perturbations and sensitivity under information-removing ones. Experiments show that CPPO surpasses previous perception-rewarding methods, while avoiding extra models, making training more efficient and scalable.', 'score': 5, 'issue_id': 441, 'pub_date': '2026-01-01', 'pub_date_card': {'ru': '1 января', 'en': 'January 1', 'zh': '1月1日'}, 'hash': 'bc5a079ffa7b50ec', 'authors': ['Ahmad Rezaei', 'Mohsen Gholami', 'Saeed Ranjbar Alvar', 'Kevin Cannons', 'Mohammad Asiful Hossain', 'Zhou Weimin', 'Shunbo Zhou', 'Yong Zhang', 'Mohammad Akbari'], 'affiliations': ['Huawei Cloud', 'Huawei Technologies Canada Co. Ltd.'], 'pdf_title_img': 'assets/pdf/title_img/2601.00501.jpg', 'data': {'categories': ['#multimodal', '#optimization', '#reasoning', '#rlhf', '#rl', '#training', '#cv'], 'emoji': '🎯', 'ru': {'title': 'Автоматическое обнаружение восприятия через энтропийные сдвиги для эффективной настройки мультимодальных моделей', 'desc': 'В статье представлен метод CPPO для тонкой настройки зрительно-языковых моделей с использованием обучения с подкреплением. Ключевая инновация заключается в автоматическом обнаружении токенов восприятия через анализ сдвигов энтропии выходов модели при возмущенных входных изображениях. Авторы предлагают контрастивную функцию потерь восприятия, которая обеспечивает согласованность при сохраняющих информацию возмущениях и чувствительность при удаляющих информацию. Метод превосходит предыдущие подходы в области многомодального рассуждения, избегая необходимости дополнительных моделей и обеспечивая более эффективное и масштабируемое обучение.'}, 'en': {'title': 'Enhancing Multimodal Reasoning with CPPO', 'desc': 'CPPO, or Contrastive Perception Policy Optimization, enhances the fine-tuning of vision-language models (VLMs) by effectively identifying perception tokens through entropy shifts in model outputs. This method improves multimodal reasoning by incorporating a Contrastive Perception Loss (CPL) into the reinforcement learning framework, which ensures that the model maintains consistency when faced with minor changes in input while being sensitive to significant alterations. Unlike previous approaches that relied on additional models or explicit perception rewards, CPPO simplifies the process by directly detecting perception tokens without needing extra resources. Experimental results demonstrate that CPPO outperforms earlier methods, making the training of VLMs more efficient and scalable.'}, 'zh': {'title': 'CPPO：提升视觉-语言模型的多模态推理效率', 'desc': 'CPPO是一种对比感知策略优化方法，用于微调视觉-语言模型（VLMs）。该方法通过检测模型输出中的感知标记，利用熵变化来提高多模态推理的效率。与以往的研究不同，CPPO不需要额外的模型或真实数据，而是通过对比感知损失（CPL）来增强模型在信息保留和信息去除扰动下的一致性和敏感性。实验结果表明，CPPO在性能上超越了之前的感知奖励方法，同时提高了训练的效率和可扩展性。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.02267', 'title': 'DiffProxy: Multi-View Human Mesh Recovery via Diffusion-Generated Dense Proxies', 'url': 'https://huggingface.co/papers/2601.02267', 'abstract': "DiffProxy enables human mesh recovery from multi-view images by generating multi-view consistent proxies using diffusion-based generative priors, achieving state-of-the-art performance through synthetic training and robust test-time scaling.  \t\t\t\t\tAI-generated summary \t\t\t\t Human mesh recovery from multi-view images faces a fundamental challenge: real-world datasets contain imperfect ground-truth annotations that bias the models' training, while synthetic data with precise supervision suffers from domain gap. In this paper, we propose DiffProxy, a novel framework that generates multi-view consistent human proxies for mesh recovery. Central to DiffProxy is leveraging the diffusion-based generative priors to bridge the synthetic training and real-world generalization. Its key innovations include: (1) a multi-conditional mechanism for generating multi-view consistent, pixel-aligned human proxies; (2) a hand refinement module that incorporates flexible visual prompts to enhance local details; and (3) an uncertainty-aware test-time scaling method that increases robustness to challenging cases during optimization. These designs ensure that the mesh recovery process effectively benefits from the precise synthetic ground truth and generative advantages of the diffusion-based pipeline. Trained entirely on synthetic data, DiffProxy achieves state-of-the-art performance across five real-world benchmarks, demonstrating strong zero-shot generalization particularly on challenging scenarios with occlusions and partial views. Project page: https://wrk226.github.io/DiffProxy.html", 'score': 4, 'issue_id': 439, 'pub_date': '2026-01-05', 'pub_date_card': {'ru': '5 января', 'en': 'January 5', 'zh': '1月5日'}, 'hash': 'f5aff3b9929ea83a', 'authors': ['Renke Wang', 'Zhenyu Zhang', 'Ying Tai', 'Jian Yang'], 'affiliations': ['Nanjing University, School of Intelligent Science and Technology', 'PCA Lab, Nanjing University of Science and Technology, China'], 'pdf_title_img': 'assets/pdf/title_img/2601.02267.jpg', 'data': {'categories': ['#synthetic', '#multimodal', '#cv', '#diffusion', '#training'], 'emoji': '🧑\u200d🦾', 'ru': {'title': 'Диффузионные прокси для точного восстановления 3D формы человека из множества видов', 'desc': 'DiffProxy - это фреймворк для восстановления трёхмерной mesh модели человека из многовидовых изображений, использующий диффузионные генеративные модели для создания согласованных прокси-представлений. Основная инновация заключается в использовании условного механизма для генерации многовидовых пиксель-выровненных представлений человека, которые связывают синтетические данные обучения с реальными сценами. Фреймворк включает модуль уточнения рук с гибкими визуальными подсказками и метод масштабирования во время тестирования с учётом неопределённости для повышения устойчивости. Модель, обученная только на синтетических данных, достигает передовых результатов на пяти реальных бенчмарках и демонстрирует сильную нулевую генерализацию, особенно на сложных случаях с окклюзией и частичным видом.'}, 'en': {'title': 'Bridging Synthetic and Real-World Data for Superior Mesh Recovery', 'desc': 'DiffProxy is a framework designed to improve human mesh recovery from multi-view images by creating consistent proxies using diffusion-based generative models. It addresses the issue of biased training from imperfect real-world datasets by utilizing synthetic data with accurate annotations. The framework introduces a multi-conditional mechanism for generating pixel-aligned proxies, a hand refinement module for enhancing details, and an uncertainty-aware scaling method for better performance in difficult scenarios. As a result, DiffProxy achieves state-of-the-art results on various benchmarks, showcasing its ability to generalize well to real-world challenges.'}, 'zh': {'title': 'DiffProxy：从多视角图像中恢复人体网格的创新框架', 'desc': 'DiffProxy 是一个新颖的框架，旨在通过生成多视角一致的人体代理来实现从多视角图像中恢复人体网格。该方法利用基于扩散的生成先验，解决了合成训练与真实世界泛化之间的差距。DiffProxy 的创新包括多条件机制生成像素对齐的人体代理、手部细化模块增强局部细节，以及不确定性感知的测试时间缩放方法，提高了在优化过程中的鲁棒性。通过完全在合成数据上训练，DiffProxy 在五个真实世界基准上实现了最先进的性能，特别是在遮挡和部分视图等具有挑战性的场景中展现了强大的零样本泛化能力。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.01836', 'title': 'COMPASS: A Framework for Evaluating Organization-Specific Policy Alignment in LLMs', 'url': 'https://huggingface.co/papers/2601.01836', 'abstract': "COMPASS evaluates large language models' compliance with organizational policies, revealing significant gaps in enforcing prohibitions despite strong performance on legitimate requests.  \t\t\t\t\tAI-generated summary \t\t\t\t As large language models are deployed in high-stakes enterprise applications, from healthcare to finance, ensuring adherence to organization-specific policies has become essential. Yet existing safety evaluations focus exclusively on universal harms. We present COMPASS (Company/Organization Policy Alignment Assessment), the first systematic framework for evaluating whether LLMs comply with organizational allowlist and denylist policies. We apply COMPASS to eight diverse industry scenarios, generating and validating 5,920 queries that test both routine compliance and adversarial robustness through strategically designed edge cases. Evaluating seven state-of-the-art models, we uncover a fundamental asymmetry: models reliably handle legitimate requests (>95% accuracy) but catastrophically fail at enforcing prohibitions, refusing only 13-40% of adversarial denylist violations. These results demonstrate that current LLMs lack the robustness required for policy-critical deployments, establishing COMPASS as an essential evaluation framework for organizational AI safety.", 'score': 4, 'issue_id': 428, 'pub_date': '2026-01-05', 'pub_date_card': {'ru': '5 января', 'en': 'January 5', 'zh': '1月5日'}, 'hash': 'bf1e3c3f8aa12378', 'authors': ['Dasol Choi', 'DongGeon Lee', 'Brigitta Jesica Kartono', 'Helena Berndt', 'Taeyoun Kwon', 'Joonwon Jang', 'Haon Park', 'Hwanjo Yu', 'Minsuk Kahng'], 'affiliations': ['AIM Intelligence', 'BMW Group', 'POSTECH', 'Seoul National University', 'Yonsei University'], 'pdf_title_img': 'assets/pdf/title_img/2601.01836.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#alignment', '#security'], 'emoji': '🛡️', 'ru': {'title': 'Языковые модели уязвимы к обходу организационных политик', 'desc': 'Статья представляет COMPASS — первую систематическую методику оценки соответствия больших языковых моделей организационным политикам безопасности. Исследователи создали набор из 5920 тестовых запросов для восьми различных отраслевых сценариев, включая adversarial примеры, чтобы проверить способность моделей соблюдать как разрешительные, так и запретительные правила. Анализ семи современных LLM выявил критический дисбаланс: модели успешно обрабатывают легитимные запросы с точностью свыше 95%, но катастрофически проваливаются при блокировании запрещённых действий, отказывая только в 13-40% случаев нарушений. Результаты демонстрируют недостаточную робастность текущих языковых моделей для развёртывания в критичных по безопасности корпоративных приложениях.'}, 'en': {'title': 'Bridging the Compliance Gap in AI with COMPASS', 'desc': 'The paper introduces COMPASS, a framework designed to assess how well large language models (LLMs) follow specific organizational policies. It highlights a critical issue where these models perform well on legitimate requests but struggle significantly with enforcing prohibitions, showing only 13-40% accuracy in denying harmful queries. By testing seven advanced models across various industry scenarios, the study reveals a concerning gap in compliance that could jeopardize safety in high-stakes applications. COMPASS aims to fill this gap by providing a systematic approach to evaluate and improve the adherence of LLMs to organizational guidelines.'}, 'zh': {'title': '确保AI遵循组织政策的COMPASS框架', 'desc': 'COMPASS是一个评估大型语言模型（LLM）是否遵循组织政策的系统框架。尽管这些模型在处理合法请求时表现良好，但在执行禁止性政策方面却存在显著缺陷。研究发现，当前的LLM在拒绝对抗性请求时的准确率仅为13%到40%。因此，COMPASS为确保AI在关键领域的安全性提供了必要的评估工具。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.23035', 'title': 'Toward Stable Semi-Supervised Remote Sensing Segmentation via Co-Guidance and Co-Fusion', 'url': 'https://huggingface.co/papers/2512.23035', 'abstract': 'A semi-supervised remote sensing image segmentation framework combines vision-language and self-supervised models to reduce pseudo-label drift through dual-student architecture and semantic co-guidance mechanisms.  \t\t\t\t\tAI-generated summary \t\t\t\t Semi-supervised remote sensing (RS) image semantic segmentation offers a promising solution to alleviate the burden of exhaustive annotation, yet it fundamentally struggles with pseudo-label drift, a phenomenon where confirmation bias leads to the accumulation of errors during training. In this work, we propose Co2S, a stable semi-supervised RS segmentation framework that synergistically fuses priors from vision-language models and self-supervised models. Specifically, we construct a heterogeneous dual-student architecture comprising two distinct ViT-based vision foundation models initialized with pretrained CLIP and DINOv3 to mitigate error accumulation and pseudo-label drift. To effectively incorporate these distinct priors, an explicit-implicit semantic co-guidance mechanism is introduced that utilizes text embeddings and learnable queries to provide explicit and implicit class-level guidance, respectively, thereby jointly enhancing semantic consistency. Furthermore, a global-local feature collaborative fusion strategy is developed to effectively fuse the global contextual information captured by CLIP with the local details produced by DINOv3, enabling the model to generate highly precise segmentation results. Extensive experiments on six popular datasets demonstrate the superiority of the proposed method, which consistently achieves leading performance across various partition protocols and diverse scenarios. Project page is available at https://xavierjiezou.github.io/Co2S/.', 'score': 4, 'issue_id': 429, 'pub_date': '2026-12-28', 'pub_date_card': {'ru': '28 декабря', 'en': 'December 28', 'zh': '12月28日'}, 'hash': '46b30a51798dbc10', 'authors': ['Yi Zhou', 'Xuechao Zou', 'Shun Zhang', 'Kai Li', 'Shiying Wang', 'Jingming Chen', 'Congyan Lang', 'Tengfei Cao', 'Pin Tao', 'Yuanchun Shi'], 'affiliations': ['Department of Computer Science and Technology, Tsinghua University, Beijing, China', 'Intelligent Computing and Application Laboratory of Qinghai Province, Qinghai University, Xining, China', 'Key Lab of Big Data & Artificial Intelligence in Transportation (Ministry of Education), School of Computer Science & Technology, Beijing Jiaotong University, Beijing, China', 'Key Laboratory of Pervasive Computing, Ministry of Education', 'School of Computer Technology and Application, Qinghai University, Xining, China'], 'pdf_title_img': 'assets/pdf/title_img/2512.23035.jpg', 'data': {'categories': ['#architecture', '#dataset', '#cv', '#multimodal'], 'emoji': '🛰️', 'ru': {'title': 'Двойной студент против дрейфа: стабильная сегментация спутниковых снимков через слияние видение-языковых и самосупервизированных моделей', 'desc': 'В статье предложен Co2S — полусупервизированный фреймворк для семантической сегментации снимков дистанционного зондирования, который решает проблему дрейфа псевдо-меток. Метод использует гетерогенную архитектуру с двумя студентами на основе видение-языковой модели CLIP и самосупервизированной модели DINOv3. Для эффективного объединения приоров из разных моделей применяется механизм семантической со-руководства, использующий текстовые эмбеддинги и обучаемые запросы для обеспечения консистентности. Стратегия глобально-локального сотрудничества фреймворков позволяет объединить контекстную информацию с деталями и достичь лучших результатов на шести популярных датасетах.'}, 'en': {'title': 'Enhancing Remote Sensing Segmentation with Co2S Framework', 'desc': "This paper presents Co2S, a semi-supervised framework for remote sensing image segmentation that addresses the issue of pseudo-label drift. By integrating vision-language models and self-supervised models, it employs a dual-student architecture to enhance stability during training. The framework utilizes a semantic co-guidance mechanism to provide both explicit and implicit guidance, improving the model's ability to maintain semantic consistency. Additionally, a collaborative fusion strategy combines global and local features to achieve high-quality segmentation results across multiple datasets."}, 'zh': {'title': '提升遥感图像分割精度的创新框架', 'desc': '本论文提出了一种半监督遥感图像分割框架Co2S，旨在减少伪标签漂移的问题。该框架结合了视觉-语言模型和自监督模型，通过双学生架构和语义协同机制来提高分割的准确性。具体而言，使用了基于ViT的异构双学生架构，分别初始化为预训练的CLIP和DINOv3，以减轻错误累积。通过显式-隐式语义协同机制和全局-局部特征协同融合策略，模型能够有效整合上下文信息和局部细节，从而实现高精度的分割结果。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.01426', 'title': 'SWE-Lego: Pushing the Limits of Supervised Fine-tuning for Software Issue Resolving', 'url': 'https://huggingface.co/papers/2601.01426', 'abstract': 'SWE-Lego achieves state-of-the-art performance in software engineering task resolution through a lightweight supervised fine-tuning approach combined with a curated dataset and refined training procedures.  \t\t\t\t\tAI-generated summary \t\t\t\t We present SWE-Lego, a supervised fine-tuning (SFT) recipe designed to achieve state-ofthe-art performance in software engineering (SWE) issue resolving. In contrast to prevalent methods that rely on complex training paradigms (e.g., mid-training, SFT, reinforcement learning, and their combinations), we explore how to push the limits of a lightweight SFT-only approach for SWE tasks. SWE-Lego comprises three core building blocks, with key findings summarized as follows: 1) the SWE-Lego dataset, a collection of 32k highquality task instances and 18k validated trajectories, combining real and synthetic data to complement each other in both quality and quantity; 2) a refined SFT procedure with error masking and a difficulty-based curriculum, which demonstrably improves action quality and overall performance. Empirical results show that with these two building bricks alone,the SFT can push SWE-Lego models to state-of-the-art performance among open-source models of comparable size on SWE-bench Verified: SWE-Lego-Qwen3-8B reaches 42.2%, and SWE-Lego-Qwen3-32B attains 52.6%. 3) We further evaluate and improve test-time scaling (TTS) built upon the SFT foundation. Based on a well-trained verifier, SWE-Lego models can be significantly boosted--for example, 42.2% to 49.6% and 52.6% to 58.8% under TTS@16 for the 8B and 32B models, respectively.', 'score': 2, 'issue_id': 432, 'pub_date': '2026-01-04', 'pub_date_card': {'ru': '4 января', 'en': 'January 4', 'zh': '1月4日'}, 'hash': '5f09f67db35870c2', 'authors': ['Chaofan Tao', 'Jierun Chen', 'Yuxin Jiang', 'Kaiqi Kou', 'Shaowei Wang', 'Ruoyu Wang', 'Xiaohui Li', 'Sidi Yang', 'Yiming Du', 'Jianbo Dai', 'Zhiming Mao', 'Xinyu Wang', 'Lifeng Shang', 'Haoli Bai'], 'affiliations': ['CUHK', 'HKU', 'Huawei Technologies', 'NTU'], 'pdf_title_img': 'assets/pdf/title_img/2601.01426.jpg', 'data': {'categories': ['#synthetic', '#science', '#optimization', '#training', '#dataset', '#open_source', '#plp'], 'emoji': '🧱', 'ru': {'title': 'Простота и качество: лёгкое дообучение для решения задач разработки ПО', 'desc': 'SWE-Lego — это метод настройки больших языковых моделей на задачах разработки ПО, использующий лёгкий подход к контролируемому дообучению без сложных техник типа reinforcement learning. Ключевую роль играет курируемый датасет из 32 тысяч примеров и 18 тысяч валидированных траекторий, комбинирующий реальные и синтетические данные для оптимальной полноты. Процедура обучения включает маскирование ошибок и curriculum learning на основе сложности, что значительно улучшает качество действий модели. Метод достигает state-of-the-art результатов на бенчмарке SWE-bench: 42.2% для 8B модели и 52.6% для 32B модели, с дальнейшим улучшением до 58.8% благодаря масштабированию на этапе вывода.'}, 'en': {'title': 'SWE-Lego: Lightweight SFT for Superior Software Engineering Solutions', 'desc': 'SWE-Lego is a novel approach in machine learning that focuses on software engineering task resolution using a lightweight supervised fine-tuning (SFT) method. It utilizes a specially curated dataset containing 32,000 high-quality task instances and 18,000 validated trajectories, which enhances the training process by combining real and synthetic data. The refined SFT procedure incorporates error masking and a difficulty-based curriculum to improve the quality of actions taken by the model. Empirical results demonstrate that SWE-Lego achieves state-of-the-art performance among open-source models, significantly boosting results through test-time scaling techniques.'}, 'zh': {'title': 'SWE-Lego：轻量级微调实现软件工程任务的最佳性能', 'desc': 'SWE-Lego是一种轻量级的监督微调方法，旨在在软件工程任务中实现最先进的性能。它使用了一个包含32,000个高质量任务实例和18,000个验证轨迹的数据集，结合真实和合成数据以提高质量和数量。该方法还采用了改进的微调程序，通过错误掩蔽和基于难度的课程来提升行动质量和整体性能。实验结果表明，SWE-Lego模型在软件工程基准测试中表现优异，达到了开源模型中的领先水平。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.01576', 'title': 'OpenNovelty: An LLM-powered Agentic System for Verifiable Scholarly Novelty Assessment', 'url': 'https://huggingface.co/papers/2601.01576', 'abstract': 'An LLM-powered agentic system for transparent, evidence-based novelty assessment in peer review that retrieves and analyzes prior work through semantic search and hierarchical taxonomy construction.  \t\t\t\t\tAI-generated summary \t\t\t\t Evaluating novelty is critical yet challenging in peer review, as reviewers must assess submissions against a vast, rapidly evolving literature. This report presents OpenNovelty, an LLM-powered agentic system for transparent, evidence-based novelty analysis. The system operates through four phases: (1) extracting the core task and contribution claims to generate retrieval queries; (2) retrieving relevant prior work based on extracted queries via semantic search engine; (3) constructing a hierarchical taxonomy of core-task-related work and performing contribution-level full-text comparisons against each contribution; and (4) synthesizing all analyses into a structured novelty report with explicit citations and evidence snippets. Unlike naive LLM-based approaches, OpenNovelty grounds all assessments in retrieved real papers, ensuring verifiable judgments. We deploy our system on 500+ ICLR 2026 submissions with all reports publicly available on our website, and preliminary analysis suggests it can identify relevant prior work, including closely related papers that authors may overlook. OpenNovelty aims to empower the research community with a scalable tool that promotes fair, consistent, and evidence-backed peer review.', 'score': 1, 'issue_id': 426, 'pub_date': '2026-01-04', 'pub_date_card': {'ru': '4 января', 'en': 'January 4', 'zh': '1月4日'}, 'hash': '8eb218277ba60f81', 'authors': ['Ming Zhang', 'Kexin Tan', 'Yueyuan Huang', 'Yujiong Shen', 'Chunchun Ma', 'Li Ju', 'Xinran Zhang', 'Yuhui Wang', 'Wenqing Jing', 'Jingyi Deng', 'Huayu Sha', 'Binze Hu', 'Jingqi Tong', 'Changhao Jiang', 'Yage Geng', 'Yuankai Ying', 'Yue Zhang', 'Zhangyue Yin', 'Zhiheng Xi', 'Shihan Dou', 'Tao Gui', 'Qi Zhang', 'Xuanjing Huang'], 'affiliations': ['Claremont McKenna College', 'Fudan University', 'WisPaper.AI'], 'pdf_title_img': 'assets/pdf/title_img/2601.01576.jpg', 'data': {'categories': ['#benchmark', '#open_source', '#agents', '#rag', '#science'], 'emoji': '🔍', 'ru': {'title': 'Прозрачная оценка новизны через семантический поиск и верификацию источниками', 'desc': 'OpenNovelty — это система на основе большой языковой модели, которая автоматизирует оценку новизны научных работ при рецензировании. Система использует семантический поиск для извлечения релевантных публикаций и строит иерархическую таксономию связанных работ для сравнения вклада авторов. Все оценки новизны основаны на анализе реальных найденных статей с явным указанием источников и цитирования, что обеспечивает прозрачность и воспроизводимость результатов. Система была протестирована на более чем 500 статьях конференции ICLR 2026 и способна выявлять релевантные работы, включая те, которые авторы могли упустить.'}, 'en': {'title': 'Empowering Peer Review with Evidence-Based Novelty Assessment', 'desc': 'This paper introduces OpenNovelty, a system that uses large language models (LLMs) to improve the novelty assessment process in peer review. It operates in four phases: extracting claims, retrieving relevant literature through semantic search, constructing a hierarchical taxonomy, and synthesizing findings into a structured report. By grounding its evaluations in actual research papers, OpenNovelty ensures that its novelty assessments are transparent and verifiable. The system has been tested on over 500 submissions, demonstrating its ability to identify significant prior work that may be overlooked by authors.'}, 'zh': {'title': '提升同行评审的新颖性评估工具', 'desc': '本论文介绍了一种名为OpenNovelty的系统，旨在提高同行评审中对新颖性的评估透明度和基于证据的分析。该系统利用大型语言模型（LLM）通过四个阶段进行工作：提取核心任务和贡献声明、基于语义搜索检索相关文献、构建核心任务相关工作的层次分类法，并进行贡献级别的全文比较。与简单的LLM方法不同，OpenNovelty的评估基于真实文献，确保判断的可验证性。该系统已在500多篇ICLR 2026的提交中应用，初步分析表明它能够识别相关的先前工作，包括作者可能忽视的相关论文。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.00863', 'title': 'Selective Imperfection as a Generative Framework for Analysis, Creativity and Discovery', 'url': 'https://huggingface.co/papers/2601.00863', 'abstract': 'We introduce materiomusic as a generative framework linking the hierarchical structures of matter with the compositional logic of music. Across proteins, spider webs and flame dynamics, vibrational and architectural principles recur as tonal hierarchies, harmonic progressions, and long-range musical form. Using reversible mappings, from molecular spectra to musical tones and from three-dimensional networks to playable instruments, we show how sound functions as a scientific probe, an epistemic inversion where listening becomes a mode of seeing and musical composition becomes a blueprint for matter. These mappings excavate deep time: patterns originating in femtosecond molecular vibrations or billion-year evolutionary histories become audible. We posit that novelty in science and art emerges when constraints cannot be satisfied within existing degrees of freedom, forcing expansion of the space of viable configurations. Selective imperfection provides the mechanism restoring balance between coherence and adaptability. Quantitative support comes from exhaustive enumeration of all 2^12 musical scales, revealing that culturally significant systems cluster in a mid-entropy, mid-defect corridor, directly paralleling the Hall-Petch optimum where intermediate defect densities maximize material strength. Iterating these mappings creates productive collisions between human creativity and physics, generating new information as musical structures encounter evolutionary constraints. We show how swarm-based AI models compose music exhibiting human-like structural signatures such as small-world connectivity, modular integration, long-range coherence, suggesting a route beyond interpolation toward invention. We show that science and art are generative acts of world-building under constraint, with vibration as a shared grammar organizing structure across scales.', 'score': 1, 'issue_id': 436, 'pub_date': '2026-12-30', 'pub_date_card': {'ru': '30 декабря', 'en': 'December 30', 'zh': '12月30日'}, 'hash': '25795676ed9d7a0a', 'authors': ['Markus J. Buehler'], 'affiliations': ['Center for Computational Science and Engineering', 'Laboratory for Atomistic and Molecular Mechanics', 'Massachusetts Institute of Technology', 'Schwarzman College of Computing'], 'pdf_title_img': 'assets/pdf/title_img/2601.00863.jpg', 'data': {'categories': ['#audio', '#multimodal', '#science', '#diffusion'], 'emoji': '🎵', 'ru': {'title': 'Вибрация как универсальный язык природы: от молекул к музыке через генеративное моделирование', 'desc': 'Авторы представляют materiomusic — генеративную систему, которая связывает иерархические структуры материи с принципами музыкальной композиции через обратимые отображения молекулярных спектров в звуки и трёхмерных сетей в музыкальные инструменты. Они показывают, что звук может служить научным инструментом познания, где прослушивание становится способом видения, позволяя услышать паттерны от фемтосекундных молекулярных колебаний до миллиардолетней эволюционной истории. Используя анализ энтропии музыкальных шкал и параллели с оптимумом Холла-Петча в материаловедении, авторы доказывают, что оптимальная новизна в науке и искусстве возникает при промежуточном уровне дефектности и сложности. Применяя модели искусственного интеллекта на основе роевого поведения, исследователи генерируют музыку с человекоподобными структурными свойствами, демонстрируя единую грамматику вибрации, организующую структуры на всех масштабах природы.'}, 'en': {'title': 'Harmonizing Matter and Music: A New Generative Framework', 'desc': "The paper presents 'materiomusic', a framework that connects the structures of matter with musical composition. It explores how principles from molecular vibrations and evolutionary patterns can be translated into musical tones and structures. By using reversible mappings, the authors demonstrate that sound can reveal scientific insights, making listening a way to understand complex systems. The study highlights the interplay between creativity and physics, suggesting that both science and art thrive under constraints, leading to innovative outcomes."}, 'zh': {'title': '物质与音乐的生成框架', 'desc': '本文介绍了materiomusic，这是一个将物质的层次结构与音乐的组成逻辑联系起来的生成框架。通过对蛋白质、蜘蛛网和火焰动力学的研究，发现振动和建筑原则在音乐中表现为音调层次、和声进程和长程音乐形式。我们使用可逆映射，将分子光谱转化为音乐音调，展示声音如何作为科学探测工具，音乐创作如何成为物质的蓝图。我们认为，当现有自由度无法满足约束时，科学和艺术中的新颖性便会出现，推动可行配置空间的扩展。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.21472', 'title': 'IMA++: ISIC Archive Multi-Annotator Dermoscopic Skin Lesion Segmentation Dataset', 'url': 'https://huggingface.co/papers/2512.21472', 'abstract': "A large-scale public multi-annotator skin lesion segmentation dataset is introduced with extensive metadata for annotator analysis and consensus modeling.  \t\t\t\t\tAI-generated summary \t\t\t\t Multi-annotator medical image segmentation is an important research problem, but requires annotated datasets that are expensive to collect. Dermoscopic skin lesion imaging allows human experts and AI systems to observe morphological structures otherwise not discernable from regular clinical photographs. However, currently there are no large-scale publicly available multi-annotator skin lesion segmentation (SLS) datasets with annotator-labels for dermoscopic skin lesion imaging. We introduce ISIC MultiAnnot++, a large public multi-annotator skin lesion segmentation dataset for images from the ISIC Archive. The final dataset contains 17,684 segmentation masks spanning 14,967 dermoscopic images, where 2,394 dermoscopic images have 2-5 segmentations per image, making it the largest publicly available SLS dataset. Further, metadata about the segmentation, including the annotators' skill level and segmentation tool, is included, enabling research on topics such as annotator-specific preference modeling for segmentation and annotator metadata analysis. We provide an analysis on the characteristics of this dataset, curated data partitions, and consensus segmentation masks.", 'score': 1, 'issue_id': 429, 'pub_date': '2026-12-25', 'pub_date_card': {'ru': '25 декабря', 'en': 'December 25', 'zh': '12月25日'}, 'hash': '28ce6c37f8386365', 'authors': ['Kumar Abhishek', 'Jeremy Kawahara', 'Ghassan Hamarneh'], 'affiliations': ['AIP Labs, Hungary', 'Medical Image Analysis Lab, School of Computing Science, Simon Fraser University, Canada'], 'pdf_title_img': 'assets/pdf/title_img/2512.21472.jpg', 'data': {'categories': ['#open_source'], 'emoji': '🔬', 'ru': {'title': 'Множественная разметка для единого консенсуса: большой датасет дермоскопических изображений', 'desc': 'Представлена большая публичная базу данных ISIC MultiAnnot++ для сегментации кожных образований, содержащая 17,684 маски сегментации для дермоскопических изображений с несколькими аннотаторами. Датасет включает богатую метаинформацию об аннотаторах, включая их уровень квалификации и используемые инструменты сегментации, что позволяет исследовать предпочтения отдельных аннотаторов и моделировать консенсус. Это первая крупномасштабная публичная коллекция для мультианнотаторной сегментации кожных повреждений в дермоскопических изображениях, решающая проблему нехватки размеченных медицинских данных. Работа обеспечивает анализ характеристик датасета и предоставляет масштабный ресурс для развития моделей, учитывающих межэксперт-ную вариативность при сегментации медицинских изображений.'}, 'en': {'title': 'Unlocking Skin Lesion Insights with MultiAnnot++', 'desc'
