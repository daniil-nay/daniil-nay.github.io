конкурировать с облачными решениями (GPT-4, Pixtral).'}, 'en': {'title': 'Enhancing Vision-Language Models with VERSE', 'desc': "VERSE is a new method designed to analyze and improve Vision-Language Models specifically for understanding visually-rich documents. It allows researchers to visualize the hidden representations of these models, making it easier to identify areas where the model struggles. By generating synthetic data for these challenging areas, VERSE enhances the model's performance without losing its ability to generalize to new data. The methodology has been validated using the MERIT Dataset, showing significant improvements in model accuracy compared to existing solutions."}, 'zh': {'title': 'VERSE：提升视觉语言模型的利器', 'desc': 'VERSE是一种用于分析和改进视觉语言模型的方法，特别是在视觉丰富的文档理解中。它通过可视化潜在表示，帮助评估模型的可行性，并识别出问题区域。该方法还指导生成合成数据，以提高在这些错误易发集群中的性能。通过在合成的MERIT数据集上训练并在真实的MERIT Secret数据集上评估，结果表明VERSE能够揭示与错误集群相关的视觉特征，并显著提升F1性能。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.01887', 'title': 'Safety at One Shot: Patching Fine-Tuned LLMs with A Single Instance', 'url': 'https://huggingface.co/papers/2601.01887', 'abstract': 'Safety alignment of large language models can be fully recovered with a single safety example, maintaining utility and achieving convergence in few epochs through identified low-rank gradient structures.  \t\t\t\t\tAI-generated summary \t\t\t\t Fine-tuning safety-aligned large language models (LLMs) can substantially compromise their safety. Previous approaches require many safety samples or calibration sets, which not only incur significant computational overhead during realignment but also lead to noticeable degradation in model utility. Contrary to this belief, we show that safety alignment can be fully recovered with only a single safety example, without sacrificing utility and at minimal cost. Remarkably, this recovery is effective regardless of the number of harmful examples used in fine-tuning or the size of the underlying model, and convergence is achieved within just a few epochs. Furthermore, we uncover the low-rank structure of the safety gradient, which explains why such efficient correction is possible. We validate our findings across five safety-aligned LLMs and multiple datasets, demonstrating the generality of our approach.', 'score': 0, 'issue_id': 492, 'pub_date': '2026-01-05', 'pub_date_card': {'ru': '5 января', 'en': 'January 5', 'zh': '1月5日'}, 'hash': '3f5eb740e47ff8ee', 'authors': ['Jiawen Zhang', 'Lipeng He', 'Kejia Chen', 'Jian Lou', 'Jian Liu', 'Xiaohu Yang', 'Ruoxi Jia'], 'affiliations': ['Sun Yat-sen University', 'University of Waterloo', 'Virginia Tech', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2601.01887.jpg', 'data': {'categories': ['#alignment', '#training', '#optimization', '#rlhf'], 'emoji': '🛡️', 'ru': {'title': 'Одного примера достаточно: восстановление безопасности LLM через низкоранговую структуру градиентов', 'desc': 'Исследование показывает, что безопасность выровненных больших языковых моделей (LLM) может быть полностью восстановлена с использованием всего одного примера безопасности при дополнительном обучении. Авторы открыли низкоранговую структуру в градиентах безопасности, которая объясняет возможность такой эффективной коррекции. Подход достигает сходимости за несколько эпох без значительного ущерба для полезности модели и при минимальных вычислительных затратах. Результаты валидированы на пяти различных LLM и нескольких датасетах, что подтверждает универсальность метода.'}, 'en': {'title': 'One Example is Enough: Efficient Safety Alignment for LLMs', 'desc': 'This paper presents a novel approach to safety alignment in large language models (LLMs), showing that a single safety example can effectively restore safety without compromising model performance. Traditional methods often require numerous safety samples, leading to increased computational costs and reduced utility. The authors reveal that the low-rank structure of the safety gradient allows for rapid convergence in just a few training epochs. Their findings are validated across multiple LLMs and datasets, highlighting the efficiency and general applicability of their method.'}, 'zh': {'title': '单个示例即可恢复安全对齐', 'desc': '本论文探讨了大型语言模型的安全对齐问题。研究表明，仅用一个安全示例就能完全恢复模型的安全性，而不会影响模型的实用性。通过识别低秩梯度结构，模型在少数训练周期内即可实现收敛。我们的实验结果在多个安全对齐的语言模型和数据集上验证了这一方法的普遍适用性。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.06943', 'title': 'Watching, Reasoning, and Searching: A Video Deep Research Benchmark on Open Web for Agentic Video Reasoning', 'url': 'https://huggingface.co/papers/2601.06943', 'abstract': "VideoDR benchmark enables video question answering by combining cross-frame visual extraction, web retrieval, and multi-hop reasoning in open-domain settings.  \t\t\t\t\tAI-generated summary \t\t\t\t In real-world video question answering scenarios, videos often provide only localized visual cues, while verifiable answers are distributed across the open web; models therefore need to jointly perform cross-frame clue extraction, iterative retrieval, and multi-hop reasoning-based verification. To bridge this gap, we construct the first video deep research benchmark, VideoDR. VideoDR centers on video-conditioned open-domain video question answering, requiring cross-frame visual anchor extraction, interactive web retrieval, and multi-hop reasoning over joint video-web evidence; through rigorous human annotation and quality control, we obtain high-quality video deep research samples spanning six semantic domains. We evaluate multiple closed-source and open-source multimodal large language models under both the Workflow and Agentic paradigms, and the results show that Agentic is not consistently superior to Workflow: its gains depend on a model's ability to maintain the initial video anchors over long retrieval chains. Further analysis indicates that goal drift and long-horizon consistency are the core bottlenecks. In sum, VideoDR provides a systematic benchmark for studying video agents in open-web settings and reveals the key challenges for next-generation video deep research agents.", 'score': 118, 'issue_id': 545, 'pub_date': '2026-01-11', 'pub_date_card': {'ru': '11 января', 'en': 'January 11', 'zh': '1月11日'}, 'hash': 'fb635ed8afe67290', 'authors': ['Chengwen Liu', 'Xiaomin Yu', 'Zhuoyue Chang', 'Zhe Huang', 'Shuo Zhang', 'Heng Lian', 'Kunyi Wang', 'Rui Xu', 'Sen Hu', 'Jianheng Hou', 'Hao Peng', 'Chengwei Qin', 'Xiaobin Hu', 'Hong Peng', 'Ronghao Chen', 'Huacan Wang'], 'affiliations': ['FDU', 'HKUST', 'HKUST(GZ)', 'LZU', 'NUS', 'PKU', 'QuantaAlpha', 'UBC', 'UCAS', 'USC'], 'pdf_title_img': 'assets/pdf/title_img/2601.06943.jpg', 'data': {'categories': ['#rag', '#video', '#agents', '#benchmark', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'От видео к знаниям: многошаговый поиск ответов через веб', 'desc': 'Статья представляет новый бенчмарк VideoDR для ответов на вопросы о видео в открытом веб-пространстве. Модели должны выполнять три ключевые задачи: извлекать визуальные подсказки с нескольких кадров видео, итеративно искать информацию в интернете и проводить многошаговое логическое рассуждение для проверки ответов. Исследование показало, что агентные подходы не всегда превосходят рабочие потоки, так как зависят от способности модели сохранять исходные визуальные якоря на протяжении длинных цепочек поиска. Основные трудности — это дрейф цели и поддержание консистентности на длинных горизонтах поиска.'}, 'en': {'title': 'VideoDR: Bridging Video Understanding and Web Knowledge for Q&A', 'desc': 'The VideoDR benchmark is designed to enhance video question answering by integrating visual extraction from multiple frames, web-based information retrieval, and complex reasoning processes. It addresses the challenge of localized visual cues in videos and the need for answers that may be found online. By creating a comprehensive dataset with high-quality annotations across various domains, VideoDR facilitates the evaluation of multimodal large language models. The findings highlight the importance of maintaining video context during retrieval and identify key challenges such as goal drift and consistency in long-term reasoning.'}, 'zh': {'title': 'VideoDR：视频问答的新基准', 'desc': 'VideoDR基准测试通过结合跨帧视觉提取、网络检索和多跳推理，支持开放域的视频问答。该研究指出，视频中的视觉线索通常是局部的，而可验证的答案则分散在网络上，因此模型需要同时进行线索提取、迭代检索和基于多跳推理的验证。VideoDR是首个专注于视频条件下开放域问答的深度研究基准，涵盖六个语义领域，并通过严格的人类标注和质量控制获得高质量样本。研究表明，Agentic和Workflow两种范式的表现差异依赖于模型在长检索链中保持初始视频锚点的能力，目标漂移和长时间一致性是主要瓶颈。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.06521', 'title': 'BabyVision: Visual Reasoning Beyond Language', 'url': 'https://huggingface.co/papers/2601.06521', 'abstract': 'Current multimodal large language models exhibit significant gaps in fundamental visual understanding compared to human children, as demonstrated by the BabyVision benchmark.  \t\t\t\t\tAI-generated summary \t\t\t\t While humans develop core visual skills long before acquiring language, contemporary Multimodal LLMs (MLLMs) still rely heavily on linguistic priors to compensate for their fragile visual understanding. We uncovered a crucial fact: state-of-the-art MLLMs consistently fail on basic visual tasks that humans, even 3-year-olds, can solve effortlessly. To systematically investigate this gap, we introduce BabyVision, a benchmark designed to assess core visual abilities independent of linguistic knowledge for MLLMs. BabyVision spans a wide range of tasks, with 388 items divided into 22 subclasses across four key categories. Empirical results and human evaluation reveal that leading MLLMs perform significantly below human baselines. Gemini3-Pro-Preview scores 49.7, lagging behind 6-year-old humans and falling well behind the average adult score of 94.1. These results show despite excelling in knowledge-heavy evaluations, current MLLMs still lack fundamental visual primitives. Progress in BabyVision represents a step toward human-level visual perception and reasoning capabilities. We also explore solving visual reasoning with generation models by proposing BabyVision-Gen and automatic evaluation toolkit. Our code and benchmark data are released at https://github.com/UniPat-AI/BabyVision for reproduction.', 'score': 100, 'issue_id': 545, 'pub_date': '2026-01-10', 'pub_date_card': {'ru': '10 января', 'en': 'January 10', 'zh': '1月10日'}, 'hash': '8c12de19866dd47c', 'authors': ['Liang Chen', 'Weichu Xie', 'Yiyan Liang', 'Hongfeng He', 'Hans Zhao', 'Zhibo Yang', 'Zhiqi Huang', 'Haoning Wu', 'Haoyu Lu', 'Y. charles', 'Yiping Bao', 'Yuantao Fan', 'Guopeng Li', 'Haiyang Shen', 'Xuanzhong Chen', 'Wendong Xu', 'Shuzheng Si', 'Zefan Cai', 'Wenhao Chai', 'Ziqi Huang', 'Fangfu Liu', 'Tianyu Liu', 'Baobao Chang', 'Xiaobo Hu', 'Kaiyuan Chen', 'Yixin Ren', 'Yang Liu', 'Yuan Gong', 'Kuan Li'], 'affiliations': ['Alibaba Group', 'MoonShot AI', 'Nanyang Technological University', 'Peking University', 'Princeton University', 'StepFun', 'Tsinghua University', 'UniPat AI', 'University of Wisconsin-Madison', 'xbench'], 'pdf_title_img': 'assets/pdf/title_img/2601.06521.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#cv', '#dataset'], 'emoji': '👶', 'ru': {'title': 'Дети видят лучше: почему языковые модели слепы к базовому зрению', 'desc': 'В работе представлен бенчмарк BabyVision для оценки базовых визуальных способностей мультимодальных больших языковых моделей, независимо от лингвистических знаний. Исследование показывает, что современные МЛЛМ значительно отстают от человеческих детей в фундаментальных задачах зрительного восприятия, несмотря на превосходные результаты в знаниевых оценках. Бенчмарк содержит 388 примеров, разделённых на 22 подкласса в четырёх основных категориях, и выявляет существенный разрыв между производительностью моделей и человеческими базовыми показателями. Авторы также предлагают методику автоматической оценки для генеративных моделей и выпускают код и данные в открытый доступ.'}, 'en': {'title': 'Bridging the Visual Understanding Gap in AI', 'desc': 'This paper highlights the limitations of current multimodal large language models (MLLMs) in visual understanding compared to human children. Using the BabyVision benchmark, the authors demonstrate that MLLMs struggle with basic visual tasks that even young children can perform easily. The study reveals that despite their proficiency in language-based tasks, MLLMs like Gemini3-Pro-Preview score significantly lower than human baselines in visual tasks. The introduction of BabyVision aims to bridge this gap by providing a systematic way to evaluate visual abilities independent of linguistic knowledge, paving the way for improved visual perception in AI.'}, 'zh': {'title': '填补视觉理解的差距', 'desc': '当前的多模态大型语言模型在基本视觉理解方面与人类儿童存在显著差距，这一点通过BabyVision基准得到了验证。尽管人类在获得语言能力之前就发展了核心视觉技能，但现代多模态LLM仍然依赖语言先验来弥补其脆弱的视觉理解。我们发现，最先进的多模态LLM在基本视觉任务上的表现远低于人类，即使是3岁的儿童也能轻松解决这些任务。BabyVision基准的进展标志着朝着人类水平的视觉感知和推理能力迈出了重要一步。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05593', 'title': 'PaCoRe: Learning to Scale Test-Time Compute with Parallel Coordinated Reasoning', 'url': 'https://huggingface.co/papers/2601.05593', 'abstract': "Parallel Coordinated Reasoning enables large-scale test-time compute scaling beyond sequential reasoning limitations through parallel exploration and message-passing architecture.  \t\t\t\t\tAI-generated summary \t\t\t\t We introduce Parallel Coordinated Reasoning (PaCoRe), a training-and-inference framework designed to overcome a central limitation of contemporary language models: their inability to scale test-time compute (TTC) far beyond sequential reasoning under a fixed context window. PaCoRe departs from the traditional sequential paradigm by driving TTC through massive parallel exploration coordinated via a message-passing architecture in multiple rounds. Each round launches many parallel reasoning trajectories, compacts their findings into context-bounded messages, and synthesizes these messages to guide the next round and ultimately produce the final answer. Trained end-to-end with large-scale, outcome-based reinforcement learning, the model masters the synthesis abilities required by PaCoRe and scales to multi-million-token effective TTC without exceeding context limits. The approach yields strong improvements across diverse domains, and notably pushes reasoning beyond frontier systems in mathematics: an 8B model reaches 94.5% on HMMT 2025, surpassing GPT-5's 93.2% by scaling effective TTC to roughly two million tokens. We open-source model checkpoints, training data, and the full inference pipeline to accelerate follow-up work.", 'score': 55, 'issue_id': 544, 'pub_date': '2026-01-09', 'pub_date_card': {'ru': '9 января', 'en': 'January 9', 'zh': '1月9日'}, 'hash': '2beebb5ab57389a3', 'authors': ['Jingcheng Hu', 'Yinmin Zhang', 'Shijie Shang', 'Xiaobo Yang', 'Yue Peng', 'Zhewei Huang', 'Hebin Zhou', 'Xin Wu', 'Jie Cheng', 'Fanqi Wan', 'Xiangwen Kong', 'Chengyuan Yao', 'Kaiwen Yan', 'Ailin Huang', 'Hongyu Zhou', 'Qi Han', 'Zheng Ge', 'Daxin Jiang', 'Xiangyu Zhang', 'Heung-Yeung Shum'], 'affiliations': ['Peking University', 'StepFun', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2601.05593.jpg', 'data': {'categories': ['#training', '#long_context', '#open_source', '#benchmark', '#math', '#reasoning', '#rl', '#inference'], 'emoji': '🔀', 'ru': {'title': 'Параллельное координированное рассуждение для масштабирования вычислений при инференсе', 'desc': 'В работе представлен Parallel Coordinated Reasoning (PaCoRe) — фреймворк обучения и инференса, который преодолевает ограничение современных языковых моделей в масштабировании вычислений на этапе инференса. Вместо последовательного рассуждения модель использует параллельную архитектуру с передачей сообщений, запуская множество траекторий рассуждений одновременно и синтезируя их результаты в ограниченное контекстное окно. Модель обучается end-to-end с использованием масштабного обучения с подкреплением на основе итоговых результатов. Подход достигает сильных результатов, включая 94.5% на HMMT 2025 с моделью размером 8B, превышая GPT-5, благодаря масштабированию эффективных вычислительных ресурсов инференса до двух миллионов токенов.'}, 'en': {'title': 'Unlocking Parallel Reasoning for Enhanced AI Performance', 'desc': 'Parallel Coordinated Reasoning (PaCoRe) is a novel framework that enhances the capabilities of language models by allowing them to perform reasoning tasks in parallel rather than sequentially. This method utilizes a message-passing architecture to coordinate multiple reasoning trajectories, enabling the model to explore vast amounts of information simultaneously. By training with large-scale reinforcement learning, PaCoRe effectively manages to synthesize findings from these parallel explorations, significantly increasing the test-time compute (TTC) without being limited by context window constraints. The results demonstrate substantial improvements in reasoning tasks, particularly in mathematics, showcasing the potential of PaCoRe to exceed the performance of existing models like GPT-5.'}, 'zh': {'title': '并行协调推理：超越顺序推理的计算能力', 'desc': '本文介绍了一种名为并行协调推理（PaCoRe）的框架，旨在解决当前语言模型在测试时计算能力扩展方面的限制。PaCoRe通过消息传递架构实现大规模的并行探索，打破了传统的顺序推理模式。每一轮推理会启动多个并行轨迹，将结果压缩成消息，并合成这些消息以指导下一轮推理，最终得出答案。该方法经过大规模的基于结果的强化学习训练，能够在不超过上下文限制的情况下，扩展到数百万个有效的测试时间计算。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.06953', 'title': 'X-Coder: Advancing Competitive Programming with Fully Synthetic Tasks, Solutions, and Tests', 'url': 'https://huggingface.co/papers/2601.06953', 'abstract': 'Code LLMs trained on fully synthetic data using a feature-based synthesis pipeline achieve superior performance on competitive programming benchmarks while reducing dependence on real-world coding datasets.  \t\t\t\t\tAI-generated summary \t\t\t\t Competitive programming presents great challenges for Code LLMs due to its intensive reasoning demands and high logical complexity. However, current Code LLMs still rely heavily on real-world data, which limits their scalability. In this paper, we explore a fully synthetic approach: training Code LLMs with entirely generated tasks, solutions, and test cases, to empower code reasoning models without relying on real-world data. To support this, we leverage feature-based synthesis to propose a novel data synthesis pipeline called SynthSmith. SynthSmith shows strong potential in producing diverse and challenging tasks, along with verified solutions and tests, supporting both supervised fine-tuning and reinforcement learning. Based on the proposed synthetic SFT and RL datasets, we introduce the X-Coder model series, which achieves a notable pass rate of 62.9 avg@8 on LiveCodeBench v5 and 55.8 on v6, outperforming DeepCoder-14B-Preview and AReal-boba2-14B despite having only 7B parameters. In-depth analysis reveals that scaling laws hold on our synthetic dataset, and we explore which dimensions are more effective to scale. We further provide insights into code-centric reinforcement learning and highlight the key factors that shape performance through detailed ablations and analysis. Our findings demonstrate that scaling high-quality synthetic data and adopting staged training can greatly advance code reasoning, while mitigating reliance on real-world coding data.', 'score': 23, 'issue_id': 545, 'pub_date': '2026-01-11', 'pub_date_card': {'ru': '11 января', 'en': 'January 11', 'zh': '1月11日'}, 'hash': '1e20056f9d305da0', 'authors': ['Jie Wu', 'Haoling Li', 'Xin Zhang', 'Jiani Guo', 'Jane Luo', 'Steven Liu', 'Yangyu Huang', 'Ruihang Chu', 'Scarlett Li', 'Yujiu Yang'], 'affiliations': ['Microsoft', 'Tsinghua University', 'Wuhan University'], 'pdf_title_img': 'assets/pdf/title_img/2601.06953.jpg', 'data': {'categories': ['#rl', '#reasoning', '#optimization', '#dataset', '#training', '#synthetic', '#small_models', '#benchmark', '#plp', '#data'], 'emoji': '🤖', 'ru': {'title': 'Синтетические данные вместо реальных: как научить LLM писать код без открытых датасетов', 'desc': 'В этой работе авторы предлагают полностью синтетический подход к обучению Code LLM, используя конвейер синтеза на основе признаков под названием SynthSmith для генерации задач, решений и тестов без привлечения реальных данных из открытых источников. Модель X-Coder, обученная на синтетических наборах данных с использованием supervised fine-tuning и reinforcement learning, достигает впечатляющих результатов на бенчмарках конкурсного программирования (62.9% на LiveCodeBench v5), превосходя более крупные модели при параметрах всего 7B. Исследование демонстрирует, что законы масштабирования сохраняют свою применимость для высококачественных синтетических данных, и определяет наиболее эффективные измерения для масштабирования. Полученные результаты показывают, что комбинированный подход поэтапного обучения с синтетическими данными значительно улучшает способности моделей к логическому рассуждению в коде, одновременно снижая зависимость от реальных наборов данных программирования.'}, 'en': {'title': 'Empowering Code LLMs with Fully Synthetic Data', 'desc': 'This paper presents a novel approach to training Code LLMs (Language Models) using fully synthetic data, which helps improve their performance in competitive programming tasks. By employing a feature-based synthesis pipeline called SynthSmith, the authors generate diverse coding tasks, solutions, and test cases without depending on real-world datasets. The resulting X-Coder model series demonstrates impressive performance metrics, surpassing larger models while using fewer parameters. The study emphasizes the importance of high-quality synthetic data and staged training in enhancing code reasoning capabilities.'}, 'zh': {'title': '合成数据驱动的代码推理模型提升', 'desc': '本文探讨了一种完全合成的数据训练方法，用于提升代码大语言模型（Code LLMs）在竞争编程中的表现。通过使用特征基础合成技术，提出了名为SynthSmith的数据合成管道，能够生成多样化且具有挑战性的任务及其解决方案。研究表明，基于合成数据的模型在LiveCodeBench基准测试中表现优异，超越了现有的深度编码模型。我们的发现表明，利用高质量的合成数据和分阶段训练可以显著提高代码推理能力，同时减少对真实世界编码数据的依赖。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05110', 'title': 'GlimpRouter: Efficient Collaborative Inference by Glimpsing One Token of Thoughts', 'url': 'https://huggingface.co/papers/2601.05110', 'abstract': 'Large reasoning models\' inference latency can be reduced by routing reasoning steps to larger models based on the entropy of their first token, enabling efficient collaborative inference without additional training.  \t\t\t\t\tAI-generated summary \t\t\t\t Large Reasoning Models (LRMs) achieve remarkable performance by explicitly generating multi-step chains of thought, but this capability incurs substantial inference latency and computational cost. Collaborative inference offers a promising solution by selectively allocating work between lightweight and large models, yet a fundamental challenge remains: determining when a reasoning step requires the capacity of a large model or the efficiency of a small model. Existing routing strategies either rely on local token probabilities or post-hoc verification, introducing significant inference overhead. In this work, we propose a novel perspective on step-wise collaboration: the difficulty of a reasoning step can be inferred from its very first token. Inspired by the "Aha Moment" phenomenon in LRMs, we show that the entropy of the initial token serves as a strong predictor of step difficulty. Building on this insight, we introduce GlimpRouter, a training-free step-wise collaboration framework. GlimpRouter employs a lightweight model to generate only the first token of each reasoning step and routes the step to a larger model only when the initial token entropy exceeds a threshold. Experiments on multiple benchmarks demonstrate that our approach significantly reduces inference latency while preserving accuracy. For instance, GlimpRouter attains a substantial 10.7% improvement in accuracy while reducing inference latency by 25.9% compared to a standalone large model on AIME25. These results suggest a simple yet effective mechanism for reasoning: allocating computation based on a glimpse of thought rather than full-step evaluation.', 'score': 22, 'issue_id': 547, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': 'd61eeb39c38e7630', 'authors': ['Wenhao Zeng', 'Xuteng Zhang', 'Yuling Shi', 'Chao Hu', 'Yuting Chen', 'Beijun Shen', 'Xiaodong Gu'], 'affiliations': ['Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2601.05110.jpg', 'data': {'categories': ['#architecture', '#training', '#optimization', '#reasoning', '#inference'], 'emoji': '⚡', 'ru': {'title': 'Маршрутизация шагов рассуждения по первому токену для эффективного коллаборативного инференса', 'desc': 'В работе предложен метод GlimpRouter для снижения задержки при инференсе больших моделей рассуждения путём маршрутизации шагов между лёгкой и большой моделью. Система использует энтропию первого токена как предиктор сложности шага рассуждения, основываясь на феномене «момента озарения» в LRM. Маршрутизация работает без дополнительного обучения: лёгкая модель генерирует только первый токен, а если его энтропия превышает порог, шаг передаётся большой модели. Экспериментальные результаты показывают, что подход снижает задержку инференса на 25.9% при одновременном улучшении точности на 10.7% по сравнению с использованием только большой модели.'}, 'en': {'title': 'Efficient Inference with GlimpRouter: Smart Routing for Reasoning Steps', 'desc': "This paper introduces GlimpRouter, a framework designed to reduce the inference latency of large reasoning models (LRMs) by intelligently routing reasoning steps based on the entropy of their first token. The authors argue that the initial token's entropy can predict the difficulty of a reasoning step, allowing for efficient collaboration between lightweight and large models without the need for additional training. By generating only the first token with a lightweight model and routing to a larger model when necessary, GlimpRouter achieves significant reductions in latency while maintaining accuracy. Experimental results show a 10.7% improvement in accuracy and a 25.9% reduction in inference time compared to using a standalone large model."}, 'zh': {'title': '基于初始标记熵的高效推理协作', 'desc': '大型推理模型（LRMs）在生成多步骤思维链方面表现出色，但这会导致推理延迟和计算成本高。本文提出了一种新方法，通过分析推理步骤的第一个标记的熵来判断该步骤的难度，从而实现轻量模型与大型模型的协作推理。我们引入了GlimpRouter框架，该框架在不需要额外训练的情况下，仅在初始标记熵超过阈值时将步骤路由到大型模型。实验结果表明，该方法在保持准确性的同时显著减少了推理延迟。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.07832', 'title': 'MHLA: Restoring Expressivity of Linear Attention via Token-Level Multi-Head', 'url': 'https://huggingface.co/papers/2601.07832', 'abstract': "Multi-Head Linear Attention addresses the performance degradation in linear attention by preserving representational diversity through head-wise token dimension computation, maintaining linear complexity while recovering softmax attention's expressive power across multiple domains.  \t\t\t\t\tAI-generated summary \t\t\t\t While the Transformer architecture dominates many fields, its quadratic self-attention complexity hinders its use in large-scale applications. Linear attention offers an efficient alternative, but its direct application often degrades performance, with existing fixes typically re-introducing computational overhead through extra modules (e.g., depthwise separable convolution) that defeat the original purpose. In this work, we identify a key failure mode in these methods: global context collapse, where the model loses representational diversity. To address this, we propose Multi-Head Linear Attention (MHLA), which preserves this diversity by computing attention within divided heads along the token dimension. We prove that MHLA maintains linear complexity while recovering much of the expressive power of softmax attention, and verify its effectiveness across multiple domains, achieving a 3.6\\% improvement on ImageNet classification, a 6.3\\% gain on NLP, a 12.6\\% improvement on image generation, and a 41\\% enhancement on video generation under the same time complexity.", 'score': 20, 'issue_id': 549, 'pub_date': '2026-01-12', 'pub_date_card': {'ru': '12 января', 'en': 'January 12', 'zh': '1月12日'}, 'hash': '86d90769af77f62e', 'authors': ['Kewei Zhang', 'Ye Huang', 'Yufan Deng', 'Jincheng Yu', 'Junsong Chen', 'Huan Ling', 'Enze Xie', 'Daquan Zhou'], 'affiliations': ['NVIDIA', 'Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2601.07832.jpg', 'data': {'categories': ['#architecture', '#training', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Линейное внимание без потери выразительности: сохранение разнообразия через многоголовую архитектуру', 'desc': 'Статья предлагает Multi-Head Linear Attention (MHLA) — метод, который решает проблему деградации производительности линейного внимания в трансформерах. Основная идея заключается в сохранении разнообразия представлений путём вычисления внимания в отдельных головах по измерению токенов, что предотвращает глобальный коллапс контекста. Авторы доказывают, что MHLA поддерживает линейную сложность O(n) одновременно с восстановлением выразительности механизма softmax attention. Метод показывает значительные улучшения на различных задачах: классификация изображений (+3.6%), обработка текста (+6.3%), генерация изображений (+12.6%) и видео (+41%).'}, 'en': {'title': 'Enhancing Linear Attention with Multi-Head Diversity', 'desc': 'Multi-Head Linear Attention (MHLA) improves linear attention mechanisms by maintaining representational diversity through head-wise computations. This approach addresses the issue of global context collapse, which can lead to performance degradation in traditional linear attention models. By dividing attention calculations across multiple heads, MHLA retains the efficiency of linear complexity while enhancing the expressive capabilities similar to softmax attention. The effectiveness of MHLA is demonstrated through significant performance gains across various tasks, including image classification, natural language processing, image generation, and video generation.'}, 'zh': {'title': '多头线性注意力：保持多样性与高效性并存', 'desc': '本文提出了一种名为多头线性注意力（MHLA）的方法，旨在解决线性注意力在性能上的下降问题。通过在头部维度上进行分割计算，MHLA能够保持表示的多样性，同时保持线性复杂度。我们证明了MHLA在恢复softmax注意力的表达能力方面的有效性，并在多个领域中验证了其效果。实验结果显示，在ImageNet分类、自然语言处理、图像生成和视频生成等任务中，MHLA均取得了显著的性能提升。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.07226', 'title': 'Lost in the Noise: How Reasoning Models Fail with Contextual Distractors', 'url': 'https://huggingface.co/papers/2601.07226', 'abstract': 'NoisyBench benchmark reveals significant performance degradation in state-of-the-art models when exposed to noisy contextual information, with agentic workflows amplifying errors and attention mechanisms disproportionately focusing on distractor tokens.  \t\t\t\t\tAI-generated summary \t\t\t\t Recent advances in reasoning models and agentic AI systems have led to an increased reliance on diverse external information. However, this shift introduces input contexts that are inherently noisy, a reality that current sanitized benchmarks fail to capture. We introduce NoisyBench, a comprehensive benchmark that systematically evaluates model robustness across 11 datasets in RAG, reasoning, alignment, and tool-use tasks against diverse noise types, including random documents, irrelevant chat histories, and hard negative distractors. Our evaluation reveals a catastrophic performance drop of up to 80% in state-of-the-art models when faced with contextual distractors. Crucially, we find that agentic workflows often amplify these errors by over-trusting noisy tool outputs, and distractors can trigger emergent misalignment even without adversarial intent. We find that prompting, context engineering, SFT, and outcome-reward only RL fail to ensure robustness; in contrast, our proposed Rationale-Aware Reward (RARE) significantly strengthens resilience by incentivizing the identification of helpful information within noise. Finally, we uncover an inverse scaling trend where increased test-time computation leads to worse performance in noisy settings and demonstrate via attention visualization that models disproportionately focus on distractor tokens, providing vital insights for building the next generation of robust, reasoning-capable agents.', 'score': 20, 'issue_id': 545, 'pub_date': '2026-01-12', 'pub_date_card': {'ru': '12 января', 'en': 'January 12', 'zh': '1月12日'}, 'hash': 'da6da812d41b17f9', 'authors': ['Seongyun Lee', 'Yongrae Jo', 'Minju Seo', 'Moontae Lee', 'Minjoon Seo'], 'affiliations': ['KAIST AI', 'LG AI Research', 'University of Illinois Chicago'], 'pdf_title_img': 'assets/pdf/title_img/2601.07226.jpg', 'data': {'categories': ['#reasoning', '#rlhf', '#security', '#rag', '#alignment', '#agents', '#benchmark'], 'emoji': '🔧', 'ru': {'title': 'Как научить AI-модели игнорировать шум в данных', 'desc': 'В статье представлен бенчмарк NoisyBench для оценки устойчивости современных моделей к шумным входным данным в задачах извлечения информации, рассуждений и использования инструментов. Авторы обнаружили катастрофическое падение производительности моделей на 80% при наличии отвлекающей информации в контексте, при этом агентные рабочие процессы усиливают ошибки из-за чрезмерного доверия к зашумленным выходам инструментов. Стандартные методы обучения (fine-tuning, prompt engineering, RL) не обеспечивают надежность, однако предложенный подход Rationale-Aware Reward значительно улучшает устойчивость моделей путем поощрения идентификации полезной информации среди шума. Анализ механизмов внимания показал, что модели непропорционально сосредотачиваются на отвлекающих токенах, что указывает на необходимость разработки более надежных рассуждающих агентов.'}, 'en': {'title': 'NoisyBench: Evaluating Robustness in a Noisy World', 'desc': 'The paper introduces NoisyBench, a benchmark designed to evaluate the robustness of machine learning models against noisy contextual information. It highlights that state-of-the-art models experience a drastic performance drop of up to 80% when exposed to irrelevant or distracting inputs. The research shows that agentic workflows can exacerbate these issues by overly relying on noisy outputs, leading to misalignment in model behavior. To address these challenges, the authors propose a new approach called Rationale-Aware Reward (RARE), which encourages models to focus on useful information amidst noise, improving their resilience in real-world applications.'}, 'zh': {'title': '应对噪声挑战，提升模型鲁棒性！', 'desc': '本论文介绍了NoisyBench基准测试，旨在评估模型在面对噪声上下文信息时的鲁棒性。研究发现，当前最先进的模型在处理噪声干扰时性能下降可达80%。此外，代理工作流程会放大这些错误，因为模型过于依赖噪声工具的输出。我们提出的Rationale-Aware Reward (RARE) 方法能够显著提高模型在噪声环境中的抗干扰能力。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.07779', 'title': 'OS-Symphony: A Holistic Framework for Robust and Generalist Computer-Using Agent', 'url': 'https://huggingface.co/papers/2601.07779', 'abstract': 'OS-Symphony presents a comprehensive framework for computer-using agents that enhances robustness in long-horizon tasks through reflection-memory and multimodal search capabilities.  \t\t\t\t\tAI-generated summary \t\t\t\t While Vision-Language Models (VLMs) have significantly advanced Computer-Using Agents (CUAs), current frameworks struggle with robustness in long-horizon workflows and generalization in novel domains. These limitations stem from a lack of granular control over historical visual context curation and the absence of visual-aware tutorial retrieval. To bridge these gaps, we introduce OS-Symphony, a holistic framework that comprises an Orchestrator coordinating two key innovations for robust automation: (1) a Reflection-Memory Agent that utilizes milestone-driven long-term memory to enable trajectory-level self-correction, effectively mitigating visual context loss in long-horizon tasks; (2) Versatile Tool Agents featuring a Multimodal Searcher that adopts a SeeAct paradigm to navigate a browser-based sandbox to synthesize live, visually aligned tutorials, thereby resolving fidelity issues in unseen scenarios. Experimental results demonstrate that OS-Symphony delivers substantial performance gains across varying model scales, establishing new state-of-the-art results on three online benchmarks, notably achieving 65.84% on OSWorld.', 'score': 19, 'issue_id': 549, 'pub_date': '2026-01-12', 'pub_date_card': {'ru': '12 января', 'en': 'January 12', 'zh': '1月12日'}, 'hash': '338335be0ca27562', 'authors': ['Bowen Yang', 'Kaiming Jin', 'Zhenyu Wu', 'Zhaoyang Liu', 'Qiushi Sun', 'Zehao Li', 'JingJing Xie', 'Zhoumianze Liu', 'Fangzhi Xu', 'Kanzhi Cheng', 'Qingyun Li', 'Yian Wang', 'Yu Qiao', 'Zun Wang', 'Zichen Ding'], 'affiliations': ['CUHK MMLab', 'Harbin Institute of Technology', 'Nanjing University', 'National University of Singapore', 'Shanghai AI Laboratory', 'The Hong Kong University of Science and Technology', 'The University of Hong Kong', 'University of Science and Technology of China', 'Xian Jiaotong University'], 'pdf_title_img': 'assets/pdf/title_img/2601.07779.jpg', 'data': {'categories': ['#cv', '#benchmark', '#agents', '#multimodal', '#long_context', '#reasoning'], 'emoji': '🎼', 'ru': {'title': 'Оркестровка памяти и поиска для надёжной автоматизации взаимодействия с компьютером', 'desc': 'OS-Symphony — это комплексный фреймворк для агентов, работающих с компьютером, которые используют видение и языковые модели. Фреймворк решает проблему хрупкости при выполнении долгих последовательностей задач благодаря двум ключевым компонентам: агенту с рефлексией и памятью, который использует контрольные точки для самокоррекции траекторий, и инструментам поиска, которые генерируют визуально согласованные туториалы в реальном времени. Предложенный подход эффективно снижает потери визуального контекста и повышает обобщаемость на новые домены. Экспериментальные результаты показывают значительное улучшение производительности на бенчмарках, достигая 65.84% на OSWorld.'}, 'en': {'title': 'Enhancing Agent Robustness with OS-Symphony', 'desc': 'OS-Symphony is a new framework designed to improve the performance of computer-using agents in complex, long-term tasks. It introduces a Reflection-Memory Agent that helps these agents remember important information over time, allowing them to correct mistakes and maintain context. Additionally, it features Versatile Tool Agents that use a multimodal search approach to find and utilize relevant tutorials in real-time, enhancing their ability to adapt to new situations. The framework has shown significant improvements in performance on various benchmarks, setting new records in the field.'}, 'zh': {'title': 'OS-Symphony：提升长时间任务鲁棒性的全新框架', 'desc': 'OS-Symphony是一个全面的框架，旨在增强计算机使用代理在长时间任务中的鲁棒性。它通过反思记忆和多模态搜索能力来解决当前框架在新领域中的泛化问题。该框架包括一个协调器，结合了反思记忆代理和多功能工具代理，以实现更强的自动化。实验结果表明，OS-Symphony在多个在线基准测试中取得了显著的性能提升，尤其是在OSWorld上达到了65.84%的新高。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.07351', 'title': 'Beyond Hard Masks: Progressive Token Evolution for Diffusion Language Models', 'url': 'https://huggingface.co/papers/2601.07351', 'abstract': 'EvoToken-DLM introduces a diffusion-based language modeling approach that uses soft token distributions and continuous trajectory supervision to enable revisable decoding and outperforms existing baselines.  \t\t\t\t\tAI-generated summary \t\t\t\t Diffusion Language Models (DLMs) offer a promising alternative for language modeling by enabling parallel decoding through iterative refinement. However, most DLMs rely on hard binary masking and discrete token assignments, which hinder the revision of early decisions and underutilize intermediate probabilistic representations. In this paper, we propose EvoToken-DLM, a novel diffusion-based language modeling approach that replaces hard binary masks with evolving soft token distributions. EvoToken-DLM enables a progressive transition from masked states to discrete outputs, supporting revisable decoding. To effectively support this evolution, we introduce continuous trajectory supervision, which aligns training objectives with iterative probabilistic updates. Extensive experiments across multiple benchmarks show that EvoToken-DLM consistently achieves superior performance, outperforming strong diffusion-based and masked DLM baselines. Project webpage: https://aim-uofa.github.io/EvoTokenDLM.', 'score': 16, 'issue_id': 550, 'pub_date': '2026-01-12', 'pub_date_card': {'ru': '12 января', 'en': 'January 12', 'zh': '1月12日'}, 'hash': '334992e5d9083611', 'authors': ['Linhao Zhong', 'Linyu Wu', 'Bozhen Fang', 'Tianjian Feng', 'Chenchen Jing', 'Wen Wang', 'Jiaheng Zhang', 'Hao Chen', 'Chunhua Shen'], 'affiliations': ['National University of Singapore', 'Zhejiang University', 'Zhejiang University of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2601.07351.jpg', 'data': {'categories': ['#diffusion'], 'emoji': '🌊', 'ru': {'title': 'Мягкие токены вместо жёстких масок: путь к гибкому пересмотру решений в языковых моделях', 'desc': 'EvoToken-DLM представляет новый подход к языковому моделированию на основе диффузионных моделей, который использует мягкие распределения токенов вместо жёстких бинарных масок. Это позволяет модели пересматривать свои решения на протяжении всего процесса декодирования, а не фиксировать выбор с самого начала. Авторы вводят непрерывный контроль траектории, который выравнивает цели обучения с итеративными вероятностными обновлениями во время генерации текста. Экспериментальные результаты показывают, что EvoToken-DLM превосходит существующие диффузионные и маскированные модели на нескольких бенчмарках.'}, 'en': {'title': 'Revisable Decoding with EvoToken-DLM: A New Era in Language Modeling', 'desc': 'EvoToken-DLM is a new approach to language modeling that uses diffusion techniques to improve how models generate text. Instead of using hard decisions for token selection, it employs soft token distributions, allowing for more flexible and revisable decoding. This method incorporates continuous trajectory supervision, which helps the model learn better by aligning its training with the gradual updates during text generation. As a result, EvoToken-DLM shows better performance compared to existing models, making it a significant advancement in the field of language modeling.'}, 'zh': {'title': 'EvoToken-DLM：可修订解码的新方法', 'desc': 'EvoToken-DLM是一种基于扩散的语言建模方法，采用软令牌分布和连续轨迹监督，支持可修订解码。与传统的硬二进制掩码不同，EvoToken-DLM使用不断演变的软令牌分布，使得从掩码状态到离散输出的过渡更加平滑。通过引入连续轨迹监督，该方法将训练目标与迭代概率更新对齐，从而提高了模型的灵活性和性能。实验结果表明，EvoToken-DLM在多个基准测试中表现优异，超越了现有的扩散基础和掩码DLM基线。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05107', 'title': 'Controllable Memory Usage: Balancing Anchoring and Innovation in Long-Term Human-Agent Interaction', 'url': 'https://huggingface.co/papers/2601.05107', 'abstract': "A framework is presented that enables dynamic regulation of memory reliance in LLM-based agents, allowing users to control the balance between innovation and historical fidelity in long-term interactions.  \t\t\t\t\tAI-generated summary \t\t\t\t As LLM-based agents are increasingly used in long-term interactions, cumulative memory is critical for enabling personalization and maintaining stylistic consistency. However, most existing systems adopt an ``all-or-nothing'' approach to memory usage: incorporating all relevant past information can lead to Memory Anchoring, where the agent is trapped by past interactions, while excluding memory entirely results in under-utilization and the loss of important interaction history. We show that an agent's reliance on memory can be modeled as an explicit and user-controllable dimension. We first introduce a behavioral metric of memory dependence to quantify the influence of past interactions on current outputs. We then propose Steerable Memory Agent, SteeM, a framework that allows users to dynamically regulate memory reliance, ranging from a fresh-start mode that promotes innovation to a high-fidelity mode that closely follows interaction history. Experiments across different scenarios demonstrate that our approach consistently outperforms conventional prompting and rigid memory masking strategies, yielding a more nuanced and effective control for personalized human-agent collaboration.", 'score': 14, 'issue_id': 548, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': '12c130572293a58f', 'authors': ['Muzhao Tian', 'Zisu Huang', 'Xiaohua Wang', 'Jingwen Xu', 'Zhengkang Guo', 'Qi Qian', 'Yuanzhe Shen', 'Kaitao Song', 'Jiakang Yuan', 'Changze Lv', 'Xiaoqing Zheng'], 'affiliations': ['College of Computer Science and Artificial Intelligence, Fudan University', 'Shanghai Key Laboratory of Intelligent Information Processing'], 'pdf_title_img': 'assets/pdf/title_img/2601.05107.jpg', 'data': {'categories': [], 'emoji': '🎚️', 'ru': {'title': 'Управляемая память: баланс между инновацией и согласованностью в диалоговых агентах', 'desc': 'В работе представлена система SteeM для динамического управления использованием памяти в LLM-агентах, которая позволяет пользователям контролировать баланс между инновационностью и верностью истории взаимодействия. Авторы выявили проблему "Memory Anchoring", когда агент слишком сильно привязывается к прошлым взаимодействиям, и предложили модель памяти как явного управляемого параметра. Они разработали метрику для измерения зависимости от памяти и создали фреймворк, позволяющий пользователям плавно регулировать степень опоры агента на историю - от режима инноваций до режима высокой точности. Экспериментальные результаты показывают, что предложенный подход превосходит традиционные методы промптинга и жёсткого маскирования памяти.'}, 'en': {'title': 'Dynamic Memory Control for Personalized AI Interactions', 'desc': "This paper introduces a new framework called SteeM that allows users to control how much memory an LLM-based agent uses during interactions. It addresses the problem of balancing innovation and historical accuracy, which is crucial for personalized experiences. The authors present a way to measure how much past interactions influence the agent's current responses, creating a flexible memory system. Experiments show that SteeM outperforms traditional methods by providing better control over memory usage, enhancing collaboration between humans and agents."}, 'zh': {'title': '动态调节记忆，提升人机协作效果', 'desc': '本文提出了一种框架，允许用户动态调节基于大型语言模型（LLM）代理的记忆依赖性，从而在长期交互中平衡创新与历史忠实度。现有系统通常采用全有或全无的记忆使用方式，导致记忆锚定现象，限制了代理的灵活性。我们引入了一种行为度量来量化过去交互对当前输出的影响，并提出了可调记忆代理（SteeM），使用户能够在促进创新和保持高忠实度之间进行调节。实验结果表明，我们的方法在个性化人机协作中优于传统的提示和僵化的记忆屏蔽策略。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.07526', 'title': 'MegaFlow: Large-Scale Distributed Orchestration System for the Agentic Era', 'url': 'https://huggingface.co/papers/2601.07526', 'abstract': 'MegaFlow is a distributed orchestration system that enables large-scale training and evaluation of agents on complex tasks by providing efficient scheduling, resource allocation, and task management through modular services.  \t\t\t\t\tAI-generated summary \t\t\t\t The rapid development of interactive and autonomous AI systems signals our entry into the agentic era. Training and evaluating agents on complex agentic tasks such as software engineering and computer use requires not only efficient model computation but also sophisticated infrastructure capable of coordinating vast agent-environment interactions. However, no open-source infrastructure can effectively support large-scale training and evaluation on such complex agentic tasks. To address this challenge, we present MegaFlow, a large-scale distributed orchestration system that enables efficient scheduling, resource allocation, and fine-grained task management for agent-environment workloads. MegaFlow abstracts agent training infrastructure into three independent services (Model Service, Agent Service, and Environment Service) that interact through unified interfaces, enabling independent scaling and flexible resource allocation across diverse agent-environment configurations. In our agent training deployments, MegaFlow successfully orchestrates tens of thousands of concurrent agent tasks while maintaining high system stability and achieving efficient resource utilization. By enabling such large-scale agent training, MegaFlow addresses a critical infrastructure gap in the emerging agentic AI landscape.', 'score': 13, 'issue_id': 545, 'pub_date': '2026-01-12', 'pub_date_card': {'ru': '12 января', 'en': 'January 12', 'zh': '1月12日'}, 'hash': '39021c9c97b22a61', 'authors': ['Lei Zhang', 'Mouxiang Chen', 'Ruisheng Cao', 'Jiawei Chen', 'Fan Zhou', 'Yiheng Xu', 'Jiaxi Yang', 'Liang Chen', 'Changwei Luo', 'Kai Zhang', 'Fan Yan', 'KaShun Shum', 'Jiajun Zhang', 'Zeyu Cui', 'Hu Feng', 'Junyang Lin', 'Binyuan Hui', 'Min Yang'], 'affiliations': ['Alibaba Group', 'Shenzhen Institutes of Advanced Technology, Chinese Academy of Sciences', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2601.07526.jpg', 'data': {'categories': ['#open_source', '#training', '#agents'], 'emoji': '🔄', 'ru': {'title': 'Инфраструктура для масштабируемого обучения автономных агентов', 'desc': 'MegaFlow — это распределённая система оркестрации, разработанная для крупномасштабного обучения и оценки агентов на сложных задачах. Система разделена на три независимых сервиса (Model Service, Agent Service и Environment Service), которые взаимодействуют через единые интерфейсы, что позволяет гибко масштабировать ресурсы. MegaFlow эффективно управляет десятками тысяч одновременных задач агентов, обеспечивая стабильность системы и оптимальное использование вычислительных ресурсов. Эта инфраструктура решает критическую проблему недостатка открытых решений для обучения автономных AI-систем на сложных задачах вроде разработки ПО и взаимодействия с компьютером.'}, 'en': {'title': 'Empowering Large-Scale AI Agent Training with MegaFlow', 'desc': 'MegaFlow is a distributed orchestration system designed to facilitate the large-scale training and evaluation of AI agents on complex tasks. It provides efficient scheduling, resource allocation, and task management through modular services, which allows for independent scaling of different components. The system abstracts the training infrastructure into three services: Model Service, Agent Service, and Environment Service, enabling flexible resource allocation. By successfully managing tens of thousands of concurrent agent tasks, MegaFlow fills a significant gap in the infrastructure needed for advanced agentic AI development.'}, 'zh': {'title': 'MegaFlow：智能体训练的高效编排系统', 'desc': 'MegaFlow是一个分布式编排系统，旨在支持大规模的智能体训练和评估。它通过模块化服务提供高效的调度、资源分配和任务管理，适用于复杂的任务。MegaFlow将智能体训练基础设施抽象为三个独立的服务，分别是模型服务、智能体服务和环境服务，这些服务通过统一接口进行交互。通过这种方式，MegaFlow能够在保持系统稳定性的同时，成功管理成千上万的并发智能体任务，实现高效的资源利用。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05823', 'title': 'Boosting Latent Diffusion Models via Disentangled Representation Alignment', 'url': 'https://huggingface.co/papers/2601.05823', 'abstract': 'Latent Diffusion Models generate high-quality images by operating in compressed latent space, typically obtained through image tokenizers such as Variational Autoencoders (VAEs). In pursuit of a generation-friendly VAE, recent studies have explored leveraging Vision Foundation Models (VFMs) as representation alignment targets for VAEs, mirroring the approach commonly adopted for LDMs. Although this yields certain performance gains, using the same alignment target for both VAEs and LDMs overlooks their fundamentally different representational requirements. We advocate that while LDMs benefit from latents retaining high-level semantic concepts, VAEs should excel in semantic disentanglement, enabling encoding of attribute-level information in a structured way. To address this, we propose the Semantic disentangled VAE (Send-VAE), explicitly optimized for disentangled representation learning through aligning its latent space with the semantic hierarchy of pre-trained VFMs. Our approach employs a non-linear mapper network to transform VAE latents, aligning them with VFMs to bridge the gap between attribute-level disentanglement and high-level semantics, facilitating effective guidance for VAE learning. We evaluate semantic disentanglement via linear probing on attribute prediction tasks, showing strong correlation with improved generation performance. Finally, using Send-VAE, we train flow-based transformers SiTs; experiments show Send-VAE significantly speeds up training and achieves a state-of-the-art FID of 1.21 and 1.75 with and without classifier-free guidance on ImageNet 256x256.  \t\t\t\t\tAI-generated summary \t\t\t\t Latent Diffusion Models (LDMs) generate high-quality images by operating in a compressed latent space, typically obtained through image tokenizers such as Variational Autoencoders (VAEs). In pursuit of a generation-friendly VAE, recent studies have explored leveraging Vision Foundation Models (VFMs) as representation alignment targets for VAEs, mirroring the approach commonly adopted for LDMs. Although this yields certain performance gains, using the same alignment target for both VAEs and LDMs overlooks their fundamentally different representational requirements. We advocate that while LDMs benefit from latents retaining high-level semantic concepts, VAEs should excel in semantic disentanglement, enabling encoding of attribute-level information in a structured way. To address this, we propose the Semantic disentangled VAE (Send-VAE), explicitly optimized for disentangled representation learning through aligning its latent space with the semantic hierarchy of pre-trained VFMs. Our approach employs a non-linear mapper network to transform VAE latents, aligning them with VFMs to bridge the gap between attribute-level disentanglement and high-level semantics, facilitating effective guidance for VAE learning. We evaluate semantic disentanglement via linear probing on attribute prediction tasks, showing strong correlation with improved generation performance. Finally, using Send-VAE, we train flow-based transformers SiTs; experiments show Send-VAE significantly speeds up training and achieves a state-of-the-art FID of 1.21 and 1.75 with and without classifier-free guidance on ImageNet 256x256.', 'score': 13, 'issue_id': 544, 'pub_date': '2026-01-09', 'pub_date_card': {'ru': '9 января', 'en': 'January 9', 'zh': '1月9日'}, 'hash': 'd7de342c692a7e3e', 'authors': ['John Page', 'Xuesong Niu', 'Kai Wu', 'Kun Gai'], 'affiliations': ['Kolors Team, Kuaishou Technology'], 'pdf_title_img': 'assets/pdf/title_img/2601.05823.jpg', 'data': {'categories': ['#training', '#architecture', '#optimization', '#diffusion', '#cv'], 'emoji': '🎨', 'ru': {'title': 'Диsentangled представления для лучшей генерации: VAE переучивается по-новому', 'desc': 'Работа предлагает Send-VAE — вариационный автокодировщик, специально оптимизированный для диsentangled представления изображений. В отличие от существующих подходов, которые используют одинаковые целевые представления для VAE и диффузионных моделей, авторы показывают, что VAE должен обеспечивать семантическую разделимость на уровне атрибутов. Метод использует нелинейную сеть-маппер для выравнивания скрытого пространства VAE с семантической иерархией предобученных foundation моделей. На задачах генерации изображений Send-VAE достигает состояния искусства с FID 1.21 на ImageNet 256x256, значительно ускоряя обучение flow-based трансформеров.'}, 'en': {'title': 'Enhancing Image Generation with Semantic Disentangled VAEs', 'desc': 'This paper introduces the Semantic Disentangled VAE (Send-VAE), which aims to improve image generation by optimizing Variational Autoencoders (VAEs) for better semantic disentanglement. Unlike traditional methods that use the same alignment targets for both VAEs and Latent Diffusion Models (LDMs), Send-VAE focuses on aligning its latent space with the semantic hierarchy of pre-trained Vision Foundation Models (VFMs). This approach allows VAEs to encode attribute-level information more effectively while maintaining high-level semantic concepts, enhancing the overall image generation process. The results demonstrate that Send-VAE not only speeds up training but also achieves state-of-the-art performance on image quality metrics like FID.'}, 'zh': {'title': '优化解耦表示，提升图像生成质量', 'desc': '潜在扩散模型（LDMs）通过在压缩的潜在空间中生成高质量图像，通常使用变分自编码器（VAEs）作为图像标记器。本文提出了一种语义解耦变分自编码器（Send-VAE），旨在优化解耦表示学习，并将其潜在空间与预训练视觉基础模型（VFMs）的语义层次对齐。我们的方法使用非线性映射网络来转换VAE的潜在表示，从而有效地连接属性级解耦与高层语义。实验结果表明，Send-VAE显著加快了训练速度，并在ImageNet 256x256上达到了最先进的FID值。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.01528', 'title': 'DrivingGen: A Comprehensive Benchmark for Generative Video World Models in Autonomous Driving', 'url': 'https://huggingface.co/papers/2601.01528', 'abstract': 'DrivingGen presents the first comprehensive benchmark for generative driving world models, addressing limitations in existing evaluations through diverse datasets and metrics that assess visual realism, trajectory plausibility, temporal coherence, and controllability.  \t\t\t\t\tAI-generated summary \t\t\t\t Video generation models, as one form of world models, have emerged as one of the most exciting frontiers in AI, promising agents the ability to imagine the future by modeling the temporal evolution of complex scenes. In autonomous driving, this vision gives rise to driving world models: generative simulators that imagine ego and agent futures, enabling scalable simulation, safe testing of corner cases, and rich synthetic data generation. Yet, despite fast-growing research activity, the field lacks a rigorous benchmark to measure progress and guide priorities. Existing evaluations remain limited: generic video metrics overlook safety-critical imaging factors; trajectory plausibility is rarely quantified; temporal and agent-level consistency is neglected; and controllability with respect to ego conditioning is ignored. Moreover, current datasets fail to cover the diversity of conditions required for real-world deployment. To address these gaps, we present DrivingGen, the first comprehensive benchmark for generative driving world models. DrivingGen combines a diverse evaluation dataset curated from both driving datasets and internet-scale video sources, spanning varied weather, time of day, geographic regions, and complex maneuvers, with a suite of new metrics that jointly assess visual realism, trajectory plausibility, temporal coherence, and controllability. Benchmarking 14 state-of-the-art models reveals clear trade-offs: general models look better but break physics, while driving-specific ones capture motion realistically but lag in visual quality. DrivingGen offers a unified evaluation framework to foster reliable, controllable, and deployable driving world models, enabling scalable simulation, planning, and data-driven decision-making.', 'score': 13, 'issue_id': 549, 'pub_date': '2026-01-04', 'pub_date_card': {'ru': '4 января', 'en': 'January 4', 'zh': '1月4日'}, 'hash': '0dd3823130c5337d', 'authors': ['Yang Zhou', 'Hao Shao', 'Letian Wang', 'Zhuofan Zong', 'Hongsheng Li', 'Steven L. Waslander'], 'affiliations': ['CUHK MMLab', 'University of Toronto'], 'pdf_title_img': 'assets/pdf/title_img/2601.01528.jpg', 'data': {'categories': ['#survey', '#diffusion', '#synthetic'], 'emoji': '🚗', 'ru': {'title': 'Единый стандарт оценки для генеративных моделей симуляции вождения', 'desc': 'DrivingGen представляет первый комплексный бенчмарк для оценки генеративных моделей мира вождения, которые используют нейронные сети для симуляции будущих сцен в автономном вождении. Бенчмарк включает разнообразный датасет с различными погодными условиями, временем суток и сложными манёврами, а также новый набор метрик для оценки визуального реализма, правдоподобности траекторий и управляемости модели. Авторы обнаружили компромисс между качеством: общие модели выглядят лучше визуально, но нарушают физику, в то время как специализированные модели для вождения точнее воспроизводят движения, но уступают в качестве изображений. Эта работа предоставляет единую платформу для оценки и разработки надёжных генеративных моделей вождения для масштабируемой симуляции и обучения агентов.'}, 'en': {'title': 'DrivingGen: A New Standard for Evaluating Generative Driving Models', 'desc': 'DrivingGen introduces a new benchmark for evaluating generative driving world models, which are essential for simulating autonomous driving scenarios. It addresses the shortcomings of existing evaluations by providing diverse datasets and metrics that measure visual realism, trajectory plausibility, temporal coherence, and controllability. The benchmark reveals trade-offs between general models that excel in visual quality but fail in physical accuracy, and driving-specific models that maintain realistic motion but lack visual appeal. By offering a comprehensive evaluation framework, DrivingGen aims to enhance the development of reliable and deployable driving simulations for safe autonomous driving.'}, 'zh': {'title': 'DrivingGen：生成驾驶模型的全面基准', 'desc': 'DrivingGen是第一个全面的生成驾驶世界模型基准，旨在解决现有评估的局限性。它通过多样化的数据集和指标来评估视觉真实感、轨迹合理性、时间一致性和可控性。该基准结合了来自驾驶数据集和互联网视频源的多样化评估数据集，涵盖不同的天气、时间和地理区域。DrivingGen为生成驾驶世界模型提供了一个统一的评估框架，促进可靠、可控和可部署的模型发展。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.06860', 'title': 'ET-Agent: Incentivizing Effective Tool-Integrated Reasoning Agent via Behavior Calibration', 'url': 'https://huggingface.co/papers/2601.06860', 'abstract': "ET-Agent is a training framework that calibrates tool-use behavior in large language models through self-evolving data flywheels and behavior calibration training to improve task execution effectiveness.  \t\t\t\t\tAI-generated summary \t\t\t\t Large Language Models (LLMs) can extend their parameter knowledge limits by adopting the Tool-Integrated Reasoning (TIR) paradigm. However, existing LLM-based agent training framework often focuses on answers' accuracy, overlooking specific alignment for behavior patterns. Consequently, agent often exhibits ineffective actions during TIR tasks, such as redundant and insufficient tool calls. How to calibrate erroneous behavioral patterns when executing TIR tasks, thereby exploring effective trajectories, remains an open-ended problem. In this paper, we propose ET-Agent, a training framework for calibrating agent's tool-use behavior through two synergistic perspectives: Self-evolving Data Flywheel and Behavior Calibration Training. Specifically, we introduce a self-evolutionary data flywheel to generate enhanced data, used to fine-tune LLM to improve its exploration ability. Based on this, we implement an two-phases behavior-calibration training framework. It is designed to progressively calibrate erroneous behavioral patterns to optimal behaviors. Further in-depth experiments confirm the superiority of  across multiple dimensions, including correctness, efficiency, reasoning conciseness, and tool execution accuracy. Our ET-Agent framework provides practical insights for research in the TIR field. Codes can be found in https://github.com/asilverlight/ET-Agent", 'score': 12, 'issue_id': 544, 'pub_date': '2026-01-11', 'pub_date_card': {'ru': '11 января', 'en': 'January 11', 'zh': '1月11日'}, 'hash': '600061ce305fd03f', 'authors': ['Yifei Chen', 'Guanting Dong', 'Zhicheng Dou'], 'affiliations': ['Gaoling School of Artificial Intelligence, Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2601.06860.jpg', 'data': {'categories': [], 'emoji': '🔧', 'ru': {'title': 'Калибровка поведения агентов через эволюционирующие данные и специальное обучение', 'desc': 'ET-Agent — это фреймворк обучения, который калибрует поведение агентов на основе больших языковых моделей при работе с инструментами через самоэволюционирующие циклы данных. Фреймворк решает проблему неэффективных действий агентов, таких как избыточные или недостаточные обращения к инструментам, которые возникают при обучении только на точность ответов. Метод включает два ключевых компонента: самоэволюционирующий цикл данных для генерации улучшенных примеров и двухфазное обучение с калибровкой поведения для прогрессивного исправления ошибочных паттернов. Экспериментальные результаты показывают превосходство подхода по корректности, эффективности, лаконичности рассуждений и точности выполнения инструментов.'}, 'en': {'title': 'Calibrating Tool-Use Behavior for Enhanced Task Execution in LLMs', 'desc': "ET-Agent is a novel training framework designed to enhance the tool-use behavior of large language models (LLMs) during task execution. It employs a Self-evolving Data Flywheel to generate improved training data, which helps fine-tune the model's exploration capabilities. Additionally, the framework incorporates Behavior Calibration Training to systematically correct and optimize the agent's behavioral patterns when performing Tool-Integrated Reasoning (TIR) tasks. Experimental results demonstrate that ET-Agent significantly improves the correctness, efficiency, and accuracy of tool execution in LLMs."}, 'zh': {'title': 'ET-Agent：优化工具使用行为的训练框架', 'desc': 'ET-Agent是一个训练框架，旨在通过自我演化的数据飞轮和行为校准训练来调整大型语言模型的工具使用行为，从而提高任务执行的有效性。该框架解决了现有模型在工具集成推理任务中常见的行为模式不对齐问题，避免了冗余和不足的工具调用。通过生成增强数据并对模型进行微调，ET-Agent能够有效探索任务执行的最佳路径。实验结果表明，该框架在正确性、效率、推理简洁性和工具执行准确性等多个维度上表现优越。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.06165', 'title': 'What Users Leave Unsaid: Under-Specified Queries Limit Vision-Language Models', 'url': 'https://huggingface.co/papers/2601.06165', 'abstract': 'Real-world vision-language benchmarks reveal that under-specified user queries pose significant challenges for current models, with explicit query rewriting leading to substantial performance improvements.  \t\t\t\t\tAI-generated summary \t\t\t\t Current vision-language benchmarks predominantly feature well-structured questions with clear, explicit prompts. However, real user queries are often informal and underspecified. Users naturally leave much unsaid, relying on images to convey context. We introduce HAERAE-Vision, a benchmark of 653 real-world visual questions from Korean online communities (0.76% survival from 86K candidates), each paired with an explicit rewrite, yielding 1,306 query variants in total. Evaluating 39 VLMs, we find that even state-of-the-art models (GPT-5, Gemini 2.5 Pro) achieve under 50% on the original queries. Crucially, query explicitation alone yields 8 to 22 point improvements, with smaller models benefiting most. We further show that even with web search, under-specified queries underperform explicit queries without search, revealing that current retrieval cannot compensate for what users leave unsaid. Our findings demonstrate that a substantial portion of VLM difficulty stem from natural query under-specification instead of model capability, highlighting a critical gap between benchmark evaluation and real-world deployment.', 'score': 12, 'issue_id': 544, 'pub_date': '2026-01-07', 'pub_date_card': {'ru': '7 января', 'en': 'January 7', 'zh': '1月7日'}, 'hash': '11228a6956fd7028', 'authors': ['Dasol Choi', 'Guijin Son', 'Hanwool Lee', 'Minhyuk Kim', 'Hyunwoo Ko', 'Teabin Lim', 'Ahn Eungyeol', 'Jungwhan Kim', 'Seunghyeok Hong', 'Youngsook Song'], 'affiliations': ['AIM Intelligence', 'Doodlin Corp.', 'Hankuk University of Foreign Studies', 'Korea University', 'Lablup Inc.', 'NAVER Cloud', 'OneLineAI', 'Yonsei University'], 'pdf_title_img': 'assets/pdf/title_img/2601.06165.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#dataset', '#low_resource', '#cv'], 'emoji': '🔍', 'ru': {'title': 'Переформулировка неясных запросов — ключ к улучшению зрительно-языковых моделей', 'desc': 'Авторы представляют HAERAE-Vision, бенчмарк из 653 реальных визуальных вопросов из корейских онлайн-сообществ, каждый из которых дополнен явной переформулировкой. При оценке 39 моделей зрения-языка они обнаружили, что даже самые современные модели (GPT-5, Gemini 2.5 Pro) достигают менее 50% точности на исходных неопределённых запросах. Явная переформулировка запроса приводит к улучшению на 8-22 процентных пункта, причём более компактные модели получают наибольшую пользу. Исследование показывает, что значительная часть трудностей моделей зрения-языка вызвана естественной неопределённостью пользовательских запросов, а не ограничениями архитектуры, что раскрывает разрыв между оценкой на бенчмарках и реальным применением.'}, 'en': {'title': 'Bridging the Gap: Enhancing VLMs with Clearer Queries', 'desc': 'This paper addresses the challenges faced by vision-language models (VLMs) when dealing with real-world user queries that are often informal and underspecified. The authors introduce HAERAE-Vision, a new benchmark consisting of 653 visual questions sourced from Korean online communities, each accompanied by explicit rewrites to clarify the queries. Their evaluation of 39 VLMs reveals that even the most advanced models struggle with original queries, scoring below 50%. The study highlights that improving query clarity through explicit rewriting can significantly enhance model performance, particularly for smaller models, and underscores the gap between benchmark evaluations and practical applications in real-world scenarios.'}, 'zh': {'title': '明确化查询，提升视觉-语言模型性能', 'desc': '本研究揭示了现实世界中视觉-语言模型（VLM）在处理不明确用户查询时面临的重大挑战。我们引入了HAERAE-Vision基准，包含来自韩国在线社区的653个真实视觉问题，并为每个问题提供了明确的重写版本。评估结果显示，即使是最先进的模型在处理原始查询时的表现也不足50%。我们的研究表明，查询的明确化可以显著提高模型性能，尤其是对较小的模型影响更大，强调了基准评估与实际应用之间的关键差距。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.04698', 'title': 'TourPlanner: A Competitive Consensus Framework with Constraint-Gated Reinforcement Learning for Travel Planning', 'url': 'https://huggingface.co/papers/2601.04698', 'abstract': "TourPlanner addresses travel planning challenges through multi-path reasoning and constraint-gated reinforcement learning to optimize both hard and soft constraints effectively.  \t\t\t\t\tAI-generated summary \t\t\t\t Travel planning is a sophisticated decision-making process that requires synthesizing multifaceted information to construct itineraries. However, existing travel planning approaches face several challenges: (1) Pruning candidate points of interest (POIs) while maintaining a high recall rate; (2) A single reasoning path restricts the exploration capability within the feasible solution space for travel planning; (3) Simultaneously optimizing hard constraints and soft constraints remains a significant difficulty. To address these challenges, we propose TourPlanner, a comprehensive framework featuring multi-path reasoning and constraint-gated reinforcement learning. Specifically, we first introduce a Personalized Recall and Spatial Optimization (PReSO) workflow to construct spatially-aware candidate POIs' set. Subsequently, we propose Competitive consensus Chain-of-Thought (CCoT), a multi-path reasoning paradigm that improves the ability of exploring the feasible solution space. To further refine the plan, we integrate a sigmoid-based gating mechanism into the reinforcement learning stage, which dynamically prioritizes soft-constraint satisfaction only after hard constraints are met. Experimental results on travel planning benchmarks demonstrate that TourPlanner achieves state-of-the-art performance, significantly surpassing existing methods in both feasibility and user-preference alignment.", 'score': 8, 'issue_id': 544, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': '84584233b4dfbf19', 'authors': ['Yinuo Wang', 'Mining Tan', 'Wenxiang Jiao', 'Xiaoxi Li', 'Hao Wang', 'Xuanyu Zhang', 'Yuan Lu', 'Weiming Dong'], 'affiliations': ['MAIS, Institute of Automation, Chinese Academy of Sciences', 'Renmin University of China', 'School of Artificial Intelligence, University of Chinese Academy of Sciences', 'Xiaohongshu Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2601.04698.jpg', 'data': {'categories': ['#rl', '#benchmark'], 'emoji': '✈️', 'ru': {'title': 'Многопутевое рассуждение для оптимизации маршрутов путешествий', 'desc': 'TourPlanner решает задачу планирования путешествий, используя многопутевое рассуждение и обучение с подкреплением с гейтингом ограничений. Система сначала применяет персонализированный рабочий процесс PReSO для построения набора кандидатов достопримечательностей с учётом пространственной информации. Затем использует парадигму цепочки мыслей с конкурентным консенсусом для расширения поиска в пространстве допустимых решений. Наконец, интегрирует сигмоидный механизм гейтинга в этап обучения с подкреплением, который динамически приоритизирует мягкие ограничения только после выполнения жёстких ограничений.'}, 'en': {'title': 'Optimizing Travel Plans with Multi-Path Reasoning and Reinforcement Learning', 'desc': 'TourPlanner is a novel framework designed to enhance travel planning by utilizing multi-path reasoning and constraint-gated reinforcement learning. It effectively addresses key challenges such as maintaining a high recall rate for points of interest while optimizing both hard and soft constraints. The framework introduces a Personalized Recall and Spatial Optimization (PReSO) workflow to create a set of relevant candidate locations, and a Competitive Consensus Chain-of-Thought (CCoT) approach to explore diverse solution paths. Experimental results indicate that TourPlanner outperforms existing methods, achieving better feasibility and alignment with user preferences.'}, 'zh': {'title': '智能旅行规划的新方法', 'desc': 'TourPlanner 是一个解决旅行规划挑战的框架，采用多路径推理和约束门控强化学习来有效优化硬约束和软约束。它首先通过个性化回忆和空间优化（PReSO）工作流程构建空间感知的候选兴趣点（POI）集合。接着，使用竞争共识思维链（CCoT）多路径推理范式，提升探索可行解空间的能力。实验结果表明，TourPlanner 在旅行规划基准测试中表现优异，显著超越了现有方法。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.07055', 'title': 'Dr. Zero: Self-Evolving Search Agents without Training Data', 'url': 'https://huggingface.co/papers/2601.07055', 'abstract': "A data-free self-evolution framework enables large language models to autonomously improve reasoning capabilities through iterative question generation and solving, achieving performance comparable to supervised methods.  \t\t\t\t\tAI-generated summary \t\t\t\t As high-quality data becomes increasingly difficult to obtain, data-free self-evolution has emerged as a promising paradigm. This approach allows large language models (LLMs) to autonomously generate and solve complex problems, thereby improving their reasoning capabilities. However, multi-turn search agents struggle in data-free self-evolution due to the limited question diversity and the substantial compute required for multi-step reasoning and tool using. In this work, we introduce Dr. Zero, a framework enabling search agents to effectively self-evolve without any training data. In particular, we design a self-evolution feedback loop where a proposer generates diverse questions to train a solver initialized from the same base model. As the solver evolves, it incentivizes the proposer to produce increasingly difficult yet solvable tasks, thus establishing an automated curriculum to refine both agents. To enhance training efficiency, we also introduce hop-grouped relative policy optimization (HRPO). This method clusters structurally similar questions to construct group-level baselines, effectively minimizing the sampling overhead in evaluating each query's individual difficulty and solvability. Consequently, HRPO significantly reduces the compute requirements for solver training without compromising performance or stability. Extensive experiment results demonstrate that the data-free Dr. Zero matches or surpasses fully supervised search agents, proving that complex reasoning and search capabilities can emerge solely through self-evolution.", 'score': 5, 'issue_id': 545, 'pub_date': '2026-01-11', 'pub_date_card': {'ru': '11 января', 'en': 'January 11', 'zh': '1月11日'}, 'hash': '686199b1cd75f07e', 'authors': ['Zhenrui Yue', 'Kartikeya Upasani', 'Xianjun Yang', 'Suyu Ge', 'Shaoliang Nie', 'Yuning Mao', 'Zhe Liu', 'Dong Wang'], 'affiliations': ['Meta Superintelligence Labs', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2601.07055.jpg', 'data': {'categories': ['#reasoning', '#rlhf', '#optimization', '#training', '#agents', '#synthetic'], 'emoji': '🔄', 'ru': {'title': 'Самоэволюция больших языковых моделей без данных через генерацию и решение задач', 'desc': 'В этой работе предлагается фреймворк Dr. Zero, который позволяет большим языковым моделям самостоятельно улучшать способности к рассуждению без использования размеченных данных. Система основана на цикле самоэволюции, где один агент генерирует разнообразные задачи, а другой их решает, постепенно увеличивая сложность вопросов как автоматизированный curriculum. Для повышения эффективности обучения авторы вводят метод hop-grouped relative policy optimization (HRPO), который группирует структурно похожие задачи и снижает вычислительные затраты на оценку сложности каждого запроса. Экспериментальные результаты показывают, что данный подход без использования обучающих данных достигает производительности, сравнимой или превосходящей полностью контролируемые методы.'}, 'en': {'title': 'Autonomous Self-Evolution for Enhanced Reasoning in Language Models', 'desc': 'This paper presents Dr. Zero, a framework that allows large language models (LLMs) to enhance their reasoning skills without relying on external training data. The framework operates through a self-evolution feedback loop, where a question generator (proposer) creates diverse questions for a problem solver, which is initialized from the same model. As the solver improves, it encourages the proposer to generate more challenging tasks, creating an automated learning environment. Additionally, the introduction of hop-grouped relative policy optimization (HRPO) helps streamline the training process by grouping similar questions, reducing computational costs while maintaining performance.'}, 'zh': {'title': '无数据自我进化，提升推理能力！', 'desc': '本论文提出了一种无数据自我进化框架，允许大型语言模型通过迭代生成和解决问题来自主提高推理能力。该框架名为Dr. Zero，能够在没有任何训练数据的情况下有效地自我进化。通过设计自我进化反馈循环，提议者生成多样化的问题来训练求解者，从而建立自动化课程以提升两个代理的能力。此外，论文还引入了跳跃分组相对策略优化（HRPO），有效减少了求解者训练的计算需求，同时保持了性能和稳定性。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.07376', 'title': 'OpenTinker: Separating Concerns in Agentic Reinforcement Learning', 'url': 'https://huggingface.co/papers/2601.07376', 'abstract': 'OpenTinker provides a modular infrastructure for reinforcement learning of large language model agents with separated components and managed execution runtime.  \t\t\t\t\tAI-generated summary \t\t\t\t We introduce OpenTinker, an infrastructure for reinforcement learning (RL) of large language model (LLM) agents built around a separation of concerns across algorithm design, execution, and agent-environment interaction. Rather than relying on monolithic, end-to-end RL pipelines, OpenTinker decomposes agentic learning systems into lightweight, composable components with clearly defined abstraction boundaries. Users specify agents, environments, and interaction protocols, while inference and training are delegated to a managed execution runtime. OpenTinker introduces a centralized scheduler for managing training and inference workloads, including LoRA-based and full-parameter RL, supervised fine-tuning, and inference, over shared resources. We further discuss design principles for extending OpenTinker to multi-agent training. Finally, we present a set of RL use cases that demonstrate the effectiveness of the framework in practical agentic learning
