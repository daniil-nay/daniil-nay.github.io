 both language models and text-to-image generation. Our results show that model controllability is surprisingly fragile and highly dependent on the experimental setting. This highlights the need for rigorous controllability analysis, shifting the focus from simply attempting control to first understanding its fundamental limits.", 'score': 2, 'issue_id': 522, 'pub_date': '2026-01-09', 'pub_date_card': {'ru': '9 января', 'en': 'January 9', 'zh': '1月9日'}, 'hash': '30ec0c4c1e6d1f97', 'authors': ['Emily Cheng', 'Carmen Amo Alonso', 'Federico Danieli', 'Arno Blaas', 'Luca Zappella', 'Pau Rodriguez', 'Xavier Suau'], 'affiliations': ['Apple', 'Stanford', 'Universitat Pompeu Fabra'], 'pdf_title_img': 'assets/pdf/title_img/2601.05637.jpg', 'data': {'categories': [], 'emoji': '🎮', 'ru': {'title': 'Управляемость генеративных моделей: от иллюзии контроля к пониманию его границ', 'desc': 'В работе предложена теоретическая структура для анализа управляемости генеративных моделей, которая оценивает множества достижимых состояний с использованием вероятностно-приблизительно корректных границ ошибки. Авторы моделируют взаимодействие человека и модели как задачу управления и разрабатывают алгоритм оценки множеств управляемости в диалоговых системах. Гарантии работают для любых чёрных ящиков нелинейных систем управления без предположений о распределении данных, кроме ограниченности выхода. Экспериментальные результаты показывают, что управляемость генеративных моделей хрупка и сильно зависит от контекста, что указывает на необходимость тщательного анализа фундаментальных ограничений контроля.'}, 'en': {'title': 'Understanding the Fragility of Generative Model Controllability', 'desc': 'This paper analyzes how controllable generative models really are, using a new theoretical framework. It introduces an algorithm that estimates the sets of outputs that can be controlled in dialogue systems, providing guarantees on the accuracy of these estimates. The findings reveal that the ability to control these models is often fragile and varies greatly depending on the context. This emphasizes the importance of understanding the limits of model controllability before trying to exert control over them.'}, 'zh': {'title': '生成模型的可控性：脆弱而依赖上下文', 'desc': '本文通过一个理论框架分析生成模型的可控性，估计可控集并提供无分布界限的保证。研究表明，生成模型的可控性是脆弱的，并且高度依赖于上下文。我们提出了一种新算法，用于在对话设置中估计模型的可控集，并在不同任务中进行了实证验证。结果显示，模型的可控性并不如预期，强调了对可控性进行严格分析的重要性。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05503', 'title': 'Over-Searching in Search-Augmented Large Language Models', 'url': 'https://huggingface.co/papers/2601.05503', 'abstract': 'Search-augmented large language models suffer from over-searching behavior that wastes computational resources and introduces hallucinations, with findings showing varied impacts across model types and conversation contexts.  \t\t\t\t\tAI-generated summary \t\t\t\t Search-augmented large language models (LLMs) excel at knowledge-intensive tasks by integrating external retrieval. However, they often over-search -- unnecessarily invoking search tool even when it does not improve response quality, which leads to computational inefficiency and hallucinations by incorporating irrelevant context. In this work, we conduct a systematic evaluation of over-searching across multiple dimensions, including query types, model categories, retrieval conditions, and multi-turn conversations. Our finding shows: (i) search generally improves answer accuracy on answerable queries but harms abstention on unanswerable ones; (ii) over-searching is more pronounced in complex reasoning models and deep research systems, is exacerbated by noisy retrieval, and compounds across turns in multi-turn conversations; and (iii) the composition of retrieved evidence is crucial, as the presence of negative evidence improves abstention. To quantify over-searching, we introduce Tokens Per Correctness (TPC), an evaluation metric that captures the performance-cost trade-off for search-augmented LLMs. Lastly, we investigate mitigation approaches at both the query and retrieval levels and release the OverSearchQA to foster continued research into efficient search-augmented LLMs.', 'score': 2, 'issue_id': 522, 'pub_date': '2026-01-09', 'pub_date_card': {'ru': '9 января', 'en': 'January 9', 'zh': '1月9日'}, 'hash': '33cf12cd1c7618ab', 'authors': ['Roy Xie', 'Deepak Gopinath', 'David Qiu', 'Dong Lin', 'Haitian Sun', 'Saloni Potdar', 'Bhuwan Dhingra'], 'affiliations': ['Apple', 'Duke University'], 'pdf_title_img': 'assets/pdf/title_img/2601.05503.jpg', 'data': {'categories': ['#rag', '#benchmark', '#hallucinations', '#optimization'], 'emoji': '🔍', 'ru': {'title': 'Когда поиск вредит: как избежать чрезмерных обращений в поиск-дополненных LLM', 'desc': 'В работе исследуется проблема чрезмерного поиска в больших языковых моделях с дополнением поиском, когда система избыточно обращается к внешним источникам информации, что приводит к пустратам вычислительных ресурсов и галлюцинациям. Авторы проводят систематическую оценку над-поиска, показывая что поиск улучшает точность на отвечаемых вопросах, но вредит отказу от ответа на невозможные вопросы, а эффект более выражен в сложных моделях рассуждения. Исследование демонстрирует что проблема усиливается при зашумленных результатах поиска и накапливается в многооборотных диалогах, но наличие релевантных контрпримеров улучшает способность модели правильно отказывать. Для количественной оценки проблемы предложена метрика Tokens Per Correctness, которая отражает компромисс между качеством ответа и затратами на вычисления.'}, 'en': {'title': 'Optimizing Search for Smarter Language Models', 'desc': 'This paper addresses the issue of over-searching in search-augmented large language models (LLMs), which can lead to wasted computational resources and hallucinations. The authors systematically evaluate how over-searching affects different model types and conversation contexts, revealing that while search can improve accuracy for answerable queries, it can negatively impact responses for unanswerable ones. They introduce a new metric, Tokens Per Correctness (TPC), to measure the efficiency of search-augmented LLMs and highlight the importance of the quality of retrieved evidence. The study also explores strategies to mitigate over-searching at both the query and retrieval levels, contributing to the development of more efficient LLMs.'}, 'zh': {'title': '优化搜索，提升语言模型效率', 'desc': '本论文探讨了增强搜索的大型语言模型在使用搜索工具时的过度搜索行为，这种行为会浪费计算资源并引入幻觉。研究发现，搜索通常能提高可回答问题的准确性，但在无法回答的问题上却会导致错误的放弃。过度搜索在复杂推理模型和深度研究系统中更为明显，并且在多轮对话中会加剧。为了解决这一问题，论文提出了一种新的评估指标——每个正确答案的令牌数（TPC），并探讨了在查询和检索层面上的缓解方法。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.04544', 'title': 'TCAndon-Router: Adaptive Reasoning Router for Multi-Agent Collaboration', 'url': 'https://huggingface.co/papers/2601.04544', 'abstract': 'A multi-agent system router that uses dynamic agent onboarding and natural language reasoning chains to improve routing accuracy and reduce conflicts in enterprise applications.  \t\t\t\t\tAI-generated summary \t\t\t\t Multi-Agent Systems(MAS) have become a powerful paradigm for building high performance intelligent applications. Within these systems, the router responsible for determining which expert agents should handle a given query plays a crucial role in overall performance. Existing routing strategies generally fall into two categories: performance routing, which balances latency and cost across models of different sizes, and task routing, which assigns queries to domain-specific experts to improve accuracy. In real-world enterprise applications, task routing is more suitable; however, most existing approaches rely on static single-label decisions, which introduce two major limitations: (i) difficulty in seamlessly integrating new agents as business domains expand, and (ii) routing conflicts caused by overlapping agent capabilities, ultimately degrading accuracy and robustness.To address these challenges, we propose TCAndon-Router(TCAR): an adaptive reasoning router for multi-agent collaboration. Unlike traditional routers, TCAR supports dynamic agent onboarding and first generates a natural-language reasoning chain before predicting a set of candidate agents capable of handling the query. In addition, we design a collaborative execution pipeline in which selected agents independently produce responses, which are then aggregated and refined into a single high-quality response by a dedicated Refining Agent.Experiments on public datasets and real enterprise data demonstrate that TCAR significantly improves routing accuracy, reduces routing conflicts, and remains robust in ambiguous scenarios. We have released TCAR at https://huggingface.co/tencent/TCAndon-Router to support future research on explainable and collaborative multi-agent routing.', 'score': 2, 'issue_id': 528, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': '50c6ddb04d917f2a', 'authors': ['Jiuzhou Zhao', 'Chunrong Chen', 'Chenqi Qiao', 'Lebin Zheng', 'Minqi Han', 'Yanchi Liu Yongzhou Xu Xiaochuan Xu Min Zhang'], 'affiliations': ['Tencent Cloud'], 'pdf_title_img': 'assets/pdf/title_img/2601.04544.jpg', 'data': {'categories': ['#agents'], 'emoji': '🚦', 'ru': {'title': 'Адаптивная маршрутизация с логическими рассуждениями для гибких многоагентных систем', 'desc': 'В статье предложена адаптивная система маршрутизации для многоагентных систем под названием TCAR, которая решает проблемы традиционных подходов маршрутизации запросов. Система поддерживает динамическую интеграцию новых агентов и использует цепочки рассуждений на естественном языке для определения набора подходящих агентов вместо простого однозначного выбора. Архитектура TCAR включает совместный конвейер выполнения, где выбранные агенты независимо генерируют ответы, которые затем агрегируются и уточняются специальным агентом. Экспериментальные результаты показывают, что подход значительно повышает точность маршрутизации, снижает конфликты и остаётся надёжным в неоднозначных сценариях.'}, 'en': {'title': 'Dynamic Routing for Enhanced Multi-Agent Collaboration', 'desc': 'This paper presents TCAndon-Router (TCAR), a novel multi-agent system router designed to enhance routing accuracy and minimize conflicts in enterprise applications. TCAR introduces dynamic agent onboarding, allowing for the seamless integration of new agents as business needs evolve. It utilizes natural language reasoning chains to identify a set of candidate agents, rather than relying on static single-label decisions, which often lead to routing conflicts. Experimental results show that TCAR outperforms traditional routing methods by improving accuracy and robustness in complex scenarios.'}, 'zh': {'title': '动态智能体接入，提升路由准确性！', 'desc': '本论文提出了一种名为TCAndon-Router（TCAR）的多智能体系统路由器，旨在提高企业应用中的路由准确性并减少冲突。TCAR支持动态智能体接入，并在预测候选智能体之前生成自然语言推理链，从而更好地处理查询。与传统的静态单标签决策方法不同，TCAR能够灵活应对业务领域的扩展，避免了因智能体能力重叠而导致的路由冲突。实验结果表明，TCAR在公共数据集和真实企业数据上显著提高了路由准确性，增强了系统的鲁棒性。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05960', 'title': 'Distilling Feedback into Memory-as-a-Tool', 'url': 'https://huggingface.co/papers/2601.05960', 'abstract': 'A framework converts transient critiques into retrievable guidelines using a file-based memory system and agent-controlled tool calls, enabling LLMs to match test-time refinement performance with reduced inference costs.  \t\t\t\t\tAI-generated summary \t\t\t\t We propose a framework that amortizes the cost of inference-time reasoning by converting transient critiques into retrievable guidelines, through a file-based memory system and agent-controlled tool calls. We evaluate this method on the Rubric Feedback Bench, a novel dataset for rubric-based learning. Experiments demonstrate that our augmented LLMs rapidly match the performance of test-time refinement pipelines while drastically reducing inference cost.', 'score': 1, 'issue_id': 527, 'pub_date': '2026-01-09', 'pub_date_card': {'ru': '9 января', 'en': 'January 9', 'zh': '1月9日'}, 'hash': 'eebae4efe4e25421', 'authors': ['Víctor Gallego'], 'affiliations': ['Komorebi AI Technologies'], 'pdf_title_img': 'assets/pdf/title_img/2601.05960.jpg', 'data': {'categories': [], 'emoji': '💾', 'ru': {'title': 'Из временной критики в стабильные знания: экономия вычислений при инференсе', 'desc': 'Авторы предлагают фреймворк, который оптимизирует вычислительные затраты при инференсе, преобразуя временные критики в сохраняемые рекомендации через файловую систему памяти и управляемые агентом вызовы инструментов. На новом датасете Rubric Feedback Bench они оценивают метод, демонстрируя, что дополненные LLM быстро достигают качества работы пайплайнов с уточнением на этапе тестирования. Эксперименты показывают значительное снижение инференных затрат при сохранении или улучшении производительности моделей. Такой подход позволяет эффективнее использовать ресурсы при получении высокого качества результатов.'}, 'en': {'title': 'Transforming Critiques into Cost-Effective Guidelines for LLMs', 'desc': 'This paper presents a framework that enhances the efficiency of large language models (LLMs) by transforming temporary critiques into reusable guidelines. It utilizes a file-based memory system and agent-controlled tool calls to streamline the inference process. The framework is evaluated using the Rubric Feedback Bench, which is designed for rubric-based learning assessments. Results show that the modified LLMs achieve comparable performance to traditional test-time refinement methods while significantly lowering inference costs.'}, 'zh': {'title': '降低推理成本，提升模型效率的创新框架', 'desc': '本文提出了一种框架，通过文件基础的记忆系统和代理控制的工具调用，将瞬时批评转化为可检索的指导方针，从而降低推理成本。该方法在一个新的基于评分标准的学习数据集Rubric Feedback Bench上进行了评估。实验结果表明，增强型大语言模型（LLMs）能够迅速达到测试时精细化管道的性能，同时显著降低推理成本。此框架为提高机器学习模型的效率提供了新的思路。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05899', 'title': 'TowerMind: A Tower Defence Game Learning Environment and Benchmark for LLM as Agents', 'url': 'https://huggingface.co/papers/2601.05899', 'abstract': "A new tower defense-based environment called TowerMind is introduced for evaluating large language models' planning and decision-making capabilities with low computational requirements and multimodal observations.  \t\t\t\t\tAI-generated summary \t\t\t\t Recent breakthroughs in Large Language Models (LLMs) have positioned them as a promising paradigm for agents, with long-term planning and decision-making emerging as core general-purpose capabilities for adapting to diverse scenarios and tasks. Real-time strategy (RTS) games serve as an ideal testbed for evaluating these two capabilities, as their inherent gameplay requires both macro-level strategic planning and micro-level tactical adaptation and action execution. Existing RTS game-based environments either suffer from relatively high computational demands or lack support for textual observations, which has constrained the use of RTS games for LLM evaluation. Motivated by this, we present TowerMind, a novel environment grounded in the tower defense (TD) subgenre of RTS games. TowerMind preserves the key evaluation strengths of RTS games for assessing LLMs, while featuring low computational demands and a multimodal observation space, including pixel-based, textual, and structured game-state representations. In addition, TowerMind supports the evaluation of model hallucination and provides a high degree of customizability. We design five benchmark levels to evaluate several widely used LLMs under different multimodal input settings. The results reveal a clear performance gap between LLMs and human experts across both capability and hallucination dimensions. The experiments further highlight key limitations in LLM behavior, such as inadequate planning validation, a lack of multifinality in decision-making, and inefficient action use. We also evaluate two classic reinforcement learning algorithms: Ape-X DQN and PPO. By offering a lightweight and multimodal design, TowerMind complements the existing RTS game-based environment landscape and introduces a new benchmark for the AI agent field. The source code is publicly available on GitHub(https://github.com/tb6147877/TowerMind).", 'score': 1, 'issue_id': 537, 'pub_date': '2026-01-09', 'pub_date_card': {'ru': '9 января', 'en': 'January 9', 'zh': '1月9日'}, 'hash': 'b20f557319791d13', 'authors': ['Dawei Wang', 'Chengming Zhou', 'Di Zhao', 'Xinyuan Liu', 'Marci Chi Ma', 'Gary Ushaw', 'Richard Davison'], 'affiliations': ['Newcastle University, United Kingdom', 'University of Auckland, New Zealand'], 'pdf_title_img': 'assets/pdf/title_img/2601.05899.jpg', 'data': {'categories': ['#hallucinations', '#games', '#open_source', '#multimodal', '#agents', '#rl', '#benchmark', '#reasoning'], 'emoji': '🛡️', 'ru': {'title': 'Эффективная оценка планирования LLM через tower defense среду', 'desc': 'В статье представлена TowerMind — новая среда на основе tower defense игр для оценки возможностей планирования и принятия решений больших языковых моделей с низкими вычислительными требованиями. Среда поддерживает мультимодальные наблюдения, включая пиксельные, текстовые и структурированные представления игрового состояния, позволяя комплексно тестировать LLM в стратегических задачах. Проведенные эксперименты выявили значительный разрыв в производительности между LLM и человеческими экспертами, а также выявили ключевые ограничения в поведении моделей, такие как недостаточная валидация планов и неэффективное использование действий. TowerMind дополняет существующий ландшафт сред для оценки AI-агентов и предоставляет новый бенчмарк для развития методов обучения с подкреплением.'}, 'en': {'title': 'TowerMind: A New Benchmark for Evaluating LLMs in Strategic Planning', 'desc': 'TowerMind is a new environment designed to test the planning and decision-making skills of large language models (LLMs) using a tower defense game format. It allows for low computational costs while providing multimodal observations, including text and game states. The environment helps identify the strengths and weaknesses of LLMs, revealing gaps in their performance compared to human experts, particularly in planning and decision-making. Additionally, TowerMind offers customizable benchmarks to evaluate LLMs and classic reinforcement learning algorithms, contributing to the advancement of AI agent research.'}, 'zh': {'title': 'TowerMind：评估语言模型的新基准', 'desc': '本文介绍了一种新的塔防游戏环境TowerMind，用于评估大型语言模型（LLMs）的规划和决策能力。TowerMind具有低计算需求和多模态观察空间，包括像素、文本和结构化游戏状态表示。通过设计五个基准关卡，研究发现LLMs在能力和幻觉维度上与人类专家存在明显差距，并揭示了LLMs在规划验证和决策多样性方面的局限性。TowerMind为AI代理领域提供了一个新的基准，促进了现有实时战略游戏环境的发展。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05851', 'title': 'Router-Suggest: Dynamic Routing for Multimodal Auto-Completion in Visually-Grounded Dialogs', 'url': 'https://huggingface.co/papers/2601.05851', 'abstract': 'Multimodal auto-completion leverages visual and textual context to improve real-time prediction accuracy in conversational interfaces, with a router framework enabling efficient model selection based on dialog context.  \t\t\t\t\tAI-generated summary \t\t\t\t Real-time multimodal auto-completion is essential for digital assistants, chatbots, design tools, and healthcare consultations, where user inputs rely on shared visual context. We introduce Multimodal Auto-Completion (MAC), a task that predicts upcoming characters in live chats using partially typed text and visual cues. Unlike traditional text-only auto-completion (TAC), MAC grounds predictions in multimodal context to better capture user intent. To enable this task, we adapt MMDialog and ImageChat to create benchmark datasets. We evaluate leading vision-language models (VLMs) against strong textual baselines, highlighting trade-offs in accuracy and efficiency. We present Router-Suggest, a router framework that dynamically selects between textual models and VLMs based on dialog context, along with a lightweight variant for resource-constrained environments. Router-Suggest achieves a 2.3x to 10x speedup over the best-performing VLM. A user study shows that VLMs significantly excel over textual models on user satisfaction, notably saving user typing effort and improving the quality of completions in multi-turn conversations. These findings underscore the need for multimodal context in auto-completions, leading to smarter, user-aware assistants.', 'score': 1, 'issue_id': 522, 'pub_date': '2026-01-09', 'pub_date_card': {'ru': '9 января', 'en': 'January 9', 'zh': '1月9日'}, 'hash': '7a9a52f4b2a51b55', 'authors': ['Sandeep Mishra', 'Devichand Budagam', 'Anubhab Mandal', 'Bishal Santra', 'Pawan Goyal', 'Manish Gupta'], 'affiliations': ['IIT Kharagpur', 'Microsoft'], 'pdf_title_img': 'assets/pdf/title_img/2601.05851.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#multimodal'], 'emoji': '💬', 'ru': {'title': 'Умное автозаполнение через мультимодальный контекст и динамическую маршрутизацию моделей', 'desc': 'В работе предложена задача мультимодального автозаполнения (MAC), которая предсказывает следующие символы в чате, используя частично набранный текст и визуальный контекст одновременно. Авторы создали бенчмарки на основе адаптированных датасетов MMDialog и ImageChat, а также провели оценку ведущих vision-language моделей в сравнении с текстовыми базелайнами. Основной вклад — это фреймворк Router-Suggest, использующий маршрутизацию для динамического выбора между текстовыми моделями и VLM на основе контекста диалога, что достигает ускорения в 2.3-10x раз. Пользовательское исследование показало, что мультимодальные модели значительно превосходят текстовые по удовлетворённости пользователей и снижают затраты на печать в многооборотных разговорах.'}, 'en': {'title': 'Enhancing Conversations with Multimodal Auto-Completion', 'desc': 'This paper introduces Multimodal Auto-Completion (MAC), a method that enhances real-time predictions in conversational interfaces by utilizing both visual and textual information. Unlike traditional text-only auto-completion, MAC integrates visual cues to better understand user intent and improve prediction accuracy. The authors develop a router framework called Router-Suggest, which efficiently selects between vision-language models (VLMs) and textual models based on the context of the conversation. Their findings demonstrate that VLMs significantly outperform traditional models in user satisfaction and typing efficiency, highlighting the importance of multimodal context in creating smarter digital assistants.'}, 'zh': {'title': '多模态自动补全：智能助手的新方向', 'desc': '多模态自动补全利用视觉和文本上下文来提高对话界面的实时预测准确性。我们提出了多模态自动补全（MAC）任务，通过部分输入文本和视觉线索预测即将输入的字符。与传统的仅文本自动补全（TAC）不同，MAC在多模态上下文中进行预测，更好地捕捉用户意图。我们还介绍了Router-Suggest框架，根据对话上下文动态选择文本模型和视觉语言模型，显著提高了效率和用户满意度。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05741', 'title': 'ViTNT-FIQA: Training-Free Face Image Quality Assessment with Vision Transformers', 'url': 'https://huggingface.co/papers/2601.05741', 'abstract': 'ViTNT-FIQA measures face image quality by analyzing patch embedding stability across Vision Transformer blocks with a single forward pass.  \t\t\t\t\tAI-generated summary \t\t\t\t Face Image Quality Assessment (FIQA) is essential for reliable face recognition systems. Current approaches primarily exploit only final-layer representations, while training-free methods require multiple forward passes or backpropagation. We propose ViTNT-FIQA, a training-free approach that measures the stability of patch embedding evolution across intermediate Vision Transformer (ViT) blocks. We demonstrate that high-quality face images exhibit stable feature refinement trajectories across blocks, while degraded images show erratic transformations. Our method computes Euclidean distances between L2-normalized patch embeddings from consecutive transformer blocks and aggregates them into image-level quality scores. We empirically validate this correlation on a quality-labeled synthetic dataset with controlled degradation levels. Unlike existing training-free approaches, ViTNT-FIQA requires only a single forward pass without backpropagation or architectural modifications. Through extensive evaluation on eight benchmarks (LFW, AgeDB-30, CFP-FP, CALFW, Adience, CPLFW, XQLFW, IJB-C), we show that ViTNT-FIQA achieves competitive performance with state-of-the-art methods while maintaining computational efficiency and immediate applicability to any pre-trained ViT-based face recognition model.', 'score': 1, 'issue_id': 530, 'pub_date': '2026-01-09', 'pub_date_card': {'ru': '9 января', 'en': 'January 9', 'zh': '1月9日'}, 'hash': 'a3ae1020afe47c87', 'authors': ['Guray Ozgur', 'Eduarda Caldeira', 'Tahar Chettaoui', 'Jan Niklas Kolf', 'Marco Huber', 'Naser Damer', 'Fadi Boutros'], 'affiliations': ['Fraunhofer IGD', 'TU Darmstadt'], 'pdf_title_img': 'assets/pdf/title_img/2601.05741.jpg', 'data': {'categories': ['#cv', '#benchmark'], 'emoji': '🎭', 'ru': {'title': 'Стабильность эмбеддингов как показатель качества лиц в Vision Transformer', 'desc': 'Статья представляет ViTNT-FIQA — метод оценки качества изображений лиц без обучения, основанный на анализе стабильности эмбеддингов патчей через слои Vision Transformer. Авторы показывают, что качественные изображения характеризуются стабильной траекторией улучшения признаков, а деградированные изображения демонстрируют хаотичные преобразования. Метод вычисляет евклидовы расстояния между нормализованными эмбеддингами из последовательных блоков трансформера и агрегирует их в оценку качества на уровне изображения. Подход требует только одного прямого прохода без обратного распространения и показывает конкурентоспособные результаты на восьми бенчмарках.'}, 'en': {'title': 'Assessing Face Image Quality with Stability in Vision Transformers', 'desc': 'ViTNT-FIQA is a novel method for assessing the quality of face images by analyzing the stability of patch embeddings through Vision Transformer (ViT) blocks. Unlike traditional methods that rely on final-layer outputs or require multiple passes, this approach is training-free and only needs a single forward pass. It measures the consistency of feature refinement by calculating Euclidean distances between normalized patch embeddings from consecutive transformer blocks. The results show that high-quality images maintain stable trajectories, while lower-quality images exhibit erratic changes, making ViTNT-FIQA efficient and effective for face image quality assessment.'}, 'zh': {'title': 'ViTNT-FIQA：高效的面部图像质量评估方法', 'desc': 'ViTNT-FIQA是一种面部图像质量评估方法，通过分析视觉变换器（ViT）块中补丁嵌入的稳定性来衡量图像质量。与现有方法不同，ViTNT-FIQA不需要训练，且只需一次前向传播即可完成评估。该方法通过计算相邻变换器块之间L2归一化补丁嵌入的欧几里得距离，生成图像级质量评分。实验结果表明，高质量的面部图像在特征提炼过程中表现出稳定的轨迹，而劣质图像则显示出不规则的变化。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05870', 'title': 'IIB-LPO: Latent Policy Optimization via Iterative Information Bottleneck', 'url': 'https://huggingface.co/papers/2601.05870', 'abstract': 'Latent Policy Optimization via Iterative Information Bottleneck addresses exploration collapse in LLM reasoning by enabling topological branching of reasoning trajectories through information bottleneck principles.  \t\t\t\t\tAI-generated summary \t\t\t\t Recent advances in Reinforcement Learning with Verifiable Rewards (RLVR) for Large Language Model (LLM) reasoning have been hindered by a persistent challenge: exploration collapse. The semantic homogeneity of random rollouts often traps models in narrow, over-optimized behaviors. While existing methods leverage policy entropy to encourage exploration, they face inherent limitations. Global entropy regularization is susceptible to reward hacking, which can induce meaningless verbosity, whereas local token-selective updates struggle with the strong inductive bias of pre-trained models. To address this, we propose Latent Policy Optimization via Iterative Information Bottleneck (IIB-LPO), a novel approach that shifts exploration from statistical perturbation of token distributions to topological branching of reasoning trajectories. IIB-LPO triggers latent branching at high-entropy states to diversify reasoning paths and employs the Information Bottleneck principle both as a trajectory filter and a self-reward mechanism, ensuring concise and informative exploration. Empirical results across four mathematical reasoning benchmarks demonstrate that IIB-LPO achieves state-of-the-art performance, surpassing prior methods by margins of up to 5.3% in accuracy and 7.4% in diversity metrics.', 'score': 0, 'issue_id': 522, 'pub_date': '2026-01-09', 'pub_date_card': {'ru': '9 января', 'en': 'January 9', 'zh': '1月9日'}, 'hash': 'd2103f98d8252f93', 'authors': ['Huilin Deng', 'Hongchen Luo', 'Yue Zhu', 'Long Li', 'Zhuoyue Chen', 'Xinghao Zhao', 'Ming Li', 'Jihai Zhang', 'Mengchang Wang', 'Yang Cao', 'Yu Kang'], 'affiliations': ['DAMO Academy, Alibaba Group', 'Northeastern University', 'Shanghai Jiao Tong University', 'University of Science and Technology of China', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2601.05870.jpg', 'data': {'categories': ['#optimization', '#math', '#rl', '#training', '#reasoning'], 'emoji': '🌿', 'ru': {'title': 'Ветвление рассуждений через информационное узкое место', 'desc': 'В статье предлагается новый метод IIB-LPO для решения проблемы коллапса исследования при обучении больших языковых моделей решению логических задач с проверяемыми наградами. Вместо традиционных подходов с регуляризацией энтропии политики, метод использует принцип информационного узкого места для создания топологического ветвления траекторий рассуждений в латентном пространстве. Информационное узкое место применяется одновременно как фильтр траекторий и механизм самоградации, обеспечивая баланс между краткостью и информативностью. Экспериментальные результаты на четырех бенчмарках математического рассуждения показывают улучшение точности на 5,3% и метрик разнообразия на 7,4% по сравнению с предыдущими методами.'}, 'en': {'title': 'Branching Out: Enhancing LLM Reasoning with IIB-LPO', 'desc': 'This paper introduces Latent Policy Optimization via Iterative Information Bottleneck (IIB-LPO) to tackle the issue of exploration collapse in Large Language Model (LLM) reasoning. The authors highlight that traditional methods often lead to over-optimized behaviors due to semantic homogeneity in random rollouts. IIB-LPO innovatively shifts the focus from merely adjusting token distributions to creating diverse reasoning paths through topological branching at high-entropy states. The approach not only filters trajectories using the Information Bottleneck principle but also incorporates a self-reward mechanism, resulting in improved accuracy and diversity in reasoning tasks.'}, 'zh': {'title': '通过信息瓶颈实现潜在策略优化，打破探索崩溃', 'desc': '本文提出了一种新的方法，称为迭代信息瓶颈下的潜在策略优化（IIB-LPO），旨在解决大型语言模型（LLM）推理中的探索崩溃问题。通过信息瓶颈原理，该方法能够在高熵状态下触发潜在分支，从而多样化推理路径。与传统方法不同，IIB-LPO不再依赖于统计扰动，而是通过拓扑分支来增强探索能力。实验结果表明，IIB-LPO在四个数学推理基准测试中表现优异，准确率和多样性指标均超过了之前的方法。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05699', 'title': 'Afri-MCQA: Multimodal Cultural Question Answering for African Languages', 'url': 'https://huggingface.co/papers/2601.05699', 'abstract': "Afri-MCQA benchmark demonstrates poor performance of open-weight LLMs in African languages, highlighting the need for culturally grounded pretraining and speech-first approaches in AI development.  \t\t\t\t\tAI-generated summary \t\t\t\t Africa is home to over one-third of the world's languages, yet remains underrepresented in AI research. We introduce Afri-MCQA, the first Multilingual Cultural Question-Answering benchmark covering 7.5k Q&A pairs across 15 African languages from 12 countries. The benchmark offers parallel English-African language Q&A pairs across text and speech modalities and was entirely created by native speakers. Benchmarking large language models (LLMs) on Afri-MCQA shows that open-weight models perform poorly across evaluated cultures, with near-zero accuracy on open-ended VQA when queried in native language or speech. To evaluate linguistic competence, we include control experiments meant to assess this specific aspect separate from cultural knowledge, and we observe significant performance gaps between native languages and English for both text and speech. These findings underscore the need for speech-first approaches, culturally grounded pretraining, and cross-lingual cultural transfer. To support more inclusive multimodal AI development in African languages, we release our Afri-MCQA under academic license or CC BY-NC 4.0 on HuggingFace (https://huggingface.co/datasets/Atnafu/Afri-MCQA)", 'score': 0, 'issue_id': 531, 'pub_date': '2026-01-09', 'pub_date_card': {'ru': '9 января', 'en': 'January 9', 'zh': '1月9日'}, 'hash': '41b7253b439939ec', 'authors': ['Atnafu Lambebo Tonja', 'Srija Anand', 'Emilio Villa-Cueva', 'Israel Abebe Azime', 'Jesujoba Oluwadara Alabi', 'Muhidin A. Mohamed', 'Debela Desalegn Yadeta', 'Negasi Haile Abadi', 'Abigail Oppong', 'Nnaemeka Casmir Obiefuna', 'Idris Abdulmumin', 'Naome A Etori', 'Eric Peter Wairagala', 'Kanda Patrick Tshinu', 'Imanigirimbabazi Emmanuel', 'Gabofetswe Malema', 'Alham Fikri Aji', 'David Ifeoluwa Adelani', 'Thamar Solorio'], 'affiliations': ['AI4Bharat, Indian Institute of Technology, Madras', 'Addis Ababa University', 'Aston University', 'Friedrich-Alexander University', 'Independent', 'Kabale University', 'Lelapa AI', 'Lesan AI', 'MBZUAI', 'Mila, McGill University & Canada CIFAR AI Chair', 'Saarland University', 'Tshwane University of Technology', 'University of Botswana', 'University of Minnesota - Twin Cities', 'University of Pretoria'], 'pdf_title_img': 'assets/pdf/title_img/2601.05699.jpg', 'data': {'categories': ['#open_source', '#audio', '#low_resource', '#multimodal', '#benchmark', '#multilingual', '#dataset'], 'emoji': '🌍', 'ru': {'title': 'Африканские языки требуют культурно-специфичного обучения моделей', 'desc': 'Авторы представили Afri-MCQA — первый многоязычный бенчмарк для оценки вопросно-ответных систем на 15 африканских языках, содержащий 7,5 тысячи параллельных примеров на английском и африканских языках в текстовом и речевом форматах. Тестирование открытых моделей больших языков на этом бенчмарке показало критически низкую производительность — почти нулевую точность при обработке открытых вопросов на родных языках и в речевом формате. Исследование выявило значительные различия в качестве обработки между английским языком и африканскими языками, что указывает на недостаточность лингвистической компетентности моделей. Результаты подчёркивают необходимость разработки речеориентированных подходов, культурно-обоснованной предварительной обучения и методов кросс-лингвального трансфера знаний.'}, 'en': {'title': 'Bridging the AI Gap: Empowering African Languages in Machine Learning', 'desc': 'The Afri-MCQA benchmark reveals that open-weight large language models (LLMs) struggle significantly with African languages, indicating a lack of cultural understanding in their training. This benchmark includes 7.5k question-and-answer pairs in 15 African languages, created by native speakers, and assesses both text and speech modalities. Results show that these models achieve near-zero accuracy in open-ended visual question answering when using native languages, highlighting the need for culturally relevant pretraining. The study emphasizes the importance of speech-first approaches and cross-lingual cultural transfer to improve AI performance in diverse linguistic contexts.'}, 'zh': {'title': '推动非洲语言的AI发展，重视文化与语音！', 'desc': 'Afri-MCQA基准展示了开放权重的大型语言模型在非洲语言上的表现不佳，强调了在人工智能发展中需要以文化为基础的预训练和以语音为主的方式。非洲拥有超过三分之一的世界语言，但在人工智能研究中仍然代表性不足。我们推出了Afri-MCQA，这是第一个涵盖来自12个国家的15种非洲语言的多语言文化问答基准，包含7500对问答。基准测试显示，开放权重模型在评估的文化中表现不佳，尤其是在使用母语或语音进行开放式视觉问答时几乎没有准确率。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05376', 'title': 'The Persona Paradox: Medical Personas as Behavioral Priors in Clinical Language Models', 'url': 'https://huggingface.co/papers/2601.05376', 'abstract': "Persona conditioning in clinical language models produces context-dependent effects on performance and safety that vary systematically with professional role and interaction style, challenging assumptions of monotonic improvement in expert behavior.  \t\t\t\t\tAI-generated summary \t\t\t\t Persona conditioning can be viewed as a behavioral prior for large language models (LLMs) and is often assumed to confer expertise and improve safety in a monotonic manner. However, its effects on high-stakes clinical decision-making remain poorly characterized. We systematically evaluate persona-based control in clinical LLMs, examining how professional roles (e.g., Emergency Department physician, nurse) and interaction styles (bold vs.\\ cautious) influence behavior across models and medical tasks. We assess performance on clinical triage and patient-safety tasks using multidimensional evaluations that capture task accuracy, calibration, and safety-relevant risk behavior. We find systematic, context-dependent, and non-monotonic effects: Medical personas improve performance in critical care tasks, yielding gains of up to sim+20% in accuracy and calibration, but degrade performance in primary-care settings by comparable margins. Interaction style modulates risk propensity and sensitivity, but it's highly model-dependent. While aggregated LLM-judge rankings favor medical over non-medical personas in safety-critical cases, we found that human clinicians show moderate agreement on safety compliance (average Cohen's κ= 0.43) but indicate a low confidence in 95.9\\% of their responses on reasoning quality. Our work shows that personas function as behavioral priors that introduce context-dependent trade-offs rather than guarantees of safety or expertise. The code is available at https://github.com/rsinghlab/Persona\\_Paradox.", 'score': 0, 'issue_id': 534, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': 'f5cdba803ffd9dc3', 'authors': ['Tassallah Abdullahi', 'Shrestha Ghosh', 'Hamish S Fraser', 'Daniel León Tramontini', 'Adeel Abbasi', 'Ghada Bourjeily', 'Carsten Eickhoff', 'Ritambhara Singh'], 'affiliations': ['Brown University', 'University of Tuebingen'], 'pdf_title_img': 'assets/pdf/title_img/2601.05376.jpg', 'data': {'categories': ['#interpretability', '#ethics', '#alignment'], 'emoji': '⚕️', 'ru': {'title': 'Персоны врачей в языковых моделях: улучшение или иллюзия безопасности?', 'desc': 'Исследование показывает, что кондиционирование большых языковых моделей через медицинские персоны (роли врача, медсестры) не гарантирует монотонный прирост качества, а приводит к контекстно-зависимым эффектам. Авторы систематически оценили влияние профессиональных ролей и стилей взаимодействия на производительность LLM в критических медицинских задачах, обнаружив улучшение на ~20% в интенсивной терапии и одновременное снижение в амбулаторной практике. Помимо точности, команда измеряла откалибровку моделей и поведение, связанное с риском для безопасности пациентов. Результаты подтверждают, что персоны функционируют как поведенческие априорные знания с конкретными компромиссами, а не универсальными гарантиями экспертизы и безопасности.'}, 'en': {'title': 'Persona Conditioning: Context Matters in Clinical AI Performance', 'desc': 'This paper investigates how persona conditioning in clinical language models affects their performance and safety in medical tasks. It reveals that the impact of different professional roles and interaction styles on model behavior is not straightforward, challenging the idea that expert personas always lead to better outcomes. The study finds that while medical personas can enhance accuracy in critical care tasks, they may actually hinder performance in primary care scenarios. Overall, the results highlight that persona conditioning introduces complex trade-offs rather than consistent improvements in safety and expertise.'}, 'zh': {'title': '角色条件化：医疗模型中的双刃剑', 'desc': '本研究探讨了在临床语言模型中使用角色条件化对性能和安全性的影响。研究发现，不同的专业角色和互动风格会系统性地影响模型在医疗任务中的表现。尽管医疗角色在危急护理任务中提高了准确性，但在初级护理环境中却可能导致性能下降。我们的结果表明，角色条件化并不总是能保证安全或专业性，而是引入了依赖于上下文的权衡。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.04175', 'title': 'Legal Alignment for Safe and Ethical AI', 'url': 'https://huggingface.co/papers/2601.04175', 'abstract': 'Legal alignment explores how legal principles and methods can guide AI system design to ensure safety, ethics, and compliance through three research directions involving rule adherence, legal reasoning methods, and structural blueprints for AI reliability and trust.  \t\t\t\t\tAI-generated summary \t\t\t\t Alignment of artificial intelligence (AI) encompasses the normative problem of specifying how AI systems should act and the technical problem of ensuring AI systems comply with those specifications. To date, AI alignment has generally overlooked an important source of knowledge and practice for grappling with these problems: law. In this paper, we aim to fill this gap by exploring how legal rules, principles, and methods can be leveraged to address problems of alignment and inform the design of AI systems that operate safely and ethically. This emerging field -- legal alignment -- focuses on three research directions: (1) designing AI systems to comply with the content of legal rules developed through legitimate institutions and processes, (2) adapting methods from legal interpretation to guide how AI systems reason and make decisions, and (3) harnessing legal concepts as a structural blueprint for confronting challenges of reliability, trust, and cooperation in AI systems. These research directions present new conceptual, empirical, and institutional questions, which include examining the specific set of laws that particular AI systems should follow, creating evaluations to assess their legal compliance in real-world settings, and developing governance frameworks to support the implementation of legal alignment in practice. Tackling these questions requires expertise across law, computer science, and other disciplines, offering these communities the opportunity to collaborate in designing AI for the better.', 'score': 0, 'issue_id': 531, 'pub_date': '2026-01-07', 'pub_date_card': {'ru': '7 января', 'en': 'January 7', 'zh': '1月7日'}, 'hash': 'ca62024488ec38f0', 'authors': ['Noam Kolt', 'Nicholas Caputo', 'Jack Boeglin', "Cullen O'Keefe", 'Rishi Bommasani', 'Stephen Casper', 'Mariano-Florentino Cuéllar', 'Noah Feldman', 'Iason Gabriel', 'Gillian K. Hadfield', 'Lewis Hammond', 'Peter Henderson', 'Atoosa Kasirzadeh', 'Seth Lazar', 'Anka Reuel', 'Kevin L. Wei', 'Jonathan Zittrain'], 'affiliations': ['Australian National University', 'Berkman Klein Center for Internet & Society', 'Carnegie Endowment for International Peace', 'Carnegie Mellon University', 'Centre for the Governance of AI', 'Cooperative AI Foundation', 'Harvard University', 'Hebrew University', 'Institute for Law & AI', 'Johns Hopkins University', 'MIT CSAIL', 'Oxford Martin AI Governance Initiative', 'Princeton University', 'School of Advanced Study University of London', 'Stanford University', 'University of Oxford', 'University of Pennsylvania', 'Vector Institute for Artificial Intelligence'], 'pdf_title_img': 'assets/pdf/title_img/2601.04175.jpg', 'data': {'categories': ['#ethics', '#alignment'], 'emoji': '⚖️', 'ru': {'title': 'Правовое выравнивание: от юридических принципов к надежным AI системам', 'desc': 'Статья исследует правовое выравнивание (legal alignment) — новое направление в области AI, которое использует юридические принципы и методы для обеспечения безопасности и этичности AI систем. Авторы предлагают три основных исследовательских направления: разработка AI систем, соответствующих содержанию правовых норм, адаптация методов юридического толкования для принятия решений AI, и использование правовых концепций как структурной основы для надежности и доверия. Подход требует междисциплинарного сотрудничества между специалистами в области права и компьютерных наук для создания框架управления и оценки соответствия AI систем действующему законодательству. Это позволяет рассмотреть как специфические законы, применимые к конкретным AI системам, так и практические механизмы их реализации.'}, 'en': {'title': 'Bridging Law and AI for Ethical Alignment', 'desc': 'This paper introduces the concept of legal alignment, which integrates legal principles into the design of AI systems to ensure they operate safely and ethically. It identifies three key research directions: ensuring AI compliance with legal rules, applying legal reasoning methods to AI decision-making, and using legal frameworks to enhance AI reliability and trust. The authors argue that leveraging legal knowledge can help address the normative and technical challenges of AI alignment. This interdisciplinary approach encourages collaboration between legal experts and computer scientists to create AI systems that adhere to established legal standards.'}, 'zh': {'title': '法律与人工智能的完美结合', 'desc': '法律对齐研究如何利用法律原则和方法指导人工智能系统的设计，以确保其安全性、伦理性和合规性。该研究主要集中在三个方向：一是设计符合合法机构和程序制定的法律规则的人工智能系统；二是借鉴法律解释的方法来指导人工智能系统的推理和决策；三是利用法律概念作为应对人工智能系统可靠性、信任和合作挑战的结构蓝图。这一新兴领域为法律、计算机科学等多个学科的合作提供了机会，以共同设计更好的人工智能。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.03252', 'title': 'InfiniDepth: Arbitrary-Resolution and Fine-Grained Depth Estimation with Neural Implicit Fields', 'url': 'https://huggingface.co/papers/2601.03252', 'abstract': "InfiniDepth represents depth as neural implicit fields using a local implicit decoder, enabling continuous 2D coordinate querying for arbitrary-resolution depth estimation and superior performance in fine-detail regions.  \t\t\t\t\tAI-generated summary \t\t\t\t Existing depth estimation methods are fundamentally limited to predicting depth on discrete image grids. Such representations restrict their scalability to arbitrary output resolutions and hinder the geometric detail recovery. This paper introduces InfiniDepth, which represents depth as neural implicit fields. Through a simple yet effective local implicit decoder, we can query depth at continuous 2D coordinates, enabling arbitrary-resolution and fine-grained depth estimation. To better assess our method's capabilities, we curate a high-quality 4K synthetic benchmark from five different games, spanning diverse scenes with rich geometric and appearance details. Extensive experiments demonstrate that InfiniDepth achieves state-of-the-art performance on both synthetic and real-world benchmarks across relative and metric depth estimation tasks, particularly excelling in fine-detail regions. It also benefits the task of novel view synthesis under large viewpoint shifts, producing high-quality results with fewer holes and artifacts.", 'score': 71, 'issue_id': 448, 'pub_date': '2026-01-06', 'pub_date_card': {'ru': '6 января', 'en': 'January 6', 'zh': '1月6日'}, 'hash': '5aa0bd49032ba917', 'authors': ['Hao Yu', 'Haotong Lin', 'Jiawei Wang', 'Jiaxin Li', 'Yida Wang', 'Xueyang Zhang', 'Yue Wang', 'Xiaowei Zhou', 'Ruizhen Hu', 'Sida Peng'], 'affiliations': ['Li Auto', 'Shenzhen University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2601.03252.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#cv'], 'emoji': '🌊', 'ru': {'title': 'Непрерывные нейронные поля для глубины бесконечного разрешения', 'desc': 'Работа представляет InfiniDepth — метод оценки глубины, основанный на нейронных неявных полях вместо традиционных дискретных сеток. Используя локальный неявный декодер, система может запрашивать значения глубины в произвольных двумерных координатах, что позволяет получать оценки глубины в любом разрешении. Авторы создали высококачественный синтетический бенчмарк в разрешении 4K для оценки метода на сложных сценах с богатыми геометрическими деталями. Экспериментальные результаты показывают, что метод достигает лучшей производительности на синтетических и реальных данных, особенно при восстановлении мелких деталей и синтезе новых видов с большими изменениями угла обзора.'}, 'en': {'title': 'Revolutionizing Depth Estimation with Neural Implicit Fields', 'desc': "InfiniDepth introduces a novel approach to depth estimation by utilizing neural implicit fields, which allows for continuous querying of depth at any 2D coordinate. This method overcomes the limitations of traditional depth estimation techniques that rely on discrete image grids, enabling it to produce depth maps at arbitrary resolutions. The local implicit decoder enhances the model's ability to capture fine geometric details, making it particularly effective in complex scenes. Extensive testing on a high-quality 4K synthetic benchmark demonstrates that InfiniDepth outperforms existing methods in both synthetic and real-world scenarios, especially in areas requiring detailed depth recovery."}, 'zh': {'title': 'InfiniDepth：突破深度估计的分辨率限制', 'desc': 'InfiniDepth 是一种将深度表示为神经隐式场的方法，使用局部隐式解码器来实现。这种方法允许在连续的二维坐标上查询深度，从而实现任意分辨率的深度估计，并在细节区域表现出色。与传统的深度估计方法相比，InfiniDepth 解决了在离散图像网格上预测深度的限制，能够更好地恢复几何细节。通过在五款不同游戏中创建的高质量4K合成基准，实验表明该方法在合成和真实世界基准测试中均表现出色，尤其是在细节丰富的区域。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.01554', 'title': 'MOSS Transcribe Diarize: Accurate Transcription with Speaker Diarization', 'url': 'https://huggingface.co/papers/2601.01554', 'abstract': 'A unified multimodal large language model for end-to-end speaker-attributed, time-stamped transcription with extended context window and strong generalization across benchmarks.  \t\t\t\t\tAI-generated summary \t\t\t\t Speaker-Attributed, Time-Stamped Transcription (SATS) aims to transcribe what is said and to precisely determine the timing of each speaker, which is particularly valuable for meeting transcription. Existing SATS systems rarely adopt an end-to-end formulation and are further constrained by limited context windows, weak long-range speaker memory, and the inability to output timestamps. To address these limitations, we present MOSS Transcribe Diarize, a unified multimodal large language model that jointly performs Speaker-Attributed, Time-Stamped Transcription in an end-to-end paradigm. Trained on extensive real wild data and equipped with a 128k context window for up to 90-minute inputs, MOSS Transcribe Diarize scales well and generalizes robustly. Across comprehensive evaluations, it outperforms state-of-the-art commercial systems on multiple public and in-house benchmarks.', 'score': 45, 'issue_id': 448, 'pub_date': '2026-01-04', 'pub_date_card': {'ru': '4 января', 'en': 'January 4', 'zh': '1月4日'}, 'hash': 'ee4ff0d589b12acd', 'authors': ['MOSI. AI', 'Donghua Yu', 'Zhengyuan Lin', 'Chen Yang', 'Yiyang Zhang', 'Hanfu Chen', 'Jingqi Chen', 'Ke Chen', 'Liwei Fan', 'Yi Jiang', 'Jie Zhu', 'Muchen Li', 'Wenxuan Wang', 'Yang Wang', 'Zhe Xu', 'Yitian Gong', 'Yuqian Zhang', 'Wenbo Zhang', 'Zhaoye Fei', 'Qinyuan Cheng', 'Shimin Li', 'Xipeng Qiu'], 'affiliations': ['MOSI.AI'], 'pdf_title_img': 'assets/pdf/title_img/2601.01554.jpg', 'data': {'categories': ['#multimodal', '#audio', '#benchmark'], 'emoji': '🎙️', 'ru': {'title': 'Единая модель для сквозной транскрипции речи с атрибуцией говорящих и временными отметками', 'desc': 'В работе представлена мультимодальная большая языковая модель MOSS Transcribe Diarize, которая выполняет сквозную транскрипцию речи с атрибуцией говорящих и временными метками в едином end-to-end подходе. Модель использует расширенный контекстное окно из 128k токенов, что позволяет обрабатывать аудиозаписи продолжительностью до 90 минут с сохранением информации о дальних зависимостях между высказываниями разных говорящих. Система обучалась на больших объемах реальных данных и демонстрирует надежную обобщающую способность на различные наборы данных. Экспериментальные результаты показывают, что предложенный подход превосходит существующие коммерческие системы по ключевым метрикам качества на публичных и закрытых бенчмарках.'}, 'en': {'title': 'Revolutionizing Transcription with MOSS: Accurate, Context-Aware, and Speaker-Savvy!', 'desc': 'This paper introduces MOSS Transcribe Diarize, a large language model designed for Speaker-Attributed, Time-Stamped Transcription (SATS). It addresses the limitations of existing systems by providing an end-to-end solution that can handle long context windows and accurately track multiple speakers over extended periods. The model is trained on diverse real-world data, allowing it to generalize effectively across various benchmarks. Evaluation results show that MOSS Transcribe Diarize surpasses current leading commercial transcription systems in performance.'}, 'zh': {'title': '统一多模态模型，精准转录与时间标记', 'desc': '本文介绍了一种统一的多模态大语言模型，名为MOSS Transcribe Diarize，旨在实现端到端的说话者归属和时间戳转录。该模型克服了现有系统在上下文窗口、长时间说话者记忆和时间戳输出方面的局限性。MOSS Transcribe Diarize经过大量真实数据训练，能够处理长达90分钟的输入，并且在多个基准测试中表现优于现有的商业系统。该模型的强大泛化能力使其在会议转录等应用中具有重要价值。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.03233', 'title': 'LTX-2: Efficient Joint Audio-Visual Foundation Model', 'url': 'https://huggingface.co/papers/2601.03233', 'abstract': 'LTX-2 is an open-source audiovisual diffusion model that generates synchronized video and audio content using a dual-stream transformer architecture with cross-modal attention and classifier-free guidance.  \t\t\t\t\tAI-generated summary \t\t\t\t Recent text-to-video diffusion models can generate compelling video sequences, yet they remain silent -- missing the semantic, emotional, and atmospheric cues that audio provides. We introduce LTX-2, an open-source foundational model capable of generating high-quality, temporally synchronized audiovisual content in a unified manner. LTX-2 consists of an asymmetric dual-stream transformer with a 14B-parameter video stream and a 5B-parameter audio stream, coupled through bidirectional audio-video cross-attention layers with temporal positional embeddings and cross-modality AdaLN for shared timestep conditioning. This architecture enables efficient training and inference of a unified audiovisual model while allocating more capacity for video generation than audio generation. We employ a multilingual text encoder for broader prompt understanding and introduce a modality-aware classifier-free guidance (modality-CFG) mechanism for improved audiovisual alignment and controllability. Beyond generating speech, LTX-2 produces rich, coherent audio tracks that follow the characters, environment, style, and emotion of each scene -- complete with natural background and foley elements. In our evaluations, the model achieves state-of-the-art audiovisual quality and prompt adherence among open-source systems, while delivering results comparable to proprietary models at a fraction of their computational cost and inference time. All model weights and code are publicly released.', 'score': 38, 'issue_id': 448, 'pub_date': '2026-01-06', 'pub_date_card': {'ru': '6 января', 'en': 'January 6', 'zh': '1月6日'}, 'hash': '67090a5585a6a40e', 'authors': ['Yoav HaCohen', 'Benny Brazowski', 'Nisan Chiprut', 'Yaki Bitterman', 'Andrew Kvochko', 'Avishai Berkowitz', 'Daniel Shalem', 'Daphna Lifschitz', 'Dudu Moshe', 'Eitan Porat', 'Eitan Richardson', 'Guy Shiran', 'Itay Chachy', 'Jonathan Chetboun', 'Michael Finkelson', 'Michael Kupchick', 'Nir Zabari', 'Nitzan Guetta', 'Noa Kotler', 'Ofir Bibi', 'Ori Gordon', 'Poriya Panet', 'Roi Benita', 'Shahar Armon', 'Victor Kulikov', 'Yaron Inger', 'Yonatan Shiftan', 'Zeev Melumian', 'Zeev Farbman'], 'affiliations': ['Lightricks'], 'pdf_title_img': 'assets/pdf/title_img/2601.03233.jpg', 'data': {'categories': ['#video', '#multimodal', '#audio', '#open_source', '#architecture', '#diffusion', '#training'], 'emoji': '🎬', 'ru': {'title': 'Синхронная генерация видео и звука в едином потоке', 'desc': 'LTX-2 — это открытая модель диффузии, которая генерирует видео и аудио одновременно, используя двухпоточную архитектуру трансформера с кросс-модальным вниманием. Модель состоит из асимметричного трансформера с большим потоком для видео (14 млрд параметров) и меньшим потоком для аудио (5 млрд параметров), связанными через взаимное кросс-внимание. Авторы применяют специальный механизм classifier-free guidance для лучшего выравнивания аудиовизуального контента и предлагают многоязычный текстовый кодировщик для понимания подсказок. Модель достигает лучшего качества среди открытых систем и сравнима с коммерческими решениями, но работает быстрее и требует меньше вычислительных ресурсов.'}, 'en': {'title': 'LTX-2: Synchronized Audiovisual Generation Made Easy!', 'desc': 'LTX-2 is an innovative open-source model designed to generate synchronized video and audio content using a dual-stream transformer architecture. It features a 14B-parameter video stream and a 5B-parameter audio stream, which work together through cross-modal attention to create high-quality audiovisual outputs. The model employs a multilingual text encoder for better understanding of prompts and utilizes a modality-aware classifier-free guidance mechanism to enhance the alignment between audio and video. With its efficient design, LTX-2 achieves state-of-the-art audiovisual quality while being accessible and cost-effective compared to proprietary alternatives.'}, 'zh': {'title': 'LTX-2：同步生成高质量视听内容的开源模型', 'desc': 'LTX-2是一个开源的视听扩散模型，能够生成同步的视频和音频内容。它采用了双流变换器架构，结合了跨模态注意力机制和无分类器引导。该模型的设计使得视频生成的能力大于音频生成，同时实现了高质量的视听内容生成。LTX-2在生成自然背景音效和符合场景情感的音轨方面表现出色，且在开源系统中达到了最先进的视听质量。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.22334', 'title': 'SciEvalKit: An Open-source Evaluation Toolkit for Scientific General Intelligence', 'url': 'https://huggingface.co/papers/2512.22334', 'abstract': 'SciEvalKit is a unified benchmarking toolkit for evaluating AI models across scientific disciplines, focusing on core scientific intelligence competencies and supporting diverse domains from physics to materials science.  \t\t\t\t\tAI-generated summary \t\t\t\t We introduce SciEvalKit, a unified benchmarking toolkit designed to evaluate AI models for science across a broad range of scientific disciplines and task capabilities. Unlike general-purpose evaluation platforms, SciEvalKit focuses on the core competencies of scientific intelligence, including Scientific Multimodal Perception, Scientific Multimodal Reasoning, Scientific Multimodal Understanding, Scientific Symbolic Reasoning, Scientific Code Generation, Science Hypothesis Generation and Scientific Knowledge Understanding. It supports six major scientific domains, spanning from physics and chemistry to astronomy and materials science. SciEvalKit builds a foundation of expert-grade scientific benchmarks, curated from real-world, domain-specific datasets, ensuring that tasks reflect authentic scientific challenges. The toolkit features a flexible, extensible evaluation pipeline that enables batch evaluation across models and datasets, supports custom model and dataset integration, and provides transparent, reproducible, and comparable results. By bridging capability-based evaluation and disciplinary diversity, SciEvalKit offers a standardized yet customizable infrastructure to benchmark the next generation of scientific foundation models and intelligent agents. The toolkit is open-sourced and actively maintained to foster community-driven development and progress in AI4Science.', 'score': 28, 'issue_id': 453, 'pub_date': '2026-12-26', 'pub_date_card': {'ru': '26 декабря', 'en': 'December 26', 'zh': '12月26日'}, 'hash': 'cc7b56f32bc290be', 'authors': ['Yiheng Wang', 'Yixin Chen', 'Shuo Li', 'Yifan Zhou', 'Bo Liu', 'Hengjian Gao', 'Jiakang Yuan', 'Jia Bu', 'Wanghan Xu', 'Yuhao Zhou', 'Xiangyu Zhao', 'Zhiwang Zhou', 'Fengxiang Wang', 'Haodong Duan', 'Songyang Zhang', 'Jun Yao', 'Han Deng', 'Yizhou Wang', 'Jiabei Xiao', 'Jiaqi Liu', 'Encheng Su', 'Yujie Liu', 'Weida Wang', 'Junchi Yao', 'Shenghe Zheng', 'Haoran Sun', 'Runmin Ma', 'Xiangchao Yan', 'Bo Zhang', 'Dongzhan Zhou', 'Shufei Zhang', 'Peng Ye', 'Xiaosong Wang', 'Shixiang Tang', 'Wenlong Zhang', 'Lei Bai'], 'affiliations': ['Shanghai Artificial Intelligence Laboratory'], 'pdf_title_img': 'assets/pdf/title_img/2512.22334.jpg', 'data': {'categories': ['#survey', '#benchmark', '#multimodal', '#science', '#dataset', '#plp', '#open_source'], 'emoji': '🧪', 'ru': {'title': 'Единая платформа для оценки научного интеллекта AI моделей', 'desc': 'SciEvalKit представляет собой универсальный набор инструментов для оценки AI моделей в различных научных дисциплинах. Набор включает семь ключевых компетенций научного интеллекта: мультимодальное восприятие, рассуждение, понимание, символические вычисления, генерацию кода и выдвижение гипотез. Платформа охватывает шесть научных областей от физики до материаловедения, используя экспертные бенчмарки на основе реальных данных. SciEvalKit предоставляет гибкий и расширяемый конвейер оценки с поддержкой пользовательских моделей и прозрачными результатами для стандартизации тестирования научных фундаментальных моделей.'}, 'en': {'title': 'Benchmarking AI for Scientific Excellence', 'desc': 'SciEvalKit is a benchmarking toolkit specifically designed to evaluate AI models in various scientific fields. It emphasizes core competencies of scientific intelligence, such as multimodal perception and reasoning, and supports diverse domains like physics and materials science. The toolkit provides expert-grade benchmarks based on real-world datasets, ensuring that evaluations reflect genuine scientific challenges. With its flexible evaluation pipeline, SciEvalKit allows for batch evaluations and custom integrations, promoting transparency and reproducibility in AI assessments.'}, 'zh': {'title': 'SciEvalKit：科学智能模型评估的统一工具', 'desc': 'SciEvalKit是一个统一的基准工具包，旨在评估科学领域的人工智能模型。它专注于科学智能的核心能力，包括多模态感知、推理和理解等。该工具包支持从物理学到材料科学等六个主要科学领域，确保任务反映真实的科学挑战。SciEvalKit提供灵活的评估流程，支持批量评估和自定义模型集成，促进AI在科学领域的发展。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.03193', 'title': 'UniCorn: Towards Self-Improving Unified Multimodal Models through Self-Generated Supervision', 'url': 'https://huggingface.co/papers/2601.03193', 'abstract': 'UniCorn, a self-improvement framework for unified multimodal models, addresses generation gaps through self-play and cognitive pattern reconstruction, achieving state-of-the-art results in text-to-image generation.  \t\t\t\t\tAI-generated summary \t\t\t\t While Unified Multimodal Models (UMMs) have achieved remarkable success in cross-modal comprehension, a significant gap persists in their ability to leverage such internal knowledge for high-quality generation. We formalize this discrepancy as Conduction Aphasia, a phenomenon where models accurately interpret multimodal inputs but struggle to translate that understanding into faithful and controllable synthesis. To address this, we propose UniCorn, a simple yet elegant self-improvement framework that eliminates the need for external data or teacher supervision. By partitioning a single UMM into three collaborative roles: Proposer, Solver, and Judge, UniCorn generates high-quality interactions via self-play and employs cognitive pattern reconstruction to distill latent understanding into explicit generative signals. To validate the restoration of multimodal coherence, we introduce UniCycle, a cycle-consistency benchmark based on a Text to Image to Text reconstruction loop. Extensive experiments demonstrate that UniCorn achieves comprehensive and substantial improvements over the base model across six general image generation benchmarks. Notably, it achieves SOTA performance on TIIF(73.8), DPG(86.8), CompBench(88.5), and UniCycle while further delivering substantial gains of +5.0 on WISE and +6.5 on OneIG. These results highlight that our method significantly enhances T2I generation while maintaining robust comprehension, demonstrating the scalability of fully self-supervised refinement for unified multimodal intelligence.', 'score': 25, 'issue_id': 450, 'pub_date': '2026-01-06', 'pub_date_card': {'ru': '6 января', 'en': 'January 6', 'zh': '1月6日'}, 'hash': '605fda1659be845f', 'authors': ['Ruiyan Han', 'Zhen Fang', 'XinYu Sun', 'Yuchen Ma', 'Ziheng Wang', 'Yu Zeng', 'Zehui Chen', 'Lin Chen', 'Wenxuan Huang', 'Wei-Jie Xu', 'Yi Cao', 'Feng Zhao'], 'affiliations': ['CUHK', 'ECNU', 'FDU', 'MoE Key Lab of BIPC, USTC', 'NJU', 'SUDA'], 'pdf_title_img': 'assets/pdf/title_img/2601.03193.jpg', 'data': {'categories': ['#training', '#benchmark', '#multimodal'], 'emoji': '🦄', 'ru': {'title': 'Самообучение мультимодальных моделей через самоигру и когнитивную реконструкцию', 'desc': 'UniCorn — это фреймворк самосовершенствования для унифицированных мультимодальных моделей, которые хорошо понимают текст и изображения, но плохо их генерируют. Авторы решают эту проблему, разделяя единую модель на три роли (генератор предложений, решатель и судья), которые взаимодействуют через самоигру и реконструкцию когнитивных паттернов. Метод не требует внешних данных или учителя, а использует только внутренние знания модели для улучшения качества синтеза изображений. Экспериментально доказано, что UniCorn достигает лучших результатов на нескольких бенчмарках текст-в-изображение и значительно повышает производительность модели в задачах генерации.'}, 'en': {'title': 'UniCorn: Bridging the Gap in Multimodal Generation', 'desc': 'UniCorn is a self-improvement framework designed for unified multimodal models (UMMs) that enhances their ability to generate high-quality outputs from multimodal inputs. It addresses the issue of Conduction Aphasia, where models can understand inputs but fail to produce accurate outputs. By using a self-play mechanism and cognitive pattern reconstruction, UniCorn allows the model to refine its generative capabilities without needing external data or supervision. The framework has shown significant improvements in text-to-image generation tasks, achieving state-of-the-art results across multiple benchmarks.'}, 'zh': {'title': 'UniCorn：自我改进的统一多模态生成框架', 'desc': 'UniCorn是一个自我改进框架，旨在解决统一多模态模型在生成质量上的差距。它通过自我对弈和认知模式重构，提升文本到图像生成的效果。该框架将单一的统一多模态模型分为提议者、解决者和评判者三个协作角色，从而实现高质量的交互。实验结果表明，UniCorn在多个图像生成基准上显著提高了性能，展示了完全自我监督的改进方法在统一多模态智能中的可扩展性。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.02427', 'title': 'NitroGen: An Open Foundation Model for Generalist Gaming Agents', 'url': 'https://huggingface.co/papers/2601.02427', 'abstract': 'NitroGen is a vision-action foundation model trained on extensive gameplay data that demonstrates strong cross-game generalization and effective transfer learning capabilities.  \t\t\t\t\tAI-generated summary \t\t\t\t We introduce NitroGen, a vision-action foundation model for generalist gaming agents that is trained on 40,000 hours of gameplay videos across more than 1,000 games. We incorporate three key ingredients: 1) an internet-scale video-action dataset constructed by automatically extracting player actions from publicly available gameplay videos, 2) a multi-game benchmark environment that can measure cross-game generalization, and 3) a unified vision-action model trained with large-scale behavior cloning. NitroGen exhibits strong competence across diverse domains, including combat encounters in 3D action games, high-precision control in 2D platformers, and exploration in procedurally generated worlds. It transfers effectively to unseen games, achieving up to 52% relative improvement in task success rates over models trained from scratch. We release the dataset, evaluation suite, and model weights to advance research on generalist embodied agents.', 'score': 22, 'issue_id': 448, 'pub_date': '2026-01-04', 'pub_date_card': {'ru': '4 января', 'en': 'January 4', 'zh': '1月4日'}, 'hash': '047ac149d2360ba0', 'authors': ['Loïc Magne', 'Anas Awadalla', 'Guanzhi Wang', 'Yinzhen Xu', 'Joshua Belofsky', 'Fengyuan Hu', 'Joohwan Kim', 'Ludwig Schmidt', 'Georgia Gkioxari', 'Jan Kautz', 'Yisong Yue', 'Yejin Choi', 'Yuke Zhu', 'Linxi "Jim" Fan'], 'affiliations': ['Caltech', 'NVIDIA', 'Stanford', 'UChicago', 'UT Austin'], 'pdf_title_img': 'assets/pdf/title_img/2601.02427.jpg', 'data': {'categories': ['#cv', '#transfer_learning', '#dataset', '#open_source', '#robotics', '#benchmark', '#games', '#agents', '#training'], 'emoji': '🎮', 'ru': {'title': 'Универсальный игровой агент, который учится переносить знания между игровыми мирами', 'desc': 'NitroGen — это модель-основание для видео и действий, обученная на 40 тысячах часов геймплея из более чем 1000 игр. Модель использует три ключевых компонента: большой датасет видео-действий, автоматически извлечённый из публичных видео, мультиигровой бенчмарк для измерения обобщения между играми и глубокую нейронную сеть, натренированную методом behavior cloning. Агент демонстрирует высокую компетентность в разнообразных игровых жанрах — от боевых действий в 3D-играх до точного управления в платформерах и исследования процедурно генерируемых миров. Модель успешно переносится на неизвестные игры, достигая улучшения в 52% по сравнению с моделями, обученными с нуля.'}, 'en': {'title': 'NitroGen: A Game-Changing AI for Cross-Game Mastery', 'desc': "NitroGen is a foundation model designed for gaming that learns from a vast amount of gameplay data, specifically 40,000 hours of videos from over 1,000 different games. It utilizes a large-scale dataset created by extracting player actions from these videos, allowing it to understand various gaming scenarios. The model is evaluated in a multi-game environment to test its ability to generalize across different games, showing significant improvements in performance compared to models that start from scratch. NitroGen's capabilities include handling complex tasks in various game genres, making it a valuable resource for developing generalist AI agents in gaming."}, 'zh': {'title': 'NitroGen：通用游戏代理的视觉-动作模型', 'desc': 'NitroGen是一种视觉-动作基础模型，专为通用游戏代理而设计，经过超过40,000小时的游戏视频训练，涵盖了1,000多款游戏。该模型利用了三个关键要素：一个通过自动提取玩家动作构建的互联网规模视频-动作数据集，一个可以测量跨游戏泛化能力的多游戏基准环境，以及一个通过大规模行为克隆训练的统一视觉-动作模型。NitroGen在多种领域表现出色，包括3D动作游戏中的战斗、2D平台游戏中的高精度控制，以及程序生成世界中的探索。它在未见过的游戏中有效转移，任务成功率相比从零开始训练的模型提高了52%。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.03044', 'title': 'SOP: A Scalable Online Post-Training System for Vision-Language-Action Models', 'url': 'https://huggingface.co/papers/2601.03044', 'abstract': 'A scalable online post-training system enables real-world robot policy adaptation through distributed, multi-task learning that maintains generality while improving task proficiency.  \t\t\t\t\tAI-generated summary \t\t\t\t Vision-language-action (VLA) models achieve strong generalization through large-scale pre-training, but real-world deployment requires expert-level task proficiency in addition to broad generality. Existing post-training approaches for VLA models are typically offline, single-robot, or task-specific, limiting effective on-policy adaptation and scalable learning from real-world interaction. We introduce a Scalable Online Post-training (SOP) system that enables online, distributed, multi-task post-training of generalist VLA models directly in the physical world. SOP tightly couples execution and learning through a closed-loop architecture in which a fleet of robots continuously streams on-policy experience and human intervention signals to a centralized cloud learner, and asynchronously receives updated policies. This design supports prompt on-policy correction, scales experience collection through parallel deployment, and preserves generality during adaptation. SOP is agnostic to the choice of post-training algorithm; we instantiate it with both interactive imitation learning (HG-DAgger) and reinforcement learning (RECAP). Across a range of real-world manipulation tasks including cloth folding, box assembly, and grocery restocking, we show that SOP substantially improves the performance of large pretrained VLA models while maintaining a single shared policy across tasks. Effective post-training can be achieved within hours of real-world interaction, and performance scales near-linearly with the number of robots in the fleet. These results suggest that tightly coupling online learning with fleet-scale deployment is instrumental to enabling efficient, reliable, and scalable post-training of generalist robot policies in the physical world.', 'score': 19, 'issue_id': 451, 'pub_date': '2026-01-06', 'pub_date_card': {'ru': '6 января', 'en': 'January 6', 'zh': '1月6日'}, 'hash': 'abef7b7da8b389a8', 'authors': ['Mingjie Pan', 'Siyuan Feng', 'Qinglin Zhang', 'Xinchen Li', 'Jianheng Song', 'Chendi Qu', 'Yi Wang', 'Chuankang Li', 'Ziyu Xiong', 'Zhi Chen', 'Yi Liu', 'Jianlan Luo'], 'affiliations': ['Agibot Research', 'Shanghai Innovation Institute'], 'pdf_title_img': 'assets/pdf/title_img/2601.03044.jpg', 'data': {'categories': ['#multimodal', '#robotics', '#rl', '#training'], 'emoji': '🤖', 'ru': {'title': 'Масштабируемое онлайн-обучение обобщённых робототехнических политик через распределённое взаимодействие с реальностью', 'desc': 'В работе представлена система Scalable Online Post-training (SOP) для адаптации больших визуально-языковых-действийных (VLA) моделей робота в реальном мире. Система использует распределённое обучение с подкреплением и имитационное обучение, где флот роботов непрерывно собирает данные on-policy и отправляет их в облачный центр обучения, который асинхронно обновляет политику. Ключевая особенность SOP заключается в том, что она поддерживает обучение на нескольких задачах одновременно, сохраняя обобщающую способность исходной модели при значительном улучшении производительности на конкретных задачах манипулирования. Результаты показывают, что эффективное дообучение достигается за часы взаимодействия с реальным миром, а производительность масштабируется почти линейно с количеством роботов в группе.'}, 'en': {'title': 'Scalable Learning for Real-World Robot Adaptation', 'desc': 'This paper presents a Scalable Online Post-training (SOP) system designed for improving robot policy adaptation in real-world scenarios. SOP allows multiple robots to learn and adapt their tasks simultaneously by continuously sharing their experiences and receiving updates from a centralized cloud learner. The system maintains the generality of the models while enhancing their proficiency in specific tasks through a closed-loop architecture. By utilizing both interactive imitation learning and reinforcement learning, SOP demonstrates significant performance improvements across various manipulation tasks, achieving effective post-training in just hours of real-world interaction.'}, 'zh': {'title': '可扩展的在线后训练系统提升机器人策略适应能力', 'desc': '本文介绍了一种可扩展的在线后训练系统（SOP），旨在通过分布式多任务学习实现机器人策略的适应。该系统能够在物理世界中直接进行在线后训练，结合执行与学习，支持机器人实时收集经验并进行策略更新。SOP在多个真实操作任务中表现出色，如折叠衣物、组装盒子和补货，同时保持任务间的共享策略。研究表明，在线学习与大规模部署的紧密结合对于提高通用机器人策略的效率和可靠性至关重要。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.02785', 'title': 'DreamStyle: A Unified Framework for Video Stylization', 'url': 'https://huggingface.co/papers/2601.02785', 'abstract': 'DreamStyle is a unified video stylization framework that supports multiple style conditions while addressing style inconsistency and temporal flicker through a specialized data curation pipeline and LoRA training approach.  \t\t\t\t\tAI-generated summary \t\t\t\t Video stylization, an important downstream task of video generation models, has not yet been thoroughly explored. Its input style conditions typically include text, style image, and stylized first frame. Each condition has a characteristic advantage: text is more flexible, style image provides a more accurate visual anchor, and stylized first frame makes long-video stylization feasible. However, existing methods are largely confined to a single type of style condition, which limits their scope of application. Additionally, their lack of high-quality datasets leads to style inconsistency and temporal flicker. To address these limitations, we introduce DreamStyle, a unified framework for video stylization, supporting (1) text-guided, (2) style-image-guided, and (3) first-frame-guided video stylization, accompanied by a well-designed data curation pipeline to acquire high-quality paired video data. DreamStyle is built on a vanilla Image-to-Video (I2V) model and trained using a Low-Rank Adaptation (LoRA) with token-specific up matrices that reduces the confusion among different condition tokens. Both qualitative and quantitative evaluations demonstrate that DreamStyle is competent in all three video stylization tasks, and outperforms the competitors in style consistency and video quality.', 'score': 17, 'issue_id': 448, 'pub_date': '2026-01-06', 'pub_date_card': {'ru': '6 января', 'en': 'January 6', 'zh': '1月6日'}, 'hash': '64e0b2c2ce043ee6', 'authors': ['Mengtian Li', 'Jinshu Chen', 'Songtao Zhao', 'Wanquan Feng', 'Pengqi Tu', 'Qian He'], 'affiliations': ['Intelligent Creation Lab, ByteDance'], 'pdf_title_img': 'assets/pdf/title_img/2601.02785.jpg', 'data': {'categories': ['#video', '#data', '#dataset', '#optimization', '#training'], 'emoji': '🎨', 'ru': {'title': 'Единая система стилизации видео с поддержкой множественных условий стиля', 'desc': 'DreamStyle — это унифицированная система для стилизации видео, поддерживающая несколько типов условий стиля: текстовое описание, изображение-эталон и стилизованный первый кадр. Авторы решили проблему несоответствия стиля и мерцания кадров через специальный pipeline обработки данных и применение LoRA для тонкой настройки модели. Метод построен на основе Image-to-Video модели с использованием Low-Rank адаптации, содержащей специфичные для токенов матрицы, что минимизирует путаницу между различными условиями. Экспериментальные результаты показывают, что DreamStyle превосходит конкурентов по консистентности стиля и качеству видеовыхода.'}, 'en': {'title': 'Unified Video Stylization with DreamStyle', 'desc': 'DreamStyle is a comprehensive framework for video stylization that allows for multiple input style conditions, including text, style images, and stylized first frames. This approach addresses common issues in video generation, such as style inconsistency and temporal flicker, by utilizing a specialized data curation pipeline to ensure high-quality training data. The framework is based on a standard Image-to-Video (I2V) model and employs Low-Rank Adaptation (LoRA) to effectively manage different style conditions. Evaluations show that DreamStyle excels in maintaining style consistency and producing high-quality videos across all three stylization methods.'}, 'zh': {'title': 'DreamStyle：统一的视频风格化解决方案', 'desc': 'DreamStyle是一个统一的视频风格化框架，支持多种风格条件，同时通过专门的数据策划流程和LoRA训练方法解决风格不一致和时间闪烁的问题。该框架支持文本引导、风格图像引导和首帧引导的视频风格化，充分利用了每种条件的优势。DreamStyle基于传统的图像到视频（I2V）模型，并使用低秩适应（LoRA）进行训练，以减少不同条件标记之间的混淆。经过定性和定量评估，DreamStyle在风格一致性和视频质量方面优于竞争对手。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.02780', 'title': 'MiMo-V2-Flash Technical Report', 'url': 'https://huggingface.co/papers/2601.02780', 'abstract': 'MiMo-V2-Flash is a sparse Mixture-of-Experts model with hybrid attention architecture and efficient distillation technique that achieves strong performance with reduced parameters and improved inference speed.  \t\t\t\t\tAI-generated summary \t\t\t\t We present MiMo-V2-Flash, a Mixture-of-Experts (MoE) model with 309B total parameters and 15B active parameters, designed for fast, strong reasoning and agentic capabilities. MiMo-V2-Flash adopts a hybrid attention architecture that interleaves Sliding Window Attention (SWA) with global attention, with a 128-token sliding window under a 5:1 hybrid ratio. The model is pre-trained on 27 trillion tokens with Multi-Token Prediction (MTP), employi
