ьности моделей.'}, 'en': {'title': 'Improving Multi-Image Understanding and Reasoning with Procedural Data Generation and Attention Masking', 'desc': 'This paper highlights the limitations of Large Vision Language Models (LVLMs) in multi-image understanding and reasoning. It introduces a new benchmark called MIMIC to assess these limitations and reveals that LVLMs struggle to aggregate information across images and track multiple concepts simultaneously. The authors propose two solutions: procedural data generation and attention masking techniques to enhance cross-image aggregation and improve overall performance.'}}}, {'id': 'https://huggingface.co/papers/2601.11354', 'title': 'AstroReason-Bench: Evaluating Unified Agentic Planning across Heterogeneous Space Planning Problems', 'url': 'https://huggingface.co/papers/2601.11354', 'abstract': 'Recent advances in agentic Large Language Models (LLMs) have positioned them as generalist planners capable of reasoning and acting across diverse tasks. However, existing agent benchmarks largely focus on symbolic or weakly grounded environments, leaving their performance in physics-constrained real-world domains underexplored. We introduce AstroReason-Bench, a comprehensive benchmark for evaluating agentic planning in Space Planning Problems (SPP), a family of high-stakes problems with heterogeneous objectives, strict physical constraints, and long-horizon decision-making. AstroReason-Bench integrates multiple scheduling regimes, including ground station communication and agile Earth observation, and provides a unified agent-oriented interaction protocol. Evaluating on a range of state-of-the-art open- and closed-source agentic LLM systems, we find that current agents substantially underperform specialized solvers, highlighting key limitations of generalist planning under realistic constraints. AstroReason-Bench offers a challenging and diagnostic testbed for future agentic research.  \t\t\t\t\tAI-generated summary \t\t\t\t Recent advances in agentic Large Language Models (LLMs) have positioned them as generalist planners capable of reasoning and acting across diverse tasks. However, existing agent benchmarks largely focus on symbolic or weakly grounded environments, leaving their performance in physics-constrained real-world domains underexplored. We introduce AstroReason-Bench, a comprehensive benchmark for evaluating agentic planning in Space Planning Problems (SPP), a family of high-stakes problems with heterogeneous objectives, strict physical constraints, and long-horizon decision-making. AstroReason-Bench integrates multiple scheduling regimes, including ground station communication and agile Earth observation, and provides a unified agent-oriented interaction protocol. Evaluating on a range of state-of-the-art open- and closed-source agentic LLM systems, we find that current agents substantially underperform specialized solvers, highlighting key limitations of generalist planning under realistic constraints. AstroReason-Bench offers a challenging and diagnostic testbed for future agentic research.', 'score': 1, 'issue_id': 552, 'pub_date': '2026-01-16', 'pub_date_card': {'ru': '16 января', 'en': 'January 16', 'zh': '1月16日'}, 'hash': '91ba6b67dda55368', 'github_url': 'https://github.com/Mtrya/astro-reason', 'github_stars': 4, 'authors': ['Weiyi Wang', 'Xinchi Chen', 'Jingjing Gong', 'Xuanjing Huang', 'Xipeng Qiu'], 'affiliations': ['Fudan University', 'OpenMOSS Team', 'Shanghai Innovation Institute'], 'pdf_title_img': 'assets/pdf/title_img/2601.11354.jpg', 'data': {'categories': ['#agent_memory', '#agents', '#reasoning', '#benchmark'], 'emoji': '🚀', 'ru': {'title': 'AstroReason-Bench: испытание агентных LLM в задачах космического планирования', 'desc': 'Статья посвящена созданию нового комплекса испытаний — AstroReason-Bench, предназначенного для оценки возможностей агентных больших языковых моделей (агентных LLM) в решении сложных задач планирования, связанных с космосом и строгими физическими ограничениями. Этот комплекс включает разнообразные режимы планирования, такие как управление коммуникацией наземных станций и гибкое наблюдение Земли из космоса, а также унифицированный протокол взаимодействия агентов. Исследование показывает, что современные универсальные модели планирования значительно уступают специализированным системам при работе в реальных условиях, подчеркивая необходимость дальнейшего развития и адаптации агентных LLM.'}, 'en': {'title': 'AstroReason-Bench: A Benchmark for Agentic Planning in Space Planning Problems', 'desc': 'This paper introduces AstroReason-Bench, a new benchmark designed to evaluate the capabilities of agentic Large Language Models (LLMs) in handling complex, physically constrained real-world problems such as space planning. It focuses on Space Planning Problems (SPP), which involve heterogeneous objectives, strict physical constraints, and long-term decision-making. The benchmark includes various scheduling scenarios like ground station communication and agile Earth observation, providing a unified interaction protocol for agents. The evaluation reveals significant limitations of current generalist LLMs compared to specialized solvers, underscoring the need for further advancements in agentic research.'}}}, {'id': 'https://huggingface.co/papers/2601.11227', 'title': 'Language of Thought Shapes Output Diversity in Large Language Models', 'url': 'https://huggingface.co/papers/2601.11227', 'abstract': "Controlling the language of thought in large language models increases output diversity by leveraging distinct thinking spaces across different languages, with mixed-language sampling providing superior results.  \t\t\t\t\tAI-generated summary \t\t\t\t Output diversity is crucial for Large Language Models as it underpins pluralism and creativity. In this work, we reveal that controlling the language used during model thinking-the language of thought-provides a novel and structural source of output diversity. Our preliminary study shows that different thinking languages occupy distinct regions in a model's thinking space. Based on this observation, we study two repeated sampling strategies under multilingual thinking-Single-Language Sampling and Mixed-Language Sampling-and conduct diversity evaluation on outputs that are controlled to be in English, regardless of the thinking language used. Across extensive experiments, we demonstrate that switching the thinking language from English to non-English languages consistently increases output diversity, with a clear and consistent positive correlation such that languages farther from English in the thinking space yield larger gains. We further show that aggregating samples across multiple thinking languages yields additional improvements through compositional effects, and that scaling sampling with linguistic heterogeneity expands the model's diversity ceiling. Finally, we show that these findings translate into practical benefits in pluralistic alignment scenarios, leading to broader coverage of cultural knowledge and value orientations in LLM outputs. Our code is publicly available at https://github.com/iNLP-Lab/Multilingual-LoT-Diversity.", 'score': 1, 'issue_id': 552, 'pub_date': '2026-01-16', 'pub_date_card': {'ru': '16 января', 'en': 'January 16', 'zh': '1月16日'}, 'hash': 'a590fc798fadb73e', 'github_url': 'https://github.com/iNLP-Lab/Multilingual-LoT-Diversity', 'github_stars': 2, 'authors': ['Shaoyang Xu', 'Wenxuan Zhang'], 'affiliations': ['Singapore University of Technology and Design'], 'pdf_title_img': 'assets/pdf/title_img/2601.11227.jpg', 'data': {'categories': ['#language_of_thought', '#language_modeling', '#output_diversity', '#interpretability', '#multilingual'], 'emoji': '🌍', 'ru': {'title': 'Управление языком мышления в больших языковых моделях для увеличения разнообразия', 'desc': 'В данной работе исследуется влияние использования различных языков мышления на разнообразие выходных данных больших языковых моделей. Было обнаружено, что использование разных языков во время процесса мышления модели позволяет занимать различные области в ее пространстве размышлений, что приводит к увеличению разнообразия выходов. Эксперименты показали, что переключение с английского языка на другие языки дает положительный эффект, причем наибольший прирост наблюдается при использовании языков, наиболее удаленных от английского в пространстве мыслей модели. Дополнительное улучшение достигается за счет объединения образцов из нескольких языков, что подчеркивает важность лингвистического разнообразия для расширения возможностей и разнообразия моделей.'}, 'en': {'title': 'Article', 'desc': ''}}}, {'id': 'https://huggingface.co/papers/2601.10922', 'title': 'What Matters in Data Curation for Multimodal Reasoning? Insights from the DCVLR Challenge', 'url': 'https://huggingface.co/papers/2601.10922', 'abstract': 'Data curation for multimodal reasoning shows that difficulty-based example selection on aligned datasets drives performance gains, while increasing dataset size mainly reduces variance and synthetic augmentation heuristics often degrade performance.  \t\t\t\t\tAI-generated summary \t\t\t\t We study data curation for multimodal reasoning through the NeurIPS 2025 Data Curation for Vision-Language Reasoning (DCVLR) challenge, which isolates dataset selection by fixing the model and training protocol. Using a compact curated dataset derived primarily from Walton Multimodal Cold Start, our submission placed first in the challenge. Through post-competition ablations, we show that difficulty-based example selection on an aligned base dataset is the dominant driver of performance gains. Increasing dataset size does not reliably improve mean accuracy under the fixed training recipe, but mainly reduces run-to-run variance, while commonly used diversity and synthetic augmentation heuristics provide no additional benefit and often degrade performance. These results characterize DCVLR as a saturation-regime evaluation and highlight the central role of alignment and difficulty in data-efficient multimodal reasoning.', 'score': 1, 'issue_id': 560, 'pub_date': '2026-01-16', 'pub_date_card': {'ru': '16 января', 'en': 'January 16', 'zh': '1月16日'}, 'hash': '89cd9e27c2aea55e', 'github_url': '', 'github_stars': 0, 'authors': ['Yosub Shin', 'Michael Buriek', 'Boris Sobolev', 'Pavel Bushuyeu', 'Vikas Kumar', 'Haoyang Xu', 'Samuel Watson', 'Igor Molybog'], 'affiliations': ['Cisco, USA', 'PwC, USA', 'University of Hawaii at Manoa'], 'pdf_title_img': 'assets/pdf/title_img/2601.10922.jpg', 'data': {'categories': ['#reasoning', '#multimodal', '#data', '#interpretability'], 'emoji': '📚', 'ru': {'title': 'Оптимизация данных для эффективной многовекторной рассудительной обработки', 'desc': 'В данной работе исследуется процесс курирования данных для многомодальной рассудительной обработки. Было обнаружено, что выбор примеров на основе сложности в согласованных наборах данных является основным фактором улучшения производительности. Увеличение размера набора данных главным образом снижает вариативность, а синтетические методы увеличения разнообразия часто приводят к ухудшению результатов.'}, 'en': {'title': 'Data Curation for Multimodal Reasoning Insights', 'desc': 'This paper explores how difficulty-based example selection on aligned datasets significantly improves performance in multimodal reasoning tasks. It highlights that increasing dataset size mostly reduces variance rather than improving mean accuracy. Synthetic augmentations often harm performance instead of enhancing it.'}}}, {'id': 'https://huggingface.co/papers/2601.09255', 'title': 'PhyRPR: Training-Free Physics-Constrained Video Generation', 'url': 'https://huggingface.co/papers/2601.09255', 'abstract': 'A three-stage pipeline decouples physical reasoning from visual synthesis in video generation, improving physical plausibility and motion controllability through distinct phases of reasoning, planning, and refinement.  \t\t\t\t\tAI-generated summary \t\t\t\t Recent diffusion-based video generation models can synthesize visually plausible videos, yet they often struggle to satisfy physical constraints. A key reason is that most existing approaches remain single-stage: they entangle high-level physical understanding with low-level visual synthesis, making it hard to generate content that require explicit physical reasoning. To address this limitation, we propose a training-free three-stage pipeline,PhyRPR:Phy\\uline{Reason}--Phy\\uline{Plan}--Phy\\uline{Refine}, which decouples physical understanding from visual synthesis. Specifically, PhyReason uses a large multimodal model for physical state reasoning and an image generator for keyframe synthesis; PhyPlan deterministically synthesizes a controllable coarse motion scaffold; and PhyRefine injects this scaffold into diffusion sampling via a latent fusion strategy to refine appearance while preserving the planned dynamics. This staged design enables explicit physical control during generation. Extensive experiments under physics constraints show that our method consistently improves physical plausibility and motion controllability.', 'score': 1, 'issue_id': 552, 'pub_date': '2026-01-14', 'pub_date_card': {'ru': '14 января', 'en': 'January 14', 'zh': '1月14日'}, 'hash': '4bc3324d676d118d', 'github_url': '', 'github_stars': 0, 'authors': ['Yibo Zhao', 'Hengjia Li', 'Xiaofei He', 'Boxi Wu'], 'affiliations': ['State Key Lab of CAD&CG, Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2601.09255.jpg', 'data': {'categories': ['#diffusion', '#physical_reasoning', '#multimodal', '#3d'], 'emoji': '🔄', 'ru': {'title': 'Трехэтапный подход PhyRPR для повышения физической правдоподобности и контроля движений в видео', 'desc': 'В данной работе предложена трехэтапная архитектура PhyRPR для генерации видео, которая разделяет процессы физического рассуждения и визуального синтеза. На первом этапе PhyReason выполняется физическое рассуждение с использованием многомодальной модели, а на втором этапе PhyPlan синтезируется грубый план движения. Завершающий этап PhyRefine улучшает визуальное представление, сохраняя при этом запланированные физические свойства движений. Такой подход позволяет значительно повысить физическую правдоподобность и управляемость движений в генерируемых видео.'}, 'en': {'title': 'Decoupling Physical Reasoning from Visual Synthesis in Video Generation', 'desc': 'This paper introduces a three-stage pipeline called PhyRPR:Phy Reason-Phy Plan-Phy Refine, which decouples physical reasoning and visual synthesis in video generation. It enhances physical plausibility and motion controllability by separating reasoning, planning, and refinement stages. The PhyReason stage uses a multimodal model for physical state reasoning and an image generator for keyframe synthesis. The PhyPlan stage generates a controllable coarse motion scaffold, and the PhyRefine stage integrates this scaffold into diffusion sampling to refine appearance while maintaining planned dynamics.'}}}, {'id': 'https://huggingface.co/papers/2601.11077', 'title': 'ABC-Bench: Benchmarking Agentic Backend Coding in Real-World Development', 'url': 'https://huggingface.co/papers/2601.11077', 'abstract': 'ABC-Bench evaluates LLM agents on realistic backend coding tasks requiring full development lifecycle management from repository exploration to containerized service deployment and API testing.  \t\t\t\t\tAI-generated summary \t\t\t\t The evolution of Large Language Models (LLMs) into autonomous agents has expanded the scope of AI coding from localized code generation to complex, repository-level, and execution-driven problem solving. However, current benchmarks predominantly evaluate code logic in static contexts, neglecting the dynamic, full-process requirements of real-world engineering, particularly in backend development which demands rigorous environment configuration and service deployment. To address this gap, we introduce ABC-Bench, a benchmark explicitly designed to evaluate agentic backend coding within a realistic, executable workflow. Using a scalable automated pipeline, we curated 224 practical tasks spanning 8 languages and 19 frameworks from open-source repositories. Distinct from previous evaluations, ABC-Bench require the agents to manage the entire development lifecycle from repository exploration to instantiating containerized services and pass the external end-to-end API tests. Our extensive evaluation reveals that even state-of-the-art models struggle to deliver reliable performance on these holistic tasks, highlighting a substantial disparity between current model capabilities and the demands of practical backend engineering. Our code is available at https://github.com/OpenMOSS/ABC-Bench.', 'score': 49, 'issue_id': 579, 'pub_date': '2026-01-16', 'pub_date_card': {'ru': '16 января', 'en': 'January 16', 'zh': '1月16日'}, 'hash': '97497f7535c4d03b', 'github_url': 'https://github.com/OpenMOSS/ABC-Bench', 'github_stars': 8, 'authors': ['Jie Yang', 'Honglin Guo', 'Li Ji', 'Jiazheng Zhou', 'Rui Zheng', 'Zhikai Lei', 'Shuo Zhang', 'Zhiheng Xi', 'Shichun Liu', 'Yuxin Wang', 'Bo Wang', 'Yining Zheng', 'Tao Gui', 'Xipeng Qiu'], 'affiliations': ['Fudan University', 'Shanghai Innovation Institute', 'Shanghai Qĳi Zhifeng Co., Ltd.'], 'pdf_title_img': 'assets/pdf/title_img/2601.11077.jpg', 'data': {'categories': ['#agent_memory', '#benchmark', '#data', '#session_memory', '#games', '#agents'], 'emoji': '💻', 'ru': {'title': 'ABC-Бенч: Оценка агентских способностей LLМ-моделей в полной разработке ПО', 'desc': 'ABC-Бенч — это новый набор задач для оценки возможностей больших языковых моделей в области разработки программного обеспечения на реальном уровне сложности. Он включает полный цикл разработки от изучения репозитория до развертывания контейнеризованных сервисов и тестирования внешних API. В отличие от существующих тестов, которые оценивают только отдельные фрагменты кода, ABC-Бенч проверяет способность моделей эффективно управлять всем процессом разработки, что является важным шагом к их более широкому применению в профессиональной инженерии.'}, 'en': {'title': 'Evaluating Backend Coding Capabilities of LLM Agents via Realistic Development Lifecycle Management', 'desc': "ABC-Bench assesses Large Language Model (LLM) agents' abilities in managing the complete backend coding lifecycle, including repository exploration, containerized service deployment, and API testing. It introduces a new benchmark that goes beyond traditional code logic evaluations by focusing on dynamic, real-world engineering tasks. The benchmark includes 224 diverse tasks across multiple programming languages and frameworks sourced from open-source repositories. This highlights significant gaps in current LLM capabilities compared to practical backend engineering needs."}}}, {'id': 'https://huggingface.co/papers/2601.08808', 'title': 'Multiplex Thinking: Reasoning via Token-wise Branch-and-Merge', 'url': 'https://huggingface.co/papers/2601.08808', 'abstract': 'Multiplex Thinking introduces a stochastic soft reasoning mechanism that samples multiple candidate tokens at each step to optimize reasoning trajectories with reinforcement learning while maintaining shorter sequences than traditional chain-of-thought methods.  \t\t\t\t\tAI-generated summary \t\t\t\t Large language models often solve complex reasoning tasks more effectively with Chain-of-Thought (CoT), but at the cost of long, low-bandwidth token sequences. Humans, by contrast, often reason softly by maintaining a distribution over plausible next steps. Motivated by this, we propose Multiplex Thinking, a stochastic soft reasoning mechanism that, at each thinking step, samples K candidate tokens and aggregates their embeddings into a single continuous multiplex token. This preserves the vocabulary embedding prior and the sampling dynamics of standard discrete generation, while inducing a tractable probability distribution over multiplex rollouts. Consequently, multiplex trajectories can be directly optimized with on-policy reinforcement learning (RL). Importantly, Multiplex Thinking is self-adaptive: when the model is confident, the multiplex token is nearly discrete and behaves like standard CoT; when it is uncertain, it compactly represents multiple plausible next steps without increasing sequence length. Across challenging math reasoning benchmarks, Multiplex Thinking consistently outperforms strong discrete CoT and RL baselines from Pass@1 through Pass@1024, while producing shorter sequences. The code and checkpoints are available at https://github.com/GMLR-Penn/Multiplex-Thinking.', 'score': 26, 'issue_id': 579, 'pub_date': '2026-01-13', 'pub_date_card': {'ru': '13 января', 'en': 'January 13', 'zh': '1月13日'}, 'hash': '0a64241c20f7b28c', 'github_url': 'https://github.com/GMLR-Penn/Multiplex-Thinking', 'github_stars': 48, 'authors': ['Yao Tang', 'Li Dong', 'Yaru Hao', 'Qingxiu Dong', 'Furu Wei', 'Jiatao Gu'], 'affiliations': ['Microsoft Research', 'University of Pennsylvania'], 'pdf_title_img': 'assets/pdf/title_img/2601.08808.jpg', 'data': {'categories': ['#context_window', '#optimization', '#retrieval', '#reasoning', '#rl'], 'emoji': '🧠', 'ru': {'title': 'Multiplex Thinking: Мягкие Рассуждения для Улучшения Эффективности Моделей ИИ', 'desc': 'Статья описывает механизм Multiplex Thinking, который представляет собой стохастическую мягкую технику рассуждений для моделей машинного обучения на основе больших языковых моделей. Этот подход позволяет одновременно генерировать несколько кандидатов ответов в каждом шаге рассуждения и затем объединяет их в единый токен, что сохраняет преимущества стандартного метода цепочки размышлений при сокращении длины последовательности. В результате модель может более эффективно решать сложные задачи математического рассуждения с использованием методов подкрепления обучения на траекториях рассуждений.'}, 'en': {'title': 'Soft Reasoning via Stochastic Sampling for Efficient Math Reasoning Tasks', 'desc': 'Multiplex Thinking employs a stochastic soft reasoning mechanism where it samples multiple candidate tokens at each step using reinforcement learning to optimize reasoning trajectories. It maintains shorter sequences compared to traditional Chain-of-Thought methods by aggregating embeddings into a single multiplex token. This approach allows for a tractable probability distribution over multiplex rollouts, enabling efficient optimization. The method is adaptive, becoming nearly discrete when confident and representing multiple plausible next steps when uncertain.'}}}, {'id': 'https://huggingface.co/papers/2601.10387', 'title': 'The Assistant Axis: Situating and Stabilizing the Default Persona of Language Models', 'url': 'https://huggingface.co/papers/2601.10387', 'abstract': 'Research reveals that large language models operate within a persona space where an "Assistant Axis" controls helpfulness and behavioral stability, with steering techniques able to influence model responses and prevent harmful behavior drift.  \t\t\t\t\tAI-generated summary \t\t\t\t Large language models can represent a variety of personas but typically default to a helpful Assistant identity cultivated during post-training. We investigate the structure of the space of model personas by extracting activation directions corresponding to diverse character archetypes. Across several different models, we find that the leading component of this persona space is an "Assistant Axis," which captures the extent to which a model is operating in its default Assistant mode. Steering towards the Assistant direction reinforces helpful and harmless behavior; steering away increases the model\'s tendency to identify as other entities. Moreover, steering away with more extreme values often induces a mystical, theatrical speaking style. We find this axis is also present in pre-trained models, where it primarily promotes helpful human archetypes like consultants and coaches and inhibits spiritual ones. Measuring deviations along the Assistant Axis predicts "persona drift," a phenomenon where models slip into exhibiting harmful or bizarre behaviors that are uncharacteristic of their typical persona. We find that persona drift is often driven by conversations demanding meta-reflection on the model\'s processes or featuring emotionally vulnerable users. We show that restricting activations to a fixed region along the Assistant Axis can stabilize model behavior in these scenarios -- and also in the face of adversarial persona-based jailbreaks. Our results suggest that post-training steers models toward a particular region of persona space but only loosely tethers them to it, motivating work on training and steering strategies that more deeply anchor models to a coherent persona.', 'score': 5, 'issue_id': 579, 'pub_date': '2026-01-15', 'pub_date_card': {'ru': '15 января', 'en': 'January 15', 'zh': '1月15日'}, 'hash': '6f1cb5278e40e9ea', 'github_url': '', 'github_stars': 0, 'pdf_title_img': 'assets/pdf/title_img/2601.10387.jpg', 'data': {'categories': ['#context_window', '#agent', '#interpretability', '#steering', '#persona_space', '#alignment'], 'emoji': '📚', 'ru': {'title': 'Персонажная ось помощника в больших языковых моделях', 'desc': 'Исследование показывает, что большие языковые модели функционируют в пространстве персоналий, где ось «Помощник» контролирует степень их полезности и поведенческой стабильности. Методы управления могут направлять ответы моделей, предотвращая отклонения от безопасного поведения. Мы обнаружили, что основная компонента пространства персоналий большинства моделей — это ось «Помощник», отражающая степень следования модельным установкам по умолчанию. Сдвиг к оси «Помощник» усиливает полезные и безопасные реакции, а отклонение от нее ведет к идентификации с другими персонажами или даже экзотическим стилям общения. Наше исследование также выявило, что персонализированное пространство предопределяет появление различных человеческих архетипов, таких как консультанты и тренеры, однако ограничивает духовные и мистические образы. Отклонения вдоль оси «Помощник» способствуют возникновению феномена персоной дрифта, когда поведение модели становится опасным или необычным. Для предотвращения этого нами предложены методы ограничения активаций вдоль оси «Помощник», которые стабилизируют поведение моделей в сложных ситуациях и при атаках на них методами взлома личности.'}, 'en': {'title': 'Persona Space Exploration in Language Models', 'desc': "This research investigates how large language models navigate a persona space defined by an 'Assistant Axis' that governs helpfulness and behavioral stability. It finds that post-training techniques steer models towards a helpful assistant-like persona while allowing for controlled exploration of alternative identities. Extreme deviations from the Assistant Axis lead to unpredictable and potentially harmful behaviors, highlighting the need for better control mechanisms."}}, 'authors': [], 'affiliations': []}, {'id': 'https://huggingface.co/papers/2601.11096', 'title': 'CoDance: An Unbind-Rebind Paradigm for Robust Multi-Subject Animation', 'url': 'https://huggingface.co/papers/2601.11096', 'abstract': 'CoDance introduces an Unbind-Rebind framework for animating multiple subjects with flexible spatial configurations, using pose shift encoding and semantic/textual guidance for motion reassignment.  \t\t\t\t\tAI-generated summary \t\t\t\t Character image animation is gaining significant importance across various domains, driven by the demand for robust and flexible multi-subject rendering. While existing methods excel in single-person animation, they struggle to handle arbitrary subject counts, diverse character types, and spatial misalignment between the reference image and the driving poses. We attribute these limitations to an overly rigid spatial binding that forces strict pixel-wise alignment between the pose and reference, and an inability to consistently rebind motion to intended subjects. To address these challenges, we propose CoDance, a novel Unbind-Rebind framework that enables the animation of arbitrary subject counts, types, and spatial configurations conditioned on a single, potentially misaligned pose sequence. Specifically, the Unbind module employs a novel pose shift encoder to break the rigid spatial binding between the pose and the reference by introducing stochastic perturbations to both poses and their latent features, thereby compelling the model to learn a location-agnostic motion representation. To ensure precise control and subject association, we then devise a Rebind module, leveraging semantic guidance from text prompts and spatial guidance from subject masks to direct the learned motion to intended characters. Furthermore, to facilitate comprehensive evaluation, we introduce a new multi-subject CoDanceBench. Extensive experiments on CoDanceBench and existing datasets show that CoDance achieves SOTA performance, exhibiting remarkable generalization across diverse subjects and spatial layouts. The code and weights will be open-sourced.', 'score': 4, 'issue_id': 579, 'pub_date': '2026-01-16', 'pub_date_card': {'ru': '16 января', 'en': 'January 16', 'zh': '1月16日'}, 'hash': '8c557edef204bebb', 'github_url': '', 'github_stars': 0, 'pdf_title_img': 'assets/pdf/title_img/2601.11096.jpg', 'data': {'categories': ['#multi_subject_rendering', '#character_animation'], 'emoji': '🎨', 'ru': {'title': 'КоДанс: Гибкая анимация множества персонажей', 'desc': 'CoDance представляет собой инновационный подход к анимации нескольких персонажей с использованием гибкой пространственной конфигурации и кодирования позы для переназначения движения на основе семантических и текстовых указаний. Предложенная архитектура включает модуль разупаковки, который устраняет жесткую привязку между позой и референсным изображением, позволяя модели обучаться универсальному представлению движений, не зависящему от местоположения. Модуль повторной упаковки направляет это движение на целевых персонажей с помощью подсказок текста и пространственных масок. В результате достигается высокая точность и адаптируемость при работе с различными типами персонажей и конфигурациями пространства.'}, 'en': {'title': 'CoDance: An Unbind-Rebind Framework for Multi-Subject Animation Using Pose Shift Encoding and Semantic Guidance', 'desc': 'CoDance introduces an innovative Unbind-Rebind framework designed to animate multiple subjects flexibly, addressing limitations in current methods due to rigid spatial bindings and lack of motion reassignment capabilities. It uses a pose shift encoder to break rigid spatial alignments and learns location-agnostic motion representations. A Rebind module utilizes semantic and spatial guidance to precisely associate motions with specific subjects, enabling robust multi-subject animations.'}}, 'authors': [], 'affiliations': []}, {'id': 'https://huggingface.co/papers/2601.05242', 'title': 'GDPO: Group reward-Decoupled Normalization Policy Optimization for Multi-reward RL Optimization', 'url': 'https://huggingface.co/papers/2601.05242', 'abstract': 'Multi-reward reinforcement learning suffers from reward normalization collapse in GRPO, which GDPO addresses by decoupling reward normalization for improved training stability and performance across reasoning tasks.  \t\t\t\t\tAI-generated summary \t\t\t\t As language models become increasingly capable, users expect them to provide not only accurate responses but also behaviors aligned with diverse human preferences across a variety of scenarios. To achieve this, Reinforcement learning (RL) pipelines have begun incorporating multiple rewards, each capturing a distinct preference, to guide models toward these desired behaviors. However, recent work has defaulted to apply Group Relative Policy Optimization (GRPO) under multi-reward setting without examining its suitability. In this paper, we demonstrate that directly applying GRPO to normalize distinct rollout reward combinations causes them to collapse into identical advantage values, reducing the resolution of the training signal and resulting in suboptimal convergence and, in some cases, early training failure. We then introduce Group reward-Decoupled Normalization Policy Optimization (GDPO), a new policy optimization method to resolve these issues by decoupling the normalization of individual rewards, more faithfully preserving their relative differences and enabling more accurate multi-reward optimization, along with substantially improved training stability. We compare GDPO with GRPO across three tasks: tool calling, math reasoning, and coding reasoning, evaluating both correctness metrics (accuracy, bug ratio) and constraint adherence metrics (format, length). Across all settings, GDPO consistently outperforms GRPO, demonstrating its effectiveness and generalizability for multi-reward reinforcement learning optimization.', 'score': 130, 'issue_id': 493, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': '2644b8e88f8fe659', 'authors': ['Shih-Yang Liu', 'Xin Dong', 'Ximing Lu', 'Shizhe Diao', 'Peter Belcak', 'Mingjie Liu', 'Min-Hung Chen', 'Hongxu Yin', 'Yu-Chiang Frank Wang', 'Kwang-Ting Cheng', 'Yejin Choi', 'Jan Kautz', 'Pavlo Molchanov'], 'affiliations': ['NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2601.05242.jpg', 'data': {'categories': ['#optimization', '#rlhf', '#training', '#rl', '#reasoning', '#alignment'], 'emoji': '⚖️', 'ru': {'title': 'Разделённая нормализация вознаграждений для стабильной многоцелевой оптимизации', 'desc': 'В статье исследуется проблема нормализации вознаграждений в многоцелевом обучении с подкреплением (reinforcement learning) при использовании метода GRPO. Авторы показывают, что прямое применение GRPO к нескольким независимым сигналам вознаграждения приводит к их коллапсу и потере информативности. Они предлагают новый метод GDPO, который разделяет нормализацию отдельных вознаграждений, сохраняя их различия и улучшая стабильность обучения. Экспериментальные результаты на задачах вызова инструментов, математических рассуждений и программирования подтверждают превосходство GDPO над GRPO.'}, 'en': {'title': 'Decoupling Rewards for Better Learning in Multi-Reward RL', 'desc': 'This paper addresses the challenges faced in multi-reward reinforcement learning, particularly the issue of reward normalization collapse when using Group Relative Policy Optimization (GRPO). The authors show that GRPO can lead to identical advantage values for different rewards, which diminishes the effectiveness of the training signal and can cause suboptimal learning outcomes. To overcome this, they propose a new method called Group reward-Decoupled Normalization Policy Optimization (GDPO), which separates the normalization of individual rewards to better maintain their differences. The results indicate that GDPO significantly improves training stability and performance across various reasoning tasks compared to GRPO.'}, 'zh': {'title': '解耦奖励归一化，提升多奖励学习效果', 'desc': '多奖励强化学习在使用GRPO时会出现奖励归一化崩溃的问题。本文提出了一种新的策略优化方法GDPO，通过解耦个体奖励的归一化，改善了训练的稳定性和性能。GDPO能够更好地保留奖励之间的相对差异，从而实现更准确的多奖励优化。实验结果表明，GDPO在工具调用、数学推理和编码推理等任务中均优于GRPO。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.04890', 'title': 'Learnable Multipliers: Freeing the Scale of Language Model Matrix Layers', 'url': 'https://huggingface.co/papers/2601.04890', 'abstract': 'Learnable multipliers are introduced to address weight decay-induced normalization artifacts in large language model training, outperforming traditional methods while reducing computational overhead.  \t\t\t\t\tAI-generated summary \t\t\t\t Applying weight decay (WD) to matrix layers is standard practice in large-language-model pretraining. Prior work suggests that stochastic gradient noise induces a Brownian-like expansion of the weight matrices W, whose growth is counteracted by WD, leading to a WD-noise equilibrium with a certain weight norm ||W||. In this work, we view the equilibrium norm as a harmful artifact of the training procedure, and address it by introducing learnable multipliers to learn the optimal scale. First, we attach a learnable scalar multiplier to W and confirm that the WD-noise equilibrium norm is suboptimal: the learned scale adapts to data and improves performance. We then argue that individual row and column norms are similarly constrained, and free their scale by introducing learnable per-row and per-column multipliers. Our method can be viewed as a learnable, more expressive generalization of muP multipliers. It outperforms a well-tuned muP baseline, reduces the computational overhead of multiplier tuning, and surfaces practical questions such as forward-pass symmetries and the width-scaling of the learned multipliers. Finally, we validate learnable multipliers with both Adam and Muon optimizers, where it shows improvement in downstream evaluations matching the improvement of the switching from Adam to Muon.', 'score': 36, 'issue_id': 494, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': '286bbc12fc07f8d9', 'authors': ['Maksim Velikanov', 'Ilyas Chahed', 'Jingwei Zuo', 'Dhia Eddine Rhaiem', 'Younes Belkada', 'Hakim Hacid'], 'affiliations': ['Falcon LLM Team'], 'pdf_title_img': 'assets/pdf/title_img/2601.04890.jpg', 'data': {'categories': ['#training', '#optimization', '#architecture'], 'emoji': '⚖️', 'ru': {'title': 'Обучаемые множители для оптимизации масштабирования весов в больших языковых моделях', 'desc': 'В работе предлагается метод использования обучаемых множителей для решения проблемы артефактов нормализации, возникающих при применении weight decay в больших языковых моделях. Авторы показывают, что равновесие между стохастическим градиентным шумом и weight decay приводит к субоптимальным нормам весов матриц. Метод включает обучаемые скалярные множители для каждой матрицы, а также отдельные множители для строк и столбцов, что представляет собой более выразительное обобщение подхода muP. Предложенный метод демонстрирует улучшение производительности, снижает вычислительные затраты на настройку и показывает положительные результаты как с оптимизатором Adam, так и с Muon.'}, 'en': {'title': 'Learnable Multipliers: Enhancing Large Language Model Training', 'desc': 'This paper introduces learnable multipliers to improve the training of large language models by addressing issues caused by weight decay. Traditional weight decay can create normalization artifacts that hinder model performance, but the proposed method allows the model to learn optimal scaling for weight matrices. By using learnable multipliers for individual rows and columns, the model adapts better to the data, leading to improved performance. The approach not only outperforms existing methods but also reduces the computational burden associated with tuning multipliers.'}, 'zh': {'title': '可学习乘子：提升大语言模型训练的利器', 'desc': '本文提出了一种可学习的乘子，用于解决大语言模型训练中因权重衰减引起的归一化伪影。通过引入可学习的乘子，研究者发现可以更好地适应数据，从而提高模型性能。与传统的权重衰减方法相比，这种新方法在减少计算开销的同时，表现出更优的效果。最终，实验结果表明，使用可学习乘子的模型在下游任务中表现出显著的改进。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05249', 'title': 'RL-AWB: Deep Reinforcement Learning for Auto White Balance Correction in Low-Light Night-time Scenes', 'url': 'https://huggingface.co/papers/2601.05249', 'abstract': 'A novel nighttime color constancy framework combines statistical methods with deep reinforcement learning to improve white balance adjustment under low-light conditions.  \t\t\t\t\tAI-generated summary \t\t\t\t Nighttime color constancy remains a challenging problem in computational photography due to low-light noise and complex illumination conditions. We present RL-AWB, a novel framework combining statistical methods with deep reinforcement learning for nighttime white balance. Our method begins with a statistical algorithm tailored for nighttime scenes, integrating salient gray pixel detection with novel illumination estimation. Building on this foundation, we develop the first deep reinforcement learning approach for color constancy that leverages the statistical algorithm as its core, mimicking professional AWB tuning experts by dynamically optimizing parameters for each image. To facilitate cross-sensor evaluation, we introduce the first multi-sensor nighttime dataset. Experiment results demonstrate that our method achieves superior generalization capability across low-light and well-illuminated images. Project page: https://ntuneillee.github.io/research/rl-awb/', 'score': 34, 'issue_id': 496, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': 'e9f0ea8291fddbbf', 'authors': ['Yuan-Kang Lee', 'Kuan-Lin Chen', 'Chia-Che Chang', 'Yu-Lun Liu'], 'affiliations': ['MediaTek Inc.', 'National Taiwan University', 'National Yang Ming Chiao Tung University'], 'pdf_title_img': 'assets/pdf/title_img/2601.05249.jpg', 'data': {'categories': ['#cv', '#dataset', '#rl'], 'emoji': '🌙', 'ru': {'title': 'Автоматический баланс белого в ночи через обучение с подкреплением', 'desc': 'В статье предложен новый подход RL-AWB для решения задачи цветовой константности в ночных условиях, объединяющий статистические методы с глубоким обучением с подкреплением. Метод начинает работу со статистического алгоритма, специально разработанного для ночных сцен, который использует детекцию серых пикселей и улучшенную оценку освещения. На основе этого фундамента авторы разработали первый подход глубокого обучения с подкреплением для цветовой константности, который имитирует работу профессиональных экспертов по настройке автоматического баланса белого. Для оценки работы алгоритма был создан первый мультисенсорный датасет ночных сцен, и экспериментальные результаты показали превосходную обобщающую способность метода на изображениях с низкой и нормальной освещённостью.'}, 'en': {'title': 'Revolutionizing Nighttime Photography with RL-AWB', 'desc': "This paper introduces RL-AWB, a new framework that enhances white balance adjustment in nighttime photography using a combination of statistical methods and deep reinforcement learning. The approach starts with a statistical algorithm designed for low-light conditions, which includes detecting gray pixels and estimating illumination. It then employs deep reinforcement learning to optimize the white balance parameters dynamically, simulating the expertise of professional photographers. The authors also present a multi-sensor nighttime dataset to evaluate the framework's performance, showing that RL-AWB outperforms existing methods in both low-light and well-lit scenarios."}, 'zh': {'title': '夜间白平衡的新突破', 'desc': '本论文提出了一种新的夜间色彩恒常性框架，结合了统计方法和深度强化学习，以改善低光照条件下的白平衡调整。我们的方法首先使用针对夜间场景的统计算法，结合显著灰色像素检测和新颖的光照估计。然后，我们开发了首个深度强化学习方法，利用统计算法作为核心，动态优化每张图像的参数，模拟专业白平衡调节专家的调节过程。实验结果表明，我们的方法在低光和良好照明图像中具有更强的泛化能力。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05106', 'title': 'Token-Level LLM Collaboration via FusionRoute', 'url': 'https://huggingface.co/papers/2601.05106', 'abstract': "FusionRoute is a token-level multi-LLM collaboration framework that uses a lightweight router to select optimal experts and add complementary logits, outperforming existing methods in diverse tasks while maintaining efficiency.  \t\t\t\t\tAI-generated summary \t\t\t\t Large language models (LLMs) exhibit strengths across diverse domains. However, achieving strong performance across these domains with a single general-purpose model typically requires scaling to sizes that are prohibitively expensive to train and deploy. On the other hand, while smaller domain-specialized models are much more efficient, they struggle to generalize beyond their training distributions. To address this dilemma, we propose FusionRoute, a robust and effective token-level multi-LLM collaboration framework in which a lightweight router simultaneously (i) selects the most suitable expert at each decoding step and (ii) contributes a complementary logit that refines or corrects the selected expert's next-token distribution via logit addition. Unlike existing token-level collaboration methods that rely solely on fixed expert outputs, we provide a theoretical analysis showing that pure expert-only routing is fundamentally limited: unless strong global coverage assumptions hold, it cannot in general realize the optimal decoding policy. By augmenting expert selection with a trainable complementary generator, FusionRoute expands the effective policy class and enables recovery of optimal value functions under mild conditions. Empirically, across both Llama-3 and Gemma-2 families and diverse benchmarks spanning mathematical reasoning, code generation, and instruction following, FusionRoute outperforms both sequence- and token-level collaboration, model merging, and direct fine-tuning, while remaining competitive with domain experts on their respective tasks.", 'score': 29, 'issue_id': 492, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': '652fcf403878311c', 'authors': ['Nuoya Xiong', 'Yuhang Zhou', 'Hanqing Zeng', 'Zhaorun Chen', 'Furong Huang', 'Shuchao Bi', 'Lizhu Zhang', 'Zhuokai Zhao'], 'affiliations': ['Carnegie Mellon University', 'Meta AI', 'Meta TBD Lab', 'University of Chicago', 'University of Maryland'], 'pdf_title_img': 'assets/pdf/title_img/2601.05106.jpg', 'data': {'categories': ['#benchmark', '#training', '#architecture'], 'emoji': '🔀', 'ru': {'title': 'Умная маршрутизация и слияние логитов для оптимальной генерации текста', 'desc': 'FusionRoute — это фреймворк для совместной работы нескольких LLM, в котором лёгкий маршрутизатор выбирает оптимального эксперта на каждом шаге декодирования. Кроме выбора эксперта, маршрутизатор генерирует дополнительные логиты, которые уточняют распределение вероятностей следующего токена. Авторы доказывают теоретически, что простой выбор эксперта недостаточен для достижения оптимальной политики генерации, и показывают, как дополнительные логиты расширяют пространство возможных политик. Экспериментально фреймворк демонстрирует превосходство над другими методами мультимодельного сотрудничества на задачах математического рассуждения, генерации кода и следования инструкциям.'}, 'en': {'title': 'Optimizing Multi-LLM Collaboration with FusionRoute', 'desc': 'FusionRoute is a novel framework that enhances collaboration among multiple large language models (LLMs) by using a lightweight router to select the best expert for each token during decoding. This approach not only chooses the most suitable model but also adds complementary logits to improve the predictions of the selected expert. By addressing the limitations of traditional expert-only routing, FusionRoute allows for a more flexible and effective decoding strategy that can adapt to various tasks. Empirical results show that it outperforms existing methods in diverse applications, demonstrating its efficiency and robustness in multi-LLM settings.'}, 'zh': {'title': '多LLM协作，优化解码策略的创新之路', 'desc': 'FusionRoute 是一个基于令牌级别的多大型语言模型（LLM）协作框架，使用轻量级路由器选择最佳专家并添加互补的 logits，从而在多种任务中超越现有方法，同时保持高效性。该框架通过在每个解码步骤中选择最合适的专家，并通过 logits 相加来修正所选专家的下一个令牌分布，解决了单一通用模型在不同领域表现不佳的问题。与依赖固定专家输出的现有方法不同，FusionRoute 通过可训练的互补生成器扩展了有效策略类，能够在温和条件下恢复最佳价值函数。实验证明，FusionRoute 在多个基准测试中表现优于序列和令牌级别的协作、模型合并和直接微调，同时在各自任务上与领域专家保持竞争力。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05167', 'title': 'RelayLLM: Efficient Reasoning via Collaborative Decoding', 'url': 'https://huggingface.co/papers/2601.05167', 'abstract': 'RelayLLM enables efficient collaborative reasoning between small and large language models through token-level dynamic invocation, achieving high accuracy with minimal computational overhead.  \t\t\t\t\tAI-generated summary \t\t\t\t Large Language Models (LLMs) for complex reasoning is often hindered by high computational costs and latency, while resource-efficient Small Language Models (SLMs) typically lack the necessary reasoning capacity. Existing collaborative approaches, such as cascading or routing, operate at a coarse granularity by offloading entire queries to LLMs, resulting in significant computational waste when the SLM is capable of handling the majority of reasoning steps. To address this, we propose RelayLLM, a novel framework for efficient reasoning via token-level collaborative decoding. Unlike routers, RelayLLM empowers the SLM to act as an active controller that dynamically invokes the LLM only for critical tokens via a special command, effectively "relaying" the generation process. We introduce a two-stage training framework, including warm-up and Group Relative Policy Optimization (GRPO) to teach the model to balance independence with strategic help-seeking. Empirical results across six benchmarks demonstrate that RelayLLM achieves an average accuracy of 49.52%, effectively bridging the performance gap between the two models. Notably, this is achieved by invoking the LLM for only 1.07% of the total generated tokens, offering a 98.2% cost reduction compared to performance-matched random routers.', 'score': 25, 'issue_id': 492, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': '78cdcd0348ab654b', 'authors': ['Chengsong Huang', 'Tong Zheng', 'Langlin Huang', 'Jinyuan Li', 'Haolin Liu', 'Jiaxin Huang'], 'affiliations': ['University of Maryland', 'University of Virginia', 'Washington University in St. Louis'], 'pdf_title_img': 'assets/pdf/title_img/2601.05167.jpg', 'data': {'categories': ['#training', '#rlhf', '#inference', '#small_models', '#optimization', '#reasoning'], 'emoji': '⚡', 'ru': {'title': 'Умная передача: малые модели управляют помощью больших', 'desc': 'RelayLLM предлагает инновационный подход к совместному рассуждению между компактными и крупными языковыми моделями на уровне отдельных токенов. Вместо грубых стратегий маршрутизации запросов целиком, малая модель активно управляет процессом декодирования и обращается к большой модели только для критических токенов, значительно снижая вычислительные затраты. Авторы используют двухэтапное обучение с применением метода Group Relative Policy Optimization для балансировки независимости и стратегического запроса помощи. Результаты показывают, что система достигает высокой точности, привлекая большую модель менее чем в 1% случаев, что обеспечивает 98% экономию вычислительных ресурсов.'}, 'en': {'title': 'Efficient Collaboration: Small Models, Big Reasoning!', 'desc': 'RelayLLM is a framework that enhances collaborative reasoning between small and large language models by allowing them to work together more efficiently. It uses a method called token-level dynamic invocation, where the small model can decide to call on the large model only for specific important tokens, rather than for entire queries. This approach minimizes computational costs and latency while maintaining high accuracy, as the small model handles most reasoning tasks independently. The framework includes a two-stage training process to optimize the balance between independent reasoning and when to seek help from the larger model, resulting in significant cost savings and improved performance.'}, 'zh': {'title': 'RelayLLM：高效的协作推理新框架', 'desc': 'RelayLLM是一种新颖的框架，能够通过令牌级的动态调用实现小型语言模型（SLM）与大型语言模型（LLM）之间的高效协作推理。该方法解决了传统协作方法在处理复杂推理时的高计算成本和延迟问题。RelayLLM允许SLM作为主动控制者，仅在关键令牌时调用LLM，从而减少了计算资源的浪费。实验结果表明，RelayLLM在六个基准测试中实现了49.52%的平均准确率，同时仅调用了1.07%的总生成令牌，显著降低了98.2%的计算成本。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05175', 'title': 'VideoAuto-R1: Video Auto Reasoning via Thinking Once, Answering Twice', 'url': 'https://huggingface.co/papers/2601.05175', 'abstract': 'VideoAuto-R1 framework employs a reason-when-necessary strategy for video understanding, using a Thinking Once, Answering Twice training paradigm with verifiable rewards and confidence-based reasoning activation during inference.  \t\t\t\t\tAI-generated summary \t\t\t\t Chain-of-thought (CoT) reasoning has emerged as a powerful tool for multimodal large language models on video understanding tasks. However, its necessity and advantages over direct answering remain underexplored. In this paper, we first demonstrate that for RL-trained video models, direct answering often matches or even surpasses CoT performance, despite CoT producing step-by-step analyses at a higher computational cost. Motivated by this, we propose VideoAuto-R1, a video understanding framework that adopts a reason-when-necessary strategy. During training, our approach follows a Thinking Once, Answering Twice paradigm: the model first generates an initial answer, then performs reasoning, and finally outputs a reviewed answer. Both answers are supervised via verifiable rewards. During inference, the model uses the confidence score of the initial answer to determine whether to proceed with reasoning. Across video QA and grounding benchmarks, VideoAuto-R1 achieves state-of-the-art accuracy with significantly improved efficiency, reducing the average response length by ~3.3x, e.g., from 149 to just 44 tokens. Moreover, we observe a low rate of thinking-mode activation on perception-oriented tasks, but a higher rate on reasoning-intensive tasks. This suggests that explicit language-based reasoning is generally beneficial but not always necessary.', 'score': 23, 'issue_id': 492, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': 'b9a7c1c14abbe921', 'authors': ['Shuming Liu', 'Mingchen Zhuge', 'Changsheng Zhao', 'Jun Chen', 'Lemeng Wu', 'Zechun Liu', 'Chenchen Zhu', 'Zhipeng Cai', 'Chong Zhou', 'Haozhe Liu', 'Ernie Chang', 'Saksham Suri', 'Hongyu Xu', 'Qi Qian', 'Wei Wen', 'Balakrishnan Varadarajan', 'Zhuang Liu', 'Hu Xu', 'Florian Bordes', 'Raghuraman Krishnamoorthi', 'Bernard Ghanem', 'Vikas Chandra', 'Yunyang Xiong'], 'affiliations': ['King Abdullah University of Science and Technology (KAUST)', 'Meta AI', 'Princeton University'], 'pdf_title_img': 'assets/pdf/title_img/2601.05175.jpg', 'data': {'categories': ['#training', '#rlhf', '#benchmark', '#optimization', '#video', '#reasoning', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Умное видение: рассуждай только когда нужно', 'desc': 'В статье предложена система VideoAuto-R1, которая использует стратегию рассуждения только при необходимости для понимания видео. Модель обучается по парадигме «думай один раз, отвечай дважды», где генерируется начальный ответ, затем проводится цепочка рассуждений, и выводится итоговый ответ, оба контролируются с помощью проверяемых наград. Во время инференса модель использует оценку уверенности начального ответа, чтобы определить, нужно ли активировать режим рассуждения. Результаты показывают, что система достигает лучших показателей при значительном повышении эффективности, сокращая среднюю длину ответа в 3.3 раза, при этом явное языковое рассуждение полезно не всегда.'}, 'en': {'title': 'Efficient Video Understanding with Reason-When-Necessary Strategy', 'desc': 'The VideoAuto-R1 framework introduces a novel approach to video understanding by implementing a reason-when-necessary strategy. It utilizes a Thinking Once, Answering Twice training paradigm, where the model first generates an initial answer, then reasons through it, and finally provides a reviewed answer, all while being guided by verifiable rewards. During inference, the model decides whether to engage in reasoning based on the confidence score of its initial answer, leading to improved efficiency. This method achieves state-of-the-art accuracy in video question answering and grounding tasks while significantly reducing response length.'}, 'zh': {'title': '必要时推理，提升视频理解效率', 'desc': 'VideoAuto-R1框架采用必要时推理的策略来理解视频，使用一次思考、两次回答的训练范式，并在推理过程中结合可验证的奖励和基于置信度的推理激活。研究表明，对于强化学习训练的视频模型，直接回答的效果往往与链式思维（CoT）相当，甚至更好，尽管CoT的计算成本更高。该框架在训练时首先生成初始答案，然后进行推理，最后输出经过审查的答案，并通过可验证的奖励进行监督。在推理阶段，模型根据初始答案的置信度决定是否进行推理，从而在视频问答和定位基准测试中实现了最先进的准确性和显著提高的效率。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05241', 'title': 'RoboVIP: Multi-View Video Generation with Visual Identity Prompting Augments Robot Manipulation', 'url': 'https://huggingface.co/papers/2601.05241', 'abstract': 'Visual identity prompting enhances manipulation data augmentation for robot policies by providing explicit visual guidance to diffusion models, improving policy performance in both simulation and real-world settings.  \t\t\t\t\tAI-generated summary \t\t\t\t The diversity, quantity, and quality of manipulation data are critical for training effective robot policies. However, due to hardware and physical setup constraints, collecting large-scale real-world manipulation data remains difficult to scale across diverse environments. Recent work uses text-prompt conditioned image diffusion models to augment manipulation data by altering the backgrounds and tabletop objects in the visual observations. However, these approaches often overlook the practical need for multi-view and temporally coherent observations required by state-of-the-art policy models. Further, text prompts alone cannot reliably specify the scene setup. To provide the diffusion model with explicit visual guidance, we introduce visual identity prompting, which supplies exemplar images as conditioning inputs to guide the generation of the desired scene setup. To this end, we also build a scalable pipeline to curate a visual identity pool from large robotics datasets. Using our augmented manipulation data to train downstream vision-language-action and visuomotor policy models yields consistent performance gains in both simulation and real-robot settings.', 'score': 22, 'issue_id': 494, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': '92a140fc7f66033d', 'authors': ['Boyang Wang', 'Haoran Zhang', 'Shujie Zhang', 'Jinkun Hao', 'Mingda Jia', 'Qi Lv', 'Yucheng Mao', 'Zhaoyang Lyu', 'Jia Zeng', 'Xudong Xu', 'Jiangmiao Pang'], 'affiliations': ['Shanghai AI Laboratory', 'Shanghai Jiao Tong University', 'Tsinghua University', 'University of Michigan'], 'pdf_title_img': 'assets/pdf/title_img/2601.05241.jpg', 'data': {'categories': ['#diffusion', '#robotics', '#multimodal', '#training', '#synthetic', '#data', '#cv'], 'emoji': '🤖', 'ru': {'title': 'Визуальный промптинг идентичности для синтеза данных манипуляции роботов', 'desc': 'Статья описывает метод визуального промптинга идентичности для увеличения данных манипуляции роботов. Вместо использования только текстовых подсказок, авторы предлагают передавать примеры изображений в диффузионные модели для более точного управления синтезом сцен. Они разработали масштабируемый конвейер для создания пула визуальных идентичностей из больших наборов данных робототехники. Обученные на аугментированных данных политики робота показывают улучшение производительности как в симуляции, так и в реальных экспериментах.'}, 'en': {'title': 'Enhancing Robot Policies with Visual Identity Prompting', 'desc': 'This paper introduces a method called visual identity prompting to improve data augmentation for robot manipulation tasks. By providing explicit visual examples to diffusion models, it enhances the generation of diverse and coherent training data. This approach addresses the limitations of traditional text prompts, which often fail to capture the complexity of real-world scenes. The results show that using this augmented data leads to better performance in both simulated environments and real-world robot applications.'}, 'zh': {'title': '视觉身份提示提升机器人策略表现', 'desc': '本论文提出了一种视觉身份提示的方法，以增强机器人策略的操作数据增强。通过为扩散模型提供明确的视觉指导，改善了策略在模拟和真实环境中的表现。我们构建了一个可扩展的管道，从大型机器人数据集中策划视觉身份池，以便为生成所需场景设置提供示例图像。使用增强后的操作数据训练视觉-语言-动作和视觉运动策略模型，在模拟和真实机器人环境中均取得了一致的性能提升。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.04767', 'title': 'AT^2PO: Agentic Turn-based Policy Optimization via Tree Search', 'url': 'https://huggingface.co/papers/2601.04767', 'abstract': 'AT²PO is a unified framework for multi-turn agentic reinforcement learning that improves exploration diversity, credit assignment, and policy optimization through tree search and turn-level learning objectives.  \t\t\t\t\tAI-generated summary \t\t\t\t LLM agents have emerged as powerful systems for tackling multi-turn tasks by interleaving internal reasoning and external tool interactions. Agentic Reinforcement Learning has recently drawn significant research attention as a critical post-training paradigm to further refine these capabilities. In this paper, we present AT^2PO (Agentic Turn-based Policy Optimization via Tree Search), a unified framework for multi-turn agentic RL that addresses three core challenges: limited exploration diversity, sparse credit assignment, and misaligned policy optimization. AT^2PO introduces a turn-level tree structure that jointly enables Entropy-Guided Tree Expansion for strategic exploration and Turn-wise Credit Assignment for fine-grained reward propagation from sparse outcomes. Complementing this, we propose Agentic Turn-based Policy Optimization, a turn-level learning objective that aligns policy updates with the natural decision granularity of agentic interactions. ATPO is orthogonal to tree search and can be readily integrated into any multi-turn RL pipeline. Experiments across seven benchmarks demonstrate consistent improvements over the state-of-the-art baseline by up to 1.84 percentage points in average, with ablation studies validating the effectiveness of each component. Our code is available at https://github.com/zzfoutofspace/ATPO.', 'score': 22, 'issue_id': 496, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': '38825a65f1e8a007', 'authors': ['Zefang Zong', 'Dingwei Chen', 'Yang Li', 'Qi Yi', 'Bo Zhou', 'Chengming Li', 'Bo Qian', 'Peng Chen', 'Jie Jiang'], 'affiliations': ['Shenzhen MSU-BIT University', 'Sun Yat-Sen University', 'Tencent Inc'], 'pdf_title_img': 'assets/pdf/title_img/2601.04767.jpg', 'data': {'categories': ['#agents', '#open_source', '#reasoning', '#optimization', '#rl', '#training'], 'emoji': '🌳', 'ru': {'title': 'Древовидный поиск для оптимизации политики многошаговых агентов', 'desc': 'AT²PO — это единая система обучения с подкреплением для многошаговых агентов на основе больших языковых моделей, которая решает проблемы ограниченного исследования пространства действий, редких сигналов вознаграждения и несогласованной оптимизации политики. Подход использует древовидную структуру на уровне отдельных шагов агента, включающую управляемое энтропией расширение для стратегического исследования и пошаговое распределение кредита для точной передачи вознаграждения. Авторы предлагают новый объективный функционал оптимизации политики, который работает на уровне ходов агента и может быть добавлен в любой конвейер многошагового обучения с подкреплением. Экспериментальное тестирование на семи бенчмарках показало стабильные улучшения в среднем на 1,84 процентных пункта по сравнению с существующими методами.'}, 'en': {'title': 'Enhancing Multi-Turn Learning with AT²PO Framework', 'desc': 'The paper introduces AT²PO, a new framework designed for multi-turn agentic reinforcement learning (RL). It tackles key challenges such as enhancing exploration diversity, improving credit assignment, and optimizing policies through a structured approach. By utilizing a turn-level tree structure, AT²PO facilitates strategic exploration and precise reward propagation, which helps in better learning from sparse outcomes. The framework has shown significant performance improvements in various benchmarks, demonstrating its effectiveness in refining agentic interactions in RL tasks.'}, 'zh': {'title': 'AT²PO：提升多回合智能强化学习的统一框架', 'desc': 'AT²PO是一种统一的多回合智能强化学习框架，旨在通过树搜索和回合级学习目标来改善探索多样性、信用分配和策略优化。该框架引入了回合级树结构，结合熵引导的树扩展和回合信用分配，促进了稀疏结果的奖励传播。AT²PO的策略优化与智能交互的自然决策粒度相一致，从而提高了学习效率。实验结果表明，AT²PO在七个基准测试中相较于现有最优基线有显著提升，验证了各个组件的有效性。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2512.21815', 'title': 'Few Tokens Matter: Entropy Guided Attacks on Vision-Language Models', 'url': 'https://huggingface.co/papers/2512.21815', 'abstract': 'Selective adversarial attacks targeting high-entropy tokens in vision-language models achieve significant semantic degradation with reduced budgets and demonstrate transferable vulnerabilities across different architectures.  \t\t\t\t\tAI-generated summary \t\t\t\t Vision-language models (VLMs) achieve remarkable performance but remain vulnerable to adversarial attacks. Entropy, a measure of model uncertainty, is strongly correlated with the reliability of VLM. Prior entropy-based attacks maximize uncertainty at all decoding steps, implicitly assuming that every token contributes equally to generation instability. We show instead that a small fraction (about 20%) of high-entropy tokens, i.e., critical decision points in autoregressive generation, disproportionately governs output trajectories. By concentrating adversarial perturbations on these positions, we achieve semantic degradation comparable to global methods while using substantially smaller budgets. More importantly, across multiple representative VLMs, such selective attacks convert 35-49% of benign outputs into harmful ones, exposing a more critical safety risk. Remarkably, these vulnerable high-entropy forks recur across architecturally diverse VLMs, enabling feasible transferability (17-26% harmful rates on unseen targets). Motivated by these findings, we propose Entropy-bank Guided Adversarial attacks (EGA), which achieves competitive attack success rates (93-95%) alongside high harmful conversion, thereby revealing new weaknesses in current VLM safety mechanisms.', 'score': 19, 'issue_id': 501, 'pub_date': '2026-12-26', 'pub_date_card': {'ru': '26 декабря', 'en': 'December 26', 'zh': '12月26日'}, 'hash': '79a1c8bb88f5fe0c', 'authors': ['Mengqi He', 'Xinyu Tian', 'Xin Shen', 'Jinhong Ni', 'Shu Zou', 'Zhaoyuan Yang', 'Jing Zhang'], 'affiliations': ['Australian National University', 'GE Research', 'The University of Queensland'], 'pdf_title_img': 'assets/pdf/title_img/2512.21815.jpg', 'data': {'categories': [], 'emoji': '🎯', 'ru': {'title': 'Избирательные атаки на критические моменты решений в видео-языковых моделях', 'desc': 'В работе исследуются уязвимости видео-языковых моделей через целевые адверсариальные атаки, сосредоточенные на токенах с высокой энтропией - критических точках принятия решений в авторегрессивной генерации. Авторы показывают, что всего 20% токенов с наибольшей неопределённостью непропорционально влияют на выходные траектории модели и их пертурбация достаточна для семантического деградирования. Предложенный метод EGA (Entropy-bank Guided Adversarial attacks) достигает 93-95% успеха атаки при переводе 35-49% безопасных ответов в вредоносные с меньшим бюджетом возмущений. Критически, уязвимые позиции высокой энтропии переносятся между архитектурно различными моделями, демонстрируя трансферабельность атак (17-26% на неизученных целях).'}, 'en': {'title': 'Targeting Uncertainty: A New Approach to Adversarial Attacks on VLMs', 'desc': "This paper discusses a new method for attacking vision-language models (VLMs) by focusing on high-entropy tokens, which are points of high uncertainty in the model's output. Instead of spreading adversarial changes across all tokens, the authors show that targeting just 20% of these critical tokens can lead to significant semantic degradation with less effort. Their approach, called Entropy-bank Guided Adversarial attacks (EGA), achieves high success rates in converting benign outputs into harmful ones, revealing vulnerabilities in various VLM architectures. This research highlights the importance of understanding model uncertainty and its implications for the safety of AI systems."}, 'zh': {'title': '高熵标记的选择性对抗攻击揭示VLM的新脆弱性', 'desc': '本研究探讨了视觉-语言模型（VLM）在面对对抗攻击时的脆弱性。我们发现，高熵标记，即模型不确定性较高的标记，能够显著影响生成结果。通过集中对这些高熵标记的对抗扰动，我们可以在较小的预算下实现与全局方法相当的语义降级。我们的实验表明，这种选择性攻击在不同的VLM架构中具有可转移性，暴露了当前安全机制的新弱点。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05138', 'title': 'VerseCrafter: Dynamic Realistic Video World Model with 4D Geometric Control', 'url': 'https://huggingface.co/papers/2601.05138', 'abstract': "VerseCrafter is a 4D-aware video world model that enables unified control over camera and object dynamics through 4D geometric control representation and video diffusion models.  \t\t\t\t\tAI-generated summary \t\t\t\t Video world models aim to simulate dynamic, real-world environments, yet existing methods struggle to provide unified and precise control over camera and multi-object motion, as videos inherently operate dynamics in the projected 2D image plane. To bridge this gap, we introduce VerseCrafter, a 4D-aware video world model that enables explicit and coherent control over both camera and object dynamics within a unified 4D geometric world state. Our approach is centered on a novel 4D Geometric Control representation, which encodes the world state through a static background point cloud and per-object 3D Gaussian trajectories. This representation captures not only an object's path but also its probabilistic 3D occupancy over time, offering a flexible, category-agnostic alternative to rigid bounding boxes or parametric models. These 4D controls are rendered into conditioning signals for a pretrained video diffusion model, enabling the generation of high-fidelity, view-consistent videos that precisely adhere to the specified dynamics. Unfortunately, another major challenge lies in the scarcity of large-scale training data with explicit 4D annotations. We address this by developing an automatic data engine that extracts the required 4D controls from in-the-wild videos, allowing us to train our model on a massive and diverse dataset.", 'score': 14, 'issue_id': 492, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': '4e9d7d654118b517', 'authors': ['Sixiao Zheng', 'Minghao Yin', 'Wenbo Hu', 'Xiaoyu Li', 'Ying Shan', 'Yanwei Fu'], 'affiliations': ['ARC Lab, Tencent PCG', 'Fudan University', 'HKU', 'Shanghai Innovation Institute'], 'pdf_title_img': 'assets/pdf/title_img/2601.05138.jpg', 'data': {'categories': ['#3d', '#dataset', '#data', '#video', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Единое управление камерой и объектами в видео через 4D геометрическое представление', 'desc': 'VerseCrafter представляет собой 4D-осведомлённую видео-модель мира, которая позволяет единообразно контролировать динамику камеры и объектов через представление 4D геометрического управления. В основе подхода лежит новое представление 4D Geometric Control, кодирующее состояние мира через статическое облако точек фона и 3D Gaussian траектории для каждого объекта, что обеспечивает гибкую альтернативу жёстким ограничивающим рамкам. Эти 4D управления преобразуются в сигналы кондиционирования для предварительно обученной видео diffusion модели, позволяя генерировать видео высокого качества, согласованные с заданной динамикой. Авторы решают проблему дефицита обучающих данных разработкой автоматического конвейера данных, извлекающего 4D управления из видео в дикой природе для обучения на масштабном и разнообразном наборе данных.'}, 'en': {'title': 'Unified 4D Control for Dynamic Video Generation', 'desc': 'VerseCrafter is a novel 4D-aware video world model designed to enhance control over camera and object movements in video generation. It utilizes a unique 4D Geometric Control representation that captures the dynamic state of the environment through a combination of static point clouds and 3D Gaussian trajectories for each object. This approach allows for flexible and precise modeling of object dynamics, moving beyond traditional bounding boxes. To overcome the challenge of limited training data, VerseCrafter includes an automatic data engine that extracts necessary 4D controls from existing videos, enabling the model to learn from a large and varied dataset.'}, 'zh': {'title': '统一控制相机与物体动态的4D视频模型', 'desc': 'VerseCrafter 是一种4D感知的视频世界模型，能够通过4D几何控制表示和视频扩散模型统一控制相机和物体的动态。现有方法在提供相机和多物体运动的统一精确控制方面存在困难，而VerseCrafter通过静态背景点云和每个物体的3D高斯轨迹来编码世界状态，解决了这一问题。该模型不仅捕捉物体的运动路径，还能表示其随时间变化的3D占用概率，提供了一种灵活的替代方案。我们还开发了一个自动数据引擎，从野外视频中提取所需的4D控制，以便在大规模多样化的数据集上训练模型。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.05111', 'title': 'Agent-as-a-Judge', 'url': 'https://huggingface.co/papers/2601.05111', 'abstract': 'Large language models face limitations in evaluating complex, multi-step tasks, prompting the development of agent-based evaluation systems that utilize planning, tool-augmented verification, and multi-agent collaboration for more robust assessments.  \t\t\t\t\tAI-generated summary \t\t\t\t LLM-as-a-Judge has revolutionized AI evaluation by leveraging large language models for scalable assessments. However, as evaluands become increasingly complex, specialized, and multi-step, the reliability of LLM-as-a-Judge has become constrained by inherent biases, shallow single-pass reasoning, and the inability to verify assessments against real-world observations. This has catalyzed the transition to Agent-as-a-Judge, where agentic judges employ planning, tool-augmented verification, multi-agent collaboration, and persistent memory to enable more robust, verifiable, and nuanced evaluations. Despite the rapid proliferation of agentic evaluation systems, the field lacks a unified framework to navigate this shifting landscape. To bridge this gap, we present the first comprehensive survey tracing this evolution. Specifically, we identify key dimensions that characterize this paradigm shift and establish a developmental taxonomy. We organize core methodologies and survey applications across general and professional domains. Furthermore, we analyze frontier challenges and identify promising research directions, ultimately providing a clear roadmap for the next generation of agentic evaluation.', 'score': 12, 'issue_id': 492, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': '67cf270baff78987', 'authors': ['Runyang You', 'Hongru Cai', 'Caiqi Zhang', 'Qiancheng Xu', 'Meng Liu', 'Tiezheng Yu', 'Yongqi Li', 'Wenjie Li'], 'affiliations': ['Huawei Technologies', 'Shandong Jianzhu University', 'The Hong Kong Polytechnic University', 'University of Cambridge'], 'pdf_title_img': 'assets/pdf/title_img/2601.05111.jpg', 'data': {'categories': ['#reasoning', '#benchmark', '#agents', '#survey'], 'emoji': '⚖️', 'ru': {'title': 'От судьи-модели к судье-агенту: новая парадигма оценки в AI', 'desc': 'Статья рассматривает эволюцию систем оценки в искусственном интеллекте от использования больших языковых моделей в качестве судей к агентным системам. Традиционный подход LLM-as-a-Judge имеет ограничения при оценке сложных многошаговых задач из-за предвзятости и поверхностного анализа. Авторы предлагают Agent-as-a-Judge — систему, где агенты применяют планирование, верификацию с инструментами, сотрудничество между агентами и долговременную память для более надёжной оценки. В статье представлена первая комплексная таксономия и дорожная карта развития агентных систем оценки в различных областях.'}, 'en': {'title': 'From LLMs to Agentic Evaluation: A New Era in AI Assessment', 'desc': 'This paper discusses the limitations of large language models (LLMs) in evaluating complex tasks, which has led to the creation of agent-based evaluation systems. These systems enhance assessment reliability by incorporating planning, tool-augmented verification, and collaboration among multiple agents. The authors present a comprehensive survey that outlines the evolution from LLM-as-a-Judge to Agent-as-a-Judge, highlighting key dimensions and methodologies in this transition. Additionally, they identify challenges and future research directions to guide the development of more effective agentic evaluation systems.'}, 'zh': {'title': '代理评估：迈向更稳健的AI评估系统', 'desc': '大型语言模型在评估复杂的多步骤任务时存在局限性，因此开发了基于代理的评估系统。这些系统利用规划、工具增强验证和多代理协作来进行更稳健的评估。尽管代理评估系统迅速发展，但该领域缺乏统一的框架来应对这一变化。本文提供了首次全面的调查，识别了这一范式转变的关键维度，并建立了发展分类法。'}}, 'github_stars': 0, 'github_url': ''}, {'id': 'https://huggingface.co/papers/2601.03425', 'title': 'The Illusion of Specialization: Unveiling the Domain-Invariant "Standing Committee" in Mixture-of-Experts Models', 'url': 'https://huggingface.co/papers/2601.03425', 'abstract': "Research challenges the assumption of domain specialization in Mixture of Experts models by identifying a persistent central committee of experts that dominates routing behavior across different domains and architectures.  \t\t\t\t\tAI-generated summary \t\t\t\t Mixture of Experts models are widely assumed to achieve domain specialization through sparse routing. In this work, we question this assumption by introducing COMMITTEEAUDIT, a post hoc framework that analyzes routing behavior at the level of expert groups rather than individual experts. Across three representative models and the MMLU benchmark, we uncover a domain-invariant Standing Committee. This is a compact coalition of routed experts that consistently captures the majority of routing mass across domains, layers, and routing budgets, even when architectures already include shared experts. Qualitative analysis further shows that Standing Committees anchor reasoning structure and syntax, while peripheral experts handle domain-specific knowledge. These findings reveal a strong structural bias toward centralized computation, suggesting that specialization in Mixture of Experts models is far less pervasive than commonly believed. This inherent bias also indicates that current training objectives, such as load-balancing losses that enforce uniform expert utilization, may be working against the model's natural optimization path, thereby limiting training efficiency and performance.", 'score': 12, 'issue_id': 492, 'pub_date': '2026-01-06', 'pub_date_card': {'ru': '6 января', 'en': 'January 6', 'zh': '1月6日'}, 'hash': '102f6999339b81a5', 'authors': ['Yan Wang', 'Yitao Xu', 'Nanhan Shen', 'Jinyan Su', 'Jimin Huang', 'Zining Zhu'], 'affiliations': ['Cornell University', 'Georgia Institute of Technology', 'Stevens Institute of Technology', 'The Fin AI'], 'pdf_title_img': 'assets/pdf/title_img/2601.03425.jpg', 'data': {'categories': ['#training', '#benchmark', '#interpretability', '#reasoning', '#architecture'], 'emoji': '🤝', 'ru': {'title': 'Скрытая централизация в Mixture of Experts: роль постоянного комитета экспертов', 'desc': 'В работе исследуется предположение о специализации экспертов в моделях Mixture of Experts (MoE) и показано, что существует постоянная центральная группа экспертов, которая доминирует в маршрутизации независимо от области применения и архитектуры. Авторы предлагают COMMITTEEAUDIT — фреймворк для анализа поведения маршрутизации на уровне групп экспертов вместо отдельных экспертов. На примере трёх репрезентативных моделей и бенчмарка MMLU раскрывается существование инвариантного Постоянного Комитета — компактной коалиции экспертов, которая захватывает большинство маршрутизационной массы. Результаты указывают на сильное смещение в сторону централизованных вычислений и предполагают, что текущие цели обучения, такие как потери балансировки нагрузки, могут препятствовать естественной оптимизации модели.'}, 'en': {'title': 'Rethinking Specialization in Mixture of Experts Models', 'desc': "This paper challenges the belief that Mixture of Experts (MoE) models specialize in different domains through sparse routing of experts. The authors introduce a framework called COMMITTEEAUDIT, which examines how groups of experts, rather than individual ones, influence routing decisions. They discover a consistent group of experts, termed
