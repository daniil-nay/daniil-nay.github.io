экономике', 'desc': 'Статья представляет CoffeeBench, новый бенчмарк для оценки LLM-агентов в многопользовательской экономической симуляции. В симуляции участвуют две фермы, две обжарочные компании и два ритейлера, каждый из которых стремится максимизировать свою прибыль за 90 дней. Результаты показывают, что более высокоэффективные модели активнее общаются с другими участниками, в то время как у некоторых моделей наблюдается неактивность. Исследование подчеркивает важность оценки взаимодействий между агентами в долгосрочных экономических системах.'}, 'en': {'title': 'Evaluating LLM Agents in a Competitive Economic Landscape', 'desc': 'CoffeeBench is a benchmark designed to evaluate large language model (LLM) agents in a multi-agent economic simulation where firms compete over 90 days to maximize profits. Unlike traditional benchmarks that focus on single-agent interactions, CoffeeBench emphasizes the importance of communication, negotiation, and transactions among multiple autonomous agents. The study reveals that higher-performing models engage more actively with other firms, while some models, like Claude Haiku 4.5, struggle with inaction despite having coherent strategies. This research highlights the need for effective long-horizon evaluations in economic systems and provides resources for further exploration.'}}}, {'id': 'https://huggingface.co/papers/2606.26299', 'title': 'COrigami: An AI Pipeline for Co-Designing Flat-Foldable Visually Recognisable Origami', 'url': 'https://huggingface.co/papers/2606.26299', 'abstract': 'Abstract A computational origami system generates crease patterns from natural language using AI-driven optimization and aesthetic evaluation, enabling human-AI collaboration in mathematically constrained design.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct While generative AI has achieved remarkable success in solving problems with verifiable solutions, generating physical art that satisfies both strict geometric constraints and subjective visual aesthetics remains a challenge. This paper presents an approach to tackle these difficulties in the domain of computational origami, a mathematically rigid environment that grounds artistic design within the equations of flat foldability. We present COrigami, an end-to-end AI-driven pipeline that assists the design cycle by generating crease patterns from natural language. Our pipeline involves generating a semantic stick figure, computing a base packing, solving for a flat-foldable crease pattern, shaping the flat-folded crease pattern, and refining the generated model using reinforcement learning driven by an autonomous aesthetic evaluation loop. Our system acts as a highly effective collaborative assistant, generating structural starting points that human artists can further expand and shape. By integrating algorithmic optimisation with autonomous aesthetic critique, this work demonstrates how AI systems can satisfy multi-objective physical constraints to enable reliable, mathematically grounded co-creativity.', 'score': 4, 'issue_id': 2723, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '9188a0d3b779c623', 'github_url': '', 'github_stars': 0, 'authors': ['Tom Zahavy', 'Shaobo Hou', 'Thomas Tumiel', 'James Doran', 'Francesco Faccio', 'Xidong Feng', 'Alex Havrilla', 'Igor Khytryi', 'Chenglei Li', 'Lisa Schut', 'Vivek Veeriah', 'Arijan Abrashi', 'Michał Kosmulski', 'Robert J. Lang', 'Nick Robinson', 'Brandon Wong', 'Marcus Chiam', 'Gloria Fang', 'Satinder Singh'], 'affiliations': ['Google', 'Google DeepMind', 'Independent', 'Stanford'], 'pdf_title_img': 'assets/pdf/title_img/2606.26299.jpg', 'data': {'categories': ['#optimization', '#agi', '#multimodal', '#agents', '#rl', '#games'], 'emoji': '🦋', 'ru': {'title': 'AI в помощь творчеству: вычислительное оригами', 'desc': 'В данной статье представлен подход к созданию систем вычислительного оригами, который использует AI для генерации рисунков складок на основе естественного языка. Эта система, названная COrigami, сочетает в себе алгоритмическую оптимизацию и автономную оценку эстетики, позволяя людям и AI работать вместе. Она решает задачи, связанные с жесткими геометрическими ограничениями и субъективной визуальной эстетикой, что является сложной задачей в искусстве. COrigami служит высокоэффективным помощником, создавая структуру, с которой могут работать художники.'}, 'en': {'title': 'AI-Powered Origami: Bridging Geometry and Aesthetics', 'desc': 'This paper introduces COrigami, an AI-driven system that generates crease patterns for origami from natural language descriptions. It combines generative AI techniques with reinforcement learning to ensure that the designs meet both geometric constraints and aesthetic preferences. The system operates through a series of steps, including creating a semantic representation, computing a base packing, and refining the crease patterns. By facilitating collaboration between AI and human artists, COrigami enhances the design process in computational origami, allowing for innovative and mathematically sound creations.'}}}, {'id': 'https://huggingface.co/papers/2606.27288', 'title': 'When Does Combining Language Models Help? A Co-Failure Ceiling on Routing, Voting, and Mixture-of-Agents Across 67 Frontier Models', 'url': 'https://huggingface.co/papers/2606.27288', 'abstract': 'Abstract Multi-model systems face fundamental accuracy limits determined by the rate at which all models fail simultaneously, regardless of their individual correlations or ensemble strategies.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multi-model LLM systems such as routing, voting, cascades, fusion, and mixture-of-agents are used to beat single-model accuracy. We show that their gain is capped by a quantity the field rarely reports. For any policy whose output is one member model answer, accuracy cannot exceed one minus beta, where beta is the rate at which every model is wrong on the same query. In contrast, the usual diagnostic, average pairwise error correlation rho, cannot identify beta: error laws with identical marginals and pairwise correlations can have different all-wrong rates. A Clopper-Pearson bound on beta gives a finite-sample certificate on the largest gain any router, vote, or cascade could deliver before training a router.   Across 67 models from 21 providers, a tetrachoric-calibrated single-factor model still underprices the all-wrong tail: on open-ended mathematics, observed beta is 0.052 versus 0.023 under the full 67-model Gaussian copula, about 2.5 times underpricing, with 90 percent CI 1.7 to 3.4 and k equals 17. The effect recurs on execution-graded code, where beta is 0.079. Re-asking the same GPQA-Diamond questions in free-response rather than multiple-choice form reopens the tail, with beta 0.127 and a five-judge panel with kappa 0.73 to 0.92, locating co-failure in answer format rather than subject. At matched quality, low-rho heterogeneous ensembles beat high-rho Self-MoA, but on checkable tasks in our pool, combining models rarely beats the single best model without a strong query-level routing signal. Gains come from models failing on different questions, not from adding more models.', 'score': 3, 'issue_id': 2725, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': 'ec609df560967b5e', 'github_url': '', 'github_stars': 0, 'authors': ['Josef Chen'], 'affiliations': ['KAIKAKU'], 'pdf_title_img': 'assets/pdf/title_img/2606.27288.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#optimization', '#aggregation'], 'emoji': '📊', 'ru': {'title': 'Пределы точности много-модельных систем', 'desc': 'Много-модельные системы сталкиваются с фундаментальными ограничениями точности, связанными с тем, как часто все модели одновременно ошибаются. Являясь вариацией различных подходов, таких как голосование и каскады, они могут быть бесполезными, если единственный ответ модели не может превысить определенный предел точности. Исследование показывает, что для повышения эффективности моделей необходимо учитывать уровень их ошибок на одинаковых запросах. В подобных условиях сочетание различных моделей не всегда приводит к улучшению результатов без четкой маршрутизации запросов.'}, 'en': {'title': 'Understanding the Limits of Multi-Model Accuracy', 'desc': 'This paper discusses the limitations of multi-model systems in machine learning, particularly how their accuracy is constrained by the simultaneous failure rate of all models involved. It introduces the concept of beta, which represents the rate at which all models provide incorrect answers, and shows that accuracy cannot exceed one minus beta. The authors highlight that traditional measures like average pairwise error correlation do not effectively capture this all-wrong rate. Through empirical analysis, they demonstrate that combining models often does not outperform the best single model unless there is a strong routing signal based on the specific queries.'}}}, {'id': 'https://huggingface.co/papers/2606.23835', 'title': 'ABACUS: Adapting Unified Foundation Model for Bridging Image Count Understanding and Generation', 'url': 'https://huggingface.co/papers/2606.23835', 'abstract': 'Abstract ABACUS is a unified vision-language model that performs object counting and related tasks through innovative spatial grounding, boundary-aware counting policies, and self-critical learning strategies.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct ABACUS is a unified vision-language model that handles object counting, crowd counting, referring-expression counting, and count-faithful image generation without any benchmark-specific training required. Our model is built on existing 3B-parameter unified foundation model and is adapted for object localization tasks using three key innovations: density-aware adaptive zooming with objectness maps for spatial grounding; a boundary-aware count policy via GRPO to eliminate crop-boundary errors; and a cycle-consistent GRPO strategy where the understanding branch self-critiques generated outputs, closing the understanding-generation gap without any external annotations. ABACUS achieves state-of-the-art results across seven benchmarks, outperforming both task-specific specialists and larger generalist models.', 'score': 3, 'issue_id': 2729, 'pub_date': '2026-06-22', 'pub_date_card': {'ru': '22 июня', 'en': 'June 22', 'zh': '6月22日'}, 'hash': 'd9069ffea5ffb77c', 'github_url': '', 'github_stars': 0, 'authors': ['Anindya Mondal', 'Sauradip Nag', 'Anjan Dutta'], 'affiliations': ['Simon Fraser University', 'University of Surrey'], 'pdf_title_img': 'assets/pdf/title_img/2606.23835.jpg', 'data': {'categories': ['#multimodal', '#optimization', '#agi', '#training', '#games', '#interpretability', '#architecture', '#benchmark'], 'emoji': '🔍', 'ru': {'title': 'ABACUS: Революция в подсчете объектов!', 'desc': 'Статья представляет модель ABACUS, которая объединяет визуальные и языковые данные для подсчета объектов и связанных задач. Модель использует инновационные подходы, включая адаптивное масштабирование с учетом плотности и политику подсчета, учитывающую границы. Она достигает высоких результатов без необходимости специальной тренировки на конкретные задачи. ABACUS демонстрирует лучшие результаты по сравнению с специализированными моделями и более крупными общими моделями на семи бенчмарках.'}, 'en': {'title': 'Revolutionizing Counting with ABACUS: A Unified Vision-Language Model', 'desc': 'ABACUS is a cutting-edge vision-language model designed for various counting tasks, including object and crowd counting. It utilizes innovative techniques like density-aware adaptive zooming and boundary-aware counting policies to improve accuracy in spatial grounding and reduce errors. The model also incorporates a self-critical learning strategy that enhances its understanding and generation capabilities without needing additional annotations. ABACUS sets new performance records across multiple benchmarks, surpassing both specialized models and larger generalist ones.'}}}, {'id': 'https://huggingface.co/papers/2606.21959', 'title': 'OpenBioRQ: Unsolved Biomedical Research Questions for Agents', 'url': 'https://huggingface.co/papers/2606.21959', 'abstract': "Abstract A new biomedical benchmark evaluates agentic models' ability to verify sources and avoid false citations by testing unsolved research questions with no answer keys, revealing significant failures in retrieval-grounded reasoning and tool usage.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct A working citation looks like proof -- but the fact that a link resolves does not mean the cited paper supports the claim. I find that current agentic models rarely fabricate citations (over 99% resolve), yet roughly 15.9% link to the wrong paper. Existing benchmarks miss this failure mode: when a question has a fixed answer key, a model can reproduce the expected source from that key rather than independently verifying that the source supports the claim. I introduce \\openbiorq{}, a retrieval-grounded agentic benchmark of 12{,}553 unsolved biomedical research questions across 12 domains that treats open questions as a faithfulness-and-abstention probe. To my knowledge, this is the first biomedical benchmark to combine an agentic setting -- where the model must issue multiple tool calls -- with unsolved questions that have no answer key. Openness is verified against real follow-up evidence rather than a model's parametric knowledge. Difficulty is empirical: I anchor it on questions that three open-weight reference models fail to answer, rather than on subjective hardness labels. On this hardest subset, held-out models from the same lineage as the difficulty anchors solve only ~17%, while three independent frontier agents (Gemini-3-Pro, Opus-4.7, GPT-5.5) span a wide 29-60% range. The benchmark is thus hard, non-saturating (the best agent still leaves ~33-40\\% unsolved), and discriminating across capability tiers. Beyond difficulty, I observe agentic collapse on the hardest questions, where agents stop using their tools. For the most collapse-prone model, blocking tool access entirely barely changes its score -- so tools stop paying off exactly where they are needed most. A frozen per-question checklist raises inter-judge agreement from Spearman 0.35 to 0.82.", 'score': 3, 'issue_id': 2723, 'pub_date': '2026-06-20', 'pub_date_card': {'ru': '20 июня', 'en': 'June 20', 'zh': '6月20日'}, 'hash': 'ce61723d3dff1d96', 'github_url': '', 'github_stars': 0, 'authors': ['Minbyul Jeong'], 'affiliations': ['Upstage AI'], 'pdf_title_img': 'assets/pdf/title_img/2606.21959.jpg', 'data': {'categories': ['#retrieval', '#benchmark', '#tool_use', '#agents', '#agent_memory'], 'emoji': '🧬', 'ru': {'title': 'Проверка надежности биомедицинских источников', 'desc': 'В статье представлено новое биомедицинское тестирование, которое оценивает способности агентов к проверке источников и предотвращению ложных цитирований. Тест содержит 12,553 нерешенных биомедицинских исследовательских вопросов без ответов, что позволяет проверить, поддерживает ли источник заявленные данные. Результаты показывают, что многие модели агентов не используют свои инструменты должным образом, останавливаясь на сложных вопросах. Это исследование впервые сочетает агентов с нерешенными вопросами, что подчеркивает важность проверки фактических данных.'}, 'en': {'title': 'Evaluating Agentic Models in Biomedical Research: A New Benchmark', 'desc': "This paper introduces a new benchmark called \\openbiorq{} to evaluate agentic models in biomedical research. It focuses on the models' ability to verify citations and avoid false references when addressing unsolved research questions. The study reveals that while models rarely fabricate citations, they often link to incorrect papers, highlighting a significant failure in retrieval-grounded reasoning. The benchmark is designed to assess model performance empirically, showing that even advanced models struggle with difficult questions, leading to a phenomenon known as agentic collapse."}}}, {'id': 'https://huggingface.co/papers/2606.16517', 'title': 'How Post-Training Shapes Biological Reasoning Models', 'url': 'https://huggingface.co/papers/2606.16517', 'abstract': 'Abstract Post-training stages in biological reasoning models differently affect generalization, with continued pre-training aligning models with biological language, supervised fine-tuning improving in-domain performance but reducing out-of-domain generalization, and reinforcement learning recovering out-of-domain performance when applied to well-aligned checkpoints.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Scientific reasoning models for biology combine language models with foundation models trained on multimodal biological data, including DNA, RNA, and proteins. These models are built through post-training, yet how each stage shapes reasoning and generalization remains poorly understood. We study when post-training improves performance and when it induces over-specialization. Across genomics, transcriptomics, and proteins, we train and evaluate more than 100 biological reasoning models under controlled variation in backbone, continued pre-training (CPT), supervised fine-tuning (SFT), and reinforcement learning (RL), measuring both in-domain (ID) and out-of-domain (OOD) performance. We find that each post-training stage reshapes generalization in a distinct way rather than contributing uniform gains. CPT improves downstream performance by aligning models with biological language. SFT consistently increases ID performance but causes OOD performance to peak early and decline as models fit the training distribution. RL, when applied to strong SFT checkpoints with aligned rewards, improves OOD performance and partially recovers generalization. These results show that biological reasoning does not improve monotonically with additional supervision or compute. Instead, performance depends on how training stages are composed. Under fixed post-training budgets, the strongest ID-OOD trade-off comes from brief SFT, larger RL allocations, and asymmetric adaptation capacity across stages.', 'score': 3, 'issue_id': 2724, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': '113ec59767239b07', 'github_url': '', 'github_stars': 0, 'authors': ['Lukas Fesser', 'Hanlin Zhang', 'Michelle M. Li', 'Eric Wang', 'Bryan Perozzi', 'Shekoofeh Azizi', 'Sham M. Kakade', 'Marinka Zitnik'], 'affiliations': ['Google DeepMind', 'Google Research', 'Harvard University'], 'pdf_title_img': 'assets/pdf/title_img/2606.16517.jpg', 'data': {'categories': ['#rl', '#training', '#healthcare', '#reasoning', '#optimization', '#continual_learning', '#multimodal'], 'emoji': '🧬', 'ru': {'title': 'Этапы постобучения в биологических моделях: баланс между специальностью и обобщением', 'desc': 'В данной статье исследуются этапы постобучения моделей биологического рассуждения и их влияние на обобщение. Выясняется, что продолжение предварительного обучения помогает лучше подстраивать модели под биологический язык, в то время как супервайзинг улучшает производительность в обучающем наборе, но снижает показатели вне него. Использование обучения с подкреплением восстанавливает производительность вне обучающего набора при работе с хорошо подобранными контрольными моментами. Результаты показывают, что улучшение в биологическом рассуждении зависит от компоновки этапов обучения.'}, 'en': {'title': 'Optimizing Biological Reasoning: The Power of Post-Training Stages', 'desc': 'This paper investigates how different post-training stages affect the generalization of biological reasoning models. It finds that continued pre-training aligns models with biological language, while supervised fine-tuning enhances in-domain performance but can hurt out-of-domain generalization. Reinforcement learning can recover out-of-domain performance when applied to well-aligned models. The study emphasizes that the effectiveness of training stages varies and is not simply improved by adding more supervision or computational resources.'}}}, {'id': 'https://huggingface.co/papers/2606.27277', 'title': 'EO-WM: A Physically Informed World Model for Probabilistic Earth Observation Forecasting', 'url': 'https://huggingface.co/papers/2606.27277', 'abstract': 'Abstract EO-WM is a video diffusion transformer for multispectral Earth Observation forecasting that incorporates physically informed conditioning frameworks to better capture weather-driven uncertainties in land-surface dynamics.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Earth Observation (EO) forecasting aims to predict future Earth surface dynamics from satellite observations under changing meteorological conditions. In this paper, we view this task as a partially observed, weather-driven world modeling problem, in which weather acts as a conditioning signal, while forecasting remains uncertain due to sparse observations and unobserved land-surface states. However, existing methods do not fully capture this setting: deterministic models collapse uncertainty into a single future prediction, while diffusion-based methods typically treat weather variables as undifferentiated conditioning signals, and existing benchmarks focus mainly on reconstruction accuracy rather than whether forecasts respond correctly to changed weather forcing.We introduce EO-WM, a video diffusion transformer for multispectral EO forecasting. EO-WM incorporates a physically informed conditioning framework that represents meteorological forcing through a climatological baseline, weather anomalies, and cumulative physical stress signals. Specifically, it separates baseline and anomaly through distinct conditioning pathways, and accumulates anomalous forcing over time to capture sustained heat and drought stress. To evaluate weather-response behavior beyond standard metrics, we introduce two diagnostic benchmarks: an Extreme Summer Benchmark for severity-aware prediction of vegetation degradation under extreme weather, and a Seasonal Matched-Pair Benchmark for testing response fidelity under changed weather forcing. Experiments show that EO-WM reduces the error in predicted Normalized Difference Vegetation Index (NDVI) decline amplitude by a relative 5.63% and improves directional hit rate by a relative 7.80%, while remaining competitive on standard pixel-level metrics. The benchmarks and model will be made open-source at https://github.com/Luo-Z13/EO-WM.', 'score': 2, 'issue_id': 2726, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': 'a2752a81e5265189', 'github_url': '', 'github_stars': 0, 'authors': ['Junwei Luo', 'Shuai Yuan', 'Zhenya Yang', 'Yansheng Li', 'Zhe Liu', 'Hengshuang Zhao'], 'affiliations': ['The University of Hong Kong', 'Wuhan University'], 'pdf_title_img': 'assets/pdf/title_img/2606.27277.jpg', 'data': {'categories': ['#dataset', '#diffusion', '#open_source', '#benchmark'], 'emoji': '🌍', 'ru': {'title': 'Новый уровень прогнозирования изменений на Земле', 'desc': 'В статье представлена модель EO-WM, основанная на видео-диффузионном трансформере для многоспектрального прогнозирования земли на основе данных спутников. Модель учитывает физически обоснованные условия, позволяя лучше справляться с неопределенностями, вызванными изменениями погоды. Она разделяет базовые и аномальные данные, обеспечивая более точный учет долгосрочного стресса от жары и засухи. Проведенные эксперименты показывают, что EO-WM снижает ошибки в прогнозе и улучшает точность предсказаний по сравнению с существующими методами.'}, 'en': {'title': 'Enhancing Earth Observation Forecasting with EO-WM', 'desc': 'The paper presents EO-WM, a video diffusion transformer designed for multispectral Earth Observation forecasting. It addresses the challenge of predicting land-surface dynamics under varying weather conditions by incorporating a physically informed conditioning framework. This framework distinguishes between baseline weather conditions and anomalies, allowing for better modeling of sustained environmental stress. The model demonstrates improved accuracy in predicting vegetation decline and introduces new benchmarks to evaluate weather-response behavior in forecasting.'}}}, {'id': 'https://huggingface.co/papers/2606.24775', 'title': 'Are We Ready For An Agent-Native Memory System?', 'url': 'https://huggingface.co/papers/2606.24775', 'abstract': "Abstract Large language model agents' memory systems have evolved into complex data management frameworks requiring systematic evaluation across multiple modules and workloads to understand their performance characteristics and trade-offs.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Memory for large language model (LLM) agents has rapidly evolved from simple retrieval-augmented mechanisms into a data management system that supports persistent information storage, retrieval, update, consolidation, and dynamic lifecycle governance throughout agent execution. Despite this evolution, existing evaluations still benchmark agent memory mainly through end-to-end task success metrics (e.g., F1, BLEU), while treating the underlying system as a monolithic black box. As a result, critical system-level concerns, including operational costs, architectural trade-offs across memory modules, and robustness under dynamic knowledge updates, remain insufficiently explored. In this paper, we present a systematic experimental study of agent memory from a data management perspective. We propose an analytical framework that decomposes agent memory into four core modules: memory representation and storage, extraction, retrieval and routing, and maintenance. Under this framework, we evaluate 12 representative memory systems and two reference baselines across five benchmark workloads spanning 11 datasets. Our extensive end-to-end evaluation shows that no single architecture dominates across all scenarios; instead, effectiveness depends heavily on how well the memory structure aligns with the workload bottleneck. Furthermore, through fine-grained ablation studies, we quantify their individual effects on representation fidelity, retrieval precision, update correctness, and long-horizon stability. Finally, we reveal cost-performance trade-offs under realistic workloads, showing localized maintenance is more cost-efficient than global reorganization. Based on these findings, we identify promising directions towards building truly agent-native memory systems. The code is publicly available at https://github.com/OpenDataBox/MemoryData.", 'score': 61, 'issue_id': 2719, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': 'e47803d6fe7d53a7', 'github_url': '', 'github_stars': 0, 'authors': ['Wei Zhou', 'Xuanhe Zhou', 'Shaokun Han', 'Hongming Xu', 'Guoliang Li', 'Zhiyu Li', 'Feiyu Xiong', 'Fan Wu'], 'affiliations': ['MemTensor (Shanghai) Technology Co., Ltd', 'Shanghai Jiao Tong University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.24775.jpg', 'data': {'categories': ['#benchmark', '#retrieval', '#memory', '#agent_memory', '#dataset'], 'emoji': '🧠', 'ru': {'title': 'Эволюция памяти агентов: от простоты к сложности', 'desc': 'В данной статье рассматривается эволюция систем памяти агентов больших языковых моделей (LLM) и их сложные архитектуры управления данными. Авторы предлагают аналитическую структуру, разбивающую память агентов на четыре основных модуля: представление и хранение памяти, извлечение, поиск и маршрутизация, а также обслуживание. Проведенное исследование показывает, что эффективность памяти зависит от того, насколько хорошо структура памяти соответствует ограничениям рабочей нагрузки. В работе также обсуждаются компромиссы между стоимостью и производительностью в реальных условиях применения.'}, 'en': {'title': 'Optimizing Memory Systems for Language Model Agents', 'desc': 'This paper explores the evolution of memory systems in large language model agents, highlighting their transition from simple retrieval methods to complex data management frameworks. It introduces an analytical framework that breaks down agent memory into four key modules: representation and storage, extraction, retrieval and routing, and maintenance. The study evaluates various memory systems across multiple workloads, revealing that no single architecture excels in all scenarios; performance is highly dependent on the alignment of memory structure with workload demands. Additionally, the research uncovers cost-performance trade-offs, suggesting that localized maintenance strategies are more efficient than global reorganization.'}}}, {'id': 'https://huggingface.co/papers/2606.26058', 'title': 'DomainShuttle: Freeform Open Domain Subject-driven Text-to-video Generation', 'url': 'https://huggingface.co/papers/2606.26058', 'abstract': 'Abstract DomainShuttle enables open domain subject-driven text-to-video generation with high fidelity and flexibility across in-domain and cross-domain scenarios through domain-aware modeling and dual RoPE schemes.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Open domain subject-driven text-to-video (S2V) generation has drawn significant interest in academia and industry. Open domain S2V mainly involves two scenarios: in-domain, which requires retaining the reference subject features as much as possible, and cross-domain, which preserves the intrinsic features of the subject while allowing subject-irrelevant properties to vary flexibly according to the text prompt. Existing methods primarily focus on maximizing subject fidelity in in-domain scenarios, which limits their editability and adaptability in cross-domain scenarios, such as novel styles, semantic combinations, or domain attributes. In this study, we propose that an ideal S2V method should flexibly shuttle between different domains, achieving strong performance in both in-domain and cross-domain scenarios. To this end, we propose DomainShuttle, which could achieve high fidelity and generative flexibility for open domain video personalization. Specifically, we introduce Domain-MoT, which decouples videos and reference features and introduces the domain-aware AdaLN for domain-specific modeling of reference images. We then introduce the Video-Reference DualRoPE scheme, which places reference image tokens and video tokens in separate RoPE spaces to enable precise subject-level spatial modeling, and Cross-Pair Consistent Loss, which aims to extract intrinsic subject features unaffected by irrelevant features. Extensive experiments demonstrate that DomainShuttle achieves significant performance improvements over existing methods, exhibiting high subject fidelity and generative flexibility across diverse open domain application scenarios.', 'score': 48, 'issue_id': 2719, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '78a299a36db6c69a', 'github_url': '', 'github_stars': 0, 'authors': ['Nan Chen', 'Yiyang Cai', 'Rongchang Xie', 'Junwen Pan', 'Cheng Chen', 'Weinan Jia', 'Zhuowei Chen', 'Wen Zhou', 'Zhenbang Sun', 'Wenhan Luo'], 'affiliations': ['Hong Kong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2606.26058.jpg', 'data': {'categories': ['#open_source', '#diffusion', '#3d', '#multimodal'], 'emoji': '📹', 'ru': {'title': 'Гибкая генерация видео на основе текста для любых тем', 'desc': 'Статья посвящена новой системе DomainShuttle, которая позволяет генерировать видео на основе текста с высокой точностью и гибкостью. Она разделяет видео и справочные характеристики, что улучшает адаптивность к различным стилям и семантическим комбинациям. Также в системе используется метод DualRoPE для точного пространственного моделирования объектов. Проведенные эксперименты показывают, что DomainShuttle значительно превосходит существующие методы в открытых доменах.'}, 'en': {'title': 'Shuttling Between Domains for Flexible Text-to-Video Generation', 'desc': 'DomainShuttle is a novel approach for generating videos from text prompts that allows for high fidelity and flexibility in both in-domain and cross-domain scenarios. It addresses the limitations of existing methods by enabling the retention of subject features while allowing for variations in non-essential properties. The method introduces Domain-MoT for decoupling video and reference features, and employs a Video-Reference DualRoPE scheme for precise spatial modeling. Extensive experiments show that DomainShuttle significantly outperforms previous techniques, making it suitable for diverse open domain applications.'}}}, {'id': 'https://huggingface.co/papers/2606.25763', 'title': 'ShutterMuse: Capture-Time Photography Guidance with MLLMs', 'url': 'https://huggingface.co/papers/2606.25763', 'abstract': 'Abstract Researchers developed a new benchmark and dataset for photography assistance, along with a unified multimodal model that provides both composition guidance and pose recommendations during image capture.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Real-world photography requires capture-time guidance for both camera framing and subject pose. Yet existing aesthetic cropping benchmarks mainly evaluate post-hoc crop prediction and overlook subject-side recommendations, leaving the capture-time guidance capabilities of multimodal large language models (MLLMs) underexplored. To address this gap, we introduce CaptureGuide-Bench, a benchmark with two complementary tasks: photographer-side composition decision and refinement, and subject-side scene-conditioned pose recommendation. Our evaluation reveals limitations: general-purpose MLLMs can make composition decisions but lack precise refinement localization, while specialized aesthetic cropping models localize crops effectively but are limited to refinement; neither provides actionable pose guidance. To support model development, we further construct CaptureGuide-Dataset, comprising 130K samples with textual rationales and structured visual annotations, and develop ShutterMuse, a unified MLLM trained with supervised and reinforcement fine-tuning. Experiments on CaptureGuide-Bench show that ShutterMuse achieves the best overall photographer-side performance among evaluated baselines and competitive subject-side pose recommendation with substantially lower inference cost, demonstrating the potential of MLLMs as interactive assistants for photography during image capture.', 'score': 34, 'issue_id': 2719, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '613ee552f1f327f2', 'github_url': '', 'github_stars': 0, 'authors': ['Jiayu Li', 'Yixiao Fang', 'Tianyu Hu', 'Wei Cheng', 'Ping Huang', 'Zheheng Fan', 'Gang Yu', 'Xingjun Ma'], 'affiliations': ['Fudan University', 'StepFun'], 'pdf_title_img': 'assets/pdf/title_img/2606.25763.jpg', 'data': {'categories': ['#benchmark', '#training', '#dataset', '#games', '#optimization', '#multimodal'], 'emoji': '📸', 'ru': {'title': 'Интерактивный помощник для фотографов', 'desc': 'Исследователи разработали новый бенчмарк и набор данных для помощи в фотографии, который включает в себя унифицированную многомодальную модель. Эта модель предлагает рекомендации по композиции и позам во время съемки. Представленный CaptureGuide-Bench состоит из двух задач: принятие решений по композиции от фотографа и рекомендации поз для объекта съемки. Эксперименты показали, что новая модель ShutterMuse обладает наилучшей производительностью и может служить интерактивным помощником для фотографов.'}, 'en': {'title': 'Revolutionizing Photography with Real-Time Guidance', 'desc': 'This paper presents a new benchmark and dataset called CaptureGuide-Bench for enhancing photography assistance through a unified multimodal model. The model offers real-time guidance on both composition and subject pose during image capture, addressing gaps in existing benchmarks that focus mainly on post-capture evaluations. The study reveals that while general-purpose multimodal large language models (MLLMs) can assist with composition, they struggle with precise localization and actionable pose recommendations. The authors introduce ShutterMuse, a model that outperforms others in photographer-side tasks and shows promise in subject-side pose recommendations, highlighting the potential of MLLMs as interactive photography assistants.'}}}, {'id': 'https://huggingface.co/papers/2606.25041', 'title': 'Wan-Streamer v0.1: End-to-end Real-time Interactive Foundation Models', 'url': 'https://huggingface.co/papers/2606.25041', 'abstract': 'Abstract Wan-Streamer is a unified, end-to-end multimodal model that enables real-time audio-visual interaction through causal attention mechanisms and integrated processing of visual, audio, and text modalities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present Wan-Streamer, a native-streaming, end-to-end interactive foundation model designed from the ground up for real-time, low-latency, full-duplex audio-visual interaction. Wan-Streamer seamlessly models language, audio, and video as both input and output within a single Transformer, where the sequence is represented as interleaved visual, audio, and text input tokens together with visual, audio, and text output tokens, coordinated by block-causal attention for incremental streaming. Unlike cascaded interactive systems that rely on separate VAD, ASR, language, TTS, audio-driven animation, or video-generation modules, Wan-Streamer does not rely on external language, speech, avatar, or video-generation modules: perception, reasoning, generation, response timing, turn management, and cross-modal synchronization are learned jointly within one unified model, reducing pipeline latency and error accumulation. To support natural audio-visual responsiveness, we redesign the entire stack around streamability, including causal encoders, causal decoders, block-causal attention, and low-latency multimodal token scheduling, enabling streaming units as short as 160 ms at 25 fps. Wan-Streamer achieves approximately 200 ms model-side response latency and approximately 550 ms total interaction latency when combined with 350 ms bidirectional network latency, supporting sub-second duplex audio-visual communication. These results position Wan-Streamer as a unified, end-to-end, multimodal interactive foundation model for low-latency streaming interaction.', 'score': 34, 'issue_id': 2719, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': 'fdc0c869d73daee2', 'github_url': '', 'github_stars': 0, 'authors': ['Lianghua Huang', 'Zhifan Wu', 'Wei Wang', 'Yupeng Shi', 'Mengyang Feng', 'Junjie He', 'Chenwei Xie', 'Yu Liu', 'Jingren Zhou', 'Ang Wang', 'Bang Zhang', 'Baole Ai', 'Chen Liang', 'Cheng Yu', 'Chongyang Zhong', 'Jinwei Qi', 'Kai Zhu', 'Pandeng Li', 'Peng Zhang', 'Wenyuan Zhang', 'Xinhua Cheng', 'Yitong Huang', 'Yun Zheng', 'Zoubin Bi'], 'affiliations': ['Wan Team, Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2606.25041.jpg', 'data': {'categories': ['#games', '#audio', '#optimization', '#multimodal'], 'emoji': '🎤', 'ru': {'title': 'Реальное аудиовизуальное взаимодействие без задержек', 'desc': 'Wan-Streamer — это унифицированная, end-to-end многомодальная модель, предназначенная для взаимодействия в реальном времени с использованием аудио и видео. Она обрабатывает визуальные, аудиальные и текстовые данные одновременно с помощью механизмов причинного внимания. В отличие от каскадных систем, Wan-Streamer не требует внешних модулей для обработки языка, речи или видео, что снижает задержки и ошибки. Модель обеспечивает быструю реакцию и эффективное взаимодействие с задержкой около 200 мс, что позволяет осуществлять полноценное двустороннее общение.'}, 'en': {'title': 'Real-Time Multimodal Interaction Made Simple', 'desc': 'Wan-Streamer is a cutting-edge multimodal model designed for real-time audio-visual interaction using causal attention mechanisms. It integrates visual, audio, and text modalities into a single Transformer architecture, allowing for seamless processing of inputs and outputs. Unlike traditional systems that rely on separate components, Wan-Streamer learns perception, reasoning, and response management within one unified framework, minimizing latency and errors. With a response latency of around 200 ms, it supports efficient duplex communication, making it ideal for interactive applications.'}}}, {'id': 'https://huggingface.co/papers/2606.15932', 'title': 'Beyond NL2Code: A Structured Survey of Multimodal Code Intelligence', 'url': 'https://huggingface.co/papers/2606.15932', 'abstract': 'Abstract This survey explores multimodal code intelligence systems that generate and reason with code based on visual inputs, categorizing approaches across GUI, scientific visualization, structured graphics, and emerging frameworks while identifying verification-centered research directions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct While Large Language Models (LLMs) have substantially advanced text-to-code synthesis, many real programming tasks specify intent through visual artifacts such as screenshots, charts, vector drawings, videos, and interactive states. These tasks require models to connect visual perception to executable programs, because correctness depends not only on syntax but also on layout, data semantics, interaction behavior, and domain-specific constraints that apply after execution. This survey examines Multimodal Code Intelligence, covering systems that generate, edit, refine, or reason with code under visually grounded inputs and outputs. We first formulate the field by the role that code plays in each task, distinguishing code as a rendered artifact, an editable symbolic structure, a scientific representation, an intermediate reasoning trace, or an executable policy or tool interface. We then organize benchmarks and methods into four domains: Graphical User Interface, Scientific Visualization, Structured Graphics, and Frontier Tasks and Frameworks. This taxonomy connects mature artifact-generation problems to emerging agentic and unified settings and allows us to compare how different tasks treat evidence of correctness. Looking ahead, we argue that future research may benefit from four verification-centered directions. Multi-signal validation can combine complementary evidence of correctness, multi-state verification can test behavior across execution trajectories, cross-task transfer testing can probe reusable visual-code skills, and verifiable agent traces can reveal whether agent actions are grounded in visual evidence. Together, these directions may move this field from single-output imitation toward evidence-grounded executable systems. An ongoing project and resources are available on https://github.com/xjywhu/Awesome-Multimodal-LLM-for-Code{GitHub}.', 'score': 26, 'issue_id': 2719, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': '05d6880aa12e7c8b', 'github_url': '', 'github_stars': 0, 'authors': ['Xuanle Zhao', 'Qiushi Sun', 'Jingyu Xiao', 'Xuexin Liu', 'Haoyue Yang', 'Qiaosheng Chen', 'Xianzhen Luo', 'Jing Huang', 'Yufeng Zhong', 'Lei Chen', 'Shuai Fu', 'Zhenlin Wei', 'Jinhe Bi', 'Lei Jiang', 'Haibo Qiu', 'Siqi Yang', 'Peng Shi', 'Jian Hu', 'Zhixiong Zeng'], 'affiliations': ['Australian Institute for Machine Learning, Adelaide University', 'Harbin Institute of Technology', 'Institute of Automation, Chinese Academy of Sciences', 'Ludwig Maximilian University of Munich', 'Meituan', 'Nanjing University', 'Queen Mary University of London', 'The Chinese University of Hong Kong', 'The University of Hong Kong', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2606.15932.jpg', 'data': {'categories': ['#benchmark', '#survey', '#games', '#agents', '#reasoning', '#multimodal'], 'emoji': '💻', 'ru': {'title': 'Мульти модальные системы для генерации кода на основе визуальных данных', 'desc': 'В данной статье рассматриваются мульти модальные системы интеллектуального кодирования, которые генерируют и обрабатывают код на основе визуальных данных. Исследуются подходы в областях графических интерфейсов, научной визуализации и структурной графики. Авторы подчеркивают важность соединения визуального восприятия с исполняемыми программами, поскольку правильность реализации зависит не только от синтаксиса, но и от семантики данных и специфических ограничений. В статье также предлагаются направления для будущих исследований, сосредоточенные на верификации кода с использованием многофункциональных сигналов и тестирования поведения моделей.'}, 'en': {'title': 'Bridging Visual Inputs and Code Generation', 'desc': 'This paper surveys multimodal code intelligence systems that integrate visual inputs to generate and reason with code. It highlights the importance of connecting visual perception with executable programs, as correctness relies on both syntax and visual context. The authors categorize existing approaches into four domains: Graphical User Interface, Scientific Visualization, Structured Graphics, and emerging frameworks. They propose future research directions focused on verification, aiming to enhance the reliability of these systems by grounding actions in visual evidence.'}}}, {'id': 'https://huggingface.co/papers/2606.25331', 'title': 'Improved Large Language Diffusion Models', 'url': 'https://huggingface.co/papers/2606.25331', 'abstract': 'Abstract Masked diffusion language models with fully bidirectional attention outperform autoregressive counterparts on various benchmarks while maintaining competitiveness with established models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Modern large language models are predominantly trained with autoregressive factorization and causal attention. We present iLLaDA, an 8B masked diffusion language model trained from scratch with fully bidirectional attention. iLLaDA keeps the masked diffusion objective throughout pre-training and supervised fine-tuning (SFT), scaling pre-training to 12T tokens and fine-tuning on a 25B-token instruction corpus for 12 epochs. We further use variable-length generation for efficiency and introduce confidence-based scoring for multiple-choice evaluation. Compared with LLaDA, iLLaDA improves broadly across general, mathematical, and code benchmarks; for example, iLLaDA-Base improves by 21.6 points on BBH and 14.9 points on ARC-Challenge, while iLLaDA-Instruct improves by 14.5 points on MATH and 16.5 points on HumanEval. Despite its non-autoregressive training, iLLaDA also remains competitive with Qwen2.5 7B on several benchmarks. These results show that fully bidirectional diffusion training from scratch is a competitive path toward strong language models. Model weights and codes: https://github.com/ML-GSAI/LLaDA.', 'score': 23, 'issue_id': 2719, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '095f03d911475c9d', 'github_url': '', 'github_stars': 0, 'authors': ['Shen Nie', 'Qiyang Min', 'Shaoxuan Xu', 'Zihao Huang', 'Yuxuan Song', 'Yong Shan', 'Yankai Lin', 'Wayne Xin Zhao', 'Chongxuan Li', 'Ji-Rong Wen'], 'affiliations': ['Beijing Key Laboratory of Research on Large Models and Intelligent Governance', 'ByteDance', 'Engineering Research Center of Next-Generation Intelligent Search and Recommendation, MOE', 'Gaoling School of Artificial Intelligence, Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2606.25331.jpg', 'data': {'categories': ['#benchmark', '#training', '#architecture', '#diffusion', '#optimization'], 'emoji': '🚀', 'ru': {'title': 'iLLaDA: Новый взгляд на языковые модели', 'desc': 'В данной работе представлена модель iLLaDA, которая использует маскированное диффузионное обучение и полностью двунаправленное внимание. Эта модель обучалась с нуля на 12 триллионах токенов и демонстрирует высокую эффективность в различных задачах, включая математику и программирование. По сравнению с предшественником LLaDA, iLLaDA показывает значительное улучшение результатов на множестве тестов. Исследование подчеркивает, что полное двунаправленное обучение может стать конкурентоспособным методом для создания мощных языковых моделей.'}, 'en': {'title': 'iLLaDA: A New Era of Bidirectional Diffusion Language Models', 'desc': 'This paper introduces iLLaDA, a novel 8B masked diffusion language model that utilizes fully bidirectional attention, outperforming traditional autoregressive models. It is trained from scratch with a focus on a masked diffusion objective, scaling pre-training to 12 trillion tokens and fine-tuning on a large instruction corpus. iLLaDA demonstrates significant improvements across various benchmarks, including general knowledge, mathematics, and code generation tasks. The findings suggest that fully bidirectional diffusion training is a promising approach for developing competitive language models.'}}}, {'id': 'https://huggingface.co/papers/2606.26087', 'title': 'MVTrack4Gen: Multi-View Point Tracking as Geometric Supervision for 4D Video Generation', 'url': 'https://huggingface.co/papers/2606.26087', 'abstract': 'Abstract A novel-view video synthesis method that enhances motion-aware diffusion models through multi-view point tracking supervision to improve geometric consistency and motion fidelity.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Synthesizing a novel-view video from a monocular reference video along a target camera trajectory requires both geometric consistency and motion fidelity with respect to the reference video. Existing methods based on explicit 3D representations are limited by the accuracy of off-the-shelf reconstruction modules, which often produce inaccurate geometry for dynamic objects in monocular videos. In contrast, camera-conditioning-only methods can achieve high visual quality but often struggle to preserve geometric and motion consistency. In this work, we introduce MVTrack4Gen (Multi-View point Tracking for Novel-View Generation), a motion-aware training framework that leverages multi-view point tracking as an additional geometric and motion supervision signal for camera-conditioning-only novel-view video diffusion models. Our key finding is that specific attention layers encode strong correspondence cues, where query features attend to key features at geometrically corresponding locations across views and over time, and the misalignment of these correspondences causes motion inconsistency. Based on this observation, we route these features into an auxiliary multi-view tracking head and jointly train the diffusion model with a point-tracking objective. By explicitly strengthening these motion-aware correspondences, MVTrack4Gen improves existing models to better follow the motion in the reference view and maintain cross-view geometric consistency. Across diverse benchmarks, our method achieves state-of-the-art geometric consistency and competitive camera accuracy.', 'score': 20, 'issue_id': 2719, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '47e1627f0eaad608', 'github_url': '', 'github_stars': 0, 'authors': ['JoungBin Lee', 'Jaewoo Jung', 'Jongmin Lee', 'Tongmin Kim', 'Hyunsung Kim', 'Takuya Narihira', 'Kazumi Fukuda', 'Jahyeok Koo', 'Jisang Han', 'Yuki Mitsufuji', 'Seungryong Kim'], 'affiliations': ['KAIST', 'Sony AI', 'Sony Group Corporation'], 'pdf_title_img': 'assets/pdf/title_img/2606.26087.jpg', 'data': {'categories': ['#benchmark', '#diffusion', '#3d', '#multimodal'], 'emoji': '🎥', 'ru': {'title': 'Синтез видео с новыми углами обзора через отслеживание движения', 'desc': 'В данной статье представлено новое метод синтеза видео с использованием нескольких углов обзора, который улучшает модели диффузии, учитывающие движение. Метод называется MVTrack4Gen и применяет мульти-угловую отслеживание точек для обеспечения геометрической согласованности и точности движения в создаваемом видео. Это позволяет избежать проблем, связанных с inaccurate 3D представлениями и поддерживать высокое качество визуализации. Результаты показывают, что предложенный метод достигает передовой геометрической согласованности и конкурентоспособной точности камеры.'}, 'en': {'title': 'Enhancing Video Synthesis with Motion-Aware Tracking', 'desc': 'This paper presents MVTrack4Gen, a new method for synthesizing novel-view videos that improves the quality of motion and geometry in generated content. It uses multi-view point tracking to provide additional supervision, helping to align features across different views and time. By focusing on the correspondence of features, the method enhances the performance of diffusion models, which traditionally struggle with geometric accuracy in dynamic scenes. The results show that MVTrack4Gen achieves state-of-the-art performance in maintaining geometric consistency and motion fidelity compared to existing techniques.'}}}, {'id': 'https://huggingface.co/papers/2606.25319', 'title': 'V-Zero: Answer-Label-Free On-Policy Distillation with Contrastive Evidence Gating for Fine-Grained Visual Reasoning', 'url': 'https://huggingface.co/papers/2606.25319', 'abstract': 'Abstract A novel label-free framework for visual reasoning called V-Zero is presented, which uses contrastive evidence gating to improve fine-grained visual reasoning without requiring annotated answer labels, achieving faster training than traditional methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Fine-grained visual reasoning requires multimodal large language models (MLLMs) to identify task-relevant visual evidence and ground their reasoning in local image regions. Existing agentic methods typically rely on reinforcement learning with verifiable rewards or supervised fine-tuning on large-scale annotated reasoning traces, leading to costly exploration, hand-designed verification rules, or heavy dependence on textual supervision. A natural way to avoid such external answer labels is to learn from trajectories sampled by the student itself, which points to On-Policy Distillation (OPD). To understand what OPD can and cannot provide for visual reasoning, we revisit it as negative-free stop-gradient alignment. This perspective shows that, although OPD provides effective token-level correction, its ceiling is constrained by the absence of trajectory-level discrimination. Motivated by these observations, we propose V-Zero, an answer-label-free framework for visual reasoning with contrastive evidence gating. V-Zero uses no annotated textual answer labels; instead, during training it pairs a question-relevant regional crop with a negative visual view to evaluate student-sampled trajectories and gate dense token-level distillation. Experiments on multiple visual reasoning benchmarks show that V-Zero consistently improves fine-grained visual reasoning while preserving strong generalization. Notably, V-Zero is more than 5times faster than previous supervised fine-tuning methods and more than 10times faster than reinforcement learning baselines. Code and dataset will be released at https://github.com/eVI-group-SCU/V-Zero', 'score': 15, 'issue_id': 2719, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '357bf929e01d7778', 'github_url': '', 'github_stars': 0, 'authors': ['Haoxiang Sun', 'Zhihang Yi', 'Langxuan Deng', 'Yuhao Zhou', 'Peiqi Jia', 'Jian Zhao', 'Li Yuan', 'Jiancheng Lv', 'Tao Wang'], 'affiliations': ['Peking University', 'Sichuan University', 'TeleAI of China Telecom', 'Xian Jiaotong University'], 'pdf_title_img': 'assets/pdf/title_img/2606.25319.jpg', 'data': {'categories': ['#optimization', '#multimodal', '#training', '#dataset', '#reasoning', '#rl'], 'emoji': '🖼️', 'ru': {'title': 'V-Zero: Новый подход к визуальному рассуждению без аннотаций', 'desc': 'Представлен новый безметочный фреймворк для визуального рассуждения под названием V-Zero, который использует контрастное доказательное гейтинга для улучшения точного визуального рассуждения без необходимости аннотированных ответов. Это позволяет значительно ускорить процесс обучения по сравнению с традиционными методами. V-Zero применяет местные обрезки изображений, которые соответствуют вопросам, и негативные визуальные представления для оценки траекторий, выбранных самим студентом. Эксперименты показывают, что V-Zero значительно улучшает точное визуальное рассуждение и обеспечивает высокую степень обобщения.'}, 'en': {'title': 'V-Zero: Fast and Label-Free Visual Reasoning', 'desc': 'The paper introduces V-Zero, a new framework for visual reasoning that operates without the need for labeled answers. It employs contrastive evidence gating to enhance fine-grained visual reasoning by focusing on relevant visual evidence in images. Unlike traditional methods that rely on supervised learning or reinforcement learning, V-Zero learns from its own sampled trajectories, making the training process faster and more efficient. Experiments demonstrate that V-Zero significantly outperforms existing methods in both speed and reasoning accuracy across various benchmarks.'}}}, {'id': 'https://huggingface.co/papers/2606.24849', 'title': 'IV-CoT: Implicit Visual Chain-of-Thought for Structure-Aware Text-to-Image Generation', 'url': 'https://huggingface.co/papers/2606.24849', 'abstract': 'Abstract Implicit Visual Chain-of-Thought decomposes visual conditioning into structural and semantic cascades for improved structure-aware image generation with sketch supervision.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Unified multi-modal large language models (MLLMs) have achieved strong text-to-image generation quality, but still struggle with structure-aware prompt following, where object counts, spatial relations, attribute bindings, and coarse layouts must be preserved. We attribute this limitation in part to the entanglement of structural planning and appearance rendering within a single conditioning stream. To address this issue, we propose Implicit Visual Chain-of-Thought (IV-CoT), a latent visual reasoning framework for query-conditioned image generation. IV-CoT decomposes the visual conditioning queries into a structural-to-semantic cascade, where structural queries first form a latent visual plan and semantic queries then render appearance conditioned on this plan. To guide the structural queries, we introduce training-only sketch supervision, which encourages them to capture structure from sketches without requiring sketch extraction or intermediate decoding at inference time. IV-CoT performs implicit CoT reasoning in a single forward pass and achieves superior results on GenEval and T2I-CompBench. Visualizations and analyses demonstrate that the learned structural and semantic queries play complementary roles in structure-aware generation.', 'score': 13, 'issue_id': 2719, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': 'd810960937483ea6', 'github_url': '', 'github_stars': 0, 'authors': ['Zixuan Li', 'Haokun Lin', 'Yicheng Xiao', 'Zhiwei Li', 'Xinyang Song', 'Zelong Zheng', 'Yong He', 'Heng Yao', 'Ke Ding', 'Chao Yu', 'Chuan Yuan', 'Qi Li', 'Zhenan Sun'], 'affiliations': ['Ant Group', 'NLPR, Institute of Automation, Chinese Academy of Sciences', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2606.24849.jpg', 'data': {'categories': ['#interpretability', '#3d', '#games', '#reasoning', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Новая эра генерации изображений с учетом структуры', 'desc': 'Статья описывает метод Implicit Visual Chain-of-Thought (IV-CoT), который улучшает генерацию изображений с учетом структуры. Этот подход разбивает визуальные запросы на два этапа: структурный и семантический, что позволяет лучше сохранять объекты, пространственные отношения и атрибуты в изображениях. Для обучения используется поддержка эскизов, что позволяет модели понимать структуру без необходимости в извлечении эскизов в реальном времени. IV-CoT демонстрирует отличные результаты в тестах на генерацию изображений.'}, 'en': {'title': 'Enhancing Image Generation with Structured Visual Reasoning', 'desc': 'The paper introduces Implicit Visual Chain-of-Thought (IV-CoT), a new framework for generating images that better understands structure. It separates the process of planning the layout of objects from rendering their appearance, which helps maintain spatial relationships and object attributes. By using sketch supervision during training, IV-CoT learns to create a visual plan without needing complex extraction methods at inference. This approach leads to improved performance in generating images that are both structurally and semantically coherent.'}}}, {'id': 'https://huggingface.co/papers/2606.21661', 'title': 'UnityShots: Memory-Driven Multi-Shot Audio-Video Generation with Boundary-Aware Gating', 'url': 'https://huggingface.co/papers/2606.21661', 'abstract': 'Abstract UnityShots is a memory-driven audio-video generation system that maintains consistent subject appearance and audio across video cuts using fixed-size long-term and short-term memory slots with boundary-conditioned gates and discrete cut-type priors.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Generating a coherent multi-shot video requires structured cross-shot memory. Subject appearance, scene context, and speaker identity must persist across cuts. Existing approaches either train end-to-end over fixed-length sequences and cannot scale, generate shot-by-shot with memory banks that grow linearly, or orchestrate pretrained generators under an LLM planner without a multi-shot-aware backbone. We present UnityShots, a memory-driven multi-shot audio-video generation system built on LTX-2.3, trained on annotated cinematic and music-video shots. The video stream maintains two fixed-size slots, a long-term memory (LTM) slot anchored to the opening shot and a short-term memory (STM) slot holding the immediately preceding tail, both updated at every cut by a boundary-conditioned gate that fuses visual cut probability and beat-tracker signals. The audio stream injects a reference speaker token at every shot to preserve vocal timbre without a sliding audio bank. A discrete cut-type prior, learned through AdaLN, becomes an inference-time control knob over transition strength. We release a benchmark of 200 multi-cultural multi-shot sequences spanning six ethnic regions and ten or more languages, with per-shot reference identities, reference audio, and per-boundary transition labels. Evaluated across I2V, T2V, and R2V conditioning modes, UnityShots leads open-source baselines on every cross-shot coherence metric and matches the strongest closed-source system on the multi-shot axes.', 'score': 13, 'issue_id': 2719, 'pub_date': '2026-06-19', 'pub_date_card': {'ru': '19 июня', 'en': 'June 19', 'zh': '6月19日'}, 'hash': 'c8cf49cc6ead8cb1', 'github_url': '', 'github_stars': 0, 'authors': ['Jiehui Huang', 'Yuechen Zhang', 'Bin Xia', 'Jiahao Wang', 'Xu He', 'Zhenchao Tang', 'Meng Chu', 'Xin Tao', 'Pengfei Wan', 'Jiaya Jia'], 'affiliations': ['Kuaishou Technology', 'Sun Yat-sen University', 'The Chinese University of Hong Kong', 'The Hong Kong University of Science and Technology', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.21661.jpg', 'data': {'categories': ['#benchmark', '#memory', '#open_source', '#dataset', '#audio', '#multimodal'], 'emoji': '🎥', 'ru': {'title': 'UnityShots: новое слово в генерации видео', 'desc': 'Статья представляет систему генерации аудио-видео под названием UnityShots, которая использует долговременную и краткосрочную память для поддержания согласованности внешнего вида субъекта и звука в видео. Система использует фиксированные размеры памяти и условия для управления границами, что позволяет сохранять идентичность субъекта и контекст сцены при смене кадров. UnityShots была обучена на аннотированных кадрах кинематографа и музыкальных видео, обеспечивая высокое качество многослойного контента. Система демонстрирует лидерство в метриках согласованности при переходах между кадрами по сравнению с существующими решениями.'}, 'en': {'title': 'Seamless Multi-Shot Video Generation with UnityShots', 'desc': 'UnityShots is a novel system for generating multi-shot audio-video content that ensures consistent subject appearance and audio across different video cuts. It utilizes a structured memory approach with long-term and short-term memory slots, which are updated using boundary-conditioned gates. This method allows for better coherence in video transitions by maintaining visual and audio continuity. The system outperforms existing methods in cross-shot coherence metrics and provides a comprehensive benchmark for evaluating multi-cultural video sequences.'}}}, {'id': 'https://huggingface.co/papers/2606.18239', 'title': 'EBench: Elemental Diagnosis of Generalist Mobile Manipulation Policies', 'url': 'https://huggingface.co/papers/2606.18239', 'abstract': 'Abstract EBench is a comprehensive simulation benchmark for evaluating generalist mobile manipulation policies across diverse tasks and dimensions, revealing distinct capability profiles and generalization patterns among state-of-the-art models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present EBench, a simulation benchmark that diagnoses generalist mobile manipulation policies beyond a single success-rate scalar. EBench comprises 26 diverse and challenging manipulation tasks annotated along 5 capability dimensions and 4 generalization dimensions. We evaluate state-of-the-art generalist manipulation models including π_0, π_{0.5}, XVLA, and InternVLA-A1, and reveal that models with near success rates exhibit strikingly different capability profiles: π_{0.5} achieves the highest test success rate and the best train--test retention, whereas InternVLA-A1 dominates mobile manipulation but collapses on dexterous tasks, and XVLA exhibits strengths on a disjoint set of atomic skills compared to other policies. Beyond capability profiling, EBench analyzes the generalization ability from 4 representative perspectives, identifying the impact of different distribution shift factors. The results reveal strengths and weaknesses of models behind an overall score. We hope this benchmark offers a broad set of diagnostic signals to guide iteration on generalist manipulation models.', 'score': 12, 'issue_id': 2719, 'pub_date': '2026-06-20', 'pub_date_card': {'ru': '20 июня', 'en': 'June 20', 'zh': '6月20日'}, 'hash': 'fdf7e12313b01e7b', 'github_url': '', 'github_stars': 0, 'authors': ['Ning Gao', 'Jinliang Zheng', 'Xing Gao', 'Haoxiang Ma', 'Hanqing Wang', 'Yukai Wang', 'Jiantong Chen', 'Zanxin Chen', 'Shujie Zhang', 'Mingda Jia', 'Xuekun Jiang', 'Zihou Zhu', 'Xinyu Li', 'Shuai Wang', 'Hao Li', 'Wenzhe Cai', 'Yuqiang Yang', 'Xudong Xu', 'Zhaoyang Lyu', 'Yao Mu', 'Tai Wang', 'Jiangmiao Pang', 'Jia Zeng', 'Weinan Zhang', 'Chunhua Shen'], 'affiliations': ['Institute for AI Industry Research (AIR), Tsinghua University', 'Shanghai AI Laboratory', 'Shanghai Jiao Tong University', 'Tongji University', 'Tsinghua University', 'University of Science and Technology of China', 'Xian Jiaotong University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.18239.jpg', 'data': {'categories': ['#games', '#benchmark', '#optimization', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Оценка возможностей мобильного манипулирования с помощью EBench', 'desc': 'EBench — это обширный симуляционный бенчмарк, предназначенный для оценки политик мобильного манипулирования в различных задачах. Он включает 26 различных задач с аннотациями по 5 измерениям возможностей и 4 измерениям обобщения. В статье анализируются современные модели манипуляции, выявляя отличительные профили возможностей и особенности обобщения. Этот бенчмарк предоставляет полезные диагностические сигналы для улучшения общих моделей манипуляции.'}, 'en': {'title': 'EBench: Unveiling the Strengths of Mobile Manipulation Models', 'desc': 'EBench is a new benchmark designed to evaluate mobile manipulation policies across various tasks and capabilities. It includes 26 challenging tasks and assesses models based on five capability dimensions and four generalization dimensions. The study compares several state-of-the-art models, revealing that even with similar success rates, their performance profiles can differ significantly. This benchmark aims to provide insights into the strengths and weaknesses of these models, helping to improve future generalist manipulation systems.'}}}, {'id': 'https://huggingface.co/papers/2606.25473', 'title': 'Causal-rCM: A Unified Teacher-Forcing and Self-Forcing Open Recipe for Autoregressive Diffusion Distillation in Streaming Video Generation and Interactive World Models', 'url': 'https://huggingface.co/papers/2606.25473', 'abstract': 'Abstract Autoregressive video diffusion extends diffusion distillation frameworks to real-time streaming generation through causal training paradigms, achieving state-of-the-art performance with fast convergence and interactive world modeling capabilities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Autoregressive video diffusion with causal diffusion transformers has emerged as a major paradigm for real-time streaming video generation and action-conditioned interactive world models. In this work, we extend rCM, an advanced diffusion distillation framework, to autoregressive video diffusion. The core philosophy of rCM lies in the complementarity between forward and reverse divergences, represented by consistency models (CMs) and distribution matching distillation (DMD), respectively, in diffusion distillation. This philosophy naturally carries over to the autoregressive setting, where teacher-forcing (TF) provides an offline, forward-divergence causal training paradigm, while self-forcing (SF) corresponds to an on-policy, reverse-divergence refinement.   Our contributions are: (1) through extensive experiments, we show that teacher-forcing CM is currently the best complement to self-forcing DMD as an initialization strategy (2) we present the first implementation of teacher-forcing-based continuous-time CMs (e.g., sCM/MeanFlow) for autoregressive video diffusion, enabled by our custom-mask FlashAttention-2 JVP kernel, achieving 10times faster convergence compared to discrete-time CMs (dCMs) (3) we introduce Causal-rCM, a leading, unified, and scalable algorithm-infrastructure open recipe for diffusion distillation and causal training (4) we achieve state-of-the-art streaming video generation performance in both frame-wise and chunk-wise settings, using only synthetic data for training.   Notably, our distilled 2-step causal Wan2.1-1.3B model achieves a VBench-T2V score of 84.63 with only 1 or 2 sampling steps. We further apply Causal-rCM to Cosmos 3, an advanced omnimodal world foundation model for physical AI with action-conditioned generation capability, enabling an interactive world model.', 'score': 8, 'issue_id': 2719, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '5e4765ae9f1e4207', 'github_url': '', 'github_stars': 0, 'authors': ['Kaiwen Zheng', 'Guande He', 'Min Zhao', 'Jintao Zhang', 'Huayu Chen', 'Jianfei Chen', 'Chen-Hsuan Lin', 'Ming-Yu Liu', 'Jun Zhu', 'Qianli Ma'], 'affiliations': ['NVIDIA', 'Tsinghua University', 'UT Austin'], 'pdf_title_img': 'assets/pdf/title_img/2606.25473.jpg', 'data': {'categories': ['#benchmark', '#training', '#architecture', '#open_source', '#diffusion', '#dataset', '#synthetic'], 'emoji': '🎥', 'ru': {'title': 'Авторегрессивная диффузия для потокового видео в реальном времени', 'desc': 'В данной работе рассматривается применение авторегрессивной диффузии видео для генерации потокового видео в реальном времени. Исследуется использование методов обучения с учетом причинности, таких как teacher-forcing и self-forcing, которые позволяют ускорить сходимость моделей. Авторы достигают впечатляющих результатов в генерации видео, предлагая новые алгоритмы и инфраструктуры для диффузионного дистилляции. Результаты показывают, что предложенные подходы обеспечивают высокое качество видео с использованием только синтетических данных для обучения.'}, 'en': {'title': 'Revolutionizing Real-Time Video Generation with Autoregressive Diffusion', 'desc': 'This paper presents a new method called autoregressive video diffusion, which enhances real-time video generation using advanced diffusion techniques. It builds on the diffusion distillation framework, focusing on the balance between forward and reverse divergences through teacher-forcing and self-forcing training methods. The authors demonstrate that their approach achieves faster convergence and superior performance in generating streaming video content. Additionally, they introduce a scalable algorithm called Causal-rCM, which significantly improves interactive world modeling capabilities.'}}}, {'id': 'https://huggingface.co/papers/2606.24937', 'title': "The Hitchhiker's Guide to Agentic AI: From Foundations to Systems", 'url': 'https://huggingface.co/papers/2606.24937', 'abstract': "Abstract The book provides a comprehensive guide to building autonomous AI systems, covering foundational elements like transformer architecture and training methods, along with advanced topics such as reinforcement learning, agent architectures, and production deployment.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct The Hitchhiker's Guide to Agentic AI is a comprehensive practitioner's reference for building autonomous AI systems. The book covers the full stack from first principles to production deployment, organized around a central thesis: building great agentic systems requires understanding every layer of the pipeline, not just one. The book opens with the LLM substrate -- transformer architecture, GPU systems, training and fine-tuning (SFT,LoRA, MoE), model compression, and inference optimization -- treated as essential foundations rather than the primary focus. It then develops the alignment and reasoning layer: reinforcement learning from human feedback (RLHF), PPO, DPO and its variants, GRPO, reward modeling, and RL for large reasoning models including chain-of-thought and test-time scaling. The second half is devoted to agentic AI proper. Topics include agentic training and trajectory-based RL, retrieval-augmented generation (RAG and Agentic RAG), memory systems (in-context, external, episodic, and semantic), agent harness design and context management, and a taxonomy of agent design patterns. Inter-agent coordination is covered in depth: the Model Context Protocol (MCP), agent skills and tool use, the Agent-to-Agent (A2A) communication protocol, and multi-agent architectures spanning centralized, decentralized, and hierarchical topologies. The book concludes with agent development frameworks, agentic UI design, evaluation methodology for agentic tasks, and production deployment. Each chapter pairs rigorous theoretical foundations with implementation guidance, code examples, and references to the primary literature.", 'score': 7, 'issue_id': 2719, 'pub_date': '2026-06-22', 'pub_date_card': {'ru': '22 июня', 'en': 'June 22', 'zh': '6月22日'}, 'hash': '074e1a76d4d1e31c', 'github_url': '', 'github_stars': 0, 'authors': ['Haggai Roitman'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.24937.jpg', 'data': {'categories': ['#benchmark', '#training', '#reasoning', '#memory', '#tool_use', '#architecture', '#rlhf', '#rag', '#agent_memory', '#agents', '#inference', '#agi'], 'emoji': '🤖', 'ru': {'title': 'Создание автономных систем ИИ: от основ до внедрения', 'desc': 'Эта книга является полным руководством по созданию автономных систем ИИ. Она охватывает основы, такие как архитектура трансформеров и методы обучения, а также более сложные темы, включая обучение с подкреплением и архитектуры агентов. Вторая половина книги посвящена специфике агентного ИИ, включая обучение агентов и управление контекстом. Каждая глава предлагает теоретическую базу и практическое руководство, что позволяет читателям легче применять полученные знания.'}, 'en': {'title': 'Mastering the Art of Autonomous AI Systems', 'desc': 'This paper presents a detailed guide for creating autonomous AI systems, emphasizing the importance of understanding all layers of the development pipeline. It covers foundational topics like transformer architecture and training methods, as well as advanced concepts such as reinforcement learning and agent architectures. The book also explores inter-agent coordination and various agent design patterns, providing practical implementation guidance alongside theoretical insights. Ultimately, it aims to equip practitioners with the knowledge needed to build effective agentic AI systems from the ground up.'}}}, {'id': 'https://huggingface.co/papers/2606.26092', 'title': 'TryOnCrafter: Unleashing Camera Trajectories for Realistic Video Virtual Try-on via a Renderable 4D Try-on Proxy', 'url': 'https://huggingface.co/papers/2606.26092', 'abstract': "Abstract Camera-controllable video virtual try-on framework uses a 4D proxy with explicit human-environment decoupling and DiT-based video generation for omnidirectional viewing.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct While Video Virtual Try-on (VVT) has achieved remarkable progress in synthesizing realistic garment overlays on dynamic subjects, existing paradigms remains fundamentally constrained by a passive dependency on source camera trajectories, failing to accommodate the requisite interactive freedom for omnidirectional viewpoint exploration. To address this limitation, we define a pioneering research frontier: Camera-controllable Video Virtual Try-on (CaM-VVT). Unlike conventional VVT, CaM-VVT not only necessitates viewpoint-agnostic texture hallucination but also strict structural synchronization between non-rigid human dynamics and background contexts under arbitrary, unconstrained camera movements. To tackle these challenges, we present TryOnCrafter, the first unified DiT-based framework specifically architected for the CaM-VVT task. Departing from implicit pixel-space manipulation, we introduce a Renderable 4D Try-on Proxy that explicitly decouples the human subject from the environment. This is achieved by distilling high-fidelity 2D try-on priors into a clothed 3DGS-based avatar, which is subsequently animated via SMPL-X sequences and metric-aligned into a reconstructed background point cloud. This proxy establishes a robust structural foundation with superior texture density and motion integrity. Our Proxy-Anchored Video DiT leverages this robust structural foundation as a primary geometric anchor, ensuring that the synthesized photorealistic videos are strictly constrained by prescribed trajectories and physically plausible deformations. Benefiting from the inherent editability of the 4D proxy, TryOnCrafter facilitates diverse downstream applications, including human relocalization, ``bullet time'' effects, and 360-degree orbital viewing.", 'score': 6, 'issue_id': 2719, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': 'b8df19601b14b3e6', 'github_url': '', 'github_stars': 0, 'authors': ['Hao Sun', 'Hao Yan', 'Mengting Chen', 'Quanjian Song', 'Yu Li', 'Juan Cao', 'Jinsong Lan', 'Xiaoyong Zhu', 'Bo Zheng', 'Sheng Tang'], 'affiliations': ['Alibaba Group', 'Institute of Computing Technology, Chinese Academy of Sciences', 'University of Chinese Academy of Sciences', 'Xiamen University'], 'pdf_title_img': 'assets/pdf/title_img/2606.26092.jpg', 'data': {'categories': ['#architecture', '#3d', '#multimodal'], 'emoji': '👗', 'ru': {'title': 'Интерактивная виртуальная примерка одежды', 'desc': "В статье
