 представлена новая система виртуальной примерки одежды, управляемая камерой, которая использует 4D прокси для отделения человека от окружающей среды. Эта система, названная CaM-VVT, позволяет интерактивно изменять угол обзора и синхронизировать движения человека с фоном. Мы разработали TryOnCrafter, первую унифицированную платформу на основе DiT, которая обеспечивает высокое качество синтезируемых видео. Благодаря 4D прокси, система поддерживает разнообразные приложения, включая релоцирование человека и эффекты 'bullet time'."}, 'en': {'title': 'Article', 'desc': ''}}}, {'id': 'https://huggingface.co/papers/2606.25996', 'title': 'Autodata: An agentic data scientist to create high quality synthetic data', 'url': 'https://huggingface.co/papers/2606.25996', 'abstract': 'Abstract Autodata enables AI agents to function as data scientists who create high-quality training data through meta-optimization, demonstrating improved performance across multiple task domains.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce Autodata, a general method that enables AI agents to act as data scientists who build high quality training and evaluation data. We show how to train (meta-optimize) such a data scientist agent, so that it learns to create even stronger data. We describe the overall formulation, and a specific practical implementation, Agentic Self-Instruct. We conduct experiments on computer science research tasks, legal reasoning tasks and reasoning with mathematical objects, where we obtain improved results compared to classical synthetic dataset creation methods. Further, meta-optimizing the data scientist agent itself delivers an even larger performance uplift. Agentic data creation provides a way to convert increased inference compute into higher quality model training. Overall, we believe this direction has the potential to change the way we build AI data.', 'score': 6, 'issue_id': 2719, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '3a2db5ec114cfd87', 'github_url': '', 'github_stars': 0, 'authors': ['Ilia Kulikov', 'Chenxi Whitehouse', 'Tianhao Wu', 'Yixin Nie', 'Swarnadeep Saha', 'Eryk Helenowski', 'Weizhe Yuan', 'Olga Golovneva', 'Jack Lanchantin', 'Yoram Bachrach', 'Jakob Foerster', 'Xian Li', 'Han Fang', 'Sainbayar Sukhbaatar', 'Jason Weston'], 'affiliations': ['FAIR at Meta'], 'pdf_title_img': 'assets/pdf/title_img/2606.25996.jpg', 'data': {'categories': ['#training', '#continual_learning', '#agent_memory', '#dataset', '#data', '#agents', '#optimization'], 'emoji': '🤖', 'ru': {'title': 'Новый подход к созданию качественных данных для AI', 'desc': 'Статья представляет метод Autodata, который позволяет AI агентам действовать как ученые-данные, создавая качественные обучающие данные через мета-оптимизацию. Мы показываем, как обучить такой агент для создания более сильных данных. Эксперименты проводились в различных областях, включая компьютерные науки и правовые задачи, где достигнуты лучшие результаты по сравнению с классическими методами создания синтетических данных. Мета-оптимизация самого агента также приводит к значительно большему увеличению производительности.'}, 'en': {'title': 'Empowering AI Agents to Create Superior Training Data', 'desc': 'The paper introduces Autodata, a method that allows AI agents to function as data scientists, creating high-quality training and evaluation data. It focuses on meta-optimization, where the AI learns to generate better data for various tasks. Experiments show that this approach outperforms traditional methods in fields like computer science and legal reasoning. By enhancing the data creation process, the paper suggests a significant shift in how AI training data is developed.'}}}, {'id': 'https://huggingface.co/papers/2606.24484', 'title': 'Advancing WordArt-Oriented Scene Text Recognition: Datasets and Methods', 'url': 'https://huggingface.co/papers/2606.24484', 'abstract': 'Abstract A large-scale synthetic dataset and specialized model architecture are introduced to address the challenges of artistic text recognition by improving data diversity and model flexibility for irregular text layouts.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct WordArt (artistic text) features highly customized fonts, textures, and layouts, making WordArt-oriented scene TExt Recognition (WATER) substantially more challenging than general Scene Text Recognition (STR). Existing STR datasets and methods, typically built around regular scene text and fixed-template inputs, struggle to scale to WATER. Thus, we aim to advance this task from both data and model perspectives. On the data side, we construct a 2M synthetic dataset, WATER-S, with the scale improved by hundreds of times compared to existing artistic text data. WATER-S consists of two complementary subsets. One rendered by an upgraded rendering pipeline (SynthWordArt), which provides highly accurate and controllable synthetic WordArt data. The other is generated by combining Qwen3-VL for prompt mining and Z-Image for image synthesis, which improves the coverage of realistic and diverse data. On the model side, we propose WATERec. It adopts an visual encoder supporting arbitrary-shaped inputs and an autoregressive decoder to model complex layouts, structurally breaking the bottleneck of fixed-template STR on WordArt. Experiments show that this architecture outperforms prior STR methods, achieving state-of-the-art performance on irregular texts such as WordArt. Together with WATER-R, carefully reorganized from existing real STR data, our strong baseline with the new synthetic data and model design reaches 90.40% accuracy on WordArt-Bench, surpassing both general-purpose and OCR-specialized vision-language models by a large margin. Code and data are available at https://github.com/YesianRohn/WATER.', 'score': 6, 'issue_id': 2719, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': '801a44aba0683c19', 'github_url': '', 'github_stars': 0, 'authors': ['Xingsong Ye', 'Yongkun Du', 'Jiaxin Zhang', 'Haojie Zhang', 'Chong Sun', 'Chen Li', 'Jing Lyu', 'Zhineng Chen'], 'affiliations': ['Institute of Trustworthy Embodied AI, Fudan University', 'Shanghai Key Laboratory of Multimodal Embodied AI, Fudan University', 'South China University of Technology', 'WeChat Vision, Tencent Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2606.24484.jpg', 'data': {'categories': ['#architecture', '#optimization', '#synthetic', '#dataset'], 'emoji': '🎨', 'ru': {'title': 'Революция в распознавании художественного текста', 'desc': 'В данной статье представлен крупномасштабный синтетический набор данных и специализированная архитектура модели для решения задач распознавания художественного текста. Мы создали набор данных WATER-S, который в сотни раз больше существующих наборов для художественного текста, включая два взаимодополняющих подмножества. Модель WATERec характеризуется визуальным энкодером, поддерживающим произвольные формы входных данных, и авторегрессионным декодером, что позволяет эффективно обрабатывать сложные макеты. Эксперименты показали, что наша архитектура превосходит существующие методы, достигая лучших результатов в распознавании нестандартного текста.'}, 'en': {'title': 'Revolutionizing Artistic Text Recognition with WATER', 'desc': 'This paper presents a new approach to artistic text recognition by introducing a large-scale synthetic dataset and a specialized model architecture. The dataset, called WATER-S, significantly enhances data diversity with 2 million samples of complex WordArt, which is more challenging than regular scene text. The proposed model, WATERec, features a visual encoder for arbitrary-shaped inputs and an autoregressive decoder to handle complex layouts, overcoming limitations of traditional scene text recognition methods. Experiments demonstrate that this approach achieves state-of-the-art accuracy on irregular texts, outperforming existing models.'}}}, {'id': 'https://huggingface.co/papers/2606.22565', 'title': 'Look Light, Think Heavy: What Multimodal Chain-of-Thought Reasoning Can and Cannot Do', 'url': 'https://huggingface.co/papers/2606.22565', 'abstract': 'Abstract Multimodal Chain-of-Thought reasoning shows selective effectiveness across different tasks, with limitations in maintaining visual introspection during reasoning processes.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Chain-of-Thought (CoT) has become a standard method for improving reasoning capabilities in large language models (LLMs) by eliciting step-by-step thinking, but its effectiveness in multimodal tasks remains unclear. In this paper, we aim to systematically investigate the key question: What can multimodal Chain-of-Thought reasoning do, and where and why does it fall short? To this end, we evaluate 12 multimodal tasks across perception and reasoning categories using both 14 non-reasoning models and 8 reasoning models. Our analysis reveals several important findings: (1) CoT is not a free lunch and should be used selectively depending on the specific requirements of each task. For perception tasks, CoT can lead to undesirable side effects, such as reduced performance in visual grounding and object counting. In contrast, it proves effective for reasoning tasks involving mathematical, scientific, and multi-image reasoning; (2) Compared to original models, existing open-source multimodal reasoning models often yield only marginal overall improvements, possibly due to an overemphasis on mathematical reasoning at the expense of broader capabilities; (3) Visual reasoning remains a key bottleneck for current multimodal CoT, as models exhibit a Look Light, Think Heavy pattern where verbal reflection rises and falls during reasoning, whereas visual reflection consistently diminishes. These findings suggest that while multimodal CoT handles verbal reflection relatively well, it lacks the ability to maintain deep visual introspection throughout the reasoning process.', 'score': 6, 'issue_id': 2719, 'pub_date': '2026-06-21', 'pub_date_card': {'ru': '21 июня', 'en': 'June 21', 'zh': '6月21日'}, 'hash': '1b4a6562a8280f55', 'github_url': '', 'github_stars': 0, 'authors': ['Zhuoran Jin', 'Kejian Zhu', 'Hongbang Yuan', 'Yupu Hao', 'Pengfei Cao', 'Yubo Chen', 'Kang Liu', 'Jun Zhao'], 'affiliations': ['School of Artificial Intelligence, University of Chinese Academy of Sciences, Beijing, China', 'The Laboratory of Cognition and Decision Intelligence for Complex Systems, Institute of Automation, Chinese Academy of Sciences, Beijing, China'], 'pdf_title_img': 'assets/pdf/title_img/2606.22565.jpg', 'data': {'categories': ['#prompting', '#open_source', '#science', '#reasoning', '#multimodal'], 'emoji': '🧠', 'ru': {'title': 'Многомодальное рассуждение: возможности и ограничения', 'desc': 'В данной статье рассматривается эффективность многомодального рассуждения с помощью цепочек мыслей (Chain-of-Thought) в различных задачах. Исследование показывает, что этот подход может быть полезен для задач рассуждений, но его применение в задачах восприятия иногда ухудшает результаты. Авторы анализируют 12 задач и выявляют, что многомодальные модели часто демонстрируют лишь незначительные улучшения. Основная проблема заключается в том, что модели не умеют поддерживать глубокую визуальную интроспекцию во время рассуждений.'}, 'en': {'title': 'Unlocking the Potential of Multimodal Chain-of-Thought Reasoning', 'desc': 'This paper explores the effectiveness of Multimodal Chain-of-Thought (CoT) reasoning in various tasks, highlighting its limitations in visual introspection. While CoT enhances reasoning in large language models by promoting step-by-step thinking, its application in multimodal tasks is not universally beneficial. The study evaluates 12 tasks and finds that CoT can hinder performance in perception tasks but excels in mathematical and scientific reasoning. Key insights reveal that current models struggle with visual reasoning, indicating a need for better integration of visual and verbal processing during reasoning.'}}}, {'id': 'https://huggingface.co/papers/2606.23104', 'title': 'ReNIO: Reweighting Negative Trajectory Importance for LLM On-Policy Distillation', 'url': 'https://huggingface.co/papers/2606.23104', 'abstract': "Abstract ReNIO enhances on-policy distillation for language models by reweighting negative trajectories based on token-level probability ratios, improving reasoning performance in mathematical and code generation tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct On-policy distillation (OPD) improves LLM reasoning by training a student model on its own generated outputs, but standard OPD treats all student-generated outputs (SGOs) equally regardless of their informativeness. We observe a consistent asymmetry in controlled filtering experiments: in both OPD and on-policy self distillation (OPSD), training only on incorrect SGOs outperforms training only on correct ones. Our further analysis suggests that models trained on correct-only SGOs tend to generate shorter reasoning traces and show weaker reflection behavior, while incorrect SGOs better preserve exploratory reasoning near the model's capability boundary. To exploit this signal without requiring full answer-containing rollouts, we introduce ReNIO, which Reweights Negative trajectory Importance for LLM On-policy distillation. By using the student-to-teacher probability ratio, ReNIO identifies pivotal tokens leading to wrong reasoning traces and aggregates their information into a normalized sample weight, inherently assigning larger weights to likely negative trajectories without observing the correctness of final-answer. Since Re-NIO only uses prefix-conditioned token probabilities, it preserves OPD's prefix training advantage over full-rollout reinforcement learning. Across both mathematical reasoning and code generation tasks, ReNIO improves both OPD and OPSD, with representative relative gains of up to 8.90% for Qwen3-1.7B and 10.00% for R1-Distill-Qwen-7B on mathematical reasoning benchmarks. Code repo: https://github.com/BDML-lab/ReNIO.", 'score': 5, 'issue_id': 2721, 'pub_date': '2026-06-22', 'pub_date_card': {'ru': '22 июня', 'en': 'June 22', 'zh': '6月22日'}, 'hash': 'cb5efbac76aa36ef', 'github_url': '', 'github_stars': 0, 'authors': ['Chen Lin', 'Kedi Chen', 'Wei Zhang'], 'affiliations': ['East China Normal University', 'Shanghai Innovation Institute'], 'pdf_title_img': 'assets/pdf/title_img/2606.23104.jpg', 'data': {'categories': ['#optimization', '#reasoning', '#training', '#rl'], 'emoji': '🧠', 'ru': {'title': 'Улучшая дистилляцию: сила негативных траекторий', 'desc': 'Статья предлагает метод ReNIO, который улучшает дистилляцию на основе политики для языковых моделей, перераспределяя вес негативных траекторий. Это достигается путем анализа соотношения вероятностей токенов, что помогает выявлять важные токены, связанные с ошибочным выводом. В результате, использование неправильных выходов позволяет моделям сохранять эксплорационное мышление и улучшать производительность в задачах математического рассуждения и генерации кода. Благодаря этому, ReNIO показывает улучшение в результатах на бенчмарках до 10%.'}, 'en': {'title': 'Learning from Mistakes: Enhancing Reasoning in Language Models', 'desc': 'ReNIO improves on-policy distillation for language models by focusing on negative outputs that can enhance reasoning skills. It reweights these negative trajectories based on the probability of tokens, allowing the model to learn from its mistakes more effectively. This method shows that training on incorrect outputs can lead to better reasoning performance compared to only using correct outputs. The results demonstrate significant improvements in tasks like mathematical reasoning and code generation, showcasing the effectiveness of this new approach.'}}}, {'id': 'https://huggingface.co/papers/2606.16316', 'title': 'RL-Index: Reinforcement Learning for Retrieval Index Reasoning', 'url': 'https://huggingface.co/papers/2606.16316', 'abstract': 'Abstract RL-Index introduces an agentic indexing framework that shifts reasoning from query time to indexing stage by using LLM-generated rationales and reinforcement learning to improve retrieval effectiveness and reduce latency.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Retrieving external knowledge is essential for solving real-world tasks, yet it remains challenging when the relationship between a query and its relevant knowledge involves implicit and complex reasoning beyond surface-level semantic or lexical matching (e.g., mathematical problems relying on the same theorem or coding requiring deep reasoning). Existing approaches primarily rely on query-side reasoning (e.g., query rewriting), which introduces significant online latency and underutilizes the opportunity to perform reasoning over the knowledge corpus itself (i.e., index-side reasoning). In this paper, we propose RL-Index, an agentic indexing framework that formulates retrieval index reasoning as a reinforcement learning problem. Instead of performing reasoning at query time, RL-Index shifts reasoning to the indexing stage by augmenting documents with LLM-generated rationales that explicitly encode the latent query-knowledge relationship. To optimize the quality of these rationales, we employ Group Relative Policy Optimization (GRPO) and use retrieval similarity as a verifiable reward signal, enabling direct optimization of indexing decisions for retrieval effectiveness. Extensive experiments on the BRIGHT benchmark demonstrate that RL-Index consistently improves both retrieval and downstream question-answering performance, while significantly reducing online inference latency. Moreover, the learned rationale augmentation generalizes across diverse retrievers and generators, highlighting its robustness as a plug-and-play indexing strategy across different retrieval systems.', 'score': 5, 'issue_id': 2719, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': '1b7dda04b5635c84', 'github_url': '', 'github_stars': 0, 'authors': ['Yongjia Lei', 'Nedim Lipka', 'Zhisheng Qi', 'Utkarsh Sahu', 'Koustava Goswami', 'Franck Dernoncourt', 'Ryan A. Rossi', 'Yu Wang'], 'affiliations': ['Adobe Research', 'University of Oregon'], 'pdf_title_img': 'assets/pdf/title_img/2606.16316.jpg', 'data': {'categories': ['#optimization', '#benchmark', '#retrieval', '#retrieval_eval', '#agents', '#reasoning', '#rl'], 'emoji': '🧠', 'ru': {'title': 'Оптимизация поиска с помощью индексации и обучения!', 'desc': 'Статья описывает фреймворк индексирования RL-Index, который улучшает эффективность поиска и уменьшает задержку за счет переноса reasoning на этап индексации. Используя LLM-сгенерированные рационалы и методы обучения с подкреплением, RL-Index создает индексы, которые запоминают отношения между запросами и знанием. Это позволяет оптимизировать индекс, уменьшая время обработки запросов. Эксперименты показывают, что метод значительно улучшает производительность поиска и последующих ответов на вопросы.'}, 'en': {'title': 'Revolutionizing Retrieval with RL-Index', 'desc': 'RL-Index is a novel indexing framework that enhances retrieval effectiveness by shifting reasoning from the query stage to the indexing stage. It utilizes large language model (LLM)-generated rationales and reinforcement learning to better understand the complex relationships between queries and relevant knowledge. By augmenting documents with these rationales, RL-Index optimizes indexing decisions using Group Relative Policy Optimization (GRPO) and retrieval similarity as a reward signal. Experiments show that RL-Index improves retrieval and question-answering performance while reducing latency, making it a robust solution for various retrieval systems.'}}}, {'id': 'https://huggingface.co/papers/2606.24083', 'title': 'CAVEWOMAN: How Large Language Models Behave Under Linguistic Input and Output Compression', 'url': 'https://huggingface.co/papers/2606.24083', 'abstract': 'Abstract Two-channel evaluation shows output compression reduces costs while input compression increases costs and degrades accuracy across models and datasets.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct "Talk short. Drop grammar. Save token." This caveman style is widely promoted as a way to cut inference cost, but whether it actually saves anything depends on which channel (the user\'s prompt or the model\'s response) is being compressed. We present Cavewoman, a two-channel evaluation protocol that scores every generation on task accuracy, realized per-item cost, and reference-text agreement against the model\'s unconstrained reference. We evaluate eight models on five datasets at five reduction levels, with both channels measured on the same items. Output compression cuts realized cost on most API models (1.4-2.4x per model, up to 3x in the best case) and on all four open-weight models under public-tier pricing. Input compression has the opposite effect, a strict lose-lose: it raises net cost rather than lowering it (~1.15x on the five-benchmark mean, up to 1.8x on the worst dataset and 2.7x under stronger compression), because models compensate with longer responses even as accuracy collapses. Under the same setting, surface text diverges from the unconstrained reference: on the non-reasoning models, roughly half of all generations are correct yet their surface text no longer entails the model\'s own unconstrained baseline generation. The divergence survives length-controlled re-scoring, multiple-comparisons correction, and replication under complementary semantic measures. Code and data are available at https://github.com/danielle34/cavewoman.', 'score': 4, 'issue_id': 2719, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': 'edd2e1cb6c13717b', 'github_url': '', 'github_stars': 0, 'authors': ['Morayo Danielle Adeyemi', 'Ryan A. Rossi', 'Franck Dernoncourt'], 'affiliations': ['Adobe Research', 'Independent'], 'pdf_title_img': 'assets/pdf/title_img/2606.24083.jpg', 'data': {'categories': ['#optimization', '#benchmark', '#compression', '#open_source', '#dataset', '#inference'], 'emoji': '📉', 'ru': {'title': 'Сжатие данных: как не потерять в качестве?', 'desc': "В статье рассматривается влияние сжатия данных при оценке моделей машинного обучения. Выясняется, что сжатие выходных данных снижает затраты, в то время как сжатие входных данных приводит к повышению затрат и снижению точности. Авторы предлагают новый протокол оценки 'Cavewoman', который учитывает точность задач и соответствие сгенерированного текста. Исследование показывает, что выходное сжатие выгодно, а входное сжатие вредит результатам."}, 'en': {'title': 'Compress Wisely: Output Saves, Input Costs', 'desc': 'This paper introduces Cavewoman, a two-channel evaluation protocol that assesses the impact of input and output compression on machine learning models. It finds that output compression can significantly reduce costs while maintaining accuracy, whereas input compression tends to increase costs and degrade model performance. The study evaluates eight models across five datasets, revealing that input compression leads to longer responses and lower accuracy. The results highlight the importance of understanding which channel to compress for effective cost management in model inference.'}}}, {'id': 'https://huggingface.co/papers/2606.24033', 'title': 'RoPE-Aware Bit Allocation for KV-Cache Quantization', 'url': 'https://huggingface.co/papers/2606.24033', 'abstract': "Abstract Block-GTQ introduces a RoPE-aware bit allocation method for key-cache quantization that improves attention accuracy and downstream performance through adaptive bit distribution and packed cache serving.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Existing low-bit KV-cache quantizers often treat each cached key as a flat vector. Under RoPE, however, a key's contribution to a future attention logit decomposes into a position-dependent sum over two-dimensional frequency blocks. This makes key-cache quantization a block-wise bit-allocation problem: high-energy RoPE blocks are more sensitive to quantization error and should receive more bits. We introduce Block-GTQ, a RoPE-aware bit allocator for key-cache quantization built on TurboQuant-MSE(TQ-MSE). For each layer and KV head, Block-GTQ computes a label-free energy score for each RoPE block and greedily allocates integer bit widths by marginal gain. Under matched K/V bit budgets, Block-GTQ better preserves RoPE query-key logits on a ten-model diagnostic panel, cutting per-layer MAE by 32-80% at 2 and 3 b/dim K-only quantization and winning all 367/367 layer comparisons against uniform TQ-MSE. These fidelity gains translate to stronger downstream long-context retrieval, understanding, and reasoning. At K2V2 on Llama-3.1-8B-Instruct, Block-GTQ raises the six-task NIAH average from 70.6 to 97.4, and the LongBench-EN average from 36.87 to 53.31. On AIME 2024/2025 with DeepSeek-R1-Distill-Qwen-7B, without an fp16 recent-key buffer, Block-GTQ at K3V2 scores 51.7/37.5, close to fp16's 54.2/37.9, whereas uniform TQ-MSE collapses to 0.0/0.0. We further implement a packed-cache serving path. On a single H800 GPU with Qwen2.5-3B-Instruct, packed K3V3 achieves 3.24x KV-cache compression with fp16-comparable quality, runs 1.34x faster than fp16 FlashAttention2 at 128K context, reduces peak memory from 56.31 GB to 19.85 GB, and remains feasible at 256K and 512K where fp16 OOMs. Code is available at https://github.com/JIA-Lab-research/blockgtq.", 'score': 4, 'issue_id': 2719, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': '50f31e4fc778260c', 'github_url': '', 'github_stars': 0, 'authors': ['Fengfeng Liang', 'Yuechen Zhang', 'Jiaya Jia'], 'affiliations': ['Hong Kong University of Science and Technology', 'MiMo, Xiaomi Corporation', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2606.24033.jpg', 'data': {'categories': ['#retrieval', '#compression', '#long_context', '#inference', '#optimization'], 'emoji': '💡', 'ru': {'title': 'Улучшение квантизации ключевых кешей с помощью Block-GTQ', 'desc': 'Статья представляет метод распределения битов Block-GTQ, который учитывает RoPE для квантизации ключевых кешей, улучшая точность внимания и производительность. Метод адаптивно распределяет биты, что позволяет более эффективно использовать их для блоков RoPE с высокой энергией. Это решение решает задачу квантизации с учетом важности различных блоков, что позволяет значительно сократить ошибки. В результате, Block-GTQ демонстрирует улучшения в задачах извлечения и понимания контекста.'}, 'en': {'title': 'Optimizing Key-Cache Quantization with RoPE-Aware Bit Allocation', 'desc': 'Block-GTQ presents a novel method for key-cache quantization that enhances attention accuracy by adapting bit allocation based on the RoPE (Rotary Position Embedding) framework. Unlike traditional quantizers that treat keys as flat vectors, Block-GTQ recognizes the importance of two-dimensional frequency blocks, allowing for a more effective distribution of bits. By calculating energy scores for RoPE blocks, it allocates bits in a way that minimizes quantization error, leading to significant improvements in model performance. This method not only reduces mean absolute error (MAE) but also boosts downstream tasks like long-context retrieval and reasoning capabilities.'}}}, {'id': 'https://huggingface.co/papers/2606.20023', 'title': 'When Lower Privileges Suffice: Investigating Over-Privileged Tool Selection in LLM Agents', 'url': 'https://huggingface.co/papers/2606.20023', 'abstract': "Abstract LLM agents frequently select higher-privilege tools unnecessarily, and while safety alignment doesn't ensure least-privilege choices, a post-training defense can reduce excessive privilege use without sacrificing performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct As LLM agents increasingly select tools autonomously, their choices among tools with different privileges become safety-relevant. However, prior tool-selection studies focus on safety-agnostic metadata preferences, leaving privilege-sensitive choices underexplored. To address this gap, we study over-privileged tool selection, in which an agent selects or escalates to a higher-privilege tool despite a sufficient lower-privilege alternative. We introduce ToolPrivBench to evaluate whether agents choose higher-privilege tools despite sufficient lower-privilege alternatives, measuring both initial selection and escalation after transient tool failures. Across eight domains and five recurring risk patterns, we find that over-privileged tool selection is common among mainstream LLM agents and is further amplified by transient failures. We further find that general safety alignment does not reliably transfer to least-privilege tool choice, while prompt-level controls provide only limited mitigation under transient failures. We therefore introduce a privilege-aware post-training defense that teaches agents to prefer sufficient lower-privilege tools and escalate only when necessary. Our mitigation experiments show that this defense substantially reduces unnecessary high-privilege tool use while preserving general capabilities.", 'score': 3, 'issue_id': 2719, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': 'f587712185b6d216', 'github_url': '', 'github_stars': 0, 'authors': ['Kaiyue Yang', 'Yuyan Bu', 'Jingwei Yi', 'Yuchi Wang', 'Biyu Zhou', 'Juntao Dai', 'Songlin Hu', 'Yaodong Yang'], 'affiliations': ['Beijing Academy of Artificial Intelligence', 'Institute for Artificial Intelligence, Peking University', 'Institute of Information Engineering, Chinese Academy of Sciences', 'School of Cyber Security, University of Chinese Academy of Sciences', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2606.20023.jpg', 'data': {'categories': ['#tool_use', '#benchmark', '#agents', '#alignment'], 'emoji': '🔑', 'ru': {'title': 'Выбор инструментов с минимальными привилегиями для LLM-агентов', 'desc': 'В данной статье рассматривается проблема выбора инструментов с избыточными привилегиями LLM-агентами. Исследование показывает, что агенты часто выбирают инструменты с более высокими привилегиями, даже когда существуют подходящие альтернативы с низкими привилегиями. В ходе экспериментов выявлено, что общее соответствие стандартам безопасности не гарантирует выбор инструментов с минимальными привилегиями. Предложенная защита после обучения помогает агентам предпочитать инструменты с низкими привилегиями и эскалировать только при необходимости.'}, 'en': {'title': 'Empowering LLMs with Least-Privilege Tool Selection', 'desc': 'This paper addresses the issue of LLM agents selecting higher-privilege tools when lower-privilege options are sufficient. It highlights that existing safety alignment methods do not ensure that agents make least-privilege choices. The authors introduce ToolPrivBench, a framework to evaluate tool selection based on privilege levels, revealing that over-privileged selections are common and worsened by transient failures. To mitigate this, they propose a post-training defense that encourages agents to prefer lower-privilege tools, effectively reducing unnecessary high-privilege use while maintaining performance.'}}}, {'id': 'https://huggingface.co/papers/2606.25182', 'title': 'What Intermediate Layers Know: Detecting Jailbreaks from Entropy Dynamics', 'url': 'https://huggingface.co/papers/2606.25182', 'abstract': "Abstract Jailbreak attacks expose vulnerabilities in aligned large language models, revealing that harmful intent is encoded in structured intermediate uncertainty dynamics rather than output representations.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Jailbreak attacks reveal a persistent weakness in aligned Large Language Models: carefully crafted prompts can elicit policy-violating responses despite safety training. While most defenses operate at the prompt or output level, it remains unclear how harmful intent is encoded within the model's internal representations. We investigate this question by analyzing token-level predictive entropy trajectories across layers of a frozen LLM using the logit lens. We find that static aggregate statistics of prompt-level entropy (e.g., mean, variance) carry little discriminative signal, whereas features capturing how entropy evolves across token positions, such as monotonic rank-based trend scores, are substantially more informative. Importantly, this signal is not uniform across model depth: it is concentrated in intermediate layers and degrades at the final layer, indicating that jailbreak-relevant structure is most pronounced in mid-network representations rather than at the output head. Across multiple models (Llama, Qwen, Gemma) and adversarial benchmarks, these entropy dynamics provide architecture-consistent separation without additional training. Together, our findings show that jailbreak behavior is reflected in structured intermediate uncertainty dynamics, clarifying both which entropy-derived features encode harmful intent and where in the network that signal is most pronounced.", 'score': 2, 'issue_id': 2721, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': 'c2ca147bc9876834', 'github_url': '', 'github_stars': 0, 'authors': ['Sofiia Nikolenko', 'Michele Papucci', 'Mina Rezaei', 'Shireen Kudukkil Manchingal'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.25182.jpg', 'data': {'categories': ['#hallucinations', '#alignment', '#agents', '#architecture', '#benchmark', '#prompting', '#security'], 'emoji': '🔓', 'ru': {'title': 'Вредоносные намерения в динамике неопределенности LLM', 'desc': 'Статья исследует уязвимости в выровненных больших языковых моделях (LLM), выявленные в результате атак типа jailbreak. Эти атаки показывают, что вредоносные намерения закодированы в структурированной динамике неопределенности на промежуточных уровнях модели, а не в конечных представлениях. Исследование показывает, что статические статистики не дают четкого сигнала, однако динамика неопределенности токенов предоставляет более информативные характеристики, сосредоточенные на промежуточных слоях сети. Выявление этих закономерностей помогает понять, как вредоносные намерения отражаются в структуре модели и где они наиболее четко проявляются.'}, 'en': {'title': 'Uncovering Vulnerabilities in LLMs Through Intermediate Uncertainty Dynamics', 'desc': 'This paper investigates how jailbreak attacks reveal weaknesses in aligned large language models (LLMs) by analyzing the internal representations of these models. It shows that harmful intent is encoded in the intermediate layers of the model, specifically through the dynamics of predictive entropy rather than just the final output. The study finds that traditional metrics like mean and variance of entropy are not effective, but trends in how entropy changes across token positions provide valuable insights. Ultimately, the research highlights that understanding these intermediate uncertainty dynamics can help identify and mitigate vulnerabilities in LLMs.'}}}, {'id': 'https://huggingface.co/papers/2606.25605', 'title': 'Constraint Tax in Open-Weight LLMs: An Empirical Study of Tool Calling Suppression Under Structured Output Constraints', 'url': 'https://huggingface.co/papers/2606.25605', 'abstract': 'Abstract Tool Suppression occurs when JSON Schema constraints and tool calling are jointly enabled, preventing open-weight models from invoking tools despite maintaining schema compliance, with the issue stemming from grammar-based token masking that makes tool-call tokens unreachable during decoding.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Tool Calling and Structured Output are two core capabilities of modern Agent systems, yet their interaction under joint deployment conditions remains insufficiently understood. This paper reports a reproducible phenomenon observed in a production Agent system: when Tool Calling and JSON Schema constraints are simultaneously enabled, multiple open-weight models cease invoking tools despite maintaining high schema compliance. We refer to this behavior as Tool Suppression. Through controlled experiments across multiple model families and deployment settings, we consistently reproduce Tool Suppression under joint constraints, while tool execution and schema compliance remain functional when evaluated independently. Further analysis reveals that JSON Schema constraints are compiled into grammar-based token masks, causing tool-call tokens to become unreachable during decoding. This provides an implementation-level explanation for the observed behavior. To interpret the phenomenon, we formulate the Constraint Priority Inversion (CPI) hypothesis, which suggests that schema satisfaction may dominate action-selection behavior under multiple simultaneous constraints. We present CPI as a behavioral hypothesis consistent with the observed evidence rather than a verified internal mechanism. To mitigate the problem, we propose Transparent Two-Pass Execution, an inference-time strategy that decouples tool execution from schema-constrained response generation. Experimental results show that this approach restores tool invocation while preserving structured output guarantees without requiring model retraining. These findings suggest that evaluating tool use and structured output separately may overlook important reliability issues in production Agent systems. Code, data, and docs will be released at https://github.com/Fzsama/Constrain-Tax-26-06.git.', 'score': 0, 'issue_id': 2721, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '8bf7aaf937d4fc29', 'github_url': '', 'github_stars': 0, 'authors': ['Fangzheng Li', 'Aimin Zhang', 'Chen Lv'], 'affiliations': ['Focus AI Center, Focus Technology Co., Ltd.', 'Nanjing University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2606.25605.jpg', 'data': {'categories': ['#agents', '#tool_use', '#inference', '#agent_memory'], 'emoji': '🔧', 'ru': {'title': 'Преодоление проблем с вызовом инструментов в агентских системах', 'desc': 'В данной статье рассматривается проблема Подавления Инструментов, которая возникает, когда одновременно включены ограничения JSON Schema и вызовы инструментов. При этом открытые модели не могут вызывать инструменты, несмотря на высокую степень соответствия схеме. Авторы провели эксперименты, показывающие, что взаимодействие между вызовами инструментов и ограничениями схемы плохо понимается в современных агентских системах. Для решения проблемы предлагается стратегия Прозрачного Двухпроходного Выполнения, которая позволяет отделить выполнение инструментов от генерации ответов с ограничениями схемы.'}, 'en': {'title': 'Unblocking Tool Invocation in Agent Systems', 'desc': 'This paper discusses a problem called Tool Suppression, which occurs when JSON Schema constraints and tool calling are used together, causing open-weight models to stop invoking tools even when they follow the schema. The issue arises from grammar-based token masking that makes tool-call tokens unreachable during the decoding process. The authors introduce the Constraint Priority Inversion (CPI) hypothesis to explain this behavior, suggesting that satisfying schema constraints can interfere with action selection. To address this, they propose a method called Transparent Two-Pass Execution, which allows tool invocation to work alongside schema compliance without needing to retrain the models.'}}}, {'id': 'https://huggingface.co/papers/2606.20196', 'title': 'Distill Once, Adapt Life-Long: Exploring Dataset Distillation for Continual Test-Time Adaptation', 'url': 'https://huggingface.co/papers/2606.20196', 'abstract': 'Abstract DO-ALL is a test-time adaptation framework that uses dataset distillation to create synthetic anchors for stable long-term model performance without retaining source data.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Continual Test-Time Adaptation (CTTA) aims to maintain model performance under evolving target domains by adapting online without labeled data. However, practical deployments often cannot retain the source dataset due to privacy or licensing constraints, and purely source-free CTTA methods tend to become unstable under long-term distribution shift, suffering from compounding self-training errors and catastrophic forgetting. We introduce DO-ALL (Distill Once, Adapt Life-Long), a plug-and-play framework that revisits source information in a compact and privacy-conscious form via Dataset Distillation (DD). Before deployment, DO-ALL performs DD to produce a small set of synthetic distilled anchors that summarize the source distribution. During adaptation, each target sample is matched with its most semantically aligned anchor, which provides a stable reference for various CTTA via source replay, representation alignment, and manifold-smoothing regularization. DO-ALL can be seamlessly integrated into existing CTTA algorithms, consistently improving long-term robustness across CIFAR100-C, ImageNet-C, and the CCC benchmark. This demonstrates the potential of leveraging DD to enable stable and continuous adaptation without retaining raw source data. The code is available at https://github.com/blue-531/DOALL.', 'score': 0, 'issue_id': 2721, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': 'bf710742e5a86f74', 'github_url': '', 'github_stars': 0, 'authors': ['Hyun-Kurl Jang', 'Jihun Kim', 'Hyeokjun Kweon', 'Kuk-Jin Yoon'], 'affiliations': ['Chung-Ang University, FOV Lab', 'KAIST, Visual Intelligence Lab'], 'pdf_title_img': 'assets/pdf/title_img/2606.20196.jpg', 'data': {'categories': ['#dataset', '#continual_learning', '#synthetic', '#training'], 'emoji': '🔄', 'ru': {'title': 'Непрерывная адаптация без хранения данных', 'desc': 'DO-ALL — это фреймворк для адаптации модели во время тестирования, использующий дистилляцию данных для создания синтетических якорей, что позволяет поддерживать стабильную работу модели на долгосрочной основе без необходимости хранения исходных данных. Он решает проблемы, возникающие при использовании методов адаптации без источника, такие как нестабильность под длительными изменениями распределения и ошибки в самообучении. Важной частью DO-ALL является применение компактной и конфиденциальной формы источника через дистилляцию данных. Этот метод улучшает долговременную устойчивость моделей, интегрируясь в существующие алгоритмы адаптации и показывая эффективность на различных бенчмарках.'}, 'en': {'title': 'Stable Adaptation Without Source Data', 'desc': 'DO-ALL is a framework designed for test-time adaptation that enhances model performance over time without needing to keep the original training data. It uses dataset distillation to create compact synthetic anchors that summarize the source data, allowing for stable adaptation in changing environments. This approach addresses issues like catastrophic forgetting and self-training errors that can occur when adapting to new data without labeled examples. By integrating DO-ALL with existing continual test-time adaptation methods, it consistently improves long-term model robustness across various benchmarks.'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf moonly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (6)', '#agent_memory (11)', '#agents (19)', '#agi (4)', '#alignment (3)', '#architecture (10)', '#audio (2)', '#benchmark (26)', '#compression (3)', '#context_window', '#continual_learning (4)', '#data (2)', '#dataset (11)', '#diffusion (7)', '#ethics', '#games (10)', '#graphs', '#hallucinations (2)', '#healthcare (1)', '#inference (7)', '#interpretability (2)', '#knowledge_graphs', '#leakage', '#long_context (4)', '#low_resource (1)', '#machine_translation', '#math', '#memorization', '#memory (5)', '#multilingual', '#multimodal (16)', '#open_source (9)', '#optimization (25)', '#plp', '#prompt_caching', '#prompting (2)', '#rag (1)', '#reasoning (15)', '#retrieval (4)', '#retrieval_eval (1)', '#rl (11)', '#rlhf (5)', '#robotics (3)', '#science (1)', '#security (2)', '#session_memory (1)', '#small_models', '#story_generation', '#survey (1)', '#synthetic (3)', '#tool_use (5)', '#training (21)', '#transfer_learning (1)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                const githubStars = Number(item["github_stars"]);
                let githubBlock = "";
                if (item["github_url"]) {
                    const starsText = Number.isFinite(githubStars) ? githubStars : 0;
                    githubBlock = `<span class="github-link"><span class="github-stars">⭐ ${starsText}</span><a href="${item['github_url']}" target="_blank">GitHub</a></span>`;
                }
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "../img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = '../' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                                ${githubBlock}
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else if (sortBy === 'github') {
                sortedArticles.sort((a, b) => (Number(b.github_stars) || 0) - (Number(a.github_stars) || 0));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-06-28 03:39',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF",
                    github: "звёздам GitHub"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date",
                    github: "GitHub stars"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF 收录日期",
                    github: "GitHub 星标"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }

        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-06-28 03:39')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-06-28 03:39')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('monthly'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
