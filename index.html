    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            return `${number} ${unitWord} ${timeUnits[lang].ago}`;
        }

        if (!['ru', 'en'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {

                flag.addEventListener('click', () => {

        function toggleTheme() {

            body.classList.toggle('light-theme');
            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');

            if (isDarkMode) {

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.27377', 'title': 'DanceOPD: On-Policy Generative Field Distillation', 'url': 'https://huggingface.co/papers/2606.27377', 'abstract': 'Abstract A novel on-policy generative field distillation framework called DanceOPD is proposed to unify text-to-image generation, local editing, and global editing capabilities in flow-matching models through capability-specific routing and velocity-based training.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Modern image generation demands a single model that unifies diverse capabilities, including text-to-image (T2I), local editing, and global editing. However, these capabilities are rarely naturally aligned and often conflict. For instance, editing tends to degrade T2I performance, while global and local editing interfere with each other. Consequently, effectively composing these capabilities has become a central challenge for image generation model training. To tackle this, we introduce DanceOPD, an on-policy generative field distillation framework for flow-matching models that routes each sample to one capability field, queries one low-noise student-induced state, and trains with a simple velocity MSE objective. With each capability source defined as a velocity field over the shared flow state space, the student learns from fields queried on its own rollout states to compose expert capabilities. This formulation also absorbs operator-defined fields such as classifier-free guidance. Comprehensive experiments on T2I, editing, realism-field absorption, and CFG absorption show that our approach improves multi-capability composition, strengthening target capabilities while preserving anchor generation quality. We believe this work establishes a practical route for generative field distillation in flow-matching models.', 'score': 40, 'issue_id': 2723, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '84f437fdb7b3927e', 'github_url': '', 'github_stars': 0, 'authors': ['Wei Zhou', 'Xiongwei Zhu', 'Zelin Xu', 'Bo Dong', 'Lixue Gong', 'Yongyuan Liang', 'Meng Chu', 'Leigang Qu', 'Lingdong Kong', 'Wei Liu', 'Tat-Seng Chua'], 'affiliations': ['ByteDance Seed', 'HKUST', 'NUS', 'UMD'], 'pdf_title_img': 'assets/pdf/title_img/2606.27377.jpg', 'data': {'categories': ['#architecture', '#training', '#multimodal'], 'emoji': '✨', 'ru': {'title': 'Объединяем возможности: генерация и редактирование изображений в одном!', 'desc': 'В статье предлагается новая система под названием DanceOPD, которая объединяет генерацию изображений из текста и редактирование. Она использует направленное обучение с маршрутизацией по специфическим возможностям и обучением на основе скорости. Этот подход помогает избежать конфликтов между различными редактированиями и генерацией, улучшая качество изображений. Эксперименты показывают, что DanceOPD значительно повышает эффективность многогранной композиции возможностей.'}, 'en': {'title': 'Unifying Image Generation and Editing with DanceOPD', 'desc': 'The paper introduces DanceOPD, a new framework for generative field distillation that enhances text-to-image generation and editing capabilities in flow-matching models. It addresses the challenge of aligning diverse functionalities like local and global editing, which often conflict and degrade performance. By using capability-specific routing and a velocity-based training approach, DanceOPD allows the model to learn from distinct capability fields while maintaining high-quality image generation. Experimental results demonstrate that this method improves the composition of multiple capabilities, ensuring better performance in both editing and generation tasks.'}}}, {'id': 'https://huggingface.co/papers/2606.27313', 'title': 'ViQ: Text-Aligned Visual Quantized Representations at Any Resolution', 'url': 'https://huggingface.co/papers/2606.27313', 'abstract': 'Abstract ViQ presents a visual quantization framework that balances semantic richness and detail preservation in discrete representations, enabling efficient multimodal training with native-resolution inputs.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct A unified representation for text and vision is a natural pursuit, as it enables simpler multimodal modeling and more efficient training. However, representing images as discrete signals in the same way as text inevitably introduces severe information loss. Existing work struggles to balance low-level details and high-level semantics in discrete representations: reconstruction-oriented representations often lack semantic information, whereas semantically stronger features typically suffer from severe loss of detail. We present ViQ, a Visual Quantized Representations framework, which is designed to balance semantics and details in discrete representations while supporting inputs at native resolutions, thereby enabling it to serve as a unified and general discrete representation for arbitrary visual inputs. Our approach structures quantization learning into two stages: text-aligned pre-training and feature discretization. With text-aligned pre-training, we enhance the visual encoder semantic-rich supervision from the pretrained language model and enable it to process native-resolution visual inputs. During discretization, we propose a proximal representation learning strategy to progressively compact the feature space, along with a position-aware head-wise quantization mechanism that enables flexible processing of arbitrary resolutions. Extensive experiments on multimodal tasks demonstrate that ViQ achieves competitive performance compared to state-of-the-art multimodal vision encoders with continuous and high-dimensional visual features, while maintaining high precision in low-level reconstruction. We also show that multimodal training with visual quantized representations largely improves efficiency, yielding up to 20\\%-70\\% acceleration with different base LLMs and training recipes.', 'score': 34, 'issue_id': 2723, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '1d5ef747b7990827', 'github_url': '', 'github_stars': 0, 'authors': ['Xumin Yu', 'Zuyan Liu', 'Zhenyu Yang', 'Yuhao Dong', 'Shengsheng Qian', 'Jiwen Lu', 'Han Hu', 'Yongming Rao'], 'affiliations': ['Nanyang Technological University', 'Tencent HY Vision Team', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.27313.jpg', 'data': {'categories': ['#optimization', '#multimodal', '#training', '#inference', '#games'], 'emoji': '🖼️', 'ru': {'title': 'Баланс семантики и деталей в визуальной квантизации', 'desc': 'Статья представляет новую структуру визуальной квантизации под названием ViQ, которая балансирует между семантическим богатством и сохранением деталей в дискретных представлениях. Это решение позволяет эффективно обучать мультимодальные модели с вводом изображений в их исходном разрешении. ViQ структурирует обучение квантизации в два этапа: предобучение, согласованное с текстом, и дискретизацию признаков. Эксперименты показывают, что ViQ демонстрирует конкурентоспособные результаты по сравнению с современными мультимодальными энкодерами, обеспечивая высокую точность и ускорение обучения.'}, 'en': {'title': 'Balancing Semantics and Details in Visual Quantization', 'desc': "ViQ introduces a visual quantization framework that effectively balances the richness of semantic information and the preservation of details in discrete representations. This framework allows for efficient multimodal training using inputs at their native resolutions. By structuring quantization learning into two stages—text-aligned pre-training and feature discretization—ViQ enhances the visual encoder's ability to process complex visual data. Extensive experiments show that ViQ outperforms existing multimodal vision encoders while significantly improving training efficiency."}}}, {'id': 'https://huggingface.co/papers/2606.26907', 'title': 'Qwen-Image-Agent: Bridging the Context Gap in Real-World Image Generation', 'url': 'https://huggingface.co/papers/2606.26907', 'abstract': 'Abstract A unified agentic framework called Qwen-Image-Agent is proposed to address the context gap in text-to-image generation by progressively constructing complete generation context through planning, reasoning, searching, and memory mechanisms.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct While text-to-image (T2I) models have achieved remarkable progress, they struggle with real-world requests that are often underspecified, implicit, or dependent on up-to-date knowledge. We identify this challenge as the Context Gap: the mismatch between the user context and the sufficient generation context for T2I models. To bridge this gap, we propose Qwen-Image-Agent, a unified agentic framework that integrates plan, reason, search, memory and feedback in a context-centric manner. Qwen-Image-Agent treats user input as partial context and progressively constructs the generation context through Context-Aware Planning and Context Grounding. Specifically, Context-Aware Planning identifies missing context and plans how it should be acquired and used, while Context Grounding gathers this context from reason, search, memory, and feedback. To evaluate agentic image generation, we further introduce Image Agent Bench (IA-Bench), a benchmark covering four core image agent capabilities: Plan, Reason, Search, and Memory. Experiments on IA-Bench, Mindbench and WISE-Verified show that Qwen-Image-Agent outperforms strong baselines and achieves state-of-the-art performance.', 'score': 26, 'issue_id': 2723, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '230aa6b52d1269cf', 'github_url': '', 'github_stars': 0, 'authors': ['Zekai Zhang', 'Jiahao Li', 'Jie Zhang', 'Kaiyuan Gao', 'Kun Yan', 'Lihan Jiang', 'Ningyuan Tang', 'Shengming Yin', 'Tianhe Wu', 'Xiaoyue Chen', 'Xiao Xu', 'Yan Shu', 'Yanran Zhang', 'Yixian Xu', 'Yuxiang Chen', 'Zhendong Wang', 'Zihao Liu', 'Zikai Zhou', 'Huishuai Zhang', 'Dongyan Zhao', 'Chenfei Wu'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.26907.jpg', 'data': {'categories': ['#reasoning', '#benchmark', '#agents', '#memory', '#agent_memory'], 'emoji': '🖼️', 'ru': {'title': 'Новый подход к генерации изображений из текста', 'desc': 'В данной статье предложен унифицированный агентный фреймворк Qwen-Image-Agent, который решает проблему контекстного разрыва в генерации изображений на основе текста. Он постепенно создает полный контекст генерации через механизмы планирования, рассуждения, поиска и памяти. Qwen-Image-Agent рассматривает ввод пользователя как неполный контекст и интерпретирует его, чтобы дополнить необходимую информацию. Эксперименты показывают, что данный фреймворк превосходит существующие модели и демонстрирует передовые результаты.'}, 'en': {'title': 'Bridging the Context Gap in Text-to-Image Generation', 'desc': "The paper introduces Qwen-Image-Agent, a framework designed to improve text-to-image generation by addressing the 'Context Gap' issue. This gap arises when user requests are vague or lack sufficient detail for T2I models to generate accurate images. Qwen-Image-Agent enhances the generation process by using planning, reasoning, searching, and memory to build a complete context progressively. The framework is evaluated using the Image Agent Bench (IA-Bench), demonstrating superior performance compared to existing models."}}}, {'id': 'https://huggingface.co/papers/2606.26790', 'title': 'OPID: On-Policy Skill Distillation for Agentic Reinforcement Learning', 'url': 'https://huggingface.co/papers/2606.26790', 'abstract': 'Abstract On-policy skill distillation framework extracts dense hindsight supervision from completed trajectories to improve language agent training efficiency and performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Outcome-based reinforcement learning provides a stable optimization backbone for language agents, but its sparse trajectory-level rewards provide little guidance on which intermediate decisions should be reinforced or suppressed. On-policy self-distillation offers dense token-level supervision, yet existing skill-conditioned variants often rely on external skill memories or retrieved privileged context, which are costly to maintain and can be mismatched with the state distribution induced by the current policy in multi-turn interaction. We propose OPID (On-Policy Skill Distillation), a framework that extracts skill supervision directly from completed on-policy trajectories. OPID represents trajectory hindsight as hierarchical skills: episode-level skills capture global workflows or failure-avoidance rules, while step-level skills capture local decision knowledge at critical timesteps. A critical-first routing mechanism uses step-level skills when critical decisions are identified and falls back to episode-level skills as default guidance otherwise. The selected skill is injected into the interaction history, allowing the old policy to re-score the same sampled response under both original and skill-augmented contexts. The resulting log-probability shift yields a token-level self-distillation advantage, which is combined with the outcome advantage for policy optimization. OPID thus preserves RL as the primary training objective while introducing dense, distribution-matched hindsight supervision. Experiments on ALFWorld, WebShop and Search-based QA demonstrate that OPID generally improves agent performance, sample efficiency, and robustness over outcome-only RL and existing skill-distillation baselines. Our code is available at https://github.com/jinyangwu/OPID/tree/main.', 'score': 24, 'issue_id': 2723, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '831489f021ac14f0', 'github_url': '', 'github_stars': 0, 'authors': ['Shuo Yang', 'Jinyang Wu', 'Zhengxi Lu', 'Yuhao Shen', 'Fan Zhang', 'Lang Feng', 'Shuai Zhang', 'Haoran Luo', 'Zheng Lian', 'Zhengqi Wen', 'Jianhua Tao'], 'affiliations': ['Nanyang Technological University', 'The Chinese University of Hong Kong', 'Tongji University', 'Tsinghua University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.26790.jpg', 'data': {'categories': ['#optimization', '#agent_memory', '#agents', '#rlhf', '#training', '#rl'], 'emoji': '📈', 'ru': {'title': 'Улучшение обучения агентов с помощью извлечения навыков', 'desc': 'В данной работе представлена архитектура OPID (On-Policy Skill Distillation), которая улучшает обучение языковых агентов, извлекая навыки из завершенных траекторий. Эта система использует иерархические навыки, разделенные на навыки уровня эпизода и уровня шага, что позволяет более точно направлять оптимизацию. Кроме того, механизм маршрутизации критических решений позволяет применять навыки на уровне шага в важных моментах, улучшая качество решений. Эксперименты показывают, что OPID значительно повышает устойчивость и эффективность агентов по сравнению с традиционными методами обучения.'}, 'en': {'title': 'Enhancing Language Agent Training with On-Policy Skill Distillation', 'desc': "The paper introduces OPID (On-Policy Skill Distillation), a framework that enhances the training of language agents by extracting dense supervision from completed trajectories. It addresses the limitations of sparse rewards in outcome-based reinforcement learning by providing both episode-level and step-level skills for better decision-making guidance. A critical-first routing mechanism is employed to utilize the most relevant skills during important decisions, improving the agent's performance and efficiency. Experiments show that OPID outperforms traditional methods in various tasks, demonstrating its effectiveness in optimizing policy training."}}}, {'id': 'https://huggingface.co/papers/2606.18394', 'title': 'JetSpec: Breaking the Scaling Ceiling of Speculative Decoding with Parallel Tree Drafting', 'url': 'https://huggingface.co/papers/2606.18394', 'abstract': "Abstract JetSpec is a speculative decoding framework that combines efficient forward drafting with causal conditioning to improve LLM inference speed and acceptance rates across various benchmarks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Speculative decoding (SD) accelerates autoregressive Large Language Models (LLMs) by drafting multiple tokens and verifying them in parallel, but it faces a scaling limitation: increasing the draft budget improves speed only when acceptance remains high and drafting overhead stays low. This ceiling has been difficult to break because prior head-based SD methods face a causality-efficiency dilemma. Autoregressive drafters produce path-conditioned candidates that are effective for tree speculative decoding with higher acceptance length, but their drafting cost grows with tree depth. Bidirectional block-diffusion drafters generate all positions in one pass, but their branch-agnostic marginals can form individually plausible yet mutually inconsistent trees, wasting budget and reducing acceptance. We propose JetSpec, a head-based SD framework that combines one-forward drafting efficiency with branch-wise causal conditioning. JetSpec trains a causal parallel draft head over fused hidden states from the frozen target model, producing candidate trees whose scores align with the target model's autoregressive factorization. This enables JetSpec to convert larger draft budgets into longer accepted prefixes and higher end-to-end speedup. Across math, coding, and chat benchmarks on dense and MoE Qwen3 models, JetSpec consistently outperforms bidirectional-head and tree-based SD baselines. On H100 GPUs, JetSpec achieves up to 9.64x speedup on MATH-500 and 4.58x on open-ended conversational workloads, with further latency gains demonstrated through vLLM integration under realistic serving loads. Our code and models are available at https://github.com/hao-ai-lab/JetSpec.", 'score': 16, 'issue_id': 2724, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '69979ffe7419df73', 'github_url': '', 'github_stars': 0, 'authors': ['Lanxiang Hu', 'Zhaoxiang Feng', 'Yulun Wu', 'Haoran Yuan', 'Yujie Zhao', 'Yu-Yang Qian', 'Bojun Wang', 'Peng Zhao', 'Daxin Jiang', 'Yibo Zhu', 'Tajana Rosing', 'Hao Zhang'], 'affiliations': ['Nanjing University', 'StepFun', 'UC San Diego', 'UIUC', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.18394.jpg', 'data': {'categories': ['#training', '#benchmark', '#optimization', '#architecture', '#inference'], 'emoji': '⚡️', 'ru': {'title': 'Ускорение вывода LLM с помощью JetSpec', 'desc': 'JetSpec — это фреймворк для спекулятивного декодирования, который сочетает в себе эффективное предварительное формирование и причинную кондиционирование для улучшения скорости вывода LLM. Этот метод ускоряет автогенерацию текстов, позволяя одновременно генерировать несколько токенов и проверять их, что повышает процент принятия. JetSpec преодолевает ограничения предыдущих методов, используя эффективность однонаправленного формирователя и причинную обработку по ветвям. Он показывает выдающиеся результаты на различных тестах, достигая значительного ускорения в сравнении с другими подходами.'}, 'en': {'title': 'Accelerating LLM Inference with JetSpec', 'desc': 'JetSpec is a new framework designed to speed up the inference of Large Language Models (LLMs) by using a method called speculative decoding. It combines efficient forward drafting with causal conditioning to improve the acceptance rates of generated tokens. This approach allows for better use of draft budgets, leading to longer accepted outputs and faster processing times. JetSpec outperforms existing methods in various benchmarks, achieving significant speedups in tasks like math and coding.'}}}, {'id': 'https://huggingface.co/papers/2606.26300', 'title': 'The Verification Horizon: No Silver Bullet for Coding Agent Rewards', 'url': 'https://huggingface.co/papers/2606.26300', 'abstract': "Abstract Verification challenges in AI agents arise from the difficulty of aligning proxy signals with human intent, requiring adaptive verification systems that evolve alongside generative capabilities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct A classical intuition holds that verifying a solution is easier than producing one. For today's coding agents, this intuition is being inverted: as foundation models develop stronger reasoning capabilities and engineering harnesses grow more sophisticated, generating complex candidate solutions is no longer difficult -- reliably verifying them has become the harder problem. Every verifier we can build is only a proxy for human intent, never the intent itself. This makes verification subject to a twofold difficulty: first, intent is underspecified by nature, making it inherently hard to faithfully check whether it has been fulfilled; second, during model training, optimization widens the gap between proxy and intent -- manifesting as reward hacking or signal saturation. To address this, we characterize the quality of verification signals along three dimensions -- scalability, faithfulness, and robustness -- and argue that achieving all three simultaneously is the central challenge. We further study four reward constructions: a test verifier for general coding tasks, a rubric verifier for frontend tasks, the user as verifier for real-world agent tasks, and an automated agent verifier for long-horizon tasks. Across different task types and policy capability levels, we conduct in-depth analysis and experiments on the core challenges of reward design and how to more effectively leverage reward signals. Experiments show that targeted verification design can effectively suppress reward hacking, improve task completion quality, and achieve significant gains across multiple internal and public benchmarks. These experiences collectively point to a core observation: no fixed reward function can remain effective as policy capability continues to grow; and verification must co-evolve with the generator.", 'score': 14, 'issue_id': 2723, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '100bd102821ec316', 'github_url': '', 'github_stars': 0, 'authors': ['Binghai Wang', 'Chenlong Zhang', 'Dayiheng Liu', 'Jiajun Zhang', 'Jiawei Chen', 'Mouxiang Chen', 'Rongyao Fang', 'Siyuan Zhang', 'Xuwu Wang', 'Yuheng Jing', 'Zeyao Ma', 'Zeyu Cui'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.26300.jpg', 'data': {'categories': ['#reasoning', '#benchmark', '#optimization', '#agents', '#alignment', '#rlhf', '#training'], 'emoji': '🤖', 'ru': {'title': 'Верификация и человеческие намерения в мире AI', 'desc': 'В статье обсуждаются проблемы верификации в AI-агентах, связанные с необходимостью согласования сигналов с человеческими намерениями. Сложность верификации возрастает по мере развития моделей, которые способны генерировать решения, но не всегда могут быть проверены на соответствие действительности. Авторы выделяют три ключевых аспекта качества верификационных сигналов: масштабируемость, верность и надежность, подчеркивая необходимость достижения всех трех аспектов одновременно. В результате экспериментов показано, что целенаправленный дизайн верификации может значительно улучшить качество выполнения задач и минимизировать проблемы с манипуляциями наградеж.'}, 'en': {'title': 'Evolving Verification: Aligning AI Outputs with Human Intent', 'desc': 'This paper discusses the challenges of verifying AI agents, particularly in aligning their outputs with human intent. As generative models become more capable, the task of verifying their solutions has become more complex. The authors highlight that verification systems must adapt alongside these models to ensure they accurately reflect human goals. They propose a framework for evaluating verification signals based on scalability, faithfulness, and robustness, and present various reward structures to improve verification effectiveness.'}}}, {'id': 'https://huggingface.co/papers/2606.26027', 'title': 'Why Multi-Step Tool-Use Reinforcement Learning Collapses and How Supervisory Signals Fix It', 'url': 'https://huggingface.co/papers/2606.26027', 'abstract': 'Abstract Research investigates how different supervisory signals and training strategies improve the stability and performance of large language models in tool-use tasks, addressing issues like catastrophic collapse and format sensitivity through interleaved supervised fine-tuning and reinforcement learning.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Tool use enables large language models (LLMs) to perform complex tasks, and recent agentic reinforcement learning (RL) methods show promise for enhancing model capabilities. However, RL alone often leads to instability or limited gains in tool-use tasks. In our experiments, some models exhibit catastrophic collapse, where performance abruptly drops and tool-invocation structures fail. The analysis reveals that these failures stem from unexpected probability spikes in specific control tokens, disrupting structured execution, yet the underlying tool-use capability remains intact, merely obscured by specific formats. To address this, we systematically investigate a diverse set of supervisory signals, including off-policy supervision, hint-based guidance, erroneous example supervision, and others, applied under both synchronous and interleaved training schemes. We find that interleaving supervised fine-tuning (SFT) with RL substantially improves stability, but exhibits degraded performance under format and content out-of-distribution (OOD) evaluation. We also analyze the impact of learning rates and generalization across settings. These results highlight the importance of understanding RL failures and demonstrate how diverse supervisory signals can guide exploratory learning, enabling robust training of LLMs for complex, multi-step tool-use tasks. Our Code is available at https://github.com/hypasd-art/Tool-RL-Box.', 'score': 9, 'issue_id': 2723, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': 'e24902f212d21ead', 'github_url': '', 'github_stars': 0, 'authors': ['Yupu Hao', 'Zhuoran Jin', 'Huanxuan Liao', 'Kang Liu', 'Jun Zhao'], 'affiliations': ['School of Artificial Intelligence, University of Chinese Academy of Sciences, Beijing, China', 'The Key Laboratory of Cognition and Decision Intelligence for Complex Systems, Institute of Automation, Chinese Academy of Sciences, Beijing, China'], 'pdf_title_img': 'assets/pdf/title_img/2606.26027.jpg', 'data': {'categories': ['#optimization', '#tool_use', '#training', '#reinforcement_learning', '#rl'], 'emoji': '🛠️', 'ru': {'title': 'Стабильность LLM через разнообразные сигналы управления', 'desc': 'В этой работе исследуется, как различные сигналы управления и стратегии обучения могут улучшить стабильность и производительность больших языковых моделей (LLM) при выполнении задач с использованием инструментов. Исследуются проблемы, такие как катастрофическое коллапсирование и чувствительность к формату, и применяется комплексный подход с супервизионным тонким настраиванием и методом обучения с подкреплением (RL). Эксперименты показывают, что комбинирование тонкого настраивания с RL значительно улучшает стабильность моделей, хотя при этом производительность может снижаться при оценке на данных вне распределения. Работа подчеркивает важность понимания неудач в методах RL и демонстрирует, как разнообразные сигналы управления могут направлять обучение, обеспечивая надежное обучение LLM для сложных задач с многоступенчатыми инструментами.'}, 'en': {'title': 'Enhancing Stability in Tool-Use Tasks with Diverse Training Strategies', 'desc': 'This research explores how different training methods and supervisory signals can enhance the stability and performance of large language models (LLMs) in tasks that require tool use. It addresses challenges like catastrophic collapse, where model performance suddenly drops, and format sensitivity that affects execution. By combining supervised fine-tuning with reinforcement learning, the study finds significant improvements in stability, although performance may decline when faced with out-of-distribution data. The findings emphasize the need for diverse supervisory signals to support effective learning and robust training for complex tasks.'}}}, {'id': 'https://huggingface.co/papers/2606.24551', 'title': 'GUI vs. CLI: Execution Bottlenecks in Screen-Only and Skill-Mediated Computer-Use Agents', 'url': 'https://huggingface.co/papers/2606.24551', 'abstract': 'Abstract  Computer-use agents can execute software tasks through either graphical interfaces or programmatic command interfaces, but existing evaluations confound interaction modality with differences in tasks, initial states, verifiers, and permitted actions. We introduce a matched execution-layer benchmark of 440 desktop tasks across 18 applications and 12 workflow categories, where screen-only GUI agents and skill-mediated CLI agents receive identical goals, states, and final-state verifiers while being restricted to modality-native actions. In this controlled setting, the strongest GUI agent reaches a 59.1% full pass rate, outperforming the strongest original-skill CLI agent at 48.2%; however, verifier-guided skill augmentation raises CLI success to 69.3%, showing that much of the CLI deficit comes from incomplete skill coverage rather than model capability alone. These results suggest that GUI and CLI expose different execution bottlenecks: GUI agents are limited by reliable grounded interaction over long-horizon workflows, whereas CLI agents are limited by the coverage and scalability of their skill interfaces.', 'score': 5, 'issue_id': 2723, 'pub_date': '2026-06-22', 'pub_date_card': {'ru': '22 июня', 'en': 'June 22', 'zh': '6月22日'}, 'hash': 'a63475a65dfda1fc', 'github_url': '', 'github_stars': 0, 'authors': ['Xiao Zhou', 'Siyue Zhang', 'Yilun Zhao', 'Jinbiao Wei', 'Tingyu Song', 'Arman Cohan', 'Chen Zhao'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.24551.jpg', 'data': {'categories': ['#agent_memory', '#benchmark', '#agents', '#session_memory'], 'emoji': '🖥️', 'ru': {'title': 'Сравнение эффективности GUI и CLI агентов в выполнении задач', 'desc': 'В данной статье представлено исследование производительности агентов, использующих графические и программные интерфейсы для выполнения задач на компьютере. Авторы разработали бенчмарк, состоящий из 440 задач в 18 приложениях и 12 категориях workflows, чтобы оценить эффективность GUI и CLI агентов. Результаты показали, что хотя GUI агенты имеют большую успешность, использование улучшенных навыков для CLI агентов значительно повышает их эффективность. Это подчеркивает различия в ограничениях между двумя типами агентов: GUI ограничены взаимодействиями, а CLI — охватом и масштабируемостью навыков.'}, 'en': {'title': 'Unveiling the Strengths and Weaknesses of GUI vs. CLI Agents', 'desc': 'This paper evaluates the performance of computer-use agents that interact through graphical user interfaces (GUIs) and command-line interfaces (CLIs) using a controlled benchmark of 440 tasks. The study finds that GUI agents outperform CLI agents in task completion rates, but the performance gap can be narrowed with skill augmentation for CLI agents. The results indicate that GUI agents struggle with long-term workflow interactions, while CLI agents face challenges related to the breadth of their skill sets. Overall, the research highlights the distinct limitations of each modality in executing software tasks effectively.'}}}, {'id': 'https://huggingface.co/papers/2606.26904', 'title': 'Confidence-Aware Tool Orchestration for Robust Video Understanding', 'url': 'https://huggingface.co/papers/2606.26904', 'abstract': 'Abstract Robust-TO addresses the Blind Trust Problem in video reasoning by integrating per-frame trustworthiness into an agentic framework that improves accuracy under realistic perturbations through calibrated evidence weighting and reliability-aware reasoning.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Video reasoning language models implicitly assume that every input frame is equally reliable. This leads to what we term the Blind Trust Problem: under realistic perturbations such as motion blur, glare, or occlusion, frontier video reasoning models can suffer 15-30%p accuracy drops on real-world embodied benchmarks, while remaining unaware that their visual evidence has been degraded. To address this challenge, we propose Robust-TO, an agentic video understanding framework that explicitly integrates per-frame trustworthiness into every stage of reasoning. Robust-TO organizes heterogeneous visual perception tools under a unified evidence interface. Each tool receives a sub-query derived from the original question and a set of trustworthy frames selected by the reliability-relevance score. It returns evidence in a shared format: a concrete prediction (e.g., a bounding box, motion trajectory, recognized text, or action label), temporal grounding, and a calibrated reliability score. During reasoning, these calibrated scores guide evidence weighting in a three-tier synthesis process (high/medium/low) and define a confidence-cost GRPO reward that jointly optimizes correctness, evidence reliability, and efficiency. On two video reasoning benchmarks spanning eight tasks, Robust-TO achieves 56.4% average accuracy on clean inputs, surpassing the strongest open-source baseline by 10.6%p and outperforming Gemini-2.5-Pro (46.2%). Under five realistic corruption types, Robust-TO maintains 54.3% average accuracy, 5.8%p above the strongest open-source baseline, while exhibiting the smallest clean-to-corrupted accuracy drop among all compared methods.', 'score': 4, 'issue_id': 2723, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '23e810cc5b6d979a', 'github_url': '', 'github_stars': 0, 'authors': ['Yangfan He', 'Yujin Choi', 'Jaehong Yoon'], 'affiliations': ['NTU Singapore', 'UNIST', 'University of Minnesota, Twin Cities'], 'pdf_title_img': 'assets/pdf/title_img/2606.26904.jpg', 'data': {'categories': ['#reasoning', '#benchmark', '#security', '#agents', '#open_source', '#rl', '#agent_memory'], 'emoji': '🎥', 'ru': {'title': 'Надежное видео reasoning: точность с учетом доверия', 'desc': 'Статья посвящена решению проблемы слепого доверия в виде reasoning, предлагая подход Robust-TO. Этот подход улучшает точность обработки видео, учитывая достоверность каждой отдельной рамки, даже при наличии искажений, таких как размытие или затенение. Robust-TO организует инструменты восприятия так, чтобы каждый получал информацию о надежных рамках, что позволяет повышать точность предсказаний. На тестах Robust-TO показал существенно лучшие результаты по сравнению с другими моделями.'}, 'en': {'title': 'Enhancing Video Reasoning with Frame Trustworthiness', 'desc': 'Robust-TO is a new framework for video reasoning that tackles the Blind Trust Problem by assessing the trustworthiness of each video frame. Traditional models treat all frames as equally reliable, which can lead to significant accuracy drops when faced with real-world issues like motion blur or glare. Robust-TO improves performance by integrating a system that evaluates and weights evidence based on its reliability during reasoning. This approach not only enhances accuracy on clean inputs but also maintains better performance under various corruptions compared to existing models.'}}}, {'id': 'https://huggingface.co/papers/2606.26025', 'title': 'In-Context World Modeling for Robotic Control', 'url': 'https://huggingface.co/papers/2606.26025', 'abstract': 'Abstract ICWM enables robot policies to infer system variables from self-generated interactions, allowing adaptation to novel configurations without parameter updates by treating system identification as an in-context adaptation problem.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Modern Vision-Language-Action (VLA) models often fail to generalize to novel setups, such as altered camera viewpoints or robot morphologies, because they are typically conditioned only on current observations and language instructions. By ignoring the underlying system configuration as a variable, these models implicitly assume a fixed execution context encountered during training, necessitating data-intensive fine-tuning for any new environment. In this work, we introduce In-Context World Modeling (ICWM), a framework that treats system identification as an in-context adaptation problem. ICWM enables robot policies to autonomously infer essential system variables from a short history of self-generated, task-agnostic interactions. Unlike traditional In-Context Learning that uses demonstrations to specify what task to perform, ICWM leverages the context window to understand how the system operates. By processing these interactions before task execution, the model implicitly captures the world dynamics of the current system, enabling adaptation to novel configurations without parameter updates. Extensive experiments in simulation and on real-world robot platforms demonstrate that ICWM significantly outperforms standard VLA baselines on novel camera viewpoints.', 'score': 2, 'issue_id': 2723, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': 'd02f513c21475cea', 'github_url': '', 'github_stars': 0, 'authors': ['Siyin Wang', 'Junhao Shi', 'Senyu Fei', 'Zhaoyang Fu', 'Li Ji', 'Jingjing Gong', 'Xipeng Qiu'], 'affiliations': ['Fudan University', 'Shanghai Innovation Institute', 'Tongji University'], 'pdf_title_img': 'assets/pdf/title_img/2606.26025.jpg', 'data': {'categories': ['#optimization', '#agents', '#robotics', '#transfer_learning', '#inference', '#long_context'], 'emoji': '🤖', 'ru': {'title': 'Адаптация роботов без обновления параметров', 'desc': 'В этой работе представлен новый подход, называемый In-Context World Modeling (ICWM), который позволяет роботам адаптироваться к новым конфигурациям без обновления параметров. ICWM делает это, рассматривая определение системы как задачу адаптации в контексте. Модели могут самостоятельно извлекать важные переменные системы из своей истории взаимодействий, что позволяет им лучше понимать динамику окружающего мира. Это позволяет значительно улучшить производительность роботов в нестандартных условиях, таких как измененные углы обзора камер.'}, 'en': {'title': 'Adapting Robots to New Environments with In-Context Learning', 'desc': 'This paper presents In-Context World Modeling (ICWM), a novel framework that allows robots to adapt to new environments by inferring system variables from their own interactions. Unlike traditional models that rely on fixed training contexts, ICWM treats system identification as an in-context adaptation problem, enabling robots to understand their operational dynamics without needing extensive retraining. By analyzing a short history of task-agnostic interactions, ICWM captures the necessary information to adjust to changes like different camera angles or robot shapes. Experiments show that ICWM significantly improves performance over standard vision-language-action models in unfamiliar setups.'}}}, {'id': 'https://huggingface.co/papers/2606.21795', 'title': 'Discretizing Reward Models', 'url': 'https://huggingface.co/papers/2606.21795', 'abstract': 'Abstract Reward models in reinforcement learning suffer from oversensitivity issues where they assign different scores to equally good responses, leading to poor policy learning, but this can be mitigated through discretization techniques that maintain discriminative ability while reducing oversensitivity.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Despite their widespread use, the role of reward models in shaping reinforcement learning is poorly understood. Reward models offer a tempting promise: they automatically estimate response quality in the absence of verifiers or human judges. Unlike "verifiable rewards" which typically produce binary scores, reward models typically produce continuous scores, allowing them to be sensitive to fine-grained differences in responses. However, we show this apparent strength is a serious weakness: many popular reward models are oversensitive, assigning different scores to equally good responses. Theoretically, we show that seemingly perfect reward models can be highly oversensitive; empirically, this oversensitivity can lead to bad policies. In place of existing notions of "reward model accuracy," we propose evaluating reward models using distinct measures of "discriminative ability" and "specificity" (the complement of oversensitivity). As a solution, we describe a training-free algorithm that uses Monte Carlo dropout on any neural reward model to produce discrete reward clusters. Theoretically, we prove there exist discretizations that reduce oversensitivity at minimal expense of discriminative ability; empirically we show, in both controlled and natural RL settings, that discretizing rewards leads to less reward hacking and better policies than training on the original rewards.', 'score': 2, 'issue_id': 2724, 'pub_date': '2026-06-19', 'pub_date_card': {'ru': '19 июня', 'en': 'June 19', 'zh': '6月19日'}, 'hash': '51313e4f12956002', 'github_url': '', 'github_stars': 0, 'authors': ['Vijay Viswanathan', 'Shiqi Wang', 'Devamanyu Hazarika', 'Chirag Nagpal', 'Tongshuang Wu', 'Graham Neubig', 'Yuning Mao'], 'affiliations': ['Carnegie Mellon University', 'Meta Superintelligence Labs'], 'pdf_title_img': 'assets/pdf/title_img/2606.21795.jpg', 'data': {'categories': ['#training', '#rl', '#reasoning', '#optimization', '#rlhf'], 'emoji': '📊', 'ru': {'title': 'Снижение избыточной чувствительности моделей вознаграждений', 'desc': "Модели вознаграждений в обучении с подкреплением могут страдать от избыточной чувствительности, из-за чего они присваивают разные оценки одинаково хорошим ответам, что приводит к плохому обучению политик. Это можно смягчить с помощью техник дискретизации, которые сохраняют возможность различения при снижении избыточной чувствительности. Мы предлагаем оценивать модели вознаграждений с помощью мер 'различительной способности' и 'специфичности', вместо традиционной 'точности моделей вознаграждений'. Предложенный алгоритм позволяет обнаруживать дискретные кластеры вознаграждений без дополнительного обучения и доказано снижает избыточную чувствительность."}, 'en': {'title': 'Discretizing Rewards to Combat Oversensitivity in Reinforcement Learning', 'desc': "This paper addresses the problem of oversensitivity in reward models used in reinforcement learning, where models assign different scores to equally good responses. This issue can hinder effective policy learning, as it leads to inconsistent evaluations. The authors propose using discretization techniques to create discrete reward clusters that maintain the model's ability to differentiate between responses while reducing oversensitivity. Their approach, validated through theoretical proofs and empirical results, shows that discretized rewards can lead to improved policy performance and less reward hacking compared to traditional continuous scoring methods."}}}, {'id': 'https://huggingface.co/papers/2606.16613', 'title': 'CoffeeBench: Benchmarking Long-Horizon LLM Agents in Heterogeneous Multi-Agent Economies', 'url': 'https://huggingface.co/papers/2606.16613', 'abstract': 'Abstract CoffeeBench evaluates LLM agents in a multi-agent economic simulation where firms interact over 90 days to maximize profits, revealing differences in communication patterns and performance among various models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct As LLM agents become capable of increasingly long-horizon tasks, evaluating their performance in economic systems is becoming increasingly important. Unlike existing benchmarks that primarily evaluate a single agent interacting with a passive environment, economic systems are inherently multi-agent, requiring autonomous agents to communicate, negotiate, and transact while pursuing their own objectives over extended periods. We introduce CoffeeBench, a benchmark for evaluating LLM agents in a long-horizon multi-agent economy composed of heterogeneous firms. In CoffeeBench, two farmers, two roasters, and two retailers autonomously operate their businesses over a 90-day simulation, each seeking to maximize cumulative net income through communication and transactions while managing cash, inventory, and pricing. The evaluated model controls one coffee roaster, while the remaining firms are controlled by fixed reference agents. Across several recent open-weight and proprietary LLMs, all models outperform a passive baseline that takes no actions, with most achieving positive net income. Analysis of agent behavior reveals substantial differences in long-horizon economic interaction: higher-performing models communicate more actively with other firms, whereas Claude~Haiku~4.5 exhibits an idle-drift failure mode, repeatedly choosing inaction despite producing coherent assessments and plans. We release our code and agent trajectories to support future research.', 'score': 2, 'issue_id': 2724, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': 'fdaf509ca06c8638', 'github_url': '', 'github_stars': 0, 'authors': ['Issa Sugiura', 'Daichi Hattori', 'Kazuo Araragi', 'Keita Ogawa', 'Shota Onose', 'Taro Makino', 'Teppei Usuki', 'Takashi Ishida'], 'affiliations': ['KPMG AZSA LLC', 'Sakana AI'], 'pdf_title_img': 'assets/pdf/title_img/2606.16613.jpg', 'data': {'categories': ['#benchmark', '#open_source', '#agents', '#long_context', '#agent_memory'], 'emoji': '☕', 'ru': {'title': 'CoffeeBench: Оценка агентов в многопользовательской экономике', 'desc': 'Статья представляет CoffeeBench, новый бенчмарк для оценки LLM-агентов в многопользовательской экономической симуляции. В симуляции участвуют две фермы, две обжарочные компании и два ритейлера, каждый из которых стремится максимизировать свою прибыль за 90 дней. Результаты показывают, что более высокоэффективные модели активнее общаются с другими участниками, в то время как у некоторых моделей наблюдается неактивность. Исследование подчеркивает важность оценки взаимодействий между агентами в долгосрочных экономических системах.'}, 'en': {'title': 'Evaluating LLM Agents in a Competitive Economic Landscape', 'desc': 'CoffeeBench is a benchmark designed to evaluate large language model (LLM) agents in a multi-agent economic simulation where firms compete over 90 days to maximize profits. Unlike traditional benchmarks that focus on single-agent interactions, CoffeeBench emphasizes the importance of communication, negotiation, and transactions among multiple autonomous agents. The study reveals that higher-performing models engage more actively with other firms, while some models, like Claude Haiku 4.5, struggle with inaction despite having coherent strategies. This research highlights the need for effective long-horizon evaluations in economic systems and provides resources for further exploration.'}}}, {'id': 'https://huggingface.co/papers/2606.27364', 'title': 'PhysiFormer: Learning to Simulate Mechanics in World Space', 'url': 'https://huggingface.co/papers/2606.27364', 'abstract': 'Abstract PhysiFormer uses coordinate-space diffusion to generate physically-plausible 3D object motions without explicit inductive biases, enabling efficient multi-object reasoning and generalization to complex materials and geometries.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present PhysiFormer, a diffusion transformer for physically-plausible 3D object motion. Unlike video world models that operate in view-dependent pixel space, PhysiFormer represents objects as 3D meshes expressed in world coordinates. Given the initial vertex positions and velocities, as well as object material type, rigid or elastic, the model samples future vertex trajectories. While related neural physics approaches build on ad-hoc latent spaces or explicitly enforce rigidity and causality, PhysiFormer shows that excellent results can be obtained without any such inductive biases, by casting vertex trajectory prediction as a single denoising diffusion process directly in world coordinates. The probabilistic formulation captures uncertainty in the learned dynamics, enabling diverse plausible futures from initial conditions, making this framework potentially useful for applications with unobserved uncertainty. The model features attention factorised over time, space, and objects for efficiency, enabling permutation-invariant multi-object reasoning without needing explicit object encoding. Trained on over 100k simulated trajectories, PhysiFormer generates rigid and elastic mechanics, and generalises to mixed-material settings, unseen real-world geometries, and larger object counts. It substantially outperforms autoregressive baselines in trajectory accuracy, rigidity preservation, and momentum-based physical consistency. Our results position coordinate-space diffusion as a promising step toward view-invariant, geometry-aware world modelling for robotics, graphics, and physical design. Visualisations, code, and models are available at https://yimingc9.github.io/physiformer.', 'score': 1, 'issue_id': 2723, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': 'cb8ae1ba18ba17c5', 'github_url': '', 'github_stars': 0, 'authors': ['Yiming Chen', 'Yushi Lan', 'Andrea Vedaldi'], 'affiliations': ['Visual Geometry Group, University of Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2606.27364.jpg', 'data': {'categories': ['#reasoning', '#optimization', '#open_source', '#robotics', '#diffusion', '#3d'], 'emoji': '⚙️', 'ru': {'title': 'Физически правдоподобные движения 3D объектов', 'desc': 'Статья представляет модель PhysiFormer, которая использует диффузию в координатном пространстве для генерации физически правдоподобных движений 3D объектов. Модель работает с 3D сетками, а не с пиксельными пространствами, что позволяет ей лучше учитывать сложные материалы и геометрии. PhysiFormer демонстрирует отличные результаты, не полагаясь на явные индуктивные предвзятости, а вместо этого рассматривая предсказание траекторий вершин как процесс денойзинга. Модель может эффективно обрабатывать множество объектов одновременно, генерируя различные, но правдоподобные сценарии будущего.'}, 'en': {'title': 'Revolutionizing 3D Motion Prediction with Coordinate-Space Diffusion', 'desc': 'PhysiFormer is a diffusion transformer designed to predict realistic 3D object motions by using coordinate-space diffusion. It operates directly in world coordinates, representing objects as 3D meshes, which allows for efficient reasoning about multiple objects without needing explicit biases. The model predicts future vertex trajectories based on initial positions, velocities, and material types, capturing uncertainty in dynamics for diverse outcomes. Trained on a large dataset, it excels in accuracy and physical consistency, making it suitable for applications in robotics and graphics.'}}}, {'id': 'https://huggingface.co/papers/2606.26217', 'title': 'Fast LeWorldModel', 'url': 'https://huggingface.co/papers/2606.26217', 'abstract': 'Abstract Fast-LeWM accelerates visual planning by replacing autoregressive rollout with parallel action-prefix prediction, reducing computational costs and latency accumulation during long-horizon predictions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Joint-Embedding Predictive Architectures (JEPAs), including recent LeWorldModel (LeWM), have become a promising foundation for reconstruction-free visual world models. For visual planning, however, LeWM evaluates candidate action sequences by repeatedly applying a local one-step latent transition model. This autoregressive rollout makes planning computationally expensive and exposes the predicted trajectory to accumulated latent errors as the horizon grows. We propose Fast LeWorldModel (Fast-LeWM), a fast latent world model that replaces repeated local rollout with action-prefix prediction. Given the current latent and a candidate action sequence, Fast-LeWM encodes its prefixes and predicts the future latents reached after executing those prefixes in parallel. By making action prefixes the basic prediction unit, Fast-LeWM directly models action effects accumulated to different extents over multiple horizons. This prefix-level supervision forces the model to learn how states continuously evolve under different action prefixes, rather than only fitting one-step state transitions. During planning, the predictor can use the last prefix token from the encoded action sequence to evaluate the corresponding future latent without explicitly rolling through each intermediate imagined state. Across multiple tasks, Fast-LeWM improves average success over LeWM while substantially reducing planning time, achieving lower open-loop latent loss whose growth becomes significantly slower as the rollout horizon increases.', 'score': 1, 'issue_id': 2723, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '1423e6724acc9721', 'github_url': '', 'github_stars': 0, 'authors': ['Yuntian Gao', 'Xiangyu Xu'], 'affiliations': ['Xian Jiaotong University'], 'pdf_title_img': 'assets/pdf/title_img/2606.26217.jpg', 'data': {'categories': ['#optimization', '#agents', '#training', '#rl', '#games'], 'emoji': '🚀', 'ru': {'title': 'Ускорение визуального планирования с помощью Fast-LeWM', 'desc': 'Статья представляет Fast-LeWM, модель, ускоряющую визуальное планирование за счет замены автогрегрессивного роллаута параллельным прогнозированием префиксов действий. Это позволяет значительно снизить вычислительные затраты и уменьшить накопление ошибок во время долгосрочного прогнозирования. Fast-LeWM использует кодирование префиксов действий и предсказывает будущие состояния, не проходя через каждое промежуточное состояние. Model демонстрирует улучшение средней успешности по сравнению с LeWM и уменьшает время планирования.'}, 'en': {'title': 'Accelerating Visual Planning with Action-Prefix Prediction', 'desc': 'Fast-LeWM is a novel approach to visual planning that enhances efficiency by using action-prefix prediction instead of traditional autoregressive rollout. This method reduces computational costs and minimizes latency during long-horizon predictions by evaluating candidate action sequences in parallel. By focusing on action prefixes, Fast-LeWM allows the model to learn how states evolve over time under different actions, rather than just one-step transitions. As a result, it achieves better performance and faster planning times compared to previous models like LeWM, while also reducing the accumulation of latent errors.'}}}, {'id': 'https://huggingface.co/papers/2606.21959', 'title': 'OpenBioRQ: Unsolved Biomedical Research Questions for Agents', 'url': 'https://huggingface.co/papers/2606.21959', 'abstract': "Abstract A new biomedical benchmark evaluates agentic models' ability to verify sources and avoid false citations by testing unsolved research questions with no answer keys, revealing significant failures in retrieval-grounded reasoning and tool usage.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct A working citation looks like proof -- but the fact that a link resolves does not mean the cited paper supports the claim. I find that current agentic models rarely fabricate citations (over 99% resolve), yet roughly 15.9% link to the wrong paper. Existing benchmarks miss this failure mode: when a question has a fixed answer key, a model can reproduce the expected source from that key rather than independently verifying that the source supports the claim. I introduce \\openbiorq{}, a retrieval-grounded agentic benchmark of 12{,}553 unsolved biomedical research questions across 12 domains that treats open questions as a faithfulness-and-abstention probe. To my knowledge, this is the first biomedical benchmark to combine an agentic setting -- where the model must issue multiple tool calls -- with unsolved questions that have no answer key. Openness is verified against real follow-up evidence rather than a model's parametric knowledge. Difficulty is empirical: I anchor it on questions that three open-weight reference models fail to answer, rather than on subjective hardness labels. On this hardest subset, held-out models from the same lineage as the difficulty anchors solve only ~17%, while three independent frontier agents (Gemini-3-Pro, Opus-4.7, GPT-5.5) span a wide 29-60% range. The benchmark is thus hard, non-saturating (the best agent still leaves ~33-40\\% unsolved), and discriminating across capability tiers. Beyond difficulty, I observe agentic collapse on the hardest questions, where agents stop using their tools. For the most collapse-prone model, blocking tool access entirely barely changes its score -- so tools stop paying off exactly where they are needed most. A frozen per-question checklist raises inter-judge agreement from Spearman 0.35 to 0.82.", 'score': 1, 'issue_id': 2723, 'pub_date': '2026-06-20', 'pub_date_card': {'ru': '20 июня', 'en': 'June 20', 'zh': '6月20日'}, 'hash': 'ce61723d3dff1d96', 'github_url': '', 'github_stars': 0, 'authors': ['Minbyul Jeong'], 'affiliations': ['Upstage AI'], 'pdf_title_img': 'assets/pdf/title_img/2606.21959.jpg', 'data': {'categories': ['#retrieval', '#benchmark', '#tool_use', '#agents', '#agent_memory'], 'emoji': '🧬', 'ru': {'title': 'Проверка надежности биомедицинских источников', 'desc': 'В статье представлено новое биомедицинское тестирование, которое оценивает способности агентов к проверке источников и предотвращению ложных цитирований. Тест содержит 12,553 нерешенных биомедицинских исследовательских вопросов без ответов, что позволяет проверить, поддерживает ли источник заявленные данные. Результаты показывают, что многие модели агентов не используют свои инструменты должным образом, останавливаясь на сложных вопросах. Это исследование впервые сочетает агентов с нерешенными вопросами, что подчеркивает важность проверки фактических данных.'}, 'en': {'title': 'Evaluating Agentic Models in Biomedical Research: A New Benchmark', 'desc': "This paper introduces a new benchmark called \\openbiorq{} to evaluate agentic models in biomedical research. It focuses on the models' ability to verify citations and avoid false references when addressing unsolved research questions. The study reveals that while models rarely fabricate citations, they often link to incorrect papers, highlighting a significant failure in retrieval-grounded reasoning. The benchmark is designed to assess model performance empirically, showing that even advanced models struggle with difficult questions, leading to a phenomenon known as agentic collapse."}}}, {'id': 'https://huggingface.co/papers/2606.27326', 'title': 'Hallucination in World Models is Predictable and Preventable', 'url': 'https://huggingface.co/papers/2606.27326', 'abstract': 'Abstract World models exhibit hallucinations in low-data regions of state-action space, which can be detected and mitigated using data-centric signals and coverage-aware sampling techniques.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Modern generative world models render increasingly realistic action-controllable futures, yet they frequently hallucinate: rollouts remain visually fluent while drifting from the ground-truth dynamics. We hypothesize that hallucination concentrates in low-coverage regions of the state-action space, where lightweight data-centric signals can both detect it and guide mitigation. To test this, we introduce MMBench2, a 427-hour, 210-task dataset for visual world modeling with ground-truth actions, rewards, and live simulators, and train a 350M-parameter world model on it. We identify three distinct hallucination modes: perceptual, action-marginalized, and scene-diverging -- each anchored to a different stage of the pipeline, and develop three signals that accurately predict where the model will fail. To close coverage gaps at training time, we develop a coverage-aware sampling technique; to close them online, our hallucination predictors serve as curiosity rewards for targeted data collection, yielding a data-efficient finetuning recipe that adapts the pretrained world model to entirely unseen environments with as few as 50 real environment trajectories. Overall, our findings reveal that hallucination in world models is inherently a data coverage issue, and that the same signals used to detect it can also be used for mitigation.   An interactive web version of our paper is available at https://www.nicklashansen.com/mmbench2', 'score': 0, 'issue_id': 2723, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '1149834beda63951', 'github_url': '', 'github_stars': 0, 'authors': ['Nicklas Hansen', 'Xiaolong Wang'], 'affiliations': ['UC San Diego'], 'pdf_title_img': 'assets/pdf/title_img/2606.27326.jpg', 'data': {'categories': ['#benchmark', '#low_resource', '#data', '#dataset', '#training', '#hallucinations'], 'emoji': '🌍', 'ru': {'title': 'Галлюцинации моделей мира: решение через данные', 'desc': 'В данной статье рассматривается проблема галлюцинаций в моделях мира, которые возникают в областях пространства состояний и действий с низким количеством данных. Исследователи предполагают, что галлюцинации сосредотачиваются в этих регионах, и предлагают использование сигналов, ориентированных на данные, для их обнаружения и устранения. Для проверки гипотезы был создан набор данных MMBench2, на котором была обучена модель мира. В статье также представлены методы предсказания и формирования выборки, которые помогают улучшить качество моделей в новых незнакомых средах.'}, 'en': {'title': 'Mitigating Hallucinations in World Models through Data Coverage', 'desc': 'This paper discusses how world models in machine learning can produce unrealistic outputs, known as hallucinations, especially in areas with limited data. The authors propose that these hallucinations occur in low-coverage regions of the state-action space and can be identified and reduced using specific data-centric signals and sampling methods. They introduce a new dataset, MMBench2, which helps train a world model to better understand and predict these failures. By employing coverage-aware sampling and curiosity rewards, the model can adapt to new environments efficiently, demonstrating that addressing data coverage is key to improving model reliability.'}}}, {'id': 'https://huggingface.co/papers/2606.26299', 'title': 'COrigami: An AI Pipeline for Co-Designing Flat-Foldable Visually Recognisable Origami', 'url': 'https://huggingface.co/papers/2606.26299', 'abstract': 'Abstract A computational origami system generates crease patterns from natural language using AI-driven optimization and aesthetic evaluation, enabling human-AI collaboration in mathematically constrained design.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct While generative AI has achieved remarkable success in solving problems with verifiable solutions, generating physical art that satisfies both strict geometric constraints and subjective visual aesthetics remains a challenge. This paper presents an approach to tackle these difficulties in the domain of computational origami, a mathematically rigid environment that grounds artistic design within the equations of flat foldability. We present COrigami, an end-to-end AI-driven pipeline that assists the design cycle by generating crease patterns from natural language. Our pipeline involves generating a semantic stick figure, computing a base packing, solving for a flat-foldable crease pattern, shaping the flat-folded crease pattern, and refining the generated model using reinforcement learning driven by an autonomous aesthetic evaluation loop. Our system acts as a highly effective collaborative assistant, generating structural starting points that human artists can further expand and shape. By integrating algorithmic optimisation with autonomous aesthetic critique, this work demonstrates how AI systems can satisfy multi-objective physical constraints to enable reliable, mathematically grounded co-creativity.', 'score': 0, 'issue_id': 2723, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '9188a0d3b779c623', 'github_url': '', 'github_stars': 0, 'authors': ['Tom Zahavy', 'Shaobo Hou', 'Thomas Tumiel', 'James Doran', 'Francesco Faccio', 'Xidong Feng', 'Alex Havrilla', 'Igor Khytryi', 'Chenglei Li', 'Lisa Schut', 'Vivek Veeriah', 'Arijan Abrashi', 'Michał Kosmulski', 'Robert J. Lang', 'Nick Robinson', 'Brandon Wong', 'Marcus Chiam', 'Gloria Fang', 'Satinder Singh'], 'affiliations': ['Google', 'Google DeepMind', 'Independent', 'Stanford'], 'pdf_title_img': 'assets/pdf/title_img/2606.26299.jpg', 'data': {'categories': ['#optimization', '#agi', '#multimodal', '#agents', '#rl', '#games'], 'emoji': '🦋', 'ru': {'title': 'AI в помощь творчеству: вычислительное оригами', 'desc': 'В данной статье представлен подход к созданию систем вычислительного оригами, который использует AI для генерации рисунков складок на основе естественного языка. Эта система, названная COrigami, сочетает в себе алгоритмическую оптимизацию и автономную оценку эстетики, позволяя людям и AI работать вместе. Она решает задачи, связанные с жесткими геометрическими ограничениями и субъективной визуальной эстетикой, что является сложной задачей в искусстве. COrigami служит высокоэффективным помощником, создавая структуру, с которой могут работать художники.'}, 'en': {'title': 'AI-Powered Origami: Bridging Geometry and Aesthetics', 'desc': 'This paper introduces COrigami, an AI-driven system that generates crease patterns for origami from natural language descriptions. It combines generative AI techniques with reinforcement learning to ensure that the designs meet both geometric constraints and aesthetic preferences. The system operates through a series of steps, including creating a semantic representation, computing a base packing, and refining the crease patterns. By facilitating collaboration between AI and human artists, COrigami enhances the design process in computational origami, allowing for innovative and mathematically sound creations.'}}}, {'id': 'https://huggingface.co/papers/2606.16517', 'title': 'How Post-Training Shapes Biological Reasoning Models', 'url': 'https://huggingface.co/papers/2606.16517', 'abstract': 'Abstract Post-training stages in biological reasoning models differently affect generalization, with continued pre-training aligning models with biological language, supervised fine-tuning improving in-domain performance but reducing out-of-domain generalization, and reinforcement learning recovering out-of-domain performance when applied to well-aligned checkpoints.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Scientific reasoning models for biology combine language models with foundation models trained on multimodal biological data, including DNA, RNA, and proteins. These models are built through post-training, yet how each stage shapes reasoning and generalization remains poorly understood. We study when post-training improves performance and when it induces over-specialization. Across genomics, transcriptomics, and proteins, we train and evaluate more than 100 biological reasoning models under controlled variation in backbone, continued pre-training (CPT), supervised fine-tuning (SFT), and reinforcement learning (RL), measuring both in-domain (ID) and out-of-domain (OOD) performance. We find that each post-training stage reshapes generalization in a distinct way rather than contributing uniform gains. CPT improves downstream performance by aligning models with biological language. SFT consistently increases ID performance but causes OOD performance to peak early and decline as models fit the training distribution. RL, when applied to strong SFT checkpoints with aligned rewards, improves OOD performance and partially recovers generalization. These results show that biological reasoning does not improve monotonically with additional supervision or compute. Instead, performance depends on how training stages are composed. Under fixed post-training budgets, the strongest ID-OOD trade-off comes from brief SFT, larger RL allocations, and asymmetric adaptation capacity across stages.', 'score': 0, 'issue_id': 2724, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': '113ec59767239b07', 'github_url': '', 'github_stars': 0, 'authors': ['Lukas Fesser', 'Hanlin Zhang', 'Michelle M. Li', 'Eric Wang', 'Bryan Perozzi', 'Shekoofeh Azizi', 'Sham M. Kakade', 'Marinka Zitnik'], 'affiliations': ['Google DeepMind', 'Google Research', 'Harvard University'], 'pdf_title_img': 'assets/pdf/title_img/2606.16517.jpg', 'data': {'categories': ['#rl', '#training', '#healthcare', '#reasoning', '#optimization', '#continual_learning', '#multimodal'], 'emoji': '🧬', 'ru': {'title': 'Этапы постобучения в биологических моделях: баланс между специальностью и обобщением', 'desc': 'В данной статье исследуются этапы постобучения моделей биологического рассуждения и их влияние на обобщение. Выясняется, что продолжение предварительного обучения помогает лучше подстраивать модели под биологический язык, в то время как супервайзинг улучшает производительность в обучающем наборе, но снижает показатели вне него. Использование обучения с подкреплением восстанавливает производительность вне обучающего набора при работе с хорошо подобранными контрольными моментами. Результаты показывают, что улучшение в биологическом рассуждении зависит от компоновки этапов обучения.'}, 'en': {'title': 'Optimizing Biological Reasoning: The Power of Post-Training Stages', 'desc': 'This paper investigates how different post-training stages affect the generalization of biological reasoning models. It finds that continued pre-training aligns models with biological language, while supervised fine-tuning enhances in-domain performance but can hurt out-of-domain generalization. Reinforcement learning can recover out-of-domain performance when applied to well-aligned models. The study emphasizes that the effectiveness of training stages varies and is not simply improved by adding more supervision or computational resources.'}}}];
        const articlesContainer = document.getElementById('articles-container');
