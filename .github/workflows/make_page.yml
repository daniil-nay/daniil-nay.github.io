name: Make Page

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write
  models: read

concurrency:
  group: publish-main
  cancel-in-progress: false

jobs:
  run-python-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository content
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run generator script
        run: python main.py
        env:
          # GitHub Models (OpenAI-совместимый). Встроенного GITHUB_TOKEN хватает
          # благодаря permissions: models: read выше — отдельные секреты не нужны.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_API: github
          GITHUB_MODELS_MODEL: openai/gpt-4o-mini

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Auto: update page $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push failed, retry $i/3..." && sleep 2
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
